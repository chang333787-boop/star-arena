}

/* =======================================================================
   л©”мқё лЈЁн”„ (лӢЁ н•ҳлӮҳл§Ң мӢӨн–ү)
   ======================================================================= */
let lastTime=0, loopStarted=false;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  if(lastTime===0) lastTime=ts;
  let dt=(ts-lastTime)/1000; lastTime=ts;
  if(dt>0.05) dt=0.05;          // нғӯ ліөк·Җ мӢң нҒ° м җн”„ л°©м§Җ
  update(dt); render();
}
/* мҳЁлқјмқёкёҙкёү P1b: нҳёмҠӨнҠё нғӯ мҲЁк№Җ = rAF мҷ„м „ м •м§Җ вҶ’ л°© м „мІҙк°Җ л©Ҳм¶”кі (state м“°кё° мӨ‘лӢЁ) кІҢмҠӨнҠёлҠ”
   'лҸҷкё°нҷ” лҢҖкё°/кі л¬ҙмӨ„'м—җ к°Үнһҳ вҖ” көҗмӢӨм—җм„ң л°©мһҘмқҙ нғӯл§Ң л°”кҝ”лҸ„ л°ңмғқ. мҲЁк№Җ мӨ‘м—җл§Ң Web Worker нғҖмқҙлЁё
   (л°ұк·ёлқјмҡҙл“ң мҠӨлЎңнӢҖ м ңмҷё лҢҖмғҒ)лЎң мҳЁлқјмқё нҳёмҠӨнҠё мӢңл®¬мқ„ 30Hz мң м§Җн•ңлӢӨ. renderлҠ” мғқлһө(нҷ”л©ҙ м•Ҳ ліҙмһ„). */
let _hiddenTicker=null, _hiddenLast=0;
function _hiddenTickStep(){
  if(!document.hidden || gameState!==STATE.ONLINE_PLAYING || OnlineManager.role!=="host") return;   // м „нҷҳ мҲңк°„ мһ”м—¬ л©”мӢңм§Җ к°Җл“ң
  const now=Date.now();
  let dt=(now-_hiddenLast)/1000; _hiddenLast=now;
  if(dt<=0) return;
  while(dt>0){ const step=Math.min(dt,0.05); update(step); dt-=step; }   // мҠӨлЎңнӢҖ нҸҙл°ұм—җм„ңлҸ„ м„ңлёҢмҠӨн…қмңјлЎң мӢӨмӢңк°„ мң м§Җ
}
function _hiddenTickerStart(){
  if(_hiddenTicker) return;
  _hiddenLast=Date.now();
  try{
    const w=new Worker(URL.createObjectURL(new Blob(["setInterval(function(){postMessage(0)},33);"],{type:"text/javascript"})));
    w.onmessage=_hiddenTickStep;
    _hiddenTicker={ stop:function(){ try{ w.terminate(); }catch(e){} } };
  }catch(e){   // Worker л¶Ҳк°Җ нҷҳкІҪ: setInterval(л°ұк·ёлқјмҡҙл“ң 1s мҠӨлЎңнӢҖ)мқҙлқјлҸ„ м„ңлёҢмҠӨн…қмңјлЎң мҷ„м „ м •м§Җл§ҢмқҖ л°©м§Җ
    const iv=setInterval(_hiddenTickStep, 250);
    _hiddenTicker={ stop:function(){ clearInterval(iv); } };
  }
}
function _hiddenTickerStop(){ if(_hiddenTicker){ _hiddenTicker.stop(); _hiddenTicker=null; lastTime=0; } }   // lastTime=0 вҶ’ ліөк·Җ мІ« н”„л Ҳмһ„ dt=0(мқҙмӨ‘ мҠӨн…қ л°©м§Җ)
document.addEventListener("visibilitychange", function(){
  try{
    if(document.hidden){
      if(loopStarted && gameState===STATE.ONLINE_PLAYING && OnlineManager.role==="host") _hiddenTickerStart();
      // кІҢмҠӨнҠёк°Җ нғӯмқ„ мҲЁкё°л©ҙ л§Ҳм§Җл§ү мһ…л Ҙмқҙ hostм—җ мһ”лҘҳн•ҙ мң л № мқҙлҸҷ вҖ” л№Ҳ мһ…л Ҙмқ„ 1нҡҢ мҰүмӢң м „мҶЎ
      if(gameState===STATE.ONLINE_PLAYING && OnlineManager.role==="guest") OnlineManager.writeInput(emptyInput());
    } else _hiddenTickerStop();
  }catch(e){}
});
function startLoopOnce(){
  if(loopStarted) return;
  loopStarted=true;
  try{ applyApprovedMaps(); }catch(e){}   // мҠ№мқёлҗң л§өкіөл°© л§ө вҶ’ MAPS л°ҳмҳҒ. loadProfileмқҳ л§ө id кІҖмҰқліҙлӢӨ лЁјм Җ мӢӨн–үн•ҙм•ј м„ нғқ л§өмқҙ мҙҲкё°нҷ”лҗҳм§Җ м•ҠмқҢ
  try{ applyBalanceOverrides(); }catch(e){}   // BALANCE-1: көҗмӮ¬к°Җ м ҖмһҘн•ң л°ёлҹ°мҠӨ мҲҳм№ҳ вҶ’ кІҢмһ„ лҚ°мқҙн„° л°ҳмҳҒ
  loadProfile();               // кІҢмҠӨнҠё кё°ліёк°’(лҜёлЎңк·ёмқё мӢң нҷ”л©ҙ м•Ҳ к№Ём§ҖкІҢ)
  loadAccounts();              // н•ҷкёү кі„м •(лі„лҸ„ м ҖмһҘ)
  loadSession();               // лЎңк·ёмқё м„ём…ҳ
  loadGameAssets();            // ASSETS_ENABLED=false л©ҙ м•„л¬ҙкІғлҸ„ м•Ҳ н•Ё(мҳӨлҠҳ)
  OnlineManager.initFirebaseIfAvailable();
  applyProfileSelections();
  OBSTACLES=getMap(selectedMapId).obstacles;   // л°°кІҪмҡ©
  BUSHES=getMap(selectedMapId).bushes;
  // нқҗлҰ„: мң нҡЁн•ң н•ҷмғқ м„ём…ҳмқҙ мһҲмңјл©ҙ л°”лЎң лЎңл№„, м—Ҷмңјл©ҙ мҠӨн”ҢлһҳмӢң вҶ’ лЎңк·ёмқё
  if(session && session.role==="student" && accounts.students[session.studentId] && accounts.students[session.studentId].isActive!==false){
    bindStudent(session.studentId); gameState=STATE.START;
  } else {
    if(session && session.role==="admin"){ session=null; saveSession(); }  // көҗмӮ¬ м„ём…ҳмқҖ мһҗлҸҷ м§„мһ… м•Ҳ н•Ё
    splashTimer=0; gameState=STATE.SPLASH;
  }
  requestAnimationFrame(gameLoop);
  // кІҖмҰқмҡ© к°ңл°ң нӣ…(RPG м•„нҠё/нҷ”л©ҙ мҠӨнҒ¬лҰ°мғ· мһҗлҸҷнҷ”): #dev_rpg[_л§өid] лЎң м—ҙл©ҙ RPG н•ҙлӢ№ л§өмңјлЎң л°”лЎң м§„мһ….
  // н•ҷмғқ л…ём¶ң мҳҒн–Ҙ м—ҶмқҢ вҖ” н•ҙмӢңлҘј м§Ғм ‘ міҗм•јл§Ң лҸҷмһ‘, м ҖмһҘмқҖ кІҢмҠӨнҠё н”„лЎңн•„лЎңл§Ң.
  try{
    const h=(window.location&&window.location.hash)||"";
    if(h.indexOf("#dev_rpg")===0){
      setTimeout(function(){
        try{
          profile.rpg=null; rpgEnter();
          let mid=h.slice("#dev_rpg_".length).replace("!map",""), dtx=-1, dty=-1;
          const at=mid.indexOf("@");   // #dev_rpg_л§өid@tx,ty вҖ” м№ҙл©”лқј мң„м№ҳ кІҖмҰқмҡ©
          if(at>=0){ const xy=mid.slice(at+1).split(","); dtx=parseInt(xy[0],10); dty=parseInt(xy[1],10); mid=mid.slice(0,at); }
          if(mid&&rpgFind("maps",mid)){ RPG.save.level=9; RPG.save.hp=rpgMaxHpFor(RPG.save); rpgLoadMap(mid,dtx,dty,{noSave:true}); }
          if(mid==="farm"&&RPG){   // лҚ°лӘЁ л°ӯ: мһ‘л¬ј 6мў… Г— м„ұмһҘ 3лӢЁкі„(м•„нҠё кІҖмҰқмҡ©)
            const crops=["crop_byeolmu","crop_galaxy_wheat","crop_sparkle_carrot","crop_star_strawberry","crop_starbell_bean","crop_lightwood_sapling"];
            for(let i=0;i<12;i++){ const c=crops[i%6], need=rpgFind("crops",c).growDays;
              RPG.save.farm[i]={ c:c, wd:(i<6)?need:(i<9?Math.ceil(need/2):0), wt:(i>=9), rg:false }; }
          }
          if(RPG){ RPG.dialog=null; RPG.ui=(h.indexOf("!map")>=0)?"map":"field"; }   // !map=м „мІҙм§ҖлҸ„ нҷ”л©ҙ кІҖмҰқ
        }catch(e){}
      }, 900);   // м—җм…Ӣ лЎңл”© нӣ„ м§„мһ…(мҠӨнҒ¬лҰ°мғ· лҢҖкё°мҷҖ л§һм¶Ө)
    }
    if(h.indexOf("#dev_editor")===0){   // м—җл””н„° WYSIWYG кІҖмҰқмҡ©: #dev_editor[_лӘЁл“ң] вҖ” лҚ°лӘЁ мҡ”мҶҢ л°°м№ҳ
      setTimeout(function(){ try{
        const mode=h.slice("#dev_editor_".length)||"tdm";
        openEditor(); ED.step="mode"; ED.mode=(mode&&mode!=="#dev_editor")?mode:"tdm"; ED.modeIdx=0; ED.sizeIdx=0; edStartGrid();
        const demo=[["W",3,2],["W",4,2],["W",5,2],["B",2,5],["B",3,5],["S",6,6],["L",7,4],["I",8,7],["C",4,7],["O",9,4],["X",2,3],["*",1,4]];
        for(const d of demo){ if(d[2]<ED.rows&&d[1]<ED.half) ED.cells[d[2]][d[1]]=d[0]; }
      }catch(e){} }, 900);
    }
  }catch(e){}
}
startLoopOnce();
</script>
