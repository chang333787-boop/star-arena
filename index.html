function getOnlineDrawData(){
  if(OnlineManager.role==="host"){
    const H=onlineFighters.host, G=onlineFighters.guest;
    return {
      timeLeft:Math.max(0,Math.ceil(onlineTimeLeft)),
      host: H?{ x:H.x,y:H.y,hp:H.hp,maxHp:H.maxHp,facing:H.facing,dead:H.dead,inv:H.invincibleTimer>0,charId:H.char.id,score:H.score }:null,
      guest:G?{ x:G.x,y:G.y,hp:G.hp,maxHp:G.maxHp,facing:G.facing,dead:G.dead,inv:G.invincibleTimer>0,charId:G.char.id,score:G.score }:null,
      bullets: onlineBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color }))
    };
  } else {
    const s=OnlineManager.onlineState;
    if(!s) return { timeLeft:GAME_CONFIG.gameTime, host:null, guest:null, bullets:[], waiting:true };
    // 상대는 보간값, 내 캐릭터는 예측값으로 그린다(즉시 반응). 체력/점수 등은 권한값 그대로.
    const ownSlot=(OnlineManager.role==="host")?"host":"guest";
    const mkOpp=(p,slot)=>{ if(!p) return null; const r=onlineRender[slot]||p;
      return { x:r.x, y:r.y, facing:r.facing, hp:p.hp, maxHp:p.maxHp, dead:p.dead, inv:p.inv, charId:p.charId, score:p.score }; };
    const mkOwn=(p)=>{ if(!p) return null; const r=(onlinePredict&&!p.dead)?onlinePredict:p;
      return { x:r.x, y:r.y, facing:r.facing, hp:p.hp, maxHp:p.maxHp, dead:p.dead, inv:p.inv, charId:p.charId, score:p.score }; };
    const host = (ownSlot==="host") ? mkOwn(s.host) : mkOpp(s.host,"host");
    const guest = (ownSlot==="guest") ? mkOwn(s.guest) : mkOpp(s.guest,"guest");
    // 상대 총알은 권한값으로, 내 총알은 예측값으로 그린다(내 권한 총알은 가려 중복 방지)
    const oppSlot2=(ownSlot==="host")?"guest":"host";
    const oppB=onlineBulletsView.filter(b=>b.o===oppSlot2).map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c }));
    const myB=onlinePredictBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c }));
    return { timeLeft:s.timeLeft, host:host, guest:guest, bullets:oppB.concat(myB) };
  }
}

      let team=p.team || (i%2===1?"blue":"red");
      const idx = team==="red"?redIdx++:blueIdx++;
      tFighters[slot]=tMakeFighter(slot, team, p.characterId, p.weaponId, false, idx, map);
    }
  }
  // 2) host만 빈자리를 AI 봇으로 채운다(3대3 PVP)
  if(OnlineManager.role==="host" && mode.modeType==="pvp"){
    for(let i=1;i<=mode.maxPlayers;i++){
      const slot="p"+i; if(tFighters[slot]) continue;
      const blueCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="blue").length;
      const redCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="red").length;
      let team=null;
      if(blueCount<3 && (blueCount<=redCount || redCount>=3)) team="blue";
      else if(redCount<3) team="red";
      if(!team) continue;
      const idx = team==="red"?redIdx++:blueIdx++;
      const botChar = CHARACTERS[i%3];
      tFighters[slot]=tMakeFighter(slot, team, botChar.id, "star_blaster", true, idx, map);
    }
  }
}

function resetTeamMatchFromRoom(){
  const mode=getOnlineMode(OnlineManager.mode);
  tBullets=[]; tWriteAcc=0; tInputAcc=0; tLastInputStr=""; tWinner=null; tResultText="";
  tRenderFighters={}; tPredict=null; tBulletsView=[]; tLastStateRef=null;
  tEnemies={}; tEnemyId=0; tEnemiesView={};
  if(mode.modeType==="pve"){
    const stage=PVE_STAGES[0]; tMapId=stage.mapId;
    tPve={ stageIndex:0, waveIndex:0, teamLives:stage.teamLives, status:"playing", phase:"wave", phaseTimer:0, enemiesRemaining:0 };
    tBuildFighters();
    if(OnlineManager.role==="host") tPveStartWave();
  } else {
    tMapId="training";
    tBuildFighters();
    tTimeLeft=GAME_CONFIG.gameTime; tTeamScores={blue:0,red:0};
  }
}

function tStartMatch(){
  if(OnlineManager.role!=="host") return;
  resetTeamMatchFromRoom();
  OnlineManager.writeMetaStatus("playing");
  tHostWriteState();
  gameState=STATE.ONLINE_PLAYING;
}

function tNearestEnemyFighter(f){
  let best=null, bd=Infinity;
  for(const slot in tFighters){ const o=tFighters[slot]; if(o.dead||o.team===f.team) continue;
    const d=dist(f.x,f.y,o.x,o.y); if(d<bd){bd=d; best=o;} }
  return best;
}

function tSendInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  tInputAcc+=dt;
  if(str!==tLastInputStr || tInputAcc>=1/T_INPUT_FPS){ tLastInputStr=str; tInputAcc=0; OnlineManager.writeInput(inp); }
}

function tUpdate(dt){
  const isPve=getOnlineMode(OnlineManager.mode).modeType==="pve";
  if(OnlineManager.role==="guest") tSendInput(dt);
  if(OnlineManager.role==="host"){ if(isPve) tPveUpdateHost(dt); else tUpdateHost(dt); }
  else tUpdateGuest(dt);
  updateEffects(dt);
}

function tUpdateHost(dt){
  const players=OnlineManager.players||{};
  for(const slot in tFighters){
    const f=tFighters[slot];
    // 끊긴 실제 플레이어는 AI 봇이 인계(가만히 멈춰 점수 공급원이 되지 않게)
    if(!f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(!p || p.connected===false) f.isBot=true; }
    if(f.isBot){ tBotUpdate(f, dt); continue; }
    let input;
    if(slot===OnlineManager.mySlot) input=readLocalInput();
    else { const p=players[slot]; const conn=p && p.connected!==false; input = (conn && p.input) ? p.input : emptyInput(); }
    tUpdateFighter(f, input, dt);
  }
  tUpdateBullets(dt);
  for(const slot in tFighters){ const f=tFighters[slot]; f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8)); }
  tTimeLeft-=dt;
  tWriteAcc+=dt; if(tWriteAcc>=1/T_STATE_FPS){ tWriteAcc=0; tHostWriteState(); }
  if(tTimeLeft<=0){ tTimeLeft=0; tHostEndMatch(); }
}

function tUpdateFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  let mx=0,my=0; if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){ mx/=ml; my/=ml; moveEntity(f, mx*f.moveSpeed*dt, my*f.moveSpeed*dt); f.facing=Math.atan2(my,mx); }
  f.cooldown-=dt;
  if(input.attack && f.cooldown<=0){ tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*getWeapon(f.weaponId).cooldownMul; }
}

function tBotUpdate(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  const t=tNearestEnemyFighter(f);
  if(t){
    const dx=t.x-f.x, dy=t.y-f.y, d=Math.hypot(dx,dy)||1;
    let mvx=0,mvy=0;
    if(d>320){ mvx=dx/d; mvy=dy/d; }
    else if(d<200){ mvx=-dx/d; mvy=-dy/d; }
    else { f.ai.strafeTimer-=dt; if(f.ai.strafeTimer<=0){ f.ai.strafeDir=Math.random()<0.5?1:-1; f.ai.strafeTimer=rand(0.5,1.2); } mvx=-dy/d*f.ai.strafeDir; mvy=dx/d*f.ai.strafeDir; }
    if(f.ai.stuckTimer>0){ f.ai.stuckTimer-=dt; mvx=-dy/d*f.ai.stuckDir; mvy=dx/d*f.ai.stuckDir; } // 벽끼임 탈출: 옆으로 우회
    const ml=Math.hypot(mvx,mvy);
    if(ml>0){ mvx/=ml; mvy/=ml; const step=f.moveSpeed*0.9*dt, ox=f.x, oy=f.y;
      moveEntity(f, mvx*step, mvy*step);
      if(f.ai.stuckTimer<=0 && Math.hypot(f.x-ox,f.y-oy) < step*0.3){ f.ai.stuckDir=Math.random()<0.5?1:-1; f.ai.stuckTimer=rand(0.4,0.8); } }
    f.facing=Math.atan2(dy,dx);
    f.cooldown-=dt; f.ai.reTimer-=dt;
    if(d<GAME_CONFIG.playerRange && f.cooldown<=0 && f.ai.reTimer<=0 && hasLineOfSight(f.x,f.y,t.x,t.y)){
      tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*1.3; f.ai.reTimer=rand(0.1,0.4);
    }
  }
}

function tFire(f){
  const w=getWeapon(f.weaponId), c=f.char;
  const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
  const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
  const dmg=GAME_CONFIG.playerDamage*c.damageMul*w.damageMul;
  const range=GAME_CONFIG.playerRange*w.rangeMul, radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6;
    tBullets.push({ x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*speed, vy:Math.sin(a)*speed,
      r:radius, damage:dmg, team:f.team, owner:f.slot, color:w.color, alive:true, traveled:0, maxRange:range });
  }
}

function tUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; break; }
      let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
      if(wall){ b.alive=false; break; }
      for(const slot in tFighters){ const t=tFighters[slot];
        if(t.team===b.team || t.dead || t.invincibleTimer>0) continue;
        if(dist(b.x,b.y,t.x,t.y) < b.r+t.r){ tApplyDamage(t, b.damage, b.team, b.owner); b.alive=false; break; }
      }
      if(!b.alive) break;
      if(b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}

function tApplyDamage(target, dmg, fromTeam, fromSlot){
  if(target.dead || target.invincibleTimer>0 || target.team===fromTeam) return;
  target.hp-=dmg; target.hitFlash=0.15;
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    if(TEAM_COLOR[fromTeam]!==undefined) tTeamScores[fromTeam]=(tTeamScores[fromTeam]||0)+1;
    const killer=tFighters[fromSlot]; if(killer) killer.score+=1;
  }
}

function tRespawn(f){
  f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;
  const pos=findClearSpawn(f.spawnX,f.spawnY,f.r);
  f.x=pos.x; f.y=pos.y; f.invincibleTimer=GAME_CONFIG.invincibleTime;
}

function tPackFighter(f){
  // 매 틱 전송 최소화: 변하는 값만 보낸다.
  // 정적인 값(charId/team/slot/maxHp)은 players 로스터로 게스트가 역산한다(렉 최적화).
  return { x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp),
    facing:Math.round(f.facing*100)/100, dead:!!f.dead, inv:f.invincibleTimer>0 };
}
// 게스트가 정적 정보를 로스터(OnlineManager.players)에서 역산하는 도우미
function tRosterCharId(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return (p&&p.characterId)||"student_01"; }
function tRosterTeam(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return (p&&p.team)||"blue"; }
function tRosterMaxHp(slot){ return GAME_CONFIG.playerMaxHp*getCharacter(tRosterCharId(slot)).hpMul; }
function getEnemyDef(type){ return PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt; }
function tHostWriteState(){
  const fighters={};
  for(const slot in tFighters) fighters[slot]=tPackFighter(tFighters[slot]);
  const bl=[];
  // 게스트 렌더에 필요한 것만(x,y,r,c,vx,vy). owner/team은 게스트가 안 써서 제외(렉 최적화).
  for(const b of tBullets) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy) });
  const st={ timeLeft:Math.max(0,Math.round(tTimeLeft)), teamScores:tTeamScores, fighters:fighters, bullets:bl };
  // PVE면 적/스테이지 정보도 함께 보낸다. color/r/boss는 type으로 게스트가 역산(전송 제외).
  if(getOnlineMode(OnlineManager.mode).modeType==="pve"){
    const en={}; for(const id in tEnemies){ const e=tEnemies[id]; en[id]={ x:Math.round(e.x), y:Math.round(e.y), hp:Math.round(e.hp), maxHp:Math.round(e.maxHp), facing:Math.round(e.facing*100)/100, type:e.type, dead:!!e.dead }; }
    st.enemies=en;
    st.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length, mapId:tMapId };
  }
  OnlineManager.writeHostState(st);
}
function tHostEndMatch(){
  if(OnlineManager.role!=="host") return;
  let winner="draw";
  if(tTeamScores.blue>tTeamScores.red) winner="blue"; else if(tTeamScores.red>tTeamScores.blue) winner="red";
  tWinner=winner;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}

function tMyTeam(){
  const s=OnlineManager.mySlot;
  if(OnlineManager.role==="host" && tFighters[s]) return tFighters[s].team;
  const st=OnlineManager.onlineState;
  if(st && st.fighters && st.fighters[s]) return st.fighters[s].team;
  const p=OnlineManager.players; if(p && p[s]) return p[s].team;
  return "blue";
}
function tComputeResultText(){
  let w=tWinner; if(!w && OnlineManager.meta) w=OnlineManager.meta.winner;
  if(!w || w==="draw") return "무승부!";
  return (w===tMyTeam()) ? "승리!" : "패배!";
}

/* ---- guest 렌더(보간 + 내 슬롯 이동 예측) ---- */
function tUpdateGuest(dt){
  const s=OnlineManager.onlineState; if(!s || !s.fighters) return;
  // PVE: host가 보낸 현재 스테이지 맵으로 장애물/풀숲을 맞춘다(보이는 벽=실제 충돌)
  if(s.pve && s.pve.mapId && s.pve.mapId!==tMapId){ tMapId=s.pve.mapId; const m=getMap(tMapId); OBSTACLES=m.obstacles; BUSHES=m.bushes; }
  if(s!==tLastStateRef){ tLastStateRef=s; tBulletsView=(s.bullets||[]).map(b=>({ x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,r:b.r,c:b.c })); }
  for(const b of tBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const myslot=OnlineManager.mySlot, k=Math.min(1,dt*18);
  for(const slot in s.fighters){
    const p=s.fighters[slot];
    if(slot===myslot){
      if(!tPredict || p.dead){ const ch=getCharacter(p.charId||tRosterCharId(slot)); tPredict={ x:p.x,y:p.y,facing:p.facing||0,r:22,moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul }; }
      else { const inp=readLocalInput(); let mx=0,my=0; if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1; const ml=Math.hypot(mx,my);
        if(ml>0){ mx/=ml; my/=ml; moveEntity(tPredict, mx*tPredict.moveSpeed*dt, my*tPredict.moveSpeed*dt); tPredict.facing=Math.atan2(my,mx); }
        if(Math.hypot(p.x-tPredict.x,p.y-tPredict.y)>70){ tPredict.x=p.x; tPredict.y=p.y; } }
    } else {
      if(!tRenderFighters[slot] || p.dead) tRenderFighters[slot]={ x:p.x,y:p.y,facing:p.facing||0 };
      else { tRenderFighters[slot].x+=(p.x-tRenderFighters[slot].x)*k; tRenderFighters[slot].y+=(p.y-tRenderFighters[slot].y)*k;
        tRenderFighters[slot].facing=lerpAngle(tRenderFighters[slot].facing, p.facing||0, k); }
    }
  }
}

function tGetDrawData(){
  const out={ fighters:[], bullets:[], teamScores:{blue:0,red:0}, timeLeft:0, waiting:false };
  if(OnlineManager.role==="host"){
    for(const slot in tFighters){ const f=tFighters[slot];
      out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:f.team,slot:slot,isMe:slot===OnlineManager.mySlot }); }
    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color }));
    out.teamScores=tTeamScores; out.timeLeft=Math.max(0,Math.ceil(tTimeLeft));
  } else {
    const s=OnlineManager.onlineState;
    if(!s || !s.fighters){ out.waiting=true; out.timeLeft=GAME_CONFIG.gameTime; return out; }
    const myslot=OnlineManager.mySlot;
    for(const slot in s.fighters){ const p=s.fighters[slot]; let rx=p.x,ry=p.y,rf=p.facing;
      if(slot===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[slot] && !p.dead){ rx=tRenderFighters[slot].x; ry=tRenderFighters[slot].y; rf=tRenderFighters[slot].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||tRosterMaxHp(slot),dead:p.dead,inv:p.inv,charId:p.charId||tRosterCharId(slot),team:p.team||tRosterTeam(slot),slot:slot,isMe:slot===myslot }); }
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c }));
    out.teamScores=s.teamScores||{blue:0,red:0}; out.timeLeft=s.timeLeft;
  }
  return out;
}

function tDrawFighter(d){
  if(d.dead) return;

  let alpha=1; if(d.inv && Math.floor(uiTime*12)%2===0) alpha*=0.4;
  if(d.isMe) drawSelfMarker(d.x,d.y,22);
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y);
  // 팀 색 링
  ctx.strokeStyle=TEAM_COLOR[d.team]||"#fff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.stroke();

    drawPlayerCharacter({ r:22, color:ch.color, subColor:ch.subColor, facing:d.facing||0 });
  ctx.restore();

  ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,w*ratio,h,4); ctx.fill();

}

   ======================================================================= */

  boss:     { hp:900, speed:95,  dmg:26, r:46, color:"#b3203a", ranged:true,  range:520, fireCd:0.7, bulletSpeed:440, score:30, threeWay:true }

const PVE_STAGES = [

  { id:"stage3", name:"3스테이지: 은하 정원 습격", mapId:"galaxy_garden", teamLives:10,
    waves:[ {enemies:[{type:"runner",count:8}]}, {enemies:[{type:"runner",count:10},{type:"shooter",count:4}]}, {enemies:[{type:"miniBoss",count:1},{type:"grunt",count:8}]} ] },

  { id:"stage5", name:"최종 스테이지: 보스 크롬 MK2", mapId:"crystal_cave", teamLives:8,
    waves:[ {enemies:[{type:"grunt",count:8},{type:"shooter",count:4}]}, {enemies:[{type:"elite",count:4},{type:"tank",count:2}]}, {enemies:[{type:"boss",count:1}]} ] }
];

function tActivePlayerCount(){
  // 봇·끊긴(inactive)·연결 끊긴 실제 플레이어는 제외. host 자신(isMe)은 항상 active.
  const players=OnlineManager.players||{}; let n=0;
  for(const s in tFighters){ const f=tFighters[s];
    if(f.isBot) continue;
    if(f.inactive) continue;
    const isMe=s===OnlineManager.mySlot, p=players[s];
    if(!isMe && !(p && p.connected!==false)) continue;
    n++;
  }
  return Math.max(1,n);
}

function tSpawnEnemy(type, hpMul, map){
  const def=PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt;
  const ex=clamp(map.enemySpawn.x+rand(-170,170), ARENA.x+def.r, ARENA.x+ARENA.w-def.r);
  const ey=clamp(map.enemySpawn.y+rand(-90,180), ARENA.y+def.r, ARENA.y+ARENA.h-def.r);
  const pos=findClearSpawn(ex,ey,def.r);
  const id="e"+(++tEnemyId), hp=def.hp*hpMul;
  tEnemies[id]={ id:id, type:type, x:pos.x, y:pos.y, r:def.r, hp:hp, maxHp:hp, speed:def.speed, dmg:def.dmg,
    color:def.color, ranged:!!def.ranged, range:def.range||0, fireCd:def.fireCd||1.2, fireTimer:rand(0.2,1.2),
    bulletSpeed:def.bulletSpeed||360, contactCd:def.contactCd||0.8, contactTimer:0, threeWay:!!def.threeWay,
    facing:Math.PI, dead:false, score:def.score||1, isBoss:(type==="boss"||type==="miniBoss") };
}
function tPveStartWave(){
  const stage=PVE_STAGES[tPve.stageIndex], wave=stage.waves[tPve.waveIndex];
  const n=tActivePlayerCount(), hpMul=0.7+n*0.12, countMul=0.6+n*0.1, map=getMap(tMapId);
  for(const grp of wave.enemies){
    const cnt=Math.max(1,Math.round(grp.count*countMul));
    for(let i=0;i<cnt;i++){ if(Object.keys(tEnemies).length>=40) break; tSpawnEnemy(grp.type, hpMul, map); }
  }
  tPve.phase="wave"; tPve.enemiesRemaining=Object.keys(tEnemies).length;
}
function tNearestPlayer(e){ let best=null,bd=Infinity; for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue; const d=dist(e.x,e.y,f.x,f.y); if(d<bd){bd=d;best=f;} } return best; }

function tPveUpdateHost(dt){
  const players=OnlineManager.players||{};
  for(const slot in tFighters){ const f=tFighters[slot];
    // 끊긴 플레이어는 inactive 처리(적 타겟/피해/접촉/팀라이프 대상에서 제외)
    const isMe=slot===OnlineManager.mySlot, p=players[slot];
    f.inactive = !isMe && !(p && p.connected!==false);
    if(f.inactive) continue;
    let input = isMe ? readLocalInput() : ((p&&p.input)?p.input:emptyInput());
    tPveUpdatePlayer(f, input, dt);
    f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8));
  }
  for(const id in tEnemies) tEnemyUpdate(tEnemies[id], dt);
  tPveUpdateBullets(dt);
  tPveProgress(dt);
  tWriteAcc+=dt; if(tWriteAcc>=1/T_STATE_FPS){ tWriteAcc=0; tHostWriteState(); }
}
function tPveUpdatePlayer(f,input,dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0 && tPve.teamLives>0) tRespawn(f); return; }
  if(f.hitFlash>0)f.hitFlash-=dt; if(f.invincibleTimer>0)f.invincibleTimer-=dt;
  let mx=0,my=0; if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my); if(ml>0){mx/=ml;my/=ml; moveEntity(f,mx*f.moveSpeed*dt,my*f.moveSpeed*dt); f.facing=Math.atan2(my,mx);}
  f.cooldown-=dt;
  if(input.attack && f.cooldown<=0){ tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*getWeapon(f.weaponId).cooldownMul; }
}
function tHurtPlayer(f,dmg){
  if(f.dead||f.inactive||f.invincibleTimer>0) return;
  f.hp-=dmg; f.hitFlash=0.15;
  if(f.hp<=0){ f.hp=0; f.dead=true; f.respawnTimer=4; tPve.teamLives=Math.max(0, tPve.teamLives-1); }
}
function tEnemyUpdate(e,dt){
  if(e.dead) return;
  const t=tNearestPlayer(e); if(!t) return;
  const dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy)||1;
  e.facing=Math.atan2(dy,dx);
  if(e.ranged){
    let mvx=0,mvy=0;
    if(d>e.range*0.75){ mvx=dx/d; mvy=dy/d; } else if(d<e.range*0.4){ mvx=-dx/d; mvy=-dy/d; }
    if(mvx||mvy) moveEntity(e, mvx*e.speed*dt, mvy*e.speed*dt);
    e.fireTimer-=dt;
    if(d<e.range && e.fireTimer<=0 && hasLineOfSight(e.x,e.y,t.x,t.y)){ tEnemyFire(e); e.fireTimer=e.fireCd; }
  } else {
    moveEntity(e, dx/d*e.speed*dt, dy/d*e.speed*dt);
    e.contactTimer-=dt;
    if(d < e.r+t.r+4 && e.contactTimer<=0){ tHurtPlayer(t, e.dmg); e.contactTimer=e.contactCd; }
  }
}
function tEnemyFire(e){
  const a0=e.facing, n=e.threeWay?3:1, spread=deg2rad(26);
  for(let i=0;i<n;i++){ let a=a0; if(n>1) a=a0-spread/2+spread*(i/(n-1));
    const mz=e.r+6;
    tBullets.push({ x:e.x+Math.cos(a)*mz, y:e.y+Math.sin(a)*mz, vx:Math.cos(a)*e.bulletSpeed, vy:Math.sin(a)*e.bulletSpeed,
      r:e.isBoss?14:9, damage:e.dmg, team:"enemy", owner:e.id, color:"#ff8f6b", alive:true, traveled:0, maxRange:(e.range||400)+140 });
  }
}
function tPveUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; break; }
      let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } } if(wall){ b.alive=false; break; }
      if(b.team==="pve"){
        for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue;
          if(dist(b.x,b.y,e.x,e.y)<b.r+e.r){ e.hp-=b.damage; if(e.hp<=0){ const k=tFighters[b.owner]; if(k) k.score+=e.score; delete tEnemies[id]; } b.alive=false; break; } }
      } else {
        for(const slot in tFighters){ const f=tFighters[slot]; if(f.dead||f.inactive||f.invincibleTimer>0) continue;
          if(dist(b.x,b.y,f.x,f.y)<b.r+f.r){ tHurtPlayer(f, b.damage); b.alive=false; break; } }
      }
      if(!b.alive) break;
      if(b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}
function tPveProgress(dt){
  if(tPve.status!=="playing") return;
  if(tPve.teamLives<=0){ tPve.status="failed"; tPveEnd(); return; }
  const alive=Object.keys(tEnemies).length;
  if(tPve.phase==="wave"){
    if(alive===0){
      const stage=PVE_STAGES[tPve.stageIndex];
      if(tPve.waveIndex < stage.waves.length-1){ tPve.phase="gap"; tPve.phaseTimer=2; }
      else if(tPve.stageIndex < PVE_STAGES.length-1){ tPve.phase="stageclear"; tPve.phaseTimer=5; }
      else { tPve.status="complete"; tPveEnd(); }
    }
  } else if(tPve.phase==="gap"){
    tPve.phaseTimer-=dt; if(tPve.phaseTimer<=0){ tPve.waveIndex++; tPveStartWave(); }
  } else if(tPve.phase==="stageclear"){
    tPve.phaseTimer-=dt;
    if(tPve.phaseTimer<=0){
      tPve.stageIndex++; tPve.waveIndex=0;
      const st=PVE_STAGES[tPve.stageIndex]; tMapId=st.mapId;
      OBSTACLES=getMap(tMapId).obstacles; BUSHES=getMap(tMapId).bushes;
      tPve.teamLives=st.teamLives; tBullets=[]; tEnemies={};
      tPveReposition(); tPveStartWave();
    }
  }
}
function tPveReposition(){
  const map=getMap(tMapId); let i=0;
  for(const slot in tFighters){ const f=tFighters[slot]; const p=tSpawnPos(map.playerSpawn,i++); const sp=findClearSpawn(p.x,p.y,f.r);
    f.x=sp.x; f.y=sp.y; f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.invincibleTimer=GAME_CONFIG.invincibleTime;
    f.spawnX=map.playerSpawn.x; f.spawnY=map.playerSpawn.y; }
}
function tPveEnd(){
  if(OnlineManager.role!=="host") return;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:null, resultText:tPve.status });
  tResultText=tPve.status;
  gameState=STATE.ONLINE_OVER;
}

/* ---- PVE 렌더 ---- */
function tPveGetDrawData(){
  const out={ fighters:[], enemies:[], bullets:[], pve:null, waiting:false };
  if(OnlineManager.role==="host"){
    for(const s in tFighters){ const f=tFighters[s]; out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:"pve",slot:s,isMe:s===OnlineManager.mySlot }); }
    for(const id in tEnemies){ const e=tEnemies[id]; out.enemies.push({ x:e.x,y:e.y,r:e.r,hp:e.hp,maxHp:e.maxHp,facing:e.facing,color:e.color,boss:e.isBoss,type:e.type }); }
    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color }));
    out.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length };
  } else {
    const st=OnlineManager.onlineState;
    if(!st || !st.fighters){ out.waiting=true; return out; }
    const myslot=OnlineManager.mySlot;
    for(const s in st.fighters){ const p=st.fighters[s]; let rx=p.x,ry=p.y,rf=p.facing;
      if(s===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[s] && !p.dead){ rx=tRenderFighters[s].x; ry=tRenderFighters[s].y; rf=tRenderFighters[s].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||tRosterMaxHp(s),dead:p.dead,inv:p.inv,charId:p.charId||tRosterCharId(s),team:"pve",slot:s,isMe:s===myslot }); }
    const en=st.enemies||{}; for(const id in en){ const e=en[id]; if(e.dead) continue; const def=getEnemyDef(e.type);
      out.enemies.push({ x:e.x,y:e.y,r:e.r||def.r,hp:e.hp,maxHp:e.maxHp,facing:e.facing,color:e.color||def.color,boss:(e.boss!==undefined?e.boss:(e.type==="boss"||e.type==="miniBoss")),type:e.type }); }
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c }));
    out.pve=st.pve||null;
  }
  return out;
}
function tDrawEnemy(e){
  ctx.save(); ctx.translate(e.x,e.y);
  ctx.fillStyle=e.color; ctx.beginPath();
  for(let i=0;i<6;i++){ const a=Math.PI/6+i*Math.PI/3; const px=Math.cos(a)*e.r,py=Math.sin(a)*e.r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
  ctx.closePath(); ctx.fill(); ctx.strokeStyle="#ffd0d8"; ctx.lineWidth=2; ctx.stroke();
  ctx.save(); ctx.rotate(e.facing); ctx.fillStyle="#ff4d6d"; roundRect(2,-5,e.r-4,10,3); ctx.fill(); ctx.restore();
  ctx.restore();
  const w=Math.max(28,e.r*1.6),h=5,bx=e.x-w/2,by=e.y-e.r-12;
  ctx.save(); ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,3); ctx.fill();
  ctx.fillStyle="#ff5a5a"; roundRect(bx,by,w*clamp(e.hp/(e.maxHp||1),0,1),h,3); ctx.fill(); ctx.restore();
}
function tPveRender(){
  const data=tPveGetDrawData();
  for(const b of data.bullets) drawOnlineBullet(b);
  for(const e of data.enemies) tDrawEnemy(e);
  for(const f of data.fighters) tDrawFighter(f);
  drawEffects();
  const pve=data.pve||{ stageIndex:0, waveIndex:0, teamLives:0, enemiesRemaining:0, status:"playing", phase:"wave" };
  const stage=PVE_STAGES[pve.stageIndex]||PVE_STAGES[0];
  ctx.save();
  ctx.fillStyle="rgba(10,12,32,0.72)"; ctx.fillRect(0,0,LOGW,64); ctx.textBaseline="middle";
  ctx.textAlign="left"; ctx.fillStyle="#9fe0ff"; ctx.font="bold 17px 'Malgun Gothic',sans-serif"; ctx.fillText(stage.name,24,24);
  ctx.fillStyle="#aab4e0"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText("웨이브 "+(pve.waveIndex+1)+"/"+stage.waves.length+" · 남은 적 "+pve.enemiesRemaining,24,46);
  ctx.textAlign="right"; ctx.fillStyle="#ff8f8f"; ctx.font="bold 20px 'Malgun Gothic',sans-serif"; ctx.fillText("팀 라이프 ♥ "+pve.teamLives,LOGW-24,32);
  ctx.fillStyle="rgba(10,12,32,0.72)"; ctx.fillRect(0,656,LOGW,64);
  ctx.textAlign="center"; ctx.fillStyle="#aab4e0"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillText("방향키 이동 · Z 공격 · Esc 나가기   (최대 6인 협동 · 베타)",LOGW/2,688);
  ctx.restore();
  let boss=null; for(const e of data.enemies){ if(e.boss){ boss=e; break; } }
  if(boss){ const bw=420,bh=16,bx=LOGW/2-bw/2,by=72;
    ctx.save(); ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,bw,bh,8); ctx.fill();
    ctx.fillStyle="#ff4d6d"; roundRect(bx,by,bw*clamp(boss.hp/boss.maxHp,0,1),bh,8); ctx.fill();
    ctx.strokeStyle="#ffd400"; ctx.lineWidth=2; roundRect(bx,by,bw,bh,8); ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("보스",LOGW/2,by+bh/2); ctx.restore(); }
  if(data.waiting) drawCenterBanner("동기화 대기 중…","#9fe0ff");
  else if(pve.status==="failed") drawCenterBanner("실패…","#ff7a7a");
  else if(pve.status==="complete") drawCenterBanner("올 클리어! 🎉","#ffe066");
  else if(pve.phase==="stageclear") drawCenterBanner("스테이지 클리어!","#ffe066");
  else if(pve.phase==="gap") drawCenterBanner("다음 웨이브 준비…","#9fe0ff");
}

function tPveDrawOver(){
  dimScreen(0.72);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  let status=tResultText; if(!status && OnlineManager.onlineState && OnlineManager.onlineState.pve) status=OnlineManager.onlineState.pve.status;
  const txt = status==="complete" ? "올 클리어! 🎉" : (status==="failed" ? "실패…" : "스테이지 클리어!");
  const col = status==="failed" ? "#ff7a7a" : "#ffe066";
  ctx.shadowColor=col; ctx.shadowBlur=30; ctx.fillStyle=col; ctx.font="bold 64px 'Malgun Gothic',sans-serif"; ctx.fillText(txt,LOGW/2,180); ctx.shadowBlur=0;
  let reached=tPve.stageIndex+1; const st=(OnlineManager.onlineState&&OnlineManager.onlineState.pve)?OnlineManager.onlineState.pve:null; if(st) reached=st.stageIndex+1;
  ctx.fillStyle="#fff"; ctx.font="bold 24px 'Malgun Gothic',sans-serif"; ctx.fillText("도달 스테이지: "+reached+" / "+PVE_STAGES.length,LOGW/2,250);
  ctx.fillStyle="#aab4e0"; ctx.font="17px 'Malgun Gothic',sans-serif"; ctx.fillText("온라인 베타는 골드 보상이 없어요.",LOGW/2,300);
  ctx.fillStyle="#ffe066"; ctx.font="18px 'Malgun Gothic',sans-serif"; ctx.fillText("Enter / Esc 로 시작 화면으로",LOGW/2,360);
  ctx.restore();
}

/* ---- 일시정지 화면 ---- */
function drawPauseScreen(){
  dimScreen(0.55);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#ffffff"; ctx.shadowColor="rgba(120,200,255,0.8)"; ctx.shadowBlur=25;
  ctx.font="bold 56px 'Malgun Gothic',sans-serif"; ctx.fillText("일시 정지",LOGW/2,LOGH/2-30); ctx.shadowBlur=0;
  ctx.fillStyle="#dfe6ff"; ctx.font="bold 22px 'Malgun Gothic',sans-serif"; ctx.fillText("P 키를 눌러 계속하기",LOGW/2,LOGH/2+36);
  ctx.fillStyle="#8893bb"; ctx.font="16px 'Malgun Gothic',sans-serif"; ctx.fillText("Esc 키 : 시작 화면으로",LOGW/2,LOGH/2+72);
  ctx.restore();
}

/* ---- 결과 화면 ---- */
function drawResultScreen(){
  dimScreen(0.72);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  let txt,col;
  if(playerTeamScore>enemyTeamScore){ txt="승리!"; col="#ffe066"; }
  else if(playerTeamScore<enemyTeamScore){ txt="패배!"; col="#ff7a7a"; }
  else { txt="무승부!"; col="#9fe0ff"; }
  ctx.shadowColor=col; ctx.shadowBlur=30; ctx.fillStyle=col; ctx.font="bold 66px 'Malgun Gothic',sans-serif"; ctx.fillText(txt,LOGW/2,78); ctx.shadowBlur=0;
  ctx.fillStyle="#ffffff"; ctx.font="bold 30px 'Malgun Gothic',sans-serif"; ctx.fillText("우리 팀 "+playerTeamScore+" : "+enemyTeamScore+" 적 팀",LOGW/2,132);
  ctx.fillStyle="#ffe066"; ctx.font="bold 24px 'Malgun Gothic',sans-serif"; ctx.fillText("이번 판 획득 골드: +"+matchGoldEarned+"G   (보유 "+profile.gold+"G)",LOGW/2,170);
  if(matchDropName){ ctx.fillStyle="#7fffa0"; ctx.font="bold 18px 'Malgun Gothic',sans-serif"; ctx.fillText("새 무기 획득: "+matchDropName+"!",LOGW/2,198); }
  const acc=stats.shotsFired>0?Math.round(stats.shotsHit/stats.shotsFired*100):0;
  const lines=[
    ["준 피해량", Math.round(stats.damageDealt)],
    ["받은 피해량", Math.round(stats.damageTaken)],
    ["기본 공격 발사", stats.shotsFired+" 발"],
    ["기본 공격 명중", stats.shotsHit+" 발"],
    ["명중률", acc+" %"],
    ["궁극기 사용", stats.superUsed+" 회"],
    ["적 처치", stats.kills+" 회"],
    ["보스 처치", stats.bossKilled?"성공":"-"],
    ["내가 쓰러진 횟수", stats.playerDeaths+" 회"]
  ];
  const boxX=LOGW/2-230, boxY=216, boxW=460, rowH=33;
  ctx.fillStyle="rgba(20,26,60,0.85)"; roundRect(boxX,boxY,boxW,rowH*lines.length+18,12); ctx.fill();
  ctx.strokeStyle="#5566aa"; ctx.lineWidth=2; roundRect(boxX,boxY,boxW,rowH*lines.length+18,12); ctx.stroke();
  for(let i=0;i<lines.length;i++){
    const ly=boxY+26+i*rowH;
    ctx.textAlign="left"; ctx.fillStyle="#aab4e0"; ctx.font="18px 'Malgun Gothic',sans-serif"; ctx.fillText(lines[i][0],boxX+28,ly);
    ctx.textAlign="right"; ctx.fillStyle="#ffffff"; ctx.font="bold 18px 'Malgun Gothic',sans-serif"; ctx.fillText(String(lines[i][1]),boxX+boxW-28,ly);
  }
  ctx.restore();
  drawButton("다시 시작",LOGW/2-150,648,240,54,resultButtonIndex===0);
  drawButton("시작 화면으로",LOGW/2+150,648,240,54,resultButtonIndex===1);
  ctx.save(); ctx.textAlign="center"; ctx.fillStyle="#8893bb"; ctx.font="15px 'Malgun Gothic',sans-serif"; ctx.fillText("← → 선택 · Enter 실행 · R 즉시 다시 시작",LOGW/2,692); ctx.restore();
}

/* =======================================================================
   메인 루프 (단 하나만 실행)
   ======================================================================= */
let lastTime=0, loopStarted=false;
function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  if(lastTime===0) lastTime=ts;
  let dt=(ts-lastTime)/1000; lastTime=ts;
  if(dt>0.05) dt=0.05;          // 탭 복귀 시 큰 점프 방지
  update(dt); render();
}
function startLoopOnce(){
  if(loopStarted) return;
  loopStarted=true;
  loadProfile();
  loadGameAssets();            // ASSETS_ENABLED=false 면 아무것도 안 함(오늘)
  OnlineManager.initFirebaseIfAvailable();
  applyProfileSelections();
  OBSTACLES=getMap(selectedMapId).obstacles;   // 시작 화면 배경용
  BUSHES=getMap(selectedMapId).bushes;
  gameState=STATE.START;
  requestAnimationFrame(gameLoop);
}
startLoopOnce();
</script>
