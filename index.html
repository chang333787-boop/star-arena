function resetOnlineMatchFromRoom(){
  const meta=OnlineManager.meta||{};
  OBSTACLES=getMap(onlineMapId()).obstacles; BUSHES=getMap(onlineMapId()).bushes;
  const map=getMap(onlineMapId());
  onlineFighters.host  = makeOnlineFighter("host",  { x:map.playerSpawn.x, y:map.playerSpawn.y, facing:0,
                          characterId:meta.characterHost||"student_01", weaponId:null });
  onlineFighters.guest = makeOnlineFighter("guest", { x:map.enemySpawn.x, y:map.enemySpawn.y, facing:Math.PI,
                          characterId:meta.characterGuest||"student_01", weaponId:null });
  onlineBullets=[]; onlineTimeLeft=GAME_CONFIG.gameTime; onlineWinner=null;
  resetSkillZones(); resetAttackLog();
  POWERUPS=[]; powerupAcc=0; powerupId=0;
  onlineWriteAcc=0; onlineInputAcc=0; onlineLastInputStr="";
  onlineRender={ host:null, guest:null }; onlineBulletsView=[]; onlineLastStateRef=null; onlinePredict=null;
  onlinePredictBullets=[]; onlinePredictCd=0;
}
function makeOnlineFighter(slot, d){
  const lo=sanitizeLoadout(d.characterId, d.weaponId);   // 잘못된/레거시 id → 학생 캐릭터 + 고정 무기 교정
  const ch=getCharacter(lo.characterId);
  const maxHp=GAME_CONFIG.playerMaxHp*ch.hpMul;
  const f={ slot:slot, x:d.x, y:d.y, r:22, facing:d.facing||0,
    char:ch, weaponId:lo.weaponId, color:ch.color, subColor:ch.subColor, name:ch.name,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul,
    cooldown:0, score:0, dead:false, respawnTimer:0, invincibleTimer:0, hitFlash:0,
    spawnX:d.x, spawnY:d.y,
    reloading:false, reloadTimer:0, superGauge:0, specialCd:0 };
  f.ammo=magSizeOf(f);
  return f;
}

/* ---- 입력 송신(throttle + 변화 시 즉시) ---- */
function readLocalInput(){
  if(confirmLeave) return emptyInput();   // 나가기 확인 중에는 이동/공격/기술 입력 무시
  return { up:keysDown.has("ArrowUp"), down:keysDown.has("ArrowDown"),
           left:keysDown.has("ArrowLeft"), right:keysDown.has("ArrowRight"),
           attack:keysDown.has("KeyZ"),
           special:keysDown.has("KeyX"),                    // X 특수기술(host가 edge 판정)
           ultimate:keysDown.has("KeyC"),                   // C 궁극기(host가 edge 판정)
           super:false,                                     // 구버전 필드(하위호환: host가 ultimate||super로 해석)
           reload:keysDown.has("KeyR"),
           pick: (keysDown.has("Digit1")||keysDown.has("Numpad1"))?0
               : (keysDown.has("Digit2")||keysDown.has("Numpad2"))?1
               : (keysDown.has("Digit3")||keysDown.has("Numpad3"))?2 : -1 };   // PVE 강화 3택1(host 판정)
}
function sendMyInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  onlineInputAcc+=dt;
  if(str!==onlineLastInputStr || onlineInputAcc>=1/ONLINE_STATE_FPS){
    onlineLastInputStr=str; onlineInputAcc=0;
    OnlineManager.writeInput(inp);
  }
}

/* ---- 업데이트 ---- */
function updateOnline(dt){
  if(isTeamOnline()){ tUpdate(dt); return; }
  // host는 자기 입력을 로컬에서 바로 쓰므로 DB에 안 보냄(낭비 방지). guest만 입력을 전송.
  if(OnlineManager.role==="guest") sendMyInput(dt);
  if(OnlineManager.role==="host") updateOnlineHost(dt);
  else updateOnlineGuest(dt);
  updateEffects(dt);
}
function updateOnlineHost(dt){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.guest && OnlineManager.players.guest.connected);
  const hi=readLocalInput();
  // 상대가 끊겼으면 마지막 입력이 남아 유령처럼 계속 움직이지 않도록 입력을 비운다
  const gi = OnlineManager.opponentConnected ? (OnlineManager.onlineInput.guest || emptyInput()) : emptyInput();
  updateOnlineFighter(H, hi, dt);
  updateOnlineFighter(G, gi, dt);
  updateOnlineBullets(dt);
  tickSkillZones(dt, envOnline1v1());
  tickPowerupsHost(dt, [H, G]);
  onlineTimeLeft-=dt;
  H.displayHp=lerp(H.displayHp,H.hp,Math.min(1,dt*8)); G.displayHp=lerp(G.displayHp,G.hp,Math.min(1,dt*8));
  onlineWriteAcc+=dt;
  if(onlineWriteAcc>=1/ONLINE_STATE_FPS){ onlineWriteAcc=0; hostWriteOnlineState(); }
  if(onlineTimeLeft<=0){ onlineTimeLeft=0; hostEndOnlineMatch(); }
}
function updateOnlineGuest(dt){
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.host && OnlineManager.players.host.connected);
  const s=OnlineManager.onlineState;
  if(!s) return;
  // 새 스냅샷이 도착하면 탄환 뷰를 받은 값으로 갱신(권한값 기준 보정)
  if(s !== onlineLastStateRef){
    onlineLastStateRef=s;
    onlineBulletsView=(s.bullets||[]).map(b=>({ x:b.x, y:b.y, vx:b.vx||0, vy:b.vy||0, r:b.r, c:b.c, o:b.o, w:b.w||null }));
  }
  // 스냅샷 사이에는 탄환을 속도로 외삽해 부드럽게 진행
  for(const b of onlineBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const ownSlot = (OnlineManager.role==="host") ? "host" : "guest";
  const oppSlot = (ownSlot==="host") ? "guest" : "host";

  // 상대 캐릭터: 받은 위치 사이를 부드럽게 보간
  const op=s[oppSlot];
  if(op){
    const k=Math.min(1, dt*22);
    if(!onlineRender[oppSlot] || op.dead) onlineRender[oppSlot]={ x:op.x, y:op.y, facing:op.facing||0 };
    else {
      onlineRender[oppSlot].x += (op.x-onlineRender[oppSlot].x)*k;
      onlineRender[oppSlot].y += (op.y-onlineRender[oppSlot].y)*k;
      onlineRender[oppSlot].facing = lerpAngle(onlineRender[oppSlot].facing, op.facing||0, k);
    }
  }

  // 내 캐릭터: 로컬 입력으로 "정확한 속도"로 즉시 이동(예측). 평소엔 보정하지 않아 빨라지지 않음.
  // 차이가 크게 벌어질 때(넉백/리스폰/랙)에만 한 번 권한값으로 맞춘다.
  const mine=s[ownSlot];
  if(mine){
    if(!onlinePredict || mine.dead){
      const ch=getCharacter(mine.charId);
      onlinePredict={ x:mine.x, y:mine.y, facing:mine.facing||0, r:22, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove };
    } else {
      const inp=readLocalInput();
      let mx=0,my=0; if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1;
      const ml=Math.hypot(mx,my);
      if(ml>0){ mx/=ml; my/=ml; moveEntity(onlinePredict, mx*onlinePredict.moveSpeed*dt, my*onlinePredict.moveSpeed*dt); onlinePredict.facing=Math.atan2(my,mx); }
      if(Math.hypot(mine.x-onlinePredict.x, mine.y-onlinePredict.y) > 70){ onlinePredict.x=mine.x; onlinePredict.y=mine.y; } // 큰 차이만 스냅(연속 보정 X → 가속 없음)
    }
  }

  // 발사 예측: 내 총알을 로컬에서 즉시 보여준다(시각용; 실제 피해 판정은 호스트가 함)
  onlinePredictCd -= dt;
  const myAmmoOk = !mine || mine.am===undefined || (!mine.rl && mine.am>0);  // 탄창 0/장전중이면 예측 발사 안 함
  if(onlinePredict && mine && !mine.dead && keysDown.has("KeyZ") && onlinePredictCd<=0 && myAmmoOk){
    const w=getWeapon(selectedWeaponId), c=getCharacter(selectedCharacterId);
    const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
    const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
    const range=GAME_CONFIG.playerRange*w.rangeMul, radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
    for(let i=0;i<count;i++){
      let a=onlinePredict.facing; if(count>1) a=onlinePredict.facing-spread/2+spread*(i/(count-1));
      const mz=onlinePredict.r+6;
      onlinePredictBullets.push({ x:onlinePredict.x+Math.cos(a)*mz, y:onlinePredict.y+Math.sin(a)*mz,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, r:radius, c:w.color, w:w.id, traveled:0, maxRange:range, alive:true });
    }
    onlinePredictCd=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  }
  // 예측 총알 진행/소멸(벽·사거리·상대에 닿으면 시각적으로 사라짐)
  const oppPos=onlineRender[oppSlot];
  for(const b of onlinePredictBullets){
    if(!b.alive) continue;
    const sx=b.vx*dt, sy=b.vy*dt; b.x+=sx; b.y+=sy; b.traveled+=Math.hypot(sx,sy);
    if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; continue; }
    let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
    if(wall){ b.alive=false; continue; }
    if(oppPos && dist(b.x,b.y,oppPos.x,oppPos.y) < b.r+22){ b.alive=false; continue; }
    if(b.traveled>b.maxRange) b.alive=false;
  }
  onlinePredictBullets=onlinePredictBullets.filter(b=>b.alive);
}
function updateOnlineFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawnOnline(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envOnline1v1);
  // X/C: 눌림 순간(edge)만 발동 — 키를 누르고 있어도 반복 발동하지 않음(host 판정)
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envOnline1v1());
  if(ult && !f._pUlt) castUltimateFor(f, envOnline1v1(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // 빙결: 이동·공격 불가
  let mx=0,my=0;
  if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){ mx/=ml; my/=ml; moveEntity(f, mx*effSpeed(f)*dt, my*effSpeed(f)*dt); f.facing=Math.atan2(my,mx); }
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ fireOnlineWeapon(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}
// ── env 어댑터: 온라인 1v1(host 판정) ──
function envOnline1v1(){
  return {
    foes(f){ const opp=f.slot==="host"?onlineFighters.guest:onlineFighters.host;
      return (opp && !opp.dead && opp.invincibleTimer<=0) ? [{e:opp,key:opp.slot,isBoss:false,isFighter:true}] : []; },
    allies(f){ return (f && !f.dead) ? [f] : []; },        // 1v1은 자기 자신만(모아 C → 자신 회복)
    damage(f,o,dmg){ applyOnlineDamage(o.e,dmg,f.slot,true); return dmg; },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.owner=f.slot; onlineBullets.push(b); }
  };
}
function fireOnlineWeapon(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // 풀숲: 공격하면 잠시 드러남
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6, bx=f.x+Math.cos(a)*mz, by=f.y+Math.sin(a)*mz;
    const b={ x:bx,y:by,vx:Math.cos(a)*spec.speed,vy:Math.sin(a)*spec.speed,r:spec.radius,damage:spec.damage,
      owner:f.slot,color:spec.color,alive:true,traveled:0,maxRange:spec.range,aid:aid,wid:spec.wid,wref:spec.wref,age:0,
      snipe:spec.snipe||0,stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    onlineBullets.push(b);
  }
}
function updateOnlineBullets(dt){
  for(const b of onlineBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=onlineFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      const target = b.owner==="host" ? onlineFighters.guest : onlineFighters.host;
      if(target && !target.dead && target.invincibleTimer<=0 && dist(b.x,b.y,target.x,target.y)<b.r+target.r){
        if(b.boomerang){
          const hm=(b.phase==="out")?b.hitO:b.hitB;
          if(!hm[target.slot]){ hm[target.slot]=true;
            applyOnlineDamage(target,bulletHitDamage(b,target),b.owner,b.isSuper,b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color); }
          continue;                                        // 부메랑은 관통(복귀 타격)
        }
        applyOnlineDamage(target, bulletHitDamage(b,target), b.owner, b.isSuper, b.aid);
        if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
        spawnHitFx(b.x,b.y,b.wid,b.color);
        b.alive=false; break;
      }
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  onlineBullets=onlineBullets.filter(b=>b.alive);
  if(onlineBullets.length>40) onlineBullets=onlineBullets.slice(onlineBullets.length-40); // DB payload 제한
}
function applyOnlineDamage(target, dmg, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0) return;
  dmg=incomingDamage(target, dmg);                        // 방패/질주 감소(최소 1)
  target.hp-=dmg; target.hitFlash=0.15;
  // 기본 공격(Z)만 궁극기 게이지 충전 — attackId당 같은 대상 최대 1회(=20)
  const attacker = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    const killer = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
    if(killer) killer.score+=1;
  }
}
function respawnOnline(f){
  f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;
  const pos=findClearSpawn(f.spawnX,f.spawnY,f.r);
  f.x=pos.x; f.y=pos.y; f.invincibleTimer=GAME_CONFIG.invincibleTime;
}
function packFighter(f){
  return { x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp), maxHp:Math.round(f.maxHp),
    facing:Math.round(f.facing*100)/100, score:f.score, dead:!!f.dead, inv:f.invincibleTimer>0, charId:f.char.id,
    am:f.ammo, rl:f.reloading?1:0, sg:Math.round(f.superGauge||0), fr:f.fireRevealTimer>0?1:0,
    xc:Math.round(Math.max(0,f.specialCd||0)*10)/10 };   // X 쿨타임(HUD용, 숫자만)
}
function hostWriteOnlineState(){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  const bl=[];
  for(const b of onlineBullets) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), o:b.owner, c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy), w:b.wid||null });
  const pw=POWERUPS.map(p=>({x:p.x,y:p.y,t:powerupPacketT(p),id:p.id}));
  OnlineManager.writeHostState({ timeLeft:Math.max(0,Math.round(onlineTimeLeft)), host:packFighter(H), guest:packFighter(G), bullets:bl, powerups:pw, zones:packZones() });
}
function hostEndOnlineMatch(){
  const H=onlineFighters.host, G=onlineFighters.guest;
  let winner="draw";
  if(H.score>G.score) winner="host"; else if(G.score>H.score) winner="guest";
  onlineWinner=winner;
  hostWriteOnlineState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}
function computeOnlineResultText(){
  let w=onlineWinner; if(!w && OnlineManager.meta) w=OnlineManager.meta.winner;
  if(!w || w==="draw") return "무승부!";
  if(w===OnlineManager.role) return "승리!";
  return "패배!";
}

/* ---- 렌더 ---- */
function getOnlineDrawData(){
  if(OnlineManager.role==="host"){
    const H=onlineFighters.host, G=onlineFighters.guest;
    return {
      timeLeft:Math.max(0,Math.ceil(onlineTimeLeft)),
      host: H?{ x:H.x,y:H.y,hp:H.hp,maxHp:H.maxHp,facing:H.facing,dead:H.dead,inv:H.invincibleTimer>0,charId:H.char.id,score:H.score,am:H.ammo,rl:H.reloading?1:0,sg:H.superGauge,fr:H.fireRevealTimer>0?1:0 }:null,
      guest:G?{ x:G.x,y:G.y,hp:G.hp,maxHp:G.maxHp,facing:G.facing,dead:G.dead,inv:G.invincibleTimer>0,charId:G.char.id,score:G.score,am:G.ammo,rl:G.reloading?1:0,sg:G.superGauge,fr:G.fireRevealTimer>0?1:0 }:null,
      bullets: onlineBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color,w:b.wid||null,vx:b.vx,vy:b.vy })),
      zones: packZones()
    };
  } else {
    const s=OnlineManager.onlineState;
    if(!s) return { timeLeft:GAME_CONFIG.gameTime, host:null, guest:null, bullets:[], zones:[], waiting:true };
    // 상대는 보간값, 내 캐릭터는 예측값으로 그린다(즉시 반응). 체력/점수 등은 권한값 그대로.
    const ownSlot=(OnlineManager.role==="host")?"host":"guest";
    const mkOpp=(p,slot)=>{ if(!p) return null; const r=onlineRender[slot]||p;
      return { x:r.x, y:r.y, facing:r.facing, hp:p.hp, maxHp:p.maxHp, dead:p.dead, inv:p.inv, charId:p.charId, score:p.score, fr:p.fr }; };
    const mkOwn=(p)=>{ if(!p) return null; const r=(onlinePredict&&!p.dead)?onlinePredict:p;
      return { x:r.x, y:r.y, facing:r.facing, hp:p.hp, maxHp:p.maxHp, dead:p.dead, inv:p.inv, charId:p.charId, score:p.score, fr:p.fr }; };
    const host = (ownSlot==="host") ? mkOwn(s.host) : mkOpp(s.host,"host");
    const guest = (ownSlot==="guest") ? mkOwn(s.guest) : mkOpp(s.guest,"guest");
    // 상대 총알은 권한값으로, 내 총알은 예측값으로 그린다(내 권한 총알은 가려 중복 방지)
    const oppSlot2=(ownSlot==="host")?"guest":"host";
    const oppB=onlineBulletsView.filter(b=>b.o===oppSlot2).map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    const myB=onlinePredictBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    return { timeLeft:s.timeLeft, host:host, guest:guest, bullets:oppB.concat(myB), zones:(s.zones||[]) };
  }
}
function drawOnlineBullet(b){
  // 무기 발사체 스프라이트(wid) 우선 — 진행 방향으로 회전. 없으면 원형 fallback.
  if(b.w && drawProjectileSprite(b.w, b.x, b.y, b.r, Math.atan2(b.vy||0,b.vx||0))) return;
  ctx.save();
  const color=b.c||"#ffe066";
  // v1.21 성능: 탄환 글로우를 그라데이션 → 반투명 원(6인 PVE 탄막에서 핫패스)
  ctx.globalAlpha=0.30; ctx.fillStyle=color; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.9,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.7,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}
// 내 캐릭터 식별 표시: 밝은 펄스 링 + 머리 위 화살표 + "나". (사람이 많아도 내 것이 보이게)
function drawSelfMarker(x,y,r){
  ctx.save();
  const pulse=0.6+0.4*Math.sin(uiTime*6);
  ctx.globalAlpha=pulse; ctx.strokeStyle="#bfffad"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,y,r+9,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=1;
  const ay=y-r-30, bob=Math.sin(uiTime*6)*2;
  ctx.fillStyle="#bfffad"; ctx.beginPath();
  ctx.moveTo(x-9,ay-9+bob); ctx.lineTo(x+9,ay-9+bob); ctx.lineTo(x,ay+1+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#173a17"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("나", x, ay-5+bob);
  ctx.restore();
}
function drawOnlineFighter(d, isMe){
  if(!d || d.dead) return;
  const ch=getCharacter(d.charId||"lumi");
  // 풀숲 가시성(상대가 풀숲에 멀리 있으면 숨김, 공격 직후엔 드러남)
  const vis=bushVisibility(d.x,d.y, isMe?"me":"enemy", isMe, _viewer, !!d.fr);
  if(vis.hidden){ drawBushRustle(d.x,d.y); return; }
  let alpha=vis.alpha;
  if(d.inv && Math.floor(uiTime*12)%2===0) alpha*=0.4;
  if(isMe) drawSelfMarker(d.x,d.y,22);
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y);
  if(!drawCharacterSprite(d.charId||"student_01", 22, d.facing||0, { moving:spriteMoving("O"+(isMe?"me":"op"),d.x,d.y), attacking:!!d.fr }))
    drawPlayerCharacter({ r:22, color:ch.color, subColor:ch.subColor, facing:d.facing||0 });
  ctx.restore();
  // 이름 + 체력바
  const w=54,h=8,bx=d.x-w/2,by=d.y-22-24;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="bottom";
  ctx.fillStyle=isMe?"#bfffad":"#dff1ff"; ctx.font="bold 13px 'Malgun Gothic',sans-serif";
  ctx.fillText(ch.name+(isMe?" (나)":""), d.x, by-2);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,4); ctx.fill();
  const ratio=clamp(d.hp/(d.maxHp||1),0,1);
  ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textBaseline="alphabetic"; ctx.fillText(Math.ceil(d.hp),d.x,by+h+12);
  if(d.inv){ ctx.fillStyle="#9fe8ff"; ctx.font="bold 10px 'Malgun Gothic',sans-serif"; ctx.fillText("무적",d.x,by-15); }
  ctx.restore();
}
function renderOnlineMatch(){

// 내 전투 상태(탄창/장전/궁극기) — 온라인 모든 모드 공통. host는 직접, guest는 state에서.
function myCombatStatus(){
  const sm=GAME_CONFIG.superCharge;
  const pack=(ch,ammo,reloading,sg,xc,lives)=>({ ammo:ammo, mag:(getWeapon(getWeaponForCharacter(ch.id)).magazineSize||GAME_CONFIG.magazineSize),
    reloading:reloading, sg:sg||0, superMax:sm, xc:Math.max(0,xc||0), lives:(lives===undefined||lives===null||lives<0)?null:lives,
    infAmmo:(ch.id==="student_01"),   // v1.21 럭키 패시브: HUD에 ∞ 표시
    superName:ch.ultName||ch.superName, specialName:ch.specialName||"", charName:ch.name, toolName:getWeapon(getWeaponForCharacter(ch.id)).name });
  if(isTeamOnline()){
    const slot=OnlineManager.mySlot;
    if(OnlineManager.role==="host"){ const f=tFighters[slot]; if(!f)return null;
      return pack(f.char, f.ammo, !!f.reloading, f.superGauge, f.specialCd, f.lives); }
    const st=OnlineManager.onlineState, p=st&&st.fighters&&st.fighters[slot]; if(!p)return null;
    const ch=getCharacter(tRosterCharId(slot));
    return pack(ch, p.am, !!p.rl, p.sg, p.xc, p.lv);
  } else {
    const role=OnlineManager.role, meta=OnlineManager.meta||{};
    if(role==="host"){ const f=onlineFighters.host; if(!f)return null;
      return pack(f.char, f.ammo, !!f.reloading, f.superGauge, f.specialCd); }
    const st=OnlineManager.onlineState, p=st&&st[role]; if(!p)return null;
    const cid=sanitizeCharacterId(p.charId||meta.characterGuest||"student_01"); const ch=getCharacter(cid);
    return pack(ch, p.am, !!p.rl, p.sg, p.xc);
  }
}
// 바닥 왼쪽에 탄창 + 궁극기 게이지 표시(온라인용)
function drawCombatStrip(){
  const s=myCombatStatus(); if(!s) return;
  ctx.save(); ctx.textBaseline="middle";
  const barX=24, barY=678, barW=190, barH=18, ready=s.sg>=s.superMax;
  // 내 캐릭터/도구 이름(상단) + PVE 개인 목숨
  ctx.textAlign="left"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#bfffad";
  const livesTxt=(s.lives!==null&&s.lives!==undefined)?("  ♥ 내 목숨 "+s.lives):"";
  ctx.fillText("나: "+(s.charName||"")+" · Z "+(s.toolName||"")+livesTxt, barX, 664);
  // C 궁극기 게이지
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(barX,barY,barW,barH,7); ctx.fill();
  const ratio=clamp(s.sg/s.superMax,0,1);
  if(ready){ const p=0.5+0.5*Math.sin(uiTime*8); ctx.fillStyle="rgba(255,225,80,"+(0.7+p*0.3)+")"; } else ctx.fillStyle="#5fa0ff";
  roundRect(barX,barY,barW*ratio,barH,7); ctx.fill();
  ctx.strokeStyle=ready?"#fff3b0":"#7088c0"; ctx.lineWidth=ready?3:2; roundRect(barX,barY,barW,barH,7); ctx.stroke();
  ctx.fillStyle=ready?"#ffe066":"#8893bb"; ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  ctx.fillText(ready?"C 사용 가능!":("C "+Math.floor(s.sg)+"%"), barX+barW+8, barY+barH/2);
  // X 특수기술 쿨타임
  const xX=barX+barW+92;
  ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  if(s.xc<=0){ const p=0.5+0.5*Math.sin(uiTime*6); ctx.fillStyle="rgba(160,255,160,"+(0.7+p*0.3)+")"; ctx.fillText("X 준비 완료", xX, barY+barH/2); }
  else { ctx.fillStyle="#8893bb"; ctx.fillText("X "+s.xc.toFixed(1)+"초", xX, barY+barH/2); }
  // Z 탄창
  ctx.font="bold 14px 'Malgun Gothic',sans-serif";
  if(s.infAmmo){ ctx.fillStyle="#ffe066"; ctx.fillText("Z 탄창 ∞", xX+92, barY+barH/2); }   // v1.21 럭키 무한 탄창
  else if(s.ammo===undefined){ /* 봇/관전 */ }
  else if(s.reloading){ const p=0.5+0.5*Math.sin(uiTime*10); ctx.fillStyle="rgba(255,210,77,"+(0.6+p*0.4)+")"; ctx.fillText("Z 장전 중…", xX+92, barY+barH/2); }
  else { ctx.fillStyle=(s.ammo<=2)?"#ff9a9a":"#cfeaff"; ctx.fillText("Z 탄창 "+s.ammo+"/"+s.mag+" (R)", xX+92, barY+barH/2); }
  ctx.restore();
}

   host가 모든 슬롯을 권한으로 계산하고, 각 클라이언트는 자기 slot input만 보낸다.

/* 살리는 모드 4종(PRD 8장): 혼자 도전(로컬 AI 대전으로 우선 제공) · 온라인 1대1 · 온라인 3대3 · 1~6인 협동 PVE.
   ruleType은 3v3 확장 여지(PRD 11.2 점령전): "tdm"(현재) → 추후 "capture" 추가 지점. */
const ONLINE_MODES = [
  { id:"online1v1", name:"온라인 1대1", desc:"친구와 1대1 대전 (90초)",      maxPlayers:2, teams:["blue","red"], modeType:"pvp", ruleType:"tdm", ready:true },
  { id:"online3v3", name:"온라인 3대3", desc:"3명씩 팀 대전 · 빈자리 AI",     maxPlayers:6, teams:["blue","red"], modeType:"pvp", ruleType:"tdm", ready:true },
  { id:"onlinePve6", name:"1~6인 협동 PVE", desc:"20스테이지 · 4구역 · 보스 4", maxPlayers:6, teams:["pve"], modeType:"pve", ruleType:"coop", ready:true }
];
function getOnlineMode(id){ for(const m of ONLINE_MODES){ if(m.id===id) return m; } return ONLINE_MODES[0]; }
function isTeamOnline(){ return OnlineManager.mode==="online3v3" || OnlineManager.mode==="onlinePve6"; }

const T_STATE_FPS = 15;   // 다인 모드 상태 동기화(초당) — payload가 크므로 1대1보다 낮게

function tSpawnPos(base, idx){ const off=[[0,0],[64,-54],[-64,54],[64,54],[-64,-54],[0,78]]; const o=off[idx%off.length]; return { x:base.x+o[0], y:base.y+o[1] }; }

function tMakeFighter(slot, team, characterId, weaponId, isBot, idx, map){
  const lo=sanitizeLoadout(characterId, weaponId);   // 네트워크/저장 값이 잘못돼도 학생 캐릭터 + 고정 무기로 교정
  const ch=getCharacter(lo.characterId);
  const base = (team==="red") ? map.enemySpawn : map.playerSpawn;
  const p=tSpawnPos(base, idx), sp=findClearSpawn(p.x,p.y,22);
  const maxHp=GAME_CONFIG.playerMaxHp*ch.hpMul;
  const f={ slot:slot, team:team, isBot:!!isBot, char:ch, weaponId:lo.weaponId,
    name:ch.name, color:ch.color, subColor:ch.subColor,
    x:sp.x, y:sp.y, spawnX:base.x, spawnY:base.y, r:22, facing: team==="red"?Math.PI:0,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul,
    cooldown:0, score:0, dead:false, respawnTimer:0, invincibleTimer:0, hitFlash:0,
    reloading:false, reloadTimer:0, superGauge:0, specialCd:0,
    ai:{ fireTimer:rand(0,0.5), strafeDir:1, strafeTimer:0, reTimer:0, stuckTimer:0, stuckDir:1 } };
  // 실제 플레이어만 탄창 사용(봇은 무한). 궁극기 게이지는 모두 보유(봇은 미사용).
  f.ammo = isBot?undefined:magSizeOf(f);
  // PRD 12.2 협동 PVE 개인 목숨(보통 난이도 5개 기준 — PVE 방에 난이도 선택이 생기면 7/5/3 연동)
  if(team==="pve") f.lives=PVE_LIVES_START;
  return f;
}
const PVE_LIVES_START=5;   // PRD 12.2: 쉬움7/보통5/어려움3 — 현재 보통 고정

/* ── PVE 개인 강화(PRD 13.2): 스테이지 종료 후 무작위 3개 중 1개 선택 ──
   현재 런에서만 유지(계정 저장 없음). 상한은 max 스택으로 강제(감소류는 PRD 상한과 일치).
   보스(5·10·15) 통과 후에는 '희귀 강화' = 같은 강화 2스택(상한 내) 1회 선택(PRD 15.6). */
const PVE_UPGRADES=[
  { id:"atk",    name:"공격 물약", desc:"Z 피해 +8%",              max:5 },
  { id:"aspd",   name:"빠른 손",   desc:"공격 간격 6% 감소",        max:5 },
  { id:"bspd",   name:"탄환 가속", desc:"탄속 +8%",                max:5 },
  { id:"range",  name:"멀리멀리",  desc:"사거리 +8%",              max:4 },
  { id:"hp",     name:"튼튼 물약", desc:"최대 체력 +10",           max:5 },
  { id:"def",    name:"방어 물약", desc:"받는 피해 6% 감소",        max:5 },
  { id:"mspd",   name:"빠른 발",   desc:"이동속도 +5%",            max:4 },
  { id:"reload", name:"빠른 장전", desc:"장전시간 10% 감소",        max:4 },
  { id:"xcd",    name:"반짝 시계", desc:"X 쿨타임 6% 감소",         max:5 },
  { id:"bsize",  name:"큰 탄환",   desc:"탄환 크기 +8%",           max:4 },
  { id:"regen",  name:"회복 별",   desc:"스테이지 시작 시 체력 15 회복", max:3 },
  // 대체 후보(PRD 19.4: 세 후보가 모두 상한일 때) — 무작위 풀에서는 제외(max 0)
  { id:"healnow", name:"체력 회복", desc:"즉시 최대 체력의 30% 회복", max:0 },
  { id:"ammonow", name:"탄창 완충", desc:"즉시 탄창을 가득 채움",     max:0 }
];
function pveUpgradeDef(id){ for(const u of PVE_UPGRADES){ if(u.id===id) return u; } return PVE_UPGRADES[0]; }
function upgStacks(f,id){ return (f && f.upg && f.upg[id])||0; }
// 강화 적용(호스트 판정). rare=2스택(상한 내). 적용된 강화 이름 반환.
function tPveApplyUpgrade(f, uid, rare){
  const def=pveUpgradeDef(uid);
  if(uid==="healnow"){ f.hp=Math.min(f.maxHp, f.hp+f.maxHp*0.3); return def.name; }
  if(uid==="ammonow"){ if(usesAmmo(f)){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } return def.name; }
  if(!f.upg) f.upg={};
  const n=rare?2:1;
  for(let i=0;i<n;i++){
    if((f.upg[uid]||0)>=def.max) break;
    f.upg[uid]=(f.upg[uid]||0)+1;
    if(uid==="hp"){ f.maxHp+=10; f.hp=Math.min(f.maxHp, f.hp+10); }
  }
  return def.name;
}
// 스테이지 클리어 → 활성 플레이어별 후보 3개 생성(상한 도달 강화 제외, 부족하면 대체 후보)
function tPveOfferUpgrades(rare){
  tPve.upg={};
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    const pool=PVE_UPGRADES.filter(u=>u.max>0 && upgStacks(f,u.id)<u.max).map(u=>u.id);
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
    const c=pool.slice(0,3);
    while(c.length<3) c.push(c.length%2===0?"healnow":"ammonow");
    tPve.upg[s]={ c:c, r:rare?1:0, picked:false, pi:-1 };
  }
}
// 전투 계산 훅(강화 없으면 1.0 — PVE 외 모드는 upg가 없어 영향 0)
function zCooldownOf(f,w){ let c=GAME_CONFIG.playerAttackCooldown*w.cooldownMul; const u=upgStacks(f,"aspd"); if(u) c*=Math.max(0.7,1-0.06*u); return c; }

function tBuildFighters(){
  const meta=OnlineManager.meta||{}, mode=getOnlineMode(meta.mode), map=getMap(tMapId);
  OBSTACLES=map.obstacles; BUSHES=map.bushes;
  tFighters={};
  const players=OnlineManager.players||{};
  let blueIdx=0, redIdx=0;
  // 1) 접속한 실제 플레이어
  for(let i=1;i<=mode.maxPlayers;i++){
    const slot="p"+i, p=players[slot];
    if(p && p.connected!==false){
      let team=p.team || (i%2===1?"blue":"red");
      const idx = team==="red"?redIdx++:blueIdx++;
      tFighters[slot]=tMakeFighter(slot, team, p.characterId, p.weaponId, false, idx, map);
    }
  }
  // 2) host만 빈자리를 AI 봇으로 채운다(3대3 PVP)
  if(OnlineManager.role==="host" && mode.modeType==="pvp"){
    for(let i=1;i<=mode.maxPlayers;i++){
      const slot="p"+i; if(tFighters[slot]) continue;
      const blueCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="blue").length;
      const redCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="red").length;
      let team=null;
      if(blueCount<3 && (blueCount<=redCount || redCount>=3)) team="blue";
      else if(redCount<3) team="red";
      if(!team) continue;
      const idx = team==="red"?redIdx++:blueIdx++;
      const botChar = STUDENT_CHARACTERS[i%STUDENT_CHARACTERS.length];   // 봇도 학생 6종만 + 고정 무기
      tFighters[slot]=tMakeFighter(slot, team, botChar.id, null, true, idx, map);
    }
  }
}

function tNearestEnemyFighter(f){
  let best=null, bd=Infinity;
  for(const slot in tFighters){ const o=tFighters[slot]; if(o.dead||o.team===f.team) continue;
    const d=dist(f.x,f.y,o.x,o.y); if(d<bd){bd=d; best=o;} }
  return best;
}

function tSendInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  tInputAcc+=dt;
  if(str!==tLastInputStr || tInputAcc>=1/T_INPUT_FPS){ tLastInputStr=str; tInputAcc=0; OnlineManager.writeInput(inp); }
}

function tUpdate(dt){
  const isPve=getOnlineMode(OnlineManager.mode).modeType==="pve";
  if(OnlineManager.role==="guest") tSendInput(dt);
  if(OnlineManager.role==="host"){ if(isPve) tPveUpdateHost(dt); else tUpdateHost(dt); }
  else tUpdateGuest(dt);
  updateEffects(dt);
}

function tUpdateHost(dt){
  const players=OnlineManager.players||{};
  for(const slot in tFighters){
    const f=tFighters[slot];
    // 끊긴 실제 플레이어는 AI 봇이 인계(가만히 멈춰 점수 공급원이 되지 않게)
    if(!f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(!p || p.connected===false) f.isBot=true; }
    if(f.isBot){ tBotUpdate(f, dt); continue; }
    let input;
    if(slot===OnlineManager.mySlot) input=readLocalInput();
    else { const p=players[slot]; const conn=p && p.connected!==false; input = (conn && p.input) ? p.input : emptyInput(); }
    tUpdateFighter(f, input, dt);
  }
  tUpdateBullets(dt);
  tickSkillZones(dt, envTeam());
  tickPowerupsHost(dt, Object.keys(tFighters).map(s=>tFighters[s]).filter(f=>!f.isBot));
  for(const slot in tFighters){ const f=tFighters[slot]; f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8)); }
  tTimeLeft-=dt;
  tWriteAcc+=dt; if(tWriteAcc>=1/T_STATE_FPS){ tWriteAcc=0; tHostWriteState(); }
  if(tTimeLeft<=0){ tTimeLeft=0; tHostEndMatch(); }
}

function tUpdateFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envTeam);
  // X/C: 눌림 순간(edge)만 발동(host 판정)
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envTeam());
  if(ult && !f._pUlt) castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // 빙결: 이동·공격 불가
  let mx=0,my=0; if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){ mx/=ml; my/=ml; moveEntity(f, mx*effSpeed(f)*dt, my*effSpeed(f)*dt); f.facing=Math.atan2(my,mx); }
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ tFire(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}

// 팀(3v3)/PVE 피해·env(host 판정). 아군/끊긴 대상엔 피해·둔화·블랙홀 없음.
// 방패 블록·수정 거북: 정면 각도 안에서 받는 피해 감소(내려찍기 후 노출 시간엔 해제) — PRD 15.3/15.5
function tDamageEnemy(e, id, dmg, killer){
  if(e.frontGuard && killer && !(e.guardDownT>0)){
    const toAtk=Math.atan2(killer.y-e.y, killer.x-e.x);
    let diff=Math.abs(toAtk-e.facing); while(diff>Math.PI) diff=Math.abs(diff-Math.PI*2);
    if(diff<=deg2rad(e.frontGuard.deg)/2) dmg*=(1-e.frontGuard.reduce);
  }
  e.hp-=dmg;
  if(e.hp<=0){ if(killer) killer.score+=e.score; delete tEnemies[id]; }
}
// ── env 어댑터: 3v3(PVP)·협동 PVE 공용 ──
function envTeam(){
  const isPve=getOnlineMode(OnlineManager.mode).modeType==="pve";
  return {
    foes(f){
      const out=[];
      if(isPve){ for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue; out.push({e:e,key:id,isBoss:!!e.isBoss,isFighter:false,eid:id}); } }
      else { for(const slot in tFighters){ const o=tFighters[slot]; if(o.team===f.team||o.dead||o.invincibleTimer>0||o.inactive) continue; out.push({e:o,key:slot,isBoss:false,isFighter:true}); } }
      return out;
    },
    allies(f){
      const out=[];
      for(const slot in tFighters){ const o=tFighters[slot];
        if(o.dead||o.inactive) continue;
        if(isPve || o.team===f.team) out.push(o); }        // PVE=협동 전원, 3v3=자기 팀만
      return out;
    },
    damage(f,o,dmg){
      if(o.isFighter) tApplyDamage(o.e, dmg, f.team, f.slot, true);
      else tDamageEnemy(o.e, o.eid, dmg, f);
      return dmg;
    },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.team=f.team; b.owner=f.slot; tBullets.push(b); }
  };
}

function tBotUpdate(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f);   // 봇도 함정 둔화 적용(일관성)
  const t=tNearestEnemyFighter(f);
  if(t){
    const dx=t.x-f.x, dy=t.y-f.y, d=Math.hypot(dx,dy)||1;
    let mvx=0,mvy=0;
    if(d>320){ mvx=dx/d; mvy=dy/d; }
    else if(d<200){ mvx=-dx/d; mvy=-dy/d; }
    else { f.ai.strafeTimer-=dt; if(f.ai.strafeTimer<=0){ f.ai.strafeDir=Math.random()<0.5?1:-1; f.ai.strafeTimer=rand(0.5,1.2); } mvx=-dy/d*f.ai.strafeDir; mvy=dx/d*f.ai.strafeDir; }
    if(f.ai.stuckTimer>0){ f.ai.stuckTimer-=dt; mvx=-dy/d*f.ai.stuckDir; mvy=dx/d*f.ai.stuckDir; } // 벽끼임 탈출: 옆으로 우회
    const ml=Math.hypot(mvx,mvy);
    if(ml>0){ mvx/=ml; mvy/=ml; const step=effSpeed(f)*0.9*dt, ox=f.x, oy=f.y;
      moveEntity(f, mvx*step, mvy*step);
      if(f.ai.stuckTimer<=0 && Math.hypot(f.x-ox,f.y-oy) < step*0.3){ f.ai.stuckDir=Math.random()<0.5?1:-1; f.ai.stuckTimer=rand(0.4,0.8); } }
    f.facing=Math.atan2(dy,dx);
    f.cooldown-=dt; f.ai.reTimer-=dt;
    if(d<GAME_CONFIG.playerRange && f.cooldown<=0 && f.ai.reTimer<=0 && hasLineOfSight(f.x,f.y,t.x,t.y)){
      tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*1.3; f.ai.reTimer=rand(0.1,0.4);
    }
    // 봇도 X/C 사용(3v3 빈자리 AI): 사람보다 낮은 빈도로 — 적이 사거리 안일 때만
    const wRange=GAME_CONFIG.playerRange*getWeapon(f.weaponId).rangeMul;
    if(f.specialCd<=0 && d<Math.max(wRange,260) && Math.random()<dt*0.5) castSpecialFor(f, envTeam());
    if((f.superGauge||0)>=GAME_CONFIG.superCharge && d<wRange && Math.random()<dt*0.7)
      castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  }
}

function tFire(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // 풀숲: 공격하면 잠시 드러남
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6;
    const b={ x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*spec.speed, vy:Math.sin(a)*spec.speed,
      r:spec.radius, damage:spec.damage, team:f.team, owner:f.slot, color:spec.color, alive:true, traveled:0,
      maxRange:spec.range, aid:aid, wid:spec.wid, wref:spec.wref, age:0,
      snipe:spec.snipe||0, stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    tBullets.push(b);
  }
}

// 3v3 탄환(PVP): 부메랑 왕복·무기 효과·attackId 게이지·통통비행기 반사 지원
function tUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=tFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      for(const slot in tFighters){ const t=tFighters[slot];
        if(t.team===b.team || t.dead || t.invincibleTimer>0 || t.inactive) continue;
        if(dist(b.x,b.y,t.x,t.y) < b.r+t.r){
          if(b.boomerang){
            const hm=(b.phase==="out")?b.hitO:b.hitB;
            if(hm[slot]) continue;
            hm[slot]=true;
            tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color);
            continue;                                     // 부메랑은 관통(복귀 타격)
          }
          tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
          if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
          spawnHitFx(b.x,b.y,b.wid,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}

function tApplyDamage(target, dmg, fromTeam, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0 || target.team===fromTeam) return;
  dmg=incomingDamage(target, dmg);                        // 방패/질주 감소(최소 1)
  target.hp-=dmg; target.hitFlash=0.15;
  const attacker=tFighters[fromSlot];
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    if(TEAM_COLOR[fromTeam]!==undefined) tTeamScores[fromTeam]=(tTeamScores[fromTeam]||0)+1;
    const killer=tFighters[fromSlot]; if(killer) killer.score+=1;
  }
}

function tRespawn(f){
  f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;
  const pos=findClearSpawn(f.spawnX,f.spawnY,f.r);
  f.x=pos.x; f.y=pos.y; f.invincibleTimer=GAME_CONFIG.invincibleTime;
}

function tPackFighter(f){
  // 매 틱 전송 최소화: 변하는 값만 보낸다.
  // 정적인 값(charId/team/slot/maxHp)은 players 로스터로 게스트가 역산한다(렉 최적화).
  // am/rl/sg는 내 HUD(탄창/장전/궁극기)용 작은 숫자만 추가.
  return { x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp),
    facing:Math.round(f.facing*100)/100, dead:!!f.dead, inv:f.invincibleTimer>0,
    am:f.ammo, rl:f.reloading?1:0, sg:Math.round(f.superGauge||0), fr:f.fireRevealTimer>0?1:0,
    xc:Math.round(Math.max(0,f.specialCd||0)*10)/10,     // X 쿨타임(HUD용)
    lv:(f.lives===undefined?-1:f.lives) };               // PVE 개인 목숨(-1=해당 없음/3v3)
}
// 게스트가 정적 정보를 로스터(OnlineManager.players)에서 역산하는 도우미
function tRosterCharId(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return sanitizeCharacterId((p&&p.characterId)||"student_01"); }
function tRosterTeam(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return (p&&p.team)||"blue"; }
function tRosterMaxHp(slot){ return GAME_CONFIG.playerMaxHp*getCharacter(tRosterCharId(slot)).hpMul; }
function getEnemyDef(type){ return PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt; }
function tHostWriteState(){
  if(!OnlineManager.roomRef) return;   // v1.21 성능: 혼자 도전(오프라인)에서는 패킷 직렬화 자체를 생략
  const fighters={};
  for(const slot in tFighters) fighters[slot]=tPackFighter(tFighters[slot]);
  const bl=[];
  // 게스트 렌더에 필요한 것만(x,y,r,c,vx,vy,w=무기 스프라이트 id). owner/team은 게스트가 안 써서 제외(렉 최적화).
  for(const b of tBullets) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy), w:b.wid||null });
  const st={ timeLeft:Math.max(0,Math.round(tTimeLeft)), teamScores:tTeamScores, fighters:fighters, bullets:bl,
    powerups:POWERUPS.map(p=>({x:Math.round(p.x),y:Math.round(p.y),t:powerupPacketT(p),id:p.id})), zones:packZones() };
  // PVE면 적/스테이지 정보도 함께 보낸다. color/r/boss는 type으로 게스트가 역산(전송 제외).
  if(getOnlineMode(OnlineManager.mode).modeType==="pve"){
    const en={}; for(const id in tEnemies){ const e=tEnemies[id]; en[id]={ x:Math.round(e.x), y:Math.round(e.y), hp:Math.round(e.hp), maxHp:Math.round(e.maxHp), facing:Math.round(e.facing*100)/100, type:e.type, dead:!!e.dead }; }
    st.enemies=en;
    st.structs=tPackStructs();                                       // v1.22 구조물(숫자만, ≤6개)
    st.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length, mapId:tMapId,
      dfT:Math.max(0,Math.ceil(tPve.defendT||0)), gates:tGatesAlive() };
    if(tPve.upg){ const ug={}; for(const s in tPve.upg){ const o=tPve.upg[s]; ug[s]={c:o.c, r:o.r, p:o.picked?1:0, pi:o.pi}; } st.pve.upg=ug; }   // 강화 후보(문자 id 3개·숫자만)
  }
  OnlineManager.writeHostState(st);
}
function tHostEndMatch(){
  if(OnlineManager.role!=="host") return;
  let winner="draw";
  if(tTeamScores.blue>tTeamScores.red) winner="blue"; else if(tTeamScores.red>tTeamScores.blue) winner="red";
  tWinner=winner;

}

function tMyTeam(){
  const s=OnlineManager.mySlot;
  if(OnlineManager.role==="host" && tFighters[s]) return tFighters[s].team;
  const st=OnlineManager.onlineState;
  if(st && st.fighters && st.fighters[s]) return st.fighters[s].team;

}
function tComputeResultText(){
  let w=tWinner; if(!w && OnlineManager.meta) w=OnlineManager.meta.winner;

function tUpdateGuest(dt){
  const s=OnlineManager.onlineState; if(!s || !s.fighters) return;
  // PVE: host가 보낸 현재 스테이지 맵으로 장애물/풀숲을 맞춘다(보이는 벽=실제 충돌)
  if(s.pve && s.pve.mapId && s.pve.mapId!==tMapId){ tMapId=s.pve.mapId; const m=getMap(tMapId); OBSTACLES=m.obstacles.slice(); BUSHES=m.bushes; tGuestStructSig=""; }
  if(s.structs) tGuestApplyStructs(s.structs);                       // v1.22: 구조물 상태+충돌 동기화
  if(s!==tLastStateRef){ tLastStateRef=s; tBulletsView=(s.bullets||[]).map(b=>({ x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,r:b.r,c:b.c,w:b.w||null })); }
  for(const b of tBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const myslot=OnlineManager.mySlot, k=Math.min(1,dt*18);
  for(const slot in s.fighters){
    const p=s.fighters[slot];
    if(slot===myslot){
      if(!tPredict || p.dead){ const ch=getCharacter(p.charId||tRosterCharId(slot)); tPredict={ x:p.x,y:p.y,facing:p.facing||0,r:22,moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove }; }
      else { const inp=readLocalInput(); let mx=0,my=0; if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1; const ml=Math.hypot(mx,my);
        if(ml>0){ mx/=ml; my/=ml; moveEntity(tPredict, mx*tPredict.moveSpeed*dt, my*tPredict.moveSpeed*dt); tPredict.facing=Math.atan2(my,mx); }
        if(Math.hypot(p.x-tPredict.x,p.y-tPredict.y)>70){ tPredict.x=p.x; tPredict.y=p.y; } }
    } else {
      if(!tRenderFighters[slot] || p.dead) tRenderFighters[slot]={ x:p.x,y:p.y,facing:p.facing||0 };
      else { tRenderFighters[slot].x+=(p.x-tRenderFighters[slot].x)*k; tRenderFighters[slot].y+=(p.y-tRenderFighters[slot].y)*k;
        tRenderFighters[slot].facing=lerpAngle(tRenderFighters[slot].facing, p.facing||0, k); }
    }
  }
}

function tGetDrawData(){
  const out={ fighters:[], bullets:[], teamScores:{blue:0,red:0}, timeLeft:0, waiting:false };
  if(OnlineManager.role==="host"){
    for(const slot in tFighters){ const f=tFighters[slot];
      out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:f.team,slot:slot,isMe:slot===OnlineManager.mySlot,fr:f.fireRevealTimer>0?1:0 }); }
    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color,w:b.wid||null,vx:b.vx,vy:b.vy }));
    out.teamScores=tTeamScores; out.timeLeft=Math.max(0,Math.ceil(tTimeLeft));
    out.zones=packZones();
  } else {
    const s=OnlineManager.onlineState;
    if(!s || !s.fighters){ out.waiting=true; out.timeLeft=GAME_CONFIG.gameTime; return out; }
    const myslot=OnlineManager.mySlot;
    for(const slot in s.fighters){ const p=s.fighters[slot]; let rx=p.x,ry=p.y,rf=p.facing;
      if(slot===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[slot] && !p.dead){ rx=tRenderFighters[slot].x; ry=tRenderFighters[slot].y; rf=tRenderFighters[slot].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||tRosterMaxHp(slot),dead:p.dead,inv:p.inv,charId:p.charId||tRosterCharId(slot),team:p.team||tRosterTeam(slot),slot:slot,isMe:slot===myslot,fr:p.fr }); }
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    out.teamScores=s.teamScores||{blue:0,red:0}; out.timeLeft=s.timeLeft;
    out.zones=(s.zones||[]);
  }
  return out;
}

function tDrawFighter(d){

  const ch=getCharacter(d.charId||"lumi");
  const vis=bushVisibility(d.x,d.y, d.team, d.isMe, _viewer, !!d.fr);
  if(vis.hidden){ drawBushRustle(d.x,d.y); return; }
  let alpha=vis.alpha; if(d.inv && Math.floor(uiTime*12)%2===0) alpha*=0.4;
  if(d.isMe) drawSelfMarker(d.x,d.y,22);
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y);

  ctx.strokeStyle=TEAM_COLOR[d.team]||"#fff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,28,0,Math.PI*2); ctx.stroke();
  if(!drawCharacterSprite(d.charId||"student_01", 22, d.facing||0, { moving:spriteMoving("T"+d.slot,d.x,d.y), attacking:!!d.fr }))
    drawPlayerCharacter({ r:22, color:ch.color, subColor:ch.subColor, facing:d.facing||0 });
  ctx.restore();
  const w=54,h=8,bx=d.x-w/2,by=d.y-22-24;

  ctx.fillStyle=d.isMe?"#bfffad":(TEAM_COLOR[d.team]||"#dff1ff"); ctx.font="bold 12px 'Malgun Gothic',sans-serif";

  ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.restore();
}

function tActivePlayerCount(){
  // 봇·끊긴(inactive)·연결 끊긴 실제 플레이어는 제외. host 자신(isMe)은 항상 active.
  const players=OnlineManager.players||{}; let n=0;
  for(const s in tFighters){ const f=tFighters[s];
    if(f.isBot) continue;
    if(f.inactive) continue;
    const isMe=s===OnlineManager.mySlot, p=players[s];
    if(!isMe && !(p && p.connected!==false)) continue;
    n++;
  }
  return Math.max(1,n);
}

function tSpawnEnemy(type, hpMul, map, dmgMul, sx, sy, gateId){
  const def=PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt;
  const ex=clamp((sx!==undefined? sx+rand(-30,30) : map.enemySpawn.x+rand(-170,170)), ARENA.x+def.r, ARENA.x+ARENA.w-def.r);
  const ey=clamp((sy!==undefined? sy+rand(-10,40) : map.enemySpawn.y+rand(-90,180)), ARENA.y+def.r, ARENA.y+ARENA.h-def.r);
  const pos=findClearSpawn(ex,ey,def.r);
  const id="e"+(++tEnemyId), hp=def.hp*hpMul;
  const e={ id:id, type:type, x:pos.x, y:pos.y, r:def.r, hp:hp, maxHp:hp, speed:def.speed*TEMPO.enemyMove, dmg:def.dmg*(dmgMul||1),
    color:def.color, ranged:!!def.ranged, range:def.range||0, fireCd:def.fireCd||1.2, fireTimer:rand(0.2,1.2),
    bulletSpeed:(def.bulletSpeed||360)*TEMPO.enemyBullet, contactCd:def.contactCd||0.8, contactTimer:0, threeWay:!!def.threeWay,
    facing:Math.PI, dead:false, score:def.score||1,
    isBoss:(type==="boss"||type==="miniBoss"||!!def.isBossType) };
  // PRD 15.3/15.5 특수 능력 복사(코드 이펙트 우선 — 에셋 없이 도형/파티클로 검증)
  if(def.dash) e.dash={...def.dash, timer:rand(1,def.dash.cd), state:"idle", warnT:0, dirX:0, dirY:0, stunT:0};
  if(def.ghost) e.ghost={cycle:0};
  if(def.healer) e.healer={...def.healer, timer:def.healer.cd};
  if(def.frontGuard) e.frontGuard=def.frontGuard;
  if(def.slowShot) e.slowShot=def.slowShot;
  if(def.knockResist) e.knockImmuneTimer=1e9;                 // 쿠션 블록: 밀치기 거의 무시
  if(def.dash||def.frontGuard||def.slowShot) e.eliteResist=true;   // 정예: 빙결 50%·블랙홀 70%(PRD 15.4)
  if(def.isBossType){ e.fan=def.fan; e.ringShot=def.ringShot; e.bounceShot=def.bounceShot;
    e.slam=def.slam?{...def.slam, timer:def.slam.cd*0.6, warnT:0}:null;
    e.summon=def.summon?{...def.summon, timer:def.summon.cd||6, fired:[]}:null;
    e.phase2=def.phase2; e.enrage=def.enrage; e.baseFireCd=e.fireCd; e.baseSpeed=e.speed; }
  if(gateId) e.gate=gateId;                                    // v1.22 봉쇄: 소환한 문 태그(문당 동시 상한)
  // v1.23 방어전: 잡몹 1/3만 수정 직행 + 초반 10초는 직행 없음(코덱스 회차8: 50%+75초 조합은 입문 스테이지에 과함 — 파티 시뮬 s4 실패 2/3 재현 후 보강), 보스는 제외
  const _stg=PVE_STAGES[tPve.stageIndex];
  if(_stg && _stg.objective==="defend" && !e.isBoss && tEnemyId%3===0
     && tPve.defendT <= (_stg.defendTime||75)-10) e.focusStructure=true;
  tEnemies[id]=e;
}
/* ── v1.22 구조물 시스템(설계서 1.3): host 권위 · 충돌은 OBSTACLES 사본에 추가/제거 ──
   core=방어 수정(몬스터가 공격, HP 500+120×(N-1)) · gate=봉쇄 문(플레이어가 파괴, 180) · wall=쿠션 벽(120) */
let tStructures={};
const STRUCT_DEFS={
  core:{ w:90, h:90, hp:500, name:"방어 수정" },
  gate:{ w:70, h:90, hp:180, name:"몬스터 문" },
  wall:{ w:70, h:70, hp:120, name:"쿠션 벽" }
};
function tPveSetupStructures(){
  const stage=PVE_STAGES[tPve.stageIndex];
  tStructures={};
  OBSTACLES=getMap(tMapId).obstacles.slice();          // 원본 맵 배열 보존(사본에만 구조물 충돌 추가)
  BUSHES=getMap(tMapId).bushes;
  tPve.defendT = stage.objective==="defend" ? (stage.defendTime||75) : 0;
  tPve.finalSpawned=false;
  if(!stage.structures) return;
  const nP=tActivePlayerCount();
  let gi=0, wi=0;
  for(const sd of stage.structures){
    const def=STRUCT_DEFS[sd.kind];
    const id = sd.kind==="gate" ? ("gate"+(++gi)) : (sd.kind==="wall" ? ("wall"+(++wi)) : "core");
    let hp=def.hp; if(sd.kind==="core") hp+=120*(nP-1);          // PRD 19.1 인원 스케일
    else if(sd.kind==="gate") hp+=50*(nP-1);                     // v1.23: 문도 인원 배율(코덱스 회차8 — 6인 문 포커싱 대비, cap 4 유지)
    tStructures[id]={ id:id, kind:sd.kind, x:sd.x, y:sd.y, w:def.w, h:def.h, hp:hp, maxHp:hp, alive:true, spawnT:1.5+gi };
    OBSTACLES.push({ x:sd.x-def.w/2, y:sd.y-def.h/2, w:def.w, h:def.h, kind:"structure", sid:id });
  }
}
function tStructApplyDamage(st, dmg){
  if(!st || !st.alive) return;
  st.hp-=dmg;
  if(st.hp<=0){ st.hp=0; st.alive=false;
    OBSTACLES=OBSTACLES.filter(o=>o.sid!==st.id);       // 충돌 제거(이동·시야·탄이 자동 반영)
    spawnSuperWave(st.x, st.y, 70);
  }
}
// 탄 → 구조물: 플레이어 탄은 문/벽만, 몬스터 탄은 수정만(그 외는 그냥 벽 취급)
function tStructBulletHit(wref, b){
  const st=tStructures[wref.sid]; if(!st || !st.alive) return;
  if(b.team==="pve"){ if(st.kind!=="core") tStructApplyDamage(st, b.damage); }
  else if(st.kind==="core") tStructApplyDamage(st, b.damage);
}
// 방어전: focusStructure 몬스터는 수정 직행(pseudo target)
function tStructFocus(e){
  if(!e.focusStructure) return null;
  const st=tStructures.core; if(!st || !st.alive) return null;
  return { x:st.x, y:st.y, r:Math.max(st.w,st.h)/2, structure:st };
}
function tGatesAlive(){ let c=0; for(const id in tStructures){ const s=tStructures[id]; if(s.kind==="gate"&&s.alive) c++; } return c; }
// 봉쇄: 살아있는 문이 주기적으로 소환(문당 동시 cap, 전체 40 상한)
function tPveTickStructures(dt){
  const stage=PVE_STAGES[tPve.stageIndex];
  if(stage.objective!=="blockade") return;
  const gs=stage.gateSpawn||{enemies:[{type:"soft_jelly",count:2}],interval:6,cap:4};
  const map=getMap(tMapId), nHpMul=1+0.12*(tActivePlayerCount()-1);
  for(const id in tStructures){ const g=tStructures[id];
    if(g.kind!=="gate"||!g.alive) continue;
    g.spawnT-=dt;
    if(g.spawnT<=0){ g.spawnT=gs.interval;
      let mine=0; for(const eid in tEnemies){ if(tEnemies[eid].gate===id) mine++; }
      for(const grp of gs.enemies){ for(let i=0;i<grp.count;i++){
        if(mine>=gs.cap || Object.keys(tEnemies).length>=40) break;
        tSpawnEnemy(grp.type, nHpMul, map, 1, g.x, g.y+g.h*0.8, id); mine++;
      } }
    }
  }
}
function tPackStructs(){
  const order={core:0,gate:1,wall:2}, out=[];
  for(const id in tStructures){ const s=tStructures[id];
    out.push({k:order[s.kind], x:s.x, y:s.y, hp:Math.max(0,Math.round(s.hp)), mh:s.maxHp}); }
  return out;
}
// 게스트: 패킷으로 구조물 상태 반영(생존 수가 바뀌면 충돌도 재구성)
let tGuestStructSig="";
function tGuestApplyStructs(list){
  const kinds=["core","gate","wall"];
  tStructures={}; let alive=0;
  for(let i=0;i<list.length;i++){ const o=list[i], kind=kinds[o.k]||"wall", def=STRUCT_DEFS[kind];
    const id=kind+"_"+i;
    tStructures[id]={ id:id, kind:kind, x:o.x, y:o.y, w:def.w, h:def.h, hp:o.hp, maxHp:o.mh, alive:o.hp>0 };
    if(o.hp>0) alive++; }
  const sig=tMapId+"|"+list.length+"|"+alive;
  if(sig!==tGuestStructSig){ tGuestStructSig=sig;
    OBSTACLES=getMap(tMapId).obstacles.slice();
    for(const id in tStructures){ const st=tStructures[id];
      if(st.alive) OBSTACLES.push({ x:st.x-st.w/2, y:st.y-st.h/2, w:st.w, h:st.h, kind:"structure", sid:id }); }
  }
}

function tPveStartWave(){
  const stage=PVE_STAGES[tPve.stageIndex], wave=stage.waves[tPve.waveIndex];
  // v1.22 봉쇄: 문이 살아있는 동안은 일반 웨이브를 깔지 않음(문 전파괴 후 최종 웨이브만)
  if(stage.objective==="blockade" && tGatesAlive()>0 && !tPve.finalSpawned){
    tPve.phase="wave"; tPve.enemiesRemaining=Object.keys(tEnemies).length; return;
  }
  // PRD 19장 스케일링: 인원(N) + 스테이지 상승 배율. 보스는 stageHpMul 미적용·인원 보스 배율만(15.6/24.1).
  const n=tActivePlayerCount(), st=tPve.stageIndex+1, map=getMap(tMapId);
  const stageHpMul=1+0.025*(st-1), stageDmgMul=1+0.015*(st-1);
  const nHpMul=1+0.12*(n-1), nCntMul=1+0.35*(n-1), nBossMul=1+0.60*(n-1);
  for(const grp of wave.enemies){
    const def=PVE_ENEMY_TYPES[grp.type]||{};
    const isBossGrp=!!def.isBossType || grp.type==="boss";
    const cnt=isBossGrp ? grp.count : Math.max(1,Math.round(grp.count*nCntMul));
    const hpMul=isBossGrp ? nBossMul : nHpMul*stageHpMul;
    const dmgMul=isBossGrp ? 1 : stageDmgMul;                 // 보스 피해는 인원·스테이지로 증가 없음
    for(let i=0;i<cnt;i++){ if(Object.keys(tEnemies).length>=40) break; tSpawnEnemy(grp.type, hpMul, map, dmgMul); }
  }
  tPve.phase="wave"; tPve.enemiesRemaining=Object.keys(tEnemies).length;
}
function tNearestPlayer(e){ let best=null,bd=Infinity; for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue; const d=dist(e.x,e.y,f.x,f.y); if(d<bd){bd=d;best=f;} } return best; }

function tPveUpdateHost(dt){
  const players=OnlineManager.players||{};
  for(const slot in tFighters){ const f=tFighters[slot];
    // 끊긴 플레이어는 inactive 처리(적 타겟/피해/접촉/팀라이프 대상에서 제외)
    const isMe=slot===OnlineManager.mySlot, p=players[slot];
    f.inactive = !isMe && !(p && p.connected!==false);
    if(f.inactive) continue;
    let input = isMe ? readLocalInput() : ((p&&p.input)?p.input:emptyInput());
    tPveUpdatePlayer(f, input, dt);
    f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8));
  }
  for(const id in tEnemies) tEnemyUpdate(tEnemies[id], dt);
  tPveTickStructures(dt);                                   // v1.22 봉쇄: 살아있는 문이 주기 소환
  tResolveCollisions();                                     // 몸싸움: 몹-플레이어/몹-몹 겹침 방지(근접 사격 가능)
  tPveUpdateBullets(dt);
  tickSkillZones(dt, envTeam());
  tickPowerupsHost(dt, Object.keys(tFighters).map(s=>tFighters[s]).filter(f=>!f.inactive));
  tPveProgress(dt);
  tWriteAcc+=dt; if(tWriteAcc>=1/T_STATE_FPS){ tWriteAcc=0; tHostWriteState(); }
}
function tPveUpdatePlayer(f,input,dt){
  // 강화 선택(1/2/3) — 죽은/관전 플레이어도 선택 가능(host 판정, 1회만)
  if(tPve.phase==="stageclear" && tPve.upg && tPve.upg[f.slot] && !tPve.upg[f.slot].picked){
    const o=tPve.upg[f.slot], pk=(input.pick!==undefined && input.pick>=0)?input.pick:-1;
    if(pk>=0 && pk<3){ o.picked=true; o.pi=pk; tPveApplyUpgrade(f, o.c[pk], o.r===1); }
  }
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0 && (f.lives||0)>0) tRespawn(f); return; }   // 목숨 0 → 관전(체크포인트 복귀 대기)
  if(f.hitFlash>0)f.hitFlash-=dt; if(f.invincibleTimer>0)f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envTeam);
  // X/C: 눌림 순간(edge)만 발동(host 판정)
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envTeam());
  if(ult && !f._pUlt) castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // 빙결: 이동·공격 불가
  let mx=0,my=0; if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my); if(ml>0){mx/=ml;my/=ml; moveEntity(f,mx*effSpeed(f)*dt,my*effSpeed(f)*dt); f.facing=Math.atan2(my,mx);}
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ tFire(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}
function tHurtPlayer(f,dmg){
  if(f.dead||f.inactive||f.invincibleTimer>0) return;
  dmg=incomingDamage(f,dmg);                               // 방패/질주 감소(최소 1)
  f.hp-=dmg; f.hitFlash=0.15;
  if(f.hp<=0){ f.hp=0; f.dead=true; f.respawnTimer=4;
    f.lives=Math.max(0,(f.lives||0)-1);                    // PRD 12.2: 자기 목숨만 소비(다른 학생 목숨과 무관)
    tPve.teamLives=tPveLivesTotal(); }                     // 표시용 합계 갱신(하위호환 필드)
}
// 활성 실제 플레이어들의 남은 목숨 합계(HUD/패킷 표시용)
function tPveLivesTotal(){
  let n=0; for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue; n+=(f.lives||0); }
  return n;
}
/* 몸싸움(충돌 분리): 몹이 플레이어 몸 속으로 겹쳐 들어오지 않게 한다.
   겹치면 총구(몸 밖 28px)보다 안쪽이라 근접 사격이 불가능해지는 문제 해결.
   - 적↔플레이어: 적을 밖으로 밀어냄(플레이어 이동은 안 막아 포위 답답함 방지)
   - 적↔적: 절반씩 밀어 무리 뭉침 완화(보스는 밀리지 않음) */
function tResolveCollisions(){
  const ids=Object.keys(tEnemies);
  for(const id of ids){ const e=tEnemies[id]; if(!e||e.dead) continue;
    for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue;
      let dx=e.x-f.x, dy=e.y-f.y; let d=Math.hypot(dx,dy);
      const min=e.r+f.r-2;
      if(d<min){
        let push=min-d;
        if(d<1){ const a=Math.random()*Math.PI*2; dx=Math.cos(a); dy=Math.sin(a); d=1; push=min; }   // 완전 겹침: 임의 방향으로 전부 밀어냄
        moveEntity(e, dx/d*push, dy/d*push); }
    }
  }
  for(let i=0;i<ids.length;i++){ const a=tEnemies[ids[i]]; if(!a||a.dead) continue;
    for(let j=i+1;j<ids.length;j++){ const b=tEnemies[ids[j]]; if(!b||b.dead) continue;
      const dx=b.x-a.x, dy=b.y-a.y; let d=Math.hypot(dx,dy);
      const min=(a.r+b.r)*0.85;
      if(d<min){ if(d<1) d=1; const push=(min-d)/2;
        if(!a.isBoss) moveEntity(a, -dx/d*push, -dy/d*push);
        if(!b.isBoss) moveEntity(b, dx/d*push, dy/d*push); }
    }
  }
}
// 몹 이동 공통: 벽에 막혀 제자리걸음이면 0.55초 수직 우회(지형 바보 방지)
function tEnemyMove(e, nx, ny, spd, dt){
  if(e.detourT>0){ e.detourT-=dt;
    moveEntity(e, -ny*e.detourDir*spd*dt, nx*e.detourDir*spd*dt);
    return;
  }
  const ox=e.x, oy=e.y;
  moveEntity(e, nx*spd*dt, ny*spd*dt);
  if(spd>1 && Math.hypot(e.x-ox,e.y-oy) < spd*dt*0.35){
    if(e.detourDir===undefined) e.detourDir=(Math.random()<0.5?1:-1);
    else e.detourDir*=-1;                                   // 반복 끼임 → 반대쪽 우회
    e.detourT=0.55;
  }
}
// 접촉(몸통 박치기) 피해 전용 — PRD 15.4: 여러 몹이 겹쳐 붙어도 대상별 0.2초 면역으로
// 접촉 피해가 한꺼번에 중첩되지 않는다(무리에게 둘러싸여도 초당 최대 5회).
function tContactHurt(f,dmg){
  if(f.contactImmuneT>0) return false;
  tHurtPlayer(f,dmg);
  f.contactImmuneT=0.2;
  return true;
}
function tEnemyUpdate(e,dt){
  if(e.dead) return;
  // 상태효과(빙결/둔화/밀치기 면역) — PVE 몬스터도 파이터와 같은 규칙
  if(e.knockImmuneTimer>0 && e.knockImmuneTimer<1e8) e.knockImmuneTimer-=dt;
  if(e.wSlowTimer>0) e.wSlowTimer-=dt;
  if(e.freezeTimer>0){ e.freezeTimer-=dt; return; }        // 빙결: 이동·공격 불가
  let spdMul=(e.wSlowTimer>0)?(1-(e.wSlowPct||0)):1;
  // 보스 2페이즈/분노(PRD 15.5 간이): HP 비율로 공격 간격·속도 조정
  if(e.baseFireCd){
    let cdMul=1, spMul=1;
    if(e.enrage && e.hp<=e.maxHp*e.enrage.at){ cdMul*=e.enrage.cdMul||1; spMul*=e.enrage.speedMul||1; }
    e.fireCd=e.baseFireCd*cdMul; e.speed=e.baseSpeed*spMul;
  }
  // 별벌레/보스 돌진: 0.7초 직선 예고 후 대시, 벽 충돌 시 기절(PRD 15.3)
  const dashDef = e.dash || (e.phase2 && e.hp<=e.maxHp*e.phase2.at ? e.phase2.dash : null);
  if(dashDef){
    if(e.dashStun>0){ e.dashStun-=dt; return; }              // 벽 충돌 기절
    if(e.dashState==="warn"){
      e.dashWarnT-=dt;
      if(e.dashWarnT<=0){ e.dashState="go"; e.dashLeft=dashDef.dist; }
      return;                                                 // 예고 중 정지(플레이어가 읽고 피함)
    }
    if(e.dashState==="go"){
      const step=Math.min(dashDef.speed*TEMPO.enemyDash*dt, e.dashLeft), ox=e.x, oy=e.y;
      moveEntity(e, e.dashDirX*step, e.dashDirY*step);
      e.dashLeft-=step;
      if(Math.hypot(e.x-ox,e.y-oy)<step*0.4){ e.dashState="idle"; e.dashStun=dashDef.stun||1; e.dashTimer=dashDef.cd; }  // 벽 → 기절
      else {
        for(const s in tFighters){ const f=tFighters[s];
          if(f.dead||f.inactive||f.invincibleTimer>0) continue;
          if(dist(e.x,e.y,f.x,f.y)<e.r+f.r+4){ tContactHurt(f, dashDef.dmg||e.dmg); e.dashState="idle"; e.dashTimer=dashDef.cd; break; } }
        if(e.dashLeft<=0){ e.dashState="idle"; e.dashTimer=dashDef.cd; }
      }
      return;
    }
    e.dashTimer=(e.dashTimer===undefined?dashDef.cd*0.6:e.dashTimer)-dt;
  }
  // 회복 요정: 공격 없이 주변 아군 적 회복(PRD 15.3 — 자기 회복 없음, 초당 12 상한)
  if(e.healer){
    e.healer.timer-=dt;
    const t0=tNearestPlayer(e);
    if(t0){ const dd=dist(e.x,e.y,t0.x,t0.y); const dx0=e.x-t0.x, dy0=e.y-t0.y, l=Math.hypot(dx0,dy0)||1;
      if(dd<260) tEnemyMove(e, dx0/l, dy0/l, e.speed*spdMul, dt); }   // 플레이어에게서 도망(벽 우회)
    if(e.healer.timer<=0){ e.healer.timer=e.healer.cd;
      for(const id2 in tEnemies){ const o=tEnemies[id2]; if(o===e||o.dead) continue;
        if(dist(e.x,e.y,o.x,o.y)<=e.healer.radius){
          o._healAcc=(o._healAcc||0);
          const give=Math.min(e.healer.amount, 12*e.healer.cd - o._healAcc);          // 초당 12 상한
          if(give>0){ o.hp=Math.min(o.maxHp, o.hp+give); o._healAcc+=give; }
        } }
      for(const id2 in tEnemies){ const o=tEnemies[id2]; if(o._healAcc) o._healAcc=Math.max(0, o._healAcc-12*e.healer.cd); }
      effects.push({kind:"respawn",x:e.x,y:e.y,t:0,life:0.35,color:"#8fffb3"});
    }
    return;
  }
  let t=tNearestPlayer(e);
  const stT=tStructFocus(e); if(stT) t=stT;                    // v1.22 방어전: 수정 직행 몬스터
  if(!t) return;
  const dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy)||1;
  e.facing=Math.atan2(dy,dx);
  // 돌진 개시 판정(별벌레·보스 2페이즈)
  if(dashDef && e.dashTimer<=0 && d>90 && d<420 && hasLineOfSight(e.x,e.y,t.x,t.y)){
    e.dashState="warn"; e.dashWarnT=dashDef.warn; e.dashDirX=dx/d; e.dashDirY=dy/d;
    effects.push({kind:"dashTrail",x:e.x,y:e.y,t:0,life:dashDef.warn,color:"#ffe14d"});
    return;
  }
  // 구름 유령: 주기적 반투명(시각) — 공격 직전엔 보임(렌더에서 처리)
  if(e.ghost){ e.ghost.cycle=(e.ghost.cycle+dt)%2.8; }
  // 보스 내려찍기(수정 거북·젤리킹): 예고 후 반경 피해(PRD 15.5)
  if(e.slam){
    if(e.slamWarnT>0){
      e.slamWarnT-=dt;
      if(e.slamWarnT<=0){
        spawnSuperWave(e.x,e.y,e.slam.radius);
        for(const s in tFighters){ const f=tFighters[s];
          if(f.dead||f.inactive||f.invincibleTimer>0) continue;
          if(dist(e.x,e.y,f.x,f.y)<=e.slam.radius+f.r) tHurtPlayer(f, e.slam.dmg); }
        e.slam.timer=e.slam.cd;
        if(e.slam.exposeTime) e.guardDownT=e.slam.exposeTime;   // 거북: 내려찍기 후 방어 해제
      }
      return;                                                   // 예고 중 정지
    }
    e.slam.timer-=dt;
    if(e.slam.timer<=0 && d<e.slam.radius+120){ e.slamWarnT=e.slam.warn;
      skillZones.push({type:"meteor", owner:null, x:e.x, y:e.y, timer:e.slam.warn, radius:e.slam.radius, dmg:0, done:false, enemyWarn:true}); }
  }
  if(e.guardDownT>0) e.guardDownT-=dt;
  // 보스 소환(PRD: 주기 또는 HP 트리거)
  if(e.summon){
    const map=getMap(tMapId);
    if(e.summon.cd){ e.summon.timer-=dt;
      if(e.summon.timer<=0){ e.summon.timer=e.summon.cd;
        for(let i=0;i<e.summon.count;i++){ if(Object.keys(tEnemies).length>=40) break; tSpawnEnemy(e.summon.type,1,map,1); } } }
    if(e.summon.atHp){ for(const ratio of e.summon.atHp){
      if(e.hp<=e.maxHp*ratio && e.summon.fired.indexOf(ratio)<0){ e.summon.fired.push(ratio);
        for(let i=0;i<(e.summon.count||3);i++){ if(Object.keys(tEnemies).length>=40) break; tSpawnEnemy(e.summon.type,1,map,1); } } } }
  }
  if(e.ranged){
    let mvx=0,mvy=0;
    if(d>e.range*0.75){ mvx=dx/d; mvy=dy/d; } else if(d<e.range*0.4){ mvx=-dx/d; mvy=-dy/d; }
    if(mvx||mvy) tEnemyMove(e, mvx, mvy, e.speed*spdMul, dt);   // 벽 우회 포함
    else if(!hasLineOfSight(e.x,e.y,t.x,t.y)) tEnemyMove(e, dx/d, dy/d, e.speed*spdMul, dt);   // 사거리 안인데 벽 → 돌아가기
    e.fireTimer-=dt;
    // 구조물 표적은 자기 충돌체가 시야를 막으므로 LOS 생략(탄이 사각 충돌로 명중 처리)
    if(d<e.range && e.fireTimer<=0 && (t.structure || hasLineOfSight(e.x,e.y,t.x,t.y))){ tEnemyFire(e); e.fireTimer=e.fireCd; }
  } else {
    tEnemyMove(e, dx/d, dy/d, e.speed*spdMul, dt);              // 벽 우회 포함
    e.contactTimer-=dt;
    if(d < e.r+t.r+6 && e.contactTimer<=0){
      if(t.structure){ tStructApplyDamage(t.structure, e.dmg); e.contactTimer=e.contactCd; }   // v1.22 수정 접촉 피해
      else if(tContactHurt(t, e.dmg)) e.contactTimer=e.contactCd;   // 면역 중이면 쿨 소모 안 함(면역 끝나면 때림)
    }
  }
}
function tEnemyFire(e){
  const a0=e.facing, mz=e.r+6;
  const push=(a,extra)=>{ tBullets.push(Object.assign({
    x:e.x+Math.cos(a)*mz, y:e.y+Math.sin(a)*mz, vx:Math.cos(a)*e.bulletSpeed, vy:Math.sin(a)*e.bulletSpeed,
    r:e.isBoss?14:9, damage:e.dmg, team:"enemy", owner:e.id, color:"#ff8f6b", alive:true, traveled:0,
    maxRange:(e.range||400)+140, age:0 }, extra||{})); };
  // 보스 전용 패턴(PRD 15.5 간이)
  if(e.ringShot && (!e.ringShot.atHp || e.hp<=e.maxHp*e.ringShot.atHp)){
    const n=e.ringShot.count;
    for(let i=0;i<n;i++) push(a0+i*Math.PI*2/n);
    return;
  }
  if(e.fan){
    let n=e.fan.count;
    if(e.phase2 && e.hp<=e.maxHp*e.phase2.at) n=e.phase2.count||n;   // 훈련 로봇 2페이즈 7발
    const spread=deg2rad(e.fan.deg);
    for(let i=0;i<n;i++) push(a0-spread/2+spread*(i/(n-1)));
    return;
  }
  if(e.bounceShot){                                                  // 종이비행기 대장: 반사탄
    push(a0, { bounce:true, maxBounce:e.bounceShot.maxBounce, r:e.bounceShot.radius||16, life:6, color:"#eef2f6" });
    return;
  }
  const n=e.threeWay?3:1, spread=deg2rad(26);
  for(let i=0;i<n;i++){ let a=a0; if(n>1) a=a0-spread/2+spread*(i/(n-1));
    push(a, e.slowShot?{ sl:e.slowShot, color:"#9fdcff" }:null);     // 얼음 방울: 둔화탄
  }
}
function tPveUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=tFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(wref.sid) tStructBulletHit(wref, b);               // v1.22 구조물 피해(플레이어탄→문/벽, 몬스터탄→수정)
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      if(b.team==="pve"){
        for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue;
          if(dist(b.x,b.y,e.x,e.y)<b.r+e.r){
            const k=tFighters[b.owner];
            if(b.boomerang){
              const hm=(b.phase==="out")?b.hitO:b.hitB;
              if(hm[id]) continue;
              hm[id]=true;
              if(k && !b.isSuper) tryChargeGauge(b.aid, id, ()=>{ k.superGauge=Math.min(GAME_CONFIG.superCharge,(k.superGauge||0)+GAME_CONFIG.superChargePerHit); });
              if(b.wref) applyWeaponHitEffects(b.wref, e, b.x, b.y);
              tDamageEnemy(e,id,bulletHitDamage(b,e),k);
              spawnHitFx(b.x,b.y,b.wid,b.color);
              continue;                                    // 부메랑은 관통(복귀 타격)
            }
            if(k && !b.isSuper) tryChargeGauge(b.aid, id, ()=>{ k.superGauge=Math.min(GAME_CONFIG.superCharge,(k.superGauge||0)+GAME_CONFIG.superChargePerHit); });
            if(b.wref) applyWeaponHitEffects(b.wref, e, b.x, b.y);
            tDamageEnemy(e,id,bulletHitDamage(b,e),k);
            spawnHitFx(b.x,b.y,b.wid,b.color);
            b.alive=false; break; } }
      } else {
        for(const slot in tFighters){ const f=tFighters[slot]; if(f.dead||f.inactive||f.invincibleTimer>0) continue;
          if(dist(b.x,b.y,f.x,f.y)<b.r+f.r){
            tHurtPlayer(f, b.damage);
            if(b.sl) applySlowTo(f, b.sl.pct, b.sl.time);   // 얼음 방울: 명중 시 25% 둔화 1.2s(중첩 없음)
            b.alive=false; break; } }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}
function tPveProgress(dt){
  if(tPve.status!=="playing") return;
  // v1.24 PRD 12.6: 체크포인트 재도전 연출 중(3초) — 실패 판정보다 먼저 처리
  if(tPve.phase==="retry"){
    tPve.phaseTimer-=dt;
    if(tPve.phaseTimer<=0) tPveDoCheckpointRetry();
    return;
  }
  // 실패(PRD 12.2): 살아있는 활성 플레이어가 없고, 부활 가능한(목숨>0) 플레이어도 없을 때
  let anyAlive=false, anyRevivable=false;
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    if(!f.dead) anyAlive=true; else if((f.lives||0)>0) anyRevivable=true; }
  if(!anyAlive && !anyRevivable){ if(tPveBeginRetry()) return; tPve.status="failed"; tPveEnd(); return; }
  const alive=Object.keys(tEnemies).length;
  if(tPve.phase==="wave"){
    const stageNow=PVE_STAGES[tPve.stageIndex];
    // v1.22 방어(defend): 수정 파괴=즉시 실패 · 시간을 버티면 클리어 · 타이머 중 전멸이면 웨이브 순환
    if(stageNow.objective==="defend"){
      const core=tStructures.core;
      if(core && !core.alive){ if(tPveBeginRetry()) return; tPve.status="failed"; tPveEnd(); return; }   /* v1.24: 수정 파괴도 재도전 대상 */
      if(tPve.defendT>0){
        tPve.defendT-=dt;
        if(tPve.defendT>0){
          if(alive===0){ tPve.waveIndex=(tPve.waveIndex+1)%stageNow.waves.length; tPveStartWave(); }
          return;                                           // 아직 방어 중(클리어 판정 보류)
        }
        tEnemies={}; tBullets=tBullets.filter(b=>b.team==="pve");   // 버텨냄 → 남은 적 정리 후 클리어 경로
        tPve.waveIndex=stageNow.waves.length-1;             // 마지막 웨이브 취급 → 아래에서 stageclear
      }
    }
    // v1.22 봉쇄(blockade): 문이 남아있으면 계속 소환되므로 클리어 판정 보류, 전파괴 시 최종 웨이브 1회
    if(stageNow.objective==="blockade"){
      if(tGatesAlive()>0) return;
      if(!tPve.finalSpawned){ tPve.finalSpawned=true; tPve.waveIndex=stageNow.waves.length-1; tPveStartWave(); return; }
    }
    if(Object.keys(tEnemies).length===0){
      const stage=PVE_STAGES[tPve.stageIndex];
      tPveCheckpointRevive(false);                          // 웨이브 통과: 목숨 0 플레이어 1개 복귀(PRD 12.2)
      if(tPve.waveIndex < stage.waves.length-1){ tPve.phase="gap"; tPve.phaseTimer=2; }
      else if(tPve.stageIndex < PVE_STAGES.length-1){
        tPve.phase="stageclear"; tPve.phaseTimer=9;         // 강화 선택 시간(전원 선택 시 단축)
        tPveOfferUpgrades(!!stage.boss);                    // PRD 13.2/19.4: 일반 3택1, 보스(5·10·15) 후엔 희귀(2스택)
      }
      else { tPve.status="complete"; tPveEnd(); }
    }
  } else if(tPve.phase==="gap"){
    tPve.phaseTimer-=dt; if(tPve.phaseTimer<=0){ tPve.waveIndex++; tPveStartWave(); }
  } else if(tPve.phase==="stageclear"){
    tPve.phaseTimer-=dt;
    // 전원 선택 완료 → 대기 단축
    if(tPve.upg){ let all=true; for(const s in tPve.upg){ if(!tPve.upg[s].picked){ all=false; break; } }
      if(all) tPve.phaseTimer=Math.min(tPve.phaseTimer,1.2); }
    if(tPve.phaseTimer<=0){
      // 시간 초과 → 미선택자는 자동 선택(진행이 막히지 않게)
      if(tPve.upg){ for(const s in tPve.upg){ const o=tPve.upg[s];
        if(!o.picked && tFighters[s]){ o.picked=true; o.pi=Math.floor(Math.random()*3); tPveApplyUpgrade(tFighters[s], o.c[o.pi], o.r===1); } }
        tPve.upg=null; }
      const wasBoss=!!PVE_STAGES[tPve.stageIndex].boss;
      tPve.stageIndex++; tPve.waveIndex=0;
      if(wasBoss){ tPve.checkpoint=tPve.stageIndex; tPve.retryUsed=false; }   // v1.24 PRD 12.6: 5·10·15 클리어 직후 저장(새 체크포인트마다 재도전 1회 리필)
      const st=PVE_STAGES[tPve.stageIndex]; tMapId=st.mapId;
      tPveSetupStructures();                               // v1.22: 맵+구조물 충돌 재구성(OBSTACLES/BUSHES 포함)
      tBullets=[]; tEnemies={};
      tPveCheckpointRevive(wasBoss);                        // 보스(5·10·15) 통과: 전원 목숨 +1(상한)
      tPve.teamLives=tPveLivesTotal();
      tPveReposition(); tPveStartWave();
    }
  }
}
/* v1.24 PRD 12.6 협동 체크포인트·재도전: 5·10·15 클리어 직후 저장, 실패 시 그 지점부터 1회 재도전
   — 전원 목숨 1개·체력 50%(reposition 경유)·도전 중 얻은 강화는 그대로 유지. 캠페인(1인)도 같은 경로. */
function tPveBeginRetry(){
  if(tPve.checkpoint==null || tPve.retryUsed) return false;
  tPve.retryUsed=true;
  tPve.stageIndex=tPve.checkpoint; tPve.waveIndex=0;         // 배너·HUD가 곧바로 체크포인트 지점을 가리키게
  tPve.phase="retry"; tPve.phaseTimer=3;                     // 3초 배너 후 tPveDoCheckpointRetry
  tEnemies={}; tBullets=[];
  return true;
}
function tPveDoCheckpointRetry(){
  tMapId=PVE_STAGES[tPve.stageIndex].mapId;
  tPveSetupStructures();
  tBullets=[]; tEnemies={};
  for(const s in tFighters){ const f=tFighters[s]; if(f.inactive) continue;
    f.lives=1; f.dead=true; f.respawnTimer=0; }              // dead 처리 → reposition에서 체력 50%로 복귀
  tPve.teamLives=tPveLivesTotal();
  tPve.phase="wave";
  tPveReposition(); tPveStartWave();
}
// 체크포인트 목숨 회복(PRD 12.2/15.6): 목숨 0 플레이어 최소 1개 복귀 · 보스 통과 시 전원 +1(시작 상한)
function tPveCheckpointRevive(bossBonus){
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    if((f.lives||0)<=0){ f.lives=1; if(f.dead) f.respawnTimer=Math.min(f.respawnTimer,1); }
    if(bossBonus) f.lives=Math.min(PVE_LIVES_START, (f.lives||0)+1);
  }
  tPve.teamLives=tPveLivesTotal();
}
function tPveReposition(){
  // PRD 12.6/15.6 회복 정책: 스테이지 전환 시 최대체력의 50% 회복(+회복 별 강화 15/스택), 사망 복귀자는 50%로.
  const map=getMap(tMapId); let i=0;
  for(const slot in tFighters){ const f=tFighters[slot]; const p=tSpawnPos(map.playerSpawn,i++); const sp=findClearSpawn(p.x,p.y,f.r);
    f.x=sp.x; f.y=sp.y;
    const regen=15*upgStacks(f,"regen");
    if(f.dead){ f.dead=false; f.hp=Math.min(f.maxHp, f.maxHp*0.5+regen); }
    else f.hp=Math.min(f.maxHp, f.hp+f.maxHp*0.5+regen);
    f.displayHp=f.hp; f.invincibleTimer=GAME_CONFIG.invincibleTime;
    f.spawnX=map.playerSpawn.x; f.spawnY=map.playerSpawn.y; }
}
function tPveEnd(){
  if(OnlineManager.role!=="host") return;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:null, resultText:tPve.status });
  tResultText=tPve.status;

}
