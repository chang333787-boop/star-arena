  if(!drawWallTile(o.x,o.y,o.w,o.h)) return false;   // мқҙлҜём§Җ м—Ҷмңјл©ҙ false вҶ’ нҳём¶ңл¶Җ лҸ„нҳ• нҸҙл°ұ
  ctx.strokeStyle=hexA(tc,0.65); ctx.lineWidth=2; roundRect(o.x-1,o.y-1,o.w+2,o.h+2,6); ctx.stroke();
  return true;
}
function drawWallTile(x,y,w,h){
  const img=worldImage("wall_tiles"); if(!img) return false;
  const S=112, c=Math.max(8, Math.min(22, w/2, h/2));   // мҪ”л„Ҳ л ҢлҚ” нҒ¬кё°
  const sx=[0,S,2*S], dx=[x, x+c, x+w-c], dw=[c, Math.max(0,w-2*c), c];
  const dy=[y, y+c, y+h-c], dh=[c, Math.max(0,h-2*c), c];
  for(let r=0;r<3;r++) for(let q=0;q<3;q++){
    if(dw[q]<=0.5||dh[r]<=0.5) continue;
    ctx.drawImage(img, sx[q], r*S, S, S, dx[q], dy[r], dw[q], dh[r]);
  }
  return true;
}
/* OVERNIGHT-1 1-4: мҲҳн’Җ мҳӨнҶ нғҖмқј вҖ” мқҙмӣғ(лӢӨлҘё rect нҸ¬н•Ё)мқ„ ліҙкі  мҪ”л„Ҳ/м—Јм§Җ/м„јн„° мЎ°к°Ғ м„ нғқ */
function drawBushesAutotile(img){
  const CS=STUDENT_CELL, S=112;
  const inBush=(px,py)=>{ for(const b of BUSHES){ if(px>=b.x+1&&px<=b.x+b.w-1&&py>=b.y+1&&py<=b.y+b.h-1) return true; } return false; };
  for(const b of BUSHES){
    // BIG-BATCH-1 A2: м—°л…№ л°‘нҢҗ(rgba 0.30) м ңкұ° вҖ” нғҖмқј мӢӨлЈЁм—Јкіј мқҙмӨ‘мңјлЎң кІ№міҗ 'мҠӨнӢ°м»Ө л‘җ мһҘ' мқёмғҒ. мҲҳн’Җ к·ёлҰјл§ҢмңјлЎң мӢқлі„ м¶©л¶„.
    const cols=Math.max(1,Math.round(b.w/CS)), rows=Math.max(1,Math.round(b.h/CS));
    const cw=b.w/cols, chh=b.h/rows;
    for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
      const px=b.x+i*cw+cw/2, py=b.y+j*chh+chh/2;
      const L=inBush(px-CS,py), R=inBush(px+CS,py), U=inBush(px,py-CS), D=inBush(px,py+CS);
      if(!L&&!R&&!U&&!D){ ctx.drawImage(img, 0,0,S*3,S*3, b.x+i*cw-4, b.y+j*chh-4, cw+8, chh+8); continue; }   // мҷёл”ҙ 1м№ё = м „мІҙ м¶•мҶҢ(л‘Ҙк·ј лҚӨл¶Ҳ)
      const scol = !L ? 0 : (!R ? 2 : 1);
      const srow = !U ? 0 : (!D ? 2 : 1);
      ctx.drawImage(img, scol*S, srow*S, S, S, b.x+i*cw, b.y+j*chh, cw, chh);
    }
  }
}
function drawBushes(){
  const timg=worldImage("bush_tiles");
  if(timg){ drawBushesAutotile(timg); return; }   // OVERNIGHT-1: нғҖмқјм…Ӣ мҳӨнҶ нғҖмқј мҡ°м„ 
  const bimg=worldImage("bush");
  for(const b of BUSHES){
    ctx.save();
    if(bimg){
      // мқҖмӢ  мҳҒм—ӯ н‘ңмӢң(м—°л…№ л°”лӢҘ) + мҲҳн’Җ мқҙлҜём§ҖлҘј кІ©мһҗлЎң мұ„мӣҖ
      ctx.fillStyle="rgba(46,150,86,0.35)"; roundRect(b.x,b.y,b.w,b.h,16); ctx.fill();
      const cell=96, cols=Math.max(1,Math.round(b.w/cell)), rows=Math.max(1,Math.round(b.h/cell));
      const cw=b.w/cols, chh=b.h/rows;
      for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
        const s=Math.min(cw,chh)*1.25;
        ctx.drawImage(bimg, b.x+i*cw+cw/2-s/2, b.y+j*chh+chh/2-s/2, s, s*(bimg.naturalHeight||1)/(bimg.naturalWidth||1));
      }
      ctx.restore(); continue;
    }
    ctx.fillStyle="rgba(46,150,86,0.78)"; roundRect(b.x,b.y,b.w,b.h,16); ctx.fill();
    ctx.fillStyle="rgba(28,110,60,0.6)";
    for(let i=0;i<10;i++){ const px=b.x+((i*53.7)%b.w), py=b.y+((i*37.3)%b.h); ctx.beginPath(); ctx.arc(px+8,py+8,9,0,Math.PI*2); ctx.fill(); }
    ctx.strokeStyle="rgba(80,200,120,0.5)"; ctx.lineWidth=2; roundRect(b.x,b.y,b.w,b.h,16); ctx.stroke();
    ctx.restore();
  }
}
function drawObstacles(){
  for(const o of OBSTACLES){
    if(o.sid) continue;                                    // v1.22 кө¬мЎ°л¬јмқҖ drawStructsPackedк°Җ HPл°”мҷҖ н•Ёк»ҳ к·ёлҰј
    ctx.save();
    // мҪ”лҚұмҠӨ м§Җнҳ• мқҙлҜём§Җ(мҲҳм •/лі„мғҒмһҗ/л°”мң„) вҖ” м¶©лҸҢ мӮ¬к°Ғнҳ• мң„м—җ л°”лӢҘ м •л ¬лЎң к·ёлҰј. м—Ҷмңјл©ҙ м•„лһҳ лҸ„нҳ• fallback.
    const oimg=worldImage(o.kind==="crystal"?"ob_crystal":(o.kind==="box"?"ob_box":"ob_rock"));
    if(oimg){
      const iw=oimg.naturalWidth||1, ih=oimg.naturalHeight||1;
      const oAsp=o.w/o.h, iAsp=iw/ih;
      const mism=Math.max(oAsp/iAsp, iAsp/oAsp);
      if(mism>1.75){
        // к°ҖлҠҳкі  кёҙ лІҪ(3лқјмқё кө¬л¶„лІҪ л“ұ): мқҙлҜём§ҖлҘј нҸӯ кё°мӨҖмңјлЎң нҷ•лҢҖн•ҳл©ҙ кұ°лҢҖн•ҙм§җ вҶ’ мһ‘мқҖ мЎ°к°Ғмқ„ мӨ„м§Җм–ҙ нғҖмқјл§Ғ
        ctx.fillStyle="rgba(0,0,0,0.20)";
        ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.9, o.w*0.52, Math.max(8,o.h*0.3), 0, 0, Math.PI*2); ctx.fill();
        const horiz=o.w>=o.h;
        const len=horiz?o.w:o.h;
        const s=Math.min(Math.min(o.w,o.h)*2.2, Math.max(o.w,o.h)*0.45);
        const n=Math.max(2, Math.round(len/(s*0.62)));
        const dh2=s*(ih/iw);
        for(let i=0;i<n;i++){
          const t=(i+0.5)/n;
          if(horiz) ctx.drawImage(oimg, o.x+o.w*t-s/2, o.y+o.h-dh2+o.h*0.3, s, dh2);
          else      ctx.drawImage(oimg, o.x+o.w/2-s/2, o.y+o.h*t-dh2/2, s, dh2);
        }
        ctx.restore(); continue;
      }
      ctx.fillStyle="rgba(0,0,0,0.20)";
      ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.9, o.w*0.52, o.h*0.18, 0, 0, Math.PI*2); ctx.fill();
      // OVERNIGHT-1 footprint м •л ¬: мһ¬мһ‘ н”„лЎӯ(112Г—128 л“ұ)мқҖ л°‘л©ҙ нҸӯ = footprint м№ё нҸӯ.
      // л ҢлҚ” нҸӯ = м¶©лҸҢ мӮ¬к°Ғнҳ• нҸӯ, л°‘л©ҙ = мӮ¬к°Ғнҳ• н•ҳлӢЁ(мң„лЎң мҶҹлҠ” л¶Җл¶„л§Ң м№ёмқ„ лІ—м–ҙлӮЁ).
      const dw=o.w, dh=dw*(ih/iw);
      ctx.drawImage(oimg, o.x, o.y+o.h-dh, dw, dh);
      ctx.restore(); continue;
    }
    if(o.kind==="crystal"){
      ctx.fillStyle="#3aa0c8"; roundRect(o.x,o.y,o.w,o.h,10); ctx.fill();
      ctx.fillStyle="rgba(190,240,255,0.5)";
      ctx.beginPath(); ctx.moveTo(o.x+o.w*0.5,o.y+8); ctx.lineTo(o.x+o.w-12,o.y+o.h*0.5); ctx.lineTo(o.x+o.w*0.5,o.y+o.h-8); ctx.lineTo(o.x+12,o.y+o.h*0.5); ctx.closePath(); ctx.fill();
      ctx.strokeStyle="#bfeaff"; ctx.lineWidth=3; roundRect(o.x,o.y,o.w,o.h,10); ctx.stroke();
    } else if(o.kind==="box"){
      ctx.fillStyle="#6b5a2a"; roundRect(o.x,o.y,o.w,o.h,8); ctx.fill();
      ctx.strokeStyle="#ffd34d"; ctx.lineWidth=4; roundRect(o.x+6,o.y+6,o.w-12,o.h-12,6); ctx.stroke();
      ctx.strokeStyle="#ffe680"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(o.x+6,o.y+6); ctx.lineTo(o.x+o.w-6,o.y+o.h-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(o.x+o.w-6,o.y+6); ctx.lineTo(o.x+6,o.y+o.h-6); ctx.stroke();
    } else {
      ctx.fillStyle="#5a5f78"; roundRect(o.x,o.y,o.w,o.h,10); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,0.08)"; roundRect(o.x+5,o.y+5,o.w-10,(o.h-10)*0.4,6); ctx.fill();
      ctx.strokeStyle="#878da8"; ctx.lineWidth=3; roundRect(o.x,o.y,o.w,o.h,10); ctx.stroke();
    }
    ctx.restore();
  }
}

/* QUALITY-SWEEP-1 м¶•11 лӮңм „ к°ҖлҸ…м„ұ: л°ңл°‘ нҢҖ л§Ҳм»Ө вҖ” лӮҳ=кёҲмғү мқҙмӨ‘ л§Ғ(нҺ„мҠӨ) В· м•„кө°=нҢҢлһҖ мӢӨм„  В· м Ғ=л№Ёк°„ м җм„ .
   мғүмңјлЎңл§Ң кө¬л¶„н•ҳм§Җ м•Ҡкі  'м җм„ (м Ғ)/мӢӨм„ (м•„кө°)/мқҙмӨ‘(лӮҳ)' нҳ•нғң м°ЁмқҙлҘј н•Ёк»ҳ мӮ¬мҡ©(мғүл§№ л°°л Ө вҖ” м¶•19). */
function drawTeamMarker(x,y,r,kind,alpha){
  ctx.save(); ctx.globalAlpha=(alpha===undefined?1:alpha);
  const gy=y+r*0.85, rx=r*1.25, ry=r*0.45;
  if(kind==="me"){ const p=0.5+0.5*Math.sin(uiTime*5);
    ctx.strokeStyle="rgba(255,225,80,"+(0.7+0.3*p)+")"; ctx.fillStyle="rgba(255,225,80,0.14)"; }
  else if(kind==="ally"){ ctx.strokeStyle="rgba(110,190,255,0.85)"; ctx.fillStyle="rgba(95,160,255,0.12)"; }
  else { ctx.strokeStyle="rgba(255,90,110,0.9)"; ctx.fillStyle="rgba(255,77,109,0.15)"; }
  ctx.beginPath(); ctx.ellipse(x,gy,rx,ry,0,0,Math.PI*2); ctx.fill();
  if(kind==="enemy") ctx.setLineDash([6,4]);
  ctx.lineWidth=(kind==="me")?3:2;
  ctx.beginPath(); ctx.ellipse(x,gy,rx,ry,0,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
  if(kind==="me"){ ctx.lineWidth=1.5; ctx.beginPath(); ctx.ellipse(x,gy,rx*1.3,ry*1.35,0,0,Math.PI*2); ctx.stroke(); }
  ctx.restore();
}
const _fviewer={ x:0, y:0, team:"player" };   // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): нҢҢмқҙн„°л§ҲлӢӨ мғҲ к°қмІҙлҘј л§Ңл“Өм§Җ м•ҠлҠ” мһ¬мӮ¬мҡ© мҠӨнҒ¬лһҳм№ҳ
function drawFighter(f){
  if(f.dead) return;
  // н’ҖмҲІ к°ҖмӢңм„ұ: лӮҙ мӢңм җ(player) кё°мӨҖ. м Ғмқҙ н’ҖмҲІм—җ л©ҖлҰ¬ мһҲмңјл©ҙ мҲЁк№Җ(мӮҙлһ‘мқҙлҠ” н’Җл§Ң).
  _fviewer.x=player.x; _fviewer.y=player.y;
  const recently = f.lastFireTime!==undefined && (matchElapsed-f.lastFireTime) < GAME_CONFIG.bushAttackRevealTime;
  let vis;
  if(RULE && RULE.id==="tag"){
    // GENRE-EXPAND-1 В§1.4: м—ӯн•  кё°л°ҳ мӢңм•ј вҖ” лӮҙк°Җ мҲ лһҳл©ҙ мҲҳн’Җ мҶҚ лҸ„л§қмһҗ(170px л°–) м•Ҳ ліҙмһ„. лҸ„л§қмһҗлҒјлҰ¬лҠ” м„ңлЎң ліҙмһ„.
    const hideMe = player.isTagger && !f.isTagger && !f.isPlayer &&
                   ( f.tagHideT>0 ||                                      // BIG-BATCH-2 P1: лӘЁм•„ мқҖмӢ  л¶Җм—¬ вҖ” мҲ лһҳ мӢңм җм—җм„ң м•Ҳ ліҙмһ„
                     (inBush(f) && dist(player.x,player.y,f.x,f.y)>RULE_CONFIG.tag.bushHide && !recently) );
    vis = hideMe ? {hidden:true, alpha:0} : {hidden:false, alpha: (inBush(f)||f.tagHideT>0)?0.75:1};
  } else {
    vis=bushVisibility(f.x, f.y, f.team, f.isPlayer, _fviewer, recently);
  }
  if(vis.hidden){ drawBushRustle(f.x,f.y); return; }
  let alpha=vis.alpha;
  if(f.invincibleTimer>0 && Math.floor(f.invincibleTimer*12)%2===0) alpha*=0.35;
  // м¶•11 л§Ҳм»Ө вҖ” мҲ лһҳмһЎкё°м—җм„  м—ӯн•  кё°мӨҖ(к°ҷмқҖ м—ӯн• =м•„кө°мғүВ·лӢӨлҘё м—ӯн• =м Ғмғү)
  const mk = (RULE && RULE.id==="tag")
    ? (f.isPlayer?"me":((!!f.isTagger)===(!!player.isTagger)?"ally":"enemy"))
    : (f.isPlayer?"me":(f.team==="player"?"ally":"enemy"));
  drawTeamMarker(f.x, f.y, f.r, mk, alpha);
  if(RULE && RULE.id==="tag" && f.isTagger){   // В§1.5 мҲ лһҳ н‘ңмӢқ: лЁёлҰ¬ мң„ рҹ‘№
    ctx.save(); ctx.globalAlpha=alpha; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="bold 20px 'Malgun Gothic',sans-serif";
    ctx.fillText("рҹ‘№", f.x, f.y-f.r-44+Math.sin(uiTime*5)*3);
    ctx.restore();
  }
  if(RULE && RULE.id==="tag" && !f.isTagger){   // BIG-BATCH-2 P1: л°©м–ҙл§ү л§Ғ(лі„кіЁл ҳ) + мөңнӣ„мқҳ 1мқё кёҲл№ӣ л§Ғ
    if(f.tagShield>0){
      ctx.save(); ctx.globalAlpha=alpha*0.85; ctx.strokeStyle="#ffe066"; ctx.lineWidth=2.5;
      ctx.setLineDash([7,5]); ctx.beginPath(); ctx.arc(f.x,f.y,f.r+9,uiTime*1.5,uiTime*1.5+Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    if(RULE.lastOne && RULE.survivors===1){
      const lp=0.5+0.5*Math.sin(uiTime*6);
      ctx.save(); ctx.globalAlpha=0.5+0.4*lp; ctx.strokeStyle="#ffd23f"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r+14+lp*4,0,Math.PI*2); ctx.stroke();
      ctx.textAlign="center"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe066";
      ctx.fillText("вӯҗ мөңнӣ„мқҳ мғқмЎҙмһҗ", f.x, f.y-f.r-58);
      ctx.restore();
    }
  }
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){   // BIG-BATCH-2 P1: лі„ ліҙмң  л°°м§Җ + мәҗлҰ¬м–ҙ н‘ңм Ғ л§Ғ
    ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=alpha;
    ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe14d";
    ctx.fillText("вӯҗ"+f.stars, f.x, f.y-f.r-44);
    if(f.stars>=RULE_CONFIG.stargrab.carrierMark){
      const cp=0.5+0.5*Math.sin(uiTime*5);
      ctx.strokeStyle=f.team==="player"?"#7fd6ff":"#ff8fa5"; ctx.lineWidth=2.5; ctx.globalAlpha=alpha*(0.5+0.4*cp);
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r+12+cp*3,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(f.x,f.y);
  // мәҗлҰӯн„°к°Җ л°°м •лҗң нҢҢмқҙн„°(м•„кө°/н”Ңл Ҳмқҙм–ҙ/v1.27 м Ғ мәҗлҰӯн„° лҙҮ)лҠ” мқҙлҜём§Җ мҡ°м„ , мӢӨнҢЁ мӢң лҸ„нҳ•.
  // ліҙмҠӨлҠ” нҒ¬лЎ¬ м •мІҙм„ұ мң м§Җ(н•ӯмғҒ лҸ„нҳ• нҒ¬лЎ¬).
  let drew=false;
  const asChar = f.characterId && !f.isBoss;
  if(asChar){
    const attacking = f.lastFireTime!==undefined && (matchElapsed-f.lastFireTime) < 0.22;
    drew=drawCharacterSprite(f.characterId, f.r, f.facing,
      { moving:spriteMoving("L"+f.id,f.x,f.y), hit:f.hitFlash>0, attacking:attacking });
  }
  if(!drew){ if(asChar || f.team==="player") drawPlayerCharacter(f); else drawChrome(f); }
  // лі„кіЁл ҳ X нқЎмҲҳл§ү: лӮЁмқҖ нқЎмҲҳлҹүм—җ л№„лЎҖн•ҳлҠ” м ӨлҰ¬ лІ„лё”
  if(f.shieldAbsorb>0 && f.shieldAbsorbTimer>0){
    const ax=getAbility("student_06").x, k=clamp(f.shieldAbsorb/(ax.absorb||80),0.2,1);
    ctx.save(); ctx.globalAlpha=0.25+0.3*k; ctx.strokeStyle="#9fd0ff"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,f.r+7,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.10+0.12*k; ctx.fillStyle="#9fd0ff"; ctx.beginPath(); ctx.arc(0,0,f.r+7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  if(f.hitFlash>0){ ctx.save(); ctx.globalAlpha=0.5*(f.hitFlash/0.15)*alpha; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(f.x,f.y,f.r+2,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  drawFighterInfo(f, alpha);
}
// м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): нҢҢмқҙн„° кёҖлЎңмҡ° к·ёлқјл””м–ёнҠёлҘј л§Ө н”„л Ҳмһ„ мғҲлЎң л§Ңл“Өм§Җ м•Ҡкі  мғүВ·л°ҳкІҪлі„лЎң мәҗмӢңн•ңлӢӨ.
// мӣҗм җ(0,0) кё°мӨҖмңјлЎң к·ёлҰ¬лҜҖлЎң мһ¬мӮ¬мҡ©н•ҙлҸ„ кІ°кіјк°Җ м •нҷ•нһҲ к°ҷлӢӨ. (мғү 6мў… Г— л°ҳкІҪ лӘҮ мў… вҶ’ мәҗмӢң нҒ¬кё° мң н•ң)
const _glowGradCache={};
function glowGradientFor(color, outerR, a0){
  const key=color+"|"+outerR+"|"+a0;
  let g=_glowGradCache[key];
  if(!g){ g=ctx.createRadialGradient(0,0,4,0,0,outerR); g.addColorStop(0,hexA(color,a0)); g.addColorStop(1,hexA(color,0)); _glowGradCache[key]=g; }
  return g;
}
function drawPlayerCharacter(f){
  const r=f.r;
  const glow=glowGradientFor(f.color, r+12, 0.55);
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#ffffff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  drawStar(0,0,5,r*0.62,r*0.28,f.subColor);
  ctx.save(); ctx.rotate(f.facing); ctx.fillStyle=f.subColor; roundRect(r-4,-6,16,12,4); ctx.fill(); ctx.restore();
}
function drawChrome(f){
  const r=f.r;
  const glow=glowGradientFor(f.subColor, r+14, 0.5);
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath();
  for(let i=0;i<6;i++){ const a=Math.PI/6+i*Math.PI/3; const px=Math.cos(a)*r,py=Math.sin(a)*r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=f.subColor; ctx.lineWidth=3; ctx.stroke();
  ctx.save(); ctx.rotate(f.facing);
  ctx.fillStyle=f.isBoss?"#ffd400":"#ff4d6d"; roundRect(2,-7,r-4,14,4); ctx.fill();
  ctx.fillStyle="#6a2aa0"; roundRect(r-6,-6,14,12,3); ctx.fill();
  ctx.restore();
  if(f.isBoss){
    ctx.fillStyle="#ffd400";
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r); ctx.lineTo(-r*0.2,-r-12); ctx.lineTo(-r*0.05,-r); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*0.5,-r); ctx.lineTo(r*0.2,-r-12); ctx.lineTo(r*0.05,-r); ctx.closePath(); ctx.fill();
  }
}
function drawBushRustle(x,y){

function drawFighterInfo(f, alpha){

  ctx.fillText(Math.ceil(f.hp),f.x,by+h+12);

  // GAMEPLAY-1 stargrab: л“Өкі  мһҲлҠ” лі„ н‘ңмӢң
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){

  }

}
function drawBullets(){
  ctx.save();   // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): save/restoreлҘј нғ„нҷҳл§ҲлӢӨ вҶ’ н•ЁмҲҳлӢ№ 1нҡҢ(лЈЁн”„лҠ” globalAlphaлҘј мҠӨмҠӨлЎң ліөмӣҗ)
  for(const b of bullets){
    // лҸ„кө¬ л°ңмӮ¬мІҙ мқҙлҜём§Җ: нғ„нҷҳм—җ кё°лЎқлҗң л¬ҙкё° id(wid)лЎң к·ёлҰ°лӢӨ(м•„кө° лҙҮ нҸ¬н•Ё). м—Ҷмңјл©ҙ кё°мЎҙ мӣҗнҳ• нғ„нҷҳ.
    if(b.wid && drawProjectileSprite(b.wid, b.x, b.y, b.r, Math.atan2(b.vy||0,b.vx||0))) continue;
    const color=b.color||"#ffe066";
    // v1.21 м„ұлҠҘ: нғ„нҷҳ кёҖлЎңмҡ°лҘј к·ёлқјлҚ°мқҙм…ҳ вҶ’ л°ҳнҲ¬лӘ… мӣҗ(нғ„л§ү лӢӨмҲҳмқј л•Ң н”„л Ҳмһ„лӢ№ к·ёлқјлҚ°мқҙм…ҳ мғқм„ұ л№„мҡ© м ңкұ°)
    ctx.globalAlpha=0.30; ctx.fillStyle=color; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.9,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}
function drawEffects(){
  ctx.save();   // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): save/restoreлҘј нҡЁкіјл§ҲлӢӨ вҶ’ н•ЁмҲҳлӢ№ 1нҡҢ. н…ҚмҠӨнҠё м •л ¬мқ„ л°”кҫёлҠ” л¶„кё°л§Ң к°ңлі„ save/restore мң м§Җ
  for(const e of effects){
    const k=e.t/e.life;
    if(e.kind==="muzzle"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x+e.dx*8,e.y+e.dy*8,10*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="hit"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,6+18*k,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="spark"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,3*(1-k)+1,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="dashTrail"){ ctx.globalAlpha=(1-k)*0.6; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,12*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="death"){ ctx.globalAlpha=(1-k)*0.8; const r=(e.big?20:12)+(e.big?100:60)*k; const g=ctx.createRadialGradient(e.x,e.y,2,e.x,e.y,r); g.addColorStop(0,e.color); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="respawn"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(e.x,e.y,50*(1-k)+6,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superwave"){ ctx.globalAlpha=(1-k)*0.85; const r=e.radius*k; ctx.strokeStyle="#ffe066"; ctx.lineWidth=8*(1-k)+2; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke(); ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,r*0.7,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superfail"){ ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle="#ffffff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("кІҢмқҙм§Җ л¶ҖмЎұ!",e.x,e.y-50-20*k); ctx.restore(); }
    else if(e.kind==="bossArrival"){ ctx.save(); // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): кІҢмһ„ мӨ‘ 1.6мҙҲк°„ л§Ө н”„л Ҳмһ„ 70px н…ҚмҠӨнҠё shadowBlur вҶ’ мҠӨн”„лқјмқҙнҠё 1нҡҢ көҪкё°лЎң лҢҖмІҙ
      ctx.globalAlpha=Math.sin(Math.min(1,k*2)*Math.PI)*0.9;
      const bsp=glowTextSprite("ліҙмҠӨ л“ұмһҘ!","bold 70px 'Malgun Gothic',sans-serif","#ff4d6d","rgba(255,80,110,0.9)",30);
      if(bsp){ ctx.drawImage(bsp, e.x-bsp.width/2, e.y-bsp.height/2); }
      else { ctx.fillStyle="#ff4d6d"; ctx.font="bold 70px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.shadowColor="rgba(255,80,110,0.9)"; ctx.shadowBlur=30; ctx.fillText("ліҙмҠӨ л“ұмһҘ!",e.x,e.y); ctx.shadowBlur=0; }
      ctx.restore(); }
    else if(e.kind==="hitfx"){   // л¬ҙкё°лі„ м ҒмӨ‘ нҡЁкіј(effect_hit.png). нҢҢмқј м—Ҷмңјл©ҙ мғқм„ұ мӢңм җм—җ fallback мІҳлҰ¬лҗЁ.
      const w=getWeapon(e.wid), img=w?getWeaponImage(w.assetId||e.wid,"effect_hit"):null;
      if(img){ const s=(0.7+0.6*k)*34; ctx.globalAlpha=1-k; ctx.drawImage(img, e.x-s/2, e.y-s/2, s, s); }
      else { ctx.globalAlpha=1-k; ctx.strokeStyle="#fff0a0"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,6+18*k,0,Math.PI*2); ctx.stroke(); }
    }
  }
  ctx.restore();
}
// X/C мһҘнҢҗ к·ёлҰ¬кё°(лЎңм»¬=packZones(), кІҢмҠӨнҠё=state.zones кіөмҡ© вҖ” мҲ«мһҗл§ҢмңјлЎң л ҢлҚ”)
/* v1.22 кө¬мЎ°л¬ј л ҢлҚ”: k 0=л°©м–ҙ мҲҳм •(лі„мҲҳм • мқҙлҜём§Җ) 1=лӘ¬мҠӨн„° л¬ё 2=мҝ м…ҳ лІҪ вҖ” HPл°” нҸ¬н•Ё */
function drawStructsPacked(list){
  if(!list || !list.length) return;
  const imgs=["ob_crystal","st_gate","st_wall"], defs=[STRUCT_DEFS.core,STRUCT_DEFS.gate,STRUCT_DEFS.wall];   /* v1.23: мҲҳм •=crystal_01(лі„мҲҳм •) вҖ” boxмҷҖ кө¬л¶„(мҪ”лҚұмҠӨ нҡҢм°Ё8) */
  for(const st of list){
    if(st.hp<=0) continue;
    const def=defs[st.k]||defs[2], img=worldImage(imgs[st.k]);
    ctx.save();
    ctx.fillStyle="rgba(0,0,0,0.20)";
    ctx.beginPath(); ctx.ellipse(st.x, st.y+def.h*0.42, def.w*0.62, def.h*0.2, 0, 0, Math.PI*2); ctx.fill();
    if(st.k===2 && drawWallTile(st.x-def.w/2, st.y-def.h/2, def.w, def.h)){
      /* OVERNIGHT-1: мҝ м…ҳлІҪмқҖ нғҖмқјм…Ӣ(9-slice) мҡ°м„  */
    } else if(img){
      // OVERNIGHT-1 footprint м •л ¬: мһ¬мһ‘ н”„лЎӯ(мҲҳм • 112Г—128 В· л¬ё 224Г—140)мқҖ л°‘л©ҙ нҸӯ = footprint нҸӯ
      const iw=img.naturalWidth||1, ih=img.naturalHeight||1, dw=def.w, dh=dw*(ih/iw);
      ctx.drawImage(img, st.x-dw/2, st.y+def.h/2-dh, dw, dh);
    } else {
      ctx.fillStyle=st.k===0?"#7fd6ff":(st.k===1?"#b06be0":"#ff9ec2");
      roundRect(st.x-def.w/2, st.y-def.h/2, def.w, def.h, 10); ctx.fill();
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=3; roundRect(st.x-def.w/2, st.y-def.h/2, def.w, def.h, 10); ctx.stroke();
    }
    // HPл°”(мҲҳм •мқҖ нҒ¬кІҢВ·н•ӯмғҒ, л¬ё/лІҪмқҖ мһ‘кІҢ)
    const big=st.k===0, bw=big?110:56, bh=big?10:6, bx=st.x-bw/2, by=st.y-def.h/2-(big?22:14);
    ctx.fillStyle="rgba(0,0,0,0.55)"; roundRect(bx,by,bw,bh,4); ctx.fill();
    const ratio=clamp(st.hp/st.mh,0,1);
    ctx.fillStyle= big ? (ratio>0.5?"#5fd0ff":(ratio>0.25?"#ffd23f":"#ff6a6a")) : "#c99bff";
    roundRect(bx,by,bw*ratio,bh,4); ctx.fill();
    if(big){ ctx.strokeStyle="#bfeaff"; ctx.lineWidth=2; roundRect(bx,by,bw,bh,4); ctx.stroke();
      ctx.fillStyle="#dff4ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText("л°©м–ҙ мҲҳм • "+Math.ceil(st.hp), st.x, by-2); }
    ctx.restore();
  }
}

const _bhGradCache={};   // лё”лһҷнҷҖ к·ёлқјл””м–ёнҠё мәҗмӢң(л°ҳкІҪлі„ вҖ” packZonesк°Җ л°ҳкІҪмқ„ м •мҲҳлЎң ліҙлӮҙ нӮӨк°Җ мң н•ң)
function drawSkillZonesPacked(list){
  if(!list || !list.length) return;
  for(const z of list){
    ctx.save();
    if(z.t===0){        // лі„лҳҘлі„ мҳҲкі (кІҪкі  мӣҗ + мӨ„м–ҙл“ңлҠ” л§Ғ)
      ctx.globalAlpha=0.55; ctx.strokeStyle="#ffd23f"; ctx.lineWidth=3;
      ctx.setLineDash([8,6]); ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      const p=0.5+0.5*Math.sin(uiTime*10); ctx.globalAlpha=0.25+0.2*p; ctx.fillStyle="#ffcf4d";
      ctx.beginPath(); ctx.arc(z.x,z.y,z.r*clamp(1-(z.tm||0)/0.45,0.15,1),0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.9; ctx.fillStyle="#fff3b0"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("вҳ…",z.x,z.y+5);
    } else if(z.t===1){ // к°ҖмӢң
      ctx.globalAlpha=0.85; ctx.fillStyle="rgba(198,232,74,0.35)";
      ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="#c6e84a"; ctx.lineWidth=2;
      for(let i=0;i<5;i++){ const a=uiTime*0.6+i*Math.PI*2/5; ctx.beginPath(); ctx.moveTo(z.x+Math.cos(a)*4,z.y+Math.sin(a)*4); ctx.lineTo(z.x+Math.cos(a)*(z.r-4),z.y+Math.sin(a)*(z.r-4)); ctx.stroke(); }
    } else if(z.t===2){ // м–јмқҢ л°”лӢҘ вҖ” мҪ”лҚұмҠӨ ice_field мқҙлҜём§Җ(м—Ҷмңјл©ҙ лҸ„нҳ•)
      const iimg=worldImage("ice_field");
      if(iimg){
        const iw=iimg.naturalWidth||1, ih=iimg.naturalHeight||1;
        const dw=z.r*2.1, dh=dw*(ih/iw);
        ctx.globalAlpha=0.9; ctx.drawImage(iimg, z.x-dw/2, z.y-dh/2, dw, dh);
      } else {
        ctx.globalAlpha=0.4; ctx.fillStyle="#9fdcff"; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.8; ctx.strokeStyle="#dff4ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle="#eef9ff"; ctx.font="bold 14px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("вқ„",z.x,z.y+5);
      }
    } else if(z.t===3){ // нҡҢліө мҳӨмҳӨлқј кё°л¬ј(лӘЁм•„ X): мҙҲлЎқ мҳӨмҳӨлқј мӣҗ + кё°л¬ј + н•ҳнҠё
      const p=0.5+0.5*Math.sin(uiTime*4);
      ctx.globalAlpha=0.16+0.08*p; ctx.fillStyle="#5ad36b"; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.75; ctx.strokeStyle="#8fffb3"; ctx.lineWidth=2;
      ctx.setLineDash([10,7]); ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.globalAlpha=0.95; ctx.fillStyle="#eafff0"; roundRect(z.x-12,z.y-16,24,26,6); ctx.fill();
      ctx.strokeStyle="#5ad36b"; ctx.lineWidth=2; roundRect(z.x-12,z.y-16,24,26,6); ctx.stroke();
      ctx.fillStyle="#e05a7a"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("вҷҘ",z.x,z.y+1-2*p);
    } else if(z.t===6){ // лӢ¬мқҙ C м ҖкІ©м„ : л°ңмӮ¬ л°©н–Ҙ мқјм§Ғм„  м„¬кҙ‘(мһ к№җ н‘ңмӢң нӣ„ мӮ¬лқјм§җ)
      const k=clamp((z.tm||0)/0.28,0,1), ex=z.x+Math.cos(z.a||0)*(z.l||900), ey=z.y+Math.sin(z.a||0)*(z.l||900);
      ctx.globalAlpha=0.55*k; ctx.strokeStyle="#fff3b0"; ctx.lineWidth=(z.r||28)*2*k;
      ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.globalAlpha=0.9*k; ctx.strokeStyle="#ffffff"; ctx.lineWidth=Math.max(2,(z.r||28)*0.5*k);
      ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke();
    } else if(z.t===7){ // лӢ¬мқҙ C мӢңм „ мҳҲкі м„ (OVERNIGHT-1 2-5): м җм җ м§„н•ҙм§ҖлҠ” м җм„  вҖ” н”јн•  мӢңк°„мқ„ мӨҖлӢӨ
      const k=clamp(1-(z.tm||0)/0.35,0.2,1), ex=z.x+Math.cos(z.a||0)*(z.l||900), ey=z.y+Math.sin(z.a||0)*(z.l||900);
      ctx.globalAlpha=0.35+0.4*k; ctx.strokeStyle="#eef2f6"; ctx.lineWidth=2+3*k;
      ctx.setLineDash([14,10]); ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.setLineDash([]);
    } else if(z.t===4){ // лё”лһҷнҷҖ вҖ” м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): мӣҗм җ кё°мӨҖ translateлЎң л°”кҝ” к·ёлқјл””м–ёнҠёлҘј л°ҳкІҪлі„ 1нҡҢл§Ң мғқм„ұ
      ctx.translate(z.x,z.y);
      let g=_bhGradCache[z.r];
      if(!g){ g=ctx.createRadialGradient(0,0,4,0,0,z.r);
        g.addColorStop(0,"rgba(60,20,120,0.85)"); g.addColorStop(0.6,"rgba(122,92,255,0.35)"); g.addColorStop(1,"rgba(122,92,255,0)");
        _bhGradCache[z.r]=g; }
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,z.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.9; ctx.strokeStyle="#c3b6ff"; ctx.lineWidth=2;
      for(let i=0;i<3;i++){ const a=uiTime*2.2+i*Math.PI*2/3; ctx.beginPath(); ctx.arc(0,0,z.r*(0.35+0.2*i),a,a+1.6); ctx.stroke(); }
    }
    ctx.restore();
  }
}
function drawDamageNumbers(){

    ctx.strokeStyle="rgba(0,0,0,0.6)"; ctx.lineWidth=3;

}

/* в”Җв”Җ QUALITY-SWEEP-1: н•ҳлӢЁ мҠӨнӮ¬ лҸ…(кІҢмһ„мӢқ м•„мқҙмҪҳ мқёл””мјҖмқҙн„°) в”Җв”Җ
   Z = нғ„м°Ҫ мҲҳл§ҢнҒј лӮҳлүң л§Ғ(мҸҳл©ҙ мҶҢм§„В·мһҘм „ мӢң м°ЁмҳӨлҰ„В·л¬ҙн•ңнғ„=вҲһ) В· X = мӣҗнҳ• мҝЁнғҖмһ„ мҠӨмң•(мӨҖл№„лҗҳл©ҙ л№ӣлӮЁ)
   C = кіЁл“ң кІҢмқҙм§Җ л§Ғ(лӘ…мӨ‘ м¶©м „В·100%л©ҙ вҳ… нҺ„мҠӨ). лЎңм»¬(drawHUD)В·мҳЁлқјмқё(drawCombatStrip) кіөмҡ©. */
const SKILL_GLYPH_X={ student_01:"вң¶", student_02:"в—Һ", student_03:"в–І", student_04:"вқ„", student_05:"вҷҘ", student_06:"в—Ҷ" };
function fitText(t, maxW){ t=String(t||""); while(t.length>1 && ctx.measureText(t).width>maxW) t=t.slice(0,-1); return t; }
function dockBase(cx,cy,R){
  ctx.fillStyle="rgba(6,10,26,0.88)"; ctx.beginPath(); ctx.arc(cx,cy,R+5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#3a4470"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,R+5,0,Math.PI*2); ctx.stroke();
}
function dockKeycap(cx,y,letter,glow){
  ctx.fillStyle=glow?"#ffe066":"rgba(24,30,62,0.95)"; roundRect(cx-10,y-8,20,16,5); ctx.fill();
  ctx.strokeStyle=glow?"#fff3b0":"#5a6a9a"; ctx.lineWidth=1.5; roundRect(cx-10,y-8,20,16,5); ctx.stroke();
  ctx.fillStyle=glow?"#3a2f00":"#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(letter, cx, y+1);
}
function dockWeaponIcon(wid,cx,cy,size){
  try{
    const w=getWeapon(wid); if(!w||!w.assetId) return false;
    const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
    const iw=img.naturalWidth||1, ih=img.naturalHeight||1, k=Math.min(size/iw,size/ih);
    ctx.drawImage(img, cx-iw*k/2, cy-ih*k/2, iw*k, ih*k); return true;
  }catch(e){ return false; }
}
function dockLock(cx,cy,R){   // GENRE-EXPAND-1 В§1.3: лӘЁл“ң мһ кёҲ н‘ңмӢң
  ctx.fillStyle="rgba(8,10,26,0.62)"; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#dfe6ff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.fillText("рҹ”’", cx, cy+1);
}
function drawSkillDock(s){
  if(!s) return;
  const cy=685, R=21, cxZ=LOGW/2-96, cxX=LOGW/2, cxC=LOGW/2+96;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  // BIG-BATCH-1 A4: мҠӨнӮ¬лӘ… н…ҚмҠӨнҠё лқјлІЁ м ңкұ° вҖ” м•„мқҙмҪҳ лҸ…(л§ҒВ·кёҖлҰ¬н”„В·нӮӨмәЎ)л§ҢмңјлЎң м¶©л¶„, кёҖмһҗ мҶҢмқҢ м ңкұ°.

  // в”Җв”Җ Z: нғ„м°Ҫ л§Ғ в”Җв”Җ
  dockBase(cxZ,cy,R);
  if(s.infAmmo){
    ctx.strokeStyle="#ffd23f"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cxZ,cy,R,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#ffe066"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText("вҲһ", cxZ, cy+1);
  } else if(s.reloading){
    ctx.strokeStyle="rgba(255,210,77,0.95)"; ctx.lineWidth=4;
    if(s.reloadProg!=null){ ctx.beginPath(); ctx.arc(cxZ,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*clamp(s.reloadProg,0,1)); ctx.stroke(); }
    else { const a0=uiTime*5; ctx.beginPath(); ctx.arc(cxZ,cy,R,a0,a0+1.7); ctx.stroke(); }   // кІҢмҠӨнҠё: м§„н–үлҸ„ лҜёмҲҳмӢ  вҶ’ мҠӨн”јл„Ҳ
    ctx.fillStyle="#ffd24d"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText("мһҘм „", cxZ, cy+1);
  } else if(s.ammo!==undefined && s.mag){
    const n=s.mag, seg=Math.PI*2/n, gap=Math.min(0.14, seg*0.3);
    for(let i=0;i<n;i++){
      const a0=-Math.PI/2+i*seg+gap/2, a1=-Math.PI/2+(i+1)*seg-gap/2;
      ctx.strokeStyle = i<s.ammo ? (s.ammo<=2?"#ff8a8a":"#8fd0ff") : "rgba(255,255,255,0.13)";
      ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cxZ,cy,R,a0,a1); ctx.stroke();
    }
    if(!dockWeaponIcon(s.wid,cxZ,cy,26)){ ctx.fillStyle=s.ammo<=2?"#ff9a9a":"#eaf4ff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.fillText(String(s.ammo), cxZ, cy+1); }
  }
  if(s.zLocked) dockLock(cxZ,cy,R);
  dockKeycap(cxZ, cy+R+4, "Z", false);

  // в”Җв”Җ X: мҝЁнғҖмһ„ мҠӨмң• в”Җв”Җ
  dockBase(cxX,cy,R);
  const xMax=Math.max(0.1, s.xcdMax||8), xLeft=clamp((s.xc||0)/xMax,0,1), xReady=(s.xc||0)<=0;
  const glyph=SKILL_GLYPH_X[s.charId]||"X";
  if(xReady){
    const p=0.5+0.5*Math.sin(uiTime*6);
    ctx.fillStyle="rgba(120,220,130,0.22)"; ctx.beginPath(); ctx.arc(cxX,cy,R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(160,255,170,"+(0.55+0.45*p)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxX,cy,R+1,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#bfffc8"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText(glyph, cxX, cy+1);
  } else {
    // мӨҖл№„лҗң л§ҢнҒј мӢңкі„л°©н–ҘмңјлЎң м°ЁмҳӨлҘҙлҠ” л¶Җмұ„кјҙ
    ctx.fillStyle="rgba(120,220,130,0.20)";
    ctx.beginPath(); ctx.moveTo(cxX,cy); ctx.arc(cxX,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-xLeft)); ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#6fae77"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxX,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-xLeft)); ctx.stroke();
    ctx.globalAlpha=0.35; ctx.fillStyle="#bfffc8"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText(glyph, cxX, cy-4); ctx.globalAlpha=1;
    ctx.fillStyle="#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText((s.xc).toFixed(1), cxX, cy+11);
  }
  if(s.xLocked) dockLock(cxX,cy,R);
  dockKeycap(cxX, cy+R+4, "X", xReady && !s.xLocked);

  // в”Җв”Җ C: кіЁл“ң кІҢмқҙм§Җ л§Ғ в”Җв”Җ
  dockBase(cxC,cy,R);
  const cRatio=clamp((s.sg||0)/(s.superMax||100),0,1), cReady=cRatio>=1;
  ctx.strokeStyle="#2c3560"; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(cxC,cy,R,0,Math.PI*2); ctx.stroke();
  if(cRatio>0){
    ctx.strokeStyle=cReady?"#ffd23f":"#e8b93a"; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(cxC,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*cRatio); ctx.stroke();
  }
  if(cReady){
    const p=0.5+0.5*Math.sin(uiTime*8);
    ctx.strokeStyle="rgba(255,225,80,"+(0.4+0.6*p)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxC,cy,R+6,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#ffe066"; ctx.font="bold "+(18+Math.round(p*3))+"px 'Malgun Gothic',sans-serif"; ctx.fillText("вҳ…", cxC, cy+1);
  } else {
    ctx.fillStyle="#ffe066"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText(Math.floor(cRatio*100)+"%", cxC, cy+1);
  }
  if(s.cLocked) dockLock(cxC,cy,R);
  dockKeycap(cxC, cy+R+4, "C", cReady && !s.cLocked);
  ctx.restore();
}
// лЎңм»¬ н”Ңл Ҳмқҙмқҳ лӮҙ м „нҲ¬ мғҒнғң вҶ’ мҠӨнӮ¬ лҸ… кіөмҡ© нҳ•мӢқ
function localCombatStatus(){
  if(!player || !player.char) return null;
  const ch=player.char, w=getWeapon(player.weaponId||selectedWeaponId);
  return { ammo:player.ammo, mag:magSizeOf(player), reloading:!!player.reloading,
    reloadProg: player.reloading ? clamp(1-player.reloadTimer/Math.max(0.01,reloadTimeOf(player)),0,1) : null,
    infAmmo:!usesAmmo(player), sg:superGauge, superMax:GAME_CONFIG.superCharge,
    xc:Math.max(0,player.specialCd||0), xcdMax:(getAbility(ch.id).x||{}).cd||8,
    superName:ch.ultName||ch.superName, specialName:ch.specialName||"", toolName:w?w.name:"",
    charId:ch.id, wid:w?w.id:null,
    zLocked:!!(RULE&&RULE.id==="tag"), xLocked:!!(RULE&&RULE.id==="tag"&&ch.id==="student_06"), cLocked:!!(RULE&&RULE.id==="tag") };   // В§1.3 рҹ”’ вҖ” BIG-BATCH-2 P1: лі„кіЁл ҳ(нҢЁмӢңлёҢ)л§Ң X мһ кёҲ, лӮҳлЁём§ҖлҠ” лӘЁл“ң лҸ„кө¬
}
let _hudLineFor=null, _hudLine="";   // л§Өм№ҳ м •ліҙ мӨ„ мәҗмӢң(MATCHк°Җ л°”лҖ” л•Ңл§Ң мһ¬мЎ°лҰҪ)

  const mode=MATCH.mode;
  ctx.save();
  ctx.fillStyle="rgba(10,12,32,0.72)"; ctx.fillRect(0,0,LOGW,64);
  ctx.textBaseline="middle";
  ctx.textAlign="left";
  ctx.fillStyle="#7fd6ff"; ctx.font="bold 22px 'Malgun Gothic',sans-serif"; ctx.fillText(profile.nickname+" нҢҖ",24,22);

  if(_hudLineFor!==MATCH){ _hudLineFor=MATCH;
    _hudLine=getRule(selectedRuleId).name+" В· "+mode.name+" В· "+MATCH.map.name+" В· "+getDifficulty(selectedDifficultyId).name+" В· "+getCharacter(selectedCharacterId).name+" В· "+getWeapon(selectedWeaponId).name; }

  if(bossActive && enemy && !enemy.dead){

// UPDATE-1 P3-4: лӘЁл“ңлі„ мЎ°мһ‘ м•ҲлӮҙ л¬ёкө¬
function controlHintText(){
  const m=controlMode();
  if(m==="mouse") return "WASD мқҙлҸҷ В· л§Ҳмҡ°мҠӨ мЎ°мӨҖ В· мўҢнҒҙлҰӯ л°ңмӮ¬ В· мҡ°нҒҙлҰӯ X В· Space C В· R мһҘм „";
  if(m==="touch") return "мҷјмӘҪ мҠӨнӢұ мқҙлҸҷ В· мҳӨлҘёмӘҪ мҠӨнӢұ мЎ°мӨҖ+л°ңмӮ¬ В· м•„мқҙмҪҳ нғӯ X/C/мһҘм „";
  return "л°©н–ҘнӮӨ мқҙлҸҷ В· Z кіөкІ© В· X кё°мҲ  В· C к¶Ғк·№кё° В· R мһҘм „";
}
// UPDATE-1 P3: н”Ңл Ҳмқҙ мӨ‘ мЎ°мһ‘ мҳӨлІ„л Ҳмқҙ вҖ” л§Ҳмҡ°мҠӨ=нҒ¬лЎңмҠӨн—Өм–ҙ(м»Өм„ң мҲЁк№Җ), н„°м№ҳ=к°ҖмғҒ мЎ°мқҙмҠӨнӢұ
let _cursorHidden=false;
function drawControlOverlays(){
  const m=controlMode(), playing=inPlayState();
  const wantHide=(m==="mouse" && playing);
  if(wantHide!==_cursorHidden){ _cursorHidden=wantHide; try{ canvas.style.cursor=wantHide?"none":"default"; }catch(e){} }
  if(!playing) return;
  if(m==="mouse" && MOUSE.seen){
    ctx.save(); ctx.strokeStyle="rgba(255,240,170,0.9)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(MOUSE.x,MOUSE.y,9,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(MOUSE.x-14,MOUSE.y); ctx.lineTo(MOUSE.x-5,MOUSE.y); ctx.moveTo(MOUSE.x+5,MOUSE.y); ctx.lineTo(MOUSE.x+14,MOUSE.y);
    ctx.moveTo(MOUSE.x,MOUSE.y-14); ctx.lineTo(MOUSE.x,MOUSE.y-5); ctx.moveTo(MOUSE.x,MOUSE.y+5); ctx.lineTo(MOUSE.x,MOUSE.y+14); ctx.stroke();
    ctx.restore();
  } else if(m==="touch"){
    const stick=(anchor,vec,rad,color)=>{
      if(!anchor) return;
      ctx.globalAlpha=0.35; ctx.fillStyle="rgba(20,26,60,0.8)"; ctx.beginPath(); ctx.arc(anchor.x,anchor.y,rad,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.6; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(anchor.x,anchor.y,rad,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=0.85; ctx.fillStyle=color;
      ctx.beginPath(); ctx.arc(anchor.x+vec.x*rad*0.7, anchor.y+vec.y*rad*0.7, 18, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    };
    ctx.save();
    if(TOUCH.moveId!==null) stick(TOUCH.moveAnchor, TOUCH.moveVec, 60, "#7fd6ff");
    if(TOUCH.aimId!==null) stick(TOUCH.aimAnchor, TOUCH.aimVec, 70, "#ff9a9a");
    ctx.restore();
  }
}
function drawRespawnCountdown(f){
  if(!f.dead) return;
  if(!isFinite(f.respawnTimer)) return; // мҳҒмӣҗнһҲ л¶Җнҷңн•ҳм§Җ м•ҠлҠ” ліҙмҠӨлҠ” м№ҙмҡҙнҠёлӢӨмҡҙмқ„ н‘ңмӢңн•ҳм§Җ м•ҠмқҢ
  const secs=Math.ceil(f.respawnTimer);
  const base=f.team==="player"?MATCH.map.playerSpawn:MATCH.map.enemySpawn;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="rgba(0,0,0,0.45)"; ctx.beginPath(); ctx.arc(base.x,base.y,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.team==="player"?"#7fd6ff":"#c98bff"; ctx.font="bold 26px 'Malgun Gothic',sans-serif"; ctx.fillText(String(secs),base.x,base.y+1);
  ctx.fillStyle="#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText(f.name,base.x,base.y+38);
  ctx.restore();
}

/* м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): shadowBlurлҠ” мә”лІ„мҠӨ 2Dм—җм„ң к°ҖмһҘ л№„мӢј м—°мӮ°(л§Ө н”„л Ҳмһ„ лё”лҹ¬ нҢЁмҠӨ) вҖ” нҒ¬лЎ¬л¶Ғм—җм„ң мІҙк°җ л үмқҳ мЈјлІ”.
   кёҖлЎңмҡ° н…ҚмҠӨнҠёлҘј мҳӨн”„мҠӨнҒ¬лҰ° мә”лІ„мҠӨм—җ 1нҡҢл§Ң кө¬мӣҢ л‘җкі  drawImageлЎң мһ¬мӮ¬мҡ©н•ңлӢӨ.
   blur=0мңјлЎң л¶ҖлҘҙл©ҙ лҳҗл ·н•ң ліёл¬ёл§Ң кө¬мӣҢм ё, 'кёҖлЎңмҡ°(нҺ„мҠӨ м•ҢнҢҢ) + ліёл¬ё(л¶ҲнҲ¬лӘ…)' 2мһҘ н•©м„ұмқҙ кё°мЎҙ м—°м¶ңкіј лҸҷмқјн•ҳлӢӨ.
   н•ҳлӢҲмҠӨ(Node)м—җлҠ” document.createElementк°Җ м—Ҷм–ҙ null л°ҳнҷҳ вҶ’ нҳём¶ңл¶Җк°Җ кё°мЎҙ shadowBlur кІҪлЎңлЎң fallback. */
const _glowTextCache={};
function glowTextSprite(text, font, fill, glowColor, blur){
  const key=text+"|"+font+"|"+fill+"|"+glowColor+"|"+blur;
  if(key in _glowTextCache) return _glowTextCache[key];
  let cv=null;
  try{
    const m=document.createElement("canvas"), g=m.getContext("2d");
    g.font=font;
    const size=parseInt((font.match(/(\d+)px/)||[0,"20"])[1],10);
    const pad=blur*2+8, tw=Math.ceil(g.measureText(text).width);
    m.width=tw+pad*2; m.height=Math.ceil(size*1.6)+pad*2;
    g.font=font; g.textAlign="center"; g.textBaseline="middle";
    if(blur>0){ g.shadowColor=glowColor; g.shadowBlur=blur; }
    g.fillStyle=fill; g.fillText(text, m.width/2, m.height/2);
    cv=m;
  }catch(e){ cv=null; }
  _glowTextCache[key]=cv;
  return cv;
}
function drawTitle(y){
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";

function lerpAngle(a,b,t){ let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return a+d*t; }
/* мҳЁлқјмқёкёҙкёү P1: мҠӨлғ…мғ· нҺҳм–ҙ ліҙк°„ вҖ” 'мөңмӢ  1к°ңлҘј н–Ҙн•ң м§ҖмҲҳ lerp'лҠ” нҢЁнӮ· н•ҳлӮҳл§Ң лҠҰм–ҙлҸ„ м җн”„н•ңлӢӨ.
   лҸ„м°© мӢңкі„(dt лҲ„м Ғ вҖ” н•ҳлӢҲмҠӨ кІ°м •м„ұ мң м§Җ) кё°мӨҖмңјлЎң л ҢлҚ” мӢңм җмқ„ INTERP_DELAYл§ҢнҒј кіјкұ°м—җ л‘җкі 
   л‘җ мҠӨлғ…мғ· мӮ¬мқҙлҘј л“ұмҶҚ ліҙк°„, мөңмӢ  мҙҲкіјл¶„мқҖ 1.4нҢЁнӮ·к№Ңм§Җл§Ң мҶҢнҸӯ мҷёмӮҪ нӣ„ нҷҖл“ң. мӣҢл°Қм—…(лІ„нҚј<2)мқҖ кё°мЎҙ м§ҖмҲҳ lerp нҸҙл°ұ. */
const ONLINE_INTERP_DELAY = 0.12;
const RTC_INTERP_DELAY = 0.07;   // WebRTC(P2P) нҷңм„ұ мӢң лҚ” м§§мқҖ ліҙк°„ лІ„нҚј вҖ” м§Җм—°мқҙ лӮ®кі  мғҒнғңмңЁмқҙ лҶ’м•„ м•Ҳм „
function onlineSnapPush(buf, clock, s){ buf.push({ at:clock, s:s }); if(buf.length>4) buf.shift(); }
function onlineInterpTarget(buf, clock, pick, prev, dt){
  if(!buf.length) return prev;
  const rt=clock-(RTCNet.anyOpen()?RTC_INTERP_DELAY:ONLINE_INTERP_DELAY);   // P2P нҷңм„ұ мӢң ліҙк°„ м§Җм—° лӢЁм¶•(лҚ” мҰүк°Ғм Ғ)
  const newest=pick(buf[buf.length-1].s);
  if(!newest) return prev;
  if(buf.length<2 || rt<=buf[0].at){   // мӣҢл°Қм—…/мҠӨлғ…мғ· л¶ҖмЎұ вҖ” м§ҖмҲҳ lerp нҸҙл°ұ(кё°мЎҙ лҸҷмһ‘)
    if(!prev) return { x:newest.x, y:newest.y, facing:newest.facing||0 };
    const k=Math.min(1, dt*18);
    return { x:prev.x+(newest.x-prev.x)*k, y:prev.y+(newest.y-prev.y)*k, facing:lerpAngle(prev.facing, newest.facing||0, k) };
  }
  let a=buf[0], b=buf[buf.length-1];
  for(let i=buf.length-1;i>0;i--){ if(buf[i-1].at<=rt){ a=buf[i-1]; b=buf[i]; break; } }
  const pa=pick(a.s), pb=pick(b.s);
  if(!pa||!pb) return { x:newest.x, y:newest.y, facing:newest.facing||0 };
  const span=Math.max(0.001, b.at-a.at);
  let t=(rt-a.at)/span; if(t<0) t=0; if(t>1.4) t=1.4;
  return { x:pa.x+(pb.x-pa.x)*t, y:pa.y+(pb.y-pa.y)*t, facing:lerpAngle(pa.facing||0, pb.facing||0, Math.max(0,Math.min(1,t))) };
}
/* P1: мһҗкё° мәҗлҰӯн„° м—°мҶҚ нҷ”н•ҙ вҖ” 70px н•ҳл“ңмҠӨлғ…(=мҲңк°„мқҙлҸҷ мІҙк°җмқҳ м§Ғм ‘ м§Җм җ) м ңкұ°.
   мһ‘мқҖ мҳӨм°Ё(вүӨ6px)лҠ” л¬ҙмӢң(мҳҲмёЎ мһҗмңЁ), мӨ‘к°„ мҳӨм°ЁлҠ” мҙҲлӢ№ 4л°°мңЁ, нҒ° мҳӨм°Ё(90px+)лҠ” 9л°°мңЁлЎң л¶Җл“ңлҹҪкІҢ нқЎмҲҳ,
   лҰ¬мҠӨнҸ°/мӣҢн”„кёү(220px+)л§Ң мҰүмӢң мҠӨлғ…. мҳҲмёЎ-к¶Ңмң„ л¬јлҰ¬ м°Ёмқҙ(л‘”нҷ” л“ұ)лҸ„ лҹ¬лІ„л°ҙл”© м—Ҷмқҙ л…№м•„л“ лӢӨ. */
function onlineReconcile(pred, auth, dt){
  const ex=auth.x-pred.x, ey=auth.y-pred.y, er=Math.hypot(ex,ey);
  if(er>220){ pred.x=auth.x; pred.y=auth.y; return; }
  if(er>6){ const k=Math.min(1, dt*(er>90?9:4)); pred.x+=ex*k; pred.y+=ey*k; }
}

function handleOnlineMenuKey(code){
  if(code==="Escape"){ goToStartScreen(); return; }
  if(!OnlineManager.available) return; // м„Өм • м—Ҷмңјл©ҙ м•ҲлӮҙл§Ң(лҸҷмһ‘ м—ҶмқҢ)

  if(code==="ArrowUp"){ onlineMenuIndex=(onlineMenuIndex+n-1)%n; return; }
  if(code==="ArrowDown"){ onlineMenuIndex=(onlineMenuIndex+1)%n; return; }
  const cur=opts[onlineMenuIndex];
  // л§ө ліҖкІҪмқҖ л§ө н–үм—җм„ңл§Ң(м „м—ӯ м…Җл үн„° м ңкұ°) вҖ” PVEм—” м Ғмҡ©лҗҳм§Җ м•ҠмңјлҜҖлЎң лӢӨлҘё н–үм—җм„  л¬ҙлҸҷмһ‘
  if(code==="ArrowLeft"){ if(cur.kind==="map") cycleMap(-1); else if(cur.kind==="rule") cycleOnlineRule(-1); return; }
  if(code==="ArrowRight"){ if(cur.kind==="map") cycleMap(1); else if(cur.kind==="rule") cycleOnlineRule(1); return; }

    if(cur.kind==="create"){ if(cur.modeId==="online1v1") doCreateRoom(); else doCreateTeamRoom(cur.modeId); }
    else if(cur.kind==="map") cycleMap(1);
    else if(cur.kind==="rule") cycleOnlineRule(1);
    else if(cur.kind==="join") doJoinAny();
    else goToStartScreen();
  }
}

function onRoomMetaChanged(){
  const meta=OnlineManager.meta;
  if(!meta){
    // л°©мқҙ мў…лЈҢ/мӮӯм ңлҗЁ вҶ’ мҶҢн”„нҠёлқҪ л°©м§Җ: м•ҲлӮҙ нӣ„ мӢңмһ‘ нҷ”л©ҙмңјлЎң.
    // л°©мқҖ мқҙлҜё м„ңлІ„м—җм„ң мӮ¬лқјмЎҢмңјлҜҖлЎң DBм—җ лӢӨмӢң м“°м§Җ м•ҠлҠ”лӢӨ(localOnly=true вҶ’ мң л № л°© мһ¬мғқм„ұ л°©м§Җ).
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_PLAYING){ showToast("л°©мқҙ мў…лЈҢлҗҳм—ҲмҠөлӢҲлӢӨ"); OnlineManager.leaveRoom(true); goToStartScreen(); }
    return;
  }
  if(meta.status==="playing"){
    // лЎңл№„м—җм„ң мӢңмһ‘н•ҳкұ°лӮҳ, кІ°кіјнҷ”л©ҙ(ONLINE_OVER)м—җм„ң л°©мһҘмқҙ к°ҷмқҖ л°© мһ¬мӢңмһ‘н•ң кІҪмҡ° лӘЁл‘җ мІҳлҰ¬
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_OVER){
      if(isTeamOnline()) resetTeamMatchFromRoom(); else resetOnlineMatchFromRoom();
      confirmLeave=false;
      gameState=STATE.ONLINE_PLAYING;

    if(gameState===STATE.ONLINE_PLAYING || gameState===STATE.ONLINE_LOBBY){
      if(isTeamOnline()) tWinner = meta.winner || tWinner; else onlineWinner = meta.winner || onlineWinner;
      gameState=STATE.ONLINE_OVER;
    }
  }
}

function readLocalInput(){
  if(confirmLeave) return emptyInput();   // лӮҳк°Җкё° нҷ•мқё мӨ‘м—җлҠ” мқҙлҸҷ/кіөкІ©/кё°мҲ  мһ…л Ҙ л¬ҙмӢң
  // UPDATE-1 P3: м„ё мЎ°мһ‘ лӘЁл“ңлҘј к°ҷмқҖ нҢЁнӮ· нҳ•мӢқмңјлЎң вҖ” мҶҢмҠӨк°Җ лӢ¬лқјлҸ„ host нҢҗм • лЎңм§ҒмқҖ лҸҷмқј(лҸҷкё°нҷ” м•Ҳм „)
  const it=getLocalIntent();
  const a=myAimAngle(it);
  const kbPick=(keysDown.has("Digit1")||keysDown.has("Numpad1"))?0
             : (keysDown.has("Digit2")||keysDown.has("Numpad2"))?1
             : (keysDown.has("Digit3")||keysDown.has("Numpad3"))?2 : -1;
  return { up:it.my<-0.35, down:it.my>0.35, left:it.mx<-0.35, right:it.mx>0.35,   // кө¬нҳ• н•„л“ң(н•ҳмң„нҳёнҷҳВ·нҢҗлҸ…мҡ©)
           attack:!!it.fire,
           special:!!it.special||keysDown.has("KeyX"),      // X нҠ№мҲҳкё°мҲ (hostк°Җ edge нҢҗм •)
           ultimate:!!it.ult||keysDown.has("KeyC"),         // C к¶Ғк·№кё°(hostк°Җ edge нҢҗм •)
           super:false,                                     // кө¬лІ„м „ н•„л“ң(н•ҳмң„нҳёнҷҳ: hostк°Җ ultimate||superлЎң н•ҙм„қ)
           reload:!!it.reload||keysDown.has("KeyR"),
           pick: (it.pick>=0)?it.pick:kbPick,               // PVE к°•нҷ” 3нғқ1(host нҢҗм • В· н„°м№ҳлҠ” м№ҙл“ң нғӯ)
           mvx:Math.round(clamp(it.mx,-1,1)*10)/10, mvy:Math.round(clamp(it.my,-1,1)*10)/10,   // м•„лӮ лЎңк·ё мқҙлҸҷ(0.1 м–‘мһҗнҷ”)
           aim:(a===null)?null:Math.round(a*20)/20 };       // л¶„лҰ¬ мЎ°мӨҖк°Ғ(0.05rad м–‘мһҗнҷ” вҖ” м „мҶЎлҹү м Ҳм ң)
}
function sendMyInput(dt){

/* ---- м—…лҚ°мқҙнҠё ---- */
function updateOnline(dt){
  if(isTeamOnline()){ tUpdate(dt); return; }
  // hostлҠ” мһҗкё° мһ…л Ҙмқ„ лЎңм»¬м—җм„ң л°”лЎң м“°лҜҖлЎң DBм—җ м•Ҳ ліҙлғ„(лӮӯл№„ л°©м§Җ). guestл§Ң мһ…л Ҙмқ„ м „мҶЎ.
  if(OnlineManager.role==="guest") sendMyInput(dt);
  if(OnlineManager.role==="host") updateOnlineHost(dt);
  else updateOnlineGuest(dt);
  updateEffects(dt);
}
function updateOnlineHost(dt){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.guest && OnlineManager.players.guest.connected);
  const hi=readLocalInput();
  // мғҒлҢҖк°Җ лҒҠкІјмңјл©ҙ л§Ҳм§Җл§ү мһ…л Ҙмқҙ лӮЁм•„ мң л №мІҳлҹј кі„мҶҚ мӣҖм§Ғмқҙм§Җ м•ҠлҸ„лЎқ мһ…л Ҙмқ„ л№„мҡҙлӢӨ
  const gi = OnlineManager.opponentConnected ? (OnlineManager.onlineInput.guest || emptyInput()) : emptyInput();
  updateOnlineFighter(H, hi, dt);
  updateOnlineFighter(G, gi, dt);
  updateOnlineBullets(dt);
  tickSkillZones(dt, envOnline1v1());
  tickPowerupsHost(dt, [H, G]);
  onlineTimeLeft-=dt;
  H.displayHp=lerp(H.displayHp,H.hp,Math.min(1,dt*8)); G.displayHp=lerp(G.displayHp,G.hp,Math.min(1,dt*8));
  onlineWriteAcc+=dt;
  if(onlineWriteAcc>=1/ONLINE_STATE_FPS){ onlineWriteAcc=0; hostWriteOnlineState(); }
  if(onlineTimeLeft<=0){ onlineTimeLeft=0; hostEndOnlineMatch(); }
}
function updateOnlineGuest(dt){
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.host && OnlineManager.players.host.connected);
  const s=OnlineManager.onlineState;
  if(!s) return;
  // мғҲ мҠӨлғ…мғ·мқҙ лҸ„м°©н•ҳл©ҙ нғ„нҷҳ л·°лҘј л°ӣмқҖ к°’мңјлЎң к°ұмӢ (к¶Ңн•ңк°’ кё°мӨҖ ліҙм •) + нҺҳм–ҙ ліҙк°„ лІ„нҚј м Ғмһ¬(P1)
  onlineInterpClock+=dt;
  if(s !== onlineLastStateRef){
    onlineLastStateRef=s;
    onlineSnapPush(onlineSnapBuf, onlineInterpClock, s);
    onlineBulletsView=(s.bullets||[]).map(b=>({ x:b.x, y:b.y, vx:b.vx||0, vy:b.vy||0, r:b.r, c:b.c, o:b.o, w:b.w||null }));
  }
  // мҠӨлғ…мғ· мӮ¬мқҙм—җлҠ” нғ„нҷҳмқ„ мҶҚлҸ„лЎң мҷёмӮҪн•ҙ л¶Җл“ңлҹҪкІҢ м§„н–ү
  for(const b of onlineBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const ownSlot = (OnlineManager.role==="host") ? "host" : "guest";
  const oppSlot = (ownSlot==="host") ? "guest" : "host";

  // мғҒлҢҖ мәҗлҰӯн„°: мҠӨлғ…мғ· нҺҳм–ҙ ліҙк°„(P1 вҖ” нҢЁнӮ· м§Җм—°В·м§Җн„°м—җлҸ„ л“ұмҶҚмңјлЎң л§ӨлҒҲ)
  const op=s[oppSlot];
  if(op){
    if(!onlineRender[oppSlot] || op.dead || onlinePrevOppDead) onlineRender[oppSlot]={ x:op.x, y:op.y, facing:op.facing||0 };   // лҰ¬мҠӨнҸ° мІ« н”„л Ҳмһ„ мҠӨлғ…(мЈҪмқҖ мһҗлҰ¬м—җм„ң лҜёлҒ„лҹ¬м§җ л°©м§Җ)
    else onlineRender[oppSlot]=onlineInterpTarget(onlineSnapBuf, onlineInterpClock, function(ss){ return ss?ss[oppSlot]:null; }, onlineRender[oppSlot], dt);
    onlinePrevOppDead=op.dead;
  }

  // лӮҙ мәҗлҰӯн„°: лЎңм»¬ мһ…л ҘмңјлЎң мҰүмӢң мқҙлҸҷ(мҳҲмёЎ) + м—°мҶҚ нҷ”н•ҙ(P1 вҖ” 70px н•ҳл“ңмҠӨлғ…=мҲңк°„мқҙлҸҷ м ңкұ°)
  const mine=s[ownSlot];
  if(mine){
    if(!onlinePredict || mine.dead){
      const ch=getCharacter(mine.charId);
      onlinePredict={ x:mine.x, y:mine.y, facing:mine.facing||0, r:22, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove };
    } else {
      const inp=readLocalInput();
      predictMoveAim(onlinePredict, inp, dt);   // UPDATE-1 P3: мҳҲмёЎлҸ„ мқҳлҸ„ кіөмҡ©(м•„лӮ лЎңк·ё+л¶„лҰ¬ мЎ°мӨҖ)
      onlineReconcile(onlinePredict, mine, dt);
    }
  }

  // л°ңмӮ¬ мҳҲмёЎ: лӮҙ мҙқм•Ңмқ„ лЎңм»¬м—җм„ң мҰүмӢң ліҙм—¬мӨҖлӢӨ(мӢңк°Ғмҡ©; мӢӨм ң н”јн•ҙ нҢҗм •мқҖ нҳёмҠӨнҠёк°Җ н•Ё)
  onlinePredictCd -= dt;
  const myAmmoOk = !mine || mine.am===undefined || mine.am<0 || (!mine.rl && mine.am>0);  // нғ„м°Ҫ 0/мһҘм „мӨ‘мқҙл©ҙ мҳҲмёЎ л°ңмӮ¬ м•Ҳ н•Ё (P0: am<0=л¬ҙн•ңнғ„)
  if(onlinePredict && mine && !mine.dead && getLocalIntent().fire && onlinePredictCd<=0 && myAmmoOk){   // UPDATE-1 P3: лӘЁл“ң кіөмҡ© л°ңмӮ¬ мқҳлҸ„
    const w=getWeapon(selectedWeaponId), c=getCharacter(selectedCharacterId);
    const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
    const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
    const range=GAME_CONFIG.playerRange*w.rangeMul, radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
    for(let i=0;i<count;i++){
      let a=onlinePredict.facing; if(count>1) a=onlinePredict.facing-spread/2+spread*(i/(count-1));
      const mz=onlinePredict.r+6;
      onlinePredictBullets.push({ x:onlinePredict.x+Math.cos(a)*mz, y:onlinePredict.y+Math.sin(a)*mz,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, r:radius, c:w.color, w:w.id, traveled:0, maxRange:range, alive:true });
    }
    onlinePredictCd=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  }
  // мҳҲмёЎ мҙқм•Ң м§„н–ү/мҶҢл©ё(лІҪВ·мӮ¬кұ°лҰ¬В·мғҒлҢҖм—җ лӢҝмңјл©ҙ мӢңк°Ғм ҒмңјлЎң мӮ¬лқјм§җ)
  const oppPos=onlineRender[oppSlot];
  for(const b of onlinePredictBullets){
    if(!b.alive) continue;
    const sx=b.vx*dt, sy=b.vy*dt; b.x+=sx; b.y+=sy; b.traveled+=Math.hypot(sx,sy);
    if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; continue; }
    let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
    if(wall){ b.alive=false; continue; }
    if(oppPos && dist(b.x,b.y,oppPos.x,oppPos.y) < b.r+22){ b.alive=false; continue; }
    if(b.traveled>b.maxRange) b.alive=false;
  }
  onlinePredictBullets=onlinePredictBullets.filter(b=>b.alive);
}
function updateOnlineFighter(f, input, dt){

  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;

  tickMoaPassive(f, dt, envOnline1v1);

  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envOnline1v1());
  if(ult && !f._pUlt) castUltimateFor(f, envOnline1v1(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ
  applyIntentMoveAim(f, input, dt);                        // UPDATE-1 P3: м•„лӮ лЎңк·ё мқҙлҸҷ + л¶„лҰ¬ мЎ°мӨҖ(кө¬нҳ• л¶ҲлҰ¬м–ё н•ҳмң„нҳёнҷҳ)
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ fireOnlineWeapon(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}
// UPDATE-1 P3: кІҢмҠӨнҠё мһҗкё° мҳҲмёЎмҡ©(м¶©лҸҢ мқҙлҸҷл§Ң вҖ” moveEntity мӮ¬мҡ©, moveSpeed н”„лЎңнҚјнӢ° кё°л°ҳ)
function predictMoveAim(pr, inp, dt){
  let mx=0,my=0;
  const hasAnalog=(typeof inp.mvx==="number"||typeof inp.mvy==="number") && (Math.abs(inp.mvx||0)>0.01 || Math.abs(inp.mvy||0)>0.01);
  if(hasAnalog){ mx=clamp(inp.mvx||0,-1,1); my=clamp(inp.mvy||0,-1,1); }
  else { if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1; }
  const ml=Math.hypot(mx,my), hasAim=(typeof inp.aim==="number");
  if(ml>0.01){ if(ml>1){mx/=ml;my/=ml;} moveEntity(pr, mx*pr.moveSpeed*dt, my*pr.moveSpeed*dt); if(!hasAim) pr.facing=Math.atan2(my,mx); }
  if(hasAim) pr.facing=inp.aim;
}
// UPDATE-1 P3 кіөмҡ©: мһ…л Ҙ нҢЁнӮ· вҶ’ мқҙлҸҷВ·мЎ°мӨҖ. mvx/mvy(м•„лӮ лЎңк·ё)к°Җ мһҲмңјл©ҙ мҡ°м„ , м—Ҷмңјл©ҙ кө¬нҳ• л¶ҲлҰ¬м–ё.
// aim(лқјл””м•Ҳ)мқҙ мҳӨл©ҙ мЎ°мӨҖмқ„ мқҙлҸҷкіј л¶„лҰ¬(л§Ҳмҡ°мҠӨ/н„°м№ҳ л¬ҙл№ҷмғ·) вҖ” нӮӨліҙл“ң нҢЁнӮ·(aim=null)мқҖ кё°мЎҙмІҳлҹј мқҙлҸҷ л°©н–Ҙ.
function applyIntentMoveAim(f, input, dt){
  let mx=0,my=0;
  // м•„лӮ лЎңк·ё(mvx/mvy)к°Җ мӢӨм ң к°’мқј л•Ңл§Ң мӮ¬мҡ© вҖ” 0,0мқёлҚ° л¶ҲлҰ¬м–ёмқҙ м°ёмқё нҢЁнӮ·(мӢңл®¬В·кө¬нҳ• нҳјн•©)мқҖ л¶ҲлҰ¬м–ёмңјлЎң(UPDATE-1 нҳёнҷҳ мҲҳм •)
  const hasAnalog=(typeof input.mvx==="number"||typeof input.mvy==="number") && (Math.abs(input.mvx||0)>0.01 || Math.abs(input.mvy||0)>0.01);
  if(hasAnalog){ mx=clamp(input.mvx||0,-1,1); my=clamp(input.mvy||0,-1,1); }
  else { if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1; }
  const ml=Math.hypot(mx,my), hasAim=(typeof input.aim==="number");
  if(ml>0.01){
    if(ml>1){ mx/=ml; my/=ml; }
    moveEntity(f, mx*effSpeed(f)*dt, my*effSpeed(f)*dt);
    if(!hasAim) f.facing=Math.atan2(my,mx);
  }
  if(hasAim) f.facing=input.aim;
}
// в”Җв”Җ env м–ҙлҢ‘н„°: мҳЁлқјмқё 1v1(host нҢҗм •) в”Җв”Җ
function envOnline1v1(){
  return {
    foes(f){ const opp=f.slot==="host"?onlineFighters.guest:onlineFighters.host;
      return (opp && !opp.dead && opp.invincibleTimer<=0) ? [{e:opp,key:opp.slot,isBoss:false,isFighter:true}] : []; },
    allies(f){ return (f && !f.dead) ? [f] : []; },        // 1v1мқҖ мһҗкё° мһҗмӢ л§Ң(лӘЁм•„ C вҶ’ мһҗмӢ  нҡҢліө)

    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.owner=f.slot; onlineBullets.push(b); }
  };
}
function fireOnlineWeapon(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // н’ҖмҲІ: кіөкІ©н•ҳл©ҙ мһ мӢң л“ңлҹ¬лӮЁ
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6, bx=f.x+Math.cos(a)*mz, by=f.y+Math.sin(a)*mz;
    const b={ x:bx,y:by,vx:Math.cos(a)*spec.speed,vy:Math.sin(a)*spec.speed,r:spec.radius,damage:spec.damage,
      owner:f.slot,color:spec.color,alive:true,traveled:0,maxRange:spec.range,aid:aid,wid:spec.wid,wref:spec.wref,age:0,
      snipe:spec.snipe||0,stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    onlineBullets.push(b);
  }
}
function updateOnlineBullets(dt){
  for(const b of onlineBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=onlineFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      const target = b.owner==="host" ? onlineFighters.guest : onlineFighters.host;
      if(target && !target.dead && target.invincibleTimer<=0 && dist(b.x,b.y,target.x,target.y)<b.r+target.r){
        if(b.boomerang){
          const hm=(b.phase==="out")?b.hitO:b.hitB;
          if(!hm[target.slot]){ hm[target.slot]=true;
            applyOnlineDamage(target,bulletHitDamage(b,target),b.owner,b.isSuper,b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color); }
          continue;                                        // л¶Җл©”лһ‘мқҖ кҙҖнҶө(ліөк·Җ нғҖкІ©)
        }
        if(b.ultCid && !canUltDamage(b.ultCid, target.slot, b.ultMaxHits||4)){ b.alive=false; break; }  // лҹӯнӮӨ C: к°ҷмқҖ лҢҖмғҒ мөңлҢҖ н”јн•ҙ мғҒн•ң(лЎңм»¬кіј лҸҷмқј)
        applyOnlineDamage(target, bulletHitDamage(b,target), b.owner, b.isSuper, b.aid);
        if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
        spawnHitFx(b.x,b.y,b.wid,b.color);
        b.alive=false; break;
      }
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  onlineBullets=onlineBullets.filter(b=>b.alive);
  if(onlineBullets.length>40) onlineBullets=onlineBullets.slice(onlineBullets.length-40); // DB payload м ңн•ң
}
function applyOnlineDamage(target, dmg, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0) return;
  dmg=incomingDamage(target, dmg);                        // л°©нҢЁ/м§ҲмЈј к°җмҶҢ(мөңмҶҢ 1)
  target.hp-=dmg; target.hitFlash=0.15;
  // кё°ліё кіөкІ©(Z)л§Ң к¶Ғк·№кё° кІҢмқҙм§Җ м¶©м „ вҖ” attackIdлӢ№ к°ҷмқҖ лҢҖмғҒ мөңлҢҖ 1нҡҢ(=20)
  const attacker = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    const killer = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
    if(killer) killer.score+=1;
  }
}

function drawOnlineBullet(b){

// лӮҙ мәҗлҰӯн„° мӢқлі„ н‘ңмӢң: л°қмқҖ нҺ„мҠӨ л§Ғ + лЁёлҰ¬ мң„ нҷ”мӮҙн‘ң + "лӮҳ". (мӮ¬лһҢмқҙ л§Һм•„лҸ„ лӮҙ кІғмқҙ ліҙмқҙкІҢ)
function drawSelfMarker(x,y,r){

  ctx.fillStyle="#173a17"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("лӮҳ", x, ay-5+bob);

}

  const sm=GAME_CONFIG.superCharge;

    reloading:reloading, sg:sg||0, superMax:sm, xc:Math.max(0,xc||0), lives:(lives===undefined||lives===null||lives<0)?null:lives,
    infAmmo:(ch.id==="student_01"),   // v1.21 лҹӯнӮӨ нҢЁмӢңлёҢ: HUDм—җ вҲһ н‘ңмӢң

    charId:ch.id, wid:getWeaponForCharacter(ch.id), xcdMax:(getAbility(ch.id).x||{}).cd||8 });   // QUALITY-SWEEP-1: мҠӨнӮ¬ лҸ…мҡ©

      return pack(f.char, f.ammo, !!f.reloading, f.superGauge, f.specialCd, f.lives); }

  }

function tSpawnPos(base, idx){ const off=[[0,0],[64,-54],[-64,54],[64,54],[-64,-54],[0,78]]; const o=off[idx%off.length]; return { x:base.x+o[0], y:base.y+o[1] }; }

function tMakeFighter(slot, team, characterId, weaponId, isBot, idx, map){
  const lo=sanitizeLoadout(characterId, weaponId);   // л„ӨнҠёмӣҢнҒ¬/м ҖмһҘ к°’мқҙ мһҳлӘ»лҸјлҸ„ н•ҷмғқ мәҗлҰӯн„° + кі м • л¬ҙкё°лЎң көҗм •
  const ch=getCharacter(lo.characterId);
  const base = (team==="red") ? map.enemySpawn : map.playerSpawn;
  const arr = (team==="red") ? map.enemySpawns : map.playerSpawns;   // мҲ лһҳ: к°ңмқё мӢңмһ‘м җ л¶„мӮ°(мҳЁлқјмқё)
  const p = arr ? arr[idx%arr.length] : tSpawnPos(base, idx);
  const sp=findClearSpawn(p.x,p.y,22);
  const maxHp=GAME_CONFIG.playerMaxHp*ch.hpMul;
  const f={ slot:slot, team:team, isBot:!!isBot, char:ch, weaponId:lo.weaponId,
    name:ch.name, color:ch.color, subColor:ch.subColor,
    x:sp.x, y:sp.y, spawnX:base.x, spawnY:base.y, r:22, facing: team==="red"?Math.PI:0,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul,
    cooldown:0, score:0, dead:false, respawnTimer:0, invincibleTimer:0, hitFlash:0,
    reloading:false, reloadTimer:0, superGauge:0, specialCd:0,
    ai:{ fireTimer:rand(0,0.5), strafeDir:1, strafeTimer:0, reTimer:0, stuckTimer:0, stuckDir:1 } };
  // мӢӨм ң н”Ңл Ҳмқҙм–ҙл§Ң нғ„м°Ҫ мӮ¬мҡ©(лҙҮмқҖ л¬ҙн•ң). к¶Ғк·№кё° кІҢмқҙм§ҖлҠ” лӘЁл‘җ ліҙмң (лҙҮмқҖ лҜёмӮ¬мҡ©).
  f.ammo = isBot?undefined:magSizeOf(f);
  // PRD 12.2 нҳ‘лҸҷ PVE к°ңмқё лӘ©мҲЁ(ліҙнҶө лӮңмқҙлҸ„ 5к°ң кё°мӨҖ вҖ” PVE л°©м—җ лӮңмқҙлҸ„ м„ нғқмқҙ мғқкё°л©ҙ 7/5/3 м—°лҸҷ)
  if(team==="pve") f.lives=PVE_LIVES_START;
  return f;
}
const PVE_LIVES_START=5;   // PRD 12.2: мү¬мӣҖ7/ліҙнҶө5/м–ҙл ӨмӣҖ3 вҖ” нҳ„мһ¬ ліҙнҶө кі м •

/* в”Җв”Җ PVE к°ңмқё к°•нҷ”(PRD 13.2): мҠӨн…Ңмқҙм§Җ мў…лЈҢ нӣ„ л¬ҙмһ‘мң„ 3к°ң мӨ‘ 1к°ң м„ нғқ в”Җв”Җ
   нҳ„мһ¬ лҹ°м—җм„ңл§Ң мң м§Җ(кі„м • м ҖмһҘ м—ҶмқҢ). мғҒн•ңмқҖ max мҠӨнғқмңјлЎң к°•м ң(к°җмҶҢлҘҳлҠ” PRD мғҒн•ңкіј мқјм№ҳ).
   ліҙмҠӨ(5В·10В·15) нҶөкіј нӣ„м—җлҠ” 'нқ¬к·Җ к°•нҷ”' = к°ҷмқҖ к°•нҷ” 2мҠӨнғқ(мғҒн•ң лӮҙ) 1нҡҢ м„ нғқ(PRD 15.6). */
const PVE_UPGRADES=[
  { id:"atk",    name:"кіөкІ© л¬јм•Ҫ", desc:"Z н”јн•ҙ +8%",              max:5 },
  { id:"aspd",   name:"л№ лҘё мҶҗ",   desc:"кіөкІ© к°„кІ© 6% к°җмҶҢ",        max:5 },
  { id:"bspd",   name:"нғ„нҷҳ к°ҖмҶҚ", desc:"нғ„мҶҚ +8%",                max:5 },
  { id:"range",  name:"л©ҖлҰ¬л©ҖлҰ¬",  desc:"мӮ¬кұ°лҰ¬ +8%",              max:4 },
  { id:"hp",     name:"нҠјнҠј л¬јм•Ҫ", desc:"мөңлҢҖ мІҙл Ҙ +10",           max:5 },
  { id:"def",    name:"л°©м–ҙ л¬јм•Ҫ", desc:"л°ӣлҠ” н”јн•ҙ 6% к°җмҶҢ",        max:5 },
  { id:"mspd",   name:"л№ лҘё л°ң",   desc:"мқҙлҸҷмҶҚлҸ„ +5%",            max:4 },
  { id:"reload", name:"л№ лҘё мһҘм „", desc:"мһҘм „мӢңк°„ 10% к°җмҶҢ",        max:4 },
  { id:"xcd",    name:"л°ҳм§қ мӢңкі„", desc:"X мҝЁнғҖмһ„ 6% к°җмҶҢ",         max:5 },
  { id:"bsize",  name:"нҒ° нғ„нҷҳ",   desc:"нғ„нҷҳ нҒ¬кё° +8%",           max:4 },
  { id:"regen",  name:"нҡҢліө лі„",   desc:"мҠӨн…Ңмқҙм§Җ мӢңмһ‘ мӢң мІҙл Ҙ 15 нҡҢліө", max:3 },
  // лҢҖмІҙ нӣ„ліҙ(PRD 19.4: м„ё нӣ„ліҙк°Җ лӘЁл‘җ мғҒн•ңмқј л•Ң) вҖ” л¬ҙмһ‘мң„ н’Җм—җм„ңлҠ” м ңмҷё(max 0)
  { id:"healnow", name:"мІҙл Ҙ нҡҢліө", desc:"мҰүмӢң мөңлҢҖ мІҙл Ҙмқҳ 30% нҡҢліө", max:0 },
  { id:"ammonow", name:"нғ„м°Ҫ мҷ„м¶©", desc:"мҰүмӢң нғ„м°Ҫмқ„ к°Җл“қ мұ„мӣҖ",     max:0 }
];
function pveUpgradeDef(id){ for(const u of PVE_UPGRADES){ if(u.id===id) return u; } return PVE_UPGRADES[0]; }
function upgStacks(f,id){ return (f && f.upg && f.upg[id])||0; }
// к°•нҷ” м Ғмҡ©(нҳёмҠӨнҠё нҢҗм •). rare=2мҠӨнғқ(мғҒн•ң лӮҙ). м Ғмҡ©лҗң к°•нҷ” мқҙлҰ„ л°ҳнҷҳ.
function tPveApplyUpgrade(f, uid, rare){
  const def=pveUpgradeDef(uid);
  if(uid==="healnow"){ f.hp=Math.min(f.maxHp, f.hp+f.maxHp*0.3); return def.name; }
  if(uid==="ammonow"){ if(usesAmmo(f)){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } return def.name; }
  if(!f.upg) f.upg={};
  const n=rare?2:1;
  for(let i=0;i<n;i++){
    if((f.upg[uid]||0)>=def.max) break;
    f.upg[uid]=(f.upg[uid]||0)+1;
    if(uid==="hp"){ f.maxHp+=10; f.hp=Math.min(f.maxHp, f.hp+10); }
  }
  return def.name;
}
// мҠӨн…Ңмқҙм§Җ нҒҙлҰ¬м–ҙ вҶ’ нҷңм„ұ н”Ңл Ҳмқҙм–ҙлі„ нӣ„ліҙ 3к°ң мғқм„ұ(мғҒн•ң лҸ„лӢ¬ к°•нҷ” м ңмҷё, л¶ҖмЎұн•ҳл©ҙ лҢҖмІҙ нӣ„ліҙ)
function tPveOfferUpgrades(rare){
  tPve.upg={};
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    const pool=PVE_UPGRADES.filter(u=>u.max>0 && upgStacks(f,u.id)<u.max).map(u=>u.id);
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
    const c=pool.slice(0,3);
    while(c.length<3) c.push(c.length%2===0?"healnow":"ammonow");
    tPve.upg[s]={ c:c, r:rare?1:0, picked:false, pi:-1 };
  }
}
// м „нҲ¬ кі„мӮ° нӣ…(к°•нҷ” м—Ҷмңјл©ҙ 1.0 вҖ” PVE мҷё лӘЁл“ңлҠ” upgк°Җ м—Ҷм–ҙ мҳҒн–Ҙ 0)
function zCooldownOf(f,w){
  let c=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  const u=upgStacks(f,"aspd"); if(u) c*=Math.max(0.7,1-0.06*u);
  c*=atkSlowFactor(f);                                              // лҲҲкҪғ м„ңлҰ¬ мЎҙ: кіөкІ© к°„кІ© +40%
  const g=growthOf(f,"aspd"); if(g) c*=Math.max(0.6,1-GROWTH.aspdPct*g);   // GAMEPLAY-1 м„ұмһҘ: кіөмҶҚ +8%/мҠӨнғқ
  return c;
}
// лҲҲкҪғ м„ңлҰ¬ мЎҙ кіөмҶҚ л‘”нҷ” кі„мҲҳ(лӘЁл“  лӘЁл“ң кіөмҡ©)
function atkSlowFactor(f){ return (f && f.atkSlowTimer>0)?(f.atkSlowMul||1.4):1; }
// GAMEPLAY-1 м„ұмһҘ мҠӨнғқ(лІ„н”„ мҳӨлёҢ): f.growth={aspd,atk,hp}
function growthOf(f,k){ return (f && f.growth && f.growth[k])||0; }

function tBuildFighters(){
  const meta=OnlineManager.meta||{}, mode=getOnlineMode(meta.mode), map=getMap(tMapId);
  OBSTACLES=map.obstacles; BUSHES=map.bushes;
  tFighters={};
  const players=OnlineManager.players||{};
  let blueIdx=0, redIdx=0;
  // 1) м ‘мҶҚн•ң мӢӨм ң н”Ңл Ҳмқҙм–ҙ
  for(let i=1;i<=mode.maxPlayers;i++){
    const slot="p"+i, p=players[slot];
    if(p && p.connected!==false){
      let team=p.team || (i%2===1?"blue":"red");
      const idx = team==="red"?redIdx++:blueIdx++;
      tFighters[slot]=tMakeFighter(slot, team, p.characterId, p.weaponId, false, idx, map);
    }
  }
  // 2) hostл§Ң л№ҲмһҗлҰ¬лҘј AI лҙҮмңјлЎң мұ„мҡҙлӢӨ(3лҢҖ3 PVP)
  if(OnlineManager.role==="host" && mode.modeType==="pvp"){
    for(let i=1;i<=mode.maxPlayers;i++){
      const slot="p"+i; if(tFighters[slot]) continue;
      const blueCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="blue").length;
      const redCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="red").length;
      let team=null;
      if(blueCount<3 && (blueCount<=redCount || redCount>=3)) team="blue";
      else if(redCount<3) team="red";
      if(!team) continue;
      const idx = team==="red"?redIdx++:blueIdx++;
      const botChar = STUDENT_CHARACTERS[i%STUDENT_CHARACTERS.length];   // лҙҮлҸ„ н•ҷмғқ 6мў…л§Ң + кі м • л¬ҙкё°
      tFighters[slot]=tMakeFighter(slot, team, botChar.id, null, true, idx, map);
    }
  }
}

function tNearestEnemyFighter(f){
  let best=null, bd=Infinity;
  for(const slot in tFighters){ const o=tFighters[slot]; if(o.dead||o.team===f.team) continue;
    const d=dist(f.x,f.y,o.x,o.y); if(d<bd){bd=d; best=o;} }
  return best;
}

function tSendInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  tInputAcc+=dt;
  const btn=onlineInputBtnSig(inp), btnChanged=(btn!==tLastInputBtn);
  if(btnChanged || (str!==tLastInputStr && tInputAcc>=ONLINE_INPUT_MIN_IV) || tInputAcc>=ONLINE_INPUT_KEEPALIVE){
    tLastInputStr=str; tLastInputBtn=btn; tInputAcc=0; OnlineManager.writeInput(inp);   // P1: лІ„нҠј мҰүмӢңВ·м•„лӮ лЎңк·ё 20Hz мәЎ
  }
}
