   무기는 독립 선택값이 아니라 캐릭터의 defaultWeaponId에서 계산한다. */

function isStudentCharacter(id){ return STUDENT_CHARACTERS.some(c=>c.id===id); }
function getWeaponForCharacter(charId){
  const ch=getCharacter(charId);
  return (ch && ch.defaultWeaponId) ? ch.defaultWeaponId : "tool_01";
}
// 외부(저장값/네트워크)에서 온 캐릭터/무기 id 교정: 학생 6종 + 고정 무기만 허용
function sanitizeCharacterId(id){ return isStudentCharacter(id) ? id : "student_01"; }
function sanitizeLoadout(charId, weaponId){
  const cid=sanitizeCharacterId(charId);
  return { characterId:cid, weaponId:getWeaponForCharacter(cid) };   // weaponId 인자는 무시하고 고정 무기로 교정
}

/* =======================================================================
   ★ 에셋 교체 준비 구조 (오늘은 placeholder만, 내일 PNG를 넣으면 자동 사용) ★
   -----------------------------------------------------------------------
   동작 원리:
   - ASSETS_ENABLED 가 false 면 이미지를 아예 불러오지 않습니다(404·콘솔오류 없음).
     → 오늘은 기존 도형(Canvas) 렌더링이 그대로 쓰입니다.
   - 내일 PNG 파일을 assets/ 아래에 넣고 ASSETS_ENABLED=true 로 바꾸면,
     파일이 있는 캐릭터/도구만 이미지로 그려지고, 없으면 도형으로 fallback 됩니다.
   - 온라인 동기화에는 이미지가 들어가지 않습니다(캐릭터/도구 id만 전송 → assetId는 id로 역산).
   ======================================================================= */
// 내일 교사가 PNG를 넣은 뒤 true 로만 바꾸면 됩니다. (오늘은 false 유지)
let ASSETS_ENABLED = true;
const ASSET_BASE = "assets/";

// 캐릭터 에셋 파일 이름 규칙(1차 적용: 상태별 5프레임). 없는 파일은 자동으로 fallback.
// idle 대기 / move 이동 / attack 공격(도구 든 모습) / hit 피격 / return 리턴·탈락
const CHAR_ASSET_KEYS = ["idle","move","attack","hit","return"];
// 도구(무기) 에셋 파일 이름 규칙.
const WEAPON_ASSET_KEYS = ["icon","projectile","effect_hit"];

// 경로만 만들어 두는 함수. (파일 존재 여부와 무관 — 로더가 실패 시 fallback 처리)
function charAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"characters/"+assetId+"/"+key+".png") : null; }
function weaponAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"weapons/"+assetId+"/"+key+".png") : null; }

// 그 외(타일/장애물/풀숲/UI) 경로 모음 — 내일 확장용. 오늘은 사용처에서 호출하지 않음.
const ASSET_MANIFEST = {
  tiles:     { ground_basic:ASSET_BASE+"tiles/ground_basic.png", ground_path:ASSET_BASE+"tiles/ground_path.png", capture_zone:ASSET_BASE+"tiles/capture_zone.png" },
  obstacles: { block_01:ASSET_BASE+"obstacles/block_01.png", crystal_01:ASSET_BASE+"obstacles/crystal_01.png", cushion_wall:ASSET_BASE+"obstacles/cushion_wall.png" },
  bushes:    { bush_01:ASSET_BASE+"bushes/bush_01.png", bush_02:ASSET_BASE+"bushes/bush_02.png" },
  ui:        { icon_hp:ASSET_BASE+"ui/icon_hp.png", icon_attack:ASSET_BASE+"ui/icon_attack.png", icon_speed:ASSET_BASE+"ui/icon_speed.png", icon_super:ASSET_BASE+"ui/icon_super.png" }
};

// 이미지 캐시. 상태: undefined=미시도, Image(complete&&naturalWidth>0)=성공, null=실패(파일 없음)
const _imageCache = {};
function _loadImage(path){
  if(path==null) return;
  if(path in _imageCache) return;
  // 브라우저가 아니거나(헤드리스 테스트) Image가 없으면 시도하지 않음 → fallback
  if(typeof Image === "undefined"){ _imageCache[path]=null; return; }
  try{
    const img=new Image();
    img.onload=function(){ _imageCache[path]=(img.naturalWidth>0)?img:null; };
    img.onerror=function(){ _imageCache[path]=null; }; // 파일 없음 → 조용히 fallback
    img.src=path;
    _imageCache[path]=undefined; // 로딩 중
  }catch(e){ _imageCache[path]=null; }
}
// 사용 가능한(로드 성공) 이미지면 반환, 아니면 null(→ fallback 도형 사용)
function _readyImage(path){
  if(!ASSETS_ENABLED || path==null) return null;
  const v=_imageCache[path];
  if(v===undefined){ return null; }     // 아직 로딩 중 → 이번 프레임은 fallback
  return v || null;
}
function getCharImage(assetId, key){ return _readyImage(charAssetPath(assetId, key)); }
function getWeaponImage(assetId, key){ return _readyImage(weaponAssetPath(assetId, key)); }

// 모든 학생 에셋을 미리 불러오기 시도. ASSETS_ENABLED=false 면 아무것도 하지 않음(오늘).
function loadGameAssets(){
  if(!ASSETS_ENABLED) return;
  for(const c of STUDENT_CHARACTERS){ if(!c.assetId) continue; for(const k of CHAR_ASSET_KEYS) _loadImage(charAssetPath(c.assetId,k)); }
  for(const w of STUDENT_WEAPONS){ if(!w.assetId) continue; for(const k of WEAPON_ASSET_KEYS) _loadImage(weaponAssetPath(w.assetId,k)); }
  // PVE 몬스터/보스 본체 1장(assets/monsters/<type>.png) — 없으면 도형 fallback(PRD 17.4~17.6)
  try{ for(const t in PVE_ENEMY_TYPES) _loadImage(ASSET_BASE+"monsters/"+t+".png"); }catch(e){}
  // 월드(지형/구조물/함정/아이템/타일) — 코덱스 제작본. 없으면 도형 fallback.
  try{ for(const k in WORLD_ASSETS) _loadImage(ASSET_BASE+WORLD_ASSETS[k]); }catch(e){}
}
function getMonsterImage(type){ return _readyImage(ASSET_BASE+"monsters/"+type+".png"); }
const WORLD_ASSETS={
  ob_crystal:"obstacles/crystal_01.png", ob_box:"obstacles/block_01.png", ob_rock:"obstacles/rock_01.png",
  bush:"bushes/bush_01.png",
  trap_damage:"traps/spike.png", trap_slow:"traps/slow.png", ice_field:"traps/ice_field.png",
  st_gate:"obstacles/monster_gate.png", st_wall:"obstacles/cushion_wall.png",   /* v1.22 구조물(코덱스 world 배치분) */
  heal_pickup:"pickups/heal.png",
  tile_floor:"tiles/ground_basic.png"
};
function worldImage(key){ return ASSETS_ENABLED ? _readyImage(ASSET_BASE+WORLD_ASSETS[key]) : null; }

// 상태 → 프레임 키. 우선순위: 리턴 > 피격 > 공격 > 이동 > 대기
function frameKeyFor(opts){
  if(opts.ko) return "return";
  if(opts.hit) return "hit";
  if(opts.attacking) return "attack";
  if(opts.moving) return "move";
  return "idle";
}
// 캐릭터 스프라이트 그리기(성공 시 true). 실패하면 false → 호출부가 fallback 도형을 그림.
// ctx는 이미 translate(x,y) 된 상태로 호출한다(기존 fallback과 동일 좌표계).
function drawCharacterSprite(charId, r, facing, opts){
  opts=opts||{};
  if(!ASSETS_ENABLED) return false;
  const ch=getCharacter(charId); if(!ch || !ch.assetId) return false;
  let img=getCharImage(ch.assetId, frameKeyFor(opts));
  if(!img) img=getCharImage(ch.assetId, "idle");   // 요청 프레임 없으면 idle로
  if(!img) return false;
  // 슬라이서가 캐릭터별 5프레임을 같은 캔버스·가로중앙·발(하단) 기준으로 정렬해 저장한다.
  // 그래서 높이 고정 + 가로중앙 + 발 기준으로 그리면 프레임이 바뀌어도 크기/위치가 안 튄다.
  const iw=img.naturalWidth||img.width||1, ih=img.naturalHeight||img.height||1;
  const dh=r*3.2, dw=dh*(iw/ih);   // 높이 고정, 가로는 원본 비율(공격 효과는 좌우로 뻗음, 캔버스가 대칭이라 안 잘림)
  const footY=r*0.95;              // 발이 닿는 기준선(충돌원 하단 부근) → 모든 프레임 동일
  // 왼쪽을 바라보면 좌우 반전(공격 방향이 자연스럽게). 원본 디자인은 그대로.
  const flip = (facing!=null) && (Math.cos(facing) < 0);
  ctx.save(); if(flip) ctx.scale(-1,1); ctx.drawImage(img, -dw/2, footY-dh, dw, dh); ctx.restore();
  return true;
}
// 렌더 위치 변화로 "이동 중" 추정(walk/idle 모션 선택용). ASSETS_ENABLED=false 면 호출되지 않음.
const _spriteLastPos={};
function spriteMoving(key,x,y){ const p=_spriteLastPos[key]; let moving=false; if(p){ const dx=x-p.x,dy=y-p.y; moving=(dx*dx+dy*dy)>0.25; } _spriteLastPos[key]={x:x,y:y}; return moving; }

// 탄환(발사체) 스프라이트. 성공 시 true.
function drawProjectileSprite(weaponId, x, y, r, facing){
  if(!ASSETS_ENABLED || !weaponId) return false;
  const w=getWeapon(weaponId); if(!w || !w.assetId) return false;
  const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
  const sz=r*3;
  ctx.save(); ctx.translate(x,y); if(facing!=null) ctx.rotate(facing); ctx.drawImage(img,-sz/2,-sz/2,sz,sz); ctx.restore();
  return true;
}

/* =======================================================================
   캔버스 / 화면 크기
   ======================================================================= */
const LOGW = 1280, LOGH = 720;                 // 고정 논리 좌표
const ARENA = { x:24, y:70, w:1232, h:576 };   // 전투 영역(위/아래는 정보줄)
const canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");   // 정적 월드 레이어 프리렌더 시 잠깐 오프스크린으로 교체(v1.21 성능)

function resizeCanvas(){
  // v1.21 성능: 고DPI(크롬북 2x)에서 픽셀 수가 4배가 되어 렉의 주원인 — 1.5로 상한
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  const ww = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(ww/LOGW, wh/LOGH);            // 16:9 유지하며 최대 크기
  const cssW = Math.max(1, Math.floor(LOGW*scale));
  const cssH = Math.max(1, Math.floor(LOGH*scale));
  canvas.style.width = cssW+"px";
  canvas.style.height = cssH+"px";
  canvas.width = Math.floor(cssW*dpr);                 // 고해상도 대응
  canvas.height = Math.floor(cssH*dpr);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* =======================================================================
   수학 / 충돌 도우미
   ======================================================================= */
function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a+(b-a)*t; }
function deg2rad(d){ return d*Math.PI/180; }

function circleRectOverlap(cx,cy,r,R){
  const nx = clamp(cx, R.x, R.x+R.w);
  const ny = clamp(cy, R.y, R.y+R.h);
  const dx = cx-nx, dy = cy-ny;
  return (dx*dx+dy*dy) < (r*r);
}

/* =======================================================================
   현재 맵 데이터 (시작 시 선택 맵으로 채워진다)
   ======================================================================= */
let OBSTACLES = MAPS[0].obstacles;
let BUSHES = MAPS[0].bushes;

// 장애물과 겹치지 않는 안전한 위치를 (x,y) 근처에서 찾는다.
function findClearSpawn(x, y, r){
  x = clamp(x, ARENA.x+r, ARENA.x+ARENA.w-r);
  y = clamp(y, ARENA.y+r, ARENA.y+ARENA.h-r);
  const isClear = (px,py)=>{
    for(const o of OBSTACLES){ if(circleRectOverlap(px,py,r,o)) return false; }
    return true;
  };
  if(isClear(x,y)) return { x, y };
  // 점점 넓은 원으로 주변을 탐색
  for(let radius=24; radius<=280; radius+=22){
    for(let a=0; a<Math.PI*2; a+=Math.PI/8){
      const px = clamp(x+Math.cos(a)*radius, ARENA.x+r, ARENA.x+ARENA.w-r);
      const py = clamp(y+Math.sin(a)*radius, ARENA.y+r, ARENA.y+ARENA.h-r);
      if(isClear(px,py)) return { x:px, y:py };
    }
  }
  return { x, y }; // 최후의 수단
}

const PROFILE_KEY = "starArena.profile.v2";

const PLAYER_PROFILE_DEFAULT = {
  nickname: "플레이어",
  gold: 0,
  wins: 0, losses: 0, draws: 0,
  totalPlays: 0, totalKills: 0, bossKills: 0,
  selectedCharacterId: "student_01",
  selectedWeaponId: "tool_01",

  selectedModeId: "solo",
  // 기본 해금 = 학생 6슬롯(캐릭터/도구). 보존 캐릭터·무기는 상점에서 추가 해금 가능.
  unlockedCharacters: STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id),
  unlockedWeapons: STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id),
  lastUpdated: 0
};
const DEFAULT_UNLOCKED_CHARACTERS = STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id);
const DEFAULT_UNLOCKED_WEAPONS = STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id);

let profile = null;

// 기본값과 합쳐서 빠진 항목이 있어도 안전하게 만든다.
function mergeProfile(saved){
  const p = {};
  for(const key in PLAYER_PROFILE_DEFAULT){ p[key] = PLAYER_PROFILE_DEFAULT[key]; }
  if(saved && typeof saved === "object"){
    for(const key in PLAYER_PROFILE_DEFAULT){
      if(saved[key] !== undefined && saved[key] !== null) p[key] = saved[key];
    }
  }
  // 배열/선택값 무결성 보정
  if(!Array.isArray(p.unlockedCharacters) || p.unlockedCharacters.length===0) p.unlockedCharacters = DEFAULT_UNLOCKED_CHARACTERS.slice();
  if(!Array.isArray(p.unlockedWeapons) || p.unlockedWeapons.length===0) p.unlockedWeapons = DEFAULT_UNLOCKED_WEAPONS.slice();
  // 학생 6종 전용 마이그레이션: 레거시 캐릭터/무기가 선택·해금돼 있으면 학생 세트로 교정
  //  (골드·전적·레벨 등 진행도는 건드리지 않음. 레거시 해금 기록은 목록에서 제외만 — 파괴적 삭제 아님)
  p.unlockedCharacters = p.unlockedCharacters.filter(isStudentCharacter);
  for(const id of DEFAULT_UNLOCKED_CHARACTERS) if(p.unlockedCharacters.indexOf(id)<0) p.unlockedCharacters.push(id);
  p.unlockedWeapons = p.unlockedWeapons.filter(id=>STUDENT_WEAPONS.some(w=>w.id===id));
  for(const id of DEFAULT_UNLOCKED_WEAPONS) if(p.unlockedWeapons.indexOf(id)<0) p.unlockedWeapons.push(id);
  p.selectedCharacterId = sanitizeCharacterId(p.selectedCharacterId);
  p.selectedWeaponId = getWeaponForCharacter(p.selectedCharacterId);   // 무기는 항상 캐릭터 고정 무기
  if(p.unlockedCharacters.indexOf(p.selectedCharacterId) < 0) p.selectedCharacterId = p.unlockedCharacters[0];
  if(getDifficulty(p.selectedDifficultyId).id !== p.selectedDifficultyId) p.selectedDifficultyId = "normal";
  if(getMap(p.selectedMapId).id !== p.selectedMapId) p.selectedMapId = "training";
  if(getMode(p.selectedModeId).id !== p.selectedModeId) p.selectedModeId = "solo";
  return p;
}

// 게스트(미로그인) 임시 프로필 로드 — 화면이 null로 깨지지 않게 하는 기본값. 실제 플레이는 로그인 후.
function loadProfile(){
  let saved = null;
  try { const raw = window.localStorage.getItem(PROFILE_KEY); if(raw) saved = JSON.parse(raw); } catch(e){ saved = null; }
  profile = mergeProfile(saved);
}
// 저장: 로그인한 학생이면 그 계정에 저장, 아니면(게스트) 기존 localStorage 프로필에 저장
function saveProfile(){
  profile.lastUpdated = Date.now();
  if(currentStudentId && accounts && accounts.students && accounts.students[currentStudentId]){
    const a=accounts.students[currentStudentId];
    a.gold=profile.gold; a.wins=profile.wins; a.losses=profile.losses; a.draws=profile.draws;
    a.totalPlays=profile.totalPlays; a.totalKills=profile.totalKills; a.bossKills=profile.bossKills;
    a.selectedCharacterId=profile.selectedCharacterId; a.selectedWeaponId=profile.selectedWeaponId;
    a.selectedDifficultyId=profile.selectedDifficultyId; a.selectedMapId=profile.selectedMapId; a.selectedModeId=profile.selectedModeId;
    a.unlockedCharacters=profile.unlockedCharacters; a.unlockedWeapons=profile.unlockedWeapons;
    a.level=profile.level||a.level||1; a.exp=profile.exp||a.exp||0; a.lastUpdated=profile.lastUpdated;
    saveAccounts();
    pushCloudOrPending(currentStudentId);   // 진행도 클라우드 동기화(불가하면 pending)
  } else {
    try { window.localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch(e){}
  }
}

/* ============================================================
   수업용 학생 계정 시스템 (교사가 ID/PIN 발급)
   ⚠ 진짜 보안이 아니라 "수업용 간이 보호"입니다.
   - PIN은 원문 대신 간단 해시로 저장하지만, 단일 HTML이라 코드/저장소를 보면 우회 가능.

   - Firebase 설정이 없으면 같은 기기 localStorage에만 저장됩니다.

// ★ STUDENT_EDIT(교사): 교사용 로그인 PIN/학급 코드 — 수업용 간이값(보안 아님)

// 간이 해시(cyrb53류) — 동기/결정적. 암호학적 보안 아님(수업용).
function hashPin(id, pin){
  const s = (id||"")+":"+(pin||"")+":"+ADMIN_CONFIG.classCode+":starArena";
  let h1=0xdeadbeef, h2=0x41c6ce57;
  for(let i=0;i<s.length;i++){ const c=s.charCodeAt(i); h1=Math.imul(h1^c,2654435761); h2=Math.imul(h2^c,1597334677); }
  h1=Math.imul(h1^(h1>>>16),2246822507); h1^=Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507); h2^=Math.imul(h1^(h1>>>13),3266489909);
  return (h2>>>0).toString(16).padStart(8,"0")+(h1>>>0).toString(16).padStart(8,"0");
}
function nowTs(){ return Date.now(); }
function loadAccounts(){
  let saved=null; try{ const raw=window.localStorage.getItem(ACCOUNTS_KEY); if(raw) saved=JSON.parse(raw); }catch(e){ saved=null; }
  if(saved && typeof saved==="object" && saved.students) accounts=saved;
  else accounts={ classCode:ADMIN_CONFIG.classCode, students:{} };
  if(!accounts.students) accounts.students={};
}
function saveAccounts(){ try{ window.localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); }catch(e){} }
function loadSession(){ try{ const raw=window.localStorage.getItem(SESSION_KEY); session=raw?JSON.parse(raw):null; }catch(e){ session=null; } }
function saveSession(){ try{ if(session) window.localStorage.setItem(SESSION_KEY, JSON.stringify(session)); else window.localStorage.removeItem(SESSION_KEY); }catch(e){} }
// 신규 학생 계정(Lv.1, 골드0, 게임 기본 해금 로스터)
function newAccount(id, name, pin){
  return { id:id, name:name, pinHash:hashPin(id,pin), level:1, exp:0, gold:0,
    wins:0, losses:0, draws:0, totalPlays:0, totalKills:0, bossKills:0,
    selectedCharacterId:DEFAULT_UNLOCKED_CHARACTERS[0]||"student_01", selectedWeaponId:DEFAULT_UNLOCKED_WEAPONS[0]||"tool_01",
    selectedDifficultyId:"normal", selectedMapId:"training", selectedModeId:"solo",
    unlockedCharacters:DEFAULT_UNLOCKED_CHARACTERS.slice(), unlockedWeapons:DEFAULT_UNLOCKED_WEAPONS.slice(),
    createdAt:nowTs(), lastLoginAt:0, isActive:true };
}
// 계정 → 게임 프로필(같은 모양 + 표시 이름/레벨)
function accountToProfile(a){
  const p=mergeProfile(a);   // gold/unlocked/selected 등 채움
  p.nickname=a.name; p.id=a.id; p.level=a.level||1; p.exp=a.exp||0;
  return p;
}
function bindStudent(id){
  const a=accounts.students[id]; if(!a) return false;
  currentStudentId=id; profile=accountToProfile(a);
  a.lastLoginAt=nowTs(); saveAccounts();
  applyProfileSelections();
  return true;
}
// ── 학생/관리자 인증 ──
function studentLogin(id, pin){
  if(!accounts) loadAccounts();
  id=(""+id).trim(); const a=accounts.students[id];
  if(!a || a.isActive===false) return { ok:false, msg:"계정이 없어요" };
  if(a.pinHash!==hashPin(id,pin)) return { ok:false, msg:"비밀번호(PIN)가 올라요" };
  bindStudent(id);
  session={ role:"student", studentId:id, name:a.name, loginAt:nowTs() }; saveSession();
  return { ok:true };
}
function adminLogin(pin){
  if((""+pin)===ADMIN_CONFIG.adminPin){ session={ role:"admin", loginAt:nowTs() }; saveSession(); return true; }
  return false;
}
function logout(){
  currentStudentId=null; session=null; saveSession();
  loadProfile();                    // 게스트 기본값(화면 안 깨지게)
  applyProfileSelections();
}
// ── 관리자: 계정 생성/관리 ──
function createStudent(id, name, pin){
  if(!accounts) loadAccounts();
  id=(""+id).trim(); name=(""+name).trim(); pin=(""+pin).trim();
  if(id.length<2||id.length>12) return { ok:false, msg:"ID는 2~12자" };
  if(accounts.students[id]) return { ok:false, msg:"이미 있는 ID" };
  if(name.length<2||name.length>10) return { ok:false, msg:"이름은 2~10자" };
  if(pin.length<4||pin.length>8) return { ok:false, msg:"PIN은 4~8자리" };
  accounts.students[id]=newAccount(id,name,pin); saveAccounts();
  return { ok:true };
}
function setStudentPin(id, pin){ const a=accounts.students[id]; if(!a) return false; a.pinHash=hashPin(id,pin); a.lastUpdated=nowTs(); saveAccounts(); return true; }
function resetStudent(id){ const a=accounts.students[id]; if(!a) return false;
  a.gold=0; a.wins=0; a.losses=0; a.draws=0; a.totalPlays=0; a.totalKills=0; a.bossKills=0;
  a.unlockedCharacters=DEFAULT_UNLOCKED_CHARACTERS.slice(); a.unlockedWeapons=DEFAULT_UNLOCKED_WEAPONS.slice();
  a.selectedCharacterId=DEFAULT_UNLOCKED_CHARACTERS[0]; a.selectedWeaponId=DEFAULT_UNLOCKED_WEAPONS[0]; a.level=1; a.exp=0;
  a.lastUpdated=nowTs(); saveAccounts(); return true; }
function deleteStudent(id){ if(accounts.students[id]){ delete accounts.students[id]; saveAccounts(); return true; } return false; }
function studentList(){ return accounts&&accounts.students?Object.keys(accounts.students).map(k=>accounts.students[k]):[]; }

function addGold(amount){ profile.gold = Math.max(0, profile.gold + amount); }
function unlockCharacter(id){ if(profile.unlockedCharacters.indexOf(id) < 0) profile.unlockedCharacters.push(id); }
function unlockWeapon(id){ if(profile.unlockedWeapons.indexOf(id) < 0) profile.unlockedWeapons.push(id); }

/* ============================================================
   학생 계정 클라우드 동기화 (Firebase Realtime Database)
   경로: classes/{classCode}/students/{studentId}
   - 로컬(localStorage)은 오프라인 캐시. 온라인이면 클라우드가 기준 데이터.
   - 원문 PIN은 절대 저장하지 않음(pinHash만). 기존 hashPin 호환.
   - ⚠ 정적 페이지 + 클라이언트 hashPin은 "수업용 간이 보호"이지 진짜 보안이 아님.
   ============================================================ */
const ACCOUNTS_BACKUP_KEY = "starArena.accounts.backup.v1";
let cloudAccountStatus = "로컬 전용";   // 로그인/패널 표시용 상태
const AccountStore = {
  cloudReady(){ return !!(OnlineManager && OnlineManager.available && OnlineManager.db); },
  _sref(){ return OnlineManager.db.ref("classes/"+ADMIN_CONFIG.classCode+"/students"); },
  _ref(id){ return this._sref().child(id); },
  // 계정 → 클라우드 레코드(스키마 필드만, undefined 없음)
  toRecord(a){
    return {
      id:a.id, name:a.name||"", pinHash:a.pinHash||"",
      level:a.level||1, exp:a.exp||0, gold:a.gold||0,
      wins:a.wins||0, losses:a.losses||0, draws:a.draws||0,
      totalPlays:a.totalPlays||0, totalKills:a.totalKills||0, bossKills:a.bossKills||0,
      selectedCharacterId:a.selectedCharacterId||null, selectedWeaponId:a.selectedWeaponId||null,
      selectedDifficultyId:a.selectedDifficultyId||null, selectedMapId:a.selectedMapId||null, selectedModeId:a.selectedModeId||null,
      unlockedCharacters:(a.unlockedCharacters||[]).slice(), unlockedWeapons:(a.unlockedWeapons||[]).slice(),
      createdAt:a.createdAt||nowTs(), lastLoginAt:a.lastLoginAt||0, lastUpdated:a.lastUpdated||nowTs(),
      isActive:(a.isActive!==false)
    };
  },
  // ── 로컬 캐시 계층 ──
  loadLocalAccounts(){ loadAccounts(); return accounts; },
  saveLocalAccounts(){ saveAccounts(); },
  cacheLocal(rec){ if(!accounts) loadAccounts(); const cur=accounts.students[rec.id]||{}; delete cur._pendingSync; accounts.students[rec.id]=Object.assign(cur, rec); saveAccounts(); },
  // ── 클라우드 CRUD (Promise) ──  null=없음, undefined=조회오류(네트워크)
  loadCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._ref(id).once("value").then(function(s){ res(s.val()||null); }).catch(function(){ res(undefined); });
  }); },
  loadCloudAccounts(){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._sref().once("value").then(function(s){ res(s.val()||{}); }).catch(function(){ res(undefined); });
  }); },
  // 저장: transaction으로 '오래된 로컬이 최신 클라우드를 덮어쓰지 않게'(최신 lastUpdated 우선)
  saveCloudStudent(a){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    const rec=self.toRecord(a);
    try{
      self._ref(a.id).transaction(function(cur){
        if(cur && typeof cur.lastUpdated==="number" && rec.lastUpdated < cur.lastUpdated) return;  // 클라우드가 최신 → 덮어쓰지 않음(abort)
        return rec;
      }, function(err){ res(!err); }, false);
    }catch(e){ res(false); }
  }); },
  deleteCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    self._ref(id).remove().then(function(){ res(true); }).catch(function(){ res(false); });
  }); },
  // 클라우드 → 로컬 병합(클라우드가 최신/누락이면 반영). 로컬 전용 계정은 유지.
  syncAccounts(){ const self=this; return new Promise(function(res){
    self.loadCloudAccounts().then(function(cloud){
      if(cloud===undefined||cloud===null){ res(false); return; }
      if(!accounts) loadAccounts();
      let n=0;
      for(const id in cloud){ const c=cloud[id], loc=accounts.students[id];
        if(!loc || (typeof c.lastUpdated==="number" && c.lastUpdated >= (loc.lastUpdated||0))){ accounts.students[id]=c; n++; } }
      saveAccounts(); cloudAccountStatus="학급 계정 연결됨"; res(n);
    });
  }); },
  // 오프라인 저장 → pending. 재연결 시 flush(최신 우선).
  markPending(id){ if(accounts&&accounts.students[id]){ accounts.students[id]._pendingSync=true; saveAccounts(); } },
  flushPending(){ const self=this; if(!self.cloudReady()||!accounts) return;
    Object.keys(accounts.students).forEach(function(id){ const a=accounts.students[id];
      if(a && a._pendingSync){ self.saveCloudStudent(a).then(function(ok){ if(ok){ delete a._pendingSync; saveAccounts(); } }); } });
  }
};
// 진행도/계정 변경을 클라우드에 밀어넣기(불가하면 pending)
function pushCloudOrPending(id){
  if(!accounts||!accounts.students[id]) return;
  if(AccountStore.cloudReady()){
    AccountStore.saveCloudStudent(accounts.students[id]).then(function(ok){ if(!ok) AccountStore.markPending(id); });
  } else { AccountStore.markPending(id); }
}
// 클라우드 준비되면(익명 인증 완료) 계정 동기화 + pending flush
function onCloudAccountsReady(){
  cloudAccountStatus="학급 계정 연결 중…";
  AccountStore.syncAccounts().then(function(r){
    if(r===false){ cloudAccountStatus="이 기기에 저장된 계정만 사용 가능"; return; }
    AccountStore.flushPending();
    const l=studentList(); if((!adminSelId||!accounts.students[adminSelId]) && l[0]) adminSelId=l[0].id;
  });
}
// 클라우드 우선 학생 로그인(비동기). 실패 유형별 메시지 분리.
function studentLoginCloud(id, pin, cb){
  id=(""+id).trim();
  const localTry=function(offline){ const r=studentLogin(id,pin); if(r.ok&&offline) r.offline=true; cb(r); };
  if(!AccountStore.cloudReady()){ localTry(true); return; }
  cloudAccountStatus="학급 계정 확인 중…";
  AccountStore.loadCloudStudent(id).then(function(rec){
    if(rec===undefined){ // 조회 오류(네트워크) → 로컬 캐시로
      const r=studentLogin(id,pin);
      if(r.ok){ r.offline=true; cb(r); } else cb({ok:false,msg:"연결이 불안정해요 — 이 기기에 저장된 계정만 로그인 가능"});
      return;
    }
    if(rec===null){ if(accounts&&accounts.students[id]){ localTry(false); return; } cb({ok:false,msg:"계정이 없어요"}); return; }
    if(rec.isActive===false){ cb({ok:false,msg:"사용 중지된 계정이에요"}); return; }
    if(rec.pinHash!==hashPin(id,pin)){ cb({ok:false,msg:"비밀번호(PIN)가 올라요"}); return; }
    rec.lastLoginAt=nowTs(); AccountStore.cacheLocal(rec);
    bindStudent(id);
    session={ role:"student", studentId:id, name:rec.name, loginAt:nowTs() }; saveSession();
    pushCloudOrPending(id);          // lastLoginAt 반영
    cloudAccountStatus="학급 계정 연결됨";
    cb({ok:true});
  });
}
// 교사: 로컬 계정을 클라우드로 이전(스캔→확인→업로드, 원본은 백업 보관)
function adminMigrateLocal(){
  if(!AccountStore.cloudReady()){ showToast("온라인 연결 후 이용하세요"); return; }
  const list=studentList(); if(!list.length){ showToast("이전할 로컬 계정이 없어요"); return; }
  AccountStore.loadCloudAccounts().then(function(cloud){
    if(cloud===undefined){ showToast("클라우드 조회 실패 — 잠시 후 다시"); return; }
    cloud=cloud||{}; const toNew=[],toOver=[],toSkip=[];
    list.forEach(function(a){ const c=cloud[a.id];
      if(!c) toNew.push(a); else if((a.lastUpdated||0)>=(c.lastUpdated||0)) toOver.push(a); else toSkip.push(a); });
    const msg="클라우드로 이전:\n· 신규 업로드 "+toNew.length+"개\n· 덮어쓰기(로컬이 최신) "+toOver.length+"개"+(toOver.length?" ["+toOver.map(function(a){return a.id;}).join(", ")+"]":"")+"\n· 건너뜀(클라우드가 최신) "+toSkip.length+"개\n진행할까요?";
    let ok=false; try{ ok=window.confirm(msg); }catch(e){ ok=true; }
    if(!ok) return;
    try{ window.localStorage.setItem(ACCOUNTS_BACKUP_KEY, JSON.stringify(accounts)); }catch(e){}   // 원본 백업(즉시 삭제 안 함)
    const targets=toNew.concat(toOver);
    if(!targets.length){ showToast("이전할 항목 없음(모두 클라우드가 최신)"); return; }
    let up=0,fail=0,done=0;
    targets.forEach(function(a){ AccountStore.saveCloudStudent(a).then(function(s){ if(s)up++; else fail++;
      if(++done===targets.length){ showToast("이전 완료 — 업로드 "+up+" · 건너뜀 "+toSkip.length+" · 실패 "+fail+" (원본 백업 보관)"); } }); });
  });
}
// 교사: 클라우드에서 학생 목록 새로고침
function adminRefreshFromCloud(){
  if(!AccountStore.cloudReady()){ showToast("오프라인 — 이 기기 목록만 표시"); return; }
  AccountStore.syncAccounts().then(function(n){
    if(n===false){ showToast("클라우드 조회 실패"); return; }
    const l=studentList(); if(!adminSelId||!accounts.students[adminSelId]) adminSelId=l[0]?l[0].id:null;
    showToast("클라우드 새로고침 — 학생 "+l.length+"명");
  });
}

// Firebase compat CDN (설정이 있을 때만 동적으로 불러온다 — 오프라인이면 아예 로드 안 함)
const FB_SDK_URLS = [
  "https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js",
  "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js",
  "https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"
];
function loadScriptsSequential(urls, done){
  let i=0;
  function next(){
    if(i>=urls.length){ done(true); return; }
    try{
      const s=document.createElement("script");
      s.src=urls[i]; s.async=true;
      s.onload=function(){ i++; next(); };
      s.onerror=function(){ done(false); };
      (document.head||document.body).appendChild(s);
    }catch(e){ done(false); }
  }
  next();
}
function emptyInput(){ return { up:false, down:false, left:false, right:false, attack:false, special:false, ultimate:false, super:false, reload:false, pick:-1 }; }

const OnlineManager = {
  available:false, status:"오프라인",
  app:null, auth:null, db:null, uid:null,
  roomCode:null, role:null, roomRef:null,
  mode:null, mySlot:null, maxPlayers:2,   // 다인(슬롯) 모드용
  unsubs:[], lastSyncAt:0, connected:false, opponentConnected:true,
  onlineState:null, meta:null, players:{ host:null, guest:null }, onlineInput:{ host:null, guest:null },

  updateStatus:function(msg){ this.status=msg; },

  initFirebaseIfAvailable:function(){
    try{
      if(!FIREBASE_CONFIG){ this.available=false; this.status="Firebase 설정 없음 (로컬 전용)"; return; }
      this.status="Firebase 불러오는 중…";
      const self=this;
      loadScriptsSequential(FB_SDK_URLS, function(ok){
        if(!ok || typeof firebase==="undefined"){ self.available=false; self.status="Firebase 로드 실패 (로컬 전용)"; return; }
        try{
          self.app=firebase.initializeApp(FIREBASE_CONFIG);
          self.auth=firebase.auth();
          self.db=firebase.database();
          self.status="로그인 중…";
          self.signInGuest();
        }catch(e){ self.available=false; self.status="Firebase 초기화 실패 (로컬 전용)"; }
      });
    }catch(e){ this.available=false; this.status="온라인 사용 불가 (로컬 모드)"; }
  },

  signInGuest:function(){
    const self=this;
    try{
      this.auth.signInAnonymously().then(function(cred){
        self.uid = (cred && cred.user) ? cred.user.uid : (self.auth.currentUser ? self.auth.currentUser.uid : null);
        self.available=true; self.status="온라인 준비 완료";
        self.watchConnection();
        try{ onCloudAccountsReady(); }catch(e){}   // 학급 계정 클라우드 동기화 + pending flush
      }).catch(function(e){ self.available=false; self.status="로그인 실패 (로컬 모드)"; });
    }catch(e){ this.available=false; this.status="로그인 실패 (로컬 모드)"; }
  },

  watchConnection:function(){
    try{
      const self=this, cref=this.db.ref(".info/connected");
      const cb=function(snap){ const was=self.connected; self.connected = snap.val()===true;
        if(!was && self.connected){ try{ AccountStore.flushPending(); }catch(e){} } };   // 재연결 시 오프라인 변경 동기화
      cref.on("value", cb);
      this.unsubs.push(function(){ try{ cref.off("value", cb); }catch(e){} });
    }catch(e){}
  },

  generateRoomCode:function(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s="";
    for(let i=0;i<4;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length));
    return s;
  },
  roomPath:function(code){ return "starArenaOnline/rooms/"+code; },

  createRoom:function(onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this;
      // 방 코드가 이미 있으면(아주 드묾) 다른 코드로 다시 시도해 기존 방을 덮어쓰지 않게 한다
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(snap.val()){
            if(triesLeft>0){ tryCreate(triesLeft-1); return; }
            if(onDone) onDone(false,"방 생성 실패(코드 충돌)"); return;
          }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const room={
            meta:{ status:"waiting", hostUid:self.uid, guestUid:null, createdAt:ts, updatedAt:ts,
              mapId:selectedMapId||"training", characterHost:selectedCharacterId, characterGuest:null,
              weaponHost:selectedWeaponId, weaponGuest:null, winner:null },
            players:{ host:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() } }
          };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
            self.setPresence("host"); self.listenRoom();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"방 생성 실패"); });
        }).catch(function(e){ if(onDone) onDone(false,"방 생성 오류"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"방 생성 오류"); }
  },

  joinRoom:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this;
      code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"방 코드 형식 오류"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"방을 찾을 수 없음"); return; }
        if(data.meta.guestUid && data.meta.guestUid!==self.uid){ if(onDone) onDone(false,"방이 가득 찼습니다"); return; }
        const ts=firebase.database.ServerValue.TIMESTAMP;
        const updates={};
        updates["meta/guestUid"]=self.uid;
        updates["meta/characterGuest"]=selectedCharacterId;
        updates["meta/weaponGuest"]=selectedWeaponId;
        updates["meta/status"]="ready";
        updates["meta/updatedAt"]=ts;
        updates["players/guest"]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() };
        ref.update(updates).then(function(){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
          self.setPresence("guest"); self.listenRoom();
          if(onDone) onDone(true, code);
        }).catch(function(e){ if(onDone) onDone(false,"입장 실패"); });
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },

  setPresence:function(role){
    try{
      if(!this.roomRef) return;
      const pref=this.roomRef.child("players/"+role);
      pref.child("connected").set(true);
      pref.child("connected").onDisconnect().set(false);
      pref.child("lastSeen").onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
      pref.child("input").onDisconnect().set(emptyInput()); // 끊기면 입력도 비워 유령 동작 방지
      if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().set("ended"); // 방장 끊기면 방 종료
    }catch(e){}
  },

  listenRoom:function(){
    try{
      const self=this; if(!this.roomRef) return;
      const metaRef=this.roomRef.child("meta");
      const playersRef=this.roomRef.child("players");
      const stateRef=this.roomRef.child("state");
      const mcb=function(snap){ self.meta=snap.val(); onRoomMetaChanged(); };
      const pcb=function(snap){
        self.players=snap.val()||{ host:null, guest:null };
        self.onlineInput.host = self.players.host ? self.players.host.input : null;
        self.onlineInput.guest = self.players.guest ? self.players.guest.input : null;
      };
      metaRef.on("value", mcb);
      playersRef.on("value", pcb);
      this.unsubs.push(function(){ try{ metaRef.off("value",mcb); }catch(e){} });
      this.unsubs.push(function(){ try{ playersRef.off("value",pcb); }catch(e){} });
      if(this.role==="guest"){
        const scb=function(snap){ self.onlineState=snap.val(); };
        stateRef.on("value", scb);
        this.unsubs.push(function(){ try{ stateRef.off("value",scb); }catch(e){} });
      }
    }catch(e){}
  },

  writeInput:function(inputObj){ try{ const key=this.mySlot||this.role; if(this.roomRef && key) this.roomRef.child("players/"+key+"/input").set(inputObj); }catch(e){} },
  writeMetaStatus:function(status, extra){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; const u={ status:status, updatedAt:firebase.database.ServerValue.TIMESTAMP };
      if(extra){ for(const k in extra) u[k]=extra[k]; } this.roomRef.child("meta").update(u); }catch(e){}
  },
  writeHostState:function(stateObj){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; stateObj.updatedAt=firebase.database.ServerValue.TIMESTAMP;
      this.roomRef.child("state").set(stateObj); }catch(e){}
  },

  leaveRoom:function(localOnly){
    try{
      for(const u of this.unsubs){ try{ u(); }catch(e){} }
      this.unsubs=[];
      // localOnly: 방이 이미 서버에서 삭제/종료된 경우. DB에 아무것도 쓰지 않고 로컬 정리만 한다(유령 방 재생성 방지).
      const slotKey=this.mySlot||this.role;
      if(!localOnly && this.roomRef && slotKey){
        try{
          const pref=this.roomRef.child("players/"+slotKey);
          pref.child("connected").onDisconnect().cancel();
          pref.child("lastSeen").onDisconnect().cancel();
          pref.child("input").onDisconnect().cancel();
          if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().cancel();
        }catch(e){}
      }
      if(!localOnly && this.roomRef){
        try{
          const isTeam = (this.mode==="online3v3" || this.mode==="onlinePve6");
          if(this.role==="host"){ const rr=this.roomRef; rr.child("meta/status").set("ended");
            setTimeout(function(){ try{ rr.remove(); }catch(e){} }, 800); }
          else if(slotKey && isTeam){
            // 팀 모드: 매치는 계속, 내 슬롯만 비활성 처리(host가 빈자리로 다룸)
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
            this.roomRef.child("players/"+slotKey+"/input").set(emptyInput());
          }
          else if(slotKey){ // 1대1: 참가자가 1명뿐이라 매치 종료가 맞음
            this.roomRef.child("meta/status").set("ended");
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
          }
        }catch(e){}
      }
    }catch(e){}
    this.roomRef=null; this.roomCode=null; this.role=null; this.mode=null; this.mySlot=null;
    this.onlineState=null; this.meta=null; this.players={ host:null, guest:null };
    this.onlineInput={ host:null, guest:null }; this.opponentConnected=true;
    if(this.available && this.db) this.watchConnection(); // 연결 감시 재구독
  },

  // ---- 다인(슬롯) 모드 방 생성/입장 ----
  createTeamRoom:function(modeId, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this, mode=getOnlineMode(modeId);
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(snap.val()){ if(triesLeft>0){ tryCreate(triesLeft-1); return; } if(onDone) onDone(false,"방 생성 실패(코드 충돌)"); return; }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const team = mode.modeType==="pve" ? "pve" : "blue";
          // PVE는 스테이지 맵을 따르므로 mapId는 1스테이지 맵, PVP(3v3)는 host가 고른 맵
          const mapId = mode.modeType==="pve" ? (PVE_STAGES[0].mapId) : (selectedMapId||"training");
          const room={ meta:{ mode:modeId, status:"waiting", hostUid:self.uid, createdAt:ts, updatedAt:ts,
              mapId:mapId, maxPlayers:mode.maxPlayers, winner:null, resultText:"", stageIndex:0, waveIndex:0 },
            players:{ p1:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:"p1", team:team, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:ts, input:emptyInput() } } };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode=modeId; self.mySlot="p1"; self.maxPlayers=mode.maxPlayers;
            self.setPresence("p1"); self.listenRoom();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"방 생성 실패"); });
        }).catch(function(e){ if(onDone) onDone(false,"방 생성 오류"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"방 생성 오류"); }
  },
  joinRoomAny:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this; code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"방 코드 형식 오류"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"방을 찾을 수 없음"); return; }
        const m=data.meta.mode;
        if(m==="online3v3" || m==="onlinePve6"){ self._joinTeamRoom(code, data, ref, onDone); }
        else { self.joinRoom(code, onDone); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },
  _joinTeamRoom:function(code, data, ref, onDone){
    try{
      const self=this; let claimedSlot=null, claimedMode=null, failReason="입장 실패";
      // 슬롯 claim을 transaction으로 원자 처리(동시 입장 시 같은 pN 덮어쓰기 방지)
      ref.transaction(function(room){
        claimedSlot=null; failReason="입장 실패";
        // RTDB transaction은 첫 호출이 캐시 미동기화로 null로 올 수 있다.
        // 여기서 null로 중단(return)하면 서버 데이터를 받기도 전에 트랜잭션이 영구 abort된다.
        // 이미 get()으로 존재를 확인한 data로 보정해 null-abort 함정을 피한다.
        if(room===null || room===undefined) room=data;
        if(!room || !room.meta){ failReason="방을 찾을 수 없음"; return; }            // abort
        if(room.meta.status!=="waiting" && room.meta.status!=="ready"){ failReason="이미 시작된 방"; return; }
        claimedMode=room.meta.mode; const mode=getOnlineMode(claimedMode);
        const players=room.players||{};
        let slot=null;
        for(let i=1;i<=mode.maxPlayers;i++){ const k="p"+i; if(!players[k] || players[k].connected===false){ slot=k; break; } }
        if(!slot){ failReason="방이 가득 찼습니다"; return; }                          // abort
        let team="pve";
        if(mode.modeType==="pvp"){
          let blue=0,red=0; for(const k in players){ const pp=players[k]; if(pp && pp.connected!==false){ if(pp.team==="red") red++; else blue++; } }
          team = (blue<=red && blue<3) ? "blue" : (red<3 ? "red" : "blue");
        }
        claimedSlot=slot;
        if(!room.players) room.players={};
        room.players[slot]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:slot, team:team, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:firebase.database.ServerValue.TIMESTAMP, input:emptyInput() };
        room.meta.status="ready"; room.meta.updatedAt=firebase.database.ServerValue.TIMESTAMP;
        return room; // commit
      }).then(function(res){
        if(res && res.committed && claimedSlot){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode=claimedMode; self.mySlot=claimedSlot; self.maxPlayers=getOnlineMode(claimedMode).maxPlayers;
          self.setPresence(claimedSlot); self.listenRoom();
          if(onDone) onDone(true, code);
        } else { if(onDone) onDone(false, failReason); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },

  // 프로필 클라우드 저장은 이번 베타에서 사용하지 않음(로컬 localStorage만)
  saveCloudProfile:function(p){ try{ /* 베타: 미사용 */ }catch(e){} },
  loadCloudProfile:function(){ try{ return null; }catch(e){ return null; } }
};

/* =======================================================================
   키보드 입력
   ======================================================================= */
const keysDown = new Set();
const PREVENT_KEYS = new Set(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"]);

window.addEventListener("keydown", (e)=>{
  if(PREVENT_KEYS.has(e.code)) e.preventDefault();
  // F2: 에셋 확인 화면 토글(시작 화면에서만 진입 — 플레이 중 방해 없음)
  if(!e.repeat && e.code==="F2"){
    if(gameState===STATE.START){ gameState=STATE.ASSET_CHECK; return; }
    if(gameState===STATE.ASSET_CHECK){ gameState=STATE.START; return; }
  }
  if(!e.repeat) handleKeyPress(e.code);
  keysDown.add(e.code);
});
window.addEventListener("keyup", (e)=>{ keysDown.delete(e.code); });
window.addEventListener("blur", ()=>{ keysDown.clear(); });
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) keysDown.clear(); });
// 페이지를 닫으면 온라인 방을 정리한다(onDisconnect도 별도로 동작)
window.addEventListener("beforeunload", ()=>{ try{ if(OnlineManager.role) OnlineManager.leaveRoom(); }catch(e){} });

function showToast(text){ toastText = text; toastTimer = 1.8; }

function handleKeyPress(code){
  // 나가기 확인 오버레이가 떠 있으면 Y/N만 처리(다른 입력 무시)
  if(confirmLeave){
    if(code==="KeyY"){ confirmLeave=false; doLeaveToStart(); return; }
    if(code==="KeyN"||code==="Escape"){ confirmLeave=false; return; }
    return;
  }
  if(gameState === STATE.ASSET_CHECK){ if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(gameState === STATE.PROFILE){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="KeyN") changeNickname();
    else if(code==="KeyI"){ collectionIndex=0; gameState=STATE.COLLECTION; }
    return;
  }
  if(gameState === STATE.COLLECTION){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="ArrowLeft"){ collectionIndex=Math.max(0,collectionIndex-1); }
    else if(code==="ArrowRight"){ collectionIndex=collectionIndex+1; }
    else if(code==="KeyT"){ collectionTab=(collectionTab==="char")?"tool":"char"; collectionIndex=0; }
    return;
  }
  if(gameState === STATE.SPLASH){ if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="Escape"){ goToLogin(); } return; }
  if(gameState === STATE.LOGIN){ handleLoginKey(code); return; }
  if(gameState === STATE.ADMIN_LOGIN){ handleAdminLoginKey(code); return; }
  if(gameState === STATE.ADMIN){ handleAdminKey(code); return; }
  if(gameState === STATE.START){ handleStartKey(code); return; }
  if(gameState === STATE.SHOP){ handleShopKey(code); return; }
  if(gameState === STATE.ONLINE_MENU){ handleOnlineMenuKey(code); return; }
  if(gameState === STATE.ONLINE_LOBBY){ handleOnlineLobbyKey(code); return; }
  if(gameState === STATE.ONLINE_PLAYING){ handleOnlinePlayKey(code); return; }
  if(gameState === STATE.ONLINE_OVER){
    // 방장은 R/Enter로 같은 방 재시작, 참가자는 방장 대기. Esc는 나가기 확인.
    if(code==="KeyR"||code==="Enter"||code==="NumpadEnter"){
      if(OnlineManager.role==="host") onlineRematch();
      else showToast("방장이 다시 시작하면 함께 시작돼요");
      return;
    }
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PLAYING){
    // Z=기본공격(연사: updatePlayer) · X=특수기술 · C=궁극기 — X/C는 눌림 순간 1회(keydown !repeat = edge)
    // (기존 X/Space 궁극기 → C로 이동. Space 별칭은 제거 — 조작 통일: 방향키·Z·X·C·R)
    if(code==="KeyX"){ useCharacterSpecial(); return; }
    if(code==="KeyC"){ useCharacterSuper(); return; }
    if(code==="KeyP"){ setPaused(true); return; }
    if(code==="KeyR"){ reloadWeaponManual(); return; }   // 장전(결과화면 R 재시작과 분리: PLAYING에서만 장전)
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PAUSED){
    if(code==="KeyP"){ setPaused(false); return; }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
  if(gameState === STATE.OVER){
    if(code==="ArrowLeft"){ resultButtonIndex=0; return; }
    if(code==="ArrowRight"){ resultButtonIndex=1; return; }
    if(code==="KeyR"){ startGame(); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"){
      if(resultButtonIndex===0) startGame(); else goToStartScreen();
      return;
    }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
}

function handleStartKey(code){
  if(code==="ArrowUp"){ menuIndex=(menuIndex+MENU_ROWS-1)%MENU_ROWS; return; }
  if(code==="ArrowDown"){ menuIndex=(menuIndex+1)%MENU_ROWS; return; }
  if(code==="ArrowLeft"){ changeMenuValue(menuIndex,-1); return; }
  if(code==="ArrowRight"){ changeMenuValue(menuIndex,+1); return; }
  if(code==="Enter"||code==="NumpadEnter"){ activateMenuRow(menuIndex); return; }
  if(code==="KeyC"){ cycleCharacter(+1); return; }
  // W(무기 변경) 제거: 무기는 캐릭터 고정. S(상점) 제거: 상점 준비 중(SHOP_ENABLED=false).
  if(code==="KeyD"){ cycleDifficulty(+1); return; }
  if(code==="KeyM"){ cycleMap(+1); return; }
  if(code==="KeyT"){ cycleMode(+1); return; }
  if(code==="KeyN"){ changeNickname(); return; }
  if(code==="KeyO"){ openOnlineMenu(); return; }
  if(code==="KeyU"){ gameState=STATE.PROFILE; return; }       // 개인창(내 정보)
  if(code==="KeyI"){ collectionIndex=0; gameState=STATE.COLLECTION; return; } // 수집창
  if(code==="KeyQ"){ doLogout(); return; }                    // 로그아웃
}
function goToLogin(){ loginIndex=0; loginMsg=""; gameState=STATE.LOGIN; }
// ── 학생 로그인 화면 ──
function handleLoginKey(code){
  const hasSession = !!(session && session.role==="student" && accounts && accounts.students[session.studentId]);
  const N = hasSession ? 3 : 2;   // 0:로그인 1:(저장계정) 2:교사용  /  세션없으면 0:로그인 1:교사용
  if(code==="Escape"){ gameState=STATE.SPLASH; splashTimer=0; return; }
  if(code==="ArrowUp"){ loginIndex=(loginIndex+N-1)%N; return; }
  if(code==="ArrowDown"){ loginIndex=(loginIndex+1)%N; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    const teacherRow = hasSession?2:1;
    if(loginIndex===0){ promptStudentLogin(); }
    else if(hasSession && loginIndex===1){
      // 저장된 세션으로 이어서(이미 인증된 세션이므로 PIN 재입력 없이 재바인딩)
      if(bindStudent(session.studentId)){ loginMsg=""; goToStartScreen(); showToast((profile.nickname||"")+"님 환영합니다!"); }
      else { session=null; saveSession(); loginMsg="저장된 계정을 찾을 수 없어요"; }
    }
    else if(loginIndex===teacherRow){ gameState=STATE.ADMIN_LOGIN; }
  }
}
function promptStudentLogin(presetId){
  let id=presetId||null;
  try{ if(!id) id=window.prompt("학생 ID (예: s01)"); }catch(e){ id=null; }
  if(id===null) return;
  let pin=null; try{ pin=window.prompt("비밀번호(PIN)"); }catch(e){ pin=null; }
  if(pin===null) return;
  loginMsg="학급 계정 확인 중…";
  studentLoginCloud(id, pin, function(r){
    if(r.ok){ loginMsg=""; goToStartScreen(); showToast((profile.nickname||"")+"님 환영합니다!"+(r.offline?" (오프라인)":"")); }
    else { loginMsg=r.msg||"로그인 실패"; showToast(loginMsg); }
  });
}
// ── 교사용 로그인 화면 ──
function handleAdminLoginKey(code){
  if(code==="Escape"){ gameState=STATE.LOGIN; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    let pin=null; try{ pin=window.prompt("교사용 PIN (수업용 · 보안 아님)"); }catch(e){ pin=null; }
    if(pin===null) return;
    if(adminLogin(pin)){ if(!accounts) loadAccounts(); adminIndex=0; adminSelId=studentList()[0]?studentList()[0].id:null; gameState=STATE.ADMIN; }
    else showToast("교사용 PIN이 올라요");
  }
}
// ── 교사용 패널: 학생 계정 관리(prompt 기반 MVP) ──
function handleAdminKey(code){
  if(!accounts) loadAccounts();
  const list=studentList();
  if(code==="Escape"){ session=null; saveSession(); gameState=STATE.LOGIN; return; }   // 로그아웃→로그인
  if(code==="ArrowUp"||code==="ArrowDown"){
    if(!list.length) return;
    let i=list.findIndex(s=>s.id===adminSelId); if(i<0)i=0;
    i=(i+(code==="ArrowDown"?1:list.length-1))%list.length; adminSelId=list[i].id; return;
  }
  if(code==="KeyA"){ adminCreateStudent(); return; }            // 계정 만들기
  if(code==="KeyP"){ adminResetPin(); return; }                 // PIN 재설정
  if(code==="KeyR"){ adminResetStudent(); return; }             // 계정 초기화
  if(code==="KeyX"||code==="Delete"){ adminDeleteStudent(); return; } // 계정 삭제
  if(code==="KeyS"){ adminRefreshFromCloud(); return; }         // 클라우드 새로고침
  if(code==="KeyM"){ adminMigrateLocal(); return; }             // 로컬 계정 클라우드 이전
}
function adminCreateStudent(){
  let id=null,name=null,pin=null;

  if(!id) return;
  try{ name=window.prompt("학생 이름 (2~10자)"); }catch(e){}
  if(!name) return;
  try{ pin=window.prompt("초기 PIN (4~8자리)"); }catch(e){}
  if(!pin) return;
  id=(""+id).trim();
  const proceed=function(){
    const r=createStudent(id,name,pin);        // 로컬 생성(검증 포함)
    if(!r.ok){ showToast("생성 실패: "+r.msg); return; }
    adminSelId=id;
    if(AccountStore.cloudReady()){
      AccountStore.saveCloudStudent(accounts.students[id]).then(function(ok){
        if(ok) showToast("계정 생성(클라우드 저장): ID "+id+" / PIN "+pin+" — 학생에게 전달");
        else { AccountStore.markPending(id); showToast("로컬 생성됨 · 클라우드 저장 실패 — 재연결 시 동기화"); }
      });

  };
  // 중복 ID는 Firebase 기준으로 검사

    AccountStore.loadCloudStudent(id).then(function(rec){

function changeMenuValue(row, dir){
  if(row===2) cycleCharacter(dir);          // 무기 행 없음: 캐릭터 변경 시 고정 무기 자동 적용
  else if(row===4) cycleDifficulty(dir);
  else if(row===5) cycleMap(dir);
  else if(row===6) cycleMode(dir);
}
function activateMenuRow(row){
  if(row===0) startGame();                 // 바로 시작(오프라인)
  else if(row===1) openOnlineMenu();        // 온라인 센터
  else if(row===3) startSoloCampaign();     // 혼자 도전 캠페인(20스테이지)
  else if(row===7) doLogout();              // 로그아웃 → 로그인 화면
  else if(row===8) gameState=STATE.ADMIN_LOGIN;  // 교사용(별도 로그인)
  else if(VALUE_ROWS[row]) changeMenuValue(row, +1);        // 값 행 Enter → 다음 값
}

function cycleInList(list, currentId, dir){
  let idx=0;
  for(let i=0;i<list.length;i++){ if(list[i]===currentId){ idx=i; break; } }
  idx=(idx+dir+list.length)%list.length;
  return list[idx];
}
function cycleCharacter(dir){
  selectedCharacterId=cycleInList(profile.unlockedCharacters,selectedCharacterId,dir);
  profile.selectedCharacterId=selectedCharacterId;
  // 무기 완전 고정: 캐릭터 변경 즉시 그 캐릭터의 고정 무기로 자동 변경
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
  saveProfile();
}
// 무기 선택 제거: 무기는 캐릭터에서 계산. (하위호환용으로 함수는 남기되 항상 고정 무기로 재교정)
function cycleWeapon(dir){
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
}
function cycleDifficulty(dir){ selectedDifficultyId=cycleInList(DIFFICULTIES.map(d=>d.id),selectedDifficultyId,dir); profile.selectedDifficultyId=selectedDifficultyId; saveProfile(); }
function cycleMap(dir){ selectedMapId=cycleInList(MAPS.map(m=>m.id),selectedMapId,dir); profile.selectedMapId=selectedMapId; saveProfile(); }
function cycleMode(dir){ selectedModeId=cycleInList(MODES.map(m=>m.id),selectedModeId,dir); profile.selectedModeId=selectedModeId; saveProfile(); }

function openShop(){
  if(!SHOP_ENABLED){ showToast("상점은 준비 중이에요 (곧 다시 열려요!)"); return; }   // 임시 비활성(코드/골드 보존)
  rebuildShopItems(); shopIndex=0; gameState=STATE.SHOP;
}
function rebuildShopItems(){
  shopItems=[];
  // 학생 6종 체제: 상점 목록도 학생 세트로 제한(레거시 잠정 비활성 — 복구하려면 STUDENT_* 를 CHARACTERS/WEAPONS 로 되돌리면 됨)
  for(const c of STUDENT_CHARACTERS){ if(profile.unlockedCharacters.indexOf(c.id)<0) shopItems.push({kind:"character",id:c.id,name:c.name,cost:c.unlockCost,desc:c.desc}); }
  for(const w of STUDENT_WEAPONS){ if(profile.unlockedWeapons.indexOf(w.id)<0) shopItems.push({kind:"weapon",id:w.id,name:w.name,cost:w.unlockCost,desc:w.desc}); }
}
function handleShopKey(code){
  if(code==="Escape"){ gameState=STATE.START; return; }
  if(shopItems.length===0){ if(code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(code==="ArrowUp"){ shopIndex=(shopIndex+shopItems.length-1)%shopItems.length; return; }
  if(code==="ArrowDown"){ shopIndex=(shopIndex+1)%shopItems.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ buyShopItem(); return; }
}
function buyShopItem(){
  const item=shopItems[shopIndex];
  if(!item) return;
  if(profile.gold<item.cost){ showToast("골드가 부족합니다!"); return; }
  addGold(-item.cost);
  if(item.kind==="character"){ unlockCharacter(item.id); showToast(item.name+" 캐릭터 해금!"); }
  else { unlockWeapon(item.id); showToast(item.name+" 무기 해금!"); }
  saveProfile();
  rebuildShopItems();
  if(shopIndex>=shopItems.length) shopIndex=Math.max(0,shopItems.length-1);
}

function getMatchConfig(){
  const diff=getDifficulty(selectedDifficultyId);
  const mode=getMode(selectedModeId);
  return {
    diff:diff, mode:mode, map:getMap(selectedMapId),
    enemyMaxHp: GAME_CONFIG.enemyMaxHp * diff.enemyHpMul * mode.enemyStatMul,
    enemyMoveSpeed: GAME_CONFIG.enemyMoveSpeed * diff.enemySpeedMul * TEMPO.enemyMove,
    enemyDamage: GAME_CONFIG.enemyDamage * diff.enemyDamageMul * mode.enemyDamageMul,
    enemyAttackCooldown: GAME_CONFIG.enemyAttackCooldown * diff.enemyCooldownMul,
    enemyAimError: diff.enemyAimError,
    enemyBulletSpeed: GAME_CONFIG.enemyBulletSpeed * TEMPO.enemyBullet,
    enemyRange: GAME_CONFIG.enemyRange,
    bossMaxHp: GAME_CONFIG.bossMaxHp * diff.bossHpMul,
    bossDamageMul: GAME_CONFIG.bossDamageMul * diff.bossDamageMul
  };
}

// 모든 파이터(캐릭터)를 만드는 공통 함수
function makeFighter(opts){
  const team=opts.team;
  const isPlayer=!!opts.isPlayer;
  let charData=null, maxHp, moveSpeed, color, subColor;

  if(team==="player"){
    charData=getCharacter(opts.characterId || "lumi");
    maxHp=GAME_CONFIG.playerMaxHp*charData.hpMul;
    moveSpeed=GAME_CONFIG.playerMoveSpeed*charData.speedMul;
    color=charData.color; subColor=charData.subColor;
  } else {
    if(opts.isBoss){ maxHp=MATCH.bossMaxHp; moveSpeed=MATCH.enemyMoveSpeed*0.9; color="#b3203a"; subColor="#ff6a86"; }
    else { maxHp=MATCH.enemyMaxHp; moveSpeed=MATCH.enemyMoveSpeed; color="#8a3fd0"; subColor="#e0b3ff"; }
  }

  const r=opts.isBoss?38:22;
  const spawn=findClearSpawn(opts.x,opts.y,r);

  return {
    id:++fighterIdCounter,
    team:team, isPlayer:isPlayer, isBoss:!!opts.isBoss,
    characterId: charData?charData.id:null,
    weaponId: charData?getWeaponForCharacter(charData.id):null,   // 무기 완전 고정(캐릭터에서 계산)
    specialCd:0,
    name: opts.name || (charData?charData.name:"크롬"),
    char: charData,
    baseX:opts.x, baseY:opts.y,
    x:spawn.x, y:spawn.y, r:r,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp,
    moveSpeed:moveSpeed, color:color, subColor:subColor,
    facing: team==="player"?0:Math.PI,
    cooldown:0, lastCombatTime:-999, lastFireTime:-999,
    hitFlash:0, dead:false, respawnTimer:0, invincibleTimer:0,
    ai:{ strafeDir:1, strafeTimer:0, reactionTimer:0.3, fireTimer:rand(0,0.4),
         lastX:spawn.x, lastY:spawn.y, stuckCheck:0.4, avoidDir:1, avoidTimer:0,
         knowsTarget:true, lastKnownX:spawn.x, lastKnownY:spawn.y } };
}

function teamSlotPos(base, slot){
  const offsets=[ {dx:0,dy:0}, {dx:60,dy:-50}, {dx:-60,dy:50}, {dx:60,dy:50}, {dx:-60,dy:-50} ];
  const o=offsets[slot%offsets.length];
  return { x:base.x+o.dx, y:base.y+o.dy };
}

function createFighters(){
  const mode=MATCH.mode, map=MATCH.map;
  fighterIdCounter=0;

  const pPos=teamSlotPos(map.playerSpawn,0);
  player=makeFighter({ team:"player", isPlayer:true, characterId:selectedCharacterId, x:pPos.x, y:pPos.y });
  initAmmo(player);   // 장전: 사람이 조종하는 플레이어만 탄창 사용

  allies=[];
  const allyPool=profile.unlockedCharacters.filter(id=>id!==selectedCharacterId);
  for(let i=0;i<mode.allyCount;i++){
    const charId = allyPool.length>0 ? allyPool[i%allyPool.length] : selectedCharacterId;
    const pos=teamSlotPos(map.playerSpawn,i+1);
    allies.push(makeFighter({ team:"player", isPlayer:false, characterId:charId, x:pos.x, y:pos.y }));
  }

  enemies=[];
  for(let i=0;i<mode.enemyCount;i++){
    const pos=teamSlotPos(map.enemySpawn,i);
    const name=mode.enemyCount>1?("크롬 "+(i+1)):"크롬";
    enemies.push(makeFighter({ team:"enemy", isPlayer:false, x:pos.x, y:pos.y, name:name }));
  }
  enemy=enemies[0];
}

function playerTeam(){ return [player].concat(allies); }
function allFighters(){ return [player].concat(allies, enemies); }
function targetsOf(team){ return team==="player" ? enemies : playerTeam(); }

  selectedCharacterId=sanitizeCharacterId(profile.selectedCharacterId);

/* =======================================================================
   이동 / 충돌
   ======================================================================= */
// 캐릭터-장애물 충돌은 hitbox를 안쪽으로 살짝 줄여 모서리 답답함을 완화(벽 관통은 막음).
// 탄환 충돌은 inset을 쓰지 않아 기존처럼 또렷하게 막힌다.
function entityHitsObstacle(cx, cy, r){
  const ins=GAME_CONFIG.obstacleHitboxInset||0;
  for(const o of OBSTACLES){
    const iw=o.w-ins*2, ih=o.h-ins*2;
    if(iw<=0||ih<=0){ if(circleRectOverlap(cx,cy,r,o)) return true; continue; }
    if(circleRectOverlap(cx,cy,r,{x:o.x+ins,y:o.y+ins,w:iw,h:ih})) return true;
  }
  return false;
}
function moveEntity(ent, dx, dy){
  const ox=ent.x, oy=ent.y;
  ent.x+=dx;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.x=ox;   // x축 막히면 되돌림(모서리에서 미끄러짐 유지)
  ent.y+=dy;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.y=oy;
  ent.x=clamp(ent.x, ARENA.x+ent.r, ARENA.x+ARENA.w-ent.r);
  ent.y=clamp(ent.y, ARENA.y+ent.r, ARENA.y+ARENA.h-ent.r);
}
function inBush(ent){ return isInBushXY(ent.x, ent.y); }
function isInBushXY(x,y){
  for(const b of BUSHES){ if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return true; }
  return false;
}
// 풀숲 가시성: 내/아군은 항상 보임(풀숲 안이면 반투명), 적은 풀숲+멀면 숨김, 가까우면/공격 직후엔 보임.
// viewer={x,y,team}. 반환 {hidden, alpha}
function bushVisibility(fx, fy, fTeam, isMine, viewer, recentlyFired){
  const inB=isInBushXY(fx,fy);
  if(isMine) return { hidden:false, alpha: inB?0.6:1 };       // 내 캐릭터는 풀숲에서도 항상 명확(살짝 반투명)
  if(!inB) return { hidden:false, alpha:1 };
  if(viewer && fTeam===viewer.team) return { hidden:false, alpha:0.6 }; // 아군: 보임(흐릿)
  if(recentlyFired) return { hidden:false, alpha:0.7 };        // 공격 직후엔 드러남
  if(viewer && dist(fx,fy,viewer.x,viewer.y) <= GAME_CONFIG.bushRevealDistance) return { hidden:false, alpha:0.55 };
  return { hidden:true, alpha:0.55 };                          // 멀리 있는 풀숲 속 적 → 숨김
}
function canBeHit(ent){ return ent && !ent.dead && ent.invincibleTimer<=0; }

/* ── 함정 / 버프 아이템(하트·번개 젤리) — 맵 데이터 기반, host(또는 로컬)가 판정 ── */

// 둔화/버프 반영 이동속도
function effSpeed(f){
  let s=f.moveSpeed||0;
  if(f.freezeTimer>0) return 0;                                       // 빙결: 이동 불가
  if(f.slowTimer>0) s*=GAME_CONFIG.trapSlowMul;
  if(f.speedBuffTimer>0) s*=GAME_CONFIG.speedBuffMul;
  if(f.wSlowTimer>0) s*=(1-(f.wSlowPct||0));                          // 무기/기술 둔화(중첩 없음)
  if(f.cSpeedTimer>0) s*=(1+getAbility("student_03").c.speedUp);       // 시고니 C 질주 +45%
  if(f.shieldTimer>0) s*=getAbility("student_06").x.slowMul;           // 별골렘 X 방패 −20%
  if(f.upg && f.upg.mspd) s*=(1+0.05*f.upg.mspd);                       // PVE 강화: 빠른 발
  return s*TEMPO.playerMove;
}
function tickStatus(f,dt){

  if(f.trapTimer>0)f.trapTimer-=dt; if(f.fireRevealTimer>0)f.fireRevealTimer-=dt;
  if(f.wSlowTimer>0)f.wSlowTimer-=dt;

}
function isFrozen(f){ return !!(f && f.freezeTimer>0); }               // 빙결: 이동·공격 불가
// 함정 효과(밟으면): damage=약한 피해(비살상, 쿨타임), slow=잠시 둔화. 리스폰 무적 중엔 무시.
function applyTrapTo(f){
  if(!f || f.dead || f.inactive || f.invincibleTimer>0) return;
  for(const t of currentTraps()){
    if(circleRectOverlap(f.x,f.y,f.r,t)){
      if(t.type==="slow"){ f.slowTimer=GAME_CONFIG.trapSlowTime; }
      else { if(!(f.trapTimer>0)){
        let td=GAME_CONFIG.trapDamage;
        if(f.dmgReduceTimer>0) td*=getAbility("student_03").c.reduceMul;   // 시고니 C 후반: 함정 피해 절반
        f.hp=Math.max(1, f.hp-td); f.hitFlash=0.12; f.trapTimer=GAME_CONFIG.trapCooldown; spawnHit?spawnHit(f.x,f.y,"#ff9a9a"):0; } }
    }
  }
}
// 아이템 1개 생성(장애물/함정/시작지점 회피)
function spawnPowerupHost(map){
  if(POWERUPS.length>=GAME_CONFIG.powerupMaxCount) return;
  map=map||currentMap();
  for(let tryN=0; tryN<20; tryN++){
    const x=rand(ARENA.x+40, ARENA.x+ARENA.w-40), y=rand(ARENA.y+40, ARENA.y+ARENA.h-40);
    let bad=false;
    for(const o of (map.obstacles||[])){ if(circleRectOverlap(x,y,20,o)){ bad=true; break; } }
    if(!bad) for(const t of (map.traps||[])){ if(circleRectOverlap(x,y,20,t)){ bad=true; break; } }
    if(!bad){ const sp=map.playerSpawn, ep=map.enemySpawn;
      if(sp && dist(x,y,sp.x,sp.y)<120) bad=true; else if(ep && dist(x,y,ep.x,ep.y)<120) bad=true; }
    if(!bad){ const types=["heal","speed","shield","ammo","clock"];   // PRD 13.1 전투 아이템 5종
      POWERUPS.push({ id:++powerupId, x:Math.round(x), y:Math.round(y), type: types[Math.floor(Math.random()*types.length)] }); return; }
  }
}
function applyPowerup(f, type){
  if(type==="heal"){ f.hp=Math.min(f.maxHp, f.hp+GAME_CONFIG.healPowerupAmount); effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#4bd86b"}); }
  else if(type==="shield"){ f.shieldItemTimer=5; effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#9fd0ff"}); }        // 방패 젤리: 5초 받는 피해 25%↓
  else if(type==="ammo"){ if(usesAmmo(f)){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#ffd9a0"}); }  // 별빛 탄약: 탄창 즉시 완충
  else if(type==="clock"){ f.specialCd=Math.max(0,(f.specialCd||0)-3); effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#d9b3ff"}); }   // 시계 젤리: X 쿨 3초 감소
  else { f.speedBuffTimer=GAME_CONFIG.speedBuffTime; effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#ffe066"}); }
}
// host/로컬: 아이템 주기 생성 + 픽업 판정. fighters=플레이어가 조종하는 파이터 배열.
function tickPowerupsHost(dt, fighters){
  powerupAcc+=dt; if(powerupAcc>=GAME_CONFIG.powerupSpawnInterval){ powerupAcc=0; spawnPowerupHost(); }
  for(let i=POWERUPS.length-1;i>=0;i--){ const p=POWERUPS[i];
    for(const f of fighters){ if(!f||f.dead||f.inactive) continue;
      if(dist(f.x,f.y,p.x,p.y) < f.r+16){ applyPowerup(f,p.type); POWERUPS.splice(i,1); break; } }
  }
}
function drawTraps(){
  for(const t of currentTraps()){
    ctx.save();
    // 코덱스 함정 이미지(가시판/끈끈이) — 없으면 도형 fallback

    if(timg){
      const iw=timg.naturalWidth||1, ih=timg.naturalHeight||1;

      ctx.strokeStyle="rgba(90,210,150,0.7)"; ctx.lineWidth=2; roundRect(t.x,t.y,t.w,t.h,10); ctx.stroke();
      ctx.fillStyle="rgba(150,240,200,0.5)"; for(let i=0;i<6;i++){ const px=t.x+((i*41.7)%t.w), py=t.y+((i*29.3)%t.h); ctx.beginPath(); ctx.arc(px+10,py+10,5,0,Math.PI*2); ctx.fill(); }
    } else { // 반짝 가시판
      ctx.fillStyle="rgba(255,120,140,0.28)"; roundRect(t.x,t.y,t.w,t.h,10); ctx.fill();
      ctx.strokeStyle="rgba(255,120,140,0.7)"; ctx.lineWidth=2; roundRect(t.x,t.y,t.w,t.h,10); ctx.stroke();
      ctx.fillStyle="rgba(255,220,120,0.8)"; const pulse=0.5+0.5*Math.sin(uiTime*5);
      for(let i=0;i<5;i++){ const px=t.x+10+((i*53.7)%(t.w-20)), py=t.y+t.h/2; drawStar(px,py,4,5+pulse*2,2,"rgba(255,220,120,0.8)"); }
    }
    ctx.restore();
  }
}

// 전투 아이템 5종(PRD 13.1): 하트♥ 번개⚡ 방패🛡 탄약✚ 시계⏱ — 로컬은 type, 게스트는 패킷 t(0~4)로 렌더
const POWERUP_STYLE=[
