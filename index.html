function handleKeyPress(code){
  // EDIT-TEST-1: м—җл””н„° лҜёлҰ¬н•ҳкё° мӨ‘м—” Esc/EnterлЎң м—җл””н„° ліөк·Җ(л§ө к·ёлҢҖлЎң)
  if(edTest && (gameState===STATE.PLAYING||gameState===STATE.PAUSED||gameState===STATE.OVER)){
    if(code==="Escape"){ edEndTest(); return; }
    if(gameState===STATE.OVER){
      if(code==="KeyR"){ edStartTest(); return; }                               // лӢӨмӢң н…ҢмҠӨнҠё
      if(code==="Enter"||code==="NumpadEnter"||code==="Space"){ edEndTest(); return; }
    }
    // к·ё мҷё нӮӨ(мқҙлҸҷВ·кіөкІ©В·P мқјмӢңм •м§Җ л“ұ)лҠ” м•„лһҳ мқјл°ҳ мІҳлҰ¬лЎң
  }
  // лӮҳк°Җкё° нҷ•мқё мҳӨлІ„л Ҳмқҙк°Җ л–  мһҲмңјл©ҙ Y/Nл§Ң мІҳлҰ¬(лӢӨлҘё мһ…л Ҙ л¬ҙмӢң)
  if(confirmLeave){
    if(code==="KeyY"){ confirmLeave=false; doLeaveToStart(); return; }
    if(code==="KeyN"||code==="Escape"){ confirmLeave=false; return; }
    return;
  }
  if(gameState === STATE.ASSET_CHECK){ if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(gameState === STATE.PROFILE){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="KeyN") changeNickname();
    else if(code==="KeyI"){ collectionIndex=0; gameState=STATE.COLLECTION; }
    return;
  }
  if(gameState === STATE.COLLECTION){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="ArrowLeft"){ collectionIndex=Math.max(0,collectionIndex-1); }
    else if(code==="ArrowRight"){ collectionIndex=collectionIndex+1; }
    else if(code==="KeyT"){ collectionTab=(collectionTab==="char")?"tool":"char"; collectionIndex=0; }
    return;
  }
  if(gameState === STATE.SPLASH){ if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="Escape"){ goToLogin(); } return; }
  if(gameState === STATE.LOGIN){ handleLoginKey(code); return; }
  if(gameState === STATE.ADMIN_LOGIN){ handleAdminLoginKey(code); return; }
  if(gameState === STATE.ADMIN){ handleAdminKey(code); return; }
  if(gameState === STATE.BALANCE){ handleBalanceKey(code); return; }   // BALANCE-1: көҗмӮ¬мҡ© л°ёлҹ°мҠӨ мҪҳмҶ”
  if(gameState === STATE.START){ handleStartKey(code); return; }
  if(gameState === STATE.PF_SELECT){ handlePfSelectKey(code); return; }   // GENRE-EXPAND-1 В§3
  if(gameState === STATE.PLATFORMER){ handlePlatformerKey(code); return; }
  if(gameState === STATE.RPG){ handleRpgKey(code); return; }              // RPGлӘЁл“ң В§1.1
  if(gameState === STATE.RPG_REVIEW){ handleRpgReviewKey(code); return; }  // RPGлӘЁл“ң В§7.4: көҗмӮ¬ мҪҳн…җмё  мҠ№мқё
  if(gameState === STATE.EDITOR){ handleEditorKey(code); return; }        // OVERNIGHT-1: л§өкіөл°©
  if(gameState === STATE.MAP_REVIEW){ handleMapReviewKey(code); return; } // OVERNIGHT-1: көҗмӮ¬ л§ө мҠ№мқё
  if(gameState === STATE.SHOP){ handleShopKey(code); return; }
  if(gameState === STATE.ONLINE_MENU){ handleOnlineMenuKey(code); return; }
  if(gameState === STATE.ONLINE_LOBBY){ handleOnlineLobbyKey(code); return; }
  if(gameState === STATE.ONLINE_PLAYING){ handleOnlinePlayKey(code); return; }
  if(gameState === STATE.ONLINE_OVER){
    // л°©мһҘмқҖ R/EnterлЎң к°ҷмқҖ л°© мһ¬мӢңмһ‘, м°ёк°ҖмһҗлҠ” л°©мһҘ лҢҖкё°. EscлҠ” лӮҳк°Җкё° нҷ•мқё.
    if(code==="KeyR"||code==="Enter"||code==="NumpadEnter"){
      if(OnlineManager.role==="host") onlineRematch();
      else showToast("л°©мһҘмқҙ лӢӨмӢң мӢңмһ‘н•ҳл©ҙ н•Ёк»ҳ мӢңмһ‘лҸјмҡ”");
      return;
    }
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PLAYING){
    // Z=кё°ліёкіөкІ©(м—°мӮ¬: updatePlayer) В· X=нҠ№мҲҳкё°мҲ  В· C=к¶Ғк·№кё° вҖ” X/CлҠ” лҲҢлҰј мҲңк°„ 1нҡҢ(keydown !repeat = edge)
    // (кё°мЎҙ X/Space к¶Ғк·№кё° вҶ’ CлЎң мқҙлҸҷ. Space лі„м№ӯмқҖ м ңкұ° вҖ” мЎ°мһ‘ нҶөмқј: л°©н–ҘнӮӨВ·ZВ·XВ·CВ·R)
    if(code==="KeyX"){ useCharacterSpecial(); return; }
    if(code==="KeyC"){ useCharacterSuper(); return; }
    if(code==="KeyP"){ setPaused(true); return; }
    if(code==="KeyR"){ reloadWeaponManual(); return; }   // мһҘм „(кІ°кіјнҷ”л©ҙ R мһ¬мӢңмһ‘кіј л¶„лҰ¬: PLAYINGм—җм„ңл§Ң мһҘм „)
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PAUSED){
    if(code==="KeyP"){ setPaused(false); return; }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
  if(gameState === STATE.OVER){
    if(code==="ArrowLeft"){ resultButtonIndex=0; return; }
    if(code==="ArrowRight"){ resultButtonIndex=1; return; }
    if(code==="KeyR"){ startGame(); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"){
      if(resultButtonIndex===0) startGame(); else goToStartScreen();
      return;
    }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
}

function handleStartKey(code){

  if(code==="ArrowRight"){ changeMenuValue(menuIndex,+1); return; }
  if(code==="Enter"||code==="NumpadEnter"){ activateMenuRow(menuIndex); return; }
  if(code==="Escape"){ openSettings(); return; }              // вҡҷ м„Өм •(лі„лӘ…В·лЎңк·ём•„мӣғВ·көҗмӮ¬мҡ©)

let _pfSel=null;

function pfTileAt(c,r){
  if(c<0||c>=PF.cols) return "#";                 // мўҢмҡ° кІҪкі„ = лІҪ
  if(r<0) return ".";
  if(r>=PF.rows) return ".";                      // м•„лһҳлҠ” лӮҷмӮ¬ нҢҗм •мқҙ мІҳлҰ¬
  return PF.grid[r][c];
}
function pfSolid(ch){ return ch==="#"||ch==="i"||ch==="b"; }   // P1.5: м–јмқҢ(i)В·л¶Җм„ңм§ҖлҠ” лё”лЎқ(b)лҸ„ мҶ”лҰ¬л“ң
function pfStartLevel(level, opts){
  opts=opts||{};
  const rows=level.rows.map(s=>s.split(""));
  const cols=rows[0].length;
  let sx=1.5, sy=1, monsters=[], starsTotal=0;
  for(let r=0;r<rows.length;r++) for(let c=0;c<rows[r].length;c++){
    const ch=rows[r][c];
    if(ch==="*"){ sx=c+0.5; sy=r; rows[r][c]="."; }
    else if(ch==="M"){ monsters.push({x:(c+0.5)*56, y:(r+1)*56, dir:-1, dead:false, w:40, h:40}); rows[r][c]="."; }
    else if(ch==="o") starsTotal++;
  }
  PF={ level:level, test:!!opts.test, grid:rows, cols:cols, rows:rows.length,
       p:{ x:sx*56, y:sy*56+56-0.01, vx:0, vy:0, onGround:false, coyote:0, buffer:0, facing:1,
           jumpHeld:false, cutDone:false, dropT:0,
           gun:false, gunCd:0, starT:0, featherT:0, magnetT:0, inv:0 },   // P1.5 нҢҢмӣҢм—… мҠ¬лЎҜ
       shots:[], crumble:{},                                              // P1.5 вӯҗмҙқ л°ңмӮ¬мІҙ В· л¶Җм„ңм§ҖлҠ” лё”лЎқ нғҖмқҙлЁё
       monsters:monsters, checkpoint:{x:sx*56, y:sy*56+56-0.01},
       time:0, deaths:0, stars:0, starsTotal:starsTotal, cleared:false, clearT:0,
       camX:0, camY:0, camGY:sy*56+56, touch:{l:false,r:false,j:false},
       lookX:PF_CONST.LOOK, lookTarget:PF_CONST.LOOK, lookDir:1, faceT:1 };
  pfCamSnap();
  gameState=STATE.PLATFORMER;
}
function pfDie(){

  const p=PF.p;
  p.x=PF.checkpoint.x; p.y=PF.checkpoint.y; p.vx=0; p.vy=0; p.onGround=false; p.dropT=0;
  p.gun=false; p.starT=0; p.featherT=0; p.magnetT=0; p.inv=0; PF.shots.length=0;   // P1.5: мЈҪмңјл©ҙ нҢҢмӣҢм—… мҶҢмӢӨ
  PF.camGY=p.y; pfCamSnap();
}
/* P1.5: н”јн•ҙ лӢЁкі„(л§ҲлҰ¬мҳӨмӢқ) вҖ” л¬ҙм Ғ/лі„ мӨ‘м—” л¬ҙмӢң, нҢҢмӣҢм—…мқҙ мһҲмңјл©ҙ мЈҪлҠ” лҢҖмӢ  м „л¶Җ мғҒмӢӨ+м§§мқҖ л¬ҙм Ғ */
function pfHurt(){
  const p=PF.p;
  if(p.inv>0 || p.starT>0) return;
  if(p.gun || p.featherT>0 || p.magnetT>0){
    p.gun=false; p.featherT=0; p.magnetT=0; p.inv=PF_CONST.HURT_INV;
    playSfx("hit"); showToast("рҹ’ў нҢҢмӣҢм—…мқ„ мһғм—ҲлӢӨ!");
    return;
  }
  pfDie();
}
function pfShoot(){   // P1.5 вӯҗмҙқ: XнӮӨ вҖ” мһҗкё° л¬ҙкё° мғүмқҳ мҲҳнҸүнғ„(лӘ¬мҠӨн„° мӣҗкұ°лҰ¬ мІҳм№ҳВ·л¶Җм„ңм§ҖлҠ” лё”лЎқ нҢҢкҙҙ)
  const p=PF.p;
  if(!PF || PF.cleared || !p.gun || p.gunCd>0) return;
  p.gunCd=PF_CONST.GUN_CD;
  PF.shots.push({ x:p.x+p.facing*20, y:p.y-PF_CONST.PH*0.55, dir:p.facing, traveled:0, alive:true });
  playSfx("shoot");
}
function pfClear(){
  if(PF.cleared) return;
  PF.cleared=true; PF.clearT=0;
  playSfx("clear");
  if(PF.test) return;                              // м—җл””н„° н…ҢмҠӨнҠён”Ңл Ҳмқҙ: ліҙмғҒВ·кё°лЎқ м—ҶмқҢ
  const best=pfLoadBest(), id=PF.level.id, prev=best[id];
  const rec={ time:Math.round(PF.time*100)/100, stars:PF.stars, total:PF.starsTotal, clears:((prev&&prev.clears)||0)+1 };
  // В§4.1 ліҙмғҒ: мІ« нҒҙлҰ¬м–ҙ +40GВ·кІҪн—ҳм№ҳ30 / кё°лЎқ к°ұмӢ  +10G
  // BIG-BATCH-2 P1: лі„мЎ°к°Ғ м—°кі„ вҖ” мІҳмқҢ лӘЁмқҖ лі„мЎ°к°Ғ 1к°ңлӢ№ +2G(л°ҳліө нҢҢл°Қ л°©м§Җ: 'мөңкі  кё°лЎқ мҙҲкіјл¶„'л§Ң)
  if(!prev){
    const zoneBonus=(PF.level.camp!==undefined && PF.level.camp%5===4)?30:0;   // P1.5: кө¬м—ӯ лҒқ(5В·10В·15В·20) мІ« нҒҙлҰ¬м–ҙ +30G
    const sg=PF.stars*2;
    addGold(40+sg+zoneBonus); addExp(30);
    showToast("рҹҰҳ мІ« нҒҙлҰ¬м–ҙ! +"+(40+sg+zoneBonus)+"G В· кІҪн—ҳм№ҳ +30"+(zoneBonus?" В· кө¬м—ӯ мҷ„мЈј рҹҺү":""));
    best[id]=rec;
  } else {
    rec.time=Math.min(rec.time, prev.time);
    rec.stars=Math.max(rec.stars, prev.stars||0);
    if(Math.round(PF.time*100)/100 < prev.time){ addGold(10); showToast("вҸұ кё°лЎқ к°ұмӢ ! +10G ("+prev.time.toFixed(2)+"вҶ’"+PF.time.toFixed(2)+"мҙҲ)"); rec.time=Math.round(PF.time*100)/100; }
    if(PF.stars > (prev.stars||0)){ const sg=(PF.stars-(prev.stars||0))*2; addGold(sg); showToast("вӯҗ мғҲ лі„мЎ°к°Ғ +"+sg+"G"); }
    best[id]=rec;
  }
  pfSaveBest(best);
  PF.bestView=best[id];   // PERF-2: нҒҙлҰ¬м–ҙ мҳӨлІ„л Ҳмқҙк°Җ н”„л Ҳмһ„л§ҲлӢӨ localStorage нҢҢмӢұн•ҳм§Җ м•ҠкІҢ мҠӨлғ…мғ·
  _pfSel=null;            // PERF-2: м„ нғқ нҷ”л©ҙ мәҗмӢң л¬ҙнҡЁнҷ”(кё°лЎқВ·н•ҙкёҲ к°ұмӢ )
  try{ saveProfile(); }catch(e){}
}
function pfJumpPressed(){   // keydown м—җм§Җ(Z/Space) лҳҗлҠ” н„°м№ҳ м җн”„ лІ„нҠј
  if(!PF || PF.cleared) return;
  PF.p.buffer=PF_CONST.BUFFER;
  // вҶ“+м җн”„ = мӣҗмӣЁмқҙ нҶөкіј н•ҳк°•
  if((keysDown.has("ArrowDown")||PF.touch.dn) && PF.p.onGround){
    const p=PF.p, r=Math.floor((p.y+1)/56);
    const c0=Math.floor((p.x-PF_CONST.PW/2)/56), c1=Math.floor((p.x+PF_CONST.PW/2)/56);
    let oneway=true;
    for(let c=c0;c<=c1;c++){ const ch=pfTileAt(c,r); if(ch==="#"){ oneway=false; break; } }
    if(oneway){ p.dropT=0.25; p.onGround=false; p.buffer=0; return; }
  }
}
function pfUpdate(dt){
  if(!PF) return;
  const C=PF_CONST, p=PF.p;
  if(PF.cleared){ PF.clearT+=dt; return; }
  PF.time+=dt;
  // в”Җв”Җ мһ…л Ҙ в”Җв”Җ
  let dir=0;
  if(keysDown.has("ArrowLeft")||keysDown.has("KeyA")||PF.touch.l) dir-=1;
  if(keysDown.has("ArrowRight")||keysDown.has("KeyD")||PF.touch.r) dir+=1;
  const jumpHeld=keysDown.has("KeyZ")||keysDown.has("Space")||PF.touch.j;
  // в”Җв”Җ мҲҳнҸү в”Җв”Җ (P1.5: м–јмқҢ мң„м—җм„  к°ҖмҶҚВ·л§Ҳм°° кёүк°җ = лҜёлҒ„лҹј)
  let onIce=false;
  if(p.onGround){ const rI=Math.floor((p.y+2)/56), cI=Math.floor(p.x/56); onIce=(pfTileAt(cI,rI)==="i"); }
  const acc=p.onGround?(onIce?C.ICE_ACC:C.ACC_G):C.ACC_A, fric=p.onGround?(onIce?C.ICE_FRIC:C.FRIC_G):C.FRIC_A;
  if(dir!==0){ p.vx+=dir*acc*dt; p.vx=clamp(p.vx,-C.MOVE_SPD,C.MOVE_SPD); p.facing=dir; }
  else { const s=Math.sign(p.vx); p.vx-=s*fric*dt; if(Math.sign(p.vx)!==s) p.vx=0; }
  // x мқҙлҸҷ + м¶©лҸҢ(мҶ”лҰ¬л“ңл§Ң)
  p.x+=p.vx*dt;
  {
    const hw=C.PW/2;
    const r0=Math.floor((p.y-C.PH+2)/56), r1=Math.floor((p.y-2)/56);
    if(p.vx>0){ const c=Math.floor((p.x+hw)/56);
      for(let r=r0;r<=r1;r++) if(pfSolid(pfTileAt(c,r))){ p.x=c*56-hw-0.01; p.vx=0; break; } }
    else if(p.vx<0){ const c=Math.floor((p.x-hw)/56);
      for(let r=r0;r<=r1;r++) if(pfSolid(pfTileAt(c,r))){ p.x=(c+1)*56+hw+0.01; p.vx=0; break; } }
    p.x=clamp(p.x, hw+0.01, PF.cols*56-hw-0.01);
  }
  // в”Җв”Җ мҲҳм§Ғ в”Җв”Җ
  const rising=p.vy<0;
  const g=(rising&&jumpHeld)?C.GRAVITY*C.HOLD_MUL:C.GRAVITY;
  p.vy=Math.min(C.TERM_VY, p.vy+g*dt);
  if(!jumpHeld && p.vy<0 && !p.cutDone){ p.vy*=C.JUMP_CUT; p.cutDone=true; }   // к°ҖліҖ м җн”„(лҰҙлҰ¬мҰҲ м»· 1нҡҢ)
  const prevFeet=p.y;
  p.y+=p.vy*dt;
  if(p.dropT>0) p.dropT-=dt;
  p.onGround=false;
  {
    const hw=C.PW/2-2;
    const c0=Math.floor((p.x-hw)/56), c1=Math.floor((p.x+hw)/56);
    if(p.vy>=0){   // н•ҳк°•: мҶ”лҰ¬л“ң + мӣҗмӣЁмқҙ(мң„вҶ’м•„лһҳ көҗм°Ё мӢңл§ҢВ·л“ңлһҚ мӨ‘ м ңмҷё)
      const r=Math.floor(p.y/56);
      for(let c=c0;c<=c1;c++){
        const ch=pfTileAt(c,r);
        const top=r*56;
        if(pfSolid(ch) || (ch==="-" && p.dropT<=0 && prevFeet<=top+1)){
          if(p.y>=top){ p.y=top-0.01; p.vy=0; p.onGround=true; p.coyote=C.COYOTE; p.cutDone=false; PF.camGY=p.y;
            if(ch==="b"){ const bk=r+","+c; if(PF.crumble[bk]===undefined) PF.crumble[bk]=0.45; }   // P1.5: л°ҹмңјл©ҙ 0.45s нӣ„ л¶•кҙҙ
            break; }
        }
      }
    } else {       // мғҒмҠ№: лЁёлҰ¬ л°•кё°(мҶ”лҰ¬л“ңл§Ң) вҖ” P1.5: л¶Җм„ңм§ҖлҠ” лё”лЎқ(b)мқҖ м•„лһҳм—җм„ң л°•мңјл©ҙ нҢҢкҙҙ
      const r=Math.floor((p.y-C.PH)/56);
      for(let c=c0;c<=c1;c++){ const hch=pfTileAt(c,r);
        if(pfSolid(hch)){
          if(hch==="b"){ PF.grid[r][c]="."; playSfx("break"); }
          p.y=(r+1)*56+C.PH+0.01; p.vy=0; break; }
      }
    }
  }
  if(!p.onGround) p.coyote=Math.max(0,p.coyote-dt);
  // м җн”„(лІ„нҚј+мҪ”мҡ”н…Ң) вҖ” P1.5: к№ғн„ё нҢҢмӣҢм—… = м җн”„л Ҙ мҰқк°Җ
  if(p.buffer>0){ p.buffer-=dt;
    if(p.onGround||p.coyote>0){ p.vy=C.JUMP_V*(p.featherT>0?C.FEATHER_MUL:1); p.onGround=false; p.coyote=0; p.buffer=0; p.cutDone=false; playSfx("jump"); }
  }
  // в”Җв”Җ нғҖмқј мғҒнҳёмһ‘мҡ©(лӘё мӨ‘мӢ¬В·л°ң кё°мӨҖ) в”Җв”Җ
  {

      else if(ch==="F"){ if(PF.checkpoint.x!==(c+0.5)*56){ PF.checkpoint={x:(c+0.5)*56, y:r*56+56-0.01}; playSfx("checkpoint"); showToast("рҹҡ© мІҙнҒ¬нҸ¬мқёнҠё!"); } }

      else if(ch==="!"){ PF.grid[r][c]="."; p.starT=C.STAR_T; playSfx("powerup"); showToast("рҹҢҹ л¬ҙм Ғ! ("+C.STAR_T+"мҙҲ)"); }
      else if(ch==="w"){ PF.grid[r][c]="."; p.featherT=8; playSfx("powerup"); showToast("рҹӘ¶ к№ғн„ё! м җн”„л Ҙ UP (8мҙҲ)"); }
      else if(ch==="m"){ PF.grid[r][c]="."; p.magnetT=8; playSfx("powerup"); showToast("рҹ§І мһҗм„қ! лі„мЎ°к°Ғмқҙ лӘЁм—¬мҡ” (8мҙҲ)"); }

      s.alive=false; continue;
    }

      if(s.x>m.x-m.w/2 && s.x<m.x+m.w/2 && s.y>m.y-m.h && s.y<m.y){ m.dead=true; s.alive=false; playSfx("kill"); break; }

  }

  for(const m of PF.monsters){

      else { pfHurt(); if(PF.p.inv<=0) return; }                                                              // P1.5: нҢҢмӣҢм—… мһҲмңјл©ҙ мғҒмӢӨлЎң лҢҖмІҙ
    }
  }

function pfCamSnap(){
  const mw=PF.cols*56, mh=PF.rows*56;
  PF.camX=clamp(PF.p.x+(PF.lookX||0)-LOGW/2, 0, Math.max(0,mw-LOGW));
  PF.camY=clamp(PF.camGY-LOGH*0.62, Math.min(0,mh-LOGH), Math.max(0,mh-LOGH));
}
function pfCamUpdate(dt){
  const C=PF_CONST, p=PF.p, mw=PF.cols*56, mh=PF.rows*56;
  // x: lookahead вҖ” л°©н–Ҙмқ„ LOOK_HOLDмҙҲ мң м§Җн•ҙм•ј лӘ©н‘ң л°ҳм „ + мҳӨн”„м…ӢмқҖ LOOK_SPD мғҒн•ңмңјлЎңл§Ң мқҙлҸҷ(л’ӨлҸҢкё° кёүм җн”„ л©ҖлҜё м ңкұ°)
  if(p.facing===PF.lookDir) PF.faceT+=dt;
  else { PF.lookDir=p.facing; PF.faceT=0; }
  if(PF.faceT>=C.LOOK_HOLD) PF.lookTarget=PF.lookDir*C.LOOK;
  const dl=PF.lookTarget-PF.lookX, lstep=C.LOOK_SPD*dt;
  PF.lookX+=clamp(dl,-lstep,lstep);
  const want=clamp(p.x+PF.lookX-LOGW/2, 0, Math.max(0,mw-LOGW));
  const dx=want-PF.camX;
  if(Math.abs(dx)>60) PF.camX+=(dx-Math.sign(dx)*60);
  else PF.camX+=dx*Math.min(1,dt*4);
  // y: м°©м§Җ y кё°мӨҖ + lerp(м җн”„ м¶ңл Ғмһ„ л°©м§Җ вҖ” м°©м§Җ мёө л°”лҖ” л•Ңл§Ң мқҙлҸҷ)
  const wy=clamp(PF.camGY-LOGH*0.62, Math.min(0,mh-LOGH), Math.max(0,mh-LOGH));
  PF.camY+=(wy-PF.camY)*Math.min(1,dt*8);
}

function pfUnlockedCount(){
  const best=pfLoadBest();
  let n=1;
  for(let i=0;i<PF_LEVELS.length;i++){ if(best[PF_LEVELS[i].id]) n=i+2; }
  return Math.min(n, PF_LEVELS.length);
}
function pfLevelLocked(lv){
  if(lv.camp===undefined) return false;                    // н•ҷмғқ л§өмқҖ н•ӯмғҒ м—ҙлҰј
  return lv.camp >= pfUnlockedCount();
}

function handlePfSelectKey(code){
  if(!_pfSel) pfSelRefresh();
  const list=_pfSel.list;   // PERF-2: нӮӨ л°ҳліө мһ…л Ҙл§ҲлӢӨ мҠӨнҶ м–ҙ нҢҢмӢұ л°©м§Җ
  if(code==="Escape"){ goToStartScreen(); return; }
  if(code==="ArrowUp"){ pfSelIdx=(pfSelIdx+list.length-1)%list.length; return; }
  if(code==="ArrowDown"){ pfSelIdx=(pfSelIdx+1)%list.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    const lv=list[pfSelIdx];
    if(pfLevelLocked(lv)){ showToast("рҹ”’ мқҙм „ мҠӨн…Ңмқҙм§ҖлҘј лЁјм Җ нҒҙлҰ¬м–ҙн•ҙмҡ”!"); return; }
    pfStartLevel(lv); return;
  }
}
function handlePlatformerKey(code){
  if(!PF){ gameState=STATE.START; return; }
  if(PF.cleared){
    if(PF.test){ if(code==="Enter"||code==="NumpadEnter"||code==="Escape"){ if(ED) ED.testCleared=true; gameState=STATE.EDITOR; PF=null; } return; }
    if(code==="Enter"||code==="NumpadEnter"){
      // P1.5 мә нҺҳмқё м—°мҶҚ м§„н–ү: нҒҙлҰ¬м–ҙ вҶ’ Enter = л°”лЎң лӢӨмқҢ мҠӨн…Ңмқҙм§Җ(м„ нғқ нҷ”л©ҙ ліөк·Җ м—ҶмқҢ)
      if(PF.level.camp!==undefined && PF.level.camp+1<PF_LEVELS.length){ pfStartLevel(PF_LEVELS[PF.level.camp+1]); return; }
      pfStartLevel(PF.level); return;
    }
    if(code==="KeyR"){ pfStartLevel(PF.level); return; }   // лӢӨмӢң лҸ„м „
    if(code==="Escape"){ PF=null; pfOpenSelect(); return; }
    return;
  }
  if(code==="KeyZ"||code==="Space"){ pfJumpPressed(); return; }
  if(code==="KeyX"){ pfShoot(); return; }                     // P1.5 вӯҗмҙқ л°ңмӮ¬
  if(code==="KeyR"){ pfDie(); return; }                       // к№ғл°ңл¶Җн„° мһ¬мӢңмһ‘(мӮ¬л§қ м№ҙмҡҙнҠё нҸ¬н•Ё)
  if(code==="Escape"){
    if(PF.test){ gameState=STATE.EDITOR; PF=null; return; }   // н…ҢмҠӨнҠё мӨ‘лӢЁ(нҒҙлҰ¬м–ҙ м•„лӢҳ)
    PF=null; pfOpenSelect(); return;
  }
}
// н„°м№ҳ(В§3.6): мўҢн•ҳлӢЁ в—Җв–¶ В· мҡ°н•ҳлӢЁ м җн”„ вҖ” н”Ңлһ«нҸ¬лЁё мғҒнғңм—җм„ң н„°м№ҳ н•ёл“Өлҹ¬к°Җ мң„мһ„
function pfTouchAt(p, on){
  if(!PF) return false;
  if(dist(p.x,p.y,90,LOGH-90)<60){ PF.touch.l=on; return true; }
  if(dist(p.x,p.y,200,LOGH-90)<60){ PF.touch.r=on; return true; }
  if(dist(p.x,p.y,LOGW-100,LOGH-90)<70){ if(on&&!PF.touch.j) pfJumpPressed(); PF.touch.j=on; return true; }
  if(PF.p.gun && dist(p.x,p.y,LOGW-210,LOGH-70)<50){ if(on) pfShoot(); return true; }   // P1.5 вӯҗл°ңмӮ¬(мҙқ ліҙмң  мӢң)
  if(p.y>LOGH*0.55 && p.x<LOGW/2){ PF.touch.dn=on; return true; }   // н•ҳлӢЁ мўҢмёЎ л„“кІҢ = вҶ“(мӣҗмӣЁмқҙ н•ҳк°• ліҙмЎ°)
  return false;
}

let RPG_DB_LIVE=null;
function rpgDb(){ return RPG_DB_LIVE||RPG_DB; }   // merge(RPG_DB, мҠ№мқё н•ҷмғқл¶„)
function rpgFind(tbl,id){ const t=rpgDb()[tbl]; if(!t||!id) return null; for(const r of t){ if(r.id===id) return r; } return null; }
function rpgItemAny(id){   // мқёлІӨ н‘ңмӢң/к°ҖкІ©мҡ© лІ”мҡ© мЎ°нҡҢ вҖ” seed_<cropId>лҠ” м”Ём•— мқҳмӮ¬ м•„мқҙн…ң
  if(!id) return null;
  if(id.indexOf("seed_")===0){ const c=rpgFind("crops", id.slice(5)); return c?{ id:id, name:c.name+" м”Ём•—", kind:"seed", crop:c, price:c.seedPrice }:null; }
  return rpgFind("items",id)||rpgFind("weapons",id)||rpgFind("armors",id)||rpgFind("crops",id);
}
function rpgNameOf(id){ const it=rpgItemAny(id); return it?it.name:(""+id); }

/* в”Җв”Җ RPG-4 мң„нӮӨ нҢҢмқҙн”„лқјмқё(В§7.2В·В§7.4): н•ҷмғқ мҪҳн…җмё  мҠӨнҶ м–ҙВ·кІҖмҰқкё° 7лӢЁкі„В·л¶ҖнҢ… лі‘н•© в”Җв”Җ */
const RPG_CONTENT_KEY="starArena.rpgContent.v1";
// вҳ… STUDENT_RPG_EDIT(көҗмӮ¬): кёҲм№ҷм–ҙ вҖ” мҙҲл“ұ л¶Җм Ғн•©В·к°ңмқём •ліҙ(В§7.4 в‘Ј). м •к·ңнҷ” нӣ„ л¶Җл¶„мқјм№ҳ.
const RPG_BANNED=["л°”ліҙ","л©ҚмІӯ","мЈҪм–ҙ","мЈҪм—¬","мӢңл°ң","мЎҙлӮҳ","мғҲлҒј","кәјм ё","лі‘мӢ "];
function loadRpgContent(){ try{ const s=JSON.parse(localStorage.getItem(RPG_CONTENT_KEY)); if(s&&typeof s==="object"){ if(!s.pending)s.pending=[]; if(!s.approved)s.approved=[]; return s; } }catch(e){} return { pending:[], approved:[] }; }
function saveRpgContent(st){ try{ localStorage.setItem(RPG_CONTENT_KEY, JSON.stringify(st)); }catch(e){} }
// нғҖмһ…лі„ мғҒн•ңн‘ң(В§7.1 вҖ” кІҖмҰқкё°мҷҖ лӢЁмқј м¶ңмІҳ). [min,max,required]
const RPG_SCHEMA={
  monsters:{ hp:[5,500,1], atk:[1,25,1], speed:[0,260,1], exp:[1,30,1], tier:[0,3,0] },
  weapons:{ dmg:[1,30,1], cd:[0.35,2.0,1], range:[40,420,1], levelReq:[1,10,0] },
  armors:{ hpAdd:[0,40,0], defAdd:[0,15,0], regenAdd:[0,8,0], price:[0,400,0] },
  crops:{ seedPrice:[1,60,1], growDays:[1,9,1], sellPrice:[1,300,1] },
  skills:{ dmgMul:[0,2.5,0], radius:[0,160,0], cd:[1,30,0] } };
function _rpgNorm(s){ return (""+(s||"")).replace(/[\s_.,!?~В·]+/g,"").toLowerCase(); }   // кіөл°ұВ·л¬ёмһҘл¶Җнҳёл§Ң м ңкұ°(н•ңкёҖ мң м§Җ вҖ” \WлҠ” н•ңкёҖк№Ңм§Җ м§ҖмӣҢ кёҲм№ҷм–ҙ мҳӨнғҗ)
function rpgBannedHit(o){
  const blob=_rpgNorm([o.name,o.desc,o.flavor,(o.dialog||[]).join("")].join(""));
  for(const w of RPG_BANNED) if(blob.indexOf(_rpgNorm(w))>=0) return w;
  return null;
}
function rpgBudgetCheck(type,o){   // В§7.5 нҢҢмӣҢлІ„м§“ вҖ” н•©лІ• вӯҗл°°л¶„мқҖ мһҗлҸҷ нҶөкіј
  if(type==="monsters"){ if(o.isBoss) return {ok:true,note:"ліҙмҠӨ=көҗмӮ¬ кІҖмҲҳ"};
    const s=o.hp/10+o.atk*2+(o.speed||0)/30, cap=20+(o.tier||0)*15;
    return { ok:s<=cap+0.01, score:Math.round(s*10)/10, cap:cap, hint:"мІҙл ҘВ·кіөкІ©В·л№ лҘҙкё° лі„мқ„ мЎ°кёҲ лӮ®м¶°лҙҗ" }; }
  if(type==="weapons"){ const dps=o.dmg/o.cd, cap=15+(o.levelReq||1)*3;
    return { ok:dps<=cap+0.01, score:Math.round(dps*10)/10, cap:cap, hint:"кіөкІ©мқ„ мӨ„мқҙкұ°лӮҳ нңҳл‘җлҘҙлҠ” мӢңк°„мқ„ лҠҳл Өлҙҗ" }; }
  if(type==="crops"){ return { ok:o.sellPrice<=o.seedPrice*3+0.01, score:o.sellPrice, cap:o.seedPrice*3, hint:"нҢҢлҠ” к°’мқ„ м”Ём•—к°’мқҳ 3л°° м•ҲмңјлЎң" }; }
  if(type==="skills"){ if(!o.cd) return {ok:true,note:"кІҢмқҙм§Җ/нҢЁмӢңлёҢ=көҗмӮ¬ кІҖмҲҳ"};
    const s=(o.dmgMul||0)*100/o.cd; return { ok:s<=60.01, score:Math.round(s*10)/10, cap:60, hint:"м„ёкё°лҘј лӮ®м¶”кұ°лӮҳ кё°лӢӨлҰ¬лҠ” мӢңк°„мқ„ лҠҳл Өлҙҗ" }; }
  return {ok:true};
}
function validateRpgContent(type, raw){   // 7лӢЁкі„(В§7.4) вҶ’ {ok, data(мЎ°м • л°ҳмҳҒ), errors[], warnings[], budget}
  const errors=[], warnings=[], o=JSON.parse(JSON.stringify(raw||{})), sc=RPG_SCHEMA[type];
  if(!o.name) errors.push("мқҙлҰ„мқҙ н•„мҡ”н•ҙмҡ”");   // в‘  н•„мҲҳВ·нғҖмһ… (idлҠ” мӢңмҠӨн…ңмқҙ л¶Җм—¬)
  if(sc) for(const f in sc){ const req=sc[f][2];
    if(req&&(o[f]===undefined||o[f]===null)) errors.push(f+" к°’мқҙ н•„мҡ”н•ҙмҡ”");
    else if(o[f]!==undefined&&typeof o[f]!=="number") errors.push(f+"лҠ” мҲ«мһҗм—¬м•ј н•ҙмҡ”"); }
  const bad=rpgBannedHit(o); if(bad) errors.push("м“ё мҲҳ м—ҶлҠ” л§җмқҙ мһҲм–ҙмҡ”(\""+bad+"\") вҖ” лӢӨлҘё л§җлЎң л°”кҝ”мӨҳ");   // в‘Ј кёҲм№ҷм–ҙ
  if(errors.length) return { ok:false, data:o, errors:errors, warnings:warnings };
  if(sc) for(const f in sc){ if(o[f]===undefined) continue; const lo=sc[f][0], hi=sc[f][1];   // в‘Ў лІ”мң„ нҒҙлһЁн”„
    if(o[f]<lo){ warnings.push(f+" "+o[f]+"вҶ’"+lo+" мЎ°м •"); o[f]=lo; }
    else if(o[f]>hi){ warnings.push(f+" "+o[f]+"вҶ’"+hi+" мЎ°м •"); o[f]=hi; } }
  let bg=rpgBudgetCheck(type,o), guard=0;   // в‘ў нҢҢмӣҢлІ„м§“ вҖ” мҙҲкіј мӢң мҠӨмјҖмқјлӢӨмҡҙ(нҒҙлһЁн”„мҷҖ нҶөн•©)
  while(bg.ok===false&&guard++<300){
    if(type==="monsters"){ if(o.atk>1)o.atk--; else if(o.hp>5)o.hp-=5; else if(o.speed>20)o.speed-=10; else break; }
    else if(type==="weapons") o.dmg=Math.max(1,o.dmg-1);
    else if(type==="crops") o.sellPrice=Math.max(1,o.sellPrice-1);
    else if(type==="skills") o.dmgMul=Math.max(0.1,Math.round((o.dmgMul-0.1)*10)/10);
    else break;
    bg=rpgBudgetCheck(type,o);
  }
  if(guard>0) warnings.push("нһҳмқҳ к· нҳ•мқ„ мң„н•ҙ мӮҙм§қ лӮ®м·„м–ҙмҡ” ("+bg.hint+")");
  const refs=[];   // в‘Ө м°ёмЎ° л¬ҙкІ°м„ұ(м ңм¶ң мӢң 1м°Ё)
  if(type==="monsters"&&Array.isArray(o.drops)) for(const d of o.drops) refs.push(d.itemId);
  if(type==="quests"&&o.goal){ refs.push(o.goal.target); refs.push(o.goal.item); }
  for(const r of refs){ if(r&&!rpgItemAny(r)&&!rpgFind("monsters",r)&&!rpgFind("npcs",r)) warnings.push("м•„м§Ғ м—ҶлҠ” кІғмқ„ к°ҖлҰ¬мјңмҡ”("+r+") вҖ” лӮҳмӨ‘м—җ л§Ңл“Өл©ҙ мқҙм–ҙм ёмҡ”"); }
  return { ok:true, data:o, errors:errors, warnings:warnings, budget:bg };
}
function rpgContentMerge(){   // л¶ҖнҢ…/мҠ№мқё нӣ„: RPG_DB_LIVE = merge(RPG_DB, approved) + в‘Ұ лЎңл“ң мһ¬кІҖмҰқ
  const st=loadRpgContent(), live={};
  for(const k in RPG_DB){ live[k]=Array.isArray(RPG_DB[k])?RPG_DB[k].slice():RPG_DB[k]; }
  for(const rec of st.approved){
    if(rec.disabled||!live[rec.type]) continue;
    const v=validateRpgContent(rec.type, rec.data); if(!v.ok) continue;
    const d=v.data; if(!d.id||d.id.indexOf("stu_")!==0) d.id="stu_"+rec.type+"_"+(rec.seq||0);
    d._author=rec.author||"н•ҷмғқ";
    live[rec.type]=live[rec.type].filter(x=>x.id!==d.id).concat([d]);
  }
  RPG_DB_LIVE=live;
}
let _rpgSeq=0;
function rpgSubmitContent(type, data, author){   // н•ҷмғқ м ңм¶ң вҶ’ pending
  const v=validateRpgContent(type, data);
  if(!v.ok) return { ok:false, msg:v.errors.join(" В· ") };
  const st=loadRpgContent(), id="stu_"+type+"_"+(++_rpgSeq)+"_"+(st.approved.length+st.pending.length);
  v.data.id=id;
  st.pending.push({ id:id, type:type, data:v.data, author:author||"н•ҷмғқ", seq:_rpgSeq, warnings:v.warnings, disabled:false });
  saveRpgContent(st);
  return { ok:true, id:id, warnings:v.warnings };
}
function rpgApproveContent(id){ const st=loadRpgContent(), i=st.pending.findIndex(r=>r.id===id); if(i<0) return false;
  st.approved.push(st.pending.splice(i,1)[0]); saveRpgContent(st); rpgContentMerge(); return true; }
function rpgRejectContent(id){ const st=loadRpgContent(), i=st.pending.findIndex(r=>r.id===id); if(i<0) return false;
  st.pending.splice(i,1); saveRpgContent(st); return true; }
function rpgExportApproved(){   // T3 мҠ№кІ©мҡ© JSON(көҗмӮ¬к°Җ wiki/rpg_db.jsonм—җ лі‘н•© вҶ’ inject_db.py)

let rpgReviewIdx=0;
function handleRpgReviewKey(code){
  const st=loadRpgContent(), pend=st.pending;
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  if(code==="KeyE"){ const json=rpgExportApproved();
    try{ window.prompt("мҠ№мқёлҗң н•ҷмғқ мҪҳн…җмё  JSON вҖ” ліөмӮ¬н•ҙм„ң wiki/rpg_db.jsonм—җ лі‘н•© нӣ„ inject_db.py (T3 мҠ№кІ©):", json); }catch(e){}
    return; }
  if(!pend.length) return;
  if(code==="ArrowUp"){ rpgReviewIdx=(rpgReviewIdx+pend.length-1)%pend.length; return; }
  if(code==="ArrowDown"){ rpgReviewIdx=(rpgReviewIdx+1)%pend.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ const r=pend[rpgReviewIdx]; if(r){ rpgApproveContent(r.id); showToast("вң… мҠ№мқёВ·л°ҳмҳҒ: "+r.data.name); rpgReviewIdx=Math.max(0,rpgReviewIdx-1); } return; }
  if(code==="KeyX"||code==="Delete"){ const r=pend[rpgReviewIdx]; if(r){ rpgRejectContent(r.id); showToast("вҶ© м•„мқҙл””м–ҙ мҳЁмӢӨлЎң ліҙлҘҳ: "+r.data.name); rpgReviewIdx=Math.max(0,rpgReviewIdx-1); } return; }
}

/* в”Җв”Җ м ҖмһҘ(В§7.3): profile.rpg лӢЁмқј м„ңлёҢнҠёлҰ¬ в”Җв”Җ */
function rpgExpNeed(L){ return Math.round(RPG_CONST.EXP_BASE*Math.pow(RPG_CONST.EXP_GROW, Math.max(1,L)-1)); }
function rpgDefaultSave(){
  return { v:2, chapter:1, day:1, level:1, exp:0, hp:RPG_CONST.BASE_HP, gold:0, jobId:"job_novice",
    pos:{ mapId:"rpg_village", tx:-1, ty:-1 },   // -1 = л§өмқҳ мҠӨнҸ° м•өм»Ө(*) мӮ¬мҡ©
    inventory:[], equip:{ weapon:"wp_fist", body:"", charm:"" },
    skills:[], skillX:"", farmSize:[3,4], farm:[],
    quests:{ done:[], active:{} }, flags:{}, kills:{}, tut:[], lastUpdated:0,
    playSec:0, resp:{}, pity:{},   // v2(POLISH-1): н”Ңл Ҳмқҙ мӢңк°„В·лҰ¬мҠӨнҸ° кё°лЎқВ·pity л“ңлһҚ м№ҙмҡҙн„°
    today:{ kills:0, gold:0, harvest:0 }, daily:{ day:0, list:[] } };   // POLISH-2: н•ҳлЈЁ мҡ”м•ҪВ·мқјмқј мқҳлў°
}
function rpgMaxHpFor(sv){
  let hp=RPG_CONST.BASE_HP+RPG_CONST.HP_PER_LV*((sv.level||1)-1);
  if(sv.equip){ for(const slot of ["body","charm"]){ const a=rpgFind("armors",sv.equip[slot]); if(a&&a.hpAdd) hp+=a.hpAdd; } }
  const j=rpgFind("jobs",sv.jobId); if(j&&j.statMods&&j.statMods.hpAdd) hp+=j.statMods.hpAdd;
  return hp;
}
function rpgMergeSave(saved){
  const d=rpgDefaultSave();
  if(saved&&typeof saved==="object"){ for(const k in d){ if(saved[k]!==undefined&&saved[k]!==null) d[k]=saved[k]; } }
  // л¬ҙкІ°м„ұ ліҙм • вҖ” мЎҙмһ¬н•ҳм§Җ м•ҠлҠ” мҪҳн…җмё  idлҠ” мЎ°мҡ©нһҲ л“ңлһҚ/л§ЁмҶҗ нҸҙл°ұ(В§7.3 мҪҳн…җмё  к°ҖліҖ нҷҳкІҪ к·ңм№ҷ)
  if(typeof d.level!=="number"||d.level<1) d.level=1;
  if(typeof d.day!=="number"||d.day<1) d.day=1;
  if(typeof d.gold!=="number"||d.gold<0) d.gold=0;
  if(!d.pos||!d.pos.mapId||!rpgFind("maps",d.pos.mapId)) d.pos={mapId:"rpg_village",tx:-1,ty:-1};
  if(!d.equip||typeof d.equip!=="object") d.equip={weapon:"wp_fist",body:"",charm:""};
  if(d.equip.weapon&&d.equip.weapon!=="wp_fist"&&!rpgFind("weapons",d.equip.weapon)) d.equip.weapon="wp_fist";
  if(d.equip.body&&!rpgFind("armors",d.equip.body)) d.equip.body="";
  if(d.equip.charm&&!rpgFind("armors",d.equip.charm)) d.equip.charm="";
  if(!Array.isArray(d.inventory)) d.inventory=[];
  d.inventory=d.inventory.filter(s=>s&&s.id&&s.qty>0&&rpgItemAny(s.id));
  if(!Array.isArray(d.farm)) d.farm=[];
  d.farm=d.farm.map(cell=>(cell&&cell.c&&!rpgFind("crops",cell.c))?null:cell);   // B-7: мӮ¬лқјм§„ мһ‘л¬ј id л°ӯ мҳҒкө¬ мһ кёҲ н•ҙм ң
  if(!Array.isArray(d.skills)) d.skills=[];
  if(!Array.isArray(d.tut)) d.tut=[];
  if(!d.quests||typeof d.quests!=="object") d.quests={done:[],active:{}};
  if(!Array.isArray(d.quests.done)) d.quests.done=[];
  if(!d.quests.active||typeof d.quests.active!=="object") d.quests.active={};
  if(!d.flags||typeof d.flags!=="object") d.flags={};
  if(!d.kills||typeof d.kills!=="object") d.kills={};
  if(typeof d.playSec!=="number"||d.playSec<0) d.playSec=0;   // м„ёмқҙлёҢ v1вҶ’2 л°ұн•„(POLISH-1)
  if(!d.resp||typeof d.resp!=="object") d.resp={};
  if(!d.pity||typeof d.pity!=="object") d.pity={};
  if(!d.today||typeof d.today!=="object") d.today={kills:0,gold:0,harvest:0};   // POLISH-2 л°ұн•„
  if(!d.daily||typeof d.daily!=="object"||!Array.isArray(d.daily.list)) d.daily={day:0,list:[]};
  if(d.level>1||d.quests.done.length>0){ for(const t of [2,3,4,5,6]) if(d.tut.indexOf(t)<0) d.tut.push(t); }   // кё°мЎҙ м„ёмқҙлёҢ: мҳЁліҙл”© нҠёлҰ¬кұ° мқјкҙ„ мҠӨнӮө
  d.v=2;
  const mh=rpgMaxHpFor(d); if(typeof d.hp!=="number"||d.hp<1||d.hp>mh) d.hp=mh;
  return d;
}
function rpgAddGold(n){ if(!RPG) return; RPG.save.gold=Math.max(0, RPG.save.gold+n);

function rpgBanner(text){   // POLISH-1: ліҙмғҒ л°°л„Ҳ вҖ” нҶ мҠӨнҠё м—°мҶҚ лҚ®м–ҙм“°кё° мң мӢӨ н•ҙкІ°(н•©мӮ° 1мһҘВ·мөңлҢҖ 3мӨ„)

function rpgAddExp(n){

  if(ups>0){
    sv.hp=rpgMaxHpFor(sv); rpgBanner("рҹҺү л ҲлІЁ м—…! Lv."+sv.level+" (мҷ„м „ нҡҢліө)"); playSfx("clear");

      for(let i=0;i<10;i++){ const a=rand(0,Math.PI*2);
        RPG.fx.push({kind:"star",x:RPG.p.x,y:RPG.p.y-10,t:rand(0.5,0.8),vx:Math.cos(a)*rand(80,200),vy:Math.sin(a)*rand(80,200)-80,g:300,color:"#8fd0ff",size:14}); }

// QUALITY-1: кіөмҡ© м¶•н•ҳ м—°м¶ң(л§Ғ+лі„ лІ„мҠӨнҠё+мҳ…мқҖ м „мӢ  н”ҢлһҳмӢң). л ҲлІЁм—…В·м „м§ҒВ·ліҙмҠӨкІ©нҢҢВ·м—”л”©мқҙ мһ¬мӮ¬мҡ©.
function rpgCelebrate(x,y,color,power){
  if(!RPG||!RPG.fx) return; power=power||1; color=color||"#ffe066";
  const rings=(power>=2)?3:((power>=1.5)?2:1);
  for(let r=0;r<rings;r++) RPG.fx.push({kind:"ring",x:x,y:y-6,t:0.6+r*0.14,color:color});
  const n=Math.round(10*power);
  for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2), sp=rand(80,140+70*power);
    RPG.fx.push({kind:"star",x:x,y:y-10,t:rand(0.5,0.95),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,g:300,color:color,size:12+Math.round(power*2)}); }
  RPG.flashT=Math.max(RPG.flashT||0, 0.10*Math.min(2,power));
}
function rpgLearnSkills(sv){
  for(const sk of rpgDb().skills){
    if(sk.acquire&&sk.acquire.by==="level"&&sk.acquire.value<=sv.level&&sv.skills.indexOf(sk.id)<0){
      sv.skills.push(sk.id);
      if(sk.type==="active"&&sk.slot==="X"&&!sv.skillX) sv.skillX=sk.id;
      if(sk.acquire.value>1) showToast("вңЁ мғҲ лҠҘл Ҙмқ„ л°°мӣ лӢӨ: "+sk.name+"!");
    }

function rpgLoadMap(mapId, tx, ty, opts){

  let sx=(typeof tx==="number")?tx:-1, sy=(typeof ty==="number")?ty:-1;

    sx=1; sy=1;

  RPG.objects=(rec.objects||[]).slice();
  RPG.mobs=[]; RPG.drops=[]; RPG.bullets=[]; RPG.fx=[]; RPG.ctxTarget=null; RPG.veil=false; RPG._soilCache=null;
  const _spawns=(rec.monsters||[]);
  for(let si=0;si<_spawns.length;si++){   // POLISH-1: playSec лҰ¬мҠӨнҸ° вҖ” л§ө лЎңл“ң мӢңм җл§Ң нҢҗм •(нҢқмқё м—ҶмқҢ)

    if(killedAt!==undefined){

    }

    const mob=rpgMakeMob(def,(f.c+0.5)*56,(f.r+0.5)*56);

    const mb=RPG.npcsOnMap.find(n=>n.id==="npc_meonbyeol");

  if(stuSlots){   // POLISH-2 В§10: н•ҷмғқ мҠ№мқё лӘ¬мҠӨн„° мҠӨнҸ° мҠ¬лЎҜ(habitatВ·tier мқјм№ҳ day лЎңн…Ңмқҙм…ҳ)

  if(mapId==="rpg_den3"&&!RPG.save.flags.bossIntro&&rpgQuestActive("mq07")){   // ліҙмҠӨ л“ұмһҘ м—°м¶ң

  RPG.cam={ x:0, y:0, offX:Math.max(0,Math.round((1232-w)/2)), offY:Math.max(0,Math.round((576-h)/2)),
    maxX:Math.max(0,w-1232), maxY:Math.max(0,h-576) };
  rpgCamSnap();   // л©ҖлҜё 4кі„лӘ… в‘ў: мӣҢн”„/лЎңл“ң мӢң мҰүмӢң мҠӨлғ…
  RPG.layer=null; RPG.layerMapId=null;
  if(!opts.noSave) rpgPersist();   // В§7.3: л§ө м „нҷҳ мһҗлҸҷм ҖмһҘ
}
function rpgRespawnCd(def){   // POLISH-1: нӢ°м–ҙ1 90s / нӢ°м–ҙ2 150s / к·ёлҠҳ мЎ°к°Ғ 240s(мҳӨлІ„лқјмқҙл“ң)
  if(def.id==="mob_shade") return RPG_CONST.RESPAWN_SHADE;
  return (def.tier>=2)?RPG_CONST.RESPAWN_T2:RPG_CONST.RESPAWN_T1;
}
function rpgTileAt(c,r){ if(!RPG||!RPG.grid||c<0||r<0||c>=RPG.cols||r>=RPG.rows) return "T"; return RPG.grid[r][c]; }
function rpgSolidAt(c,r){ return RPG_DB.legend.solid.indexOf(rpgTileAt(c,r))>=0; }
function rpgFindFree(sc,sr){
  for(let rad=0;rad<8;rad++) for(let r=sr-rad;r<=sr+rad;r++) for(let c=sc-rad;c<=sc+rad;c++){
    if(c<0||r<0||c>=RPG.cols||r>=RPG.rows) continue;
    if(!rpgSolidAt(c,r)&&!rpgCollides((c+0.5)*56,(r+0.5)*56)) return {c:c,r:r};
  }
  return {c:sc,r:sr};
}

/* в”Җв”Җ мқҙлҸҷ/м¶©лҸҢ(м¶• л¶„лҰ¬) в”Җв”Җ */
function rpgCollides(x,y,rr){
  const r=rr||RPG_CONST.PLAYER_R, T=RPG_CONST.TILE;
  const c0=Math.floor((x-r)/T), c1=Math.floor((x+r)/T), r0=Math.floor((y-r)/T), r1=Math.floor((y+r)/T);
  for(let rr=r0;rr<=r1;rr++) for(let cc=c0;cc<=c1;cc++){
    if(!rpgSolidAt(cc,rr)) continue;
    if(circleRectOverlap(x,y,r,{x:cc*T,y:rr*T,w:T,h:T})) return true;
  }
  return false;
}
function rpgMove(dt,mx,my){
  const p=RPG.p, l=Math.hypot(mx,my);
  if(l>1){ mx/=l; my/=l; }
  p.moving=l>0.05;
  if(p.moving) p.facing=Math.atan2(my,mx);
  const step=RPG_CONST.SPD*rpgSpdMul()*dt;
  const nx=p.x+mx*step; if(!rpgCollides(nx,p.y)) p.x=nx;
  const ny=p.y+my*step; if(!rpgCollides(p.x,ny)) p.y=ny;
  p.x=clamp(p.x, RPG_CONST.PLAYER_R, RPG.cols*56-RPG_CONST.PLAYER_R);
  p.y=clamp(p.y, RPG_CONST.PLAYER_R, RPG.rows*56-RPG_CONST.PLAYER_R);
}

  if(!onWarp){ p.warpLock=false; return; }
  if(p.warpLock) return;
  if(onWarp.to==="rpg_den1"&&!rpgQuestActive("mq07")&&!rpgQuestDone("mq07")){   // В§3.1 көҗм°Ём җ 2: лҸ„мӢңлқҪ(sq02)+mq06 нӣ„ mq07 мҲҳлқҪн•ҙм•ј к°ңл°©
    p.warpLock=true;

      :(!rpgQuestDone("sq02")?"рҹҡӘ мӣҗм •м—” лҸ„мӢңлқҪмқҙ н•„мҡ”н•ҙ! (лӘЁлӘЁмқҳ 'мҪ© л°°лӢ¬ лҢҖмһ‘м „'мқ„ лҒқлӮҙмһҗ)"
      :"рҹҡӘ мӨҖл№„ мҷ„лЈҢ! мҳЁлі„ н• м•„лІ„м§Җм—җкІҢ мӣҗм • мқҙм•јкё°лҘј л“Јмһҗ");

/* в”Җв”Җ мғҒнҳёмһ‘мҡ©(л¬ёл§Ҙ лІ„нҠј В§4.7: NPC > мҳӨлёҢм қнҠё вҖ” л“ңлһҚ/мҲҳнҷ•/л°ӯмқјмқҖ RPG-2/3aм—җм„ң мҡ°м„ мҲңмң„ мӮҪмһ…) в”Җв”Җ */
function rpgScanContext(){   // В§4.7 мҡ°м„ мҲңмң„: NPC > (мӨҚкё°=мһҗлҸҷ) > мҲҳнҷ• > л°ӯмқј > л¬ё/мҳӨлёҢм қнҠё вҖ” м ҒмқҖ м ҲлҢҖ лҜёнҸ¬н•Ё
  const p=RPG.p, R2=RPG_CONST.INTERACT_R+18, cands=[];
  for(const n of RPG.npcsOnMap){ const d=dist(p.x,p.y,n.x,n.y); if(d<R2) cands.push({pri:0,d:d,t:{kind:"npc",npc:n}}); }
  const soil=rpgSoil();
  for(let i=0;i<soil.length;i++){
    const sx=(soil[i][0]+0.5)*56, sy=(soil[i][1]+0.5)*56, d=dist(p.x,p.y,sx,sy);
    if(d>=R2) continue;
    const a=rpgFarmActionFor(i);
    cands.push({pri:(a.act==="harvest")?1:2, d:d, t:{kind:"farm",idx:i,farm:a,x:sx,y:sy}});
  }
  for(const o of RPG.objects){ const d=dist(p.x,p.y,(o.tx+0.5)*56,(o.ty+0.5)*56); if(d<R2) cands.push({pri:3,d:d,t:{kind:"obj",obj:o}}); }
  cands.sort(function(a,b){ return (a.pri-b.pri)||(a.d-b.d); });
  RPG.ctxTarget=cands.length?cands[0].t:null;
}
function rpgInteract(){
  const t=RPG.ctxTarget; if(!t) return;
  if(t.kind==="npc") return rpgTalkTo(t.npc.id);
  if(t.kind==="farm") return rpgFarmDo(t.idx);
  if(t.kind==="obj") return rpgUseObject(t.obj);
}

/* в”Җв”Җ мқјмқј мқҳлў°нҢҗ(POLISH-2 В§3 вҖ” day мӢңл“ң кІ°м •м ҒВ·mq04 нӣ„ 1кұҙ/мқјВ·mq07 нӣ„ 3кұҙ/мқј) в”Җв”Җ */
function rpgDailyRec(id){ return (rpgDb().dailies||[]).find(d=>d.id===id); }
function rpgDailyGen(day){
  const ds=rpgDb().dailies||[]; if(!ds.length) return [];
  const n=rpgQuestDone("mq07")?3:1, out=[], used={};
  let s=((day*2654435761)+97)>>>0;   // day кІ°м •м Ғ мӢңл“ң вҖ” мһ¬лЎңл“ң лҰ¬лЎӨ л°©м§Җ
  for(let t=0;t<ds.length&&out.length<Math.min(n,ds.length);t++){
    s=((s*1103515245)+12345)>>>0;
    let k=s%ds.length, tries=0;
    while(used[k]&&tries<ds.length){ k=(k+1)%ds.length; tries++; }
    used[k]=1; out.push({ id:ds[k].id, prog:0, done:false });
  }
  return out;
}
function rpgDailyEnsure(){
  const sv=RPG.save;
  if(!rpgQuestDone("mq04")) return false;   // мқҳлў°нҢҗ к°ңл°© мӢңм җ
  if(!sv.daily||sv.daily.day!==sv.day) sv.daily={ day:sv.day, list:rpgDailyGen(sv.day) };
  return true;
}
function rpgDailyOnKill(mobId){
  const sv=RPG.save;
  if(!sv.daily||sv.daily.day!==sv.day) return;
  for(const q of sv.daily.list){
    const d=rpgDailyRec(q.id);
    if(d&&!q.done&&d.type==="kill"&&d.target===mobId&&q.prog<d.count){
      q.prog++;
      if(q.prog>=d.count) showToast("рҹ“Ӣ мҳӨлҠҳмқҳ л¶ҖнғҒ лӢ¬м„ұ: "+d.name+" вҖ” кІҢмӢңнҢҗм—җм„ң ліҙмғҒ!");
    }
  }
}
function rpgDailyClaim(qi){
  const sv=RPG.save, q=sv.daily.list[qi], d=q&&rpgDailyRec(q.id);
  if(!d||q.done) return;
  if(d.type==="kill"){ if(q.prog<d.count){ showToast("м•„м§Ғ лҚң лҗҗм–ҙмҡ” ("+q.prog+"/"+d.count+")"); return; } }
  else { if(rpgInvCount(d.target)<d.count){ showToast(rpgNameOf(d.target)+" "+d.count+"к°ңлҘј к°Җм ёмҷҖм•ј н•ҙмҡ”"); return; } rpgInvRemove(d.target,d.count); }
  q.done=true; rpgAddGold(d.gold); playSfx("clear");
  rpgBanner("рҹ“Ӣ "+d.name+" мҷ„лЈҢ! +"+d.gold+"G");
  rpgPersist();
}

/* в”Җв”Җ лі„мғҳ мӣҢн”„л§қ(POLISH-1 В§6 вҖ” мҡ°л¬јВ·м•јмҳҒм§ҖВ·мҡ”мғҲ мһ…кө¬, мөңмҙҲ м ‘мҙү н•ҙкёҲ) в”Җв”Җ */
const RPG_WELLS=[
  { mapId:"rpg_village", name:"л§Ҳмқ„ мҡ°л¬ј",   objType:"well", tx:18, ty:9 },
  { mapId:"rpg_field1",  name:"л“ӨнҢҗ м•јмҳҒм§Җ", objType:"camp", tx:27, ty:4 },
  { mapId:"rpg_den1",    name:"мҡ”мғҲ мһ…кө¬",   objType:"camp", tx:12, ty:8 } ];
function rpgWellUse(){
  const sv=RPG.save, here=RPG_WELLS.find(w=>w.mapId===RPG.map.id);
  if(!here) return false;
  if(!sv.flags["warp_"+here.mapId]){
    sv.flags["warp_"+here.mapId]=1; playSfx("clear");
    rpgBanner("рҹҢҠ лі„мғҳ н•ҙкёҲ: "+here.name+" вҖ” лі„мғҳлҒјлҰ¬ м„ңлЎң мқҙлҸҷ!");
    rpgPersist();
  }
  const opts=RPG_WELLS.filter(w=>w.mapId!==RPG.map.id&&sv.flags["warp_"+w.mapId]);
  if(here.objType==="camp") opts.push({ camp:1, name:"мқҙ мһҗлҰ¬м—җм„ң м•јмҳҒн•ҳкё° (н•ҳлЈЁ ліҙлӮҙкё°)" });   // POLISH-3: м•јмҳҒм§Җ м·Ём№Ё
  if(!opts.length){ rpgOpenDialog(null,["лі„мғҳмқҙ мқҖмқҖн•ҳкІҢ л°ҳм§қмқёлӢӨ.","лӢӨлҘё лі„мғҳмқ„ м°ҫм•„ к№Ёмҡ°л©ҙ, лі„мғҳлҒјлҰ¬ мҳӨк°Ҳ мҲҳ мһҲмқ„ кІғ к°ҷлӢӨ!"]); return true; }
  RPG.ui="warp"; RPG.warp={ idx:0, list:opts };
  return true;
}
function rpgWellGo(w){
  if(!w) return;
  if(w.camp){ RPG.ui="field"; RPG.warp=null; rpgSleep(); return; }   // POLISH-3: м•јмҳҒ м·Ём№Ё(нҷ•мқё м„ нғқм§Җ кІҪмң )
  if(w.mapId==="rpg_den1"&&!rpgQuestActive("mq07")&&!rpgQuestDone("mq07")){   // den кІҢмқҙнҠё лҸҷмқј м Ғмҡ©(мҡ°нҡҢ л°©м§Җ)
    showToast("рҹҢ© мҡ”мғҲмқҳ лі„мғҳмқҖ м•„м§Ғ лӢ«нҳҖ мһҲлӢӨвҖҰ (мӣҗм • мӨҖл№„лҘј л§Ҳм№ҳмһҗ)"); return;
  }
  RPG.ui="field"; RPG.warp=null;
  playSfx("pick"); rpgLoadMap(w.mapId, w.tx, w.ty);
  showToast("рҹҢҠ "+w.name+"(мңј)лЎң мқҙлҸҷ!");
}
function rpgUseObject(o){
  if(o.type==="bed") return rpgSleep();
  if(o.type==="board"){   // кІҢмӢңнҢҗ: мҳӨлҠҳмқҳ л¶ҖнғҒ(POLISH-2 В§3) / лі„мқҳ лҸ„к°җ(В§8.1)
    if(!rpgDailyEnsure()){ RPG.ui="codex"; RPG.codex={ tab:0 }; return; }
    rpgOpenDialog(null, ["кІҢмӢңнҢҗм—җ мҳӨлҠҳмқҳ л¶ҖнғҒмқҙ л¶ҷм–ҙ мһҲлӢӨ."],
      { choice:{ opts:["рҹ“Ӣ мҳӨлҠҳмқҳ л¶ҖнғҒ","рҹ“– лі„мқҳ лҸ„к°җ"], cb:function(i){
        if(i===0){ RPG.ui="daily"; RPG.dailyUi={ idx:0 }; } else { RPG.ui="codex"; RPG.codex={ tab:0 }; }
      } } });
    return;
  }
  if(o.type==="chest"&&o.loot) return rpgChestOpen(o);
  if((o.type==="well"||o.type==="camp")&&rpgWellUse()) return;
  const flavor={ chest:"мғҒмһҗ мҶҚмқҖ м•„м§Ғ л№„м–ҙ мһҲлӢӨ. лӯҳ л„Јм–ҙл‘ҳк№Ң?",
    board:"кІҢмӢңнҢҗ: л§Ҳмқ„мқҳ л¶ҖнғҒмқҙ м—¬кё° л¶ҷлҠ”лӢӨ.",
    cellar:"мһ кёҙ м§Җн•ҳмӢӨ л¬ёвҖҰ м•Ҳм—җм„ң нқ¬лҜён•ҳкІҢ л°ҳм§қмқёлӢӨ.",
    vein:"лі„кҙ‘л§Ҙмқҙ нһҳм—Ҷмқҙ к№ңл№ЎмқёлӢӨ. лі„л№ӣмқҙ нқҗл Өм§Җкі  мһҲлӢӨвҖҰ",
    well:"мҡ°л¬ј м•„лһҳм—җм„ң лҲ„кө°к°Җ л…ёлһҳн•ҳлҠ” мҶҢлҰ¬к°Җ л“ӨлҰ°лӢӨвҖҰ",
    stove:"нҷ”лҚ•мқҙлӢӨ. мҡ”лҰ¬лҠ” лӢӨмқҢм—җ л°°мӣҢ ліҙмһҗ.",
    anvil:"ліјнҠёмқҳ лӘЁлЈЁлӢӨ. л°ҳм§қ лҸ„кө¬лҘј л§Ңл“Ө мҲҳ мһҲмқ„ кІғ к°ҷлӢӨ.",
    camp:"лЁ№кө¬лҰ„лӢЁмқҳ м•јмҳҒм§Җ нқ”м ҒвҖҰ м•„м§Ғ мҳЁкё°к°Җ лӮЁм•„ мһҲлӢӨ.",
    egg:"кұ°лҢҖн•ң м•Ңмқҙ нқ¬лҜён•ҳкІҢ л‘җк·јкұ°лҰ°лӢӨвҖҰ" };
  rpgOpenDialog(null, [flavor[o.type]||"л°ҳм§қл°ҳм§қвҖҰ"]);
}

/* в”Җв”Җ лҢҖнҷ”(В§5.6: н•ҳлӢЁ л°•мҠӨВ·нғҖмһҗ нҡЁкіјВ·м„ нғқм§Җ мөңлҢҖ 2) в”Җв”Җ */
function rpgOpenDialog(npcId, lines, opts){
  opts=opts||{};
  const flat=[]; for(const ln of (lines||[])){ if(ln) flat.push(""+ln); }
  if(!flat.length) flat.push("вҖҰ");
  RPG.ui="dialog"; RPG.p.moving=false;
  RPG.dialog={ npcId:npcId, lines:flat, idx:0, chars:0, choice:null, pendChoice:opts.choice||null, onDone:opts.onDone||null };
}
function rpgDialogAdvance(){
  const d=RPG.dialog; if(!d||d.choice) return;
  const cur=d.lines[d.idx]||"";
  if(d.chars<cur.length){ d.chars=cur.length; return; }   // 1м°Ё мһ…л Ҙ=м „мІҙ н‘ңмӢң
  if(d.idx<d.lines.length-1){ d.idx++; d.chars=0; return; }
  if(d.pendChoice) return;   // м„ нғқм§Җ л“ұмһҘ лҢҖкё°(updateк°Җ м „нҷҳ)
  const done=d.onDone; RPG.dialog=null; RPG.ui="field";
  if(done) done();
}
function rpgChoicePick(){
  const d=RPG.dialog; if(!d||!d.choice) return;
  const c=d.choice, pick=c.idx;
  RPG.dialog=null; RPG.ui="field";
  if(c.cb) c.cb(pick);
}
function rpgTalkTo(npcId){
  const npc=rpgFind("npcs",npcId); if(!npc) return;
  const sv=RPG.save, dl=(rpgDb().dialogs.npcs||{})[npcId]||{}, qd=rpgDb().dialogs.quests||{};
  if(npcId==="npc_meonbyeol"&&sv.flags.dusk){   // POLISH-2 В§2: н•ҙм§Ҳл…ҳмқҳ мҡ°л¬јк°Җ вҖ” лЁјлі„ мһ¬лЈҢ көҗнҷҳ
    rpgOpenDialog(npcId, ["нӣ„нӣ„вҖҰ н•ҙм§Ҳл…ҳмқҳ мҡ°л¬јк°ҖлҠ” мІҳмқҢмқҙм§Җ?","мўӢмқҖ кІғмқ„ к°ҖмЎҢлӢӨл©ҙ, л°”кҝ” мЈјм§Җ."],
      { choice:{ opts:["вңЁ к°ҖлЈЁ 5к°ң вҶ’ рҹҚ¬ мӮ¬нғ• 3к°ң","рҹӘ¶ к№ғн„ё 3к°ң вҶ’ рҹ’° 100G"], cb:function(i){
        if(i===0){
          if(rpgInvCount("it_stardust_powder")<5){ showToast("лі„мЎ°к°Ғ к°ҖлЈЁк°Җ л¶ҖмЎұн•ҙмҡ” (5к°ң)"); return; }
          rpgInvRemove("it_stardust_powder",5); rpgInvAdd("it_jelly_candy",3);
          showToast("рҹҚ¬ көҗнҷҳ мҷ„лЈҢ! мӮ¬нғ• +3"); playSfx("pick"); rpgPersist();
        } else {
          if(rpgInvCount("it_moon_feather")<3){ showToast("лӢ¬л№ӣ к№ғн„ёмқҙ л¶ҖмЎұн•ҙмҡ” (3к°ң)"); return; }
          rpgInvRemove("it_moon_feather",3); rpgAddGold(100);
          showToast("рҹ’° көҗнҷҳ мҷ„лЈҢ! +100G"); playSfx("pick"); rpgPersist();
        }
      } } });
    return;
  }
  // 1) talk лӘ©н‘ң мҰүмӢң лӢ¬м„ұ(mq01 л“ұ)
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="talk"&&q.goal.target===npcId&&sv.quests.active[qid]<1) sv.quests.active[qid]=1;
  }
  // 2) лӮ©н’Ҳ(deliver): мқҙ NPCк°Җ л°ӣлҠ” мӮ¬лһҢмқҙкі  л¬јкұҙмқҙ м¶©л¶„н•ҳл©ҙ вҶ’ мҷ„лЈҢ
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="deliver"&&q.goal.to===npcId&&rpgQuestFulfilled(q)){
      const lines=(qd[qid]&&qd[qid].end&&qd[qid].end.length)?qd[qid].end:["кі л§ҲмӣҢ! л”ұ н•„мҡ”н–Ҳм–ҙ."];
      rpgOpenDialog(npcId, lines, { onDone:function(){ rpgQuestComplete(q); } });
      return;
    }
  }
  // 3) мҷ„лЈҢ ліҙкі : giverм—җкІҢ вҖ” giver м—ҶлҠ” мһҗлҸҷ нҖҳмҠӨнҠё(mq01)лҠ” talk лҢҖмғҒм—җкІҢ мҰүмӢң мҷ„лЈҢ
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&(q.giver===npcId||(!q.giver&&q.goal.type==="talk"&&q.goal.target===npcId))&&q.goal.type!=="deliver"&&rpgQuestFulfilled(q)){
      const lines=(qd[qid]&&qd[qid].end&&qd[qid].end.length)?qd[qid].end:["н•ҙлғҲкө¬лӮҳ! м •л§җ кі л§ҲмӣҢ."];
      rpgOpenDialog(npcId, lines, { onDone:function(){ rpgQuestComplete(q); } });
      return;
    }
  }
  // 4) мҳЁлі„ м „м§Ғ л§ҲмқјмҠӨнҶӨ(В§4.6): Lv5 кІ¬мҠөмғқмқҖ кёёмқ„ кі лҘҙлҠ” кІғмқҙ лӢӨмқҢ м§„н–ү вҖ” мғҲ нҖҳмҠӨнҠёліҙлӢӨ мҡ°м„ 
  if(npcId==="npc_onbyeol"&&sv.flags.job_change&&sv.level>=5&&sv.jobId==="job_novice"&&!sv.flags.trialJob){
    rpgOpenDialog(npcId, ["лі„л№ӣмқҙ л„ҲлҘј л¶ҖлҘҙлҠ”кө¬лӮҳ. кёёмқ„ кі лҘј мӢңк°„мқҙм•ј.","к°Җк№Ңмқҙм„ң м„ёкІҢ? л©ҖлҰ¬м„ң мҳҒлҰ¬н•ҳкІҢ?"],
      { choice:{ opts:["вҡ”пёҸ лі„л№ӣ кІҖмӮ¬мқҳ кёё","рҹҸ№ л°”лһҢ мӮ¬лғҘкҫјмқҳ кёё"], cb:function(i){
        const j=rpgFind("jobs", i===0?"job_swordsman":"job_hunter"); if(!j) return;
        sv.flags.trialJob=j.id; sv.flags.trialN=0;
        showToast("рҹ“ң м „м§Ғ мӢңн—ҳ: "+rpgNameOf2(j.trial.target)+" "+j.trial.count+"л§ҲлҰ¬! (мӢӨнҢЁ м—ҶмқҢВ·лӘҮ лІҲмқҙл“ )");
        rpgPersist();
      } } });
    return;
  }
  // 5) мғҲ л¶ҖнғҒ мҲҳлқҪ
  const avail=rpgQuestAvailFor(npcId);
  if(avail){   // POLISH-2 В§5: мҲҳлқҪ м№ҙл“ң вҖ” н•  мқјВ·ліҙмғҒ мӮ¬м „ л…ём¶ң(мҲҳлқҪ нӣ„ м¶”к°Җ лҢҖнҷ” м ңкұ°)
    const st=(qd[avail.id]&&qd[avail.id].start&&qd[avail.id].start.length)?qd[avail.id].start:["л¶ҖнғҒмқҙ н•ҳлӮҳ мһҲлҠ”лҚ°вҖҰ л“Өм–ҙмӨ„лһҳ?"];
    const rw=[];
    if(avail.reward){
      if(avail.reward.exp) rw.push("+"+avail.reward.exp+" EXP");
      if(avail.reward.gold) rw.push("+"+avail.reward.gold+"G");
      if(avail.reward.itemId) rw.push(rpgNameOf(avail.reward.itemId)+((avail.reward.itemCount||1)>1?" Г—"+avail.reward.itemCount:""));
    }
    rpgOpenDialog(npcId, st.concat(["рҹ“ң "+avail.name+" вҖ” "+rpgQuestTodo(avail)+(rw.length?("  рҹҺҒ ліҙмғҒ: "+rw.join(" В· ")):"")]),
      { choice:{ opts:["мўӢм•„, н• кІҢ! рҹ“ң","мЎ°кёҲ мқҙл”°к°Җ"], cb:function(i){ if(i===0) rpgQuestAccept(avail); } } });
    return;
  }
  // 6) мҳЁлі„ м„ нғқ м„ңл№„мҠӨ: л°ӯ нҷ•мһҘВ·м „м§Ғ лҗҳлҸҢлҰ¬кё°(В§5.5В·В§4.6 вҖ” м§„н–үн•  нҖҳмҠӨнҠёк°Җ м—Ҷмқ„ л•Ң)
  if(npcId==="npc_onbyeol"){
    if(sv.flags.farm_expand&&!sv.flags.farmBig){
      rpgOpenDialog(npcId, ["л°ӯмқҙ мўҒм•„ ліҙмқҙлҠ”кө¬лӮҳ.","л§Ҳмқ„ л№Ҳ л•…мқ„ лӮҙм–ҙ мЈјл§Ҳ. 200Gл©ҙ лҗңлӢЁлӢӨ."],
        { choice:{ opts:["рҹҢҫ л°ӯ нҷ•мһҘ! (200G)","м•„м§Ғ кҙңм°®м•„мҡ”"], cb:function(i){
          if(i!==0) return;
          if(sv.gold<200){ showToast("кіЁл“ңк°Җ л¶ҖмЎұн•ҙмҡ” (200G)"); return; }
          rpgAddGold(-200); sv.flags.farmBig=1; RPG._soilCache=null;
          showToast("рҹҢҫ л°ӯмқҙ 8Г—5(40м№ё)лЎң л„“м–ҙмЎҢлӢӨ!"); playSfx("clear"); rpgPersist();
        } } });
      return;
    }
    const _DON=[{cost:500,name:"кҪғл°ӯ",icon:"рҹҢё"},{cost:1000,name:"лі„ к№ғл°ң",icon:"рҹҡ©"},{cost:2000,name:"лі„л№ӣ л“ұл¶Ҳ",icon:"рҹҸ®"}];
    const _dn=sv.flags.donate||0;
    if(sv.flags.chapter1_clear&&_dn<3){   // POLISH-3: л§Ҳмқ„ кҫёлҜёкё° кё°л¶Җ(нҒҙлҰ¬м–ҙ нӣ„ кіЁл“ң мӢұнҒ¬)
      const d=_DON[_dn];
      rpgOpenDialog(npcId, ["л§Ҳмқ„мқ„ лҚ” м•„лҰ„лӢөкІҢ л§Ңл“Өм–ҙ ліјк№Ң?","лӢӨмқҢ лӢЁкі„: "+d.icon+" "+d.name+" ("+d.cost+"G)"],
        { choice:{ opts:[d.icon+" кё°л¶Җн•ҳкё° ("+d.cost+"G)","лӢӨмқҢм—җ н• кІҢмҡ”"], cb:function(i){
          if(i!==0) return;
          if(sv.gold<d.cost){ showToast("кіЁл“ңк°Җ л¶ҖмЎұн•ҙмҡ” ("+d.cost+"G)"); return; }
          rpgAddGold(-d.cost); sv.flags.donate=_dn+1;
          RPG.layer=null; RPG.layerMapId=null;   // мһҘмӢқ мһ¬лІ мқҙнҒ¬
          rpgBanner("рҹҸҳпёҸ л§Ҳмқ„ кҫёлҜёкё° "+(_dn+1)+"лӢЁкі„: "+d.icon+" "+d.name+" мҷ„м„ұ!");
          playSfx("clear"); rpgPersist();
        } } });
      return;
    }
    if(sv.jobId!=="job_novice"){
      const lines0=(dl.default&&dl.default.length)?dl.default:["н—Ҳн—Ҳ, мҳӨлҠҳлҸ„ л°ҳм§қмқҙлҠ”кө¬лӮҳ."];
      rpgOpenDialog(npcId, lines0, { choice:{ opts:["рҹ”„ кІ¬мҠөмғқмңјлЎң (20G)","к·ёлғҘ мқҙм•јкё°н–Ҳм–ҙмҡ”"], cb:function(i){
        if(i!==0) return;
        if(sv.gold<20){ showToast("кіЁл“ңк°Җ л¶ҖмЎұн•ҙмҡ” (20G)"); return; }
        rpgAddGold(-20);
        const j=rpgFind("jobs",sv.jobId);
        if(j) for(const skid of (j.grantSkills||[])){ const k=sv.skills.indexOf(skid); if(k>=0) sv.skills.splice(k,1); if(sv.skillX===skid) sv.skillX="sk_spin_slash"; }
        sv.jobId="job_novice"; sv.hp=Math.min(sv.hp,rpgMaxHpFor(sv));
        showToast("рҹ”„ кІ¬мҠөмғқмңјлЎң лҸҢм•„мҷ”лӢӨ (м–ём ңл“  лӢӨмӢң м „м§Ғ!)"); rpgPersist();
      } } });
      return;
    }
  }
  // 7) м§„н–ү нһҢнҠё(нҷңм„ұ нҖҳмҠӨнҠё лҢҖмӮ¬) > кё°ліё лҢҖмӮ¬ (+мғҒм җ вҖ” лҢҖмһҘк°„мқҖ mq04 нӣ„ к°ңл°© В§2)
  let lines=null;
  for(const qid in sv.quests.active){ if(dl.questActive&&dl.questActive[qid]&&dl.questActive[qid].length){ lines=dl.questActive[qid]; break; } }
  if(!lines){
    // QUALITY-1: NPC л№„л°Җ л°ңкІ¬ вҖ” idle л°ҳліө лҢҖнҷ”(3нҡҢм§ё) мӢң 1нҡҢ, лҚ°мқҙн„°мқҳ secretмқ„ нҷ”л©ҙм—җ лҸ„лӢ¬(мһ¬л°©л¬ё ліҙмғҒ)
    const tk="talkN_"+npcId; sv.flags[tk]=(sv.flags[tk]||0)+1;
    if(npc.secret && !sv.flags["secret_"+npcId] && sv.flags[tk]>=3){
      sv.flags["secret_"+npcId]=1;
      rpgOpenDialog(npcId, ["вҖҰмһҲмһ–м•„, мҡ°лҰ¬лҒјлҰ¬ л№„л°ҖмқёлҚ°.","рҹ”® "+npc.secret], { onDone:function(){ rpgBanner("рҹ”® "+npc.name+"мқҳ л№„л°Җмқ„ м•Ңм•„лғҲлӢӨ!"); playSfx("pick"); rpgPersist(); } });
      return;
    }
    lines=(dl.default&&dl.default.length)?dl.default:((npc.dialog&&npc.dialog.length)?npc.dialog:["м•Ҳл…•, мӢңкі лӢҲ!"]);
  }
  const shopOk=npc.shop&&npc.shop.length&&(npcId!=="npc_bolt"||sv.flags.smith_open);
  if(shopOk)
    rpgOpenDialog(npcId, lines, { choice:{ opts:["рҹӣ’ к°ҖкІҢ ліҙкё°","лӢӨмқҢм—җ мҳ¬кІҢ"], cb:function(i){ if(i===0) rpgOpenShop(npcId); } } });
  else rpgOpenDialog(npcId, lines);
}

function rpgInvCap(id){ if(id!=="it_jelly_candy") return 99;   // POLISH-1: мӮ¬нғ• мғҒн•ң(м¶”к°Җ нҡҚл“қл§Ң мәЎВ·кё°ліҙмң  лӘ°мҲҳ м—ҶмқҢ)
  return (RPG&&RPG.save.flags.candyPouch)?8:RPG_CONST.CANDY_MAX; }   // POLISH-2: мӮ¬нғ• мЈјлЁёлӢҲ 5вҶ’8
function rpgInvAdd(id,qty){ qty=qty||1; const inv=RPG.save.inventory, cap=rpgInvCap(id);
  for(const s of inv){ if(s.id===id){ s.qty=Math.min(Math.max(cap,s.qty), s.qty+qty); return; } }
  inv.push({id:id,qty:Math.min(cap,qty)}); }
function rpgInvCount(id){ for(const s of RPG.save.inventory) if(s.id===id) return s.qty; return 0; }
function rpgInvRemove(id,qty){ const inv=RPG.save.inventory; for(let i=0;i<inv.length;i++){ if(inv[i].id===id){ inv[i].qty-=qty; if(inv[i].qty<=0) inv.splice(i,1); return true; } } return false; }

    const it=rpgItemAny(ref); if(!it) continue;
    if(it.kind==="seed") out.push({ id:ref, name:it.name+" Г—5", price:it.crop.seedPrice*5, qty:5 });

  if(npc&&npc.id==="npc_bolt"){
    const up=sv.flags.boomerUp||0;
    if(up===0) out.push({ sp:"up1", id:"_up1", name:"рҹ”Ё л¶Җл©”лһ‘ к°•нҷ” +1 (кіөкІ© +10%)", price:120, qty:1 });
    if(up===1) out.push({ sp:"up2", id:"_up2", name:"рҹ”Ё к°•нҷ” +2 (кіөкІ© +20%В·к°ҖмӢң к»Қм§Ҳ Г—5)", price:300, qty:1 });

    if(rpgInvCount("wp_old_boomerang")>0&&rpgInvCount("wp_sparkle_boomerang")===0&&sv.equip.weapon!=="wp_sparkle_boomerang")
      out.push({ sp:"craft", id:"_craft", name:"рҹҢҹ л°ҳм§қ л¶Җл©”лһ‘ м ңмһ‘ (лӮЎмқҖ л¶Җл©”лһ‘+лі„мЎ°к°Ғ Г—3)", price:0, qty:1 });
  }
  if(npc&&npc.id==="npc_leaf"&&!sv.flags.canUp)
    out.push({ sp:"watercan", id:"_can", name:"рҹҡҝ л¬јлҝҢлҰ¬к°ң к°ңлҹү (мӢӯмһҗ 5м№ё кёүмҲҳ)", price:120, qty:1 });
  if(npc&&npc.id==="npc_leaf"&&sv.flags.canUp===1)   // POLISH-2 В§7: 2лӢЁкі„ вҖ” 40м№ё мӢңлҢҖ лҢҖл№„
    out.push({ sp:"watercan2", id:"_can2", name:"вңЁ л°ҳм§қ л¬јлҝҢлҰ¬к°ң (3Г—3 кёүмҲҳ)", price:300, qty:1 });
  if(npc&&npc.id==="npc_momo"&&!sv.flags.candyPouch)   // POLISH-2 В§9: мӮ¬нғ• мЈјлЁёлӢҲ(мғҒн•ң 5вҶ’8)
    out.push({ sp:"pouch", id:"_pouch", name:"рҹҚ¬ мӮ¬нғ• мЈјлЁёлӢҲ (мӮ¬нғ• мғҒн•ң 5вҶ’8)", price:150, qty:1 });

function rpgSoil(){   // л°ӯ мўҢн‘ң(л§өмқҙ лӢЁмқј м¶ңмІҳ) + нҷ•мһҘ кө¬л§Ө мӢң 8Г—5 мҳҒм—ӯ(В§5.5 вҖ” нҶөн–ү к°ҖлҠҘ м№ёл§Ң)
  if(!RPG.map) return [];

  const base=(RPG.map.soil||[]).slice();
  if(RPG.map.id==="rpg_village"&&RPG.save.flags.farmBig){
    const seen={}; for(const s of base) seen[s[0]+","+s[1]]=1;

    const cell=rpgFarmCell(i);

  }
  else if(a.act==="harvest"){
    rpgHarvest(i);
    if(RPG.save.flags.canUp){   // POLISH-2 В§7: к°ңлҹү л¬јлҝҢлҰ¬к°ң ліҙмң  мӢң мӢӯмһҗ мқјкҙ„ мҲҳнҷ•
      const soil=rpgSoil(), c0=soil[i][0], r0=soil[i][1];
      for(let j=0;j<soil.length;j++){ if(j===i) continue;
        if(Math.abs(soil[j][0]-c0)+Math.abs(soil[j][1]-r0)===1&&rpgFarmDone(rpgFarmCell(j))) rpgHarvest(j); }

  else { const cell=rpgFarmCell(i); showToast("рҹҢҝ мһҗлқјлҠ” мӨ‘! (л¬ј мӨҖ лӮ  "+cell.wd+"/"+rpgFarmNeed(cell)+")"); }
}
function rpgPlant(i,seedId){
  const cropId=seedId.slice(5), c=rpgFind("crops",cropId); if(!c) return;
  rpgInvRemove(seedId,1);
  RPG.save.farm[i]={ c:cropId, wd:0, wt:false, rg:false };

  rpgPersist();   // В§7.3: мӢ¬кё° мһҗлҸҷм ҖмһҘ
}
function rpgWater(i){
  const soil=rpgSoil(), targets=[i], cu=RPG.save.flags.canUp||0;
  if(cu){   // л¬јлҝҢлҰ¬к°ң к°ңлҹү: 1лӢЁкі„=мӢӯмһҗ 5м№ё В· 2лӢЁкі„=3Г—3(POLISH-2 В§7)
    const c0=soil[i][0], r0=soil[i][1];
    for(let j=0;j<soil.length;j++){ if(j===i) continue;
      const dx=Math.abs(soil[j][0]-c0), dy=Math.abs(soil[j][1]-r0);
      if(cu>=2?(dx<=1&&dy<=1):(dx+dy===1)) targets.push(j); }
  }
  let n=0;
  for(const j of targets){ const cell=rpgFarmCell(j); if(cell&&cell.c&&!cell.wt&&!rpgFarmDone(cell)){ cell.wt=true; n++;
    for(let k=0;k<4;k++) RPG.fx.push({kind:"dot",x:(soil[j][0]+0.5)*56+rand(-14,14),y:soil[j][1]*56+8,t:rand(0.3,0.55),vx:rand(-20,20),vy:rand(30,80),g:200,color:"#6db4ff",size:2.5}); } }   // л¬јл°©мҡё нҢҢнӢ°нҒҙ
  if(n>0){
    playSfx("pick"); showToast("рҹ’§ л¬јмқ„ мӨ¬лӢӨ! ("+n+"м№ё) вҖ” мһҗкі  лӮҳл©ҙ мһҗлқјмҡ”");
    if(!RPG.save.flags.dusk&&rpgQuestDone("mq02")&&RPG.save.farm.every(c=>!c||!c.c||c.wt||rpgFarmDone(c))){   // POLISH-2: л°ӯмқј мҷ„лЈҢ вҶ’ н•ҙм§Ҳл…ҳ мӢ нҳё
      RPG.save.flags.dusk=1;
      showToast("рҹҢҶ мҳӨлҠҳ л°ӯмқј лҒқ! н•ҙм§Ҳл…ҳмқҙ лҗҳм—ҲлӢӨвҖҰ мҡ°л¬јк°Җм—җ лҲ„к°Җ мһҲлӢӨ");
    }
  }
  // мІ« л¬јмЈјкё° мҳЁліҙл”©(нҠңнҶ лҰ¬м–ј лҢҖмӮ¬ мҶҢл№„)
  if(n>0&&RPG.save.tut.indexOf(4)<0){ RPG.save.tut.push(4);
    const tl=rpgDb().dialogs.tutorial||[]; if(tl[10]) rpgOpenDialog(null,[tl[10],tl[11]].filter(Boolean)); }
}
function rpgHarvest(i){
  const cell=rpgFarmCell(i), c=rpgFind("crops",cell.c); if(!c) return;
  rpgInvAdd(cell.c,1); playSfx("clear");

  const _s=rpgSoil()[i];   // мҲҳнҷ• нҢқ нҢҢнӢ°нҒҙ(мғқнҷң мЈјмҠӨ)
  if(_s) for(let k=0;k<6;k++){ const a=rand(0,Math.PI*2);
    RPG.fx.push({kind:"dot",x:(_s[0]+0.5)*56,y:(_s[1]+0.5)*56,t:rand(0.3,0.6),vx:Math.cos(a)*rand(40,120),vy:-rand(60,160),g:340,color:"#8fdba0",size:3}); }
  RPG.fx.push({x:RPG.p.x,y:RPG.p.y-40,t:0.9,text:"+"+c.name,color:"#8fdba0"});
  if(c.regrowDays>0){ RPG.save.farm[i]={ c:cell.c, wd:0, wt:false, rg:true }; showToast("рҹҚ“ мҲҳнҷ•! (к·ёлЈЁн„°кё°м—җм„ң лӢӨмӢң мһҗлқјмҡ”)"); }
  else { RPG.save.farm[i]={t:1}; showToast("рҹҢҫ "+c.name+" мҲҳнҷ•!"); }
  rpgQuestOnHarvest(cell.c);   // RPG-3b нӣ…
  if(RPG.save.tut.indexOf(5)<0){   // POLISH-2 В§6: мІ« мҲҳнҷ• мҳЁліҙл”©
    RPG.save.tut.push(5);

    if(tl[13]) rpgOpenDialog(null,[tl[13]]);

}
function rpgFarmCount(cropId){ let n=0; for(const cell of RPG.save.farm){ if(cell&&cell.c===cropId) n++; } return n; }   // mq06 л¬ҳлӘ© мҲҳ(В§3.1)

/* в”Җв”Җ RPG-3b нҖҳмҠӨнҠё м—”м§„(В§6): goal 5нғҖмһ…В·мІҙмқёВ·ліҙмғҒВ·н•ҙкёҲ вҖ” мҠӨнҶ лҰ¬лҠ” лҚ°мқҙн„°лЎңл§Ң в”Җв”Җ */
function rpgQuestRec(qid){ return rpgFind("quests",qid); }
function rpgQuestDone(qid){ return RPG.save.quests.done.indexOf(qid)>=0; }
function rpgQuestActive(qid){ return RPG.save.quests.active[qid]!==undefined; }
function rpgQuestReqOk(q){ return (q.requires||[]).every(r=>rpgQuestDone(r)); }
function rpgQuestAvailFor(npcId){
  for(const q of rpgDb().quests){
    if(q.giver!==npcId||rpgQuestDone(q.id)||rpgQuestActive(q.id)) continue;
    if(rpgQuestReqOk(q)) return q;
  }
  return null;
}
function rpgQuestFulfilled(q){
  const cnt=RPG.save.quests.active[q.id]||0, g=q.goal;
  if(g.type==="kill"||g.type==="harvest") return cnt>=g.count;
  if(g.type==="collect") return rpgInvCount(g.target)>=g.count;
  if(g.type==="deliver") return rpgInvCount(g.item)>=g.count;
  if(g.type==="talk") return cnt>=1;
  return false;
}
function rpgQuestAccept(q){
  RPG.save.quests.active[q.id]=0;
  showToast("рҹ“ң мғҲ л¶ҖнғҒ: "+q.name);
  playSfx("pick");
  if(q.id==="mq06") rpgStartRaid();   // лі„кҙ‘л§Ҙ л°©м–ҙм „: л§Ҳмқ„ м•јмҠө(көҗм°Ём җ 3)
  const where=rpgQuestWhere(q);   // POLISH-2 В§5: мҲҳлқҪ нӣ„ м¶”к°Җ лҢҖнҷ” 3мӨ„ м ңкұ° вҶ’ л°°л„Ҳ 1мһҘ
  rpgBanner("рҹ“ң "+rpgQuestTodo(q)+(where?"  В·  рҹ§ӯ "+where:""));
  rpgPersist();
}
function rpgGrantItem(itemId,count){
  count=count||1;
  if(rpgFind("crops",itemId)){ rpgInvAdd("seed_"+itemId,count); showToast("рҹҺҒ "+rpgNameOf(itemId)+" м”Ём•— Г—"+count); return; }   // мһ‘л¬ј ліҙмғҒ=м”Ём•—(В§3.1 mq01)
  rpgInvAdd(itemId,count); showToast("рҹҺҒ "+rpgNameOf(itemId)+(count>1?(" Г—"+count):""));
}
function rpgQuestUnlock(uid){
  const sv=RPG.save;
  if(rpgFind("weapons",uid)||rpgFind("armors",uid)||rpgFind("items",uid)){ rpgGrantItem(uid,1); return; }
  const sk=rpgFind("skills",uid);
  if(sk){ if(sv.skills.indexOf(uid)<0){ sv.skills.push(uid); showToast("вңЁ мғҲ лҠҘл Ҙ: "+sk.name+"!"); } return; }
  if(rpgFind("crops",uid)) return;   // мһ‘л¬ј н•ҙкёҲ = мғҒм җ reqQuest кІҢмқҙнҠёк°Җ мһҗлҸҷ мІҳлҰ¬
  sv.flags[uid]=1;   // smith_openВ·job_changeВ·farm_expandВ·chapter1_clearВ·smith_discount20 л“ұ
}
function rpgQuestComplete(q){
  const sv=RPG.save, g=q.goal;
  if(g.type==="collect") rpgInvRemove(g.target,g.count);
  if(g.type==="deliver") rpgInvRemove(g.item,g.count);
  delete sv.quests.active[q.id];
  sv.quests.done.push(q.id);
  if(q.reward){   // POLISH-1: ліҙмғҒ н•©мӮ° л°°л„Ҳ(нҶ мҠӨнҠё лҚ®м–ҙм“°кё°лЎң "+100G" мң мӢӨлҗҳлҚҳ л¬ём ң)
    const parts=[];
    if(q.reward.exp){ rpgAddExp(q.reward.exp); parts.push("+"+q.reward.exp+" EXP"); }
    if(q.reward.gold){ rpgAddGold(q.reward.gold); parts.push("+"+q.reward.gold+"G"); }
    if(q.reward.itemId){ rpgGrantItem(q.reward.itemId, q.reward.itemCount||1); parts.push(rpgNameOf(q.reward.itemId)+((q.reward.itemCount||1)>1?" Г—"+q.reward.itemCount:"")); }
    if(q.reward.title){ sv.flags.title=q.reward.title; parts.push("рҹҸ… м№ӯнҳё: "+q.reward.title); }
    rpgBanner("рҹҺҠ "+q.name+" мҷ„лЈҢ!"+(parts.length?"  "+parts.join(" В· "):""));
  } else rpgBanner("рҹҺҠ "+q.name+" мҷ„лЈҢ!");
  for(const u of (q.unlocks||[])) rpgQuestUnlock(u);
  playSfx("clear");
  if(q.id==="mq06") sv.flags.raidOn=0;
  if(q.id==="mq07"){   // мұ•н„° 1 м—”л”©(В§3.1): лі„л№ӣ к·ҖнҷҳВ·л§Ҳмқ„ м¶•м ң
    const end=(rpgDb().dialogs.ending||[]).slice();
    if(end.length) rpgOpenDialog(null, end, { onDone:function(){ RPG.festival={t:0,parts:[],spawn:0}; rpgCelebrate(RPG.p.x,RPG.p.y,"#ffd93d",2.2); } });   // QUALITY-1: м—”л”© м¶•м ң
    else { RPG.festival={t:0,parts:[],spawn:0}; }
  }
  rpgPersist();
}
function rpgQuestOnKill(mobId){
  const sv=RPG.save;
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="kill"&&q.goal.target===mobId&&sv.quests.active[qid]<q.goal.count){
      sv.quests.active[qid]++;
      showToast("рҹ—Ў "+q.name+" "+sv.quests.active[qid]+"/"+q.goal.count+(sv.quests.active[qid]>=q.goal.count?" вҖ” мҷ„лЈҢ! ліҙкі н•ҳмһҗ":""));
    }
  }
  if(sv.flags.trialJob){   // м „м§Ғ мӢңн—ҳ(В§4.6 вҖ” мӢӨнҢЁ м—ҶмқҢВ·л¬ҙлЈҢ мһ¬лҸ„м „кіј лҸҷм№ҳ)
    const j=rpgFind("jobs",sv.flags.trialJob);
    if(j&&j.trial&&j.trial.target===mobId){
      sv.flags.trialN=(sv.flags.trialN||0)+1;
      showToast("вҡ”пёҸ м „м§Ғ мӢңн—ҳ "+sv.flags.trialN+"/"+j.trial.count);
      if(sv.flags.trialN>=j.trial.count){
        sv.jobId=j.id;
        for(const skid of (j.grantSkills||[])) if(sv.skills.indexOf(skid)<0) sv.skills.push(skid);
        delete sv.flags.trialJob; delete sv.flags.trialN;
        sv.hp=rpgMaxHpFor(sv);
        const jc=(j.id==="job_swordsman")?"#6ea0ff":((j.id==="job_hunter")?"#5fd39a":"#ffd85a");   // QUALITY-1: м „м§Ғ нҢЎнҢҢл Ҳ
        rpgCelebrate(RPG.p.x,RPG.p.y,jc,2); rpgBanner("рҹҺҠ м „м§Ғ! "+j.name);
        showToast("м „м§Ғ мҷ„лЈҢ: "+j.name+"! (VлЎң кё°мҲ  л°”кҫёкё°)");
        playSfx("clear"); rpgPersist();
      }
    }
  }
}
function rpgQuestOnHarvest(cropId){

    }
  }
}
/* mq06 лі„кҙ‘л§Ҙ л°©м–ҙм „: м•јмҠө мҠӨнҸ° + л№ӣлӮҳл¬ҙ мЎ°лӘ…(лӮ®мқҳ л°ӯмқҙ л°Өмқҳ м „мһҘ вҖ” көҗм°Ём җ 3) */
/* в”Җв”Җ RPG-P1 м•ҲлӮҙ ліҙк°•: н•  мқјВ·мһҘмҶҢ л¬ёкө¬В·NPC л§Ҳм»ӨВ·м¶”м Ғ нҷ”мӮҙн‘ң(В§6 вҖ” "м–ҙл””лЎң к°Җм•ј н•ҳм§Җ" н•ҙмҶҢ) в”Җв”Җ */
function rpgNpcMapName(npcId){ for(const m of rpgDb().maps){ if((m.npcs||[]).some(n=>(n.npcId||n.id)===npcId)) return m.name; } return ""; }
function rpgMobMapName(mobId){ const d=rpgFind("monsters",mobId); if(!d) return ""; const m=rpgFind("maps",(d.habitat||[])[0]); return m?m.name:""; }
function rpgItemSource(itemId){ for(const mo of rpgDb().monsters){ if((mo.drops||[]).some(d=>d.itemId===itemId)) return mo.name+" ("+rpgMobMapName(mo.id)+")"; } return ""; }
function rpgQuestTodo(q){
  const g=q.goal;
  if(g.type==="kill") return rpgNameOf2(g.target)+" "+g.count+"л§ҲлҰ¬ л¬јлҰ¬м№ҳкё°";
  if(g.type==="harvest") return rpgNameOf(g.target)+" "+g.count+"к°ң мҲҳнҷ•н•ҳкё°";
  if(g.type==="collect") return rpgNameOf(g.target)+" "+g.count+"к°ң лӘЁмңјкё°";
  if(g.type==="deliver"){ const n=rpgFind("npcs",g.to); return rpgNameOf(g.item)+" "+g.count+"к°ңлҘј "+(n?n.name:"?")+"м—җкІҢ л°°лӢ¬н•ҳкё°"; }
  if(g.type==="talk"){ const n=rpgFind("npcs",g.target); return (n?n.name:"?")+"лӢҳкіј мқҙм•јкё°н•ҳкё°"; }
  return "";
}
function rpgQuestWhere(q){
  const g=q.goal;
  if(g.type==="kill") return rpgMobMapName(g.target);
  if(g.type==="harvest") return "л§Ҳмқ„ л°ӯ";
  if(g.type==="collect") return rpgItemSource(g.target);
  if(g.type==="deliver") return rpgNpcMapName(g.to);
  if(g.type==="talk") return rpgNpcMapName(g.target);
  return "";
}
function rpgNpcMarker(npcId){   // вқ— мғҲ л¶ҖнғҒ В· вқ“ ліҙкі /лӮ©н’Ҳ к°ҖлҠҘ В· вҖҰ м§„н–ү мӨ‘(В§5.6)
  const sv=RPG.save;
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid); if(!q) continue;
    if(q.goal.type==="talk"&&q.goal.target===npcId) return "вқ“";   // лҢҖнҷ” лӘ©н‘ң лҢҖмғҒ(mq01 л“ұ)
    if(q.goal.type==="deliver"&&q.goal.to===npcId&&rpgQuestFulfilled(q)) return "вқ“";
    if((q.giver===npcId||(!q.giver&&q.goal.type==="talk"&&q.goal.target===npcId))&&q.goal.type!=="deliver"&&rpgQuestFulfilled(q)) return "вқ“";
  }
  if(rpgQuestAvailFor(npcId)) return "вқ—";
  if(npcId==="npc_onbyeol"&&sv.flags.job_change&&sv.level>=5&&sv.jobId==="job_novice"&&!sv.flags.trialJob) return "вқ—";
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid); if(!q) continue;
    if(q.giver===npcId||(q.goal.type==="deliver"&&q.goal.to===npcId)) return "вҖҰ";
  }
  return null;
}
function rpgTrackQuest(){
  const order=Object.keys(RPG.save.quests.active).sort();
  const qid=order.find(k=>k.indexOf("mq")===0)||order[0];
  return qid?rpgQuestRec(qid):null;
}
function rpgTrackTarget(){   // м¶”м Ғ нҖҳмҠӨнҠё лҢҖмғҒмқҙ нҳ„мһ¬ л§өм—җ мһҲмңјл©ҙ мўҢн‘ң(к°ҖмһҘмһҗлҰ¬ нҷ”мӮҙн‘ңмҡ©)
  const q=rpgTrackQuest(); if(!q) return null;
  const g=q.goal, full=rpgQuestFulfilled(q);
  const npcAt=function(id){ const n=RPG.npcsOnMap.find(x=>x.id===id); return n?{x:n.x,y:n.y}:null; };
  if(full) return npcAt(g.type==="deliver"?g.to:(q.giver||g.target));
  if(g.type==="talk") return npcAt(g.target);
  if(g.type==="deliver"&&rpgInvCount(g.item)>=g.count) return npcAt(g.to);
  if(g.type==="kill"){ let best=null,bd=1e9;
    for(const mob of RPG.mobs){ if(mob.dead||mob.id!==g.target) continue;
      const d=dist(RPG.p.x,RPG.p.y,mob.x,mob.y); if(d<bd){ bd=d; best=mob; } }
    if(best) return {x:best.x,y:best.y}; }
  // POLISH-2 В§6: лҢҖмғҒ NPCк°Җ лӢӨлҘё л§өмқҙл©ҙ вҶ’ к·ё л§өмңјлЎң к°ҖлҠ” нҸ¬нғҲмқ„ к°ҖлҰ¬нӮҙ(mq01 нҷ”мӮҙн‘ңк°Җ мҙҢмһҘм§‘ л¬ёмңјлЎң)
  let wantNpc=null;
  if(full) wantNpc=(g.type==="deliver")?g.to:(q.giver||g.target);
  else if(g.type==="talk") wantNpc=g.target;
  if(wantNpc){
    let tm=null;
    for(const m of rpgDb().maps){ if((m.npcs||[]).some(n=>(n.npcId||n.id)===wantNpc)){ tm=m.id; break; } }
    if(tm&&tm!==RPG.map.id){
      const w=(RPG.map.portals||[]).find(pp=>pp.to===tm);
      if(w) return { x:(w.at[0]+0.5)*56, y:(w.at[1]+0.5)*56 };
    }
  }
  return null;
}
function rpgActiveSkills(){ return RPG.save.skills.map(id=>rpgFind("skills",id)).filter(s=>s&&s.type==="active"&&s.slot==="X"); }

function rpgStartRaid(){
  RPG.save.flags.raidOn=1;
  showToast("рҹҢ© лЁ№кө¬лҰ„лӢЁмқҳ м•јмҠө! лі„кҙ‘л§Ҙмқ„ м§Җмјңлқј! (л№ӣлӮҳл¬ҙк°Җ лҸ„мҷҖмӨ„ кұ°м•ј)");
  if(RPG.map&&RPG.map.id==="rpg_village") rpgSpawnRaid();
}
function rpgSpawnRaid(){
  const q=rpgQuestRec("mq06"), got=RPG.save.quests.active.mq06||0;
  const owls=Math.max(0,(q?q.goal.count:4)-got);
  if(owls<=0) return;   // B-10: лӘ©н‘ң лӢ¬м„ұ нӣ„ мһ¬мһ…мһҘ л¶ҖмҠ¬мқҙ л¬ҙн•ң мҠӨнҸ° л°©м§Җ
  const vein=(RPG.objects||[]).find(o=>o.type==="vein");
  const cx=vein?(vein.tx+0.5)*56:RPG.cols*28, cy=vein?(vein.ty+0.5)*56:RPG.rows*28;
  for(let i=0;i<owls;i++){ const d2=rpgFind("monsters","mob_moonowl");
    if(d2) RPG.mobs.push(rpgMakeMob(d2, clamp(cx+rand(-200,200),40,RPG.cols*56-40), clamp(cy+rand(-160,160),40,RPG.rows*56-40))); }
  for(let i=0;i<2;i++){ const d2=rpgFind("monsters","mob_busuri");
    if(d2) RPG.mobs.push(rpgMakeMob(d2, clamp(cx+rand(-240,240),40,RPG.cols*56-40), clamp(cy+rand(-180,180),40,RPG.rows*56-40))); }
}
function rpgRaidLights(dt){   // мӢ¬кёҙ л№ӣлӮҳл¬ҙ 1к·ёлЈЁ = л°©м–ҙ мЎ°лӘ… 1к°ң(1.6sл§ҲлӢӨ к·јмІҳ м Ғ 6лҺҖ)
  RPG.lightT=(RPG.lightT||0)+dt;
  if(RPG.lightT<1.6) return;
  RPG.lightT=0;
  const soil=rpgSoil();
  for(let i=0;i<soil.length;i++){
    const cell=RPG.save.farm[i]; if(!cell||cell.c!=="crop_lightwood_sapling") continue;
    const lx=(soil[i][0]+0.5)*56, ly=(soil[i][1]+0.5)*56;
    let best=null,bd=170;
    for(const mob of RPG.mobs){ if(mob.dead) continue; const d=dist(lx,ly,mob.x,mob.y); if(d<bd){ bd=d; best=mob; } }
    if(best){ rpgHitMob(best,6,{noAmbush:true,noJuice:true}); RPG.fx.push({x:lx,y:ly-30,t:0.5,text:"рҹҢівҡЎ",color:"#8fdba0"}); }
  }
}

/* в”Җв”Җ мһ…л Ҙ(нӮӨліҙл“ң) в”Җв”Җ */
function handleRpgKey(code){
  if(!RPG) return;
  if(RPG.ui==="dialog"){
    const d=RPG.dialog;
    if(d&&d.choice){
      if(code==="ArrowUp"||code==="ArrowLeft"){ d.choice.idx=Math.max(0,d.choice.idx-1); return; }
      if(code==="ArrowDown"||code==="ArrowRight"){ d.choice.idx=Math.min(d.choice.opts.length-1,d.choice.idx+1); return; }
      if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ"){ rpgChoicePick(); return; }
      if(code==="Escape"){ d.choice.idx=d.choice.opts.length-1; rpgChoicePick(); return; }
      return;
    }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ"||code==="Escape") rpgDialogAdvance();
    return;
  }
  if(RPG.ui==="shop"){
    const sh=RPG.shop, rows=rpgShopRows();
    if(code==="Escape"){ RPG.ui="field"; RPG.shop=null; return; }
    if(code==="ArrowUp"){ sh.idx=Math.max(0,sh.idx-1); sh.scroll=Math.min(sh.scroll||0,sh.idx); return; }
    if(code==="ArrowDown"){ sh.idx=Math.min(Math.max(0,rows.length-1),sh.idx+1); sh.scroll=Math.max(sh.scroll||0,sh.idx-6); return; }
    if(code==="ArrowLeft"||code==="ArrowRight"||code==="Tab"||code==="KeyT"){ sh.tab=(sh.tab==="buy")?"sell":"buy"; sh.idx=0; return; }
    if(code==="KeyA"&&sh.tab==="sell"){ rpgSellAllCrops(); sh.idx=0; return; }
    if(code==="KeyR"&&sh.tab==="sell"){ rpgSellAllMats(); sh.idx=0; return; }
    if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&rows[sh.idx]){
      if(sh.tab==="buy") rpgShopBuy(rows[sh.idx]); else { rpgShopSell(rows[sh.idx]); sh.idx=Math.min(sh.idx,Math.max(0,rpgShopRows().length-1)); }
      return;
    }
    return;
  }
  if(RPG.ui==="inven"){
    const tab=RPG.inven.tab||0;
    if(code==="Escape"||code==="KeyI"){ RPG.ui="field"; RPG.inven=null; return; }
    if(code==="ArrowLeft"){ RPG.inven.tab=(tab+2)%3; RPG.inven.idx=0; return; }
    if(code==="ArrowRight"||code==="Tab"){ RPG.inven.tab=(tab+1)%3; RPG.inven.idx=0; return; }
    if(tab===0){
      const view=rpgInvenView(), maxVis=8;   // POLISH-1: м •л ¬ л·° кё°мӨҖ м»Өм„ң+мҠӨнҒ¬лЎӨ м¶”мў…
      if(code==="ArrowUp"){ RPG.inven.idx=Math.max(0,RPG.inven.idx-1); RPG.inven.scroll=Math.min(RPG.inven.scroll||0,RPG.inven.idx); return; }
      if(code==="ArrowDown"){ RPG.inven.idx=Math.min(Math.max(0,view.length-1),RPG.inven.idx+1); RPG.inven.scroll=Math.max(RPG.inven.scroll||0,RPG.inven.idx-maxVis+1); return; }
      if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&view[RPG.inven.idx]){ rpgInvenUse(view[RPG.inven.idx].i); return; }
    } else if(tab===1){
      const acts=rpgActiveSkills();
      if(code==="ArrowUp"){ RPG.inven.idx=Math.max(0,RPG.inven.idx-1); return; }
      if(code==="ArrowDown"){ RPG.inven.idx=Math.min(Math.max(0,acts.length-1),RPG.inven.idx+1); return; }
      if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&acts[RPG.inven.idx]){
        RPG.save.skillX=acts[RPG.inven.idx].id;
        showToast("вңЁ X кё°мҲ : "+acts[RPG.inven.idx].name); rpgPersist(); return;
      }
    }
    return;
  }
  if(RPG.ui==="codex"){   // рҹ“– лі„мқҳ лҸ„к°җ(В§8.1 вҖ” 3нғӯ: лӘ¬мҠӨн„°/лҸ„кө¬/мһ‘л¬ј)
    if(code==="Escape"||code==="KeyB"){ RPG.ui="field"; RPG.codex=null; return; }
    if(code==="ArrowLeft"){ RPG.codex.tab=(RPG.codex.tab+2)%3; return; }
    if(code==="ArrowRight"||code==="Tab"){ RPG.codex.tab=(RPG.codex.tab+1)%3; return; }
    return;
  }
  if(RPG.ui==="seed"){   // м”Ём•— м„ нғқ нҢқм—…(В§5.2)
    const seeds=rpgSeedStacks();
    if(code==="Escape"){ RPG.ui="field"; RPG.seed=null; return; }
    if(code==="ArrowUp"||code==="ArrowLeft"){ RPG.seed.idx=Math.max(0,RPG.seed.idx-1); return; }
    if(code==="ArrowDown"||code==="ArrowRight"){ RPG.seed.idx=Math.min(Math.max(0,seeds.length-1),RPG.seed.idx+1); return; }
    if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ"||code==="Space")&&seeds[RPG.seed.idx]){
      const tgt=RPG.seed.target, id=seeds[RPG.seed.idx].id;
      RPG.ui="field"; RPG.seed=null; rpgPlant(tgt,id); return;
    }
    return;
  }
  if(RPG.ui==="confirm"){
    if(code==="KeyY"){ showToast("рҹҢҷ м ҖмһҘн•ҳкі  лӮҳмҷ”м–ҙмҡ”"); rpgExit(); return; }
    if(code==="KeyM"){ RPG.ui="map"; return; }   // POLISH-3: Esc л©”лүҙм—җм„ң м§ҖлҸ„
    if(code==="KeyN"||code==="Escape"){ RPG.ui="field"; return; }
    return;
  }
  if(RPG.ui==="sleep"){ if(RPG.sleep&&RPG.sleep.t>1.2&&(code==="Space"||code==="Enter"||code==="NumpadEnter"||code==="KeyZ")) RPG.sleep.t=Math.max(RPG.sleep.t,3.0); return; }
  if(RPG.ui==="map"){ if(code==="KeyM"||code==="Escape"||code==="Space"||code==="KeyZ"){ RPG.ui="field"; } return; }   // EXPLORE-1 м „мІҙм§ҖлҸ„
  if(RPG.ui==="daily"){   // рҹ“Ӣ мҳӨлҠҳмқҳ л¶ҖнғҒ(POLISH-2)
    const ls=(RPG.save.daily&&RPG.save.daily.list)||[];
    if(code==="Escape"||code==="KeyG"){ RPG.ui="field"; RPG.dailyUi=null; return; }
    if(code==="ArrowUp"){ RPG.dailyUi.idx=Math.max(0,RPG.dailyUi.idx-1); return; }
    if(code==="ArrowDown"){ RPG.dailyUi.idx=Math.min(Math.max(0,ls.length-1),RPG.dailyUi.idx+1); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ") rpgDailyClaim(RPG.dailyUi.idx);
    return;
  }
  if(RPG.ui==="warp"){   // рҹҢҠ лі„мғҳ мӣҢн”„(POLISH-1)
    const ls=(RPG.warp&&RPG.warp.list)||[];
    if(code==="Escape"){ RPG.ui="field"; RPG.warp=null; return; }
    if(code==="ArrowUp"||code==="ArrowLeft"){ RPG.warp.idx=Math.max(0,RPG.warp.idx-1); return; }
    if(code==="ArrowDown"||code==="ArrowRight"){ RPG.warp.idx=Math.min(Math.max(0,ls.length-1),RPG.warp.idx+1); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ") rpgWellGo(ls[RPG.warp.idx]);
    return;
  }
  // field
  if(code==="Space"||code==="KeyE"){ rpgInteract(); return; }
  if(code==="KeyX"){ rpgCastX(); return; }
  if(code==="KeyC"){ rpgCastC(); return; }
  if(code==="KeyV"){   // м•ЎнӢ°лёҢ 2к°ң+ ліҙмң  мӢң X кё°мҲ  көҗмІҙ(В§4.5 вҖ” л№Ңл“ң м„ нғқмқҳ мІ« кІҪн—ҳ)
    const acts=RPG.save.skills.filter(id=>{ const s=rpgFind("skills",id); return s&&s.type==="active"&&s.slot==="X"; });
    if(acts.length<2){ showToast("л°”кҝҖ кё°мҲ мқҙ м•„м§Ғ м—Ҷм–ҙмҡ”"); return; }
    const i=(acts.indexOf(RPG.save.skillX)+1)%acts.length;
    RPG.save.skillX=acts[i];
    showToast("вңЁ X кё°мҲ : "+rpgFind("skills",acts[i]).name); rpgPersist(); return;
  }
  if(code==="KeyI"||code==="Tab"){ RPG.ui="inven"; RPG.inven={idx:0}; return; }
  if(code==="KeyB"){ RPG.ui="codex"; RPG.codex={ tab:0 }; return; }   // рҹ“– лі„мқҳ лҸ„к°җ(В§8.1)
  if(code==="KeyM"){ RPG.ui="map"; return; }   // рҹ—әпёҸ м „мІҙм§ҖлҸ„(EXPLORE-1)
  if(code==="KeyQ"){ rpgUseCandy(); return; }
  if(code==="Escape"){ RPG.ui="confirm"; return; }
}

/* в”Җв”Җ мһ…л Ҙ(н„°м№ҳ В§4.7: мўҢ мҠӨнӢұВ·л¬ёл§Ҙ лІ„нҠјВ·нғӯ=лҢҖнҷ” м§„н–үВ·мғҒм җ лҚ”лё”нғӯ мӢӨн–ү) в”Җв”Җ */
function rpgTouchStart(id,p){
  if(!RPG) return;
  if(RPG.ui==="dialog"){
    const d=RPG.dialog;
    if(d&&d.choice){
      for(let i=0;i<d.choice.opts.length;i++){ const y=556+i*54;
        if(p.x>LOGW/2+120&&p.x<LOGW/2+460&&p.y>y&&p.y<y+48){ d.choice.idx=i; rpgChoicePick(); return; } }
      return;
    }
    rpgDialogAdvance(); return;
  }
  if(RPG.ui==="shop"){ RPG.touch.sc={ id:id, y0:p.y, base:(RPG.shop.scroll||0) }; rpgShopTap(p); return; }   // мҠӨмҷҖмқҙн”„ мҠӨнҒ¬лЎӨ мӢңмһ‘м җ
  if(RPG.ui==="inven"){
    if(p.x<240||p.x>1040||p.y<110||p.y>610){ RPG.ui="field"; RPG.inven=null; return; }
    if((RPG.inven.tab||0)===0) RPG.touch.sc={ id:id, y0:p.y, base:(RPG.inven.scroll||0) };
    if(p.y<110+64){ for(let i=0;i<3;i++) if(p.x>=260+i*175&&p.x<=420+i*175){ RPG.inven.tab=i; RPG.inven.idx=0; return; } return; }
    const tab=RPG.inven.tab||0;
    if(tab===0){
      const view=rpgInvenView(), v=Math.floor((p.y-198)/46), i=v+(RPG.inven.scroll||0);
      if(v>=0&&v<8&&i<view.length){ if(RPG.inven.idx===i) rpgInvenUse(view[i].i); else RPG.inven.idx=i; }   // лҚ”лё”нғӯ=мӮ¬мҡ©/мһҘм°©(л·°вҶ’мӣҗліё л§Өн•‘)
    } else if(tab===1&&p.x>660){
      const acts=rpgActiveSkills(), i=Math.floor((p.y-214)/44);
      if(i>=0&&i<acts.length){ if(RPG.inven.idx===i){ RPG.save.skillX=acts[i].id; showToast("вңЁ X кё°мҲ : "+acts[i].name); rpgPersist(); } else RPG.inven.idx=i; }
    }
    return;
  }
  if(RPG.ui==="confirm"){   // POLISH-3: 3лІ„нҠј + н„°м№ҳ нғҖк№ғ мғҒн–Ҙ(54px)
    if(p.y>382&&p.y<448){
      if(p.x>LOGW/2-278&&p.x<LOGW/2-98){ RPG.ui="field"; return; }
      if(p.x>LOGW/2-90&&p.x<LOGW/2+90){ RPG.ui="map"; return; }
      if(p.x>LOGW/2+98&&p.x<LOGW/2+278){ showToast("рҹҢҷ м ҖмһҘн•ҳкі  лӮҳмҷ”м–ҙмҡ”"); rpgExit(); return; }
    } else if(p.y<290||p.y>480){ RPG.ui="field"; }
    return;
  }
  if(RPG.ui==="seed"){
    const seeds=rpgSeedStacks();
    if(p.x<340||p.x>940||p.y<180||p.y>560){ RPG.ui="field"; RPG.seed=null; return; }
    const i=Math.floor((p.y-250)/50);
    if(i>=0&&i<seeds.length){
      if(RPG.seed.idx===i){ const tgt=RPG.seed.target, id=seeds[i].id; RPG.ui="field"; RPG.seed=null; rpgPlant(tgt,id); }
      else RPG.seed.idx=i;
    }
    return;
  }
  if(RPG.ui==="codex"){
    if(p.y<130){ for(let i=0;i<3;i++) if(p.x>=60+i*180&&p.x<=228+i*180){ RPG.codex.tab=i; return; } }
    else if(p.y>LOGH-50||p.x<60){ RPG.ui="field"; RPG.codex=null; }
    return;
  }
  if(RPG.ui==="sleep"){ if(RPG.sleep&&RPG.sleep.t>1.2) RPG.sleep.t=Math.max(RPG.sleep.t,3.0); return; }   // нғӯ=мҡ”м•Ҫ мҠӨнӮө
  if(RPG.ui==="map"){ RPG.ui="field"; return; }                                   // рҹ—әпёҸ м§ҖлҸ„: нғӯ=лӢ«кё°
  if(RPG.ui==="warp"){                                                             // рҹҢҠ лі„мғҳ: мһ¬нғӯ=мқҙлҸҷ
    const ls=(RPG.warp&&RPG.warp.list)||[];
    if(p.x<340||p.x>940||p.y<180||p.y>560){ RPG.ui="field"; RPG.warp=null; return; }
    const i=Math.floor((p.y-250)/50);
    if(i>=0&&i<ls.length){ if(RPG.warp.idx===i) rpgWellGo(ls[i]); else RPG.warp.idx=i; }
    return;
  }
  if(RPG.ui==="daily"){                                                            // рҹ“Ӣ мқҳлў°: мһ¬нғӯ=мҲҳл №
    const ls=(RPG.save.daily&&RPG.save.daily.list)||[];
    if(p.x<300||p.x>980||p.y<150||p.y>570){ RPG.ui="field"; RPG.dailyUi=null; return; }
    const i=Math.floor((p.y-220)/84);
    if(i>=0&&i<ls.length){ if(RPG.dailyUi.idx===i) rpgDailyClaim(i); else RPG.dailyUi.idx=i; }
    return;
  }
  if(p.y<64&&p.x>LOGW-140){ RPG.ui="inven"; RPG.inven={idx:0}; return; }          // рҹҺ’ м№©
  if(p.x>636&&p.x<740&&p.y>LOGH-66&&p.y<LOGH-24){ RPG.ui="map"; return; }         // рҹ—әпёҸ м§ҖлҸ„ м№©(н„°м№ҳ нғҖк№ғ мғҒн–Ҙ вҖ” POLISH-3)
  if(p.x>744&&p.x<862&&p.y>LOGH-66&&p.y<LOGH-24){ rpgUseCandy(); return; }        // рҹҚ¬ мӮ¬нғ• м№©(POLISH-1)
  if(p.y>LOGH-28&&p.x>LOGW-130){ RPG.ui="confirm"; return; }                      // рҹҡӘ лӮҳк°Җкё°(POLISH-1)
  if(dist(p.x,p.y,LOGW-92,LOGH-96)<50){ RPG.touch.atkId=id; RPG.touch.atkHold=true; rpgAttack(); return; }   // вҡ”(нҷҖл“ң=м—°мҶҚкіөкІ© В§4.7)
  if(dist(p.x,p.y,LOGW-198,LOGH-76)<36){ rpgCastX(); return; }                    // вңЁ X мҠӨнӮ¬
  if(dist(p.x,p.y,LOGW-198,LOGH-160)<36){ rpgCastC(); return; }                   // рҹ’Ё C м§ҲмЈј
  if(RPG.ctxTarget&&dist(p.x,p.y,LOGW-92,LOGH-208)<44){ rpgInteract(); return; }  // л¬ёл§Ҙ лІ„нҠј(м ҒмқҖ м ҲлҢҖ лҜёнҸ¬н•Ё)
  if(p.x<LOGW/2&&RPG.touch.moveId===null){ RPG.touch.moveId=id; RPG.touch.anchor=p; RPG.touch.vec={x:0,y:0}; }
}
function rpgTouchMove(id,p){
  if(!RPG) return;
  if(RPG.touch.sc&&id===RPG.touch.sc.id){   // POLISH-1: мғҒм җ/к°Җл°© мҠӨмҷҖмқҙн”„ мҠӨнҒ¬лЎӨ
    const dr=Math.round((RPG.touch.sc.y0-p.y)/46);
    if(RPG.ui==="shop"&&RPG.shop) RPG.shop.scroll=clamp(RPG.touch.sc.base+dr,0,Math.max(0,rpgShopRows().length-7));
    else if(RPG.ui==="inven"&&RPG.inven&&(RPG.inven.tab||0)===0) RPG.inven.scroll=clamp(RPG.touch.sc.base+dr,0,Math.max(0,rpgInvenView().length-8));
  }
  if(id===RPG.touch.moveId) RPG.touch.vec=stickVec(RPG.touch.anchor,p,60);
}
function rpgTouchEnd(id){
  if(!RPG) return;
  if(id===RPG.touch.moveId){ RPG.touch.moveId=null; RPG.touch.vec={x:0,y:0}; }
  if(id===RPG.touch.atkId){ RPG.touch.atkId=null; RPG.touch.atkHold=false; }
  if(RPG.touch.sc&&id===RPG.touch.sc.id) RPG.touch.sc=null;
}
function rpgShopTap(p){
  const PX=240,PY=110,PW=800,PH=500, sh=RPG.shop;
  if(p.x<PX||p.x>PX+PW||p.y<PY||p.y>PY+PH){ RPG.ui="field"; RPG.shop=null; return; }
  if(p.y<PY+64){
    if(p.x<PX+170){ sh.tab="buy"; sh.idx=0; }
    else if(p.x<PX+340){ sh.tab="sell"; sh.idx=0; }
    else if(p.x>PX+PW-70){ RPG.ui="field"; RPG.shop=null; }
    return;
  }
  if(sh.tab==="sell"&&p.y>PY+PH-58&&p.x<PX+264){ rpgSellAllCrops(); sh.idx=0; return; }
  if(sh.tab==="sell"&&p.y>PY+PH-58&&p.x>=PX+264&&p.x<PX+520){ rpgSellAllMats(); sh.idx=0; return; }
  const rows=rpgShopRows(), i=Math.floor((p.y-(PY+76))/46)+(sh.scroll||0);
  if(i>=0&&i<rows.length){
    if(sh.idx===i){ if(sh.tab==="buy") rpgShopBuy(rows[i]); else rpgShopSell(rows[i]); }   // лҚ”лё”нғӯ=мӢӨн–ү(мҳӨмЎ°мһ‘ л°©м§Җ)
    else sh.idx=i;
