/* =======================================================================
   ★ 에셋 교체 준비 구조 (오늘은 placeholder만, 내일 PNG를 넣으면 자동 사용) ★
   -----------------------------------------------------------------------
   동작 원리:
   - ASSETS_ENABLED 가 false 면 이미지를 아예 불러오지 않습니다(404·콘솔오류 없음).
     → 오늘은 기존 도형(Canvas) 렌더링이 그대로 쓰입니다.
   - 내일 PNG 파일을 assets/ 아래에 넣고 ASSETS_ENABLED=true 로 바꾸면,
     파일이 있는 캐릭터/도구만 이미지로 그려지고, 없으면 도형으로 fallback 됩니다.
   - 온라인 동기화에는 이미지가 들어가지 않습니다(캐릭터/도구 id만 전송 → assetId는 id로 역산).
   ======================================================================= */
// 내일 교사가 PNG를 넣은 뒤 true 로만 바꾸면 됩니다. (오늘은 false 유지)
let ASSETS_ENABLED = false;
const ASSET_BASE = "assets/";

// 캐릭터 에셋 파일 이름 규칙(방향+모션). 없는 파일은 자동으로 fallback.
const CHAR_ASSET_KEYS = [
  "down_idle","down_walk1","down_walk2",
  "up_idle","up_walk1","up_walk2",
  "left_idle","left_walk1","left_walk2",
  "right_idle","right_walk1","right_walk2",
  "hit","ko",
  "hold_down","hold_up","hold_left","hold_right"
];
// 도구(무기) 에셋 파일 이름 규칙.
const WEAPON_ASSET_KEYS = ["icon","projectile","held_down","held_up","held_left","held_right","effect_hit"];

// 경로만 만들어 두는 함수. (파일 존재 여부와 무관 — 로더가 실패 시 fallback 처리)
function charAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"characters/"+assetId+"/"+key+".png") : null; }
function weaponAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"weapons/"+assetId+"/"+key+".png") : null; }

// 그 외(타일/장애물/풀숲/UI) 경로 모음 — 내일 확장용. 오늘은 사용처에서 호출하지 않음.
const ASSET_MANIFEST = {
  tiles:     { ground_basic:ASSET_BASE+"tiles/ground_basic.png", ground_path:ASSET_BASE+"tiles/ground_path.png", capture_zone:ASSET_BASE+"tiles/capture_zone.png" },
  obstacles: { block_01:ASSET_BASE+"obstacles/block_01.png", crystal_01:ASSET_BASE+"obstacles/crystal_01.png", cushion_wall:ASSET_BASE+"obstacles/cushion_wall.png" },
  bushes:    { bush_01:ASSET_BASE+"bushes/bush_01.png", bush_02:ASSET_BASE+"bushes/bush_02.png" },
  ui:        { icon_hp:ASSET_BASE+"ui/icon_hp.png", icon_attack:ASSET_BASE+"ui/icon_attack.png", icon_speed:ASSET_BASE+"ui/icon_speed.png", icon_super:ASSET_BASE+"ui/icon_super.png" }
};

// 이미지 캐시. 상태: undefined=미시도, Image(complete&&naturalWidth>0)=성공, null=실패(파일 없음)
const _imageCache = {};
function _loadImage(path){
  if(path==null) return;
  if(path in _imageCache) return;
  // 브라우저가 아니거나(헤드리스 테스트) Image가 없으면 시도하지 않음 → fallback
  if(typeof Image === "undefined"){ _imageCache[path]=null; return; }
  try{
    const img=new Image();
    img.onload=function(){ _imageCache[path]=(img.naturalWidth>0)?img:null; };
    img.onerror=function(){ _imageCache[path]=null; }; // 파일 없음 → 조용히 fallback
    img.src=path;
    _imageCache[path]=undefined; // 로딩 중
  }catch(e){ _imageCache[path]=null; }
}
// 사용 가능한(로드 성공) 이미지면 반환, 아니면 null(→ fallback 도형 사용)
function _readyImage(path){
  if(!ASSETS_ENABLED || path==null) return null;
  const v=_imageCache[path];
  if(v===undefined){ return null; }     // 아직 로딩 중 → 이번 프레임은 fallback
  return v || null;
}
function getCharImage(assetId, key){ return _readyImage(charAssetPath(assetId, key)); }
function getWeaponImage(assetId, key){ return _readyImage(weaponAssetPath(assetId, key)); }

// 모든 학생 에셋을 미리 불러오기 시도. ASSETS_ENABLED=false 면 아무것도 하지 않음(오늘).
function loadGameAssets(){
  if(!ASSETS_ENABLED) return;
  for(const c of STUDENT_CHARACTERS){ if(!c.assetId) continue; for(const k of CHAR_ASSET_KEYS) _loadImage(charAssetPath(c.assetId,k)); }
  for(const w of STUDENT_WEAPONS){ if(!w.assetId) continue; for(const k of WEAPON_ASSET_KEYS) _loadImage(weaponAssetPath(w.assetId,k)); }
}

// facing(라디안) → "down"/"up"/"left"/"right"
function dirFromFacing(facing){
  const a=((facing%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(a>=Math.PI*0.25 && a<Math.PI*0.75) return "down";
  if(a>=Math.PI*0.75 && a<Math.PI*1.25) return "left";
  if(a>=Math.PI*1.25 && a<Math.PI*1.75) return "up";
  return "right";
}
// 이동중이면 walk1/walk2 번갈아, 아니면 idle
function motionSuffix(moving){
  if(!moving) return "idle";
  return (Math.floor(uiTime*6)%2===0) ? "walk1" : "walk2";
}
// 캐릭터 스프라이트 그리기(성공 시 true). 실패하면 false → 호출부가 fallback 도형을 그림.
// ctx는 이미 translate(x,y) 된 상태로 호출한다(기존 fallback과 동일 좌표계).
function drawCharacterSprite(charId, r, facing, opts){
  opts=opts||{};
  if(!ASSETS_ENABLED) return false;
  const ch=getCharacter(charId); if(!ch || !ch.assetId) return false;
  let key;
  if(opts.ko) key="ko";
  else if(opts.hit) key="hit";
  else key = dirFromFacing(facing)+"_"+motionSuffix(opts.moving);
  let img=getCharImage(ch.assetId, key);
  if(!img && (opts.ko||opts.hit)) img=getCharImage(ch.assetId, dirFromFacing(facing)+"_idle"); // hit/ko 없으면 idle
  if(!img) img=getCharImage(ch.assetId, "down_idle"); // 최후 보루
  if(!img) return false;
  const sz=r*2.4;
  ctx.drawImage(img, -sz/2, -sz/2, sz, sz);
  // 도구를 든 모습(있으면 캐릭터 위에 덧그림)
  if(opts.weaponId){ const w=getWeapon(opts.weaponId); if(w && w.assetId){ const held=getWeaponImage(w.assetId,"held_"+dirFromFacing(facing)); if(held) ctx.drawImage(held,-sz/2,-sz/2,sz,sz); } }
  return true;
}
// 렌더 위치 변화로 "이동 중" 추정(walk/idle 모션 선택용). ASSETS_ENABLED=false 면 호출되지 않음.
const _spriteLastPos={};
function spriteMoving(key,x,y){ const p=_spriteLastPos[key]; let moving=false; if(p){ const dx=x-p.x,dy=y-p.y; moving=(dx*dx+dy*dy)>0.25; } _spriteLastPos[key]={x:x,y:y}; return moving; }

// 탄환(발사체) 스프라이트. 성공 시 true.
function drawProjectileSprite(weaponId, x, y, r, facing){
  if(!ASSETS_ENABLED || !weaponId) return false;
  const w=getWeapon(weaponId); if(!w || !w.assetId) return false;
  const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
  const sz=r*3;
  ctx.save(); ctx.translate(x,y); if(facing!=null) ctx.rotate(facing); ctx.drawImage(img,-sz/2,-sz/2,sz,sz); ctx.restore();
  return true;
}

/* =======================================================================
   캔버스 / 화면 크기
   ======================================================================= */
const LOGW = 1280, LOGH = 720;                 // 고정 논리 좌표
const ARENA = { x:24, y:70, w:1232, h:576 };   // 전투 영역(위/아래는 정보줄)
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const ww = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(ww/LOGW, wh/LOGH);            // 16:9 유지하며 최대 크기
  const cssW = Math.max(1, Math.floor(LOGW*scale));
  const cssH = Math.max(1, Math.floor(LOGH*scale));
  canvas.style.width = cssW+"px";
  canvas.style.height = cssH+"px";
  canvas.width = Math.floor(cssW*dpr);                 // 고해상도 대응
  canvas.height = Math.floor(cssH*dpr);
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* =======================================================================
   수학 / 충돌 도우미
   ======================================================================= */
function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a+(b-a)*t; }
function deg2rad(d){ return d*Math.PI/180; }

function circleRectOverlap(cx,cy,r,R){
  const nx = clamp(cx, R.x, R.x+R.w);
  const ny = clamp(cy, R.y, R.y+R.h);
  const dx = cx-nx, dy = cy-ny;
  return (dx*dx+dy*dy) < (r*r);
}

/* =======================================================================
   현재 맵 데이터 (시작 시 선택 맵으로 채워진다)
   ======================================================================= */
let OBSTACLES = MAPS[0].obstacles;
let BUSHES = MAPS[0].bushes;

// 장애물과 겹치지 않는 안전한 위치를 (x,y) 근처에서 찾는다.
function findClearSpawn(x, y, r){
  x = clamp(x, ARENA.x+r, ARENA.x+ARENA.w-r);
  y = clamp(y, ARENA.y+r, ARENA.y+ARENA.h-r);
  const isClear = (px,py)=>{
    for(const o of OBSTACLES){ if(circleRectOverlap(px,py,r,o)) return false; }
    return true;
  };
  if(isClear(x,y)) return { x, y };
  // 점점 넓은 원으로 주변을 탐색
  for(let radius=24; radius<=280; radius+=22){
    for(let a=0; a<Math.PI*2; a+=Math.PI/8){
      const px = clamp(x+Math.cos(a)*radius, ARENA.x+r, ARENA.x+ARENA.w-r);
      const py = clamp(y+Math.sin(a)*radius, ARENA.y+r, ARENA.y+ARENA.h-r);
      if(isClear(px,py)) return { x:px, y:py };
    }
  }
  return { x, y }; // 최후의 수단
}

const PROFILE_KEY = "starArena.profile.v2";

const PLAYER_PROFILE_DEFAULT = {
  nickname: "플레이어",
  gold: 0,
  wins: 0, losses: 0, draws: 0,
  totalPlays: 0, totalKills: 0, bossKills: 0,
  selectedCharacterId: "student_01",
  selectedWeaponId: "tool_01",
  selectedDifficultyId: "normal",

  unlockedCharacters: STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id),
  unlockedWeapons: STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id),
  lastUpdated: 0
};
const DEFAULT_UNLOCKED_CHARACTERS = STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id);
const DEFAULT_UNLOCKED_WEAPONS = STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id);

let profile = null;

// 기본값과 합쳐서 빠진 항목이 있어도 안전하게 만든다.
function mergeProfile(saved){
  const p = {};
  for(const key in PLAYER_PROFILE_DEFAULT){ p[key] = PLAYER_PROFILE_DEFAULT[key]; }
  if(saved && typeof saved === "object"){
    for(const key in PLAYER_PROFILE_DEFAULT){
      if(saved[key] !== undefined && saved[key] !== null) p[key] = saved[key];
    }
  }
  // 배열/선택값 무결성 보정
  if(!Array.isArray(p.unlockedCharacters) || p.unlockedCharacters.length===0) p.unlockedCharacters = DEFAULT_UNLOCKED_CHARACTERS.slice();
  if(!Array.isArray(p.unlockedWeapons) || p.unlockedWeapons.length===0) p.unlockedWeapons = DEFAULT_UNLOCKED_WEAPONS.slice();
  if(p.unlockedCharacters.indexOf(p.selectedCharacterId) < 0) p.selectedCharacterId = p.unlockedCharacters[0];
  if(p.unlockedWeapons.indexOf(p.selectedWeaponId) < 0) p.selectedWeaponId = p.unlockedWeapons[0];
  if(getDifficulty(p.selectedDifficultyId).id !== p.selectedDifficultyId) p.selectedDifficultyId = "normal";
  if(getMap(p.selectedMapId).id !== p.selectedMapId) p.selectedMapId = "training";
  if(getMode(p.selectedModeId).id !== p.selectedModeId) p.selectedModeId = "solo";
  return p;
}

function loadProfile(){
  let saved = null;
  try {
    const raw = window.localStorage.getItem(PROFILE_KEY);
    if(raw) saved = JSON.parse(raw);
  } catch(e){
    saved = null; // 저장값이 깨졌으면 기본 프로필로 복구
  }
  profile = mergeProfile(saved);
}

function saveProfile(){
  profile.lastUpdated = Date.now();
  try {
    window.localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
  } catch(e){ /* 저장 실패해도 게임은 계속 진행 */ }
  OnlineManager.saveCloudProfile(profile); // Firebase가 있으면 시도(없으면 조용히 무시)
}

function addGold(amount){ profile.gold = Math.max(0, profile.gold + amount); }
function unlockCharacter(id){ if(profile.unlockedCharacters.indexOf(id) < 0) profile.unlockedCharacters.push(id); }
function unlockWeapon(id){ if(profile.unlockedWeapons.indexOf(id) < 0) profile.unlockedWeapons.push(id); }

const FB_SDK_URLS = [

];
function loadScriptsSequential(urls, done){
  let i=0;
  function next(){
    if(i>=urls.length){ done(true); return; }
    try{
      const s=document.createElement("script");
      s.src=urls[i]; s.async=true;
      s.onload=function(){ i++; next(); };
      s.onerror=function(){ done(false); };
      (document.head||document.body).appendChild(s);
    }catch(e){ done(false); }
  }
  next();
}

      const tryCreate=function(triesLeft){

          if(snap.val()){

  joinRoom:function(code, onDone){

  setPresence:function(role){
    try{
      if(!this.roomRef) return;

      pref.child("input").onDisconnect().set(emptyInput()); // 끊기면 입력도 비워 유령 동작 방지
      if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().set("ended"); // 방장 끊기면 방 종료

  listenRoom:function(){
    try{
      const self=this; if(!this.roomRef) return;
      const metaRef=this.roomRef.child("meta");
      const playersRef=this.roomRef.child("players");
      const stateRef=this.roomRef.child("state");
      const mcb=function(snap){ self.meta=snap.val(); onRoomMetaChanged(); };

        self.players=snap.val()||{ host:null, guest:null };
        self.onlineInput.host = self.players.host ? self.players.host.input : null;
        self.onlineInput.guest = self.players.guest ? self.players.guest.input : null;
      };
      metaRef.on("value", mcb);
      playersRef.on("value", pcb);
      this.unsubs.push(function(){ try{ metaRef.off("value",mcb); }catch(e){} });
      this.unsubs.push(function(){ try{ playersRef.off("value",pcb); }catch(e){} });
      if(this.role==="guest"){
        const scb=function(snap){ self.onlineState=snap.val(); };
        stateRef.on("value", scb);
        this.unsubs.push(function(){ try{ stateRef.off("value",scb); }catch(e){} });
      }
    }catch(e){}
  },

  writeInput:function(inputObj){ try{ const key=this.mySlot||this.role; if(this.roomRef && key) this.roomRef.child("players/"+key+"/input").set(inputObj); }catch(e){} },
  writeMetaStatus:function(status, extra){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; const u={ status:status, updatedAt:firebase.database.ServerValue.TIMESTAMP };
      if(extra){ for(const k in extra) u[k]=extra[k]; } this.roomRef.child("meta").update(u); }catch(e){}
  },
  writeHostState:function(stateObj){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; stateObj.updatedAt=firebase.database.ServerValue.TIMESTAMP;
      this.roomRef.child("state").set(stateObj); }catch(e){}
  },

  leaveRoom:function(localOnly){
    try{
      for(const u of this.unsubs){ try{ u(); }catch(e){} }
      this.unsubs=[];
      // localOnly: 방이 이미 서버에서 삭제/종료된 경우. DB에 아무것도 쓰지 않고 로컬 정리만 한다(유령 방 재생성 방지).
      const slotKey=this.mySlot||this.role;
      if(!localOnly && this.roomRef && slotKey){
        try{
          const pref=this.roomRef.child("players/"+slotKey);
          pref.child("connected").onDisconnect().cancel();
          pref.child("lastSeen").onDisconnect().cancel();
          pref.child("input").onDisconnect().cancel();
          if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().cancel();
        }catch(e){}
      }
      if(!localOnly && this.roomRef){
        try{
          const isTeam = (this.mode==="online3v3" || this.mode==="onlinePve6");
          if(this.role==="host"){ const rr=this.roomRef; rr.child("meta/status").set("ended");
            setTimeout(function(){ try{ rr.remove(); }catch(e){} }, 800); }
          else if(slotKey && isTeam){
            // 팀 모드: 매치는 계속, 내 슬롯만 비활성 처리(host가 빈자리로 다룸)
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
            this.roomRef.child("players/"+slotKey+"/input").set(emptyInput());
          }
          else if(slotKey){ // 1대1: 참가자가 1명뿐이라 매치 종료가 맞음
            this.roomRef.child("meta/status").set("ended");
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
          }
        }catch(e){}
      }
    }catch(e){}
    this.roomRef=null; this.roomCode=null; this.role=null; this.mode=null; this.mySlot=null;
    this.onlineState=null; this.meta=null; this.players={ host:null, guest:null };
    this.onlineInput={ host:null, guest:null }; this.opponentConnected=true;
    if(this.available && this.db) this.watchConnection(); // 연결 감시 재구독
  },

  // ---- 다인(슬롯) 모드 방 생성/입장 ----
  createTeamRoom:function(modeId, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this, mode=getOnlineMode(modeId);
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(snap.val()){ if(triesLeft>0){ tryCreate(triesLeft-1); return; } if(onDone) onDone(false,"방 생성 실패(코드 충돌)"); return; }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const team = mode.modeType==="pve" ? "pve" : "blue";
          const room={ meta:{ mode:modeId, status:"waiting", hostUid:self.uid, createdAt:ts, updatedAt:ts,
              mapId:"training", maxPlayers:mode.maxPlayers, winner:null, resultText:"", stageIndex:0, waveIndex:0 },
            players:{ p1:{ uid:self.uid, nickname:profile.nickname, slot:"p1", team:team, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:ts, input:emptyInput() } } };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode=modeId; self.mySlot="p1"; self.maxPlayers=mode.maxPlayers;
            self.setPresence("p1"); self.listenRoom();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"방 생성 실패"); });

  joinRoomAny:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this; code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"방 코드 형식 오류"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"방을 찾을 수 없음"); return; }
        const m=data.meta.mode;
        if(m==="online3v3" || m==="onlinePve6"){ self._joinTeamRoom(code, data, ref, onDone); }
        else { self.joinRoom(code, onDone); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },
  _joinTeamRoom:function(code, data, ref, onDone){
    try{
      const self=this; let claimedSlot=null, claimedMode=null, failReason="입장 실패";
      // 슬롯 claim을 transaction으로 원자 처리(동시 입장 시 같은 pN 덮어쓰기 방지)
      ref.transaction(function(room){
        claimedSlot=null; failReason="입장 실패";
        // RTDB transaction은 첫 호출이 캐시 미동기화로 null로 올 수 있다.
        // 여기서 null로 중단(return)하면 서버 데이터를 받기도 전에 트랜잭션이 영구 abort된다.
        // 이미 get()으로 존재를 확인한 data로 보정해 null-abort 함정을 피한다.
        if(room===null || room===undefined) room=data;
        if(!room || !room.meta){ failReason="방을 찾을 수 없음"; return; }            // abort
        if(room.meta.status!=="waiting" && room.meta.status!=="ready"){ failReason="이미 시작된 방"; return; }
        claimedMode=room.meta.mode; const mode=getOnlineMode(claimedMode);
        const players=room.players||{};
        let slot=null;
        for(let i=1;i<=mode.maxPlayers;i++){ const k="p"+i; if(!players[k] || players[k].connected===false){ slot=k; break; } }
        if(!slot){ failReason="방이 가득 찼습니다"; return; }                          // abort
        let team="pve";
        if(mode.modeType==="pvp"){
          let blue=0,red=0; for(const k in players){ const pp=players[k]; if(pp && pp.connected!==false){ if(pp.team==="red") red++; else blue++; } }
          team = (blue<=red && blue<3) ? "blue" : (red<3 ? "red" : "blue");
        }
        claimedSlot=slot;
        if(!room.players) room.players={};
        room.players[slot]={ uid:self.uid, nickname:profile.nickname, slot:slot, team:team, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:firebase.database.ServerValue.TIMESTAMP, input:emptyInput() };
        room.meta.status="ready"; room.meta.updatedAt=firebase.database.ServerValue.TIMESTAMP;
        return room; // commit
      }).then(function(res){
        if(res && res.committed && claimedSlot){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode=claimedMode; self.mySlot=claimedSlot; self.maxPlayers=getOnlineMode(claimedMode).maxPlayers;
          self.setPresence(claimedSlot); self.listenRoom();
          if(onDone) onDone(true, code);
        } else { if(onDone) onDone(false, failReason); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },

  // 프로필 클라우드 저장은 이번 베타에서 사용하지 않음(로컬 localStorage만)
  saveCloudProfile:function(p){ try{ /* 베타: 미사용 */ }catch(e){} },

let bullets = [];

let playerTeamScore = 0;  // 우리 팀이 적을 쓰러뜨린 수
let enemyTeamScore = 0;   // 적 팀이 우리 팀을 쓰러뜨린 수
let matchElapsed = 0;
let superGauge = 0;

/* =======================================================================
   키보드 입력
   ======================================================================= */
const keysDown = new Set();
const PREVENT_KEYS = new Set(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"]);

window.addEventListener("keydown", (e)=>{
  if(PREVENT_KEYS.has(e.code)) e.preventDefault();
  // F2: 에셋 확인 화면 토글(시작 화면에서만 진입 — 플레이 중 방해 없음)
  if(!e.repeat && e.code==="F2"){
    if(gameState===STATE.START){ gameState=STATE.ASSET_CHECK; return; }
    if(gameState===STATE.ASSET_CHECK){ gameState=STATE.START; return; }
  }
  if(!e.repeat) handleKeyPress(e.code);
  keysDown.add(e.code);
});
window.addEventListener("keyup", (e)=>{ keysDown.delete(e.code); });
window.addEventListener("blur", ()=>{ keysDown.clear(); });
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) keysDown.clear(); });
// 페이지를 닫으면 온라인 방을 정리한다(onDisconnect도 별도로 동작)
window.addEventListener("beforeunload", ()=>{ try{ if(OnlineManager.role) OnlineManager.leaveRoom(); }catch(e){} });

function showToast(text){ toastText = text; toastTimer = 1.8; }

function handleKeyPress(code){
  // 나가기 확인 오버레이가 떠 있으면 Y/N만 처리(다른 입력 무시)
  if(confirmLeave){
    if(code==="KeyY"){ confirmLeave=false; doLeaveToStart(); return; }
    if(code==="KeyN"||code==="Escape"){ confirmLeave=false; return; }
    return;
  }
  if(gameState === STATE.ASSET_CHECK){ if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(gameState === STATE.START){ handleStartKey(code); return; }
  if(gameState === STATE.SHOP){ handleShopKey(code); return; }
  if(gameState === STATE.ONLINE_MENU){ handleOnlineMenuKey(code); return; }
  if(gameState === STATE.ONLINE_LOBBY){ handleOnlineLobbyKey(code); return; }
  if(gameState === STATE.ONLINE_PLAYING){ handleOnlinePlayKey(code); return; }
  if(gameState === STATE.ONLINE_OVER){
    // 방장은 R/Enter로 같은 방 재시작, 참가자는 방장 대기. Esc는 나가기 확인.
    if(code==="KeyR"||code==="Enter"||code==="NumpadEnter"){
      if(OnlineManager.role==="host") onlineRematch();
      else showToast("방장이 다시 시작하면 함께 시작돼요");
      return;
    }
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PLAYING){
    if(code==="KeyX" || code==="Space"){ useCharacterSuper(); return; }
    if(code==="KeyP"){ setPaused(true); return; }
    if(code==="KeyR"){ reloadWeaponManual(); return; }   // 장전(결과화면 R 재시작과 분리: PLAYING에서만 장전)
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PAUSED){
    if(code==="KeyP"){ setPaused(false); return; }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
  if(gameState === STATE.OVER){
    if(code==="ArrowLeft"){ resultButtonIndex=0; return; }
    if(code==="ArrowRight"){ resultButtonIndex=1; return; }
    if(code==="KeyR"){ startGame(); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"){
      if(resultButtonIndex===0) startGame(); else goToStartScreen();
      return;
    }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
}

function handleStartKey(code){
  if(code==="ArrowUp"){ menuIndex=(menuIndex+MENU_ROWS-1)%MENU_ROWS; return; }
  if(code==="ArrowDown"){ menuIndex=(menuIndex+1)%MENU_ROWS; return; }
  if(code==="ArrowLeft"){ changeMenuValue(menuIndex,-1); return; }
  if(code==="ArrowRight"){ changeMenuValue(menuIndex,+1); return; }
  if(code==="Enter"||code==="NumpadEnter"){ activateMenuRow(menuIndex); return; }
  if(code==="KeyC"){ cycleCharacter(+1); return; }
  if(code==="KeyW"){ cycleWeapon(+1); return; }
  if(code==="KeyD"){ cycleDifficulty(+1); return; }
  if(code==="KeyM"){ cycleMap(+1); return; }
  if(code==="KeyT"){ cycleMode(+1); return; }
  if(code==="KeyN"){ changeNickname(); return; }
  if(code==="KeyS"){ openShop(); return; }
  if(code==="KeyO"){ openOnlineMenu(); return; }
}
function changeMenuValue(row, dir){
  if(row===0) cycleCharacter(dir);
  else if(row===1) cycleWeapon(dir);
  else if(row===2) cycleDifficulty(dir);
  else if(row===3) cycleMap(dir);
  else if(row===4) cycleMode(dir);
}
function activateMenuRow(row){
  if(row===5) changeNickname();
  else if(row===6) openShop();
  else if(row===7) openOnlineMenu();
  else startGame(); // 값 행 또는 시작 행에서 Enter → 게임 시작
}

/* =======================================================================
   메뉴 동작
   ======================================================================= */
function cycleInList(list, currentId, dir){
  let idx=0;
  for(let i=0;i<list.length;i++){ if(list[i]===currentId){ idx=i; break; } }
  idx=(idx+dir+list.length)%list.length;
  return list[idx];
}
function cycleCharacter(dir){ selectedCharacterId=cycleInList(profile.unlockedCharacters,selectedCharacterId,dir); profile.selectedCharacterId=selectedCharacterId; saveProfile(); }
function cycleWeapon(dir){ selectedWeaponId=cycleInList(profile.unlockedWeapons,selectedWeaponId,dir); profile.selectedWeaponId=selectedWeaponId; saveProfile(); }
function cycleDifficulty(dir){ selectedDifficultyId=cycleInList(DIFFICULTIES.map(d=>d.id),selectedDifficultyId,dir); profile.selectedDifficultyId=selectedDifficultyId; saveProfile(); }
function cycleMap(dir){ selectedMapId=cycleInList(MAPS.map(m=>m.id),selectedMapId,dir); profile.selectedMapId=selectedMapId; saveProfile(); }
function cycleMode(dir){ selectedModeId=cycleInList(MODES.map(m=>m.id),selectedModeId,dir); profile.selectedModeId=selectedModeId; saveProfile(); }

function changeNickname(){
  let name=null;
  try { name=window.prompt("닉네임을 입력하세요 (2~10글자)", profile.nickname); } catch(e){ name=null; }
  if(name===null) return;
  name=String(name).trim();
  if(name.length<2) name="플레이어";
  if(name.length>10) name=name.slice(0,10);
  profile.nickname=name; saveProfile(); showToast("닉네임: "+name);
}

function openShop(){ rebuildShopItems(); shopIndex=0; gameState=STATE.SHOP; }
function rebuildShopItems(){
  shopItems=[];
  for(const c of CHARACTERS){ if(profile.unlockedCharacters.indexOf(c.id)<0) shopItems.push({kind:"character",id:c.id,name:c.name,cost:c.unlockCost,desc:c.desc}); }
  for(const w of WEAPONS){ if(profile.unlockedWeapons.indexOf(w.id)<0) shopItems.push({kind:"weapon",id:w.id,name:w.name,cost:w.unlockCost,desc:w.desc}); }
}
function handleShopKey(code){
  if(code==="Escape"){ gameState=STATE.START; return; }
  if(shopItems.length===0){ if(code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(code==="ArrowUp"){ shopIndex=(shopIndex+shopItems.length-1)%shopItems.length; return; }
  if(code==="ArrowDown"){ shopIndex=(shopIndex+1)%shopItems.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ buyShopItem(); return; }
}
function buyShopItem(){
  const item=shopItems[shopIndex];
  if(!item) return;
  if(profile.gold<item.cost){ showToast("골드가 부족합니다!"); return; }
  addGold(-item.cost);
  if(item.kind==="character"){ unlockCharacter(item.id); showToast(item.name+" 캐릭터 해금!"); }
  else { unlockWeapon(item.id); showToast(item.name+" 무기 해금!"); }
  saveProfile();
  rebuildShopItems();
  if(shopIndex>=shopItems.length) shopIndex=Math.max(0,shopItems.length-1);
}

/* =======================================================================
   한 판 설정 / 파이터 생성 / 초기화
   ======================================================================= */
function getMatchConfig(){
  const diff=getDifficulty(selectedDifficultyId);
  const mode=getMode(selectedModeId);
  return {
    diff:diff, mode:mode, map:getMap(selectedMapId),
    enemyMaxHp: GAME_CONFIG.enemyMaxHp * diff.enemyHpMul * mode.enemyStatMul,
    enemyMoveSpeed: GAME_CONFIG.enemyMoveSpeed * diff.enemySpeedMul,
    enemyDamage: GAME_CONFIG.enemyDamage * diff.enemyDamageMul * mode.enemyDamageMul,
    enemyAttackCooldown: GAME_CONFIG.enemyAttackCooldown * diff.enemyCooldownMul,
    enemyAimError: diff.enemyAimError,
    enemyBulletSpeed: GAME_CONFIG.enemyBulletSpeed,
    enemyRange: GAME_CONFIG.enemyRange,
    bossMaxHp: GAME_CONFIG.bossMaxHp * diff.bossHpMul,
    bossDamageMul: GAME_CONFIG.bossDamageMul * diff.bossDamageMul
  };
}

// 모든 파이터(캐릭터)를 만드는 공통 함수
function makeFighter(opts){
  const team=opts.team;
  const isPlayer=!!opts.isPlayer;
  let charData=null, maxHp, moveSpeed, color, subColor;

  if(team==="player"){
    charData=getCharacter(opts.characterId || "lumi");
    maxHp=GAME_CONFIG.playerMaxHp*charData.hpMul;
    moveSpeed=GAME_CONFIG.playerMoveSpeed*charData.speedMul;
    color=charData.color; subColor=charData.subColor;
  } else {
    if(opts.isBoss){ maxHp=MATCH.bossMaxHp; moveSpeed=MATCH.enemyMoveSpeed*0.9; color="#b3203a"; subColor="#ff6a86"; }
    else { maxHp=MATCH.enemyMaxHp; moveSpeed=MATCH.enemyMoveSpeed; color="#8a3fd0"; subColor="#e0b3ff"; }
  }

  const r=opts.isBoss?38:22;
  const spawn=findClearSpawn(opts.x,opts.y,r);

  return {
    id:++fighterIdCounter,
    team:team, isPlayer:isPlayer, isBoss:!!opts.isBoss,
    characterId: charData?charData.id:null,
    name: opts.name || (charData?charData.name:"크롬"),
    char: charData,
    baseX:opts.x, baseY:opts.y,
    x:spawn.x, y:spawn.y, r:r,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp,
    moveSpeed:moveSpeed, color:color, subColor:subColor,
    facing: team==="player"?0:Math.PI,
    cooldown:0, lastCombatTime:-999, lastFireTime:-999,
    hitFlash:0, dead:false, respawnTimer:0, invincibleTimer:0,
    ai:{ strafeDir:1, strafeTimer:0, reactionTimer:0.3, fireTimer:rand(0,0.4),
         lastX:spawn.x, lastY:spawn.y, stuckCheck:0.4, avoidDir:1, avoidTimer:0,
         knowsTarget:true, lastKnownX:spawn.x, lastKnownY:spawn.y } };
}

function teamSlotPos(base, slot){
  const offsets=[ {dx:0,dy:0}, {dx:60,dy:-50}, {dx:-60,dy:50}, {dx:60,dy:50}, {dx:-60,dy:-50} ];
  const o=offsets[slot%offsets.length];
  return { x:base.x+o.dx, y:base.y+o.dy };
}

function createFighters(){
  const mode=MATCH.mode, map=MATCH.map;
  fighterIdCounter=0;

  const pPos=teamSlotPos(map.playerSpawn,0);
  player=makeFighter({ team:"player", isPlayer:true, characterId:selectedCharacterId, x:pPos.x, y:pPos.y });

  allies=[];
  const allyPool=profile.unlockedCharacters.filter(id=>id!==selectedCharacterId);
  for(let i=0;i<mode.allyCount;i++){
    const charId = allyPool.length>0 ? allyPool[i%allyPool.length] : selectedCharacterId;
    const pos=teamSlotPos(map.playerSpawn,i+1);
    allies.push(makeFighter({ team:"player", isPlayer:false, characterId:charId, x:pos.x, y:pos.y }));
  }

  enemies=[];
  for(let i=0;i<mode.enemyCount;i++){
    const pos=teamSlotPos(map.enemySpawn,i);
    const name=mode.enemyCount>1?("크롬 "+(i+1)):"크롬";
    enemies.push(makeFighter({ team:"enemy", isPlayer:false, x:pos.x, y:pos.y, name:name }));
  }
  enemy=enemies[0];
}

function playerTeam(){ return [player].concat(allies); }
function allFighters(){ return [player].concat(allies, enemies); }
function targetsOf(team){ return team==="player" ? enemies : playerTeam(); }

function applyProfileSelections(){
  selectedCharacterId=profile.selectedCharacterId;
  selectedWeaponId=profile.selectedWeaponId;
  selectedDifficultyId=profile.selectedDifficultyId;
  selectedMapId=profile.selectedMapId;
  selectedModeId=profile.selectedModeId;
}

function resetMatch(){
  MATCH=getMatchConfig();
  OBSTACLES=MATCH.map.obstacles;
  BUSHES=MATCH.map.bushes;
  createFighters();
  bullets=[]; effects=[]; damageNumbers=[];
  playerTeamScore=0; enemyTeamScore=0;

  stats=freshStats();
  enemiesDowned=0; bossPending=false; bossSpawned=false;

function startGame(){ applyProfileSelections(); resetMatch(); gameState=STATE.PLAYING; }
function goToStartScreen(){ gameState=STATE.START; keysDown.clear(); restoreLocalArena(); }
function restoreLocalArena(){ OBSTACLES=getMap(selectedMapId).obstacles; BUSHES=getMap(selectedMapId).bushes; }
function setPaused(p){
  if(p && gameState===STATE.PLAYING){ gameState=STATE.PAUSED; keysDown.clear(); }
  else if(!p && gameState===STATE.PAUSED){ gameState=STATE.PLAYING; keysDown.clear(); }

function endGame(){
  gameState=STATE.OVER; resultButtonIndex=0; keysDown.clear();

/* =======================================================================
   이동 / 충돌
   ======================================================================= */
function moveEntity(ent, dx, dy){
  const ox=ent.x, oy=ent.y;
  ent.x+=dx;
  for(const o of OBSTACLES){ if(circleRectOverlap(ent.x,ent.y,ent.r,o)){ ent.x=ox; break; } }
  ent.y+=dy;
  for(const o of OBSTACLES){ if(circleRectOverlap(ent.x,ent.y,ent.r,o)){ ent.y=oy; break; } }
  ent.x=clamp(ent.x, ARENA.x+ent.r, ARENA.x+ARENA.w-ent.r);
  ent.y=clamp(ent.y, ARENA.y+ent.r, ARENA.y+ARENA.h-ent.r);
}
function inBush(ent){
  for(const b of BUSHES){ if(ent.x>=b.x&&ent.x<=b.x+b.w&&ent.y>=b.y&&ent.y<=b.y+b.h) return true; }
  return false;
}
function canBeHit(ent){ return ent && !ent.dead && ent.invincibleTimer<=0; }
function hasLineOfSight(ax,ay,bx,by){
  const d=dist(ax,ay,bx,by), steps=Math.max(1,Math.ceil(d/16));
  for(let i=1;i<steps;i++){
    const t=i/steps, px=lerp(ax,bx,t), py=lerp(ay,by,t);
    for(const o of OBSTACLES){ if(px>=o.x&&px<=o.x+o.w&&py>=o.y&&py<=o.y+o.h) return false; }
  }
  return true;
}
function nearestTarget(f, preferPlayer){
  const list=targetsOf(f.team);
  let best=null, bestD=Infinity;
  for(const t of list){
    if(t.dead) continue;
    let d=dist(f.x,f.y,t.x,t.y);
    if(preferPlayer && t.isPlayer) d-=80;
    if(d<bestD){ bestD=d; best=t; }
  }
  return best;
}

/* =======================================================================
   발사 / 피해
   ======================================================================= */
function spawnBullets(fighter, baseAngle, opt){
  const count=opt.count||1;
  const spread=deg2rad(opt.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=baseAngle;
    if(count>1) a=baseAngle - spread/2 + spread*(i/(count-1));
    const muzzle=fighter.r+6;
    const bx=fighter.x+Math.cos(a)*muzzle, by=fighter.y+Math.sin(a)*muzzle;
    bullets.push({
      x:bx, y:by, vx:Math.cos(a)*opt.speed, vy:Math.sin(a)*opt.speed,
      r:opt.radius, damage:opt.damage, team:fighter.team, ownerId:fighter.id,
      isSuper:!!opt.isSuper, countsForPlayer:(fighter.id===player.id && !opt.isSuper),
      color:opt.color, alive:true, traveled:0, maxRange:opt.range
    });
    spawnMuzzle(bx,by,Math.cos(a),Math.sin(a),opt.color);
  }
  fighter.facing=baseAngle;
  fighter.lastCombatTime=matchElapsed;
  fighter.lastFireTime=matchElapsed;   // 발사하면 위치가 드러난다(풀숲 은신 해제 판정용)
  if(fighter.invincibleTimer>0) fighter.invincibleTimer=0;
}

function firePlayerWeapon(){
  const w=getWeapon(selectedWeaponId), c=player.char;
  spawnBullets(player, player.facing, {
    count:w.spreadCount, spreadDeg:w.spreadAngleDeg,
    damage: GAME_CONFIG.playerDamage*c.damageMul*w.damageMul,
    speed: GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul,
    range: GAME_CONFIG.playerRange*w.rangeMul,
    radius: GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul,
    color:w.color
  });
  player.lastFireTime=matchElapsed;
  stats.shotsFired+=w.spreadCount;
}

function fireAiShot(fighter, angle){
  if(fighter.team==="enemy"){
    const isBoss=fighter.isBoss;
    const damage=MATCH.enemyDamage*(isBoss?MATCH.bossDamageMul:1);
    const radius=isBoss?GAME_CONFIG.bossBulletRadius:GAME_CONFIG.enemyBulletRadius;
    if(isBoss && Math.random()<0.5){
      spawnBullets(fighter, angle, { count:3, spreadDeg:26, damage:damage, speed:MATCH.enemyBulletSpeed, range:MATCH.enemyRange, radius:radius, color:"#ff768f" });
    } else {
      spawnBullets(fighter, angle, { count:1, spreadDeg:0, damage:damage, speed:MATCH.enemyBulletSpeed, range:MATCH.enemyRange, radius:radius, color:"#c98bff" });
    }
  } else {
    const c=fighter.char;
    spawnBullets(fighter, angle, { count:1, spreadDeg:0, damage:GAME_CONFIG.playerDamage*c.damageMul*0.8, speed:GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul, range:GAME_CONFIG.playerRange, radius:GAME_CONFIG.playerBulletRadius, color:c.subColor });
  }
}

function applyDamage(target, dmg, fromTeam, fromId, hx, hy){
  if(!canBeHit(target)) return 0;
  if(target.team===fromTeam) return 0; // 아군 오사 방지
  target.hp-=dmg;
  target.lastCombatTime=matchElapsed;
  target.hitFlash=0.15;
  spawnDamageNumber(target.x, target.y-target.r-8, Math.round(dmg), target.team==="player"?"#ff7a7a":"#ffe066");
  if(fromId===player.id && target.team==="enemy") stats.damageDealt+=dmg;
  if(target.isPlayer) stats.damageTaken+=dmg;
  if(target.hp<=0){ target.hp=0; handleDeath(target, fromId); }
  return dmg;
}

function handleDeath(f, killerId){
  if(f.dead) return;
  f.dead=true; f.respawnTimer=GAME_CONFIG.respawnDelay; f.invincibleTimer=0;
  spawnDeathBurst(f);
  if(f.team==="enemy"){
    playerTeamScore++;
    if(killerId===player.id) stats.kills++;
    if(f.isBoss){
      bossActive=false; bossDefeated=true; stats.bossKilled=true;
      f.respawnTimer=Infinity;   // 격파된 보스는 다시 부활하지 않는다(보스전은 1회성 피날레)
      showToast("보스 격파! 보상 +"+REWARD_CONFIG.boss+"G");
    } else {
      enemiesDowned++;
      if(MATCH.mode.bossAllowed && !bossSpawned && enemiesDowned>=GAME_CONFIG.bossThreshold) bossPending=true;
    }
  } else {
    enemyTeamScore++;
    if(f.isPlayer) stats.playerDeaths++;
  }
}

function respawn(f){
  let asBoss=false;
  if(f.team==="enemy" && f===enemy && bossPending && !bossSpawned){
    asBoss=true; bossPending=false; bossSpawned=true; bossActive=true;
  }
  f.dead=false;
  if(asBoss){
    f.isBoss=true; f.r=38; f.name="보스 크롬";
    f.maxHp=MATCH.bossMaxHp; f.color="#b3203a"; f.subColor="#ff6a86";
    spawnBossArrival();
  }
  f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;

  const base=f.team==="player"?MATCH.map.playerSpawn:MATCH.map.enemySpawn;
  let bx=(f.baseX!==undefined)?f.baseX:base.x;
  let by=(f.baseY!==undefined)?f.baseY:base.y;
  let pos=findClearSpawn(bx,by,f.r);
  for(const t of targetsOf(f.team)){
    if(!t.dead && dist(pos.x,pos.y,t.x,t.y) < f.r+t.r+50){
      pos=findClearSpawn(base.x, base.y+(base.y<LOGH/2?80:-80), f.r);
      break;
    }
  }
  f.x=pos.x; f.y=pos.y;
  f.invincibleTimer=GAME_CONFIG.invincibleTime;
  f.lastCombatTime=matchElapsed;
  f.ai.lastX=pos.x; f.ai.lastY=pos.y;
  spawnRespawnRing(f);
}

/* =======================================================================
   궁극기 (X) — 캐릭터별 3종
   ======================================================================= */
function useCharacterSuper(){
  if(player.dead) return;
  if(superGauge<GAME_CONFIG.superCharge){ spawnSuperFail(player.x,player.y); return; }
  superGauge=0; stats.superUsed++;
  player.lastCombatTime=matchElapsed;
  if(player.invincibleTimer>0) player.invincibleTimer=0;
  const type=player.char.superType;
  if(type==="burst") useBurstSuper();
  else if(type==="dash") useDashSuper();
  else useTripleSuper();
}
function useBurstSuper(){
  spawnSuperWave(player.x,player.y,GAME_CONFIG.superRadius);
  for(const t of enemies){
    if(canBeHit(t) && dist(player.x,player.y,t.x,t.y)<=GAME_CONFIG.superRadius+t.r){
      applyDamage(t, GAME_CONFIG.superDamage, "player", player.id, t.x, t.y);
      pushFighter(t, Math.atan2(t.y-player.y,t.x-player.x), GAME_CONFIG.superKnockback);
    }
  }
}
function useDashSuper(){
  const a=player.facing, steps=16, stepLen=GAME_CONFIG.superDashDistance/steps;
  const alreadyHit={};
  spawnSuperWave(player.x,player.y,60);
  for(let i=0;i<steps;i++){
    moveEntity(player, Math.cos(a)*stepLen, Math.sin(a)*stepLen);
    effects.push({kind:"dashTrail",x:player.x,y:player.y,t:0,life:0.35,color:player.color});
    for(const t of enemies){
      if(canBeHit(t) && !alreadyHit[t.id] && dist(player.x,player.y,t.x,t.y)<player.r+t.r+8){
        applyDamage(t, GAME_CONFIG.superDamage, "player", player.id, t.x, t.y);
        alreadyHit[t.id]=true;
      }
    }
  }
}
function useTripleSuper(){
  spawnBullets(player, player.facing, {
    count:5, spreadDeg:48, damage:GAME_CONFIG.superDamage, speed:GAME_CONFIG.playerBulletSpeed*1.1,
    range:GAME_CONFIG.playerRange*1.2, radius:GAME_CONFIG.playerBulletRadius*1.3, color:"#fff0a0", isSuper:true
  });
}
function pushFighter(f, angle, distance){
  const steps=8;
  for(let i=0;i<steps;i++) moveEntity(f, Math.cos(angle)*distance/steps, Math.sin(angle)*distance/steps);
}

/* =======================================================================
   업데이트
   ======================================================================= */
function updatePlayer(dt){
  if(player.dead){ player.respawnTimer-=dt; if(player.respawnTimer<=0) respawn(player); return; }
  let mx=0,my=0;
  if(keysDown.has("ArrowUp")) my-=1;
  if(keysDown.has("ArrowDown")) my+=1;
  if(keysDown.has("ArrowLeft")) mx-=1;
  if(keysDown.has("ArrowRight")) mx+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){
    mx/=ml; my/=ml;                          // 대각선 정규화
    moveEntity(player, mx*player.moveSpeed*dt, my*player.moveSpeed*dt);
    player.facing=Math.atan2(my,mx);          // 이동 방향을 바라봄
  }
  player.cooldown-=dt;
  if(keysDown.has("KeyZ") && player.cooldown<=0){
    firePlayerWeapon();
    player.cooldown=GAME_CONFIG.playerAttackCooldown*getWeapon(selectedWeaponId).cooldownMul;
  }
  if(player.hitFlash>0) player.hitFlash-=dt;
  if(player.invincibleTimer>0) player.invincibleTimer-=dt;
  regen(player, dt);
}

function updateAI(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;

  const ai=f.ai, isEnemy=(f.team==="enemy");
  const target=nearestTarget(f, isEnemy);
  if(!target){ regen(f,dt); return; }
  const d=dist(f.x,f.y,target.x,target.y);

  // 풀숲 은신: 멀리(>270) 떨어진 풀숲 안에 있고 최근(1.2초) 공격하지 않은 대상은 추적자가 위치를 잃는다(아군·적 공통)
  const targetHidden = inBush(target) && d>270 && (matchElapsed-target.lastFireTime)>1.2;
  const wasKnown=ai.knowsTarget;
  if(!targetHidden){
    if(!wasKnown) ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.6,1.2);
    ai.knowsTarget=true; ai.lastKnownX=target.x; ai.lastKnownY=target.y;
  } else { ai.knowsTarget=false; }
  const tx=ai.knowsTarget?target.x:ai.lastKnownX;
  const ty=ai.knowsTarget?target.y:ai.lastKnownY;
  const tdx=tx-f.x, tdy=ty-f.y, td=Math.hypot(tdx,tdy)||1;

  let mvx=0,mvy=0;
  if(!isEnemy && player!==f){
    const dp=dist(f.x,f.y,player.x,player.y);
    if(dp>320){ mvx=(player.x-f.x)/dp; mvy=(player.y-f.y)/dp; }
  }
  if(mvx===0 && mvy===0){
    const ideal=GAME_CONFIG.idealDistance;
    const retreating = isEnemy && !f.isBoss && f.hp<=f.maxHp*0.3;
    if(retreating){ mvx=-tdx/td; mvy=-tdy/td; }
    else if(td>ideal+45){ mvx=tdx/td; mvy=tdy/td; }
    else if(td<ideal-45){ mvx=-tdx/td; mvy=-tdy/td; }
    else {
      ai.strafeTimer-=dt;
      if(ai.strafeTimer<=0){ ai.strafeDir=Math.random()<0.5?1:-1; ai.strafeTimer=rand(0.6,1.4); }
      mvx=-tdy/td*ai.strafeDir; mvy=tdx/td*ai.strafeDir;
    }
  }
  ai.stuckCheck-=dt;
  if(ai.stuckCheck<=0){
    if(dist(f.x,f.y,ai.lastX,ai.lastY)<6){ ai.avoidDir=Math.random()<0.5?1:-1; ai.avoidTimer=0.6; }
    ai.lastX=f.x; ai.lastY=f.y; ai.stuckCheck=0.4;
  }
  if(ai.avoidTimer>0){ ai.avoidTimer-=dt; const a=Math.atan2(mvy,mvx)+ai.avoidDir*1.2; mvx=Math.cos(a); mvy=Math.sin(a); }
  const mlen=Math.hypot(mvx,mvy);
  if(mlen>0){ mvx/=mlen; mvy/=mlen; moveEntity(f, mvx*f.moveSpeed*dt, mvy*f.moveSpeed*dt); }

  ai.fireTimer-=dt; ai.reactionTimer-=dt;
  const range=isEnemy?MATCH.enemyRange:GAME_CONFIG.playerRange;
  const cooldown=isEnemy?MATCH.enemyAttackCooldown:GAME_CONFIG.playerAttackCooldown*1.5;
  const aimErr=isEnemy?MATCH.enemyAimError:0.1;
  if(ai.knowsTarget && d<range && ai.fireTimer<=0 && ai.reactionTimer<=0 &&
     hasLineOfSight(f.x,f.y,target.x,target.y) && canBeHit(target)){
    const baseA=Math.atan2(target.y-f.y,target.x-f.x)+rand(-1,1)*aimErr;
    fireAiShot(f, baseA);
    ai.fireTimer=cooldown*rand(0.85,1.25);
    ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.7,1.3);
  }
  regen(f, dt);
}

function regen(f, dt){
  if(f.dead) return;
  if(matchElapsed-f.lastCombatTime>=GAME_CONFIG.regenStartTime && f.hp<f.maxHp){
    f.hp=Math.min(f.maxHp, f.hp+GAME_CONFIG.regenRate*dt);
  }
}

function updateBullets(dt){
  for(const b of bullets){
    if(!b.alive) continue;
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1, Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, stepLen=Math.hypot(sx,sy);
    for(let s=0;s<steps && b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=stepLen;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; break; }
      let hitWall=false;
      for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ hitWall=true; break; } }
      if(hitWall){ spawnHit(b.x,b.y,"#aab0d0"); b.alive=false; break; }
      const list=targetsOf(b.team);
      for(const t of list){
        if(canBeHit(t) && dist(b.x,b.y,t.x,t.y)<b.r+t.r){
          const applied=applyDamage(t, b.damage, b.team, b.ownerId, b.x, b.y);
          if(applied>0 && b.countsForPlayer){
            stats.shotsHit++;
            superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+GAME_CONFIG.superChargePerHit);
          }
          spawnHit(b.x,b.y,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  bullets=bullets.filter(b=>b.alive);
}

function updateEffects(dt){
  for(const e of effects){ e.t+=dt; if(e.vx!==undefined){ e.x+=e.vx*dt; e.y+=e.vy*dt; } }
  effects=effects.filter(e=>e.t<e.life);
  for(const n of damageNumbers){ n.t+=dt; n.y+=n.vy*dt; }
  damageNumbers=damageNumbers.filter(n=>n.t<n.life);
}

function update(dt){
  uiTime+=dt;
  if(toastTimer>0) toastTimer-=dt;
  if(gameState===STATE.ONLINE_PLAYING){ updateOnline(dt); return; }
  if(gameState!==STATE.PLAYING) return;
  matchElapsed+=dt;
  for(const f of allFighters()) f.displayHp=lerp(f.displayHp, f.hp, Math.min(1,dt*8));
  updatePlayer(dt);
  for(const a of allies) updateAI(a, dt);
  for(const e of enemies) updateAI(e, dt);
  updateBullets(dt);
  updateEffects(dt);
  if(matchElapsed>=GAME_CONFIG.gameTime){ matchElapsed=GAME_CONFIG.gameTime; endGame(); }
}

/* =======================================================================
   보상 (종료 시 한 번만)
   ======================================================================= */
function calculateMatchReward(){
  let gold=0, result;
  if(playerTeamScore>enemyTeamScore) result="win";
  else if(playerTeamScore<enemyTeamScore) result="lose";
  else result="draw";
  if(result==="win") gold+=REWARD_CONFIG.win;
  else if(result==="draw") gold+=REWARD_CONFIG.draw;
  else gold+=REWARD_CONFIG.lose;
  gold+=stats.kills*REWARD_CONFIG.perKill;
  if(stats.bossKilled) gold+=REWARD_CONFIG.boss;
  if(result==="win" && selectedDifficultyId==="hard") gold+=REWARD_CONFIG.hardWinBonus;
  if(result==="win" && selectedModeId==="trio") gold+=REWARD_CONFIG.mode3v3WinBonus;
  return { gold:gold, result:result };
}
function grantMatchReward(){
  if(matchRewardGiven) return;
  matchRewardGiven=true;
  const r=calculateMatchReward();
  matchGoldEarned=r.gold;
  addGold(r.gold);
  profile.totalPlays+=1;
  profile.totalKills+=stats.kills;
  if(stats.bossKilled) profile.bossKills+=1;
  if(r.result==="win") profile.wins+=1;
  else if(r.result==="lose") profile.losses+=1;
  else profile.draws+=1;

  matchDropName="";
  const locked=WEAPONS.filter(w=>profile.unlockedWeapons.indexOf(w.id)<0);
  if((r.result==="win"||stats.bossKilled) && locked.length>0 && Math.random()<REWARD_CONFIG.weaponDropChance){
    const drop=locked[Math.floor(Math.random()*locked.length)];
    unlockWeapon(drop.id); matchDropName=drop.name;
  }
  saveProfile();
}

/* =======================================================================
   그리기
   ======================================================================= */
function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawStar(cx,cy,spikes,outerR,innerR,color){
  ctx.fillStyle=color; ctx.beginPath();
  let rot=-Math.PI/2; const step=Math.PI/spikes;
  ctx.moveTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
  for(let i=0;i<spikes;i++){ rot+=step; ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step; ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); }
  ctx.closePath(); ctx.fill();
}
function hexA(hex,a){
  if(!hex || hex[0]!=="#" || hex.length<7) return "rgba(255,255,255,"+a+")";
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}

function render(){
  const sx=canvas.width/LOGW, sy=canvas.height/LOGH;
  ctx.setTransform(sx,0,0,sy,0,0);
  ctx.clearRect(0,0,LOGW,LOGH);
  drawBackground();
  drawArenaFloor();
  drawBushes();
  drawObstacles();

  if(gameState===STATE.PLAYING || gameState===STATE.PAUSED || gameState===STATE.OVER){
    drawBullets();
    for(const e of enemies) drawFighter(e);
    for(const a of allies) drawFighter(a);
    drawFighter(player);
    drawEffects();
    drawDamageNumbers();
    drawHUD();
  }

  if(gameState===STATE.ONLINE_PLAYING) renderOnlineMatch();

  if(gameState===STATE.START) drawStartScreen();
  else if(gameState===STATE.ASSET_CHECK) drawAssetCheckScreen();
  else if(gameState===STATE.SHOP) drawShopScreen();
  else if(gameState===STATE.ONLINE_MENU) drawOnlineMenu();
  else if(gameState===STATE.ONLINE_LOBBY) drawOnlineLobby();
  else if(gameState===STATE.ONLINE_OVER) drawOnlineOver();
  else if(gameState===STATE.PAUSED) drawPauseScreen();
  else if(gameState===STATE.OVER) drawResultScreen();

  if(confirmLeave) drawLeaveConfirm();
  drawToast();
}

function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,LOGH);
  g.addColorStop(0,"#1b2150"); g.addColorStop(1,"#0d1030");
  ctx.fillStyle=g; ctx.fillRect(0,0,LOGW,LOGH);
  ctx.save();
  for(let i=0;i<40;i++){ const x=(i*173.13)%LOGW, y=(i*97.7)%64, tw=0.5+0.5*Math.sin(uiTime*2+i); ctx.globalAlpha=0.25+tw*0.4; ctx.fillStyle="#cfe3ff"; ctx.fillRect(x,y,2,2); }
  ctx.restore();
}
function isOnlineState(){ return gameState===STATE.ONLINE_MENU||gameState===STATE.ONLINE_LOBBY||gameState===STATE.ONLINE_PLAYING||gameState===STATE.ONLINE_OVER; }
function drawArenaFloor(){
  const map=isTeamOnline()?getMap(tMapId):(isOnlineState()?getMap(ONLINE_MAP_ID):((MATCH&&MATCH.map)?MATCH.map:getMap(selectedMapId)));
  ctx.save();
  ctx.fillStyle=map.floorColor; roundRect(ARENA.x,ARENA.y,ARENA.w,ARENA.h,18); ctx.fill();
  ctx.beginPath(); ctx.rect(ARENA.x,ARENA.y,ARENA.w,ARENA.h); ctx.clip();
  ctx.strokeStyle="rgba(150,180,255,0.10)"; ctx.lineWidth=2;
  for(let gx=ARENA.x;gx<=ARENA.x+ARENA.w;gx+=64){ ctx.beginPath(); ctx.moveTo(gx,ARENA.y); ctx.lineTo(gx,ARENA.y+ARENA.h); ctx.stroke(); }
  for(let gy=ARENA.y;gy<=ARENA.y+ARENA.h;gy+=64){ ctx.beginPath(); ctx.moveTo(ARENA.x,gy); ctx.lineTo(ARENA.x+ARENA.w,gy); ctx.stroke(); }
  ctx.strokeStyle="rgba(150,180,255,0.15)"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(LOGW/2,ARENA.y+ARENA.h/2,90,0,Math.PI*2); ctx.stroke();
  ctx.restore();

  ctx.save(); ctx.strokeStyle=map.strokeColor; ctx.lineWidth=5; roundRect(ARENA.x,ARENA.y,ARENA.w,ARENA.h,18); ctx.stroke(); ctx.restore();
}
function drawSpawnMark(x,y,color){
  ctx.save(); ctx.globalAlpha=0.3; ctx.strokeStyle=color; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.stroke(); ctx.restore();
}
function drawBushes(){

    ctx.fillStyle="rgba(28,110,60,0.6)";

    ctx.strokeStyle="rgba(80,200,120,0.5)"; ctx.lineWidth=2; roundRect(b.x,b.y,b.w,b.h,16); ctx.stroke();

}
function drawObstacles(){
  for(const o of OBSTACLES){

      ctx.strokeStyle="#bfeaff"; ctx.lineWidth=3; roundRect(o.x,o.y,o.w,o.h,10); ctx.stroke();

      ctx.strokeStyle="#ffe680"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(o.x+6,o.y+6); ctx.lineTo(o.x+o.w-6,o.y+o.h-6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(o.x+o.w-6,o.y+6); ctx.lineTo(o.x+6,o.y+o.h-6); ctx.stroke();
    } else {

function drawFighter(f){
  if(f.dead) return;
  let alpha=1;
  if(inBush(f)){
    if(f.team==="enemy"){ const dd=dist(f.x,f.y,player.x,player.y); if(dd>240){ drawBushRustle(f.x,f.y); return; } alpha=0.55; }
    else { alpha=f.isPlayer?0.6:0.55; }
  }
  if(f.invincibleTimer>0 && Math.floor(f.invincibleTimer*12)%2===0) alpha*=0.35;
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(f.x,f.y);
  // 학생 캐릭터(아군/플레이어)는 이미지 우선, 실패 시 도형. 적(크롬)은 항상 도형.
  let drew=false;
  if(f.team==="player" && f.characterId){
    drew=drawCharacterSprite(f.characterId, f.r, f.facing,
      { moving:spriteMoving("L"+f.id,f.x,f.y), hit:f.hitFlash>0, weaponId:f.isPlayer?selectedWeaponId:null });
  }
  if(!drew){ if(f.team==="player") drawPlayerCharacter(f); else drawChrome(f); }
  ctx.restore();
  if(f.hitFlash>0){ ctx.save(); ctx.globalAlpha=0.5*(f.hitFlash/0.15)*alpha; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(f.x,f.y,f.r+2,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  drawFighterInfo(f, alpha);
}
function drawPlayerCharacter(f){
  const r=f.r;
  const glow=ctx.createRadialGradient(0,0,4,0,0,r+12);
  glow.addColorStop(0,hexA(f.color,0.55)); glow.addColorStop(1,hexA(f.color,0));
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#ffffff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  drawStar(0,0,5,r*0.62,r*0.28,f.subColor);
  ctx.save(); ctx.rotate(f.facing); ctx.fillStyle=f.subColor; roundRect(r-4,-6,16,12,4); ctx.fill(); ctx.restore();
}
function drawChrome(f){
  const r=f.r;
  const glow=ctx.createRadialGradient(0,0,4,0,0,r+14);
  glow.addColorStop(0,hexA(f.subColor,0.5)); glow.addColorStop(1,hexA(f.subColor,0));
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath();
  for(let i=0;i<6;i++){ const a=Math.PI/6+i*Math.PI/3; const px=Math.cos(a)*r,py=Math.sin(a)*r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=f.subColor; ctx.lineWidth=3; ctx.stroke();
  ctx.save(); ctx.rotate(f.facing);
  ctx.fillStyle=f.isBoss?"#ffd400":"#ff4d6d"; roundRect(2,-7,r-4,14,4); ctx.fill();
  ctx.fillStyle="#6a2aa0"; roundRect(r-6,-6,14,12,3); ctx.fill();
  ctx.restore();
  if(f.isBoss){
    ctx.fillStyle="#ffd400";
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r); ctx.lineTo(-r*0.2,-r-12); ctx.lineTo(-r*0.05,-r); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*0.5,-r); ctx.lineTo(r*0.2,-r-12); ctx.lineTo(r*0.05,-r); ctx.closePath(); ctx.fill();
  }
}
function drawBushRustle(x,y){
  ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(uiTime*8); ctx.fillStyle="rgba(120,220,150,0.6)";
  ctx.beginPath(); ctx.arc(x-6,y,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+7,y-4,3,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawFighterInfo(f, alpha){
  const w=f.isBoss?80:54, h=f.isBoss?10:8;
  const bx=f.x-w/2, by=f.y-f.r-24;
  ctx.save(); ctx.globalAlpha=Math.max(0.5,alpha); ctx.textAlign="center";
  ctx.textBaseline="bottom";
  ctx.fillStyle=f.team==="player"?"#dff1ff":(f.isBoss?"#ffd0d8":"#e6c0ff");
  ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText(f.name,f.x,by-2);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,4); ctx.fill();
  const dispR=clamp(f.displayHp/f.maxHp,0,1);
  ctx.fillStyle="rgba(255,255,255,0.45)"; roundRect(bx,by,w*dispR,h,4); ctx.fill();
  const ratio=clamp(f.hp/f.maxHp,0,1);
  ctx.fillStyle=f.isBoss?"#ff5a5a":(ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"));
  roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.fillStyle="#ffffff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textBaseline="alphabetic";
  ctx.fillText(Math.ceil(f.hp),f.x,by+h+12);
  if(f.invincibleTimer>0){ ctx.fillStyle="#9fe8ff"; ctx.font="bold 10px 'Malgun Gothic',sans-serif"; ctx.fillText("무적",f.x,by-15); }
  ctx.restore();
}
function drawBullets(){
  for(const b of bullets){
    // 도구 발사체 이미지가 있으면 사용, 없으면 기존 원형 탄환.
    if(b.team==="player" && drawProjectileSprite(selectedWeaponId, b.x, b.y, b.r, Math.atan2(b.vy||0,b.vx||0))) continue;
    ctx.save();
    const color=b.color||"#ffe066";
    const glow=ctx.createRadialGradient(b.x,b.y,1,b.x,b.y,b.r*2.2);
    glow.addColorStop(0,color); glow.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*2.2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}
function drawEffects(){
  for(const e of effects){
    const k=e.t/e.life; ctx.save();
    if(e.kind==="muzzle"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x+e.dx*8,e.y+e.dy*8,10*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="hit"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,6+18*k,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="spark"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,3*(1-k)+1,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="dashTrail"){ ctx.globalAlpha=(1-k)*0.6; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,12*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="death"){ ctx.globalAlpha=(1-k)*0.8; const r=(e.big?20:12)+(e.big?100:60)*k; const g=ctx.createRadialGradient(e.x,e.y,2,e.x,e.y,r); g.addColorStop(0,e.color); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="respawn"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(e.x,e.y,50*(1-k)+6,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superwave"){ ctx.globalAlpha=(1-k)*0.85; const r=e.radius*k; ctx.strokeStyle="#ffe066"; ctx.lineWidth=8*(1-k)+2; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke(); ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,r*0.7,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superfail"){ ctx.globalAlpha=1-k; ctx.fillStyle="#ffffff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("게이지 부족!",e.x,e.y-50-20*k); }
    else if(e.kind==="bossArrival"){ ctx.globalAlpha=Math.sin(Math.min(1,k*2)*Math.PI)*0.9; ctx.fillStyle="#ff4d6d"; ctx.font="bold 70px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.shadowColor="rgba(255,80,110,0.9)"; ctx.shadowBlur=30; ctx.fillText("보스 등장!",e.x,e.y); ctx.shadowBlur=0; }
    ctx.restore();
  }
}
function drawDamageNumbers(){
  for(const n of damageNumbers){
    const k=n.t/n.life; ctx.save(); ctx.globalAlpha=1-k;
    ctx.fillStyle=n.color; ctx.font="bold 18px 'Malgun Gothic',sans-serif"; ctx.textAlign="center";
    ctx.strokeStyle="rgba(0,0,0,0.6)"; ctx.lineWidth=3;
    ctx.strokeText("-"+n.value,n.x,n.y); ctx.fillText("-"+n.value,n.x,n.y); ctx.restore();
  }
}

/* ---- HUD ---- */
function drawHUD(){
  const mode=MATCH.mode;
  ctx.save();
  ctx.fillStyle="rgba(10,12,32,0.72)"; ctx.fillRect(0,0,LOGW,64);
  ctx.textBaseline="middle";
  ctx.textAlign="left";
  ctx.fillStyle="#7fd6ff"; ctx.font="bold 22px 'Malgun Gothic',sans-serif"; ctx.fillText(profile.nickname+" 팀",24,22);
  ctx.fillStyle="#ffffff"; ctx.font="bold 32px 'Malgun Gothic',sans-serif"; ctx.fillText(String(playerTeamScore),24,48);
  ctx.textAlign="right";
  ctx.fillStyle="#c98bff"; ctx.font="bold 22px 'Malgun Gothic',sans-serif"; ctx.fillText("적 팀",LOGW-24,22);
  ctx.fillStyle="#ffffff"; ctx.font="bold 32px 'Malgun Gothic',sans-serif"; ctx.fillText(String(enemyTeamScore),LOGW-24,48);
  const remain=Math.max(0,Math.ceil(GAME_CONFIG.gameTime-matchElapsed));
  ctx.textAlign="center";
  ctx.fillStyle=remain<=10?"#ff7a7a":"#ffffff"; ctx.font="bold 38px 'Malgun Gothic',sans-serif"; ctx.fillText(String(remain),LOGW/2,26);
  ctx.fillStyle="#aab4e0"; ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  ctx.fillText(mode.name+" · "+MATCH.map.name+" · "+getDifficulty(selectedDifficultyId).name+" · "+getCharacter(selectedCharacterId).name+" · "+getWeapon(selectedWeaponId).name, LOGW/2,52);
  ctx.restore();

  if(bossActive && enemy && !enemy.dead){
    const bw=420,bh=18,bx=LOGW/2-bw/2,by=72;
    ctx.save();
    ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,bw,bh,8); ctx.fill();
    const ratio=clamp(enemy.displayHp/enemy.maxHp,0,1); // displayHp로 부드럽게 줄어듦
    ctx.fillStyle="#ff4d6d"; roundRect(bx,by,bw*ratio,bh,8); ctx.fill();
    ctx.strokeStyle="#ffd400"; ctx.lineWidth=2; roundRect(bx,by,bw,bh,8); ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("보스 "+Math.ceil(enemy.hp)+" / "+Math.round(enemy.maxHp),LOGW/2,by+bh/2);
    ctx.restore();
  }

  for(const f of allFighters()) drawRespawnCountdown(f);

  ctx.save();
  ctx.fillStyle="rgba(10,12,32,0.72)"; ctx.fillRect(0,656,LOGW,64);
  const barX=24,barY=676,barW=320,barH=22, ready=superGauge>=GAME_CONFIG.superCharge;
  ctx.fillStyle="#cfd6f0"; ctx.font="bold 14px 'Malgun Gothic',sans-serif"; ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillText("궁극기("+player.char.superName+")",barX,666);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(barX,barY,barW,barH,8); ctx.fill();
  const ratio=clamp(superGauge/GAME_CONFIG.superCharge,0,1);
  if(ready){ const p=0.5+0.5*Math.sin(uiTime*8); ctx.fillStyle="rgba(255,225,80,"+(0.7+p*0.3)+")"; } else ctx.fillStyle="#5fa0ff";
  roundRect(barX,barY,barW*ratio,barH,8); ctx.fill();
  ctx.strokeStyle=ready?"#fff3b0":"#7088c0"; ctx.lineWidth=ready?3:2; roundRect(barX,barY,barW,barH,8); ctx.stroke();
  ctx.fillStyle="#ffffff"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.textAlign="left"; ctx.fillText(Math.floor(superGauge)+"%",barX+barW+10,barY+barH/2);
  ctx.fillStyle=ready?"#ffe066":"#8893bb"; ctx.fillText(ready?"사용 가능! (X)":"충전 중",barX+barW+60,barY+barH/2);
  ctx.textAlign="right"; ctx.fillStyle="#aab4e0"; ctx.font="bold 14px 'Malgun Gothic',sans-serif";
  ctx.fillText("방향키 이동 · Z 공격 · X 궁극기 · P 일시정지",LOGW-24,barY+barH/2);
  ctx.restore();
}
function drawRespawnCountdown(f){
  if(!f.dead) return;
  if(!isFinite(f.respawnTimer)) return; // 영원히 부활하지 않는 보스는 카운트다운을 표시하지 않음
  const secs=Math.ceil(f.respawnTimer);
  const base=f.team==="player"?MATCH.map.playerSpawn:MATCH.map.enemySpawn;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="rgba(0,0,0,0.45)"; ctx.beginPath(); ctx.arc(base.x,base.y,28,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.team==="player"?"#7fd6ff":"#c98bff"; ctx.font="bold 26px 'Malgun Gothic',sans-serif"; ctx.fillText(String(secs),base.x,base.y+1);
  ctx.fillStyle="#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText(f.name,base.x,base.y+38);
  ctx.restore();
}

/* ---- 온라인 화면 ---- */
/* =======================================================================
   온라인 1대1 (베타) — 로컬 게임과 분리된 전용 로직
   host가 권한(authoritative)을 갖고 게임을 계산해 state를 쓰고,
   guest는 자기 입력만 쓰고 host가 보낸 state를 그린다.
   ======================================================================= */
const ONLINE_MAP_ID = "training";   // 베타는 훈련장 맵만 사용
const ONLINE_STATE_FPS = 30;        // 입력/상태 동기화 빈도(초당 횟수). 높일수록 부드럽고 Firebase 사용량 증가

let onlineFighters = { host:null, guest:null };
let onlineBullets = [];
let onlineTimeLeft = GAME_CONFIG.gameTime;
let onlineWinner = null;
let onlineWriteAcc = 0, onlineInputAcc = 0, onlineLastInputStr = "";
let onlineMenuIndex = 0;
let onlineLobbyMsg = "";
// 참가자(guest) 화면을 부드럽게: 받은 위치 사이를 보간(interpolation)/외삽(extrapolation)
let onlineRender = { host:null, guest:null };
let onlineBulletsView = [];
let onlineLastStateRef = null;
let onlinePredict = null;   // 참가자 본인 캐릭터의 로컬 예측 위치(즉시 반응)
let onlinePredictBullets = []; // 참가자 본인 총알의 로컬 예측(즉시 표시, 시각용)
let onlinePredictCd = 0;
function lerpAngle(a,b,t){ let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return a+d*t; }

function openOnlineMenu(){
  onlineMenuIndex=0;
  OBSTACLES=getMap(ONLINE_MAP_ID).obstacles; BUSHES=getMap(ONLINE_MAP_ID).bushes;
  gameState=STATE.ONLINE_MENU;
}

/* ---- 입력 처리 ---- */
function onlineMenuOptions(){
  const opts=[];
  for(const m of ONLINE_MODES){ if(m.ready) opts.push({ kind:"create", modeId:m.id, label:m.name+" 만들기" }); }
  opts.push({ kind:"join", label:"방 코드로 입장" });
  opts.push({ kind:"back", label:"뒤로가기" });
  return opts;
}
function handleOnlineMenuKey(code){
  if(code==="Escape"){ goToStartScreen(); return; }
  if(!OnlineManager.available) return; // 설정 없으면 안내만(동작 없음)
  const opts=onlineMenuOptions(), n=opts.length;
  if(onlineMenuIndex>=n) onlineMenuIndex=0;
  if(code==="ArrowUp"){ onlineMenuIndex=(onlineMenuIndex+n-1)%n; return; }
  if(code==="ArrowDown"){ onlineMenuIndex=(onlineMenuIndex+1)%n; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    const o=opts[onlineMenuIndex];
    if(o.kind==="create"){ if(o.modeId==="online1v1") doCreateRoom(); else doCreateTeamRoom(o.modeId); }
    else if(o.kind==="join") doJoinAny();
    else goToStartScreen();
  }
}
function doCreateTeamRoom(modeId){
  onlineLobbyMsg="방 만드는 중…";
  OnlineManager.createTeamRoom(modeId, function(ok,info){
    if(ok){ onlineLobbyMsg=""; gameState=STATE.ONLINE_LOBBY; } else { onlineLobbyMsg=""; showToast(info||"방 생성 실패"); }
  });
}
function doJoinAny(){
  let code=null; try{ code=window.prompt("방 코드를 입력하세요 (4글자)"); }catch(e){ code=null; }
  if(!code) return; onlineLobbyMsg="입장 중…";
  OnlineManager.joinRoomAny(code, function(ok,info){
    if(ok){ onlineLobbyMsg=""; gameState=STATE.ONLINE_LOBBY; } else { onlineLobbyMsg=""; showToast(info||"입장 실패"); }
  });
}
function handleOnlineLobbyKey(code){
  if(code==="Escape"){ confirmLeave=true; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    if(isTeamOnline()){ if(OnlineManager.role==="host") tStartMatch(); return; }
    if(OnlineManager.role==="host" && OnlineManager.players && OnlineManager.players.guest) hostStartOnlineMatch();
    else if(OnlineManager.role==="host") showToast("상대가 아직 없어요");
  }
}
function handleOnlinePlayKey(code){
  if(code==="Escape"){ confirmLeave=true; return; }
  if(code==="KeyR"){ reloadWeaponManual(); return; }   // 온라인에서도 R 수동 장전
  // 궁극기(X)는 온라인에서도 활성(아래 super 입력 경로로 처리). 여기선 토스트 제거.
}

// 나가기 확정 시 실제 퇴장 처리(온라인이면 방 정리 후 시작화면)
function doLeaveToStart(){
  if(isOnlineState()){ try{ OnlineManager.leaveRoom(); }catch(e){} }
  goToStartScreen();
}
// 장전(수동) — 실제 구현은 아래 전투 섹션. 여기 선언이 없으면 R 키에서 참조 오류가 나므로 안전 래퍼.
function reloadWeaponManual(){ if(typeof doReloadManual==="function") doReloadManual(); }

function doCreateRoom(){
  onlineLobbyMsg="방 만드는 중…";
  OnlineManager.createRoom(function(ok,info){
    if(ok){ onlineLobbyMsg=""; gameState=STATE.ONLINE_LOBBY; }
    else { onlineLobbyMsg=""; showToast(info||"방 생성 실패"); }
  });
}
function doJoinRoom(){
  let code=null;
  try{ code=window.prompt("방 코드를 입력하세요 (4글자)"); }catch(e){ code=null; }
  if(!code) return;
  onlineLobbyMsg="입장 중…";
  OnlineManager.joinRoom(code, function(ok,info){
    if(ok){ onlineLobbyMsg=""; gameState=STATE.ONLINE_LOBBY; }

  });

function hostStartOnlineMatch(){
  if(OnlineManager.role!=="host") return;
  resetOnlineMatchFromRoom();
  OnlineManager.writeMetaStatus("playing");
  hostWriteOnlineState();
  gameState=STATE.ONLINE_PLAYING;
}

// 같은 방에서 다시 시작(방장 전용). 방 코드/참가자/리스너 유지, 상태만 초기화 후 status=playing.
function onlineRematch(){
  if(OnlineManager.role!=="host") return;
  if(isTeamOnline()) tStartMatch();          // 팀(3v3/PVE): 전체 리셋 + status=playing
  else hostStartOnlineMatch();               // 1v1: 동일
  showToast("다시 시작!");
}

// 방 상태가 바뀔 때(주로 guest 쪽에서 호출됨)
function onRoomMetaChanged(){
  const meta=OnlineManager.meta;
  if(!meta){
    // 방이 종료/삭제됨 → 소프트락 방지: 안내 후 시작 화면으로.
    // 방은 이미 서버에서 사라졌으므로 DB에 다시 쓰지 않는다(localOnly=true → 유령 방 재생성 방지).
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_PLAYING){ showToast("방이 종료되었습니다"); OnlineManager.leaveRoom(true); goToStartScreen(); }
    return;
  }
  if(meta.status==="playing"){
    // 로비에서 시작하거나, 결과화면(ONLINE_OVER)에서 방장이 같은 방 재시작한 경우 모두 처리
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_OVER){
      if(isTeamOnline()) resetTeamMatchFromRoom(); else resetOnlineMatchFromRoom();
      confirmLeave=false;
      gameState=STATE.ONLINE_PLAYING;
    }
  } else if(meta.status==="ended"){
    if(gameState===STATE.ONLINE_PLAYING || gameState===STATE.ONLINE_LOBBY){
      if(isTeamOnline()) tWinner = meta.winner || tWinner; else onlineWinner = meta.winner || onlineWinner;
      gameState=STATE.ONLINE_OVER;
    }
  }
}

/* ---- 매치 준비 ---- */
function resetOnlineMatchFromRoom(){
  const meta=OnlineManager.meta||{};
  OBSTACLES=getMap(ONLINE_MAP_ID).obstacles; BUSHES=getMap(ONLINE_MAP_ID).bushes;
  const map=getMap(ONLINE_MAP_ID);
  onlineFighters.host  = makeOnlineFighter("host",  { x:map.playerSpawn.x, y:map.playerSpawn.y, facing:0,
                          characterId:meta.characterHost||"lumi", weaponId:meta.weaponHost||"star_blaster" });
  onlineFighters.guest = makeOnlineFighter("guest", { x:map.enemySpawn.x, y:map.enemySpawn.y, facing:Math.PI,
                          characterId:meta.characterGuest||"lumi", weaponId:meta.weaponGuest||"star_blaster" });
  onlineBullets=[]; onlineTimeLeft=GAME_CONFIG.gameTime; onlineWinner=null;
  onlineWriteAcc=0; onlineInputAcc=0; onlineLastInputStr="";
  onlineRender={ host:null, guest:null }; onlineBulletsView=[]; onlineLastStateRef=null; onlinePredict=null;
  onlinePredictBullets=[]; onlinePredictCd=0;
}
function makeOnlineFighter(slot, d){
  const ch=getCharacter(d.characterId);
  const maxHp=GAME_CONFIG.playerMaxHp*ch.hpMul;
  return { slot:slot, x:d.x, y:d.y, r:22, facing:d.facing||0,
    char:ch, weaponId:d.weaponId, color:ch.color, subColor:ch.subColor, name:ch.name,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul,
    cooldown:0, score:0, dead:false, respawnTimer:0, invincibleTimer:0, hitFlash:0,
    spawnX:d.x, spawnY:d.y };
}

/* ---- 입력 송신(throttle + 변화 시 즉시) ---- */
function readLocalInput(){
  if(confirmLeave) return emptyInput();   // 나가기 확인 중에는 이동/공격/궁극기 입력 무시
  return { up:keysDown.has("ArrowUp"), down:keysDown.has("ArrowDown"),
           left:keysDown.has("ArrowLeft"), right:keysDown.has("ArrowRight"),
           attack:keysDown.has("KeyZ"), super:keysDown.has("KeyX")||keysDown.has("Space") };
}
function sendMyInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  onlineInputAcc+=dt;
  if(str!==onlineLastInputStr || onlineInputAcc>=1/ONLINE_STATE_FPS){
    onlineLastInputStr=str; onlineInputAcc=0;
    OnlineManager.writeInput(inp);
  }
}

/* ---- 업데이트 ---- */
function updateOnline(dt){
  if(isTeamOnline()){ tUpdate(dt); return; }
  // host는 자기 입력을 로컬에서 바로 쓰므로 DB에 안 보냄(낭비 방지). guest만 입력을 전송.
  if(OnlineManager.role==="guest") sendMyInput(dt);
  if(OnlineManager.role==="host") updateOnlineHost(dt);
  else updateOnlineGuest(dt);
  updateEffects(dt);
}
function updateOnlineHost(dt){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.guest && OnlineManager.players.guest.connected);
  const hi=readLocalInput();
  // 상대가 끊겼으면 마지막 입력이 남아 유령처럼 계속 움직이지 않도록 입력을 비운다
  const gi = OnlineManager.opponentConnected ? (OnlineManager.onlineInput.guest || emptyInput()) : emptyInput();
  updateOnlineFighter(H, hi, dt);
  updateOnlineFighter(G, gi, dt);
  updateOnlineBullets(dt);
  onlineTimeLeft-=dt;
  H.displayHp=lerp(H.displayHp,H.hp,Math.min(1,dt*8)); G.displayHp=lerp(G.displayHp,G.hp,Math.min(1,dt*8));
  onlineWriteAcc+=dt;
  if(onlineWriteAcc>=1/ONLINE_STATE_FPS){ onlineWriteAcc=0; hostWriteOnlineState(); }
  if(onlineTimeLeft<=0){ onlineTimeLeft=0; hostEndOnlineMatch(); }
}
function updateOnlineGuest(dt){
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.host && OnlineManager.players.host.connected);
  const s=OnlineManager.onlineState;
  if(!s) return;
  // 새 스냅샷이 도착하면 탄환 뷰를 받은 값으로 갱신(권한값 기준 보정)
  if(s !== onlineLastStateRef){
    onlineLastStateRef=s;
    onlineBulletsView=(s.bullets||[]).map(b=>({ x:b.x, y:b.y, vx:b.vx||0, vy:b.vy||0, r:b.r, c:b.c, o:b.o }));
  }
  // 스냅샷 사이에는 탄환을 속도로 외삽해 부드럽게 진행
  for(const b of onlineBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const ownSlot = (OnlineManager.role==="host") ? "host" : "guest";
  const oppSlot = (ownSlot==="host") ? "guest" : "host";

  // 상대 캐릭터: 받은 위치 사이를 부드럽게 보간
  const op=s[oppSlot];
  if(op){
    const k=Math.min(1, dt*22);
    if(!onlineRender[oppSlot] || op.dead) onlineRender[oppSlot]={ x:op.x, y:op.y, facing:op.facing||0 };
    else {
      onlineRender[oppSlot].x += (op.x-onlineRender[oppSlot].x)*k;
      onlineRender[oppSlot].y += (op.y-onlineRender[oppSlot].y)*k;
      onlineRender[oppSlot].facing = lerpAngle(onlineRender[oppSlot].facing, op.facing||0, k);
    }
  }

  // 내 캐릭터: 로컬 입력으로 "정확한 속도"로 즉시 이동(예측). 평소엔 보정하지 않아 빨라지지 않음.
  // 차이가 크게 벌어질 때(넉백/리스폰/랙)에만 한 번 권한값으로 맞춘다.
  const mine=s[ownSlot];
  if(mine){
    if(!onlinePredict || mine.dead){
      const ch=getCharacter(mine.charId);
      onlinePredict={ x:mine.x, y:mine.y, facing:mine.facing||0, r:22, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul };
    } else {
      const inp=readLocalInput();
      let mx=0,my=0; if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1;
      const ml=Math.hypot(mx,my);
      if(ml>0){ mx/=ml; my/=ml; moveEntity(onlinePredict, mx*onlinePredict.moveSpeed*dt, my*onlinePredict.moveSpeed*dt); onlinePredict.facing=Math.atan2(my,mx); }
      if(Math.hypot(mine.x-onlinePredict.x, mine.y-onlinePredict.y) > 70){ onlinePredict.x=mine.x; onlinePredict.y=mine.y; } // 큰 차이만 스냅(연속 보정 X → 가속 없음)
    }
  }

  // 발사 예측: 내 총알을 로컬에서 즉시 보여준다(시각용; 실제 피해 판정은 호스트가 함)
  onlinePredictCd -= dt;
  if(onlinePredict && mine && !mine.dead && keysDown.has("KeyZ") && onlinePredictCd<=0){
    const w=getWeapon(selectedWeaponId), c=getCharacter(selectedCharacterId);
    const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
    const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
    const range=GAME_CONFIG.playerRange*w.rangeMul, radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
    for(let i=0;i<count;i++){
      let a=onlinePredict.facing; if(count>1) a=onlinePredict.facing-spread/2+spread*(i/(count-1));
      const mz=onlinePredict.r+6;
      onlinePredictBullets.push({ x:onlinePredict.x+Math.cos(a)*mz, y:onlinePredict.y+Math.sin(a)*mz,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, r:radius, c:w.color, traveled:0, maxRange:range, alive:true });
    }
    onlinePredictCd=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  }
  // 예측 총알 진행/소멸(벽·사거리·상대에 닿으면 시각적으로 사라짐)
  const oppPos=onlineRender[oppSlot];
  for(const b of onlinePredictBullets){
    if(!b.alive) continue;
    const sx=b.vx*dt, sy=b.vy*dt; b.x+=sx; b.y+=sy; b.traveled+=Math.hypot(sx,sy);
    if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; continue; }
    let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
    if(wall){ b.alive=false; continue; }
    if(oppPos && dist(b.x,b.y,oppPos.x,oppPos.y) < b.r+22){ b.alive=false; continue; }
    if(b.traveled>b.maxRange) b.alive=false;
  }
  onlinePredictBullets=onlinePredictBullets.filter(b=>b.alive);
}
function updateOnlineFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawnOnline(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  let mx=0,my=0;
  if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1;
  const ml=Math.hypot(mx,my);
  if(ml>0){ mx/=ml; my/=ml; moveEntity(f, mx*f.moveSpeed*dt, my*f.moveSpeed*dt); f.facing=Math.atan2(my,mx); }
  f.cooldown-=dt;
  if(input.attack && f.cooldown<=0){ fireOnlineWeapon(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*getWeapon(f.weaponId).cooldownMul; }
}
function fireOnlineWeapon(f){
  const w=getWeapon(f.weaponId), c=f.char;
  const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
  const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
  const dmg=GAME_CONFIG.playerDamage*c.damageMul*w.damageMul;
  const range=GAME_CONFIG.playerRange*w.rangeMul;
  const radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6, bx=f.x+Math.cos(a)*mz, by=f.y+Math.sin(a)*mz;
    onlineBullets.push({ x:bx,y:by,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,r:radius,damage:dmg,owner:f.slot,color:w.color,alive:true,traveled:0,maxRange:range });
  }
}
function updateOnlineBullets(dt){
  for(const b of onlineBullets){
    if(!b.alive) continue;
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; break; }
      let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
      if(wall){ b.alive=false; break; }
      const target = b.owner==="host" ? onlineFighters.guest : onlineFighters.host;
      if(target && !target.dead && target.invincibleTimer<=0 && dist(b.x,b.y,target.x,target.y)<b.r+target.r){
        applyOnlineDamage(target, b.damage, b.owner); b.alive=false; break;
      }
      if(b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  onlineBullets=onlineBullets.filter(b=>b.alive);
  if(onlineBullets.length>40) onlineBullets=onlineBullets.slice(onlineBullets.length-40); // DB payload 제한
}
function applyOnlineDamage(target, dmg, fromSlot){
  if(target.dead || target.invincibleTimer>0) return;
  target.hp-=dmg; target.hitFlash=0.15;
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    const killer = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
    if(killer) killer.score+=1;
  }
}
function respawnOnline(f){
  f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;
  const pos=findClearSpawn(f.spawnX,f.spawnY,f.r);
  f.x=pos.x; f.y=pos.y; f.invincibleTimer=GAME_CONFIG.invincibleTime;
}
function packFighter(f){
  return { x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp), maxHp:Math.round(f.maxHp),
    facing:Math.round(f.facing*100)/100, score:f.score, dead:!!f.dead, inv:f.invincibleTimer>0, charId:f.char.id };
}
function hostWriteOnlineState(){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  const bl=[];
  for(const b of onlineBullets) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), o:b.owner, c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy) });
  OnlineManager.writeHostState({ timeLeft:Math.max(0,Math.round(onlineTimeLeft)), host:packFighter(H), guest:packFighter(G), bullets:bl });
}

}
