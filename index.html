(function buildStudentMaps(){
  const CS=STUDENT_CELL, OX=24, OY=70;                       // ARENA(24,70,1232,576)мҷҖ лҸҷмқј мӣҗм җ
  for(const sm of STUDENT_MAPS){
    // мўҢмҡ° кұ°мҡё лҜёлҹ¬лЎң 22Г—10 м „мІҙ к·ёлҰ¬л“ң кө¬м„ұ
    const grid=[];
    for(let r=0;r<STUDENT_ROWS;r++){ const left=sm.cells[r]; let row="";
      for(let c=0;c<STUDENT_COLS;c++) row += (c<11 ? left[c] : left[21-c]);
      grid.push(row);
    }
    const obstacles=[], bushes=[], traps=[]; let spawn=null;
    for(let r=0;r<STUDENT_ROWS;r++){
      let c=0;
      while(c<STUDENT_COLS){
        const ch=grid[r][c];
        if(ch==="."||ch==="*"){ if(ch==="*"&&c<11) spawn={x:OX+c*CS+CS/2, y:OY+r*CS+CS/2}; c++; continue; }
        let c2=c; while(c2+1<STUDENT_COLS && grid[r][c2+1]===ch) c2++;   // к°ҖлЎң м—°мҶҚ лі‘н•©(м¶©лҸҢ/л ҢлҚ” rect м Ҳм•Ҫ)
        const rect={ x:OX+c*CS, y:OY+r*CS, w:(c2-c+1)*CS, h:CS };
        if(ch==="W") obstacles.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, kind:"rock" });
        else if(ch==="B") bushes.push(rect);
        else if(ch==="S") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"damage" });
        else if(ch==="L") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"slow" });
        c=c2+1;
      }
    }
    MAPS.push({ id:sm.id, name:sm.name, desc:sm.desc, floorColor:sm.floorColor, strokeColor:sm.strokeColor,
      playerSpawn:spawn, enemySpawn:{ x:OX+1232-(spawn.x-OX), y:spawn.y },   // л°ҳлҢҖ нҢҖ = мўҢмҡ° лҜёлҹ¬ м§Җм җ
      obstacles:obstacles, bushes:bushes, traps:traps });
  }
})();

// (мҪ”л“ңк°җмӮ¬) лҜёмӮ¬мҡ© л Ҳкұ°мӢң ASSET_MANIFEST мӮӯм ң вҖ” мӢӨм ң мӣ”л“ң м—җм…Ӣ л“ұлЎқ/лЎңл“ңлҠ” м•„лһҳ WORLD_ASSETSк°Җ лӢҙлӢ№(кІҪлЎң мӨ‘ліөмңјлЎң м–ҙкёӢлӮ  мң„н—ҳл§Ң мһҲм—ҲмқҢ).

// мқҙлҜём§Җ мәҗмӢң. мғҒнғң: undefined=лҜёмӢңлҸ„, Image(complete&&naturalWidth>0)=м„ұкіө, null=мӢӨнҢЁ(нҢҢмқј м—ҶмқҢ)
const _imageCache = {};
function _loadImage(path){
  if(path==null) return;
  if(path in _imageCache) return;
  // лёҢлқјмҡ°м Җк°Җ м•„лӢҲкұ°лӮҳ(н—Өл“ңлҰ¬мҠӨ н…ҢмҠӨнҠё) Imageк°Җ м—Ҷмңјл©ҙ мӢңлҸ„н•ҳм§Җ м•ҠмқҢ вҶ’ fallback
  if(typeof Image === "undefined"){ _imageCache[path]=null; return; }
  try{
    const img=new Image();
    img.onload=function(){ _imageCache[path]=(img.naturalWidth>0)?img:null; };
    img.onerror=function(){ _imageCache[path]=null; }; // нҢҢмқј м—ҶмқҢ вҶ’ мЎ°мҡ©нһҲ fallback
    img.src=path;
    _imageCache[path]=undefined; // лЎңл”© мӨ‘
  }catch(e){ _imageCache[path]=null; }
}
// мӮ¬мҡ© к°ҖлҠҘн•ң(лЎңл“ң м„ұкіө) мқҙлҜём§Җл©ҙ л°ҳнҷҳ, м•„лӢҲл©ҙ null(вҶ’ fallback лҸ„нҳ• мӮ¬мҡ©)
function _readyImage(path){
  if(!ASSETS_ENABLED || path==null) return null;
  const v=_imageCache[path];
  if(v===undefined){ return null; }     // м•„м§Ғ лЎңл”© мӨ‘ вҶ’ мқҙлІҲ н”„л Ҳмһ„мқҖ fallback
  return v || null;
}
function getCharImage(assetId, key){ return _readyImage(charAssetPath(assetId, key)); }
function getWeaponImage(assetId, key){ return _readyImage(weaponAssetPath(assetId, key)); }

// лӘЁл“  н•ҷмғқ м—җм…Ӣмқ„ лҜёлҰ¬ л¶Ҳлҹ¬мҳӨкё° мӢңлҸ„. ASSETS_ENABLED=false л©ҙ м•„л¬ҙкІғлҸ„ н•ҳм§Җ м•ҠмқҢ(мҳӨлҠҳ).

  for(const c of STUDENT_CHARACTERS){ if(!c.assetId) continue; for(const k of CHAR_ASSET_KEYS) _loadImage(charAssetPath(c.assetId,k)); }

  try{ for(const t in PVE_ENEMY_TYPES) _loadImage(ASSET_BASE+"monsters/"+t+".png"); }catch(e){}

  try{ for(const k in WORLD_ASSETS) _loadImage(ASSET_BASE+WORLD_ASSETS[k]+WORLD_ASSET_VER); }catch(e){}
}

function frameKeyFor(opts){
  if(opts.ko) return "return";
  if(opts.hit) return "hit";
  if(opts.attacking) return "attack";
  if(opts.moving) return "move";
  return "idle";
}

// ctxлҠ” мқҙлҜё translate(x,y) лҗң мғҒнғңлЎң нҳём¶ңн•ңлӢӨ(кё°мЎҙ fallbackкіј лҸҷмқј мўҢн‘ңкі„).
function drawCharacterSprite(charId, r, facing, opts){
  opts=opts||{};
  if(!ASSETS_ENABLED) return false;
  const ch=getCharacter(charId); if(!ch || !ch.assetId) return false;
  let img=getCharImage(ch.assetId, frameKeyFor(opts));
  if(!img) img=getCharImage(ch.assetId, "idle");   // мҡ”мІӯ н”„л Ҳмһ„ м—Ҷмңјл©ҙ idleлЎң
  if(!img) return false;
  // мҠ¬лқјмқҙм„ңк°Җ мәҗлҰӯн„°лі„ 5н”„л Ҳмһ„мқ„ к°ҷмқҖ мә”лІ„мҠӨВ·к°ҖлЎңмӨ‘м•ҷВ·л°ң(н•ҳлӢЁ) кё°мӨҖмңјлЎң м •л ¬н•ҙ м ҖмһҘн•ңлӢӨ.
  // к·ёлһҳм„ң лҶ’мқҙ кі м • + к°ҖлЎңмӨ‘м•ҷ + л°ң кё°мӨҖмңјлЎң к·ёлҰ¬л©ҙ н”„л Ҳмһ„мқҙ л°”лҖҢм–ҙлҸ„ нҒ¬кё°/мң„м№ҳк°Җ м•Ҳ нҠ„лӢӨ.
  const iw=img.naturalWidth||img.width||1, ih=img.naturalHeight||img.height||1;
  const dh=r*3.2, dw=dh*(iw/ih);   // лҶ’мқҙ кі м •, к°ҖлЎңлҠ” мӣҗліё л№„мңЁ(кіөкІ© нҡЁкіјлҠ” мўҢмҡ°лЎң л»—мқҢ, мә”лІ„мҠӨк°Җ лҢҖм№ӯмқҙлқј м•Ҳ мһҳлҰј)
  const footY=r*0.95;              // л°ңмқҙ лӢҝлҠ” кё°мӨҖм„ (м¶©лҸҢмӣҗ н•ҳлӢЁ л¶Җк·ј) вҶ’ лӘЁл“  н”„л Ҳмһ„ лҸҷмқј
  // мҷјмӘҪмқ„ л°”лқјліҙл©ҙ мўҢмҡ° л°ҳм „(кіөкІ© л°©н–Ҙмқҙ мһҗм—°мҠӨлҹҪкІҢ). мӣҗліё л””мһҗмқёмқҖ к·ёлҢҖлЎң.
  const flip = (facing!=null) && (Math.cos(facing) < 0);
  ctx.save(); if(flip) ctx.scale(-1,1); ctx.drawImage(img, -dw/2, footY-dh, dw, dh); ctx.restore();
  return true;
}
// л ҢлҚ” мң„м№ҳ ліҖнҷ”лЎң "мқҙлҸҷ мӨ‘" м¶”м •(walk/idle лӘЁм…ҳ м„ нғқмҡ©). ASSETS_ENABLED=false л©ҙ нҳём¶ңлҗҳм§Җ м•ҠмқҢ.
const _spriteLastPos={};
function spriteMoving(key,x,y){ const p=_spriteLastPos[key]; let moving=false; if(p){ const dx=x-p.x,dy=y-p.y; moving=(dx*dx+dy*dy)>0.25; } _spriteLastPos[key]={x:x,y:y}; return moving; }

// нғ„нҷҳ(л°ңмӮ¬мІҙ) мҠӨн”„лқјмқҙнҠё. м„ұкіө мӢң true.
function drawProjectileSprite(weaponId, x, y, r, facing){
  if(!ASSETS_ENABLED || !weaponId) return false;
  const w=getWeapon(weaponId); if(!w || !w.assetId) return false;
  const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
  const sz=r*3;
  ctx.save(); ctx.translate(x,y); if(facing!=null) ctx.rotate(facing); ctx.drawImage(img,-sz/2,-sz/2,sz,sz); ctx.restore();
  return true;
}

const LOGW = 1280, LOGH = 720;                 // кі м • л…јлҰ¬ мўҢн‘ң
const ARENA = { x:24, y:70, w:1232, h:576 };   // м „нҲ¬ мҳҒм—ӯ(мң„/м•„лһҳлҠ” м •ліҙмӨ„)
/* =======================================================================
   BIG-BATCH-2 P4 В· мӨҢм•„мӣғ м№ҙл©”лқј (C6/C7)
   - мӣ”л“ң мўҢн‘ң(кІҢмһ„ лЎңм§ҒВ·ARENA) вҶ” нҷ”л©ҙ мўҢн‘ң(HUDВ·л§Ҳмҡ°мҠӨ) л¶„лҰ¬.
   - кё°ліё 22Г—10 = CAM.on=false, scale 1 (кё°мЎҙкіј н”Ҫм…Җ лҸҷмқј вҖ” нҡҢк·Җ 0 мӣҗм№ҷ).
   - лҢҖнҳ• л§ө(36Г—16В·48Г—22) = ARENAлҘј мӣ”л“ң нҒ¬кё°лЎң нҷ•мһҘ + м „мІҙк°Җ нҷ”л©ҙм—җ л“Өм–ҙмҳӨлҠ”
     кі м • мӨҢм•„мӣғ(мҠӨнҒ¬лЎӨ м—ҶмқҢ вҖ” л©ҖлҜё нҡҢн”ј л°©м№Ё). м¶”м Ғ м№ҙл©”лқјлҠ” л°ұлЎңк·ё.
   ======================================================================= */
const ARENA_BASE = { x:24, y:70, w:1232, h:576 };
let CAM = { on:false, scale:1, ox:0, oy:0 };
function setCameraForMap(map){
  const c=(map && map.gridCols)||STUDENT_COLS, r=(map && map.gridRows)||STUDENT_ROWS;
  if(c<=STUDENT_COLS && r<=STUDENT_ROWS){
    ARENA.x=ARENA_BASE.x; ARENA.y=ARENA_BASE.y; ARENA.w=ARENA_BASE.w; ARENA.h=ARENA_BASE.h;
    CAM.on=false; CAM.scale=1; CAM.ox=0; CAM.oy=0;
    return;
  }
  ARENA.x=ARENA_BASE.x; ARENA.y=ARENA_BASE.y;
  ARENA.w=c*STUDENT_CELL; ARENA.h=r*STUDENT_CELL+16;   // кё°ліё л§өкіј лҸҷмқјн•ң н•ҳлӢЁ м—¬мң  16px мң м§Җ
  const s=Math.min(ARENA_BASE.w/ARENA.w, ARENA_BASE.h/ARENA.h);
  CAM.on=true; CAM.scale=s;
  CAM.ox=ARENA_BASE.x + (ARENA_BASE.w-ARENA.w*s)/2 - ARENA.x*s;   // мӣ”л“ң ARENAк°Җ кё°ліё нҷ”л©ҙ нӢҖ м•Ҳм—җ мӨ‘м•ҷ м •л ¬
  CAM.oy=ARENA_BASE.y + (ARENA_BASE.h-ARENA.h*s)/2 - ARENA.y*s;
}
let _camPushed=false;
function worldBegin(){ if(CAM.on && !_camPushed){ ctx.save(); ctx.translate(CAM.ox,CAM.oy); ctx.scale(CAM.scale,CAM.scale); _camPushed=true; } }
function worldEnd(){ if(_camPushed){ ctx.restore(); _camPushed=false; } }
function logicalToWorld(p){ if(!CAM.on||!p) return p; return { x:(p.x-CAM.ox)/CAM.scale, y:(p.y-CAM.oy)/CAM.scale }; }
const canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");   // м •м Ғ мӣ”л“ң л Ҳмқҙм–ҙ н”„лҰ¬л ҢлҚ” мӢң мһ к№җ мҳӨн”„мҠӨнҒ¬лҰ°мңјлЎң көҗмІҙ(v1.21 м„ұлҠҘ)

function resizeCanvas(){
  // v1.21 м„ұлҠҘ: кі DPI(нҒ¬лЎ¬л¶Ғ 2x)м—җм„ң н”Ҫм…Җ мҲҳк°Җ 4л°°к°Җ лҗҳм–ҙ л үмқҳ мЈјмӣҗмқё вҖ” 1.5лЎң мғҒн•ң
  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
  const ww = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(ww/LOGW, wh/LOGH);            // 16:9 мң м§Җн•ҳл©° мөңлҢҖ нҒ¬кё°
  const cssW = Math.max(1, Math.floor(LOGW*scale));
  const cssH = Math.max(1, Math.floor(LOGH*scale));
  canvas.style.width = cssW+"px";
  canvas.style.height = cssH+"px";
  canvas.width = Math.floor(cssW*dpr);                 // кі н•ҙмғҒлҸ„ лҢҖмқ‘
  canvas.height = Math.floor(cssH*dpr);
  try{ _canvasRect=null; }catch(e){}                   // PERF-2: мўҢн‘ң ліҖнҷҳ мәҗмӢң л¬ҙнҡЁнҷ”
}
window.addEventListener("resize", resizeCanvas);
window.addEventListener("scroll", function(){ try{ _canvasRect=null; }catch(e){} }, {passive:true});   // PERF-2
resizeCanvas();

/* м „мІҙнҷ”л©ҙ лІ„нҠј вҖ” м§„мһ… мӢң мә”лІ„мҠӨк°Җ л·°нҸ¬нҠём—җ л§һм¶° мһҗлҸҷ нҷ•лҢҖ(resize н•ёл“Өлҹ¬). Fullscreen API(нҒ¬лЎ¬л¶Ғ/нҒ¬лЎ¬ мҷ„м „м§Җмӣҗ, webkit нҸҙл°ұ). */
(function(){
  const btn=document.getElementById("fsBtn"), icoIn=document.getElementById("fsIcoIn"), icoOut=document.getElementById("fsIcoOut");
  if(!btn || typeof btn.addEventListener!=="function") return;   // н•ҳлӢҲмҠӨ(Node) л“ұ л№„лёҢлқјмҡ°м Җ нҷҳкІҪм—җм„ң м•Ҳм „ нғҲм¶ң
  function fsElement(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
  function toggleFs(){
    try{
      if(!fsElement()){ const el=document.documentElement; const req=el.requestFullscreen||el.webkitRequestFullscreen; if(req) req.call(el); }
      else { const exit=document.exitFullscreen||document.webkitExitFullscreen; if(exit) exit.call(document); }
    }catch(e){}
  }
  btn.addEventListener("click", toggleFs);
  function onFsChange(){ const fs=!!fsElement(); icoIn.style.display=fs?"none":"block"; icoOut.style.display=fs?"block":"none"; const lbl=document.getElementById("fsLabel"); if(lbl) lbl.textContent=fs?"мў…лЈҢ":"м „мІҙнҷ”л©ҙ"; btn.title=fs?"м „мІҙнҷ”л©ҙ мў…лЈҢ":"м „мІҙнҷ”л©ҙ"; btn.style.animation="none";
    // EscлҠ” кІҢмһ„м—җм„ң л’ӨлЎң/л©”лүҙлЎң м“°лҠ”лҚ° м „мІҙнҷ”л©ҙм—җм„  лёҢлқјмҡ°м Җк°Җ 'лӮҳк°Җкё°'лЎң к°ҖлЎңмұ” вҶ’ Keyboard LockмңјлЎң EscлҘј кІҢмһ„м—җ м „лӢ¬(нҒ¬лЎ¬/нҒ¬лЎ¬л¶Ғ м§Җмӣҗ). лӮҳк°Җл Өл©ҙ мў…лЈҢ лІ„нҠј лҳҗлҠ” Esc кёёкІҢ. лҜём§Җмӣҗ лёҢлқјмҡ°м ҖлҠ” мһҗлҸҷмңјлЎң кё°мЎҙ лҸҷмһ‘(Esc=лӮҳк°Җкё°).
    try{ if(fs){ if(navigator.keyboard && navigator.keyboard.lock) navigator.keyboard.lock(["Escape"]).catch(function(){}); } else { if(navigator.keyboard && navigator.keyboard.unlock) navigator.keyboard.unlock(); } }catch(e){}
    try{ resizeCanvas(); }catch(e){} }
  document.addEventListener("fullscreenchange", onFsChange);
  document.addEventListener("webkitfullscreenchange", onFsChange);
})();

function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a+(b-a)*t; }
function deg2rad(d){ return d*Math.PI/180; }

function circleRectOverlap(cx,cy,r,R){
  const nx = clamp(cx, R.x, R.x+R.w);
  const ny = clamp(cy, R.y, R.y+R.h);
  const dx = cx-nx, dy = cy-ny;
  return (dx*dx+dy*dy) < (r*r);
}

/* =======================================================================
   нҳ„мһ¬ л§ө лҚ°мқҙн„° (мӢңмһ‘ мӢң м„ нғқ л§өмңјлЎң мұ„мӣҢм§„лӢӨ)
   ======================================================================= */
let OBSTACLES = MAPS[0].obstacles;
let BUSHES = MAPS[0].bushes;

// мһҘм• л¬јкіј кІ№м№ҳм§Җ м•ҠлҠ” м•Ҳм „н•ң мң„м№ҳлҘј (x,y) к·јмІҳм—җм„ң м°ҫлҠ”лӢӨ.
function findClearSpawn(x, y, r){
  x = clamp(x, ARENA.x+r, ARENA.x+ARENA.w-r);
  y = clamp(y, ARENA.y+r, ARENA.y+ARENA.h-r);
  const isClear = (px,py)=>{
    for(const o of OBSTACLES){ if(circleRectOverlap(px,py,r,o)) return false; }
    return true;
  };
  if(isClear(x,y)) return { x, y };
  // м җм җ л„“мқҖ мӣҗмңјлЎң мЈјліҖмқ„ нғҗмғү
  for(let radius=24; radius<=280; radius+=22){
    for(let a=0; a<Math.PI*2; a+=Math.PI/8){
      const px = clamp(x+Math.cos(a)*radius, ARENA.x+r, ARENA.x+ARENA.w-r);
      const py = clamp(y+Math.sin(a)*radius, ARENA.y+r, ARENA.y+ARENA.h-r);
      if(isClear(px,py)) return { x:px, y:py };
    }
  }
  return { x, y }; // мөңнӣ„мқҳ мҲҳлӢЁ
}

/* =======================================================================
   н”„лЎңн•„ м ҖмһҘ (localStorage + м„ нғқм Ғ Firebase)
   ======================================================================= */
const PROFILE_KEY = "starArena.profile.v2";

const PLAYER_PROFILE_DEFAULT = {
  nickname: "н”Ңл Ҳмқҙм–ҙ",
  gold: 0,
  wins: 0, losses: 0, draws: 0,
  totalPlays: 0, totalKills: 0, bossKills: 0,
  selectedCharacterId: "student_01",
  selectedWeaponId: "tool_01",
  selectedDifficultyId: "normal",
  selectedMapId: "training",
  controlMode: "keyboard",     /* UPDATE-1 P3: мЎ°мһ‘ л°©мӢқ(keyboard/mouse/touch) */
  sfxVolume: 0.7,              /* BIG-BATCH-1 E14: нҡЁкіјмқҢ ліјлҘЁ(0~1) вҖ” м—җм…Ӣ мӨҖл№„ м „м—җлҸ„ м„Өм • м ҖмһҘ */
  selectedModeId: "solo",
  // кё°ліё н•ҙкёҲ = н•ҷмғқ 6мҠ¬лЎҜ(мәҗлҰӯн„°/лҸ„кө¬). ліҙмЎҙ мәҗлҰӯн„°В·л¬ҙкё°лҠ” мғҒм җм—җм„ң м¶”к°Җ н•ҙкёҲ к°ҖлҠҘ.
  unlockedCharacters: STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id),
  unlockedWeapons: STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id),
  rpg: null,      /* RPGлӘЁл“ң В§7.3 в‘ : лі„л№ӣ л§Ҳмқ„ м„ёмқҙлёҢ вҖ” DEFAULTм—җ мһҲм–ҙм•ј mergeProfile/лЎңк·ёмқё ліөмӣҗ кІҪлЎңк°Җ мң мӢӨ м—Ҷмқҙ нҶөкіј */
  lastUpdated: 0
};
const DEFAULT_UNLOCKED_CHARACTERS = STUDENT_CHARACTERS.filter(c=>c.unlockedByDefault).map(c=>c.id);
const DEFAULT_UNLOCKED_WEAPONS = STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id);

let profile = null;

// кё°ліёк°’кіј н•©міҗм„ң л№ м§„ н•ӯлӘ©мқҙ мһҲм–ҙлҸ„ м•Ҳм „н•ҳкІҢ л§Ңл“ лӢӨ.
function mergeProfile(saved){
  const p = {};
  for(const key in PLAYER_PROFILE_DEFAULT){ p[key] = PLAYER_PROFILE_DEFAULT[key]; }
  if(saved && typeof saved === "object"){
    for(const key in PLAYER_PROFILE_DEFAULT){
      if(saved[key] !== undefined && saved[key] !== null) p[key] = saved[key];
    }
  }
  // л°°м—ҙ/м„ нғқк°’ л¬ҙкІ°м„ұ ліҙм •
  if(["keyboard","mouse","touch"].indexOf(p.controlMode)<0) p.controlMode="keyboard";   // UPDATE-1 P3
  if(typeof p.sfxVolume!=="number" || !(p.sfxVolume>=0 && p.sfxVolume<=1)) p.sfxVolume=0.7;   // E14
  if(!Array.isArray(p.unlockedCharacters) || p.unlockedCharacters.length===0) p.unlockedCharacters = DEFAULT_UNLOCKED_CHARACTERS.slice();
  if(!Array.isArray(p.unlockedWeapons) || p.unlockedWeapons.length===0) p.unlockedWeapons = DEFAULT_UNLOCKED_WEAPONS.slice();
  // н•ҷмғқ 6мў… м „мҡ© л§Ҳмқҙк·ёл Ҳмқҙм…ҳ: л Ҳкұ°мӢң мәҗлҰӯн„°/л¬ҙкё°к°Җ м„ нғқВ·н•ҙкёҲлҸј мһҲмңјл©ҙ н•ҷмғқ м„ёнҠёлЎң көҗм •
  //  (кіЁл“ңВ·м „м ҒВ·л ҲлІЁ л“ұ м§„н–үлҸ„лҠ” кұҙл“ңлҰ¬м§Җ м•ҠмқҢ. л Ҳкұ°мӢң н•ҙкёҲ кё°лЎқмқҖ лӘ©лЎқм—җм„ң м ңмҷёл§Ң вҖ” нҢҢкҙҙм Ғ мӮӯм ң м•„лӢҳ)
  p.unlockedCharacters = p.unlockedCharacters.filter(isStudentCharacter);
  for(const id of DEFAULT_UNLOCKED_CHARACTERS) if(p.unlockedCharacters.indexOf(id)<0) p.unlockedCharacters.push(id);
  p.unlockedWeapons = p.unlockedWeapons.filter(id=>STUDENT_WEAPONS.some(w=>w.id===id));
  for(const id of DEFAULT_UNLOCKED_WEAPONS) if(p.unlockedWeapons.indexOf(id)<0) p.unlockedWeapons.push(id);
  p.selectedCharacterId = sanitizeCharacterId(p.selectedCharacterId);
  p.selectedWeaponId = getWeaponForCharacter(p.selectedCharacterId);   // л¬ҙкё°лҠ” н•ӯмғҒ мәҗлҰӯн„° кі м • л¬ҙкё°
  if(p.unlockedCharacters.indexOf(p.selectedCharacterId) < 0) p.selectedCharacterId = p.unlockedCharacters[0];
  if(getDifficulty(p.selectedDifficultyId).id !== p.selectedDifficultyId) p.selectedDifficultyId = "normal";
  if(getMap(p.selectedMapId).id !== p.selectedMapId) p.selectedMapId = "training";
  if(getMode(p.selectedModeId).id !== p.selectedModeId) p.selectedModeId = "solo";
  return p;
}

// кІҢмҠӨнҠё(лҜёлЎңк·ёмқё) мһ„мӢң н”„лЎңн•„ лЎңл“ң вҖ” нҷ”л©ҙмқҙ nullлЎң к№Ём§Җм§Җ м•ҠкІҢ н•ҳлҠ” кё°ліёк°’. мӢӨм ң н”Ңл ҲмқҙлҠ” лЎңк·ёмқё нӣ„.
function loadProfile(){
  let saved = null;
  try { const raw = window.localStorage.getItem(PROFILE_KEY); if(raw) saved = JSON.parse(raw); } catch(e){ saved = null; }

}
// м ҖмһҘ: лЎңк·ёмқён•ң н•ҷмғқмқҙл©ҙ к·ё кі„м •м—җ м ҖмһҘ, м•„лӢҲл©ҙ(кІҢмҠӨнҠё) кё°мЎҙ localStorage н”„лЎңн•„м—җ м ҖмһҘ
function saveProfile(){
  profile.lastUpdated = Date.now();
  if(currentStudentId && accounts && accounts.students && accounts.students[currentStudentId]){
    const a=accounts.students[currentStudentId];
    a.gold=profile.gold; a.wins=profile.wins; a.losses=profile.losses; a.draws=profile.draws;
    a.totalPlays=profile.totalPlays; a.totalKills=profile.totalKills; a.bossKills=profile.bossKills;
    a.selectedCharacterId=profile.selectedCharacterId; a.selectedWeaponId=profile.selectedWeaponId;
    a.selectedDifficultyId=profile.selectedDifficultyId; a.selectedMapId=profile.selectedMapId; a.selectedModeId=profile.selectedModeId;
    a.unlockedCharacters=profile.unlockedCharacters; a.unlockedWeapons=profile.unlockedWeapons;
    a.level=profile.level||a.level||1; a.exp=profile.exp||a.exp||0; a.lastUpdated=profile.lastUpdated;
    if(profile.nickname) a.name=profile.nickname;   // мң кё°м„ұ: лі„лӘ… ліҖкІҪмқҙ кі„м • nameм—җ лҸҷмҠ№(мһ¬лЎңк·ёмқё мӢң мӣҗліө л°©м§Җ)
    a.controlMode=profile.controlMode; a.sfxVolume=profile.sfxVolume;   // мң кё°м„ұ: мЎ°мһ‘ л°©мӢқВ·нҡЁкіјмқҢ ліјлҘЁлҸ„ кі„м • лҸҷмҠ№
    a.rpg=profile.rpg||null;   /* RPGлӘЁл“ң В§7.3 в‘Ў: кі„м • лҸҷмҠ№ м ҖмһҘ(нҒҙлқјмҡ°л“ң лҸҷкё° нҸ¬н•Ё) */
    saveAccounts();
    pushCloudOrPending(currentStudentId);   // м§„н–үлҸ„ нҒҙлқјмҡ°л“ң лҸҷкё°нҷ”(л¶Ҳк°Җн•ҳл©ҙ pending)
  } else {
    try { window.localStorage.setItem(PROFILE_KEY, JSON.stringify(profile)); } catch(e){}
  }
}

/* ============================================================
   мҲҳм—…мҡ© н•ҷмғқ кі„м • мӢңмҠӨн…ң (көҗмӮ¬к°Җ ID/PIN л°ңкёү)
   вҡ  м§„м§ң ліҙм•Ҳмқҙ м•„лӢҲлқј "мҲҳм—…мҡ© к°„мқҙ ліҙнҳё"мһ…лӢҲлӢӨ.
   - PINмқҖ мӣҗл¬ё лҢҖмӢ  к°„лӢЁ н•ҙмӢңлЎң м ҖмһҘн•ҳм§Җл§Ң, лӢЁмқј HTMLмқҙлқј мҪ”л“ң/м ҖмһҘмҶҢлҘј ліҙл©ҙ мҡ°нҡҢ к°ҖлҠҘ.
   - мӢӨм ң ліҙм•Ҳмқҙ н•„мҡ”н•ҳл©ҙ Firebase Auth + ліҙм•Ҳ к·ңм№ҷмқ„ мҚЁм•ј н•©лӢҲлӢӨ(README м°ёкі ).
   - Firebase м„Өм •мқҙ м—Ҷмңјл©ҙ к°ҷмқҖ кё°кё° localStorageм—җл§Ң м ҖмһҘлҗ©лӢҲлӢӨ.
   ============================================================ */
const ACCOUNTS_KEY = "starArena.accounts.v1";
const SESSION_KEY  = "starArena.session.v1";
// вҳ… STUDENT_EDIT(көҗмӮ¬): көҗмӮ¬мҡ© лЎңк·ёмқё PIN/н•ҷкёү мҪ”л“ң вҖ” мҲҳм—…мҡ© к°„мқҙк°’(ліҙм•Ҳ м•„лӢҳ)
const ADMIN_CONFIG = { adminPin:"1234", classCode:"star-class" };
const ADMIN_PIN = ADMIN_CONFIG.adminPin;  // н•ҳмң„нҳёнҷҳ

let accounts = null;          // { classCode, students:{ [id]: account } }
let currentStudentId = null;  // лЎңк·ёмқён•ң н•ҷмғқ id
let session = null;           // { role, studentId, name, loginAt }

// к°„мқҙ н•ҙмӢң(cyrb53лҘҳ) вҖ” лҸҷкё°/кІ°м •м Ғ. м•”нҳён•ҷм Ғ ліҙм•Ҳ м•„лӢҳ(мҲҳм—…мҡ©).
function hashPin(id, pin){
  const s = (id||"")+":"+(pin||"")+":"+ADMIN_CONFIG.classCode+":starArena";
  let h1=0xdeadbeef, h2=0x41c6ce57;
  for(let i=0;i<s.length;i++){ const c=s.charCodeAt(i); h1=Math.imul(h1^c,2654435761); h2=Math.imul(h2^c,1597334677); }
  h1=Math.imul(h1^(h1>>>16),2246822507); h1^=Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507); h2^=Math.imul(h1^(h1>>>13),3266489909);
  return (h2>>>0).toString(16).padStart(8,"0")+(h1>>>0).toString(16).padStart(8,"0");
}
function nowTs(){ return Date.now(); }
function loadAccounts(){
  let saved=null; try{ const raw=window.localStorage.getItem(ACCOUNTS_KEY); if(raw) saved=JSON.parse(raw); }catch(e){ saved=null; }
  if(saved && typeof saved==="object" && saved.students) accounts=saved;
  else accounts={ classCode:ADMIN_CONFIG.classCode, students:{} };
  if(!accounts.students) accounts.students={};
}
function saveAccounts(){ try{ window.localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts)); }catch(e){} }
function loadSession(){ try{ const raw=window.localStorage.getItem(SESSION_KEY); session=raw?JSON.parse(raw):null; }catch(e){ session=null; } }
function saveSession(){ try{ if(session) window.localStorage.setItem(SESSION_KEY, JSON.stringify(session)); else window.localStorage.removeItem(SESSION_KEY); }catch(e){} }
// мӢ к·ң н•ҷмғқ кі„м •(Lv.1, кіЁл“ң0, кІҢмһ„ кё°ліё н•ҙкёҲ лЎңмҠӨн„°)
function newAccount(id, name, pin){
  return { id:id, name:name, pinHash:hashPin(id,pin), level:1, exp:0, gold:0,
    wins:0, losses:0, draws:0, totalPlays:0, totalKills:0, bossKills:0,
    selectedCharacterId:DEFAULT_UNLOCKED_CHARACTERS[0]||"student_01", selectedWeaponId:DEFAULT_UNLOCKED_WEAPONS[0]||"tool_01",
    selectedDifficultyId:"normal", selectedMapId:"training", selectedModeId:"solo",
    unlockedCharacters:DEFAULT_UNLOCKED_CHARACTERS.slice(), unlockedWeapons:DEFAULT_UNLOCKED_WEAPONS.slice(),
    createdAt:nowTs(), lastLoginAt:0, isActive:true };
}
// кі„м • вҶ’ кІҢмһ„ н”„лЎңн•„(к°ҷмқҖ лӘЁм–‘ + н‘ңмӢң мқҙлҰ„/л ҲлІЁ)
function accountToProfile(a){
  const p=mergeProfile(a);   // gold/unlocked/selected л“ұ мұ„мӣҖ
  p.nickname=a.name; p.id=a.id; p.level=a.level||1; p.exp=a.exp||0;
  return p;
}
function bindStudent(id){
  const a=accounts.students[id]; if(!a) return false;
  currentStudentId=id; profile=accountToProfile(a);
  a.lastLoginAt=nowTs(); saveAccounts();
  applyProfileSelections();
  return true;
}
// в”Җв”Җ н•ҷмғқ/кҙҖлҰ¬мһҗ мқёмҰқ в”Җв”Җ
function studentLogin(id, pin){
  if(!accounts) loadAccounts();
  id=(""+id).trim(); const a=accounts.students[id];
  if(!a || a.isActive===false) return { ok:false, msg:"кі„м •мқҙ м—Ҷм–ҙмҡ”" };
  if(a.pinHash!==hashPin(id,pin)) return { ok:false, msg:"л№„л°ҖлІҲнҳё(PIN)к°Җ нӢҖл Өмҡ”" };
  bindStudent(id);
  session={ role:"student", studentId:id, name:a.name, loginAt:nowTs() }; saveSession();
  return { ok:true };
}
function adminLogin(pin){
  if((""+pin)===ADMIN_CONFIG.adminPin){ session={ role:"admin", loginAt:nowTs() }; saveSession(); return true; }
  return false;
}
function logout(){
  currentStudentId=null; session=null; saveSession();
  loadProfile();                    // кІҢмҠӨнҠё кё°ліёк°’(нҷ”л©ҙ м•Ҳ к№Ём§ҖкІҢ)
  applyProfileSelections();
}
// в”Җв”Җ кҙҖлҰ¬мһҗ: кі„м • мғқм„ұ/кҙҖлҰ¬ в”Җв”Җ
function createStudent(id, name, pin){
  if(!accounts) loadAccounts();
  id=(""+id).trim(); name=(""+name).trim(); pin=(""+pin).trim();
  if(id.length<2||id.length>12) return { ok:false, msg:"IDлҠ” 2~12мһҗ" };
  if(accounts.students[id]) return { ok:false, msg:"мқҙлҜё мһҲлҠ” ID" };
  if(name.length<2||name.length>10) return { ok:false, msg:"мқҙлҰ„мқҖ 2~10мһҗ" };
  if(pin.length<4||pin.length>8) return { ok:false, msg:"PINмқҖ 4~8мһҗлҰ¬" };
  accounts.students[id]=newAccount(id,name,pin); saveAccounts();
  return { ok:true };
}
function setStudentPin(id, pin){ const a=accounts.students[id]; if(!a) return false; a.pinHash=hashPin(id,pin); a.lastUpdated=nowTs(); saveAccounts(); return true; }
function resetStudent(id){ const a=accounts.students[id]; if(!a) return false;
  a.gold=0; a.wins=0; a.losses=0; a.draws=0; a.totalPlays=0; a.totalKills=0; a.bossKills=0;
  a.unlockedCharacters=DEFAULT_UNLOCKED_CHARACTERS.slice(); a.unlockedWeapons=DEFAULT_UNLOCKED_WEAPONS.slice();
  a.selectedCharacterId=DEFAULT_UNLOCKED_CHARACTERS[0]; a.selectedWeaponId=DEFAULT_UNLOCKED_WEAPONS[0]; a.level=1; a.exp=0;
  a.rpg=null;   /* RPGлӘЁл“ң В§7.3 в‘Ј: көҗмӮ¬ мҙҲкё°нҷ”м—җ RPG м„ёмқҙлёҢ нҸ¬н•Ё */
  a.lastUpdated=nowTs(); saveAccounts(); return true; }
function deleteStudent(id){ if(accounts.students[id]){ delete accounts.students[id]; saveAccounts(); return true; } return false; }
function studentList(){ return accounts&&accounts.students?Object.keys(accounts.students).map(k=>accounts.students[k]):[]; }

function addGold(amount){ profile.gold = Math.max(0, profile.gold + amount); }
function unlockCharacter(id){ if(profile.unlockedCharacters.indexOf(id) < 0) profile.unlockedCharacters.push(id); }
function unlockWeapon(id){ if(profile.unlockedWeapons.indexOf(id) < 0) profile.unlockedWeapons.push(id); }

/* ============================================================
   н•ҷмғқ кі„м • нҒҙлқјмҡ°л“ң лҸҷкё°нҷ” (Firebase Realtime Database)
   кІҪлЎң: classes/{classCode}/students/{studentId}
   - лЎңм»¬(localStorage)мқҖ мҳӨн”„лқјмқё мәҗмӢң. мҳЁлқјмқёмқҙл©ҙ нҒҙлқјмҡ°л“ңк°Җ кё°мӨҖ лҚ°мқҙн„°.
   - мӣҗл¬ё PINмқҖ м ҲлҢҖ м ҖмһҘн•ҳм§Җ м•ҠмқҢ(pinHashл§Ң). кё°мЎҙ hashPin нҳёнҷҳ.
   - вҡ  м •м Ғ нҺҳмқҙм§Җ + нҒҙлқјмқҙм–ёнҠё hashPinмқҖ "мҲҳм—…мҡ© к°„мқҙ ліҙнҳё"мқҙм§Җ м§„м§ң ліҙм•Ҳмқҙ м•„лӢҳ.
   ============================================================ */
const ACCOUNTS_BACKUP_KEY = "starArena.accounts.backup.v1";
let cloudAccountStatus = "лЎңм»¬ м „мҡ©";   // лЎңк·ёмқё/нҢЁл„җ н‘ңмӢңмҡ© мғҒнғң
const AccountStore = {
  cloudReady(){ return !!(OnlineManager && OnlineManager.available && OnlineManager.db); },

  // кі„м • вҶ’ нҒҙлқјмҡ°л“ң л ҲмҪ”л“ң(мҠӨнӮӨл§Ҳ н•„л“ңл§Ң, undefined м—ҶмқҢ)
  toRecord(a){

      id:a.id, name:a.name||"", pinHash:a.pinHash||"",

      controlMode:(["keyboard","mouse","touch"].indexOf(a.controlMode)>=0?a.controlMode:"keyboard"),   // мң кё°м„ұ: мЎ°мһ‘ л°©мӢқВ·ліјлҘЁ нҒҙлқјмҡ°л“ң нҷ”мқҙнҠёлҰ¬мҠӨнҠё
      sfxVolume:(typeof a.sfxVolume==="number"?a.sfxVolume:0.7),
      isActive:(a.isActive!==false)
    };
  },
  // в”Җв”Җ лЎңм»¬ мәҗмӢң кі„мёө в”Җв”Җ
  loadLocalAccounts(){ loadAccounts(); return accounts; },
  saveLocalAccounts(){ saveAccounts(); },
  cacheLocal(rec){ if(!accounts) loadAccounts(); const cur=accounts.students[rec.id]||{}; delete cur._pendingSync; accounts.students[rec.id]=Object.assign(cur, rec); saveAccounts(); },
  // в”Җв”Җ нҒҙлқјмҡ°л“ң CRUD (Promise) в”Җв”Җ  null=м—ҶмқҢ, undefined=мЎ°нҡҢмҳӨлҘҳ(л„ӨнҠёмӣҢнҒ¬)
  loadCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._ref(id).once("value").then(function(s){ res(s.val()||null); }).catch(function(){ res(undefined); });
  }); },
  loadCloudAccounts(){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._sref().once("value").then(function(s){ res(s.val()||{}); }).catch(function(){ res(undefined); });
  }); },
  // м ҖмһҘ: transactionмңјлЎң 'мҳӨлһҳлҗң лЎңм»¬мқҙ мөңмӢ  нҒҙлқјмҡ°л“ңлҘј лҚ®м–ҙм“°м§Җ м•ҠкІҢ'(мөңмӢ  lastUpdated мҡ°м„ )
  saveCloudStudent(a){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    const rec=self.toRecord(a);
    try{
      self._ref(a.id).transaction(function(cur){
        if(cur && typeof cur.lastUpdated==="number" && rec.lastUpdated < cur.lastUpdated) return;  // нҒҙлқјмҡ°л“ңк°Җ мөңмӢ  вҶ’ лҚ®м–ҙм“°м§Җ м•ҠмқҢ(abort)
        return rec;
      }, function(err){ res(!err); }, false);
    }catch(e){ res(false); }
  }); },
  deleteCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    self._ref(id).remove().then(function(){ res(true); }).catch(function(){ res(false); });
  }); },
  // нҒҙлқјмҡ°л“ң вҶ’ лЎңм»¬ лі‘н•©(нҒҙлқјмҡ°л“ңк°Җ мөңмӢ /лҲ„лқҪмқҙл©ҙ л°ҳмҳҒ). лЎңм»¬ м „мҡ© кі„м •мқҖ мң м§Җ.
  syncAccounts(){ const self=this; return new Promise(function(res){
    self.loadCloudAccounts().then(function(cloud){
      if(cloud===undefined||cloud===null){ res(false); return; }
      if(!accounts) loadAccounts();
      let n=0;
      for(const id in cloud){ const c=cloud[id], loc=accounts.students[id];
        if(!loc || (typeof c.lastUpdated==="number" && c.lastUpdated >= (loc.lastUpdated||0))){ accounts.students[id]=c; n++; } }
      saveAccounts(); cloudAccountStatus="н•ҷкёү кі„м • м—°кІ°лҗЁ"; res(n);
    });
  }); },
  // мҳӨн”„лқјмқё м ҖмһҘ вҶ’ pending. мһ¬м—°кІ° мӢң flush(мөңмӢ  мҡ°м„ ).
  markPending(id){ if(accounts&&accounts.students[id]){ accounts.students[id]._pendingSync=true; saveAccounts(); } },
  flushPending(){ const self=this; if(!self.cloudReady()||!accounts) return;
    Object.keys(accounts.students).forEach(function(id){ const a=accounts.students[id];
      if(a && a._pendingSync){ self.saveCloudStudent(a).then(function(ok){ if(ok){ delete a._pendingSync; saveAccounts(); } }); } });
  }
};
/* ============================================================
   BIG-BATCH-2 P3 В· л§өкіөл°© нҒҙлқјмҡ°л“ң мҠӨнҶ м–ҙ (D10)
   кІҪлЎң: starArenaOnline/editorMaps/{classCode}/{pending|approved}/{id}
   - н•ҷкёү м „мІҙ кіөмң : Aм»ҙн“Ён„° м ңм¶ң вҶ’ Bм»ҙн“Ён„° көҗмӮ¬ мҠ№мқё вҶ’ м „ нҒҙлқјмқҙм–ёнҠё л¶ҖнҢ… мӢң л°ҳмҳҒ
   - мҳӨн”„лқјмқё нҸҙл°ұ = кё°мЎҙ localStorage(editorMaps.v1). лі‘н•©мқҖ нҒҙлқјмҡ°л“ң мҡ°м„ :
     В· нҒҙлқјмҡ°л“ңм—җ мһҲлҠ” л ҲмҪ”л“ң = к·ёлҢҖлЎң мұ„нғқ(_synced н‘ңмӢң)
     В· лЎңм»¬м—җл§Ң мһҲкі  _synced м•„лӢҳ = мҳӨн”„лқјмқё мӢ к·ң вҶ’ м—…лЎңл“ң
     В· лЎңм»¬м—җ мһҲлҠ”лҚ° _syncedмқёлҚ° нҒҙлқјмҡ°л“ңм—җ м—ҶмқҢ = лӢӨлҘё кё°кё°м—җм„ң мӮӯм ңлҗЁ вҶ’ лІ„лҰј
   - к°ңмқём •ліҙ мөңмҶҢ: л§ө лҚ°мқҙн„° + мһ‘м„ұмһҗ лӢүл„Өмһ„ + н•ҷкёү мҪ”л“ңл§Ң.
   ============================================================ */
let cloudMapStatus="лЎңм»¬ м „мҡ©";
const MapStore = {
  cloudReady(){ return !!(OnlineManager && OnlineManager.available && OnlineManager.db); },
  _ref(){ return OnlineManager.db.ref("starArenaOnline/editorMaps/"+ADMIN_CONFIG.classCode); },
  toRecord(r){
    return { id:r.id, name:r.name||"", author:r.author||"", mode:r.mode||"tdm",
      size:(r.size||[22,10]).slice(), floor:r.floor||"basic",
      cellsLeft:(r.cellsLeft||[]).slice(), createdAt:r.createdAt||nowTs(),
      disabled:!!r.disabled, updatedAt:nowTs() };
  },
  pushRec(kind, rec, cb){
    if(!this.cloudReady()){ if(cb) cb(false); return; }
    try{ this._ref().child(kind+"/"+rec.id).set(this.toRecord(rec)).then(function(){ if(cb) cb(true); }).catch(function(){ if(cb) cb(false); }); }
    catch(e){ if(cb) cb(false); }
  },
  removeRec(kind, id, cb){
    if(!this.cloudReady()){ if(cb) cb(false); return; }
    try{ this._ref().child(kind+"/"+id).remove().then(function(){ if(cb) cb(true); }).catch(function(){ if(cb) cb(false); }); }
    catch(e){ if(cb) cb(false); }
  },
  // көҗмӮ¬ м•Ўм…ҳ лҜёлҹ¬: мҠ№мқё(pendingвҶ’approved) / кұ°м ҲВ·мӮӯм ң / л№„нҷңм„ұ нҶ кёҖ
  mirrorApprove(rec){ const self=this; this.removeRec("pending", rec.id, null); this.pushRec("approved", rec, null); },
  mirrorReject(id){ this.removeRec("pending", id, null); },
  mirrorDelete(id){ this.removeRec("approved", id, null); },
  mirrorDisable(rec){ this.pushRec("approved", rec, null); },
  loadCloud(cb){
    if(!this.cloudReady()){ cb(undefined); return; }
    try{ this._ref().once("value").then(function(s){ cb(s.val()||{pending:{},approved:{}}); }).catch(function(e){ cb(undefined, e&&e.code); }); }
    catch(e){ cb(undefined); }
  },
  sync(cb){
    const self=this;
    this.loadCloud(function(cloud, errCode){
      if(cloud===undefined){
        // PERF-2м—җм„ң л°ңкІ¬: лқјмқҙлёҢ DB к·ңм№ҷм—җ editorMaps кІҪлЎңк°Җ м—Ҷм–ҙ PERMISSION_DENIED вҖ” лӘ…нҷ•нһҲ м•ҲлӮҙ(database.rules.json м°ёмЎ°)
        cloudMapStatus=(errCode==="PERMISSION_DENIED")
          ? "вҡ  DB к·ңм№ҷм—җ editorMaps м¶”к°Җ н•„мҡ” вҖ” database.rules.jsonмқ„ Firebase мҪҳмҶ”м—җ кІҢмӢң"
          : "мҳӨн”„лқјмқё вҖ” мқҙ кё°кё° лӘ©лЎқ";
        if(cb) cb(false); return;
      }
      const st=loadEditorStore();
      const out={pending:[],approved:[]}, pushes=[];
      for(const kind of ["pending","approved"]){
        const cmap=cloud[kind]||{}, seen={};
        for(const id in cmap){
          const rec=cmap[id];
          if(!rec || !rec.cellsLeft) continue;
          rec._synced=true; out[kind].push(rec); seen[id]=true;
        }
        for(const rec of (st[kind]||[])){
          if(seen[rec.id]) continue;
          if(rec._synced) continue;                       // лӢӨлҘё кё°кё°м—җм„ң мӮӯм ңлҗЁ вҶ’ лІ„лҰј(нҒҙлқјмҡ°л“ң мҡ°м„ )
          out[kind].push(rec); pushes.push([kind, rec]);  // мҳӨн”„лқјмқё мӢ к·ң вҶ’ м—…лЎңл“ң
        }
      }
      saveEditorStore(out);
      _reviewSt=null; _adminPendingN=-1; _pfSel=null;   // PERF-2: нҷ”л©ҙ мәҗмӢң л¬ҙнҡЁнҷ”
      try{ applyApprovedMaps(); }catch(e){}
      for(const [kind, rec] of pushes){
        (function(k, r){ self.pushRec(k, r, function(ok){
          if(ok){ const cur=loadEditorStore(); const hit=(cur[k]||[]).find(x=>x.id===r.id); if(hit){ hit._synced=true; saveEditorStore(cur); } } }); })(kind, rec);
      }
      cloudMapStatus="н•ҷкёү л§өкіөл°© м—°кІ°лҗЁ (мҠ№мқё "+out.approved.length+" В· лҢҖкё° "+out.pending.length+")";
      if(cb) cb(true, out);
    });
  }
};
// м§„н–үлҸ„/кі„м • ліҖкІҪмқ„ нҒҙлқјмҡ°л“ңм—җ л°Җм–ҙл„Јкё°(л¶Ҳк°Җн•ҳл©ҙ pending)
function pushCloudOrPending(id){
  if(!accounts||!accounts.students[id]) return;
  if(AccountStore.cloudReady()){
    AccountStore.saveCloudStudent(accounts.students[id]).then(function(ok){ if(!ok) AccountStore.markPending(id); });
  } else { AccountStore.markPending(id); }
}

// нҒҙлқјмҡ°л“ң мҡ°м„  н•ҷмғқ лЎңк·ёмқё(л№„лҸҷкё°). мӢӨнҢЁ мң нҳ•лі„ л©”мӢңм§Җ л¶„лҰ¬.
function studentLoginCloud(id, pin, cb){
  id=(""+id).trim();
  const localTry=function(offline){ const r=studentLogin(id,pin); if(r.ok&&offline) r.offline=true; cb(r); };
  if(!AccountStore.cloudReady()){ localTry(true); return; }
  cloudAccountStatus="н•ҷкёү кі„м • нҷ•мқё мӨ‘вҖҰ";
  AccountStore.loadCloudStudent(id).then(function(rec){
    if(rec===undefined){ // мЎ°нҡҢ мҳӨлҘҳ(л„ӨнҠёмӣҢнҒ¬) вҶ’ лЎңм»¬ мәҗмӢңлЎң
      const r=studentLogin(id,pin);
      if(r.ok){ r.offline=true; cb(r); } else cb({ok:false,msg:"м—°кІ°мқҙ л¶Ҳм•Ҳм •н•ҙмҡ” вҖ” мқҙ кё°кё°м—җ м ҖмһҘлҗң кі„м •л§Ң лЎңк·ёмқё к°ҖлҠҘ"});
      return;
    }
    if(rec===null){ if(accounts&&accounts.students[id]){ localTry(false); return; } cb({ok:false,msg:"кі„м •мқҙ м—Ҷм–ҙмҡ”"}); return; }
    if(rec.isActive===false){ cb({ok:false,msg:"мӮ¬мҡ© мӨ‘м§Җлҗң кі„м •мқҙм—җмҡ”"}); return; }
    if(rec.pinHash!==hashPin(id,pin)){ cb({ok:false,msg:"л№„л°ҖлІҲнҳё(PIN)к°Җ нӢҖл Өмҡ”"}); return; }
    rec.lastLoginAt=nowTs(); AccountStore.cacheLocal(rec);
    bindStudent(id);
    session={ role:"student", studentId:id, name:rec.name, loginAt:nowTs() }; saveSession();
    pushCloudOrPending(id);          // lastLoginAt л°ҳмҳҒ
    cloudAccountStatus="н•ҷкёү кі„м • м—°кІ°лҗЁ";
    cb({ok:true});
  });
}
// көҗмӮ¬: лЎңм»¬ кі„м •мқ„ нҒҙлқјмҡ°л“ңлЎң мқҙм „(мҠӨмә”вҶ’нҷ•мқёвҶ’м—…лЎңл“ң, мӣҗліёмқҖ л°ұм—… ліҙкҙҖ)
function adminMigrateLocal(){
  if(!AccountStore.cloudReady()){ showToast("мҳЁлқјмқё м—°кІ° нӣ„ мқҙмҡ©н•ҳм„ёмҡ”"); return; }
  const list=studentList(); if(!list.length){ showToast("мқҙм „н•  лЎңм»¬ кі„м •мқҙ м—Ҷм–ҙмҡ”"); return; }
  AccountStore.loadCloudAccounts().then(function(cloud){
    if(cloud===undefined){ showToast("нҒҙлқјмҡ°л“ң мЎ°нҡҢ мӢӨнҢЁ вҖ” мһ мӢң нӣ„ лӢӨмӢң"); return; }
    cloud=cloud||{}; const toNew=[],toOver=[],toSkip=[];
    list.forEach(function(a){ const c=cloud[a.id];
      if(!c) toNew.push(a); else if((a.lastUpdated||0)>=(c.lastUpdated||0)) toOver.push(a); else toSkip.push(a); });
    const msg="нҒҙлқјмҡ°л“ңлЎң мқҙм „:\nВ· мӢ к·ң м—…лЎңл“ң "+toNew.length+"к°ң\nВ· лҚ®м–ҙм“°кё°(лЎңм»¬мқҙ мөңмӢ ) "+toOver.length+"к°ң"+(toOver.length?" ["+toOver.map(function(a){return a.id;}).join(", ")+"]":"")+"\nВ· кұҙл„ҲлңҖ(нҒҙлқјмҡ°л“ңк°Җ мөңмӢ ) "+toSkip.length+"к°ң\nм§„н–үн• к№Ңмҡ”?";
    let ok=false; try{ ok=window.confirm(msg); }catch(e){ ok=true; }
    if(!ok) return;
    try{ window.localStorage.setItem(ACCOUNTS_BACKUP_KEY, JSON.stringify(accounts)); }catch(e){}   // мӣҗліё л°ұм—…(мҰүмӢң мӮӯм ң м•Ҳ н•Ё)
    const targets=toNew.concat(toOver);
    if(!targets.length){ showToast("мқҙм „н•  н•ӯлӘ© м—ҶмқҢ(лӘЁл‘җ нҒҙлқјмҡ°л“ңк°Җ мөңмӢ )"); return; }
    let up=0,fail=0,done=0;
    targets.forEach(function(a){ AccountStore.saveCloudStudent(a).then(function(s){ if(s)up++; else fail++;
      if(++done===targets.length){ showToast("мқҙм „ мҷ„лЈҢ вҖ” м—…лЎңл“ң "+up+" В· кұҙл„ҲлңҖ "+toSkip.length+" В· мӢӨнҢЁ "+fail+" (мӣҗліё л°ұм—… ліҙкҙҖ)"); } }); });
  });
}

function loadScriptsSequential(urls, done){
  let i=0;
  function next(){
    if(i>=urls.length){ done(true); return; }
    try{
      const s=document.createElement("script");
      s.src=urls[i]; s.async=true;
      s.onload=function(){ i++; next(); };
      s.onerror=function(){ done(false); };
      (document.head||document.body).appendChild(s);
    }catch(e){ done(false); }
  }
  next();
}

  onlineState:null, onlineStateAt:0, meta:null, players:{ host:null, guest:null }, inputs:{}, onlineInput:{ host:null, guest:null },

  updateStatus:function(msg){ this.status=msg; },

  initFirebaseIfAvailable:function(){
    try{
      if(!FIREBASE_CONFIG){ this.available=false; this.status="Firebase м„Өм • м—ҶмқҢ (лЎңм»¬ м „мҡ©)"; return; }
      this.status="Firebase л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ";
      const self=this;
      loadScriptsSequential(FB_SDK_URLS, function(ok){
        if(!ok || typeof firebase==="undefined"){ self.available=false; self.status="Firebase лЎңл“ң мӢӨнҢЁ (лЎңм»¬ м „мҡ©)"; return; }
        try{
          self.app=firebase.initializeApp(FIREBASE_CONFIG);
          self.auth=firebase.auth();
          self.db=firebase.database();
          self.status="лЎңк·ёмқё мӨ‘вҖҰ";
          self.signInGuest();
        }catch(e){ self.available=false; self.status="Firebase мҙҲкё°нҷ” мӢӨнҢЁ (лЎңм»¬ м „мҡ©)"; }
      });
    }catch(e){ this.available=false; this.status="мҳЁлқјмқё мӮ¬мҡ© л¶Ҳк°Җ (лЎңм»¬ лӘЁл“ң)"; }
  },

  signInGuest:function(){
    const self=this;
    try{
      this.auth.signInAnonymously().then(function(cred){
        self.uid = (cred && cred.user) ? cred.user.uid : (self.auth.currentUser ? self.auth.currentUser.uid : null);
        self.available=true; self.status="мҳЁлқјмқё мӨҖл№„ мҷ„лЈҢ";
        self.watchConnection();
        try{ onCloudAccountsReady(); }catch(e){}   // н•ҷкёү кі„м • нҒҙлқјмҡ°л“ң лҸҷкё°нҷ” + pending flush
      }).catch(function(e){ self.available=false; self.status="лЎңк·ёмқё мӢӨнҢЁ (лЎңм»¬ лӘЁл“ң)"; });
    }catch(e){ this.available=false; this.status="лЎңк·ёмқё мӢӨнҢЁ (лЎңм»¬ лӘЁл“ң)"; }
  },

  watchConnection:function(){
    try{
      const self=this, cref=this.db.ref(".info/connected");
      const cb=function(snap){ const was=self.connected; self.connected = snap.val()===true;
        if(!was && self.connected){
          try{ AccountStore.flushPending(); }catch(e){}   // мһ¬м—°кІ° мӢң мҳӨн”„лқјмқё ліҖкІҪ лҸҷкё°нҷ”
          // мҳЁлқјмқёкёҙкёү P1b: мһ¬м—°кІ° мӢң presence мһ¬-set вҖ” onDisconnectк°Җ connected=falseлҘј мқҙлҜё мҗҲлӢӨл©ҙ
          // мқҙкұё лӢӨмӢң trueлЎң лҗҳлҸҢлҰ¬кі  onDisconnectлҸ„ мһ¬л¬ҙмһҘ(м—Ҷмңјл©ҙ ліөк·Җ л¶Ҳк°ҖВ·лҙҮ мғҒнғң мҳҒкө¬ мһ”лҘҳ)
          try{ if(self.roomRef){ const k=self.mySlot||self.role; if(k) self.setPresence(k); } }catch(e){}
        } };
      cref.on("value", cb);
      this.unsubs.push(function(){ try{ cref.off("value", cb); }catch(e){} });
    }catch(e){}
  },

  generateRoomCode:function(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s="";
    for(let i=0;i<4;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length));
    return s;
  },
  roomPath:function(code){ return "starArenaOnline/rooms/"+code; },
  // мҪ”л“ңк°җмӮ¬: лҒқлӮң л°©/к№Ём§„ л°©(meta м—ҶмқҢ)мқҖ мғҲ л°© мғқм„ұ мӢң к·ё мҪ”л“ңлҘј мһ¬мӮ¬мҡ©н•ҙ лҚ®м–ҙм“ҙлӢӨ(DBм—җ мң л № л°©мқҙ л¬ҙн•ңнһҲ мҢ“мқҙлҠ” кІғ л°©м§Җ)
  _roomIsFree:function(v){ return !v || !v.meta || v.meta.status==="ended"; },

  createRoom:function(onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"мҳЁлқјмқё мӮ¬мҡ© л¶Ҳк°Җ"); return; }
      const self=this;
      // л°© мҪ”л“ңк°Җ мқҙлҜё мһҲмңјл©ҙ(м•„мЈј л“ңл¬ҫ) лӢӨлҘё мҪ”л“ңлЎң лӢӨмӢң мӢңлҸ„н•ҙ кё°мЎҙ л°©мқ„ лҚ®м–ҙм“°м§Җ м•ҠкІҢ н•ңлӢӨ
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(!self._roomIsFree(snap.val())){
            if(triesLeft>0){ tryCreate(triesLeft-1); return; }
            if(onDone) onDone(false,"л°© мғқм„ұ мӢӨнҢЁ(мҪ”л“ң м¶©лҸҢ)"); return;
          }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const room={
            meta:{ status:"waiting", hostUid:self.uid, guestUid:null, createdAt:ts, updatedAt:ts,
              mapId:selectedMapId||"training", characterHost:selectedCharacterId, characterGuest:null,
              weaponHost:selectedWeaponId, weaponGuest:null, winner:null },
            players:{ host:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() } }
          };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
            self.setPresence("host"); self.listenRoom(); RTCNet.begin();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"л°© мғқм„ұ мӢӨнҢЁ"); });
        }).catch(function(e){ if(onDone) onDone(false,"л°© мғқм„ұ мҳӨлҘҳ"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"л°© мғқм„ұ мҳӨлҘҳ"); }
  },

  joinRoom:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"мҳЁлқјмқё мӮ¬мҡ© л¶Ҳк°Җ"); return; }
      const self=this;
      code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"л°© мҪ”л“ң нҳ•мӢқ мҳӨлҘҳ"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"л°©мқ„ м°ҫмқ„ мҲҳ м—ҶмқҢ"); return; }
        if(data.meta.status==="ended"){ if(onDone) onDone(false,"мқҙлҜё мў…лЈҢлҗң л°©мқҙм—җмҡ”"); return; }   // мҪ”л“ңк°җмӮ¬: мң л № л°©м—җ л“Өм–ҙк°Җ л¬ҙн•ң лҢҖкё°н•ҳлҠ” л¬ём ң л°©м§Җ
        if(data.meta.guestUid && data.meta.guestUid!==self.uid){ if(onDone) onDone(false,"л°©мқҙ к°Җл“қ м°јмҠөлӢҲлӢӨ"); return; }
        const ts=firebase.database.ServerValue.TIMESTAMP;
        const updates={};
        updates["meta/guestUid"]=self.uid;
        updates["meta/characterGuest"]=selectedCharacterId;
        updates["meta/weaponGuest"]=selectedWeaponId;
        updates["meta/status"]="ready";
        updates["meta/updatedAt"]=ts;
        updates["players/guest"]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() };
        ref.update(updates).then(function(){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
          self.setPresence("guest"); self.listenRoom(); RTCNet.begin();
          if(onDone) onDone(true, code);
        }).catch(function(e){ if(onDone) onDone(false,"мһ…мһҘ мӢӨнҢЁ"); });
      }).catch(function(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); });
    }catch(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); }
  },

  setPresence:function(role){
    try{
      if(!this.roomRef) return;
      const pref=this.roomRef.child("players/"+role);
      pref.child("connected").set(true);
      pref.child("connected").onDisconnect().set(false);
      pref.child("lastSeen").onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
      this.roomRef.child("inputs/"+role).onDisconnect().set(emptyInput()); // лҒҠкё°л©ҙ мһ…л ҘлҸ„ л№„мӣҢ мң л № лҸҷмһ‘ л°©м§Җ(мҳЁлқјмқёкёҙкёү P1: inputs л¶„лҰ¬ л…ёл“ң)
      if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().set("ended"); // л°©мһҘ лҒҠкё°л©ҙ л°© мў…лЈҢ
    }catch(e){}
  },

  listenRoom:function(){
    try{
      const self=this; if(!this.roomRef) return;
      const metaRef=this.roomRef.child("meta");
      const playersRef=this.roomRef.child("players");
      const stateRef=this.roomRef.child("state");
      const mcb=function(snap){ self.meta=snap.val(); onRoomMetaChanged(); };
      const pcb=function(snap){
        self.players=snap.val()||{ host:null, guest:null };   // мҳЁлқјмқёкёҙкёү P1: players=лЎңмҠӨн„°л§Ң(мһ…л ҘмқҖ inputs л…ёл“ң) вҖ” ліҖнҷ” л“ңл¬ҫ
      };
      metaRef.on("value", mcb);
      playersRef.on("value", pcb);
      this.unsubs.push(function(){ try{ metaRef.off("value",mcb); }catch(e){} });
      this.unsubs.push(function(){ try{ playersRef.off("value",pcb); }catch(e){} });
      if(this.role==="host"){
        // мҳЁлқјмқёкёҙкёү P1(#1 мөңлҢҖ л ү мҡ”мқё н•ҙмҶҢ): мһ…л ҘмқҖ hostл§Ң кө¬лҸ… вҖ” кІҢмҠӨнҠё мһ…л Ҙ м“°кё°к°Җ
        // л°© м „мӣҗм—җкІҢ players м „мІҙ(~2.5KB)лЎң нҢ¬м•„мӣғлҗҳлҚҳ нҠёлһҳн”Ҫ мҰқнҸӯ м ңкұ°.
        const inputsRef=this.roomRef.child("inputs");
        const icb=function(snap){
          const all=snap.val()||{};   // WebRTC/RTDB кіөмЎҙ: мҠ¬лЎҜлі„ лі‘н•©+seq(_sq) dedup. DCк°Җ лЁјм Җ м Ғмҡ©н•ҳл©ҙ RTDB мӮ¬ліёмқҖ л“ңлЎӯ.
          for(const k in all){ const inp=all[k];
            if(inp && inp._sq!==undefined){ const last=(RTCNet.lastInputSeq[k]===undefined)?-1:RTCNet.lastInputSeq[k]; if(inp._sq<=last) continue; RTCNet.lastInputSeq[k]=inp._sq; }
            self.inputs[k]=inp; }   // _sq м—Ҷмңјл©ҙ(н”Ңлһҳк·ёOFF/emptyInput нҒҙлҰ¬м–ҙ) к·ёлғҘ м Ғмҡ©
          self.onlineInput.host = self.inputs.host||null;   // 1v1 н•ҳмң„нҳёнҷҳ л·°
          self.onlineInput.guest = self.inputs.guest||null;
        };
        inputsRef.on("value", icb);
        this.unsubs.push(function(){ try{ inputsRef.off("value",icb); }catch(e){} });
      }
      if(this.role==="guest"){
        const scb=function(snap){ const v=snap.val();   // WebRTC/RTDB кіөмЎҙ: seq(_sq)лЎң dedup(лҚ” л№ лҘё DCк°Җ лЁјм Җ м Ғмҡ©, RTDB мӮ¬ліёмқҖ л“ңлЎӯ). _sq м—Ҷмңјл©ҙ(н”Ңлһҳк·ёOFF/нҒҙлҰ¬м–ҙ) к·ёлғҘ м Ғмҡ©.
          if(v && v._sq!==undefined){ if(v._sq<=RTCNet.lastStateSeq) return; RTCNet.lastStateSeq=v._sq; }
          self.onlineState=v; self.onlineStateAt=Date.now(); };   // мҲҳмӢ  мӢңк°Ғ(мӢ м„ лҸ„ м§„лӢЁмҡ©)
        stateRef.on("value", scb);
        this.unsubs.push(function(){ try{ stateRef.off("value",scb); }catch(e){} });
      }
    }catch(e){}
  },

  /* мҳЁлқјмқёкёҙкёү P0: нҢЁнӮ· л”Ҙ мғҲлӢҲнғҖмқҙмҰҲ вҖ” undefined н•„л“ң 1к°ңл§Ң мһҲм–ҙлҸ„ RTDBк°Җ set() м „мІҙлҘј кұ°л¶Җн•ҙ
     "лҸҷкё°нҷ” лҢҖкё° мӨ‘вҖҰ" л¬ҙн•ң лҢҖкё°к°Җ лҗҗлӢӨ(лҙҮ ammo=undefined). кІҪкі„м—җм„ң undefined м ңкұ°В·л№„мң н•ңмҲҳ 0 м№ҳнҷҳ. */
  _sanWarned:{},
  _sanWarn:function(path){ const key=path.replace(/[0-9]+/g,"N"); if(this._sanWarned[key]) return; this._sanWarned[key]=1;
    try{ console.warn("[online] state н•„л“ң м •нҷ”:", key); }catch(e){} },
  _sanitizePacket:function(v, path){
    if(v===null) return null;
    const t=typeof v;
    if(t==="number"){ if(!isFinite(v)){ this._sanWarn(path); return 0; } return v; }
    if(t==="function"){ this._sanWarn(path); return null; }
    if(t==="object"){
      if(v[".sv"]!==undefined) return v;                       // ServerValue.TIMESTAMP нҶөкіј
      if(Array.isArray(v)){ const out=new Array(v.length);
        for(let i=0;i<v.length;i++){ const x=v[i]; out[i]=(x===undefined)?(this._sanWarn(path+"["+i+"]"),null):this._sanitizePacket(x, path+"["+i+"]"); }
        return out; }
      const out={};
      for(const k in v){ const x=v[k];
        if(x===undefined){ this._sanWarn(path+"."+k); continue; }  // нӮӨ м ңкұ°(= RTDBм—җм„ң null м“°кё°мҷҖ лҸҷмқј нҡЁкіј)
        out[k]=this._sanitizePacket(x, path+"."+k); }
      return out;
    }
    return v;
  },
  writeInput:function(inputObj){ try{ const key=this.mySlot||this.role; if(!key) return;
      RTCNet.sendInput(inputObj, key);   // WebRTC DCлЎң(мјңмЎҢкі  м—ҙл ёмңјл©ҙ, inputObj._sq л¶Җм—¬). RTDBлҠ” м•„лһҳм—җм„ң floorлЎң н•ӯмғҒ м „мҶЎ, seqлЎң dedup.
      if(this.roomRef) this.roomRef.child("inputs/"+key).set(this._sanitizePacket(inputObj,"input")); }catch(e){ try{ console.warn("[online] input м „мҶЎ мӢӨнҢЁ", e); }catch(e2){} } },   // мҳЁлқјмқёкёҙкёү P1: inputs/$slot л¶„лҰ¬
  writeMetaStatus:function(status, extra){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; const u={ status:status, updatedAt:firebase.database.ServerValue.TIMESTAMP };
      if(extra){ for(const k in extra) u[k]=extra[k]; } this.roomRef.child("meta").update(this._sanitizePacket(u,"meta")); }catch(e){ try{ console.warn("[online] meta м „мҶЎ мӢӨнҢЁ", e); }catch(e2){} }
  },
  _lastRtdbAt:0,
  writeHostState:function(stateObj){
    try{ if(this.role!=="host") return; if(!this.roomRef) return;
      RTCNet.sendState(stateObj);   // WebRTC DC лёҢлЎңл“ңмәҗмҠӨнҠё(+stateObj._sq л¶Җм—¬, мјңмЎҢмқ„ л•Ңл§Ң).
      // RTDB floor: DC м—Ҷмңјл©ҙ н•ӯмғҒ(мң мқј нҶөлЎң). DC м—ҙл Ө мһҲмңјл©ҙ м–өм ң вҖ” лӢЁ 'лӘЁл“ ' мӮ¬лһҢ кІҢмҠӨнҠёк°Җ DCл©ҙ м Җл№ҲлҸ„(RTC_RTDB_FALLBACK_FPS)лЎң, RTDB-only кІҢмҠӨнҠёк°Җ н•ҳлӮҳлқјлҸ„ мһҲмңјл©ҙ 15HzлЎң(к·ё н•ҷмғқ ліҙнҳё). DC лҒҠкё°л©ҙ allGuestsOpen=falseлқј мһҗлҸҷ 15Hz ліөк·Җ. кІҢмҠӨнҠёлҠ” seqлЎң dedup.
      if(RTCNet.anyOpen()){ const rate=RTCNet.allGuestsOpen()?RTC_RTDB_FALLBACK_FPS:T_STATE_FPS; const nowMs=Date.now(); if(this._lastRtdbAt && nowMs-this._lastRtdbAt < (1000/rate)-3) return; this._lastRtdbAt=nowMs; }
      stateObj.updatedAt=firebase.database.ServerValue.TIMESTAMP;
      const p=this.roomRef.child("state").set(this._sanitizePacket(stateObj,"state"));
      if(p && p.catch) p.catch(function(e){ try{ console.warn("[online] state м „мҶЎ мӢӨнҢЁ", e); }catch(e2){} });
    }catch(e){ try{ console.warn("[online] state м „мҶЎ мӢӨнҢЁ", e); }catch(e2){} }   // л¬ҙмқҢ кёҲм§Җ вҖ” мқҙлІҲ мӮ¬кі мқҳ мқҖнҸҗ м§Җм җ
  },

  leaveRoom:function(localOnly){
    try{ RTCNet.reset(); }catch(e){}   // WebRTC н”јм–ҙ/кө¬лҸ… м •лҰ¬
    try{
      for(const u of this.unsubs){ try{ u(); }catch(e){} }
      this.unsubs=[];
      // localOnly: л°©мқҙ мқҙлҜё м„ңлІ„м—җм„ң мӮӯм ң/мў…лЈҢлҗң кІҪмҡ°. DBм—җ м•„л¬ҙкІғлҸ„ м“°м§Җ м•Ҡкі  лЎңм»¬ м •лҰ¬л§Ң н•ңлӢӨ(мң л № л°© мһ¬мғқм„ұ л°©м§Җ).
      const slotKey=this.mySlot||this.role;
      if(!localOnly && this.roomRef && slotKey){
        try{
          const pref=this.roomRef.child("players/"+slotKey);
          pref.child("connected").onDisconnect().cancel();
          pref.child("lastSeen").onDisconnect().cancel();
          this.roomRef.child("inputs/"+slotKey).onDisconnect().cancel();   // мҳЁлқјмқёкёҙкёү P1: setPresenceк°Җ inputs/$slotм—җ кұёлҜҖлЎң м—¬кё°м„ң м·ЁмҶҢ(мң л № мЎ°к°Ғ л°©м§Җ)
          if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().cancel();
        }catch(e){}
      }
      if(!localOnly && this.roomRef){
        try{
          const isTeam = (this.mode==="online3v3" || this.mode==="onlinePve6");
          if(this.role==="host"){ const rr=this.roomRef; rr.child("meta/status").set("ended");
            // мҪ”л“ңк°җмӮ¬: нғӯмқ„ лӢ«мңјл©° лӮҳк°Җл©ҙ м•„лһҳ setTimeoutмқҙ мӢӨн–үлҗҳм§Җ лӘ»н•ҙ л°©мқҙ DBм—җ мҳҒкө¬ мһ”лҘҳн–ҲлӢӨ.
            // onDisconnect().remove()лҘј кұём–ҙ м—°кІ°мқҙ лҒҠкё°лҠ” мҲңк°„ м„ңлІ„к°Җ л°©мқ„ мІӯмҶҢн•ңлӢӨ(м •мғҒ нҮҙмһҘ мӢңм—” мқҙлҜё м§ҖмӣҢм ё л¬ҙн•ҙн•ң no-op).
            try{ rr.onDisconnect().remove(); }catch(e){}
            setTimeout(function(){ try{ rr.remove(); }catch(e){} }, 800); }
          else if(slotKey && isTeam){
            // нҢҖ лӘЁл“ң: л§Өм№ҳлҠ” кі„мҶҚ, лӮҙ мҠ¬лЎҜл§Ң л№„нҷңм„ұ мІҳлҰ¬(hostк°Җ л№ҲмһҗлҰ¬лЎң лӢӨлЈё)
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
            this.roomRef.child("inputs/"+slotKey).set(emptyInput());   // мҳЁлқјмқёкёҙкёү P1: мһ…л ҘмқҖ inputs л…ёл“ңм—җм„ң л№„мӣҖ
          }
          else if(slotKey){ // 1лҢҖ1: м°ёк°Җмһҗк°Җ 1лӘ…лҝҗмқҙлқј л§Өм№ҳ мў…лЈҢк°Җ л§һмқҢ
            this.roomRef.child("meta/status").set("ended");

    this.roomRef=null; this.roomCode=null; this.role=null; this.mode=null; this.mySlot=null;
    this.onlineState=null; this.meta=null; this.players={ host:null, guest:null };

    if(this.available && this.db) this.watchConnection(); // м—°кІ° к°җмӢң мһ¬кө¬лҸ…
  },

  // ---- лӢӨмқё(мҠ¬лЎҜ) лӘЁл“ң л°© мғқм„ұ/мһ…мһҘ ----
  createTeamRoom:function(modeId, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"мҳЁлқјмқё мӮ¬мҡ© л¶Ҳк°Җ"); return; }
      const self=this, mode=getOnlineMode(modeId);
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(!self._roomIsFree(snap.val())){ if(triesLeft>0){ tryCreate(triesLeft-1); return; } if(onDone) onDone(false,"л°© мғқм„ұ мӢӨнҢЁ(мҪ”л“ң м¶©лҸҢ)"); return; }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const team = mode.modeType==="pve" ? "pve" : "blue";
          // PVEлҠ” мҠӨн…Ңмқҙм§Җ л§өмқ„ л”°лҘҙлҜҖлЎң mapIdлҠ” 1мҠӨн…Ңмқҙм§Җ л§ө, PVP(3v3)лҠ” hostк°Җ кі лҘё л§ө
          const mapId = mode.modeType==="pve" ? (PVE_STAGES[0].mapId) : (selectedMapId||"training");
          const rule=(mode.modeType==="pvp" && modeId!=="online1v1") ? (onlineSelectedRule||"tdm") : "tdm";   // BIG-BATCH-2 P2
          const room={ meta:{ mode:modeId, status:"waiting", hostUid:self.uid, createdAt:ts, updatedAt:ts,
              mapId:mapId, maxPlayers:mode.maxPlayers, rule:rule, winner:null, resultText:"", stageIndex:0, waveIndex:0 },
            players:{ p1:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:"p1", team:team, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:ts, input:emptyInput() } } };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode=modeId; self.mySlot="p1"; self.maxPlayers=mode.maxPlayers;
            self.setPresence("p1"); self.listenRoom(); RTCNet.begin();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"л°© мғқм„ұ мӢӨнҢЁ"); });
        }).catch(function(e){ if(onDone) onDone(false,"л°© мғқм„ұ мҳӨлҘҳ"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"л°© мғқм„ұ мҳӨлҘҳ"); }
  },
  joinRoomAny:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"мҳЁлқјмқё мӮ¬мҡ© л¶Ҳк°Җ"); return; }
      const self=this; code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"л°© мҪ”л“ң нҳ•мӢқ мҳӨлҘҳ"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"л°©мқ„ м°ҫмқ„ мҲҳ м—ҶмқҢ"); return; }
        const m=data.meta.mode;
        if(m==="online3v3" || m==="onlinePve6"){ self._joinTeamRoom(code, data, ref, onDone); }
        else { self.joinRoom(code, onDone); }
      }).catch(function(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); });
    }catch(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); }
  },
  _joinTeamRoom:function(code, data, ref, onDone){
    try{
      const self=this; let claimedSlot=null, claimedMode=null, failReason="мһ…мһҘ мӢӨнҢЁ";
      // мҠ¬лЎҜ claimмқ„ transactionмңјлЎң мӣҗмһҗ мІҳлҰ¬(лҸҷмӢң мһ…мһҘ мӢң к°ҷмқҖ pN лҚ®м–ҙм“°кё° л°©м§Җ)
      ref.transaction(function(room){
        claimedSlot=null; failReason="мһ…мһҘ мӢӨнҢЁ";
        // RTDB transactionмқҖ мІ« нҳём¶ңмқҙ мәҗмӢң лҜёлҸҷкё°нҷ”лЎң nullлЎң мҳ¬ мҲҳ мһҲлӢӨ.
        // м—¬кё°м„ң nullлЎң мӨ‘лӢЁ(return)н•ҳл©ҙ м„ңлІ„ лҚ°мқҙн„°лҘј л°ӣкё°лҸ„ м „м—җ нҠёлһңмһӯм…ҳмқҙ мҳҒкө¬ abortлҗңлӢӨ.
        // мқҙлҜё get()мңјлЎң мЎҙмһ¬лҘј нҷ•мқён•ң dataлЎң ліҙм •н•ҙ null-abort н•Ём •мқ„ н”јн•ңлӢӨ.
        if(room===null || room===undefined) room=data;
        if(!room || !room.meta){ failReason="л°©мқ„ м°ҫмқ„ мҲҳ м—ҶмқҢ"; return; }            // abort
        if(room.meta.status!=="waiting" && room.meta.status!=="ready"){ failReason="мқҙлҜё мӢңмһ‘лҗң л°©"; return; }
        claimedMode=room.meta.mode; const mode=getOnlineMode(claimedMode);
        const players=room.players||{};
        let slot=null;
        for(let i=1;i<=mode.maxPlayers;i++){ const k="p"+i; if(!players[k] || players[k].connected===false){ slot=k; break; } }
        if(!slot){ failReason="л°©мқҙ к°Җл“қ м°јмҠөлӢҲлӢӨ"; return; }                          // abort
        let team="pve";
        if(mode.modeType==="pvp"){
          let blue=0,red=0; for(const k in players){ const pp=players[k]; if(pp && pp.connected!==false){ if(pp.team==="red") red++; else blue++; } }
          team = (blue<=red && blue<3) ? "blue" : (red<3 ? "red" : "blue");
        }
        claimedSlot=slot;
        if(!room.players) room.players={};
        room.players[slot]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:slot, team:team, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:firebase.database.ServerValue.TIMESTAMP, input:emptyInput() };
        room.meta.status="ready"; room.meta.updatedAt=firebase.database.ServerValue.TIMESTAMP;
        return room; // commit
      }).then(function(res){
        if(res && res.committed && claimedSlot){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode=claimedMode; self.mySlot=claimedSlot; self.maxPlayers=getOnlineMode(claimedMode).maxPlayers;
          self.setPresence(claimedSlot); self.listenRoom(); RTCNet.begin();
          if(onDone) onDone(true, code);
        } else { if(onDone) onDone(false, failReason); }
      }).catch(function(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); });
    }catch(e){ if(onDone) onDone(false,"мһ…мһҘ мҳӨлҘҳ"); }
  },

  // н”„лЎңн•„ нҒҙлқјмҡ°л“ң м ҖмһҘмқҖ мқҙлІҲ лІ нғҖм—җм„ң мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ(лЎңм»¬ localStorageл§Ң)
  saveCloudProfile:function(p){ try{ /* лІ нғҖ: лҜёмӮ¬мҡ© */ }catch(e){} },

/* =======================================================================
   RTCNet вҖ” WebRTC DataChannel н•ҳмқҙлёҢлҰ¬л“ң м „мҶЎ (м„Өкі„: мҳЁлқјмқё_WebRTC_м„Өкі„.md)
   к°ҷмқҖ мҷҖмқҙнҢҢмқҙм—җм„ң кё°кё°лҒјлҰ¬ м§Ғм ‘ м—°кІ°(мҷ•ліө 5~20ms). мӢңк·ёл„җл§Ғл§Ң кё°мЎҙ Firebase мһ¬нҷңмҡ©.
   RTDBлҠ” к·ёлҢҖлЎң нҸҙл°ұ(floor). seq(_sq) мӨ‘ліөм ңкұ°лЎң DC(л№ лҰ„)+RTDB(лҠҗлҰј) нһҲм№ӯ м—Ҷмқҙ кіөмЎҙ.
   RTC_ENABLED=falseл©ҙ seqлҘј м•Ҳ м°Қкі  DCлҘј м•Ҳ м—ҙм–ҙ м§ҖкёҲкіј 100% лҸҷмқј лҸҷмһ‘(нҡҢк·Җ 0).
   ======================================================================= */
const RTC_ENABLED = true;   // WebRTC кІҪлЎң мӢңлҸ„ м—¬л¶Җ(нҳ„мһҘ кІҢмқҙнҠё нҶөкіј мҷ„лЈҢ). falseл©ҙ мҲңмҲҳ RTDB.
const RTCNet = {
  ICE:[{ urls:["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"] }],
  on:false, role:null, sigRef:null,
  peers:{},          // host: slotKey -> {pc,dc,open,remoteSet,iceBuf,node}
  self:null,         // guest: {pc,dc,open,remoteSet,iceBuf,node,slot}
  stateSeq:0, lastStateSeq:-1, inputSeq:0, lastInputSeq:{},
  _unsubs:[], _openCount:0,

  reset:function(){
    try{ for(const u of this._unsubs){ try{ u(); }catch(e){} } }catch(e){} this._unsubs=[];
    try{ for(const s in this.peers){ const b=this.peers[s]; try{ if(b.dc) b.dc.close(); }catch(e){} try{ if(b.pc) b.pc.close(); }catch(e){} } }catch(e){}
    if(this.self){ try{ if(this.self.dc) this.self.dc.close(); }catch(e){} try{ if(this.self.pc) this.self.pc.close(); }catch(e){} }
    this.peers={}; this.self=null; this.role=null; this.sigRef=null;
    this.stateSeq=0; this.lastStateSeq=-1; this.inputSeq=0; this.lastInputSeq={}; this._openCount=0;
  },

  // л°© мһ…мһҘ(listenRoom) м§Ғнӣ„ нҳём¶ң. WebRTC н•ёл“ңм…°мқҙнҒ¬ мӢңмһ‘.
  begin:function(){
    try{
      this.reset();
      this.on = !!(RTC_ENABLED && typeof RTCPeerConnection!=="undefined");
      if(!this.on) return;
      const om=OnlineManager; if(!om.roomRef) return;
      this.role=om.role; this.sigRef=om.roomRef.child("signal");
      if(om.role==="host") this._hostListen();
      else this._guestStart(om.mySlot||om.role);
    }catch(e){ this.on=false; }
  },

  _newPc:function(box){
    const pc=new RTCPeerConnection({ iceServers:this.ICE });
    const self=this;
    pc.oniceconnectionstatechange=function(){ if(pc.iceConnectionState==="failed"||pc.iceConnectionState==="closed"){ if(box.open){ box.open=false; self._openCount=Math.max(0,self._openCount-1); } } };
    return pc;
  },
  _addIce:function(box, c){
    try{
      if(box.remoteSet && box.pc.remoteDescription) box.pc.addIceCandidate(new RTCIceCandidate(c)).catch(function(){});
      else box.iceBuf.push(c);
    }catch(e){}
  },
  _flush:function(box){ try{ for(const c of box.iceBuf){ box.pc.addIceCandidate(new RTCIceCandidate(c)).catch(function(){}); } box.iceBuf=[]; }catch(e){} },

  // ---- кІҢмҠӨнҠё: offerer(DataChannel мғқм„ұ) ----
  _guestStart:function(slot){
    const self=this;
    const box={ pc:null, dc:null, open:false, remoteSet:false, iceBuf:[], slot:slot };
    this.self=box;
    const pc=this._newPc(box); box.pc=pc;
    const node=this.sigRef.child(slot);
    box.node=node;
    const dc=pc.createDataChannel("g", { ordered:false, maxRetransmits:0 });
    box.dc=dc;
    dc.onopen=function(){ box.open=true; self._openCount++; };
    dc.onclose=function(){ if(box.open){ box.open=false; self._openCount=Math.max(0,self._openCount-1); } };
    dc.onmessage=function(ev){ self._onStateMsg(ev.data); };
    pc.onicecandidate=function(e){ if(e.candidate) node.child("guestIce").push(e.candidate.toJSON()).catch(function(){}); };
    pc.createOffer().then(function(o){ return pc.setLocalDescription(o).then(function(){ return node.child("offer").set({ type:o.type, sdp:o.sdp }); }); }).catch(function(){});
    const acb=function(s){ const a=s.val(); if(a && !box.remoteSet){ box.remoteSet=true; pc.setRemoteDescription(new RTCSessionDescription(a)).then(function(){ self._flush(box); }).catch(function(){}); } };
    node.child("answer").on("value", acb);
    const icb=function(s){ const c=s.val(); if(c) self._addIce(box, c); };
    node.child("hostIce").on("child_added", icb);
    this._unsubs.push(function(){ try{ node.child("answer").off("value",acb); }catch(e){} try{ node.child("hostIce").off("child_added",icb); }catch(e){} });
  },

  // ---- нҳёмҠӨнҠё: кІҢмҠӨнҠё мҠ¬лЎҜ offer к°җм§Җ вҶ’ мҠ¬лЎҜлі„ answerer ----
  _hostListen:function(){
    const self=this;
    const scb=function(snap){ const all=snap.val()||{}; for(const slot in all){ if(!self.peers[slot] && all[slot] && all[slot].offer){ self._hostAcceptGuest(slot); } } };
    this.sigRef.on("value", scb);
    this._unsubs.push(function(){ try{ self.sigRef.off("value",scb); }catch(e){} });
  },
  _hostAcceptGuest:function(slot){
    const self=this;
    const box={ pc:null, dc:null, open:false, remoteSet:false, iceBuf:[], slot:slot };
    this.peers[slot]=box;
    this.lastInputSeq[slot]=-1;   // мһ¬м ‘мҶҚ мӢң кІҢмҠӨнҠё inputSeqк°Җ 0л¶Җн„° мһ¬мӢңмһ‘н•ҳлҜҖлЎң мҠ¬лЎҜ seq лҰ¬м…Ӣ(м•Ҳ н•ҳл©ҙ мғҲ мһ…л Ҙмқҙ л“ңлЎӯлҗЁ)
    const pc=this._newPc(box); box.pc=pc;
    const node=this.sigRef.child(slot); box.node=node;
    pc.ondatachannel=function(e){ box.dc=e.channel;
      box.dc.onopen=function(){ box.open=true; self._openCount++; };
      box.dc.onclose=function(){ if(box.open){ box.open=false; self._openCount=Math.max(0,self._openCount-1); } };
      box.dc.onmessage=function(ev){ self._onInputMsg(slot, ev.data); };
    };
    pc.onicecandidate=function(e){ if(e.candidate) node.child("hostIce").push(e.candidate.toJSON()).catch(function(){}); };
    node.child("offer").get().then(function(s){
      const o=s.val(); if(!o) return; box.remoteSet=true;
      return pc.setRemoteDescription(new RTCSessionDescription(o))
        .then(function(){ return pc.createAnswer(); })
        .then(function(a){ return pc.setLocalDescription(a).then(function(){ return node.child("answer").set({ type:a.type, sdp:a.sdp }); }); })
        .then(function(){ self._flush(box); });
    }).catch(function(){});
    const icb=function(s){ const c=s.val(); if(c) self._addIce(box, c); };
    node.child("guestIce").on("child_added", icb);
    this._unsubs.push(function(){ try{ node.child("guestIce").off("child_added",icb); }catch(e){} });
  },

  // ---- мҲҳмӢ  лқјмҡ°нҢ…(seq к°Җл“ң) вҖ” кё°мЎҙ onlineState/inputsлҘј лҚ” л№ лҘҙкІҢ мұ„мҡҙлӢӨ ----
  _onStateMsg:function(data){
    try{ const m=JSON.parse(data); if(m.s!==undefined){ if(m.s<=this.lastStateSeq) return; this.lastStateSeq=m.s; }
      OnlineManager.onlineState=m.d; OnlineManager.onlineStateAt=Date.now(); }catch(e){}
  },
  _onInputMsg:function(slot, data){
    try{ const m=JSON.parse(data); const last=(this.lastInputSeq[slot]===undefined)?-1:this.lastInputSeq[slot];
      if(m.s!==undefined){ if(m.s<=last) return; this.lastInputSeq[slot]=m.s; }
      OnlineManager.inputs[slot]=m.d;
      if(slot==="host"||slot==="guest") OnlineManager.onlineInput[slot]=m.d; }catch(e){}
  },

  // ---- мҶЎмӢ  ----
  // кІҢмҠӨнҠё мһ…л Ҙ: лӮҙ DCк°Җ м—ҙл Ө мһҲмңјл©ҙ DCлЎң ліҙлӮҙкі  true. м•„лӢҲл©ҙ false(нҳём¶ңл¶Җк°Җ RTDB).
  sendInput:function(inp, key){
    if(!this.on || !this.self || !this.self.open || !this.self.dc || this.self.dc.readyState!=="open") return false;
    try{ inp._sq=++this.inputSeq; this.self.dc.send(JSON.stringify({ s:inp._sq, d:inp })); return true; }catch(e){ return false; }
  },
  // нҳёмҠӨнҠё мғҒнғң: м—ҙлҰ° лӘЁл“  кІҢмҠӨнҠё DCлЎң лёҢлЎңл“ңмәҗмҠӨнҠё. seqлҘј stм—җ м°Қм–ҙ RTDB мӮ¬ліёкіј dedup.
  sendState:function(st){
    if(!this.on) return 0;
    st._sq=++this.stateSeq;
    let n=0;
    try{ const msg=JSON.stringify({ s:st._sq, d:st });
      for(const slot in this.peers){ const b=this.peers[slot]; if(b.open && b.dc && b.dc.readyState==="open"){ try{ b.dc.send(msg); n++; }catch(e){} } }
    }catch(e){}
    return n;
  },
  anyOpen:function(){ return this._openCount>0; },
  // м ‘мҶҚн•ң 'мӮ¬лһҢ' кІҢмҠӨнҠёк°Җ м „л¶Җ DCлЎң л¶ҷм—ҲлӮҳ? (лҙҮВ·нҳёмҠӨнҠё мһҗмӢ  м ңмҷё). RTDB floorлҘј м Җл№ҲлҸ„лЎң лӮ®м¶°лҸ„ лҗҳлҠ” мЎ°кұҙ.
  // н•ҳлӮҳлқјлҸ„ RTDB-onlyмқҙкұ°лӮҳ DCк°Җ мЈҪмңјл©ҙ false вҶ’ writeHostStateк°Җ 15HzлЎң мһҗлҸҷ ліөк·Җ(mixed roomм—җм„ң к·ё н•ҷмғқ ліҙнҳёВ·self-healing).
  allGuestsOpen:function(){
    if(!this.on || this.role!=="host") return false;
    const players=OnlineManager.players||{}, mySlot=OnlineManager.mySlot||"host";
    let need=0, open=0;
    for(const k in players){ const p=players[k]; if(!p || p.connected===false || p.isBot) continue; if(k===mySlot) continue; need++; const b=this.peers[k]; if(b && b.open) open++; }
    return need>0 && open===need;
  }
};

   assets/sfx/<мқҙлҰ„>.mp3 нҢҢмқјмқ„ л„Јмңјл©ҙ мһҗлҸҷмңјлЎң лЎңл“ңВ·мһ¬мғқлҗңлӢӨ(м—Ҷмңјл©ҙ мҷ„м „ л¬ҙмқҢ no-op).

   ======================================================================= */
const SFX_NAMES=["fire","hit","kill","special","ult","win","lose","buff","reload","infect","paint","jump","stomp","spring","checkpoint","clear","powerup","shoot","break","click"];   /* GENRE-EXPAND-1 В§4.1 + BIG-BATCH-2 P1.5(нҢҢмӣҢм—…В·л°ңмӮ¬В·лё”лЎқ нҢҢкҙҙ) + TOUCH-UI-2 нҒҙлҰӯмқҢ(assets/sfx/click.mp3 л„Јмңјл©ҙ мһҗлҸҷ) */
const SFX={ _ctx:null, _buf:{}, _tried:false };
function sfxVolume(){ const v=(profile && typeof profile.sfxVolume==="number")?profile.sfxVolume:0.7; return clamp(v,0,1); }
function sfxInit(){
  if(SFX._tried) return; SFX._tried=true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    SFX._ctx=new AC();
    for(const n of SFX_NAMES){
      fetch(ASSET_BASE+"sfx/"+n+".mp3").then(r=>r.ok?r.arrayBuffer():null)
        .then(ab=>ab?SFX._ctx.decodeAudioData(ab):null)
        .then(buf=>{ if(buf) SFX._buf[n]=buf; }).catch(()=>{});
    }
  }catch(e){ SFX._ctx=null; }
}
function playSfx(name){
  try{
    const v=sfxVolume(); if(!v || !SFX._ctx) return;
    const b=SFX._buf[name]; if(!b) return;                 // м—җм…Ӣ м—ҶмқҢ вҶ’ л¬ҙмқҢ(кө¬мЎ°л§Ң)
    const src=SFX._ctx.createBufferSource(), g=SFX._ctx.createGain();
    src.buffer=b; g.gain.value=v; src.connect(g); g.connect(SFX._ctx.destination); src.start();
  }catch(e){}
}

   нӮӨліҙл“ң лӘЁл“ңлҠ” кё°мЎҙ лҸҷмһ‘ к·ёлҢҖлЎң(кё°ліёк°’ вҖ” aim=nullмқҙл©ҙ мқҙлҸҷ л°©н–Ҙ мЎ°мӨҖВ·X/CлҠ” keydown кІҪлЎң мң м§Җ).

const CONTROL_MODES=[ {id:"keyboard",name:"нӮӨліҙл“ң (л°©н–ҘнӮӨ + Z/X/C)"},
                      {id:"mouse",   name:"л§Ҳмҡ°мҠӨ (WASD мқҙлҸҷ + м»Өм„ң мЎ°мӨҖ)"},
                      {id:"touch",   name:"н„°м№ҳ (нғңлё”лҰҝ мЎ°мқҙмҠӨнӢұ)"} ];
function controlMode(){ return (profile && profile.controlMode) || "keyboard"; }
function controlModeName(){ const m=CONTROL_MODES.find(c=>c.id===controlMode()); return m?m.name:"нӮӨліҙл“ң"; }
const MOUSE={ x:LOGW/2, y:LOGH/2, down:false, rdown:false, seen:false };
const TOUCH={ moveId:null, moveAnchor:null, moveVec:{x:0,y:0}, aimId:null, aimAnchor:null, aimVec:{x:0,y:0},
              aiming:false, xTap:false, cTap:false, reloadTap:false, pickTap:-1 };
function inPlayState(){ return gameState===STATE.PLAYING || gameState===STATE.ONLINE_PLAYING; }
let _canvasRect=null;   // PERF-2: mousemoveл§ҲлӢӨ getBoundingClientRect(л Ҳмқҙм•„мӣғ к°•м ң) л°©м§Җ вҖ” лҰ¬мӮ¬мқҙмҰҲ/мҠӨнҒ¬лЎӨ мӢң л¬ҙнҡЁнҷ”
function canvasToLogical(clientX, clientY){
  try{
    const r=_canvasRect || (_canvasRect=canvas.getBoundingClientRect());
    if(!r || !r.width || !r.height) return {x:LOGW/2, y:LOGH/2};
    return { x:(clientX-r.left)*(LOGW/r.width), y:(clientY-r.top)*(LOGH/r.height) };
  }catch(e){ return {x:LOGW/2, y:LOGH/2}; }
}

   к°Ғ л©”лүҙ drawк°Җ н”„л Ҳмһ„л§ҲлӢӨ лІ„нҠј rect+лҸҷмһ‘мқ„ л“ұлЎқн•ҳкі , нҒҙлҰӯ/нғӯмқҙ к·ё лҸҷмһ‘мқ„ мӢӨн–үн•ңлӢӨ.
   controlMode(нӮӨліҙл“ң/л§Ҳмҡ°мҠӨ/н„°м№ҳ)мҷҖ л¬ҙкҙҖн•ҳкІҢ лҸҷмһ‘ вҖ” нғңлё”лҰҝл§Ң мһҲлҠ” н•ҷмғқлҸ„ л©”лүҙ м§„мһ… к°ҖлҠҘ.
   нӮӨліҙл“ң л„Өл№„кІҢмқҙм…ҳ(нҷ”мӮҙн‘ң+Enter)мқҖ к·ёлҢҖлЎң лі‘н–ү мң м§Җ. ======================================================================= */
let UI_HITS = [];
let uiFlash = null;   // TOUCH-UI-2 нҒҙлҰӯк°җ: лҲҢлҰ° rect(н”„л Ҳмһ„ л„ҳм–ҙ мң м§Җ вҖ” UI_HITSмҷҖ лі„к°ңлқј uiClearHitsм—җ м•Ҳ м§ҖмӣҢм§җ)
function uiClearHits(){ UI_HITS.length = 0; }
function uiHit(x, y, w, h, fn){ if(fn) UI_HITS.push({ x:x, y:y, w:w, h:h, fn:fn }); }
function uiMenuActive(){   // мһҗмІҙ нҸ¬мқён„° мІҳлҰ¬лҘј к°Җм§„ нҷ”л©ҙ(н”Ңл Ҳмқҙ/RPG/лі„л№ӣм җн”„)мқҖ м ңмҷё
  if(gameState===STATE.EDITOR) return !!(ED && ED.step!=="edit");   // мң кё°м„ұ: м—җл””н„° mode/size м„ нғқмқҖ uiHit(нғңлё”лҰҝ л§өкіөл°© мһ…кө¬) В· editмқҖ edMouseDown мһҗмІҙ мІҳлҰ¬
  return !inPlayState() && gameState!==STATE.RPG && gameState!==STATE.PLATFORMER;
}
function uiPointerDown(p){   // лӮҳмӨ‘м—җ к·ёл Өм§„ кІғ(мң„еұӮ) мҡ°м„  вҖ” м—ӯмҲң нғҗмғү
  if(!uiMenuActive()) return false;
  for(let i=UI_HITS.length-1;i>=0;i--){ const b=UI_HITS[i];
    if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){
      uiFlash={ x:b.x, y:b.y, w:b.w, h:b.h, until:uiTime+0.14 }; try{ playSfx("click"); }catch(e){}   // нҒҙлҰӯк°җ(мӢңк°Ғ+мІӯк°Ғ)
      try{ b.fn(); }catch(e){} return true; } }
  return false;
}
function drawUiFlash(){   // TOUCH-UI-2: лҲҢлҰ° лІ„нҠј мң„ м§§мқҖ н•ҳмқҙлқјмқҙнҠё нҺҳмқҙл“ң(лӘЁл“  лІ„нҠј кіөмҡ© вҖ” к°ңлі„ draw л¬ҙмҲҳм •)
  if(!uiFlash || uiTime>=uiFlash.until || !uiMenuActive()) return;
  const a=0.4*((uiFlash.until-uiTime)/0.14);
  ctx.save(); ctx.fillStyle="rgba(255,255,255,"+a.toFixed(3)+")"; roundRect(uiFlash.x,uiFlash.y,uiFlash.w,uiFlash.h,10); ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,"+(a*1.4).toFixed(3)+")"; ctx.lineWidth=2; roundRect(uiFlash.x+0.5,uiFlash.y+0.5,uiFlash.w-1,uiFlash.h-1,10); ctx.stroke();
  ctx.restore();
}
// к°ҖмғҒ мҠӨнӢұ: м•өм»ӨвҶ’нҳ„мһ¬м җ лІЎн„°лҘј л°ҳкІҪмңјлЎң м •к·ңнҷ”(-1..1, л°–мқҖ нҒҙлһЁн”„)
function stickVec(anchor, p, rad){
  let dx=(p.x-anchor.x)/rad, dy=(p.y-anchor.y)/rad;
  const l=Math.hypot(dx,dy); if(l>1){ dx/=l; dy/=l; }
  return {x:dx, y:dy};
}
function _touchDockTap(p){   // н•ҳлӢЁ мҠӨнӮ¬лҸ… нғӯ(X/C=мҠӨнӮ¬, Z=мһҘм „) + PVE к°•нҷ” м№ҙл“ң нғӯ
  if(p.y>648){
    if(dist(p.x,p.y,LOGW/2,685)<34){ TOUCH.xTap=true; return true; }
    if(dist(p.x,p.y,LOGW/2+96,685)<34){ TOUCH.cTap=true; return true; }
    if(dist(p.x,p.y,LOGW/2-96,685)<34){ TOUCH.reloadTap=true; return true; }
  }
  if(p.y>=436 && p.y<=562){   // к°•нҷ” 3нғқ1 м№ҙл“ң мҳҒм—ӯ(drawUpgradeCardsмҷҖ лҸҷмқј мўҢн‘ң)
    const cw=250, gap=24, total=cw*3+gap*2, x0=LOGW/2-total/2;
    for(let i=0;i<3;i++){ const x=x0+i*(cw+gap); if(p.x>=x&&p.x<=x+cw){ TOUCH.pickTap=i; return true; } }
  }
  return false;
}
function handleTouchStart(e){
  if(uiMenuActive()){   // TOUCH-UI-1: л©”лүҙ нғӯмқҖ controlMode л¬ҙкҙҖ(нғңлё”лҰҝ л©”лүҙ м§„мһ…)
    if(e.changedTouches&&e.changedTouches.length){ const t=e.changedTouches[0]; if(uiPointerDown(canvasToLogical(t.clientX,t.clientY))) e.preventDefault(); }
    return;
  }
  if(gameState===STATE.EDITOR && ED && ED.step==="edit" && e.changedTouches&&e.changedTouches.length){   // TOUCH-UI-1: м—җл””н„° н„°м№ҳ л°°м№ҳ
    const t=e.changedTouches[0], p=canvasToLogical(t.clientX,t.clientY);
    if(ED.slot){ edSlotHit(p); e.preventDefault(); return; }   // мҠ¬лЎҜ мҳӨлІ„л Ҳмқҙ мҡ°м„ 
    if(edTestBtnHit(p)){ e.preventDefault(); return; }
    const pal=edPalette();
    if(p.x>=24&&p.x<=250){ for(let i=0;i<pal.length;i++){ const py=134+i*34; if(p.y>=py-14&&p.y<=py+16){ ED.palIdx=i; e.preventDefault(); return; } } }
    ED.mbtn=1; edPaintAt(p);
    e.preventDefault(); return;
  }
  if(edTest && gameState===STATE.PLAYING && e.changedTouches&&e.changedTouches.length){   // EDIT-TEST-1: рҹ”ҷ м—җл””н„° лІ„нҠј(мҡ°н•ҳлӢЁ)
    const p=canvasToLogical(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(p.x>LOGW-96&&p.y>LOGH-44){ edEndTest(); e.preventDefault(); return; }
  }
  if(controlMode()!=="touch") return;
  if(gameState===STATE.PLATFORMER){ e.preventDefault();
    for(const t of e.changedTouches){ const p=canvasToLogical(t.clientX,t.clientY); pfTouchAt(p,true); } return; }
  if(gameState===STATE.RPG){ e.preventDefault();
    for(const t of e.changedTouches){ rpgTouchStart(t.identifier, canvasToLogical(t.clientX,t.clientY)); } return; }   // RPGлӘЁл“ң В§4.7
  if(!inPlayState()) return;
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=canvasToLogical(t.clientX,t.clientY);
    if(_touchDockTap(p)) continue;
    if(p.x<LOGW/2 && TOUCH.moveId===null){ TOUCH.moveId=t.identifier; TOUCH.moveAnchor=p; TOUCH.moveVec={x:0,y:0}; }
    else if(p.x>=LOGW/2 && TOUCH.aimId===null){ TOUCH.aimId=t.identifier; TOUCH.aimAnchor=p; TOUCH.aimVec={x:0,y:0}; TOUCH.aiming=true; }
  }
}
function handleTouchMove(e){
  if(gameState===STATE.EDITOR && ED && ED.step==="edit" && ED.mbtn){   // TOUCH-UI-1: м—җл””н„° л“ңлһҳк·ё л°°м№ҳ
    if(e.changedTouches&&e.changedTouches.length){ edPaintAt(canvasToLogical(e.changedTouches[0].clientX,e.changedTouches[0].clientY)); e.preventDefault(); }
    return;
  }
  if(controlMode()!=="touch") return;
  e.preventDefault();
  if(gameState===STATE.RPG){ for(const t of e.changedTouches){ rpgTouchMove(t.identifier, canvasToLogical(t.clientX,t.clientY)); } return; }   // RPGлӘЁл“ң В§4.7
  for(const t of e.changedTouches){
    const p=canvasToLogical(t.clientX,t.clientY);
    if(t.identifier===TOUCH.moveId) TOUCH.moveVec=stickVec(TOUCH.moveAnchor,p,60);
    else if(t.identifier===TOUCH.aimId) TOUCH.aimVec=stickVec(TOUCH.aimAnchor,p,70);
  }

    if(PF){ PF.touch.l=false; PF.touch.r=false; PF.touch.j=false; PF.touch.dn=false; } return; }
  if(gameState===STATE.RPG){ e.preventDefault();
    for(const t of e.changedTouches) rpgTouchEnd(t.identifier); return; }   // RPGлӘЁл“ң В§4.7

  }
}

function getLocalIntent(){
  const m=controlMode();
  if(m==="mouse"){
    let mx=0,my=0;
    if(keysDown.has("KeyW")||keysDown.has("ArrowUp")) my-=1;
    if(keysDown.has("KeyS")||keysDown.has("ArrowDown")) my+=1;
    if(keysDown.has("KeyA")||keysDown.has("ArrowLeft")) mx-=1;
    if(keysDown.has("KeyD")||keysDown.has("ArrowRight")) mx+=1;
    return { mx:mx, my:my, aim:null, aimPoint:logicalToWorld({x:MOUSE.x,y:MOUSE.y}),   // P4: мӨҢм•„мӣғ л§өм—җм„ңлҸ„ м»Өм„ң=мӣ”л“ң мўҢн‘ң
      fire:MOUSE.down||keysDown.has("KeyZ"), special:MOUSE.rdown, ult:keysDown.has("Space"), reload:false, pick:-1 };
  }
  if(m==="touch"){
    const av=TOUCH.aimVec, al=Math.hypot(av.x,av.y);
    const aiming=TOUCH.aiming && al>0.25;   // лҚ°л“ңмЎҙ вҖ” мӮҙм§қ лӢҝкё°л§Ң н•ҳл©ҙ л°ңмӮ¬ м•Ҳ лҗЁ
    const sp=TOUCH.xTap, ul=TOUCH.cTap, rl=TOUCH.reloadTap, pk=TOUCH.pickTap;
    TOUCH.xTap=false; TOUCH.cTap=false; TOUCH.reloadTap=false; TOUCH.pickTap=-1;
    return { mx:TOUCH.moveVec.x, my:TOUCH.moveVec.y,
      aim: aiming?Math.atan2(av.y,av.x):null, aimPoint:null,
      fire:aiming, special:sp, ult:ul, reload:rl, pick:pk };   // мҡ° мҠӨнӢұ = мЎ°мӨҖ+м—°мӮ¬(лёҢлЎӨмӢқ ліҖнҳ• вҖ” нҷҖл“ң мӨ‘ л°ңмӮ¬)
  }
  // нӮӨліҙл“ң(кё°ліё): кё°мЎҙ лҸҷмһ‘ к·ёлҢҖлЎң вҖ” X/C/RмқҖ keydown кІҪлЎңк°Җ лӢҙлӢ№н•ҳлҜҖлЎң м—¬кё°м„  false
  let mx=0,my=0;
  if(keysDown.has("ArrowUp")) my-=1;
  if(keysDown.has("ArrowDown")) my+=1;
  if(keysDown.has("ArrowLeft")) mx-=1;
  if(keysDown.has("ArrowRight")) mx+=1;
  return { mx:mx, my:my, aim:null, aimPoint:null, fire:keysDown.has("KeyZ"), special:false, ult:false, reload:false, pick:-1 };
}
// лӮҙ мң„м№ҳ кё°мӨҖ м»Өм„ң мЎ°мӨҖк°Ғ(лЎңм»¬/мҳЁлқјмқё мҳҲмёЎ мң„м№ҳ мӮ¬мҡ© вҖ” мҳЁлқјмқё нҢЁнӮ· м „мҶЎмҡ©)
function myAimAngle(it){
  if(typeof it.aim==="number") return it.aim;
  if(!it.aimPoint) return null;
  let px=null, py=null;
  if(gameState===STATE.PLAYING && player){ px=player.x; py=player.y; }
  else if(isTeamOnline()){ const f=(OnlineManager.role==="host")?tFighters[OnlineManager.mySlot]:tPredict; if(f){ px=f.x; py=f.y; } }
  else { const f=(OnlineManager.role==="host")?onlineFighters.host:onlinePredict; if(f){ px=f.x; py=f.y; } }
  if(px===null) return null;
  return Math.atan2(it.aimPoint.y-py, it.aimPoint.x-px);
}
