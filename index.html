/* в”Җв”Җ м—…лҚ°мқҙнҠё в”Җв”Җ */
function rpgUpdate(dt){
  if(!RPG) return;
  const sv=RPG.save;
  if(RPG.banner&&(RPG.banner.t-=dt)<=0) RPG.banner=null;   // ліҙмғҒ л°°л„Ҳ мҲҳлӘ…(POLISH-1)
  if(RPG.ui==="dialog"&&RPG.dialog){
    const d=RPG.dialog, cur=d.lines[d.idx]||"";
    if(d.chars<cur.length) d.chars=Math.min(cur.length, d.chars+RPG_CONST.TYPE_CPS*dt);
    else if(d.pendChoice&&d.idx===d.lines.length-1&&!d.choice){ d.choice={ opts:d.pendChoice.opts, idx:0, cb:d.pendChoice.cb }; d.pendChoice=null; }
    return;
  }
  if(RPG.ui==="sleep"&&RPG.sleep){
    RPG.sleep.t+=dt;
    if(RPG.sleep.t>0.8&&!RPG.sleep.done){ RPG.sleep.done=true; sv.day++; sv.hp=rpgMaxHpFor(sv); rpgOnDayAdvance(); rpgPersist(); }
    if(RPG.sleep.t>3.0){ RPG.ui="field"; RPG.sleep=null; showToast("рҹҢҷ н‘№ мһӨлӢӨ! "+sv.day+"мқјм°Ё м•„м№Ё"); }   // POLISH-2: мҡ”м•Ҫ м№ҙл“ң мӢңк°„ нҸ¬н•Ё
    return;
  }
  if(RPG.ui!=="field"){ RPG.p.moving=false; return; }
  sv.playSec=(sv.playSec||0)+dt;   // POLISH-1: лҰ¬мҠӨнҸ° мӢңкі„ вҖ” н•„л“ңм—җм„ңл§Ң лҲ„м Ғ(көҗмӢӨ кіөм •м„ұ)
  RPG.p.candyCd=Math.max(0,(RPG.p.candyCd||0)-dt);
  RPG.p.squashT=Math.max(0,(RPG.p.squashT||0)-dt);
  RPG.vignT=Math.max(0,(RPG.vignT||0)-dt); RPG.shakeT=Math.max(0,(RPG.shakeT||0)-dt);   // л№„л„ӨнҠёВ·нқ”л“ӨлҰј к°җмҮ (POLISH-2)
  RPG.flashT=Math.max(0,(RPG.flashT||0)-dt);   // QUALITY-1: м „мӢ  н”ҢлһҳмӢң к°җмҮ 
  if(RPG.festival){ const F=RPG.festival; F.t+=dt; F.spawn=(F.spawn||0)-dt;   // QUALITY-1: м—”л”© л¶ҲкҪғ м¶•м ң
    if(F.spawn<=0 && F.t<5.5){ F.spawn=rand(0.22,0.45); const cols=["#ffd93d","#ff8fbf","#8fd0ff","#8ff0b0","#c9a8ff"], col=cols[Math.floor(rand(0,cols.length))]; const cx=rand(160,LOGW-160), cy=rand(130,420);
      for(let i=0;i<14;i++){ const a=rand(0,Math.PI*2), sp=rand(60,220); F.parts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,t:rand(0.7,1.4),col:col}); } }
    for(const q of F.parts){ q.t-=dt; q.x+=q.vx*dt; q.y+=q.vy*dt; q.vy+=130*dt; }
    F.parts=F.parts.filter(q=>q.t>0);
    if(F.t>6.5 && F.parts.length===0) RPG.festival=null; }
  if(RPG.swing&&(RPG.swing.t-=dt)<=0) RPG.swing=null;
  if((RPG.hitstop||0)>0){ RPG.hitstop=Math.max(0,RPG.hitstop-dt); return; }   // нһҲнҠёмҠӨнҶұ: мӣ”л“ң м •м§Җ(мЈјмҠӨ в‘Ў)
  let mx=0,my=0;
  if(keysDown.has("ArrowUp")||keysDown.has("KeyW")) my-=1;
  if(keysDown.has("ArrowDown")||keysDown.has("KeyS")) my+=1;
  if(keysDown.has("ArrowLeft")||keysDown.has("KeyA")) mx-=1;
  if(keysDown.has("ArrowRight")||keysDown.has("KeyD")) mx+=1;
  mx+=RPG.touch.vec.x; my+=RPG.touch.vec.y;
  rpgMove(dt,mx,my);
  rpgCheckWarp();
  if(!RPG) return;   // мӣҢн”„ мӨ‘ rpgExit к°ҖлҠҘм„ұ л°©м–ҙ
  rpgCamUpdate(dt);   // EXPLORE-1: м¶”м Ғ м№ҙл©”лқј(мӣҢн”„ м§Ғнӣ„м—” rpgLoadMapмқҙ мқҙлҜё мҠӨлғ…)
  rpgScanContext();
  // в”Җв”Җ м „нҲ¬ нғҖмқҙлЁёВ·кіөкІ©(Z нҷҖл“ң мһҗлҸҷкіөкІ© В§4.7) в”Җв”Җ
  const p=RPG.p;
  p.attackCd=Math.max(0,p.attackCd-dt); p.invulT=Math.max(0,p.invulT-dt);
  p.dashT=Math.max(0,(p.dashT||0)-dt); p.dashInvulT=Math.max(0,(p.dashInvulT||0)-dt);
  p.skillCd=Math.max(0,(p.skillCd||0)-dt); p.attackT=Math.max(0,(p.attackT||0)-dt);
  if(keysDown.has("KeyZ")||RPG.touch.atkHold) rpgAttack();
  for(const mob of RPG.mobs){ if(!mob.dead) rpgMobUpdate(mob,dt); else if((mob.deadT||0)>0) mob.deadT-=dt; }   // QUALITY-1: мӮ¬л§қ нҢқ нҠёмңҲ к°җмҮ 
  if(!RPG) return;   // н”јкІ© мӮ¬л§қ вҶ’ rpgDieк°Җ л§өмқ„ к°Ҳм•„м№ҳмҡё мҲҳ мһҲмқҢ
  rpgBulletsUpdate(dt);
  for(const d of RPG.drops){
    if(d.got) continue;
    const dd=dist(p.x,p.y,d.x,d.y);
    if(dd<RPG_CONST.DROP_MAGNET&&dd>1){ const pull=(1-dd/RPG_CONST.DROP_MAGNET)*520+140;   // л“ңлһҚ мһҗм„қ(мЈјмҠӨ в‘Ө)
      d.x+=(p.x-d.x)/dd*pull*dt; d.y+=(p.y-d.y)/dd*pull*dt; }
    if(dd<32){ d.got=true; rpgInvAdd(d.itemId,1); playSfx("pick");
      RPG.fx.push({x:d.x,y:d.y-20,t:0.9,text:"+"+rpgNameOf(d.itemId),color:"#8fd0ff"}); }
  }
  RPG.drops=RPG.drops.filter(d=>!d.got);
  for(const f of RPG.fx){   // fx нҢҢнӢ°нҒҙ кІёмҡ©(kind:text/dot/starВ·мӨ‘л Ҙ вҖ” мЈјмҠӨ мқён”„лқј)
    f.t-=dt;
    if(f.kind==="dot"||f.kind==="star"){ f.x+=(f.vx||0)*dt; f.y+=(f.vy||0)*dt; f.vy=(f.vy||0)+(f.g||0)*dt; }
    else f.y-=22*dt;
  }
  RPG.fx=RPG.fx.filter(f=>f.t>0);
  if(RPG.fx.length>120) RPG.fx.splice(0,RPG.fx.length-120);   // мғҒн•ң 120
  if(RPG.map.id==="rpg_village"&&sv.flags.raidOn&&rpgQuestActive("mq06")) rpgRaidLights(dt);   // көҗм°Ём җ 3: л№ӣлӮҳл¬ҙ мЎ°лӘ…
  RPG.p.hurtT=Math.max(0,(RPG.p.hurtT||0)-dt);
  if(RPG.p.hurtT<=0){ const mh=rpgMaxHpFor(sv); if(sv.hp<mh) sv.hp=Math.min(mh, sv.hp+rpgRegenPS()*dt); }   // В§4.1 л№„м „нҲ¬ нҡҢліө(мһҘл№„В·нҢЁмӢңлёҢ л°ҳмҳҒ)
  RPG.autosaveT+=dt;
  if(RPG.autosaveT>=RPG_CONST.AUTOSAVE_IV){ RPG.autosaveT=0; rpgPersist(); }   // В§7.3 нҸҙл°ұ(лҢҖнҷ”В·мғҒм җ мӨ‘м—” лҸ„лӢ¬ м•Ҳ н•Ё)
}

/* в”Җв”Җ RPG-2 м „нҲ¬: лӘ¬мҠӨн„° AI 8нҢЁн„ҙВ·нҳё нҢҗм •В·к·јм ‘ кё°мҠөВ·нғ„/л¶Җл©”лһ‘(нҢЁн„ҙ мқҙмӢқ вҖ” м•„л ҲлӮҳ л№„нҳём¶ң)В·л“ңлһҚВ·мҠӨнӮ¬ в”Җв”Җ */
const RPG_MOB_FACE={ mob_jelly:["рҹ«Ҙ","#4a4468"], mob_hornhop:["рҹҗ°","#8a6dbb"], mob_seedgunner:["рҹҢ°","#7a8a4a"],
  mob_thorn:["рҹҰ”","#5f7a52"], mob_busuri:["рҹӘЈ","#6d7f9b"], mob_moonowl:["рҹҰү","#8a7dbb"],
  mob_shade:["рҹ‘Ө","#3a3454"], mob_boss_munge:["вҳҒпёҸ","#454060"] };
let _rpgMobSeq=0;
function rpgMakeMob(def,x,y){
  return { uid:(++_rpgMobSeq), def:def, id:def.id, x:x, y:y, hx:x, hy:y, hp:def.hp, maxHp:def.hp,
    r:def.isBoss?44:16, facing:rand(0,Math.PI*2), state:"idle", t:rand(0.2,1),
    fireCd:rand(0.8,1.8), touchCd:0, dashCd:0, blinkCd:0, warnT:0, dashVx:0, dashVy:0,
    hitT:0, dead:false, summonCd:6, phase:0 };
}
function rpgMobHas(mob,pat){ return ((mob._patterns)||mob.def.pattern||[]).indexOf(pat)>=0; }   // ліҙмҠӨлҠ” нҺҳмқҙмҰҲлі„ нҢЁн„ҙ мҳӨлІ„лқјмқҙл“ң
function rpgMobMove(mob,dx,dy,dt,spd,ghost){
  const l=Math.hypot(dx,dy); if(l<1||spd<=0) return;
  mob.facing=Math.atan2(dy,dx);
  const nx=mob.x+dx/l*spd*dt, ny=mob.y+dy/l*spd*dt;
  if(ghost){ mob.x=clamp(nx,20,RPG.cols*56-20); mob.y=clamp(ny,20,RPG.rows*56-20); return; }
  if(!rpgCollides(nx,mob.y,mob.r)) mob.x=nx;
  if(!rpgCollides(mob.x,ny,mob.r)) mob.y=ny;
}
function rpgMobUpdate(mob,dt){
  const p=RPG.p, def=mob.def, args=def.patternArgs||{};
  mob.touchCd=Math.max(0,mob.touchCd-dt); mob.hitT=Math.max(0,mob.hitT-dt); mob.blinkCd=Math.max(0,mob.blinkCd-dt);
  if(def.isBoss&&def.phases){   // ліҙмҠӨ 3нҺҳмқҙмҰҲ(В§3.2): нҢЁн„ҙ нҷ•мһҘВ·мҶҢнҷҳВ·лЁ№кө¬лҰ„ мһҘл§ү
    const ratio=mob.hp/mob.maxHp;
    let ph=def.phases.length-1;
    for(let i=0;i<def.phases.length;i++){ if(ratio>def.phases[i].hpAbove){ ph=i; break; } }
    if(ph!==mob.phase){
      mob.phase=ph;
      const bl=(rpgDb().dialogs.boss||{})["phase"+(ph+1)];
      if(bl&&bl.length){ rpgBanner("вҳҒпёҸ "+bl[0]);   // QUALITY-1: 1мӨ„ л°°л„Ҳ(к°ҖлҸ…) + лӮҳлЁём§Җ к°ңк·ёмӨ„ fx н…ҚмҠӨнҠё(м „нҲ¬ л№„мӨ‘лӢЁ)
        for(let bi=1;bi<bl.length;bi++) RPG.fx.push({x:mob.x,y:mob.y-64-bi*24,t:2.6,life:2.6,text:bl[bi],color:"#e6dcff",size:15}); }
      RPG.hitstop=Math.max(RPG.hitstop||0,0.35); RPG.flashT=Math.max(RPG.flashT||0,0.18); RPG.shakeT=Math.max(RPG.shakeT||0,0.14); mob.hitT=0.3;   // нҢҗ м „нҷҳ мһ„нҢ©нҠё
      rpgCelebrate(mob.x,mob.y,"#b39ddb",1.4);
      playSfx("hit");
    }
    mob._patterns=def.phases[ph].patterns||def.pattern;
    RPG.veil=(mob._patterns.indexOf("cloudVeil")>=0);
    const sm=def.phases[ph].summon;
    if(sm){
      mob.summonCd-=dt;
      if(mob.summonCd<=0){
        mob.summonCd=sm.cd||12;
        const live=RPG.mobs.filter(m2=>!m2.dead&&!m2.def.isBoss).length;
        for(let k=0;k<sm.count&&(live+k)<5;k++){ const d3=rpgFind("monsters",sm.monsterId);
          if(d3) RPG.mobs.push(rpgMakeMob(d3, clamp(mob.x+rand(-90,90),40,RPG.cols*56-40), clamp(mob.y+rand(40,100),40,RPG.rows*56-40))); }
        RPG.fx.push({x:mob.x,y:mob.y-60,t:0.8,text:"вҳҒпёҸ мҶҢнҷҳ!",color:"#b39ddb"});
      }
    }
  }
  if(mob.kbx||mob.kby){   // POLISH-1 л„үл°ұ: к°җмҮ В·лІҪ м№ЁнҲ¬ л¶Ҳк°Җ
    const kx=mob.x+mob.kbx*dt, ky=mob.y+mob.kby*dt;
    if(!rpgCollides(kx,mob.y,mob.r)) mob.x=kx;
    if(!rpgCollides(mob.x,ky,mob.r)) mob.y=ky;
    const dk=Math.max(0,1-9*dt); mob.kbx*=dk; mob.kby*=dk;
    if(Math.hypot(mob.kbx,mob.kby)<10){ mob.kbx=0; mob.kby=0; }
  }
  const dP=dist(mob.x,mob.y,p.x,p.y), ghost=rpgMobHas(mob,"ghost");
  const AGGRO=def.isBoss?9999:(RPG.p.warpLock?RPG_CONST.WARP_AGGRO:RPG_CONST.AGGRO);   // POLISH-1: мӣҢн”„ м§Ғнӣ„ кё°мҠө л°©м§Җ(340вҶ’120)
  if(dP<AGGRO&&!RPG.save.flags["met_"+def.id]){   // мІ« мЎ°мҡ° вҖ” лҸ„к°җ мқём§Җ кі„мёө(мқҙлҰ„н‘ң В§1)
    RPG.save.flags["met_"+def.id]=1;
    showToast("рҹ“– мғҲ лӘ¬мҠӨн„° л°ңкІ¬: "+def.name);
  }
  if(rpgMobHas(mob,"dash")){
    mob.dashCd=Math.max(0,mob.dashCd-dt);
    if(mob.state==="warn"){
      mob.warnT-=dt;
      if(mob.warnT<=0){ mob.state="dash"; mob.t=0.45;
        const a=Math.atan2(p.y-mob.y,p.x-mob.x);
        mob.dashVx=Math.cos(a)*(args.dashSpeed||420); mob.dashVy=Math.sin(a)*(args.dashSpeed||420); mob.facing=a; }
    } else if(mob.state==="dash"){
      mob.t-=dt;
      const nx=mob.x+mob.dashVx*dt, ny=mob.y+mob.dashVy*dt;
      if(!rpgCollides(nx,mob.y,mob.r)) mob.x=nx; else mob.t=0;
      if(!rpgCollides(mob.x,ny,mob.r)) mob.y=ny; else mob.t=0;
      if(mob.t<=0){ mob.state="idle"; mob.dashCd=args.dashCd||3; }
    } else {
      if(dP<AGGRO&&mob.dashCd<=0&&dP>90){ mob.state="warn"; mob.warnT=args.warn||0.7; }
      else if(dP<AGGRO&&dP>mob.r+20) rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,def.speed*0.6,ghost);
    }
  } else if(rpgMobHas(mob,"hop")){
    mob.t-=dt;
    if(mob.state==="hop"){ rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,args.hopSpeed||240,ghost);
      if(mob.t<=0){ mob.state="idle"; mob.t=args.restTime||0.85; } }
    else if(mob.t<=0&&dP<AGGRO){ mob.state="hop"; mob.t=args.hopTime||0.35; }
  } else if(rpgMobHas(mob,"turret")){ /* л¶ҷл°•мқҙ */ }
  else if(rpgMobHas(mob,"chase")||ghost){
    if(dP<AGGRO&&dP>mob.r+12) rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,def.speed,ghost);
    else if(dP>=AGGRO&&dist(mob.x,mob.y,mob.hx,mob.hy)>40) rpgMobMove(mob,mob.hx-mob.x,mob.hy-mob.y,dt,def.speed*0.5,ghost);
  }
  if(rpgMobHas(mob,"turret")||rpgMobHas(mob,"fan")){   // мӣҗкұ°лҰ¬ л°ңмӮ¬(н„°лҰҝВ·л¶Җмұ„нғ„)
    mob.fireCd-=dt;
    const rng=args.range||380;
    if(mob.fireCd<=0&&dP<rng+90){
      mob.fireCd=args.fireCd||2;
      const base=Math.atan2(p.y-mob.y,p.x-mob.x); mob.facing=base;
      const n=rpgMobHas(mob,"fan")?(args.fanCount||3):1, spread=deg2rad(args.fanDeg||0);
      for(let i=0;i<n;i++){
        const a=base+(n>1?(-spread/2+spread*i/(n-1)):0);
        RPG.bullets.push({ from:"m", x:mob.x, y:mob.y, vx:Math.cos(a)*(args.bulletSpeed||250), vy:Math.sin(a)*(args.bulletSpeed||250),
          dmg:(def.isBoss?(args.bulletDmg||def.atk):def.atk), traveled:0, range:rng+140, r:7 });
      }
      playSfx("shoot");
    }
  }
  if(dP<mob.r+RPG_CONST.PLAYER_R&&mob.touchCd<=0){   // м ‘мҙү н”јн•ҙ(нғ„/нғҖкІ© 1нҡҢ кё°мӨҖ вҖ” н—ҢмһҘ В§0.4)
    rpgHurtPlayer((mob.state==="dash"&&def.isBoss)?(args.dashDmg||def.atk):def.atk);
    mob.touchCd=0.8;
  }
}
function rpgWeapon(){ return rpgFind("weapons",RPG.save.equip.weapon)||rpgFind("weapons","wp_fist"); }
function rpgAtkPower(){ return RPG_CONST.BASE_ATK+RPG_CONST.ATK_PER_LV*(RPG.save.level-1); }
function rpgJobMod(k,dflt){ const j=rpgFind("jobs",RPG.save.jobId); return (j&&j.statMods&&j.statMods[k])||dflt; }
function rpgDef(){ let d=0; for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.defAdd) d+=a.defAdd; } return d; }
function rpgSpdMul(){
  let m2=1;
  if(RPG){ for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.spdMul) m2*=a.spdMul; }
    m2*=rpgJobMod("spdMul",1);
    if((RPG.p.dashT||0)>0) m2*=1.45; }   // л°ҳм§қ м§ҲмЈј(В§4.5)
  return m2;
}
function rpgRegenPS(){ let ps=RPG_CONST.REGEN_PS; for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.regenAdd) ps+=a.regenAdd; }
  const rsk=rpgFind("skills","sk_starlight_regen");   // B-14: regenTo лҚ°мқҙн„° мӮ¬мҡ©(н•ҳл“ңмҪ”л”© 12 м ңкұ°)
  if(rsk&&RPG.save.skills.indexOf(rsk.id)>=0) ps=Math.max(ps, rsk.regenTo||12);
  return ps; }
function rpgRegenDelay(){ return RPG.save.skills.indexOf("sk_starlight_regen")>=0?2:RPG_CONST.REGEN_DELAY; }
function rpgAutoAim(rangePx){   // мҶҢн”„нҠё мҳӨнҶ нғҖкІҹ: л°”лқјліҙлҠ” л°©н–Ҙ Вұ40В° мөңк·јм ‘(В§4.7), м—Ҷмңјл©ҙ мҙҲк·јм ‘ 80px
  const p=RPG.p; let best=null, bd=1e9;
  for(const mob of RPG.mobs){ if(mob.dead) continue;
    const d=dist(p.x,p.y,mob.x,mob.y); if(d>rangePx) continue;
    let da=Math.atan2(mob.y-p.y,mob.x-p.x)-p.facing; da=Math.atan2(Math.sin(da),Math.cos(da));
    if(Math.abs(da)>deg2rad(40)) continue;
    if(d<bd){ bd=d; best=mob; } }
  if(!best){ for(const mob of RPG.mobs){ if(mob.dead) continue; const d=dist(p.x,p.y,mob.x,mob.y); if(d<80&&d<bd){ bd=d; best=mob; } } }
  return best;
}
function rpgAttack(){
  const p=RPG.p, w=rpgWeapon();
  if(p.attackCd>0||RPG.ui!=="field") return;
  p.attackCd=w.cd; p.attackT=0.18;
  p.hurtT=Math.max(p.hurtT||0, rpgRegenDelay());   // POLISH-1: кіөкІ©лҸ„ нҡҢліө лҰ¬м…Ӣ(м „нҲ¬ мӨ‘ нҡҢліө=мӮ¬нғ•лҝҗ)
  const rngMul=rpgJobMod("rangeMul",1);
  if(w.kind==="melee"){
    const tgt=rpgAutoAim((w.range+34)*rngMul); if(tgt) p.facing=Math.atan2(tgt.y-p.y,tgt.x-p.x);
    playSfx("shoot");
    const arc=deg2rad(w.arcDeg||90)/2, rng=(w.range+16)*rngMul;
    RPG.swing={ t:0.16, dir:p.facing, arc:arc, rng:rng };   // к·јм ‘ мҠӨмңҷ к¶Өм Ғ(мЈјмҠӨ в‘ )
    for(const mob of RPG.mobs){
      if(mob.dead) continue;

function rpgHitMob(mob,dmg,opt){

  if(rpgMobHas(mob,"frontGuard")&&Math.abs(rel)<deg2rad((args.guardDeg||120)/2)) mul*=(1-(args.guardReduce||0.6));   // м •л©ҙ к°Җл“ң(кё°мҠө көҗліҙмһ¬)

  if(!(opt&&opt.noJuice)){   // POLISH-1 мЈјмҠӨ: нһҲнҠёмҠӨнҶұ(лӘ…мӨ‘ 0.03/кё°мҠө 0.05) + л„үл°ұ(140/кё°мҠө 200, ліҙмҠӨ м ңмҷё)

    if(def.isBoss) RPG.shakeT=0.18;   // POLISH-2: нҷ”л©ҙ нқ”л“ӨлҰј(ліҙмҠӨ н•ңм •В·BмҪҳмҶ” нҶ кёҖ)
    if(!def.isBoss){
      const kb=ambushed?200:140, ka=Math.atan2(mob.y-RPG.p.y,mob.x-RPG.p.x);

    const _ka=Math.atan2(mob.y-RPG.p.y,mob.x-RPG.p.x), _hx=mob.x-Math.cos(_ka)*mob.r*0.55, _hy=mob.y-4-Math.sin(_ka)*mob.r*0.55;
    const _sc=ambushed?6:4, _scol=ambushed?"#ffd93d":"#fff2c8";
    for(let i=0;i<_sc;i++){ const a=_ka+Math.PI+rand(-0.9,0.9), sp=rand(70,190);
      RPG.fx.push({kind:"dot",x:_hx,y:_hy,t:rand(0.16,0.32),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,g:140,color:_scol,size:rand(2,4)}); }

  }
  RPG.fx.push({x:mob.x+rand(-10,10),y:mob.y-26,t:0.7,life:0.7,pop:true,text:""+final,color:behind?"#ffd93d":"#ffffff",size:ambushed?20:16});   // кё°мҠө мҲ«мһҗ к°•мЎ°+мӮ°нҸ¬+нҢқмқё(POLISH-2В·QUALITY-1)
  if(RPG.save.skills.indexOf("sk_sparkle_dash")>=0){ const g=rpgFind("skills","sk_sparkle_dash"); RPG.gauge=Math.min((g.gauge&&g.gauge.max)||100,(RPG.gauge||0)+((g.gauge&&g.gauge.perHit)||12)); }
  if(rpgMobHas(mob,"blink")&&mob.hp>0&&mob.blinkCd<=0){   // н”јкІ© мҲңк°„мқҙлҸҷ(мӢ к·ң н”„лҰ¬лҜёнӢ°лёҢ)
    mob.blinkCd=args.blinkCd||3;
    const a=rand(0,Math.PI*2), d2=args.blinkDist||160;

function rpgBulletsUpdate(dt){
  const p=RPG.p;
  for(const b of RPG.bullets){
    if(b.dead) continue;
    if(b.from==="p"){
      if(b.boomer&&b.phase==="back"){
        const a=Math.atan2(p.y-b.y,p.x-b.x), sp=Math.hypot(b.vx,b.vy);
        b.x+=Math.cos(a)*sp*dt; b.y+=Math.sin(a)*sp*dt;
        if(dist(b.x,b.y,p.x,p.y)<26){ b.dead=true; continue; }
      } else {
        b.x+=b.vx*dt; b.y+=b.vy*dt; b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
        const blocked=rpgCollides(b.x,b.y,4);
        if(b.traveled>=b.range||blocked){
          if(b.boomer){ b.phase="back"; b.hitOnce={}; }   // ліөк·Җ мӢң нһҲнҠё мҙҲкё°нҷ” = мҷ•ліө 2нғҖ(В§4.4)
          else b.dead=true;
        }
      }
      if(!b.dead){
        for(const mob of RPG.mobs){
          if(mob.dead||b.hitOnce[mob.uid]) continue;
          if(dist(b.x,b.y,mob.x,mob.y)<mob.r+b.r){
            b.hitOnce[mob.uid]=1; rpgHitMob(mob,b.dmg);
            if(!b.boomer){ b.dead=true; break; }
          }
        }
      }
    } else {
      b.x+=b.vx*dt; b.y+=b.vy*dt; b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
      if(b.traveled>=b.range||rpgCollides(b.x,b.y,4)) b.dead=true;
      else if(dist(b.x,b.y,p.x,p.y)<b.r+RPG_CONST.PLAYER_R){ rpgHurtPlayer(b.dmg); b.dead=true; }
    }
  }
  RPG.bullets=RPG.bullets.filter(b=>!b.dead);
}
function rpgHurtPlayer(dmg){
  const p=RPG.p;

  const final=Math.max(1,Math.round(dmg-rpgDef()));
  RPG.save.hp-=final; p.hurtT=rpgRegenDelay(); p.invulT=0.6; p.squashT=0.18; RPG.vignT=0.35; playSfx("hit");   // мҠӨмҝјмӢң+л№„л„ӨнҠё(мЈјмҠӨ в‘ЈВ·POLISH-2)
  RPG.fx.push({x:p.x,y:p.y-32,t:0.7,text:"вҲ’"+final,color:"#ff7b7b"});
  if(RPG.save.hp<=0) rpgDie();
}

/* EXPLORE-1 м¶”м Ғ м№ҙл©”лқј: лӘ©н‘ң=clamp(н”Ңл Ҳмқҙм–ҙвҲ’л·°нҸ¬нҠё/2) В· lerp(dt*CAM_LERP) В· мӣҢн”„/лЎңл“ң мҰүмӢң мҠӨлғ…(л©ҖлҜё 4кі„лӘ…) */
function rpgCamTarget(){
  const c=RPG.cam;
  return { x:Math.max(0,Math.min(c.maxX,RPG.p.x-616)), y:Math.max(0,Math.min(c.maxY,RPG.p.y-288)) };
}
function rpgCamSnap(){ const t=rpgCamTarget(); RPG.cam.x=t.x; RPG.cam.y=t.y; }
function rpgCamUpdate(dt){
  const L=RPG_CONST.CAM_LERP, c=RPG.cam, t=rpgCamTarget();
  if(L<=0){ c.x=t.x; c.y=t.y; return; }
  const k=Math.min(1, dt*L);
  c.x+=(t.x-c.x)*k; c.y+=(t.y-c.y)*k;
  if(Math.abs(t.x-c.x)<0.5) c.x=t.x;
  if(Math.abs(t.y-c.y)<0.5) c.y=t.y;
}
function rpgOnScreen(x,y,m){ m=m||112; const c=RPG.cam; return x>=c.x-m-c.offX && x<=c.x+1232+m && y>=c.y-m-c.offY && y<=c.y+576+m; }

function rpgItemDescLine(id){   // QUALITY-1: мғҒм җ/мқёлІӨ м•„мқҙн…ң н•ңмӨ„ м„ӨлӘ…(desc + нҡЁкіј мҡ”м•Ҫ)
  if(!id) return "";
  const o=rpgItemAny(id); if(!o) return "";
  let d=o.desc||"";
  const eff=[];
  if(o.healAmt) eff.push("мІҙл Ҙ "+o.healAmt+" нҡҢліө");
  if(o.dmg) eff.push("кіөкІ© "+o.dmg+(o.kind==="ranged"?" мӣҗкұ°лҰ¬":o.kind==="boomerang"?" л¶Җл©”лһ‘":o.kind==="melee"?" к·јм ‘":""));
  if(o.hpAdd) eff.push("мІҙл Ҙ +"+o.hpAdd);
  if(o.defAdd) eff.push("л°©м–ҙ +"+o.defAdd);
  if(o.spdMul&&o.spdMul!==1) eff.push("л№ лҘҙкё° +"+Math.round((o.spdMul-1)*100)+"%");
  if(o.regenAdd) eff.push("нҡҢліө +"+o.regenAdd);
  if(eff.length) d=(d?d+"  ":"")+"гҖ”"+eff.join(" В· ")+"гҖ•";
  return d;
}

// м ҖмһҘлҗң мҳӨлІ„лқјмқҙл“ңлҘј кІҢмһ„ лҚ°мқҙн„°м—җ м Ғмҡ©(л¶ҖнҢ… мӢң 1нҡҢ вҖ” мқҙнӣ„ нҺём§‘мқҖ balSetValueк°Җ мҰүмӢң л°ҳмҳҒ)
function applyBalanceOverrides(){
  const reg=balanceFields(), st=loadBalanceStore();
  for(const id in st){
    const f=reg.byId[id]; if(!f) continue;
    const v=Number(st[id]); if(!isFinite(v)) continue;
    f.set(clamp(v, f.min, f.max));
  }
}
function balSetValue(f, v){
  if(!isFinite(v)) return;
  v=clamp(Math.round(v*1000)/1000, f.min, f.max);
  f.set(v);
  const st=loadBalanceStore();
  if(Math.abs(f.get()-f.def)<1e-9) delete st[f.id]; else st[f.id]=f.get();
  saveBalanceStore(st);
}
function balResetAll(){
  const reg=balanceFields();
  for(const c of reg.cats) for(const f of c.fields) f.set(f.def);
  saveBalanceStore({});
}
function balModifiedCount(){
  const reg=balanceFields(); let n=0;
  for(const c of reg.cats) for(const f of c.fields) if(Math.abs(f.get()-f.def)>1e-9) n++;
  return n;
}
function balFmt(f, v){
  if(v===undefined) v=f.get();
  if(f.fmt==="pct") return Math.round(v*100)+"%";
  const d=(f.dec!==undefined)?f.dec:0;
  return d>0 ? (Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d).replace(/\.?0+$/,"") : String(Math.round(v));
}
function handleBalanceKey(code){
  const reg=balanceFields(), fields=reg.cats[BAL.cat].fields;
  if(BAL.idx>=fields.length) BAL.idx=0;
  const f=fields[BAL.idx];
  if(BAL.edit!==null){                                  // мҲ«мһҗ м§Ғм ‘ мһ…л Ҙ лӘЁл“ң
    if(code==="Escape"){ BAL.edit=null; return; }
    if(code==="Enter"||code==="NumpadEnter"){
      let v=parseFloat(BAL.edit);
      if(isFinite(v)){ if(f.fmt==="pct") v=v/100; balSetValue(f, v); showToast(f.label+" = "+balFmt(f)); }
      BAL.edit=null; return;
    }
    if(code==="Backspace"){ BAL.edit=BAL.edit.slice(0,-1); return; }
    const dm=code.match(/^(?:Digit|Numpad)(\d)$/);
    if(dm){ if(BAL.edit.length<8) BAL.edit+=dm[1]; return; }
    if((code==="Period"||code==="NumpadDecimal") && BAL.edit.indexOf(".")<0){ BAL.edit+="."; return; }
    return;
  }
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  if(code==="KeyQ"){ BAL.cat=(BAL.cat+reg.cats.length-1)%reg.cats.length; BAL.idx=0; BAL.scroll=0; return; }
  if(code==="KeyE"){ BAL.cat=(BAL.cat+1)%reg.cats.length; BAL.idx=0; BAL.scroll=0; return; }
  if(code==="ArrowUp"){ BAL.idx=(BAL.idx+fields.length-1)%fields.length; return; }
  if(code==="ArrowDown"){ BAL.idx=(BAL.idx+1)%fields.length; return; }
  if(code==="ArrowLeft"||code==="ArrowRight"){ balSetValue(f, f.get()+(code==="ArrowRight"?1:-1)*f.step); return; }
  if(code==="Enter"||code==="NumpadEnter"){ BAL.edit=""; return; }
  if(code==="KeyR"){ balSetValue(f, f.def); showToast(f.label+" кё°ліёк°’ ліөмӣҗ ("+balFmt(f,f.def)+")"); return; }
  if(code==="KeyF"){
    if(uiTime-BAL.confirmReset<2){ balResetAll(); BAL.confirmReset=-99; showToast("лӘЁл“  мҲҳм№ҳлҘј кё°ліёк°’мңјлЎң мҙҲкё°нҷ”н–Ҳм–ҙмҡ”"); }
    else { BAL.confirmReset=uiTime; showToast("н•ң лІҲ лҚ” FлҘј лҲ„лҘҙл©ҙ м „мІҙ мҙҲкё°нҷ”"); }
    return;
  }
}
// н–ү м•„мқҙмҪҳ(мәҗлҰӯн„° мҠӨн”„лқјмқҙнҠё/лӘ¬мҠӨн„° мқҙлҜём§Җ В· м—Ҷмңјл©ҙ мғү мӣҗ)
function balDrawIcon(icon, x, y, r){
  if(!icon) return;
  ctx.save(); ctx.translate(x,y);
  let drew=false;
  if(icon.kind==="char") drew=drawCharacterSprite(icon.id, r, 0, {});
  else if(icon.kind==="monster"){
    const img=getMonsterImage(icon.id);
    if(img){ const iw=img.naturalWidth||1, ih=img.naturalHeight||1, dh=r*2.6, dw=dh*(iw/ih);
      ctx.drawImage(img, -dw/2, r*0.9-dh, dw, dh); drew=true; }

  let nm=null; try{ nm=window.prompt("мҠ¬лЎҜ "+(i+1)+"м—җ м ҖмһҘн•  мқҙлҰ„ (л№„мҡ°л©ҙ мһҗлҸҷ)"); }catch(e){}
  if(nm===null) return;                       // м·ЁмҶҢ
  nm=(""+nm).trim().slice(0,10);
  if(!nm) nm=(ED.pf?"м җн”„ л§ө":getRule(ED.mode).name+" л§ө");
  const sl=edLoadSlots();
  sl[i]={ name:nm, mode:ED.mode, modeIdx:ED.modeIdx, sizeIdx:ED.sizeIdx, floorIdx:ED.floorIdx,
          cols:ED.cols, rows:ED.rows, half:ED.half, cells:ED.cells.map(r=>r.slice()), savedAt:Date.now() };
  edSaveSlots(sl);
  ED.slot.confirm=-1; ED.slot.flashIdx=i; ED.slot.flashUntil=uiTime+1.4;
  ED.slot.list=sl;   // PERF-2: мҳӨлІ„л Ҳмқҙ л ҢлҚ” мәҗмӢң к°ұмӢ 
  showToast("рҹ’ҫ мҠ¬лЎҜ "+(i+1)+"м—җ м ҖмһҘн–Ҳм–ҙмҡ”!"); playSfx("buff");
}
function edSlotLoad(i){
  const s=(ED.slot.list||edLoadSlots())[i]; if(!s){ ED.slot.msg="л№Ҳ мҠ¬лЎҜмқҙм—җмҡ”"; return; }
  ED.mode=s.mode; ED.modeIdx=s.modeIdx||0; ED.sizeIdx=s.sizeIdx||0; ED.floorIdx=s.floorIdx||0;
  ED.cols=s.cols; ED.rows=s.rows; ED.half=s.half; ED.cells=s.cells.map(r=>r.slice());
  ED.pf=(s.mode==="platformer"); ED.step="edit"; ED.undo=[]; ED.testCleared=false;
  ED.viewC=0; ED.fitAll=false; ED.cur={c:1, r:Math.min(ED.rows-1,4)}; ED.palIdx=1;
  edSaveDraft(); ED.slot=null;
  showToast("рҹ“Ӯ гҖҢ"+(s.name||"л§ө")+"гҖҚ л¶Ҳлҹ¬мҷ”м–ҙмҡ”");
}
function handleSlotKey(code){
  const S=ED.slot, sl=S.list||(S.list=edLoadSlots());   // PERF-2
  if(code==="Escape"||code==="KeyS"){ ED.slot=null; return; }
  if(code==="ArrowUp"){ S.idx=(S.idx+4)%5; S.confirm=-1; S.msg=""; return; }
  if(code==="ArrowDown"){ S.idx=(S.idx+1)%5; S.confirm=-1; S.msg=""; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    if(sl[S.idx] && S.confirm!==S.idx){ S.confirm=S.idx; S.msg="вҡ  лҚ®м–ҙм“°л Өл©ҙ н•ң лІҲ лҚ” Enter"; return; }
    edSlotSave(S.idx); return;
  }
  if(code==="KeyL"){ edSlotLoad(S.idx); return; }
  if(code==="KeyX"||code==="Delete"||code==="Backspace"){
    if(!sl[S.idx]) return;
    if(S.confirm!==100+S.idx){ S.confirm=100+S.idx; S.msg="вҡ  мӮӯм ңн•ҳл Өл©ҙ н•ң лІҲ лҚ” X"; return; }
    sl[S.idx]=null; edSaveSlots(sl); S.list=sl; S.confirm=-1; S.msg=""; showToast("рҹ—‘ мҠ¬лЎҜ "+(S.idx+1)+" л№„мӣ м–ҙмҡ”");
    return;
  }
}
function drawSlotOverlay(){
  const S=ED.slot, sl=S.list||(S.list=edLoadSlots());   // PERF-2: н”„л Ҳмһ„лӢ№ JSON.parse м ңкұ°
  dimScreen(0.72);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#9fe0ff"; ctx.font="bold 30px 'Malgun Gothic',sans-serif"; ctx.fillText("рҹ’ҫ м ҖмһҘ мҠ¬лЎҜ", LOGW/2, 84);
  ctx.font="14px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#aab4e0";
  ctx.fillText("Enter м ҖмһҘ В· L л¶Ҳлҹ¬мҳӨкё° В· X мӮӯм ң В· Esc лӢ«кё°", LOGW/2, 118);
  const bw=680, bh=84, bx=LOGW/2-bw/2;
  for(let i=0;i<5;i++){
    const s=sl[i], y=150+i*(bh+10), sel=(i===S.idx);
    const flash=(S.flashIdx===i && uiTime<S.flashUntil) ? (0.5+0.5*Math.sin(uiTime*10)) : 0;
    ctx.fillStyle=sel?"rgba(95,160,255,0.28)":"rgba(16,22,52,0.92)"; roundRect(bx,y,bw,bh,12); ctx.fill();
    ctx.strokeStyle=flash>0?("rgba(255,224,102,"+(0.5+0.5*flash)+")"):(sel?"#9fe0ff":"#44507e");
    ctx.lineWidth=flash>0?3:(sel?2.5:1.5); roundRect(bx,y,bw,bh,12); ctx.stroke();
    ctx.textAlign="left";
    if(s){
      // лҜёлӢҲ мҚёл„Өмқј
      const tw=150, th=bh-20, cw=tw/s.cols, chh=th/s.rows;
      ctx.fillStyle="#141a3e"; ctx.fillRect(bx+14, y+10, tw, th);
      for(let r=0;r<s.rows;r++){ const line=s.cells[r];
        for(let c=0;c<s.cols;c++){ const ch=(c<s.half)?line[c]:line[s.cols-1-c]; if(!ch||ch===".") continue;
          ctx.fillStyle=ED_CELL_COLOR[ch]||"#888";
          ctx.fillRect(bx+14+c*cw, y+10+r*chh, Math.max(1,cw), Math.max(1,chh)); } }
      ctx.fillStyle=sel?"#ffe066":"#dfe6ff"; ctx.font="bold 18px 'Malgun Gothic',sans-serif";
      ctx.fillText((i+1)+". "+(s.name||"л§ө"), bx+182, y+24);
      ctx.fillStyle="#8fa2d6"; ctx.font="13px 'Malgun Gothic',sans-serif";
      const d=new Date(s.savedAt);
      ctx.fillText((s.mode==="platformer"?"рҹҰҳ лі„л№ӣ м җн”„":getRule(s.mode).name)+" В· "+s.cols+"Г—"+s.rows
        +" В· "+(d.getMonth()+1)+"/"+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+" м ҖмһҘ", bx+182, y+52);
    } else {
      ctx.fillStyle=sel?"#ffe066":"#5b6690"; ctx.font="bold 17px 'Malgun Gothic',sans-serif";
      ctx.fillText((i+1)+". (л№„м–ҙ мһҲмқҢ)", bx+24, y+bh/2);
    }
    ctx.textAlign="center";
  }
  if(S.msg){ ctx.fillStyle="#ffd23f"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.fillText(S.msg, LOGW/2, 150+5*(bh+10)+16); }
  // TOUCH: мҠ¬лЎҜ м•Ўм…ҳ лІ„нҠј(м ҖмһҘВ·л¶Ҳлҹ¬мҳӨкё°В·мӮӯм ңВ·лӢ«кё°) вҖ” edSlotHitм—җм„ң нҢҗм •
  const ay=150+5*(bh+10)+30;
  S._btns=[ {label:"рҹ’ҫ м ҖмһҘ", fn:function(){ edSlotSave(S.idx); }}, {label:"рҹ“Ӯ л¶Ҳлҹ¬мҳӨкё°", fn:function(){ edSlotLoad(S.idx); }},
            {label:"рҹ—‘ мӮӯм ң", fn:function(){ if(S.confirm!==S.idx){ S.confirm=S.idx; S.msg="вҡ  м§Җмҡ°л Өл©ҙ н•ң лІҲ лҚ”"; } else { const l=edLoadSlots(); l[S.idx]=null; edSaveSlots(l); S.list=l; S.confirm=-1; S.msg="мӮӯм ңлҗҗм–ҙмҡ”"; } }},
            {label:"вң• лӢ«кё°", fn:function(){ ED.slot=null; }} ];
  let sbx=bx;
  for(const b of S._btns){ b.w=170; b.h=40; b.x=sbx; b.y=ay; sbx+=b.w+(bw-170*4)/3;
    ctx.fillStyle="rgba(95,160,255,0.22)"; roundRect(b.x,b.y,b.w,b.h,9); ctx.fill();
    ctx.strokeStyle="#6678b0"; ctx.lineWidth=1.5; roundRect(b.x,b.y,b.w,b.h,9); ctx.stroke();
    ctx.fillStyle="#dfe6ff"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(b.label, b.x+b.w/2, b.y+b.h/2); }
  S._slotY=150; S._slotBh=bh; S._slotBx=bx; S._slotBw=bw;
  ctx.restore();
}
function edSlotHit(p){   // TOUCH: мҠ¬лЎҜ мҳӨлІ„л Ҳмқҙ нҒҙлҰӯ(мҠ¬лЎҜ м„ нғқ + м•Ўм…ҳ лІ„нҠј)
  const S=ED&&ED.slot; if(!S) return false;
  for(const b of (S._btns||[])){ if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ b.fn(); return true; } }
  for(let i=0;i<5;i++){ const y=(S._slotY||150)+i*((S._slotBh||84)+10);
    if(p.x>=(S._slotBx||0)&&p.x<=(S._slotBx||0)+(S._slotBw||680)&&p.y>=y&&p.y<=y+(S._slotBh||84)){ S.idx=i; S.confirm=-1; S.msg=""; return true; } }
  return false;
}
function openEditor(){
  const d=edLoadDraft();
  if(d){   // C8: мқҙм „ мҙҲм•Ҳ ліөмӣҗ вҖ” мӢӨмҲҳлЎң лӮҳк°ҖлҸ„ мқҙм–ҙм„ң
    ED={ step:"edit", modeIdx:d.modeIdx||0, sizeIdx:d.sizeIdx||0, floorIdx:d.floorIdx||0, mode:d.mode||"tdm",
         cols:d.cols, rows:d.rows, half:d.half, cells:d.cells, cur:{c:2,r:Math.floor(d.rows/2)}, palIdx:1,
         pf:(d.mode==="platformer"), viewC:0, fitAll:false, testCleared:false,   // мң кё°м„ұ: нҢҢмғқ pf мһ¬лҸ„м¶ң(лі„л№ӣм җн”„ мҙҲм•Ҳмқҙ нғ‘лӢӨмҡҙмңјлЎң ліөмӣҗлҗҳлҚҳ кІғ н•ҙмҶҢ)
         msg:"мқҙм „ мҙҲм•Ҳмқ„ ліөмӣҗн–Ҳм–ҙмҡ” (N: мғҲлЎң л§Ңл“Өкё°)", undo:[], mbtn:0 };
  } else {
    ED={ step:"mode", modeIdx:0, sizeIdx:0, floorIdx:0, mode:"tdm",
         cols:22, rows:10, half:11, cells:null, cur:{c:1,r:4}, palIdx:1, msg:"", undo:[], mbtn:0 };
  }
  gameState=STATE.EDITOR;
}
function edSizes(){ return (ED && ED.mode==="platformer") ? PF_SIZES : ED_SIZES; }
function edStartGrid(){
  if(!ED.mode || ED.mode==="tdm") ED.mode=EDITOR_MODES[ED.modeIdx].id;
  const sz=edSizes()[ED.sizeIdx];
  ED.cols=sz.cols; ED.rows=sz.rows;
  ED.pf=(ED.mode==="platformer");
  ED.half=ED.pf ? ED.cols : ED.cols/2;                    // н”Ңлһ«нҸ¬лЁё = лҜёлҹ¬ м—ҶмқҢ(м „мІҙ нҸӯ нҺём§‘)
  ED.cells=[]; for(let r=0;r<ED.rows;r++){ const row=[]; for(let c=0;c<ED.half;c++) row.push("."); ED.cells.push(row); }
  if(ED.pf){
    for(let c=0;c<ED.cols;c++) ED.cells[ED.rows-1][c]="#";   // мӢңмһ‘мҡ© л°”лӢҘ н•ң мӨ„
    ED.cells[ED.rows-2][1]="*"; ED.cells[ED.rows-2][ED.cols-2]="G";
    ED.viewC=0; ED.fitAll=false; ED.testCleared=false;
    ED.cur={c:2, r:ED.rows-2};
  } else if(ED.mode==="tag"){   // мҲ лһҳ=к°ңмқё мӢңмһ‘м җ 3к°ң(лҢҖм№ӯ вҶ’ мўҢ3+лҜёлҹ¬3=6)
    const mid=Math.floor(ED.rows/2);
    ED.cells[Math.max(0,mid-3)][1]="@"; ED.cells[mid][1]="@"; ED.cells[Math.min(ED.rows-1,mid+3)][1]="@";
    ED.cur={c:2, r:mid};
  } else {
    ED.cells[Math.floor(ED.rows/2)][1]="*";                 // кё°ліё мӢңмһ‘м җ(мҷјмӘҪ мӨ‘лӢЁ) вҖ” мқҙлҸҷ к°ҖлҠҘ
    ED.cur={c:2, r:Math.floor(ED.rows/2)};
  }
  ED.palIdx=1; ED.msg="";
  ED.undo=[]; ED.mbtn=0;
  ED.step="edit"; edSaveDraft();
}
/* BIG-BATCH-1 C9: м—җл””н„° л§Ҳмҡ°мҠӨ вҖ” мўҢнҒҙлҰӯ/л“ңлһҳк·ё л°°м№ҳВ·мҡ°нҒҙлҰӯ/л“ңлһҳк·ё м§Җмҡ°кё°В·нҢ”л ҲнҠё нҒҙлҰӯ. к·ёлҰ¬л“ң м§ҖмҳӨл©”нҠёлҰ¬ кіөмҡ©. */
function edGridGeom(){
  const CS=STUDENT_CELL, panelW=250, gx0=panelW+30, availW=LOGW-gx0-24, availH=LOGH-186;
  if(ED.pf && !ED.fitAll){
    // н”Ңлһ«нҸ¬лЁё: м„ёлЎң л§һм¶Ө мҠӨмјҖмқј + к°ҖлЎң мҠӨнҒ¬лЎӨ м°Ҫ(В§3.8)
    const sc=Math.min(0.9, availH/(ED.rows*CS));
    const cs=CS*sc, viewCols=Math.max(4, Math.floor(availW/cs));
    ED.viewC=clamp(ED.viewC||0, 0, Math.max(0, ED.cols-viewCols));
    return { sc:sc, cs:cs, gx:gx0, gy:132, gw:Math.min(ED.cols,viewCols)*cs, gh:ED.rows*cs, viewC:ED.viewC, viewCols:viewCols, pf:true };
  }
  const sc=Math.min(1, availW/(ED.cols*CS), availH/(ED.rows*CS));
  const gw=ED.cols*CS*sc, gh=ED.rows*CS*sc;
  return { sc:sc, cs:CS*sc, gx:gx0+(availW-gw)/2, gy:ED.pf?132:96+(availH-gh)/2, gw:gw, gh:gh, viewC:0, viewCols:ED.cols, pf:!!ED.pf };
}
function edAutoScroll(){
  if(!ED.pf || ED.fitAll) return;
  const G=edGridGeom(), vc=G.viewCols;
  if(ED.cur.c < G.viewC+2) ED.viewC=Math.max(0, ED.cur.c-2);
  else if(ED.cur.c > G.viewC+vc-3) ED.viewC=Math.min(Math.max(0,ED.cols-vc), ED.cur.c-vc+3);
}
function edTestBtnHit(p){   // EDIT-TEST-1: лҜёлҰ¬н•ҳкё° лІ„нҠј + нҺём§‘ лҸ„кө¬ лІ„нҠј нҒҙлҰӯ нҢҗм •(л§Ҳмҡ°мҠӨВ·н„°м№ҳ кіөмҡ©)
  if(!ED) return false;
  for(const b of (ED._btns||[])){   // TOUCH: нҺём§‘ лҸ„кө¬(м ңм¶ңВ·мҠ¬лЎҜВ·лҗҳлҸҢлҰ¬кё°В·л°”лӢҘВ·мғҲлЎңВ·лӮҳк°Җкё°)
    if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){ b.fn(); return true; }
  }
  const b=ED._testBtn; if(!b) return false;
  if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
    if(ED.pf){ const v=validateEditorMap(); if(!v.ok){ ED.msg="вҡ  "+v.msg; return true; } pfStartLevel({ id:"__edtest", name:"н…ҢмҠӨнҠё", rows:ED.cells.map(r=>r.join("")) }, {test:true}); }
    else edStartTest();
    return true;
  }
  return false;
}
function edMouseDown(e){
  const p=canvasToLogical(e.clientX,e.clientY);
  const pal=edPalette();
  if(ED.slot){ edSlotHit(p); return; }                      // TOUCH: мҠ¬лЎҜ мҳӨлІ„л Ҳмқҙ м—ҙлҰј мӨ‘м—” мҠ¬лЎҜл§Ң
  if(edTestBtnHit(p)) return;                                // EDIT-TEST-1: лҜёлҰ¬н•ҳкё°В·нҺём§‘ лҸ„кө¬ лІ„нҠј
  if(p.x>=24 && p.x<=250){   // нҢ”л ҲнҠё нҒҙлҰӯмңјлЎң м„ нғқ
    for(let i=0;i<pal.length;i++){ const py=134+i*34; if(p.y>=py-14 && p.y<=py+16){ ED.palIdx=i; return; } }
  }
  ED.mbtn=(e.button===2)?2:1;
  edPaintAt(p);
}
function edPaintAt(p){
  const g=edGridGeom();
  let c=(g.viewC||0)+Math.floor((p.x-g.gx)/g.cs), r=Math.floor((p.y-g.gy)/g.cs);
  if(r<0 || r>=ED.rows || c<0 || c>=ED.cols) return;
  if(!ED.pf && c>=ED.half) c=ED.cols-1-c;                  // мҳӨлҘёмӘҪ(лҜёлҹ¬)мқ„ лҲҢлҹ¬лҸ„ мӣҗліё м№ё нҺём§‘(н”Ңлһ«нҸ¬лЁёлҠ” лҜёлҹ¬ м—ҶмқҢ)
  ED.cur={c:c, r:r};
  const ch=(ED.mbtn===2)?"." : edPalette()[ED.palIdx].ch;
  if(ED.cells[r][c]===ch) return;
  edSnapshot();
  if(ch===".") ED.cells[r][c]="."; else edPlace(ch);
  edSaveDraft();
}
function edPlace(ch){
  const {c,r}=ED.cur;
  if(ch==="*"){ for(let rr=0;rr<ED.rows;rr++) for(let cc=0;cc<ED.half;cc++) if(ED.cells[rr][cc]==="*") ED.cells[rr][cc]=".";
  } else if(ch==="O"||ch==="X"||ch==="G"){ for(let rr=0;rr<ED.rows;rr++) for(let cc=0;cc<ED.half;cc++) if(ED.cells[rr][cc]===ch) ED.cells[rr][cc]="."; }
  ED.cells[r][c]=ch; ED.msg="";
}
function handleEditorKey(code){
  if(!ED) { gameState=STATE.START; return; }
  if(ED.step==="mode"){
    if(code==="Escape"){ goToStartScreen(); return; }
    if(code==="ArrowUp"){ ED.modeIdx=(ED.modeIdx+EDITOR_MODES.length-1)%EDITOR_MODES.length; return; }
    if(code==="ArrowDown"){ ED.modeIdx=(ED.modeIdx+1)%EDITOR_MODES.length; return; }
    if(code==="Enter"||code==="NumpadEnter"){ ED.mode=EDITOR_MODES[ED.modeIdx].id; ED.sizeIdx=0; ED.step="size"; return; }
    return;
  }
  if(ED.step==="size"){
    const szs=edSizes();
    if(code==="Escape"){ ED.step="mode"; return; }
    if(code==="ArrowUp"){ ED.sizeIdx=(ED.sizeIdx+szs.length-1)%szs.length; return; }
    if(code==="ArrowDown"){ ED.sizeIdx=(ED.sizeIdx+1)%szs.length; return; }
    if(code==="Enter"||code==="NumpadEnter"){ edStartGrid(); return; }
    return;
  }
  // step === "edit"
  if(ED.slot){ handleSlotKey(code); return; }               // BIG-BATCH-2 P1-A: м ҖмһҘ мҠ¬лЎҜ м—ҙлҰј вҶ’ мҠ¬лЎҜ нӮӨл§Ң
  const pal=edPalette();
  if(code==="KeyS"){ ED.slot={idx:0, confirm:-1, msg:"", flashIdx:-1, flashUntil:0, list:edLoadSlots()}; return; }   // P1-A: м ҖмһҘ мҠ¬лЎҜ(PERF-2: лӘ©лЎқмқҖ м—ҙ л•Ң 1нҡҢ лЎңл“ң)
  if(code==="Escape"){ goToStartScreen(); return; }         // C8: мҙҲм•Ҳ мһҗлҸҷм ҖмһҘмқҙ мһҲм–ҙ лӮҳк°ҖлҸ„ мҶҢмӢӨ м—ҶмқҢ(лӢӨмӢң м—ҙл©ҙ ліөмӣҗ)
  if(code==="ArrowUp"){ ED.cur.r=(ED.cur.r+ED.rows-1)%ED.rows; return; }
  if(code==="ArrowDown"){ ED.cur.r=(ED.cur.r+1)%ED.rows; return; }
  if(code==="ArrowLeft"){ ED.cur.c=(ED.cur.c+ED.half-1)%ED.half; edAutoScroll(); return; }
  if(code==="ArrowRight"){ ED.cur.c=(ED.cur.c+1)%ED.half; edAutoScroll(); return; }
  if(ED.pf && code==="Tab"){ ED.fitAll=!ED.fitAll; return; }                     // В§3.8 м „мІҙліҙкё° нҶ кёҖ
  if(ED.pf && (code==="ArrowLeft"||code==="ArrowRight") && (keysDown.has("ShiftLeft")||keysDown.has("ShiftRight"))){
    const G=edGridGeom(), vc=Math.max(4, Math.floor(G.viewCols||10));
    ED.viewC=clamp((ED.viewC||0)+(code==="ArrowRight"?vc:-vc), 0, Math.max(0,ED.cols-vc));
    ED.cur.c=clamp(ED.cur.c, ED.viewC, ED.viewC+vc-1);
    return;
  }
  if(ED.pf && code==="KeyT"){                                                    // В§3.8 н…ҢмҠӨнҠён”Ңл Ҳмқҙ вҶ’ нҒҙлҰ¬м–ҙн•ҙм•ј м ңм¶ң
    const v=validateEditorMap();
    if(!v.ok){ ED.msg="вҡ  "+v.msg; return; }
    pfStartLevel({ id:"__edtest", name:"н…ҢмҠӨнҠё", rows:ED.cells.map(r=>r.join("")) }, {test:true});
    return;
  }
  if(!ED.pf && code==="KeyT"){ edStartTest(); return; }                          // EDIT-TEST-1: м•„л ҲлӮҳ лҜёлҰ¬н•ҳкё°(лӮҳ+лҙҮ1)
  if(code==="KeyQ"){ ED.palIdx=(ED.palIdx+pal.length-1)%pal.length; return; }
  if(code==="KeyE"||(!ED.pf&&code==="Tab")){ ED.palIdx=(ED.palIdx+1)%pal.length; return; }
  if(code==="KeyF"){ ED.floorIdx=(ED.floorIdx+1)%FLOOR_THEME_LIST.length; edSaveDraft(); return; }   // л°”лӢҘ н…Ңл§Ҳ мҲңнҷҳ
  if(code==="KeyZ"||code==="Space"){ edSnapshot(); edPlace(pal[ED.palIdx].ch); edSaveDraft(); return; }
  if(code==="KeyX"||code==="Backspace"||code==="Delete"){ edSnapshot(); ED.cells[ED.cur.r][ED.cur.c]="."; edSaveDraft(); return; }
  if(code==="KeyU"){ edUndo(); return; }                    // C8: лҗҳлҸҢлҰ¬кё°
  if(code==="KeyN"){ edClearDraft(); ED.step="mode"; ED.msg=""; showToast("мғҲ л§ө л§Ңл“Өкё°"); return; }   // мғҲлЎң мӢңмһ‘
  if(code==="Enter"||code==="NumpadEnter"){ edSubmit(); return; }
}
/* кІҖмҰқ(4-6): мӢңмһ‘м җ 1к°ң В· лӘЁл“ң мҡ”мҶҢ В· м—°кІ°м„ұ(н”Ңлҹ¬л“ңн•„) В· лІҪвүӨ25% В· н’ҖмҲІвүӨ15% */
function validateEditorMap(){
  if(ED.pf){   // GENRE-EXPAND-1 В§3.8: мӢңмһ‘В·кіЁ к°Ғ 1 н•„мҲҳ(лҸ„лӢ¬м„ұмқҖ н…ҢмҠӨнҠён”Ңл Ҳмқҙ кІҢмқҙнҠёк°Җ ліҙмһҘ)
    let st=0, gl=0, fl=0;
    for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
      const ch=ED.cells[r][c];
      if(ch==="*") st++; else if(ch==="G") gl++; else if(ch==="F") fl++;
    }
    if(st!==1) return {ok:false, msg:"мӢңмһ‘м җ(*)мқҙ м •нҷ•нһҲ 1к°ң н•„мҡ”н•ҙмҡ”"};
    if(gl!==1) return {ok:false, msg:"кіЁ(G)мқҙ м •нҷ•нһҲ 1к°ң н•„мҡ”н•ҙмҡ”"};
    if(ED.cols>=66 && fl===0) return {ok:true, warn:"кёҙ л§өм—” к№ғл°ң(F) мІҙнҒ¬нҸ¬мқёнҠёлҘј м¶”мІңн•ҙмҡ”"};
    return {ok:true};
  }
  let stars=0, walls=0, bushes=0, modeCh=0, tagStarts=0, auxT=0;
  const isTag=(ED.mode==="tag");
  const need={siege:"X", hotzone:"O", stargrab:"G"}[ED.mode]||null;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
    const ch=ED.cells[r][c];
    if(ch==="*") stars++;
    if(ch==="@") tagStarts++;
    if(ch==="Y") auxT++;
    if(ch==="W"||ch==="C") walls++;
    if(ch==="B") bushes++;
    if(need && ch===need) modeCh++;
  }
  if(isTag){ if(tagStarts!==3) return {ok:false, msg:"к°ңмқё мӢңмһ‘м җ(@)мқ„ м •нҷ•нһҲ 3к°ң лҶ“мңјм„ёмҡ” (л°ҳлҢҖнҺёмқҖ мһҗлҸҷ лҢҖм№ӯ)"}; }
  else if(stars!==1) return {ok:false, msg:"нҢҖ мӢңмһ‘м җ(вҳ…)мқҙ м •нҷ•нһҲ 1к°ң н•„мҡ”н•ҙмҡ”"};
  if(need && modeCh!==1) return {ok:false, msg:"мқҙ лӘЁл“ңмқҳ лӘ©н‘ң мҡ”мҶҢ("+need+")лҘј 1к°ң л°°м№ҳн•ҳм„ёмҡ”"};
  if(ED.mode==="siege" && auxT>3) return {ok:false, msg:"ліҙмЎ° мҲҳм •нғ‘(Y)мқҖ мөңлҢҖ 3к°ңк№Ңм§ҖмҳҲмҡ”"};
  // QUALITY-SWEEP-1 м¶•20: м•…м„ұ л°°м№ҳ л°©м§Җ вҖ” мӢңмһ‘м җ мЈјліҖ 8м№ём—җлҠ” н•Ём •(к°ҖмӢң/лҒҲлҒҲмқҙ/м–јмқҢ) кёҲм§Җ(нғңм–ҙлӮҳмһҗл§Ҳмһҗ н”јн•ҙ л°©м§Җ)
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
    const sch=ED.cells[r][c]; if(sch!=="*"&&sch!=="@") continue;   // мӢңмһ‘м җ(* лҳҗлҠ” мҲ лһҳ @)
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr, nc=c+dc;
      if(nr<0||nc<0||nr>=ED.rows||nc>=ED.half) continue;
      const nch=ED.cells[nr][nc];
      if(nch==="S"||nch==="L"||nch==="I") return {ok:false, msg:"мӢңмһ‘м җ л°”лЎң мҳҶм—җлҠ” н•Ём •мқ„ л‘ҳ мҲҳ м—Ҷм–ҙмҡ”"};
    }
  }
  // FREE-MAP: н’ҖмҲІВ·лІҪ л°ҖлҸ„лҠ” 'л°ёлҹ°мҠӨ' м ңн•ңмқҙлқј м»Ём…үл§өмқ„ л§үм§Җ м•ҠлҸ„лЎқ кІҪкі лЎңл§Ң(л§үлҠ” кұҙ м§„м§ң лӘ» л…ёлҠ” л§өлҝҗ).
  // мҲҳн’Җ=мқҖмӢ мІҳ(л„Ҳл¬ҙ л§Һмңјл©ҙ лӢӨ мҲЁм–ҙ кІҪкё° лҠҳм–ҙм§җ)В·лІҪ=лҜёлЎң/мӢңм•јл§үнһҳ. к·ёлһҳлҸ„ л§Ңл“Өкі  мӢ¶мңјл©ҙ л§Ңл“Ө мҲҳ мһҲкІҢ.
  const total=ED.rows*ED.cols, wallPct=walls*2/total, bushPct=bushes*2/total, warns=[];
  if(wallPct>0.25) warns.push("лІҪмқҙ л§ҺмқҖ нҺёмқҙм—җмҡ”("+Math.round(wallPct*100)+"%) вҖ” мӢңм•јк°Җ мўҒкі  мўҒмқҖ нҶөлЎңк°Җ мғқкІЁмҡ”");
  if(bushPct>0.15) warns.push("н’ҖмҲІмқҙ л§ҺмқҖ нҺёмқҙм—җмҡ”("+Math.round(bushPct*100)+"%) вҖ” мҲЁмқ„ кіімқҙ л§Һм•„ м°ҫкё° м–ҙл Өмҡҙ л§өмқҙм—җмҡ”");
  // лӘЁл“ң нҠ№м„ұ: м№ н•ҳкё°=м№  к°ҖлҠҘ л©ҙм Ғ, мҲ лһҳ=мҲҳн’Җ мөңмҶҢм№ҳ (м „л¶Җ кІҪкі  вҖ” м ңмһ‘ мһҗмң )
  if(ED.mode==="paint"){
    let occ=0;
    for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){ const ch=ED.cells[r][c]; if(ch!=="."&&ch!=="*"&&ch!=="O"&&ch!=="G"&&ch!=="X") occ++; }
    const paintPct=1-(occ*2/total);
    if(paintPct<0.5) warns.push("м№ н•  л°”лӢҘмқҙ мўҒм•„мҡ”("+Math.round(paintPct*100)+"%) вҖ” мҲңмӢқк°„м—җ лҒқлӮҳлҠ” л§өмқҙм—җмҡ”");
    else if(paintPct<0.65) warns.push("м№  л©ҙм Ғмқҙ мўҒмқҖ нҺёмқҙм—җмҡ”("+Math.round(paintPct*100)+"%) вҖ” л№ лҘё мҠ№л¶Җк°Җ лӮҳмҡ”");
  }
  if(ED.mode==="tag" && bushes*2<3) warns.push("мҲ лһҳ л§өм—” мҲЁмқ„ мҲҳн’Җмқ„ 3м№ё мқҙмғҒ м¶”мІңн•ҙмҡ”");
  // м—°кІ°м„ұ: м „мІҙ лҜёлҹ¬ к·ёлҰ¬л“ңм—җм„ң мӢңмһ‘м җ кё°мӨҖ н”Ңлҹ¬л“ңн•„ вҖ” лӘЁл“  л№Ҳ м№ё лҸ„лӢ¬ к°ҖлҠҘн•ҙм•ј
  const grid=edFullGrid();
  let sc=-1, sr=-1;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.cols;c++) if((grid[r][c]==="*"||grid[r][c]==="@")&&c<ED.half){ sc=c; sr=r; }   // мӢңмһ‘м җ(*В·@) мӢңл“ң
  const open=(ch)=>ch!=="W"&&ch!=="C"&&ch!=="X"&&ch!=="Y";   // мң кё°м„ұ: мҲҳм •нғ‘(XВ·Y)лҸ„ мҶ”лҰ¬л“ң кө¬мЎ°л¬ј вҶ’ м—°кІ°м„ұм—җм„ң лІҪмңјлЎң кі„мӮ°(нғ‘мңјлЎң л§үнһҢ лі‘лӘ© мҳӨнҢҗ л°©м§Җ)
  const seen=grid.map(row=>row.map(()=>false));
  const q=[[sc,sr]]; seen[sr][sc]=true; let reach=0, openN=0;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.cols;c++) if(open(grid[r][c])) openN++;
  while(q.length){ const [c,r]=q.pop(); reach++;
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=ED.cols||nr>=ED.rows||seen[nr][nc]||!open(grid[nr][nc])) continue;
      seen[nr][nc]=true; q.push([nc,nr]);
    } }
  if(reach<openN) return {ok:false, msg:"лІҪмңјлЎң л§үнҳҖ лӘ» к°ҖлҠ” кіімқҙ мһҲм–ҙмҡ” вҖ” лІҪмқ„ мЎ°кёҲ н„°м„ң мқҙм–ҙ мЈјм„ёмҡ”(м—°кІ°м„ұ)"};
  return warns.length ? {ok:true, warn:warns.join(" В· ")} : {ok:true};
}
function edFullGrid(){
  if(ED.pf) return ED.cells;   // н”Ңлһ«нҸ¬лЁё: лҜёлҹ¬ м—ҶмқҢ
  const grid=[];
  for(let r=0;r<ED.rows;r++){ const row=[];
    for(let c=0;c<ED.cols;c++) row.push(c<ED.half ? ED.cells[r][c] : ED.cells[r][ED.cols-1-c]);
    grid.push(row);
  }
  return grid;
}
function edSubmit(){
  const v=validateEditorMap();

  if(ED.pf && !ED.testCleared){ ED.msg="вҡ  н…ҢмҠӨнҠён”Ңл Ҳмқҙ(T)лЎң м§Ғм ‘ нҒҙлҰ¬м–ҙн•ҙм•ј м ңм¶ңн•  мҲҳ мһҲм–ҙмҡ”"; return; }
  if(v.warn) showToast("рҹ’Ў "+v.warn);
  let name=null; try{ name=window.prompt("л§ө мқҙлҰ„ (2~10мһҗ)"); }catch(e){ name=null; }
  if(!name) return; name=(""+name).trim().slice(0,10);
  if(name.length<2){ ED.msg="вҡ  мқҙлҰ„мқҖ 2мһҗ мқҙмғҒ"; return; }
  const st=loadEditorStore();

  st.pending.push(rec);

  try{ MapStore.pushRec("pending", rec, function(ok){
    if(ok){ const cur=loadEditorStore(); const hit=cur.pending.find(x=>x.id===rec.id); if(hit){ hit._synced=true; saveEditorStore(cur); } } }); }catch(e){}
  edClearDraft();                                          // C8: м ңм¶ң м„ұкіө вҶ’ мҙҲм•Ҳ м •лҰ¬

  goToStartScreen();

/* в”Җв”Җ EDIT-TEST-1: м•„л ҲлӮҳ лӘЁл“ң м—җл””н„° лҜёлҰ¬н•ҳкё°(лӮҳ + лҙҮ 1) вҖ” лі„л№ӣм җн”„ н…ҢмҠӨнҠён”Ңл Ҳмқҙмқҳ нғ‘лӢӨмҡҙнҢҗ в”Җв”Җ
   нҳ„мһ¬ нҺём§‘ мӨ‘мқё л§өмқ„ мҰүм„қ м»ҙнҢҢмқјн•ҙ solo(1лҢҖ1) м„¬л©ём „мңјлЎң н”Ңл Ҳмқҙ. м җмҲҳВ·ліҙмғҒВ·м ңм¶ң кІҢмқҙнҠё м—ҶмқҢ.
   Esc(лҳҗлҠ” кІ°кіјнҷ”л©ҙ лІ„нҠјВ·н„°м№ҳ рҹ”ҷ)лЎң нҺём§‘н•ҳлҚҳ л§ө к·ёлҢҖлЎң м—җл””н„° ліөк·Җ. */
let edTest=null;   // {mapId,modeId,ruleId} ліөмӣҗмҡ© вҖ” нҷңм„ұ мӢң н…ҢмҠӨнҠё мӨ‘
function edStartTest(){
  if(!ED || ED.pf) return;                                 // н”Ңлһ«нҸ¬лЁёлҠ” кё°мЎҙ pfStartLevel н…ҢмҠӨнҠё мӮ¬мҡ©
  const v=validateEditorMap(); if(!v.ok){ ED.msg="вҡ  "+v.msg; return; }

    cellsLeft:ED.cells.map(r=>r.join("")), createdAt:0 };

  const i=MAPS.findIndex(m=>m.id==="__edtest"); if(i>=0) MAPS[i]=map; else MAPS.push(map);
  if(!edTest) edTest={ mapId:selectedMapId, modeId:selectedModeId, ruleId:selectedRuleId };   // мһ¬н…ҢмҠӨнҠё мӢң мӣҗлһҳ м„ нғқ мң м§Җ(guard)
  selectedMapId="__edtest"; selectedRuleId=ED.mode; selectedModeId=(ED.mode==="tdm")?"solo":"trio";   // EDIT-TEST-2: нҺём§‘ мӨ‘мқё лӘЁл“ңлЎң лҜёлҰ¬н•ҳкё°(tdm=лӮҳ+лҙҮ1, к·ё мҷё=лҙҮ 3v3)
  selectedCharacterId=sanitizeCharacterId(profile.selectedCharacterId);

}
function edEndTest(){   // н…ҢмҠӨнҠё мў…лЈҢ вҶ’ м—җл””н„° ліөк·Җ + мһ„мӢң л§ө/м„ нғқ м •лҰ¬
  if(!edTest) return false;

/* мҠ№мқёлҗң м—җл””н„° л§ө вҶ’ н”Ңл Ҳмқҙ к°ҖлҠҘн•ң MAPSлЎң м»ҙнҢҢмқј(кё°ліё нҒ¬кё°л§Ң вҖ” лҢҖнҳ•мқҖ м№ҙл©”лқј нӣ„мҶҚ) */
function compileEditorMap(rec){
  const cols=rec.size[0], rows=rec.size[1], half=cols/2, CS=STUDENT_CELL, OX=24, OY=70;
  const grid=[];
  for(let r=0;r<rows;r++){ const left=rec.cellsLeft[r]; let row="";
    for(let c=0;c<cols;c++) row += (c<half ? left[c] : left[cols-1-c]);
    grid.push(row);
  }
  const obstacles=[], bushes=[], traps=[]; let spawn=null; const rulePoints={}; let wallN=0;
  const spawnsLeft=[];   // мҲ лһҳ(tag) к°ңмқё мӢңмһ‘м җ мўҢмёЎ лӘ©лЎқ
  for(let r=0;r<rows;r++){
    let c=0;
    while(c<cols){
      const ch=grid[r][c];
      const cellCx=OX+c*CS+CS/2, cellCy=OY+r*CS+CS/2;
      if(ch==="*"){ if(c<half) spawn={x:cellCx, y:cellCy}; c++; continue; }
      if(ch==="@"){ if(c<half) spawnsLeft.push({x:cellCx, y:cellCy}); c++; continue; }   // мҲ лһҳ к°ңмқё мӢңмһ‘м җ
      if(ch==="O"){ if(c<half) rulePoints.zone={x:OX+cols*CS/2, y:cellCy}; c++; continue; }        // кұ°м җ: лҢҖм№ӯ мӨ‘мӢ¬м„  мң„
      if(ch==="G"){ if(c<half) rulePoints.vein={x:OX+cols*CS/2, y:cellCy}; c++; continue; }        // лі„кҙ‘л§Ҙ: мӨ‘мӢ¬м„  мң„
      if(ch==="X"){ if(c<half){ rulePoints.towers={ player:{x:cellCx,y:cellCy}, enemy:{x:OX+cols*CS-(cellCx-OX),y:cellCy} }; } c++; continue; }
      if(ch==="Y"){ if(c<half){ (rulePoints.subTowers=rulePoints.subTowers||[]).push({ player:{x:cellCx,y:cellCy}, enemy:{x:OX+cols*CS-(cellCx-OX),y:cellCy} }); } c++; continue; }   // ліҙмЎ°нғ‘(мҲҳм •л¶ҖмҲҳкё°)
      if(ch==="."){ c++; continue; }
      let c2=c; while(c2+1<cols && grid[r][c2+1]===ch) c2++;   // к°ҖлЎң м—°мҶҚ лі‘н•©
      const rect={ x:OX+c*CS, y:OY+r*CS, w:(c2-c+1)*CS, h:CS };
      if(ch==="W") obstacles.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, kind:"rock" });
      else if(ch==="C"){ // мҝ м…ҳлІҪ: л¶Җм„ңм§ҖлҠ” кө¬мЎ°л¬ј(нҢҖ м—ҶмқҢ вҖ” м–‘ нҢҖ нғ„м—җ л¶Җм„ңм§җ). м№ё лӢЁмң„лЎң л¶„н• 
        for(let cc=c;cc<=c2;cc++) obstacles.push({ x:OX+cc*CS, y:rect.y, w:CS, h:CS, kind:"wall",
          sid:"ewall_"+r+"_"+cc, structure:true, team:null, hp:RULE_CONFIG.siege.wallHp, maxHp:RULE_CONFIG.siege.wallHp });
      }
      else if(ch==="B") bushes.push(rect);
      else if(ch==="S") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"damage" });
      else if(ch==="L") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"slow" });
      else if(ch==="I") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"ice" });
      c=c2+1;
    }
  }
  if(!spawn) spawn=spawnsLeft[0]||{x:OX+CS*1.5, y:OY+rows*CS/2};
  const out={ id:rec.id, name:"рҹӣ "+rec.name, desc:"л§өкіөл°© В· "+(rec.author||"н•ҷмғқ")+" В· "+(getRule(rec.mode).name),
    floorColor:"#222a52", strokeColor:"#5b74b8", floor:rec.floor||"basic",
    playerSpawn:spawn, enemySpawn:{ x:OX+cols*CS-(spawn.x-OX), y:spawn.y },
    gridCols:cols, gridRows:rows,   // P4: мӨҢм•„мӣғ м№ҙл©”лқјк°Җ л§ө нҒ¬кё°лҘј мқҪлҠ” н•„л“ң
    obstacles:obstacles, bushes:bushes, traps:traps, rulePoints:rulePoints, editorMode:rec.mode };
  if(rec.mode==="tag" && spawnsLeft.length){   // мҲ лһҳ: к°ңмқё мӢңмһ‘м җ л°°м—ҙ(мўҢ=playerнҢҖ, мҡ°=лҜёлҹ¬ enemyнҢҖ)
    out.playerSpawns=spawnsLeft;
    out.enemySpawns=spawnsLeft.map(s=>({ x:OX+cols*CS-(s.x-OX), y:s.y }));
  }
  return out;
}
function applyApprovedMaps(){
  const st=loadEditorStore();
  // BIG-BATCH-1 D11: мҠ№мқё лӘ©лЎқкіј MAPSлҘј мҷ„м „ лҸҷкё°нҷ” вҖ” мӮӯм ңВ·л№„нҷңм„ұлҗң м—җл””н„° л§өмқҖ лӘ©лЎқм—җм„ң лӮҙл Өк°„лӢӨ
  const want={};
  for(const rec of st.approved){
    if(rec.mode==="platformer") continue;                // н”Ңлһ«нҸ¬лЁё л ҲлІЁмқҖ лі„л№ӣ м җн”„ л ҲлІЁ м„ нғқмқҙ м§Ғм ‘ мқҪмқҢ(В§3.8)
    if(rec.disabled) continue;                           // л№„нҷңм„ұ(көҗмӮ¬к°Җ мһ мӢң лӮҙлҰј)  вҖ” P4: лҢҖнҳ• л§өлҸ„ нғ‘мһ¬(мӨҢм•„мӣғ м№ҙл©”лқј)
    want[rec.id]=rec;
  }
  for(let i=MAPS.length-1;i>=0;i--){                     // editorMode н•„л“ң = м—җл””н„° мӮ°(з”Ј) л§ө н‘ңмӢқ(лӮҙмһҘ л§өмқҖ м—ҶмқҢ)
    const m=MAPS[i];
    if(m.editorMode!==undefined && !want[m.id]) MAPS.splice(i,1);
  }
  for(const id in want){
    const map=compileEditorMap(want[id]);
    const i=MAPS.findIndex(m=>m.id===id);
    if(i>=0) MAPS[i]=map; else MAPS.push(map);
  }
  // м„ нғқ л§өмқҙ мӮ¬лқјмЎҢмңјл©ҙ кё°ліё л§өмңјлЎң(м „м—ӯ + н”„лЎңн•„)
  if(!MAPS.find(m=>m.id===selectedMapId)){ selectedMapId="training"; if(profile){ profile.selectedMapId="training"; try{ saveProfile(); }catch(e){} } }
}
/* в”Җв”Җ көҗмӮ¬ л§ө мҠ№мқё нҷ”л©ҙ в”Җв”Җ */
/* BIG-BATCH-1 D11: мҠ№мқё нҷ”л©ҙмқҙ лҢҖкё°+мҠ№мқё л‘җ лӘ©лЎқмқ„ кҙҖлҰ¬ вҖ” мҠ№мқёл§ө мӮӯм ңВ·л№„нҷңм„ұВ·(мӮ¬мӢӨмғҒ) мҠ№мқём·ЁмҶҢ м§Җмӣҗ */
function reviewList(st){   // нҶөн•© лӘ©лЎқ: [{kind:"pending"|"approved", rec}]
  const out=[];
  for(const r of st.pending) out.push({kind:"pending", rec:r});
  for(const r of st.approved) out.push({kind:"approved", rec:r});
  return out;
}
function handleMapReviewKey(code){
  const st=loadEditorStore();
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  const list=reviewList(st);
  if(!list.length) return;
  if(reviewIdx>=list.length) reviewIdx=0;
  if(code==="ArrowUp"){ reviewIdx=(reviewIdx+list.length-1)%list.length; return; }
  if(code==="ArrowDown"){ reviewIdx=(reviewIdx+1)%list.length; return; }
  const it=list[reviewIdx];
  if(it.kind==="pending"){
    if(code==="Enter"||code==="NumpadEnter"){                 // мҠ№мқё вҶ’ кІҢмһ„ л§ө лӘ©лЎқм—җ л°ҳмҳҒ
      const i=st.pending.indexOf(it.rec); st.pending.splice(i,1);
      it.rec._synced=true;
      st.approved.push(it.rec); saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorApprove(it.rec); }catch(e){}        // P3: нҒҙлқјмҡ°л“ң л°ҳмҳҒ(м „ нҒҙлқјмқҙм–ёнҠё кіөмң )
      showToast("мҠ№мқё: "+it.rec.name+" вҖ” л§ө лӘ©лЎқм—җ м¶”к°ҖлҗЁ"+(it.rec.size[0]>22?" (мӨҢм•„мӣғ м№ҙл©”лқј)":""));
    } else if(code==="KeyX"||code==="Delete"){                // кұ°м Ҳ(мӮӯм ң)
      const i=st.pending.indexOf(it.rec); st.pending.splice(i,1);
      saveEditorStore(st); showToast("кұ°м Ҳ: "+it.rec.name);
      try{ MapStore.mirrorReject(it.rec.id); }catch(e){}
    } else return;
  } else {
    if(code==="KeyX"||code==="Delete"){                       // мҠ№мқё м·ЁмҶҢ(мҷ„м „ мӮӯм ң вҖ” л§ө лӘ©лЎқм—җм„ң мҰүмӢң лӮҙл Өк°җ)
      const i=st.approved.indexOf(it.rec); st.approved.splice(i,1);
      saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorDelete(it.rec.id); }catch(e){}
      showToast("мӮӯм ң: "+it.rec.name+" вҖ” л§ө лӘ©лЎқм—җм„ң лӮҙл Өк°җ");
    } else if(code==="KeyD"){                                 // л№„нҷңм„ұ/нҷңм„ұ нҶ кёҖ(кё°лЎқмқҖ ліҙмЎҙ, лӘ©лЎқм—җм„ңл§Ң лӮҙлҰј)
      it.rec.disabled=!it.rec.disabled;
      saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorDisable(it.rec); }catch(e){}
      showToast((it.rec.disabled?"вҸё л№„нҷңм„ұ: ":"в–¶ нҷңм„ұ: ")+it.rec.name);
    } else return;
  }
  _reviewSt=null; _adminPendingN=-1;   // PERF-2: мЎ°мһ‘ нӣ„ мәҗмӢң л¬ҙнҡЁнҷ”(лӢӨмқҢ н”„л Ҳмһ„ мһ¬лЎңл“ң)
  const n=reviewList(loadEditorStore()).length;
  if(reviewIdx>=n) reviewIdx=Math.max(0,n-1);
}
function handleSettingsKey(code){
  const N=5;   // 0 мЎ°мһ‘ л°©мӢқ В· 1 мҶҢлҰ¬ В· 2 лі„лӘ… ліҖкІҪ В· 3 лЎңк·ём•„мӣғ В· 4 көҗмӮ¬мҡ© лӘЁл“ң
  if(code==="Escape"){ settingsOpen=false; return; }
  if(code==="ArrowUp"){ settingsIndex=(settingsIndex+N-1)%N; return; }
  if(code==="ArrowDown"){ settingsIndex=(settingsIndex+1)%N; return; }
  if(settingsIndex===0 && (code==="ArrowLeft"||code==="ArrowRight"||code==="Enter"||code==="NumpadEnter")){
    // UPDATE-1 P3: мЎ°мһ‘ л°©мӢқ мҲңнҷҳ(нӮӨліҙл“ң/л§Ҳмҡ°мҠӨ/н„°м№ҳ) вҖ” н”„лЎңн•„ м ҖмһҘ
    const dir=(code==="ArrowLeft")?-1:1;
    const ids=CONTROL_MODES.map(c=>c.id);
    let i=ids.indexOf(controlMode()); if(i<0)i=0;
    profile.controlMode=ids[(i+dir+ids.length)%ids.length];
    saveProfile(); showToast("мЎ°мһ‘ л°©мӢқ: "+controlModeName());
    return;
  }
  if(settingsIndex===1 && (code==="ArrowLeft"||code==="ArrowRight")){
    // E14: нҡЁкіјмқҢ ліјлҘЁ 0~100%(10% лӢЁмң„) вҖ” м—җм…Ӣмқҙ л“Өм–ҙмҳӨл©ҙ мҰүмӢң л°ҳмҳҒлҗҳлҠ” к°’
    const d=(code==="ArrowLeft")?-0.1:0.1;
    profile.sfxVolume=Math.round(clamp((profile.sfxVolume||0.7)+d,0,1)*10)/10;
    saveProfile(); showToast("нҡЁкіјмқҢ ліјлҘЁ: "+Math.round(profile.sfxVolume*100)+"%");
    return;
  }
  if(code==="Enter"||code==="NumpadEnter"){
    if(settingsIndex===2) changeNickname();
    else if(settingsIndex===3){ settingsOpen=false; doLogout(); }
    else if(settingsIndex===4){ settingsOpen=false; gameState=STATE.ADMIN_LOGIN; }
  }
}

  if(AccountStore.cloudReady()){

function changeMenuValue(row, dir){
  if(row===1||row===6) cycleDifficulty(dir);   // 1: мә нҺҳмқё лӮңмқҙлҸ„ В· 6: л№ лҘё лҢҖм „ лӮңмқҙлҸ„(к°ҷмқҖ к°’ кіөмң )
  else if(row===3) cycleRule(dir);              // л№ лҘё лҢҖм „ к·ңм№ҷ(м§ҖкёҲмқҖ м„¬л©ём „ 1мў…)
  else if(row===4) cycleMode(dir);              // л№ лҘё лҢҖм „ нҢҖ(1лҢҖ1В·3лҢҖ3)
  else if(row===5) cycleMap(dir);               // л№ лҘё лҢҖм „ л§ө
  else if(row>=10&&row<=13){                     // в‘Ўм„№м…ҳ мҠӨнҠёлҰҪВ·вҡҷм„Өм •: вҶҗвҶ’лЎң к°ҖлЎң мқҙлҸҷ
    menuIndex=row+dir; if(menuIndex<10)menuIndex=13; if(menuIndex>13)menuIndex=10;
  }
}
function activateMenuRow(row){
  if(row===0) startSoloCampaign();          // вӯҗ мә нҺҳмқё лҸ„м „(20мҠӨн…Ңмқҙм§Җ)
  else if(row===2) startGame();             // в–¶ л№ лҘё лҢҖм „(лӢЁнҢҗ)
  else if(row===7) pfOpenSelect();          // рҹҰҳ лі„л№ӣ м җн”„(GENRE-EXPAND-1 В§3)
  else if(row===8) rpgEnter();              // рҹҢҷ лі„л№ӣ л§Ҳмқ„(RPG В· н•ҷмғқ лЎңл№„ м§„мһ… В· кі„м •лі„ м ҖмһҘ)
  else if(row===9) openOnlineMenu();        // рҹҢҗ мҳЁлқјмқё м„јн„°
  else if(row===10) openShop();             // рҹӣ’ мғҒм җ(кё°мЎҙ STATE)
  else if(row===11){ collectionIndex=0; gameState=STATE.COLLECTION; }  // рҹ“– мҲҳм§‘(кё°мЎҙ STATE)
  else if(row===12) openEditor();           // рҹӣ  л§өкіөл°©(OVERNIGHT-1)
  else if(row===13) openSettings();         // вҡҷ м„Өм •(лЎңк·ём•„мӣғВ·көҗмӮ¬мҡ©В·лі„лӘ…)
  else if(VALUE_ROWS[row]) changeMenuValue(row, +1);        // к°’ н–ү Enter вҶ’ лӢӨмқҢ к°’
}

function cycleInList(list, currentId, dir){
  let idx=0;
  for(let i=0;i<list.length;i++){ if(list[i]===currentId){ idx=i; break; } }
  idx=(idx+dir+list.length)%list.length;
  return list[idx];
}
function cycleCharacter(dir){
  selectedCharacterId=cycleInList(profile.unlockedCharacters,selectedCharacterId,dir);
  profile.selectedCharacterId=selectedCharacterId;
  // л¬ҙкё° мҷ„м „ кі м •: мәҗлҰӯн„° ліҖкІҪ мҰүмӢң к·ё мәҗлҰӯн„°мқҳ кі м • л¬ҙкё°лЎң мһҗлҸҷ ліҖкІҪ
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
  saveProfile();
}
// л¬ҙкё° м„ нғқ м ңкұ°: л¬ҙкё°лҠ” мәҗлҰӯн„°м—җм„ң кі„мӮ°. (н•ҳмң„нҳёнҷҳмҡ©мңјлЎң н•ЁмҲҳлҠ” лӮЁкё°лҗҳ н•ӯмғҒ кі м • л¬ҙкё°лЎң мһ¬көҗм •)
function cycleWeapon(dir){
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
}
function cycleDifficulty(dir){ selectedDifficultyId=cycleInList(DIFFICULTIES.map(d=>d.id),selectedDifficultyId,dir); profile.selectedDifficultyId=selectedDifficultyId; saveProfile(); }
function cycleMap(dir){ selectedMapId=cycleInList(MAPS.map(m=>m.id),selectedMapId,dir); profile.selectedMapId=selectedMapId; saveProfile(); }
function cycleMode(dir){ selectedModeId=cycleInList(MODES.map(m=>m.id),selectedModeId,dir); profile.selectedModeId=selectedModeId; saveProfile(); }
function cycleRule(dir){ selectedRuleId=cycleInList(RULES.map(r=>r.id),selectedRuleId,dir); }   // к·ңм№ҷ 1мў…мқҙлқј м§ҖкёҲмқҖ м ңмһҗлҰ¬(мһҗлҰ¬л§Ң мӢ¬мқҢ)

function changeNickname(){
  let name=null;
  try { name=window.prompt("лӢүл„Өмһ„мқ„ мһ…л Ҙн•ҳм„ёмҡ” (2~10кёҖмһҗ)", profile.nickname); } catch(e){ name=null; }
  if(name===null) return;
  name=String(name).trim();
  if(name.length<2) name="н”Ңл Ҳмқҙм–ҙ";
  if(name.length>10) name=name.slice(0,10);
  profile.nickname=name; saveProfile(); showToast("лӢүл„Өмһ„: "+name);
}

function openShop(){
  if(!SHOP_ENABLED){ showToast("мғҒм җмқҖ мӨҖл№„ мӨ‘мқҙм—җмҡ” (кі§ лӢӨмӢң м—ҙл Өмҡ”!)"); return; }   // мһ„мӢң л№„нҷңм„ұ(мҪ”л“ң/кіЁл“ң ліҙмЎҙ)
  rebuildShopItems(); shopIndex=0; gameState=STATE.SHOP;
}
function rebuildShopItems(){
  shopItems=[];
  // н•ҷмғқ 6мў… мІҙм ң: мғҒм җ лӘ©лЎқлҸ„ н•ҷмғқ м„ёнҠёлЎң м ңн•ң(л Ҳкұ°мӢң мһ м • л№„нҷңм„ұ вҖ” ліөкө¬н•ҳл Өл©ҙ STUDENT_* лҘј CHARACTERS/WEAPONS лЎң лҗҳлҸҢлҰ¬л©ҙ лҗЁ)
  for(const c of STUDENT_CHARACTERS){ if(profile.unlockedCharacters.indexOf(c.id)<0) shopItems.push({kind:"character",id:c.id,name:c.name,cost:c.unlockCost,desc:c.desc}); }
  for(const w of STUDENT_WEAPONS){ if(profile.unlockedWeapons.indexOf(w.id)<0) shopItems.push({kind:"weapon",id:w.id,name:w.name,cost:w.unlockCost,desc:w.desc}); }
}
function handleShopKey(code){
  if(code==="Escape"){ gameState=STATE.START; return; }
  if(shopItems.length===0){ if(code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(code==="ArrowUp"){ shopIndex=(shopIndex+shopItems.length-1)%shopItems.length; return; }
  if(code==="ArrowDown"){ shopIndex=(shopIndex+1)%shopItems.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ buyShopItem(); return; }
}
function buyShopItem(){
  const item=shopItems[shopIndex];
  if(!item) return;
  if(profile.gold<item.cost){ showToast("кіЁл“ңк°Җ л¶ҖмЎұн•©лӢҲлӢӨ!"); return; }
  addGold(-item.cost);
  if(item.kind==="character"){ unlockCharacter(item.id); showToast(item.name+" мәҗлҰӯн„° н•ҙкёҲ!"); }
  else { unlockWeapon(item.id); showToast(item.name+" л¬ҙкё° н•ҙкёҲ!"); }
  saveProfile();
  rebuildShopItems();
  if(shopIndex>=shopItems.length) shopIndex=Math.max(0,shopItems.length-1);
}

function getMatchConfig(){
  const diff=getDifficulty(selectedDifficultyId);
  const rule=getRule(selectedRuleId);
  // мҳӨлёҢм қнҠё лӘЁл“ң(GAMEPLAY-1 Phase 3)лҠ” 3v3 кі м •В·180мҙҲВ·к·ңм№ҷлі„ лҰ¬мҠӨнҸ°. м„¬л©ём „мқҖ кё°мЎҙ к·ёлҢҖлЎң.
  const mode=(rule.id==="tdm")?getMode(selectedModeId):getMode("trio");
  return {
    diff:diff, mode:mode, map:getMap(selectedMapId),
    rule:rule, ruleId:rule.id,
    timeLimit: (rule.id==="tdm")?GAME_CONFIG.gameTime:((RULE_CONFIG[rule.id]&&RULE_CONFIG[rule.id].matchTime)||RULE_CONFIG.matchTime),
    respawnDelay: (rule.id==="tdm")?GAME_CONFIG.respawnDelay
                 :((RULE_CONFIG[rule.id]&&RULE_CONFIG[rule.id].respawn)||GAME_CONFIG.respawnDelay),   // GENRE-EXPAND-1: к·ңм№ҷлі„ мқјл°ҳнҷ”
    enemyMaxHp: GAME_CONFIG.enemyMaxHp * diff.enemyHpMul * mode.enemyStatMul,
    enemyMoveSpeed: GAME_CONFIG.enemyMoveSpeed * diff.enemySpeedMul * TEMPO.enemyMove,
    enemyDamage: GAME_CONFIG.enemyDamage * diff.enemyDamageMul * mode.enemyDamageMul,
    enemyAttackCooldown: GAME_CONFIG.enemyAttackCooldown * diff.enemyCooldownMul,
    enemyAimError: diff.enemyAimError,
    enemyBulletSpeed: GAME_CONFIG.enemyBulletSpeed * TEMPO.enemyBullet,
    enemyRange: GAME_CONFIG.enemyRange,
    bossMaxHp: GAME_CONFIG.bossMaxHp * diff.bossHpMul,
    bossDamageMul: GAME_CONFIG.bossDamageMul * diff.bossDamageMul,
    // v1.27 мәҗлҰӯн„° лҙҮ мҠӨнӮ¬ нҢҢлқјлҜён„°(мү¬мӣҖ=кұ°мқҳ м•Ҳ м”Җ / м–ҙл ӨмӣҖ=м Ғк·№ мӮ¬мҡ©)
    botSpecialProb: diff.botSpecialProb||0,
    botUltChargeRate: diff.botUltChargeRate||0,
    botUltProb: diff.botUltProb||0
  };
}

// лӘЁл“  нҢҢмқҙн„°(мәҗлҰӯн„°)лҘј л§Ңл“ңлҠ” кіөнҶө н•ЁмҲҳ
function makeFighter(opts){
  const team=opts.team;
  const isPlayer=!!opts.isPlayer;
  let charData=null, maxHp, moveSpeed, color, subColor;

  if(team==="player"){
    charData=getCharacter(opts.characterId || "lumi");
    maxHp=GAME_CONFIG.playerMaxHp*charData.hpMul;
    moveSpeed=GAME_CONFIG.playerMoveSpeed*charData.speedMul;
    color=charData.color; subColor=charData.subColor;
  } else {
    if(opts.isBoss){ maxHp=MATCH.bossMaxHp; moveSpeed=MATCH.enemyMoveSpeed*0.9; color="#b3203a"; subColor="#ff6a86"; }
    else {
      // м „нҲ¬ л°ёлҹ°мҠӨ(HPВ·мқҙлҸҷВ·н”јн•ҙВ·мҝЁлӢӨмҡҙ)лҠ” лӮңмқҙлҸ„(MATCH) кё°л°ҳ мң м§Җ вҖ” мәҗлҰӯн„°лҠ” мҷёнҳ•В·мҠӨнӮ¬ м •мІҙм„ұл§Ң
      maxHp=MATCH.enemyMaxHp; moveSpeed=MATCH.enemyMoveSpeed;
      if(opts.characterId){                       // v1.27 мәҗлҰӯн„° лҙҮ(л№ лҘёлҢҖм „): м§„м§ң мәҗлҰӯн„°лЎң л ҢлҚ” + X/C мӮ¬мҡ©
        charData=getCharacter(opts.characterId);
        color=charData.color; subColor=charData.subColor;
      } else { color="#8a3fd0"; subColor="#e0b3ff"; }
    }
  }

  const r=opts.isBoss?38:22;
  const spawn=findClearSpawn(opts.x,opts.y,r);

  return {
    id:++fighterIdCounter,
    team:team, isPlayer:isPlayer, isBoss:!!opts.isBoss,
    characterId: charData?charData.id:null,
    weaponId: charData?getWeaponForCharacter(charData.id):null,   // л¬ҙкё° мҷ„м „ кі м •(мәҗлҰӯн„°м—җм„ң кі„мӮ°)
    specialCd:0, superGauge:0,   // лҙҮ X мҝЁнғҖмһ„В·C кІҢмқҙм§Җ(н”Ңл Ҳмқҙм–ҙ ліёмқё кІҢмқҙм§ҖлҠ” м „м—ӯ superGauge)
    stars:0,                     // GAMEPLAY-1 stargrab: ліҙмң н•ң лі„
    name: opts.name || (charData?charData.name:"нҒ¬лЎ¬"),
    char: charData,
    baseX:opts.x, baseY:opts.y,
    x:spawn.x, y:spawn.y, r:r,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp,
    moveSpeed:moveSpeed, color:color, subColor:subColor,
    facing: team==="player"?0:Math.PI,
    cooldown:0, lastCombatTime:-999, lastFireTime:-999,
    hitFlash:0, dead:false, respawnTimer:0, invincibleTimer:0,
    ai:{ strafeDir:1, strafeTimer:0, reactionTimer:0.3, fireTimer:rand(0,0.4),
         lastX:spawn.x, lastY:spawn.y, stuckCheck:0.4, avoidDir:1, avoidTimer:0,
         knowsTarget:true, lastKnownX:spawn.x, lastKnownY:spawn.y } };
}

function teamSlotPos(base, slot){
  const offsets=[ {dx:0,dy:0}, {dx:60,dy:-50}, {dx:-60,dy:50}, {dx:60,dy:50}, {dx:-60,dy:-50} ];
  const o=offsets[slot%offsets.length];
  return { x:base.x+o.dx, y:base.y+o.dy };
}

function createFighters(){
  const mode=MATCH.mode, map=MATCH.map;
  fighterIdCounter=0;
  const pS=map.playerSpawns, eS=map.enemySpawns;   // мҲ лһҳ: к°ңмқё мӢңмһ‘м җ л°°м—ҙ(мһҲмңјл©ҙ л¶„мӮ° л°°м№ҳ)
  const pSlot=(slot)=>pS?pS[slot%pS.length]:teamSlotPos(map.playerSpawn,slot);
  const eSlot=(slot)=>eS?eS[slot%eS.length]:teamSlotPos(map.enemySpawn,slot);

  const pPos=pSlot(0);
  player=makeFighter({ team:"player", isPlayer:true, characterId:selectedCharacterId, x:pPos.x, y:pPos.y });
  initAmmo(player);   // мһҘм „: мӮ¬лһҢмқҙ мЎ°мў…н•ҳлҠ” н”Ңл Ҳмқҙм–ҙл§Ң нғ„м°Ҫ мӮ¬мҡ©

  allies=[];
  const allyPool=profile.unlockedCharacters.filter(id=>id!==selectedCharacterId);
  for(let i=0;i<mode.allyCount;i++){
    const charId = allyPool.length>0 ? allyPool[i%allyPool.length] : selectedCharacterId;
    const pos=pSlot(i+1);
    allies.push(makeFighter({ team:"player", isPlayer:false, characterId:charId, x:pos.x, y:pos.y }));
  }

  enemies=[];
  // v1.27 мәҗлҰӯн„° лҙҮ: м ҒлҸ„ мӢӨм ң н•ҷмғқ мәҗлҰӯн„°лЎң(н”Ңл Ҳмқҙм–ҙмҷҖ м•Ҳ кІ№м№ҳкІҢ В· м—¬лҹ¬ лӘ…мқҙл©ҙ м„ңлЎң лӢӨлҘё мәҗлҰӯн„°)
  const botPool=STUDENT_CHARACTERS.map(c=>c.id).filter(id=>id!==selectedCharacterId);
  const botOff=Math.floor(Math.random()*Math.max(1,botPool.length));
  for(let i=0;i<mode.enemyCount;i++){
    const pos=eSlot(i);
    const charId=botPool.length?botPool[(botOff+i)%botPool.length]:selectedCharacterId;
    enemies.push(makeFighter({ team:"enemy", isPlayer:false, characterId:charId, x:pos.x, y:pos.y,
      name:"лҙҮ "+getCharacter(charId).name }));
  }
  enemy=enemies[0];
}

function playerTeam(){ return [player].concat(allies); }
function allFighters(){ return [player].concat(allies, enemies); }

/* =======================================================================

   - siege мҲҳм •л¶ҖмҲҳкё°: нҢҖ мҲҳм •нғ‘(мһҗлҸҷ нҸ¬нғ‘) + мҝ м…ҳ лІҪ вҖ” мғҒлҢҖ нғ‘ нҢҢкҙҙ мӢң мҰүмӢң мҠ№лҰ¬
   - hotzone н•«мЎҙ: мӨ‘м•ҷ кұ°м җ лӢЁлҸ… м җмң  мӢң нҢҖ кІҢмқҙм§Җ +8/мҙҲ вҖ” 100 лҸ„лӢ¬ мҰүмӢң мҠ№лҰ¬
   - stargrab лі„лӘЁмңјкё°: мӨ‘м•ҷ лі„ н”Ҫм—… вҖ” нҢҖ н•©кі„ 10к°ңлЎң 15мҙҲ м№ҙмҡҙнҠёлӢӨмҡҙ мҷ„мЈј мӢң мҠ№лҰ¬
   мӢңк°„ мў…лЈҢ мӢңм—” к·ңм№ҷлі„ мҡ°м—ҙ л№„көҗ(ruleTimeUp). мҳЁлқјмқё/мә нҺҳмқё кІҪлЎңлҠ” кұҙл“ңлҰ¬м§Җ м•ҠлҠ”лӢӨ.
   ======================================================================= */
let RULE=null;   // м§„н–ү мӨ‘ к·ңм№ҷ мғҒнғң(м„¬л©ём „мқҙл©ҙ null)
/* STARGRAB-RANDOM: лі„мқ„ л§ө м „м—ӯ нҶөн–ү к°ҖлҠҘ м№ём—җ лһңлҚӨ мҠӨнҸ°(лІҪВ·л°”мң„В·кө¬мЎ°л¬ј мң„ м ңмҷё) вҖ” кі м • лі„кҙ‘л§Ҙ л°ҳкІҪ лҢҖмӢ .
   мҳӨн”„лқјмқёВ·мҳЁлқјмқё нҳёмҠӨнҠё кіөмҡ©(кІҢмҠӨнҠёлҠ” мҠӨнҸ° м•Ҳ н•Ё, нҳёмҠӨнҠё к¶Ңмң„). нҶөн–үм„ұ=circleRectOverlap+OBSTACLES мһ¬мӮ¬мҡ©. */
function starSpawnPoint(){
  for(let t=0;t<24;t++){
    const x=rand(ARENA.x+34, ARENA.x+ARENA.w-34), y=rand(ARENA.y+34, ARENA.y+ARENA.h-34);
    if(!OBSTACLES.some(o=>circleRectOverlap(x,y,16,o))) return { x:x, y:y };
  }
  return null;
}
function setupRuleState(){

function tagInfect(f, initial){
  if(!f || f.isTagger) return;

  if(!initial && f.tagShield>0){                               // лі„кіЁл ҳ нҢЁмӢңлёҢ: 1нҡҢ мһЎкё° л°©м–ҙл§ү
    f.tagShield=0; f.tagImmuneT=1.0;
    effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.4, radius:60});
    if(f.isPlayer) showToast("рҹӣЎ л°©м–ҙл§үмқҙ мһЎкё°лҘј н•ң лІҲ л§үм•ҳлӢӨ!");
    return;
  }
  f.isTagger=true; f.tagCd=RULE_CONFIG.tag.tagCd;
  f.hitFlash=0.3;
  effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.5, radius:70});
  effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.5, color:"#ff5a6e"});

  if(!initial && isMe) showToast("мһЎнҳ”лӢӨ! мқҙм ң л„Ҳк°Җ мҲ лһҳ рҹ‘№");
}
function tickTagRule(dt){
  const C=RULE_CONFIG.tag;
  if(RULE.needInit){
    const all=allFighters(); if(!all.length) return;
    RULE.needInit=false;
    tagInfect(all[Math.floor(Math.random()*all.length)], true);
    for(const f of all) if(!f.isTagger && f.char && f.char.id==="student_06") f.tagShield=1;   // BIG-BATCH-2 P1: лі„кіЁл ҳ лҸ„л§қмһҗ = 1нҡҢ л°©м–ҙл§ү
    return;
  }
  if(RULE.phase==="reveal"){ RULE.phaseT-=dt; if(RULE.phaseT<=0) RULE.phase="chase"; return; }
  const all=allFighters();
  for(const f of all){ if(f.tagCd>0) f.tagCd-=dt; }
  if(player && !player.isTagger) RULE.mySurvival+=dt;
  // мһЎкё°: мҲ лһҳ(мҝЁ м•„лӢҳ)мҷҖ лҸ„л§қмһҗ м¶©лҸҢмӣҗ кІ№м№Ё вҶ’ к°җм—ј(м—°мҮ„ мҰүк°җм—јмқҖ tagCd 2sк°Җ л°©м§Җ)
  for(const t of all){
    if(!t.isTagger || t.dead || t.tagCd>0) continue;
    for(const r of all){
      if(r.isTagger || r.dead) continue;
      if(dist2(t.x,t.y,r.x,r.y) < (t.r+r.r)*(t.r+r.r)){
        tagInfect(r, false);
        if(t.isPlayer){ stats.kills++; RULE.myInfections++; }   // E16 м—°лҸҷ: к°җм—ј 1нҡҢ = нӮ¬ 1 м·Ёкёү
      }
    }
  }
  let survivors=0; for(const f of all){ if(!f.isTagger && !f.dead) survivors++; }
  RULE.survivors=survivors;
  // BIG-BATCH-2 P1: мҲ лһҳк°Җ лҠҳмҲҳлЎқ лҸ„л§қмһҗ лҜём„ё мқҙмҶҚ лІ„н”„(+4%/лӘ…, мөңлҢҖ +12%)
  const taggers=all.length-survivors;
  RULE.runnerMul=1+Math.min(C.runnerBuffMax, C.runnerBuffPer*Math.max(0,taggers-1));
  // BIG-BATCH-2 P1: мөңнӣ„мқҳ 1мқё н•ҳмқҙлқјмқҙнҠё
  if(survivors===1 && !RULE.lastOne){
    RULE.lastOne=true;
    const last=all.find(f=>!f.isTagger && !f.dead);
    if(last){ effects.push({kind:"superwave", x:last.x, y:last.y, t:0, life:0.8, radius:120});
      showToast(last.isPlayer ? "вӯҗ мөңнӣ„мқҳ мғқмЎҙмһҗлҠ” л„ҲлӢӨ! лІ„н…Ёлқј!" : "вӯҗ мөңнӣ„мқҳ мғқмЎҙмһҗ: "+(last.char?last.char.name:"?")); }
  }
  if(survivors===0) ruleWin(player && player.isTagger ? "player" : "enemy");   // м „мӣҗ к°җм—ј вҶ’ мҲ лһҳнҢҖ мҠ№
}
/* BIG-BATCH-2 P1: мҲ лһҳ лӘЁл“ң м „мҡ© лҢҖмІҙ лҸ„кө¬(мӣҗліё мҠӨнӮ¬ нӣјмҶҗ м—ҶмқҢ вҖ” XнӮӨ мҳӨлІ„лқјмқҙл“ң)
   лҹӯнӮӨ=л°ҳм§қ лҢҖмӢң В· лӢ¬мқҙ=лі„л№ӣ лҸ„м•Ҫ(м „л°© мҲңк°„мқҙлҸҷ) В· лӘЁм•„=мЈјліҖ лҸ„л§қмһҗ мқҖмӢ  л¶Җм—¬ В· лі„кіЁл ҳ=нҢЁмӢңлёҢ л°©м–ҙл§ү(X м—ҶмқҢ) */
function castTagSpecial(f, list){
  if(!RULE || RULE.id!=="tag" || RULE.phase!=="chase" || !f || f.dead) return false;
  list=list||allFighters();   // P2: мҳЁлқјмқё нҢҖ м—”м§„мқҖ tFighters лӘ©лЎқмқ„ л„ҳкёҙлӢӨ
  const C=RULE_CONFIG.tag, id=f.char&&f.char.id;
  if(id==="student_01"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    f.tagDashT=C.dashDur; f.specialCd=C.dashCd;
    effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.4, color:"#ffe066"});
    playSfx("buff");
    return true;
  }
  if(id==="student_02"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    const a=f.facing||0;
    for(let d=C.blinkDist; d>=50; d-=14){
      const nx=clamp(f.x+Math.cos(a)*d, ARENA.x+f.r, ARENA.x+ARENA.w-f.r);
      const ny=clamp(f.y+Math.sin(a)*d, ARENA.y+f.r, ARENA.y+ARENA.h-f.r);
      if(OBSTACLES.some(o=>circleRectOverlap(nx,ny,f.r,o))) continue;
      effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.4, color:"#c9a3ff"});
      f.x=nx; f.y=ny; f.specialCd=C.blinkCd;
      effects.push({kind:"respawn", x:nx, y:ny, t:0, life:0.4, color:"#c9a3ff"});
      playSfx("buff");
      return true;
    }
    if(f.isPlayer) spawnSuperFail(f.x,f.y);
    return true;
  }
  if(id==="student_05"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    let n=0;
    for(const o of list){
      if(o.isTagger || o.dead) continue;
      if(o!==f && dist(f.x,f.y,o.x,o.y)>C.hideRadius) continue;
      o.tagHideT=C.hideDur; n++;
      effects.push({kind:"respawn", x:o.x, y:o.y, t:0, life:0.4, color:"#8fffd0"});
    }
    f.specialCd=C.hideCd; playSfx("buff");
    if(f.isPlayer) showToast("рҹҚғ мқҖмӢ ! ("+n+"лӘ…, "+C.hideDur+"мҙҲ)");
    return true;
  }
  return false;   // student_06(лі„кіЁл ҳ): нҢЁмӢңлёҢ л°©м–ҙл§ү вҖ” X м—ҶмқҢ
}
/* в”Җв”Җ GENRE-EXPAND-1 В§2 лі„л№ӣ м№ н•ҳкё° в”Җв”Җ */
function paintCellIdx(x,y){
  if(!RULE || RULE.id!=="paint") return -1;
  const c=Math.floor((x-ARENA.x)/STUDENT_CELL), r=Math.floor((y-ARENA.y)/STUDENT_CELL);
  if(c<0||c>=RULE.cols||r<0||r>=RULE.rows) return -1;
  return r*RULE.cols+c;
}
function paintCellBy(x,y,team,byPlayer){
  if(!RULE || RULE.id!=="paint" || RULE.winner) return false;
  const i=paintCellIdx(x,y); if(i<0 || RULE.blocked[i]) return false;
  const col=(team==="player")?1:2, prev=RULE.grid[i];
  if(prev===col) return false;
  if(prev) RULE.count[prev]--;
  RULE.grid[i]=col; RULE.count[col]++;
  if(byPlayer){
    RULE.myPaint++; RULE.gaugeAcc++;
    if(RULE.gaugeAcc>=RULE_CONFIG.paint.gaugePerCells){ RULE.gaugeAcc=0;
      superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+RULE_CONFIG.paint.gaugeAmt); }   // м№  н–үмң„лҸ„ к¶Ғ ліҙмғҒ
  }
  return true;
}
/* BIG-BATCH-2 P1: н”јлӮ л Ҳ вҖ” л§Ҳм§Җл§ү finaleSecмҙҲм—” м№  л©ҙм Ғ м—…к·ёл Ҳмқҙл“ң(crossвҶ’3Г—3), м—ӯм „ м°Ҫкө¬ */
function paintFinaleOn(){ return !!(RULE && RULE.id==="paint" && (matchTimeLimit()-matchElapsed)<=RULE_CONFIG.paint.finaleSec); }
function paintSplash(x,y,team,byPlayer,shape){
  const CS=STUDENT_CELL;
  if(shape==="cross" && paintFinaleOn()) shape="3x3";
  if(shape==="cross"){ paintCellBy(x,y,team,byPlayer);
    paintCellBy(x-CS,y,team,byPlayer); paintCellBy(x+CS,y,team,byPlayer);
    paintCellBy(x,y-CS,team,byPlayer); paintCellBy(x,y+CS,team,byPlayer); }
  else { for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) paintCellBy(x+dc*CS,y+dr*CS,team,byPlayer); }   // 3Г—3
}
function tickPaintRule(dt){

function drawPaintGrid(){
  if(!RULE || RULE.id!=="paint") return;

  ctx.save();
  for(let r=0;r<RULE.rows;r++) for(let c=0;c<RULE.cols;c++){

function teamStars(team){
  const list=(team==="player")?playerTeam():enemies;
  let n=0; for(const f of list){ if(f) n+=(f.stars||0); } return n;
}
function ruleWin(team){ if(!RULE || RULE.winner) return; RULE.winner=team; endGame(); }
function ruleTimeUp(){
  if(RULE && !RULE.winner){
    if(RULE.id==="siege"){
      const pct=t=>{ const tw=RULE.towers[t]; return tw?Math.max(0,tw.hp)/tw.maxHp:0; };
      RULE.winner = pct("player")>pct("enemy") ? "player" : (pct("enemy")>pct("player") ? "enemy" : "draw");
    } else if(RULE.id==="hotzone"){
      RULE.winner = RULE.gauge.player>RULE.gauge.enemy ? "player" : (RULE.gauge.enemy>RULE.gauge.player ? "enemy" : "draw");
    } else if(RULE.id==="stargrab"){
      const p=teamStars("player"), e=teamStars("enemy");
      RULE.winner = p>e ? "player" : (e>p ? "enemy" : "draw");
    } else if(RULE.id==="tag"){
      // нғҖмқҙлЁё мў…лЈҢ = мғқмЎҙмһҗ(лҸ„л§қнҢҖ) мҠ№ вҖ” лӮҙк°Җ мӮҙм•„лӮЁм•ҳмңјл©ҙ мҠ№, мҲ лһҳмҳҖмңјл©ҙ нҢЁ
      RULE.winner = (player && !player.isTagger) ? "player" : "enemy";
    } else if(RULE.id==="paint"){
      RULE.winner = RULE.count[1]>RULE.count[2] ? "player" : (RULE.count[2]>RULE.count[1] ? "enemy" : "draw");
    }
  }
  endGame();
}

function damageRuleStructure(s, dmg){

    effects.push({kind:"death",x:s.x+s.w/2,y:s.y+s.h/2,t:0,life:0.7,color:(s.team==="player"?"#7fd6ff":"#ff8fa5"),big:true});
