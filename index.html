    const f=tFighters[slot];
    // лҒҠкёҙ мӢӨм ң н”Ңл Ҳмқҙм–ҙлҠ” AI лҙҮмқҙ мқёкі„(к°Җл§ҢнһҲ л©Ҳм¶° м җмҲҳ кіөкёүмӣҗмқҙ лҗҳм§Җ м•ҠкІҢ)
    if(!f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(!p || p.connected===false) f.isBot=true; }
    // P1b: ліөк·Җ м—ӯм „мқҙ вҖ” мһ¬м—°кІ°лЎң connectedк°Җ trueлЎң лҸҢм•„мҳӨл©ҙ лҙҮ мқёкі„ н•ҙм ң(мӣҗлһҳ лҙҮ мҠ¬лЎҜмқҖ players л ҲмҪ”л“ңк°Җ м—Ҷм–ҙ л¬ҙн•ҙ)
    else if(f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(p && p.connected===true && p.isBot===false) f.isBot=false; }
    if(f.isBot){ tBotUpdate(f, dt); continue; }
    let input;
    if(slot===OnlineManager.mySlot) input=readLocalInput();
    else { const p=players[slot]; const conn=p && p.connected!==false; const inp=(OnlineManager.inputs||{})[slot]; input = (conn && inp) ? inp : emptyInput(); }   // P1: inputs л…ёл“ңм—җм„ң
    tUpdateFighter(f, input, dt);
  }
  tUpdateBullets(dt);
  tTickRule(dt);                                           // BIG-BATCH-2 P2: к·ңм№ҷ нҢҗм •(host к¶Ңмң„)
  tickSkillZones(dt, envTeam());
  if(!(RULE&&RULE.id==="tag")) tickPowerupsHost(dt, Object.keys(tFighters).map(s=>tFighters[s]).filter(f=>!f.isBot));   // мҲ лһҳ: м „нҲ¬ м•„мқҙн…ң м—ҶмқҢ
  for(const slot in tFighters){ const f=tFighters[slot]; f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8)); }
  if(OnlineManager.role==="host" && tFighters[OnlineManager.mySlot]) tMyTagRole=!!tFighters[OnlineManager.mySlot].isTagger;
  tTimeLeft-=dt;
  tWriteAcc+=dt; if(tWriteAcc>=1/(RTCNet.anyOpen()?RTC_STATE_FPS:T_STATE_FPS)){ tWriteAcc=0; tHostWriteState(); }
  if(tTimeLeft<=0){ tTimeLeft=0; if(RULE) tRuleTimeUpTeam(); else tHostEndMatch(); }
}

function tUpdateFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envTeam);
  // X/C: лҲҢлҰј мҲңк°„(edge)л§Ң л°ңлҸҷ(host нҢҗм •) вҖ” P2: мҲ лһҳ=X мҳӨлІ„лқјмқҙл“ңВ·C мһ кёҲ / м№ н•ҳкё°=C лҢҖнҳ• лҸ„мғү
  const isTag=!!(RULE&&RULE.id==="tag"), isPaint=!!(RULE&&RULE.id==="paint");
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp){
    if(isTag){ if(TAG_X_ALLOW[f.char.id]) castSpecialFor(f, envTeam()); else castTagSpecial(f, tFightersList()); }
    else castSpecialFor(f, envTeam());
  }
  if(ult && !f._pUlt && !isTag){
    if(isPaint){
      if((f.superGauge||0)>=GAME_CONFIG.superCharge){
        f.superGauge=0;
        const CS=STUDENT_CELL, R=RULE_CONFIG.paint.ultRadius;
        for(let dr=-R;dr<=R;dr++) for(let dc=-R;dc<=R;dc++) tPaintCellBy(f.x+dc*CS, f.y+dr*CS, f.team, f.slot);
        effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.6, radius:CS*(R+0.8)});
      }
    }
    else castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  }
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ
  if(isTag && RULE.phase==="reveal") return;               // P2: мҲ лһҳ кіөк°ң мӨ‘ мқҙлҸҷ мһ кёҲ
  applyIntentMoveAim(f, input, dt);                        // UPDATE-1 P3: м•„лӮ лЎңк·ё мқҙлҸҷ + л¶„лҰ¬ мЎ°мӨҖ(кіөмҡ©)
  if(!isTag && input.attack && f.cooldown<=0 && canFireAmmo(f)){ tFire(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}

// нҢҖ(3v3)/PVE н”јн•ҙВ·env(host нҢҗм •). м•„кө°/лҒҠкёҙ лҢҖмғҒм—” н”јн•ҙВ·л‘”нҷ”В·лё”лһҷнҷҖ м—ҶмқҢ.
// л°©нҢЁ лё”лЎқВ·мҲҳм • кұ°л¶Ғ: м •л©ҙ к°ҒлҸ„ м•Ҳм—җм„ң л°ӣлҠ” н”јн•ҙ к°җмҶҢ(лӮҙл Өм°Қкё° нӣ„ л…ём¶ң мӢңк°„м—” н•ҙм ң) вҖ” PRD 15.3/15.5
function tDamageEnemy(e, id, dmg, killer){
  if(e.frontGuard && killer && !(e.guardDownT>0)){
    const toAtk=Math.atan2(killer.y-e.y, killer.x-e.x);
    let diff=Math.abs(toAtk-e.facing); while(diff>Math.PI) diff=Math.abs(diff-Math.PI*2);
    if(diff<=deg2rad(e.frontGuard.deg)/2) dmg*=(1-e.frontGuard.reduce);
  }
  e.hp-=dmg;
  if(e.hp<=0){
    if(killer){ killer.score+=e.score;
      grantGrowth(killer, nextGrowthTypeFor(killer)); }   // GAMEPLAY-1 1D: мә нҺҳмқё м„ұмһҘ вҖ” мІҳм№ҳмһҗм—җкІҢ мҰүмӢң л¶Җм—¬(лҸҷкё°нҷ” л¶Ҳк°Җм№Ё)
    if(tPve && tPve.sgStars) for(const s of tPve.sgStars) if(s.carrier===id){ s.carrier=null; s.x=e.x; s.y=e.y; }   // CAMPAIGN-2: мҡҙл°ҳмһҗ мІҳм№ҳ вҶ’ лі„ л“ңлһҚ
    delete tEnemies[id];
  }
}
// в”Җв”Җ env м–ҙлҢ‘н„°: 3v3(PVP)В·нҳ‘лҸҷ PVE кіөмҡ© в”Җв”Җ
function envTeam(){
  const isPve=getOnlineMode(OnlineManager.mode).modeType==="pve";
  return {
    foes(f){
      const out=[];
      if(isPve){ for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue; out.push({e:e,key:id,isBoss:!!e.isBoss,isFighter:false,eid:id}); } }
      else { for(const slot in tFighters){ const o=tFighters[slot]; if(o.team===f.team||o.dead||o.invincibleTimer>0||o.inactive) continue; out.push({e:o,key:slot,isBoss:false,isFighter:true}); } }
      return out;
    },
    allies(f){
      const out=[];
      for(const slot in tFighters){ const o=tFighters[slot];
        if(o.dead||o.inactive) continue;
        if(isPve || o.team===f.team) out.push(o); }        // PVE=нҳ‘лҸҷ м „мӣҗ, 3v3=мһҗкё° нҢҖл§Ң
      return out;
    },
    damage(f,o,dmg){
      if(o.isFighter) tApplyDamage(o.e, dmg, f.team, f.slot, true);
      else tDamageEnemy(o.e, o.eid, dmg, f);
      return dmg;
    },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.team=f.team; b.owner=f.slot; tBullets.push(b); }
  };
}

/* =======================================================================
   BIG-BATCH-2 P2 В· м „ к·ңм№ҷ мҳЁлқјмқёнҷ”(3лҢҖ3 нҢҖ м—”м§„ мң„ host к¶Ңмң„ к·ңм№ҷ л Ҳмқҙм–ҙ)
   - лЎңм»¬ RULE м „м—ӯмқ„ мһ¬мӮ¬мҡ©(нҢҖ нӮӨ: blueвҶ’player В· redвҶ’enemy)н•ҙ effSpeed/л ҢлҚ” н—¬нҚј кіөмң 
   - лҸҷкё°нҷ”: м җл №м „=кІҢмқҙм§Җ В· мҲҳм •л¶ҖмҲҳкё°=кө¬мЎ°л¬ј HP лӘ©лЎқ В· лі„лӘЁмңјкё°=лі„ мўҢн‘ң/ліҙмң  В· мҲ лһҳ=м—ӯн•  н”Ңлһҳк·ё В· м№ н•ҳкё°=к·ёлҰ¬л“ң RLE
   ======================================================================= */
function tTeamKey(team){ return (team==="blue"||team==="player")?"player":"enemy"; }
function tRuleId(){ const m=OnlineManager.meta; return (m && m.rule)||"tdm"; }
function tRuleMatchTime(rid){
  const C=RULE_CONFIG[rid];
  if(rid==="tdm") return GAME_CONFIG.gameTime;
  return (C && C.matchTime) || RULE_CONFIG.matchTime;
}
function tSetupRule(){
  RULE=null;
  const rid=tRuleId(); if(rid==="tdm") return;
  const map=getMap(tMapId);
  OBSTACLES=map.obstacles.map(o=>o.sid?Object.assign({},o):o);   // кө¬мЎ°л¬ј нӣјмҶҗмқҙ мӣҗліё л§өм—җ лӮЁм§Җ м•ҠкІҢ ліөм ң
  const rp=map.rulePoints||{};
  if(rid==="siege"){
    const C=RULE_CONFIG.siege;
    RULE={ id:"siege", winner:null, towers:{}, turrets:[], structs:[], rebuild:[] };   // SIEGE-AUX
    for(const tk of ["player","enemy"]){
      const sp=(tk==="player")?map.playerSpawn:map.enemySpawn;
      const dirX=(sp.x<LOGW/2)?-1:1;
      const tp=rp.towers&&rp.towers[tk];
      const tx=clamp((tp?tp.x:sp.x+dirX*110)-C.towerW/2, ARENA.x+8, ARENA.x+ARENA.w-C.towerW-8);
      const ty=clamp((tp?tp.y:sp.y)-C.towerH/2, ARENA.y+8, ARENA.y+ARENA.h-C.towerH-8);
      const tower={ x:tx, y:ty, w:C.towerW, h:C.towerH, sid:"rtower_"+tk, team:tk, hp:C.towerHp, maxHp:C.towerHp, structure:true };
      RULE.towers[tk]=tower; RULE.structs.push(tower); OBSTACLES.push(tower); RULE.turrets.push({ o:tower, team:tk, cd:0.8 });
      const subs=rp.subTowers||[];   // SIEGE-AUX: ліҙмЎ°нғ‘(structs мҲңм„ң = нҳёмҠӨнҠёВ·кІҢмҠӨнҠё кІ°м •м Ғ лҸҷмқј вҶ’ HP лҸҷкё° м•Ҳм „)
      for(let s=0;s<subs.length;s++){ const stp=subs[s][tk];
        const ax=clamp(stp.x-C.auxW/2, ARENA.x+8, ARENA.x+ARENA.w-C.auxW-8);
        const ay=clamp(stp.y-C.auxH/2, ARENA.y+8, ARENA.y+ARENA.h-C.auxH-8);
        const aux={ x:ax, y:ay, w:C.auxW, h:C.auxH, sid:"raux_"+tk+"_"+s, team:tk, hp:C.auxHp, maxHp:C.auxHp, structure:true };
        RULE.structs.push(aux); OBSTACLES.push(aux); RULE.turrets.push({ o:aux, team:tk, cd:0.8 });
      }
      for(let i=0;i<C.wallCount;i++){
        const wx=clamp(sp.x-dirX*130-C.wallW/2, ARENA.x+8, ARENA.x+ARENA.w-C.wallW-8);
        const wy=clamp(sp.y+(i-1)*120-C.wallH/2, ARENA.y+8, ARENA.y+ARENA.h-C.wallH-8);
        const wall={ x:wx, y:wy, w:C.wallW, h:C.wallH, sid:"rwall_"+tk+"_"+i, team:tk, hp:C.wallHp, maxHp:C.wallHp, structure:true };
        RULE.structs.push(wall); OBSTACLES.push(wall);
      }
    }
  } else if(rid==="hotzone"){
    RULE={ id:"hotzone", winner:null, x:(rp.zone&&rp.zone.x)||(ARENA.x+ARENA.w/2), y:(rp.zone&&rp.zone.y)||ARENA.y+ARENA.h/2,
           radius:RULE_CONFIG.hotzone.radius, gauge:{player:0, enemy:0}, holder:null,
           fixed:!!rp.zone, moveT:0, posIdx:0, warn:0 };
  } else if(rid==="stargrab"){
    RULE={ id:"stargrab", winner:null, stars:[], spawnAcc:RULE_CONFIG.stargrab.spawnEvery-1, countdown:{player:-1, enemy:-1},
           cx:(rp.vein&&rp.vein.x)||(ARENA.x+ARENA.w/2), cy:(rp.vein&&rp.vein.y)||ARENA.y+ARENA.h/2 };
  } else if(rid==="tag"){
    RULE={ id:"tag", winner:null, needInit:true, phase:"reveal", phaseT:RULE_CONFIG.tag.reveal, survivors:0, runnerMul:1 };
  } else if(rid==="paint"){
    const cols=(map.gridCols||STUDENT_COLS), rows=(map.gridRows||STUDENT_ROWS);   // P4: лҢҖнҳ• л§ө к·ёлҰ¬л“ң нҷ•мһҘ
    const grid=new Uint8Array(cols*rows), blocked=new Uint8Array(cols*rows);
    const markRects=(rects)=>{ for(const o of (rects||[])){
      const c0=Math.max(0,Math.floor((o.x-ARENA.x)/STUDENT_CELL)), c1=Math.min(cols-1,Math.floor((o.x+o.w-1-ARENA.x)/STUDENT_CELL));
      const r0=Math.max(0,Math.floor((o.y-ARENA.y)/STUDENT_CELL)), r1=Math.min(rows-1,Math.floor((o.y+o.h-1-ARENA.y)/STUDENT_CELL));
      for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) blocked[r*cols+c]=1; } };
    markRects(OBSTACLES); markRects(map.bushes); markRects(map.traps);
    let paintable=0; for(let i=0;i<blocked.length;i++) if(!blocked[i]) paintable++;
    RULE={ id:"paint", winner:null, cols:cols, rows:rows, grid:grid, blocked:blocked, paintable:paintable,
           count:{1:0,2:0}, barT:0, bar:{p:0,e:0} };
  }
}
function tFightersList(){ const out=[]; for(const s in tFighters) out.push(tFighters[s]); return out; }
/* в”Җв”Җ м№ н•ҳкё°(нҢҖ): м…Җ лҸ„мғү + к°ңмқё к¶Ғ кІҢмқҙм§Җ ліҙмғҒ в”Җв”Җ */
function tPaintCellBy(x,y,team,ownerSlot){
  if(!RULE || RULE.id!=="paint" || RULE.winner) return false;
  const i=paintCellIdx(x,y); if(i<0 || RULE.blocked[i]) return false;
  const col=(tTeamKey(team)==="player")?1:2, prev=RULE.grid[i];
  if(prev===col) return false;
  if(prev) RULE.count[prev]--;
  RULE.grid[i]=col; RULE.count[col]++;
  const f=ownerSlot!==undefined ? tFighters[ownerSlot] : null;
  if(f && !f.isBot){
    f.myPaint=(f.myPaint||0)+1; f._pAcc=(f._pAcc||0)+1;
    if(f._pAcc>=RULE_CONFIG.paint.gaugePerCells){ f._pAcc=0;
      f.superGauge=Math.min(GAME_CONFIG.superCharge,(f.superGauge||0)+RULE_CONFIG.paint.gaugeAmt); }
  }
  return true;
}
function tPaintSplash(x,y,team,ownerSlot,shape){
  const CS=STUDENT_CELL;
  if(shape==="cross" && tTimeLeft<=RULE_CONFIG.paint.finaleSec) shape="3x3";   // н”јлӮ л Ҳ(P1кіј лҸҷмқј к·ңм№ҷ)
  if(shape==="cross"){ tPaintCellBy(x,y,team,ownerSlot);
    tPaintCellBy(x-CS,y,team,ownerSlot); tPaintCellBy(x+CS,y,team,ownerSlot);
    tPaintCellBy(x,y-CS,team,ownerSlot); tPaintCellBy(x,y+CS,team,ownerSlot); }
  else { for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) tPaintCellBy(x+dc*CS,y+dr*CS,team,ownerSlot); }
}
function tPaintRLE(){
  let s="", i=0;
  while(i<RULE.grid.length){ const v=RULE.grid[i]; let j=i; while(j<RULE.grid.length && RULE.grid[j]===v) j++; s+=v+"*"+(j-i)+","; i=j; }
  return s;
}
function tPaintApplyRLE(str){
  if(!str || !RULE || RULE.id!=="paint") return;
  let i=0;
  for(const seg of str.split(",")){
    if(!seg) continue;
    const p=seg.split("*"), v=+p[0], n=+p[1];
    for(let k=0;k<n && i<RULE.grid.length;k++) RULE.grid[i++]=v;
  }
  let c1=0,c2=0; for(let k=0;k<RULE.grid.length;k++){ if(RULE.grid[k]===1)c1++; else if(RULE.grid[k]===2)c2++; }
  RULE.count[1]=c1; RULE.count[2]=c2;
  RULE.bar.p=c1/Math.max(1,RULE.paintable); RULE.bar.e=c2/Math.max(1,RULE.paintable);
}
/* в”Җв”Җ мҲҳм •л¶ҖмҲҳкё°(нҢҖ): кө¬мЎ°л¬ј н”јн•ҙ(host) + мһ¬кұҙ + мҠ№л¶Җ в”Җв”Җ */
function tDamageRuleStruct(s, dmg){
  if(!(s.hp>0)) return;
  s.hp-=dmg;
  spawnDamageNumber(s.x+s.w/2, s.y-6, Math.round(dmg), "#ffd0a0");
  if(s.hp<=0){ s.hp=0;
    const idx=OBSTACLES.indexOf(s); if(idx>=0) OBSTACLES.splice(idx,1);
    effects.push({kind:"death",x:s.x+s.w/2,y:s.y+s.h/2,t:0,life:0.7,color:(s.team==="player"?"#7fd6ff":"#ff8fa5"),big:true});
    if(s.sid.indexOf("rtower_")===0) tRuleWinTeam(s.team==="player"?"red":"blue");
    else if(s.sid.indexOf("rwall_")===0) RULE.rebuild.push({ s:s, t:RULE_CONFIG.siege.rebuildSec });
  }
}
function tRuleWinTeam(winner){   // winner: "blue"|"red"|"draw"|"taggers"|"runners"
  if(!RULE || RULE.winner) return;
  RULE.winner=winner;
  tWinner=winner;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}
function tRuleTimeUpTeam(){
  const rid=tRuleId();
  if(rid==="siege"){
    const pct=t=>{ const tw=RULE.towers[t]; return tw?Math.max(0,tw.hp)/tw.maxHp:0; };
    tRuleWinTeam(pct("player")>pct("enemy")?"blue":(pct("enemy")>pct("player")?"red":"draw"));
  } else if(rid==="hotzone"){
    tRuleWinTeam(RULE.gauge.player>RULE.gauge.enemy?"blue":(RULE.gauge.enemy>RULE.gauge.player?"red":"draw"));
  } else if(rid==="stargrab"){
    const p=tTeamStars("blue"), e=tTeamStars("red");
    tRuleWinTeam(p>e?"blue":(e>p?"red":"draw"));
  } else if(rid==="tag"){
    tRuleWinTeam("runners");   // мӢңк°„ мў…лЈҢ = мғқмЎҙмһҗ мҠ№
  } else if(rid==="paint"){
    tRuleWinTeam(RULE.count[1]>RULE.count[2]?"blue":(RULE.count[2]>RULE.count[1]?"red":"draw"));
  }
}
function tTeamStars(team){ let n=0; for(const s in tFighters){ const f=tFighters[s]; if(f.team===team) n+=(f.stars||0); } return n; }
function tTickRule(dt){
  if(!RULE || RULE.winner) return;
  const rid=RULE.id, list=tFightersList();
  if(rid==="tag"){
    const C=RULE_CONFIG.tag;
    if(RULE.needInit){
      if(!list.length) return;
      RULE.needInit=false;
      tagInfect(list[Math.floor(Math.random()*list.length)], true);
      for(const f of list) if(!f.isTagger && f.char && f.char.id==="student_06") f.tagShield=1;
      return;
    }
    if(RULE.phase==="reveal"){ RULE.phaseT-=dt; if(RULE.phaseT<=0) RULE.phase="chase"; return; }
    for(const f of list){ if(f.tagCd>0) f.tagCd-=dt; }
    for(const t of list){
      if(!t.isTagger || t.dead || t.tagCd>0) continue;
      for(const r of list){
        if(r.isTagger || r.dead) continue;
        if(dist2(t.x,t.y,r.x,r.y) < (t.r+r.r)*(t.r+r.r)) tagInfect(r, false);
      }
    }
    let survivors=0; for(const f of list){ if(!f.isTagger && !f.dead) survivors++; }
    RULE.survivors=survivors;
    const taggers=list.length-survivors;
    RULE.runnerMul=1+Math.min(C.runnerBuffMax, C.runnerBuffPer*Math.max(0,taggers-1));
    if(survivors===1 && !RULE.lastOne) RULE.lastOne=true;
    if(survivors===0) tRuleWinTeam("taggers");
    return;
  }
  if(rid==="paint"){
    RULE.barT-=dt;
    if(RULE.barT<=0){ RULE.barT=0.5;
      RULE.bar.p=RULE.count[1]/Math.max(1,RULE.paintable);
      RULE.bar.e=RULE.count[2]/Math.max(1,RULE.paintable); }
    return;
  }
  if(rid==="siege"){
    const C=RULE_CONFIG.siege;
    for(let i=RULE.rebuild.length-1;i>=0;i--){
      const rb=RULE.rebuild[i]; rb.t-=dt;
      if(rb.t>0) continue;
      const s=rb.s;
      if(list.some(f=>!f.dead && circleRectOverlap(f.x,f.y,f.r,s))){ rb.t=0.5; continue; }
      s.hp=Math.round(s.maxHp*C.rebuildHpMul);
      OBSTACLES.push(s);
      effects.push({kind:"respawn", x:s.x+s.w/2, y:s.y+s.h/2, t:0, life:0.5, color:"#c9d6ff"});
      RULE.rebuild.splice(i,1);
    }
    for(const T of RULE.turrets){   // SIEGE-AUX: л©”мқё+ліҙмЎ°нғ‘ м „л¶Җ мһҗлҸҷ л°ңмӮ¬(к°ңлі„ мҝЁ)
      const tw=T.o, tk=T.team; if(!tw || tw.hp<=0) continue;
      T.cd-=dt; if(T.cd>0) continue;
      const cx=tw.x+tw.w/2, cy=tw.y+tw.h/2, mzOff=Math.max(tw.w,tw.h)/2+12;
      let best=null, bd=C.turretRange;
      for(const f of list){ if(f.dead || f.invincibleTimer>0 || tTeamKey(f.team)===tk) continue;
        const d=dist(cx,cy,f.x,f.y); if(d>=bd) continue;
        const a0=Math.atan2(f.y-cy,f.x-cx);
        if(hasLineOfSight(cx+Math.cos(a0)*mzOff, cy+Math.sin(a0)*mzOff, f.x, f.y)){ bd=d; best=f; } }
      if(best){
        const a=Math.atan2(best.y-cy,best.x-cx), mz=Math.max(tw.w,tw.h)/2+12;
        tBullets.push({ x:cx+Math.cos(a)*mz, y:cy+Math.sin(a)*mz, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
          r:8, damage:C.turretDmg, team:(tk==="player"?"blue":"red"), owner:"turret", color:"#ffd0a0", alive:true, traveled:0,
          maxRange:C.turretRange+90, age:0, isSuper:true });
        T.cd=C.turretCd;
      } else T.cd=0.15;
    }
    return;
  }
  if(rid==="hotzone"){
    const C=RULE_CONFIG.hotzone;
    if(!RULE.fixed && C.moveEvery>0){
      RULE.moveT+=dt;
      RULE.warn=Math.max(0, RULE.moveT-(C.moveEvery-3));
      if(RULE.moveT>=C.moveEvery){
        RULE.moveT=0; RULE.warn=0; RULE.posIdx=(RULE.posIdx+1)%3;
        RULE.y=ARENA.y+ARENA.h*[0.5,0.25,0.75][RULE.posIdx];
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.6, radius:RULE.radius});
      }
    }
    let pIn=0, eIn=0;
    for(const f of list){ if(f.dead) continue;
      if(dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius){ if(f.team==="blue") pIn++; else eIn++; } }
    RULE.holder=(pIn&&!eIn)?"player":((eIn&&!pIn)?"enemy":((pIn&&eIn)?"contest":null));
    if(RULE.holder==="player"){ RULE.gauge.player=Math.min(C.goal, RULE.gauge.player+C.capPerSec*dt); if(RULE.gauge.player>=C.goal) tRuleWinTeam("blue"); }
    else if(RULE.holder==="enemy"){ RULE.gauge.enemy=Math.min(C.goal, RULE.gauge.enemy+C.capPerSec*dt); if(RULE.gauge.enemy>=C.goal) tRuleWinTeam("red"); }
    return;
  }
  if(rid==="stargrab"){
    const C=RULE_CONFIG.stargrab;
    RULE.spawnAcc+=dt;
    if(RULE.spawnAcc>=C.spawnEvery){
      RULE.spawnAcc=0;
      if(RULE.stars.filter(s=>s.ttl===undefined).length<C.maxOnGround){
        const p=starSpawnPoint(); if(p) RULE.stars.push(p);   // STARGRAB-RANDOM: л§ө м „м—ӯ лһңлҚӨ(нҶөн–ү м№ё)
      }
    }
    for(let i=RULE.stars.length-1;i>=0;i--){
      const s=RULE.stars[i];
      if(s.ttl!==undefined){ s.ttl-=dt; if(s.ttl<=0){ RULE.stars.splice(i,1); continue; } }
      for(const f of list){ if(f.dead) continue;
        if(dist(f.x,f.y,s.x,s.y) < f.r+16){ f.stars=(f.stars||0)+1;
          effects.push({kind:"respawn",x:s.x,y:s.y,t:0,life:0.35,color:"#ffe066"});
          RULE.stars.splice(i,1); break; } }
    }
    for(const team of ["blue","red"]){
      const tk=tTeamKey(team);
      if(tTeamStars(team)>=C.goal){
        if(RULE.countdown[tk]<0) RULE.countdown[tk]=C.countdown;
        RULE.countdown[tk]-=dt;
        if(RULE.countdown[tk]<=0){ tRuleWinTeam(team); return; }
      } else RULE.countdown[tk]=-1;
    }
  }
}
/* лҙҮ лӘ©н‘ң м§Җм җ(к·ңм№ҷлі„): к·јмІҳм—җ м Ғмқҙ м—Ҷмңјл©ҙ лӘ©н‘ңлЎң мқҙлҸҷ */
function tRuleBotObjective(f){
  if(!RULE) return null;
  if(RULE.id==="hotzone") return { x:RULE.x, y:RULE.y, r:RULE.radius*0.55 };
  if(RULE.id==="stargrab"){
    let best=null, bd=Infinity;
    for(const s of RULE.stars){ const d=dist2(f.x,f.y,s.x,s.y); if(d<bd){ bd=d; best=s; } }
    return best ? { x:best.x, y:best.y, r:16 } : { x:RULE.cx, y:RULE.cy, r:120 };
  }
  if(RULE.id==="siege"){
    const tw=RULE.towers[tTeamKey(f.team)==="player"?"enemy":"player"];
    return (tw && tw.hp>0) ? { x:tw.x+tw.w/2, y:tw.y+tw.h/2, r:200, tower:tw } : null;
  }
  if(RULE.id==="paint"){
    const ai=(f.ai=f.ai||{});
    ai.pT=(ai.pT||0)-1/60;
    if(!ai.pGoal || ai.pT<=0){
      ai.pT=2.5;
      const myCol=(tTeamKey(f.team)==="player")?1:2;
      for(let t=0;t<24;t++){
        const c=Math.floor(Math.random()*RULE.cols), r=Math.floor(Math.random()*RULE.rows), i=r*RULE.cols+c;
        if(!RULE.blocked[i] && RULE.grid[i]!==myCol){ ai.pGoal={x:ARENA.x+c*STUDENT_CELL+28, y:ARENA.y+r*STUDENT_CELL+28}; break; }
      }
    }
    return ai.pGoal ? { x:ai.pGoal.x, y:ai.pGoal.y, r:60 } : null;
  }
  return null;
}

let tMyTagRole=false;   // лӮҙ мөңмў… мҲ лһҳ м—¬л¶Җ(кІ°кіј л¬ёкө¬мҡ©)
function tGuestApplyRule(s){
  const rid=tRuleId(); if(rid==="tdm") return;
  if(!RULE || RULE.id!==rid) tSetupRule();
  const r=(s&&s.rule)||{};
  if(rid==="hotzone"){ if(r.x!==undefined){ RULE.x=r.x; RULE.y=r.y; } RULE.gauge.player=r.gp||0; RULE.gauge.enemy=r.ge||0; RULE.holder=r.h||null; RULE.warn=r.w||0; }
  else if(rid==="tag"){ RULE.phase=r.ph||"chase"; RULE.phaseT=r.pt||0; RULE.survivors=r.sv||0; RULE.runnerMul=r.rm||1; RULE.lastOne=!!r.lo; }
  else if(rid==="stargrab"){ RULE.stars=(r.st||[]).map(o=>({x:o.x,y:o.y})); RULE.countdown={player:(r.cp===undefined?-1:r.cp), enemy:(r.ce===undefined?-1:r.ce)}; }
  else if(rid==="paint"){ if(r.g!==undefined&&r.g!==null) tPaintApplyRLE(r.g); }   // P1: g мғқлһө нҢЁнӮ·=ліҖнҷ” м—ҶмқҢ(мқҙм „ к·ёлҰ¬л“ң мң м§Җ)
  else if(rid==="siege" && r.sh){
    for(let i=0;i<RULE.structs.length && i<r.sh.length;i++){
      const st=RULE.structs[i], hp=r.sh[i];
      const inOb=OBSTACLES.indexOf(st)>=0;
      st.hp=hp;
      if(hp<=0 && inOb) OBSTACLES.splice(OBSTACLES.indexOf(st),1);
      else if(hp>0 && !inOb) OBSTACLES.push(st);
    }
  }
  // лӮҙ м—ӯн•  м¶”м Ғ(мҲ лһҳ) + мһЎнһҳ нҶ мҠӨнҠё
  if(rid==="tag" && s && s.fighters){
    const me=s.fighters[OnlineManager.mySlot];
    if(me){ const now=!!me.tg; if(now && !tMyTagRole && OnlineManager.role!=="host") showToast("мһЎнҳ”лӢӨ! мқҙм ң л„Ҳк°Җ мҲ лһҳ рҹ‘№"); tMyTagRole=now; }
  }
}

// лі„ ліҙмң  н•©кі„(нҳёмҠӨнҠё=tFighters, кІҢмҠӨнҠё=нҢЁнӮ· fightersмқҳ st н•„л“ң)
function tGuestTeamStars(team){

  const s=OnlineManager.onlineState; let n=0;
  if(s && s.fighters) for(const slot in s.fighters){ if(tRosterTeam(slot)===team) n+=(s.fighters[slot].st||0); }

}

function tBotUpdate(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f);   // лҙҮлҸ„ н•Ём • л‘”нҷ” м Ғмҡ©(мқјкҙҖм„ұ)
  if(RULE && RULE.id==="tag"){ tagBotUpdate(f, dt, tFightersList(), envTeam()); return; }   // P2: мҲ лһҳ м „мҡ© лҙҮ AI мһ¬мӮ¬мҡ©
  // P2: к·ңм№ҷ лӘ©н‘ң м§Җн–Ҙ вҖ” м Ғмқҙ л©Җл©ҙ лӘ©н‘ң м§Җм җ(кұ°м җ/лі„/м Ғ нғ‘/лҜёлҸ„мғү м№ё)мңјлЎң мқҙлҸҷ
  const obj=tRuleBotObjective(f);
  const tN=tNearestEnemyFighter(f);
  const tNd=tN?dist(f.x,f.y,tN.x,tN.y):Infinity;
  if(obj && dist(f.x,f.y,obj.x,obj.y)>obj.r && tNd>360){
    const dx=obj.x-f.x, dy=obj.y-f.y, d=Math.hypot(dx,dy)||1;
    const step=effSpeed(f)*0.9*dt, ox=f.x, oy=f.y;
    moveEntity(f, dx/d*step, dy/d*step);
    if(Math.hypot(f.x-ox,f.y-oy)<step*0.3){ const sd=(f.ai.stuckDir||1); moveEntity(f, -dy/d*sd*step, dx/d*sd*step); }
    f.facing=Math.atan2(dy,dx);
    // мҲҳм •л¶ҖмҲҳкё°: лӘ©н‘ңк°Җ м Ғ нғ‘мқҙкі  мӮ¬кұ°лҰ¬В·мӢңм•ј м•Ҳмқҙл©ҙ нғ‘ мӮ¬кІ©
    if(obj.tower){ f.cooldown-=dt;
      const td=dist(f.x,f.y,obj.x,obj.y);
      if(td<GAME_CONFIG.playerRange*0.9 && f.cooldown<=0 && hasLineOfSight(f.x,f.y,obj.x,obj.y)){ tFire(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId))*1.15; } }
    // м№ н•ҳкё°: мқҙлҸҷн•ҳл©° л°”лӢҘ мӘҪ л°ңмӮ¬(нғ„ кІҪлЎң лҸ„мғү)
    else if(RULE && RULE.id==="paint"){ f.cooldown-=dt;
      if(f.cooldown<=0){ tFire(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId))*1.3; } }
    return;
  }
  const t=tNearestEnemyFighter(f);
  if(t){
    const dx=t.x-f.x, dy=t.y-f.y, d=Math.hypot(dx,dy)||1;
    let mvx=0,mvy=0;
    if(d>320){ mvx=dx/d; mvy=dy/d; }
    else if(d<200){ mvx=-dx/d; mvy=-dy/d; }
    else { f.ai.strafeTimer-=dt; if(f.ai.strafeTimer<=0){ f.ai.strafeDir=Math.random()<0.5?1:-1; f.ai.strafeTimer=rand(0.5,1.2); } mvx=-dy/d*f.ai.strafeDir; mvy=dx/d*f.ai.strafeDir; }
    if(f.ai.stuckTimer>0){ f.ai.stuckTimer-=dt; mvx=-dy/d*f.ai.stuckDir; mvy=dx/d*f.ai.stuckDir; } // лІҪлҒјмһ„ нғҲм¶ң: мҳҶмңјлЎң мҡ°нҡҢ
    const ml=Math.hypot(mvx,mvy);
    if(ml>0){ mvx/=ml; mvy/=ml; const step=effSpeed(f)*0.9*dt, ox=f.x, oy=f.y;
      moveEntity(f, mvx*step, mvy*step);
      if(f.ai.stuckTimer<=0 && Math.hypot(f.x-ox,f.y-oy) < step*0.3){ f.ai.stuckDir=Math.random()<0.5?1:-1; f.ai.stuckTimer=rand(0.4,0.8); } }
    f.facing=Math.atan2(dy,dx);
    f.cooldown-=dt; f.ai.reTimer-=dt;
    if(d<GAME_CONFIG.playerRange && f.cooldown<=0 && f.ai.reTimer<=0 && hasLineOfSight(f.x,f.y,t.x,t.y)){
      tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*1.3*atkSlowFactor(f); f.ai.reTimer=rand(0.1,0.4);
    }
    // лҙҮлҸ„ X/C мӮ¬мҡ©(3v3 л№ҲмһҗлҰ¬ AI): мӮ¬лһҢліҙлӢӨ лӮ®мқҖ л№ҲлҸ„лЎң вҖ” м Ғмқҙ мӮ¬кұ°лҰ¬ м•Ҳмқј л•Ңл§Ң
    const wRange=GAME_CONFIG.playerRange*getWeapon(f.weaponId).rangeMul;
    if(f.specialCd<=0 && d<Math.max(wRange,260) && Math.random()<dt*0.5) castSpecialFor(f, envTeam());
    if((f.superGauge||0)>=GAME_CONFIG.superCharge && d<wRange && Math.random()<dt*0.7)
      castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  }
}

function tFire(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // н’ҖмҲІ: кіөкІ©н•ҳл©ҙ мһ мӢң л“ңлҹ¬лӮЁ
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6;
    const b={ x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*spec.speed, vy:Math.sin(a)*spec.speed,
      r:spec.radius, damage:spec.damage, team:f.team, owner:f.slot, color:spec.color, alive:true, traveled:0,
      maxRange:spec.range, aid:aid, wid:spec.wid, wref:spec.wref, age:0,
      snipe:spec.snipe||0, stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    tBullets.push(b);
  }
}

// 3v3 нғ„нҷҳ(PVP): л¶Җл©”лһ‘ мҷ•ліөВ·л¬ҙкё° нҡЁкіјВ·attackId кІҢмқҙм§ҖВ·нҶөнҶөл№„н–үкё° л°ҳмӮ¬ м§Җмӣҗ
function tUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=tFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      if(RULE && RULE.id==="paint") tPaintCellBy(b.x, b.y, b.team, b.owner);   // P2: нғ„ л№„н–ү кІҪлЎң лҸ„мғү
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        if(RULE && RULE.id==="siege" && wref.structure && wref.sid && wref.team!==tTeamKey(b.team)) tDamageRuleStruct(wref, b.damage);   // P2: кө¬мЎ°л¬ј н”јн•ҙ
        if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,(b.wid==="tool_06")?"3x3":"cross");   // P2: лІҪ м°©нғ„ лҸ„мғү
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      for(const slot in tFighters){ const t=tFighters[slot];
        if(t.team===b.team || t.dead || t.invincibleTimer>0 || t.inactive) continue;
        if(dist(b.x,b.y,t.x,t.y) < b.r+t.r){
          if(b.boomerang){
            const hm=(b.phase==="out")?b.hitO:b.hitB;
            if(hm[slot]) continue;
            hm[slot]=true;
            tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color);
            continue;                                     // л¶Җл©”лһ‘мқҖ кҙҖнҶө(ліөк·Җ нғҖкІ©)
          }
          if(b.ultCid && !canUltDamage(b.ultCid, slot, b.ultMaxHits||4)){ b.alive=false; break; }  // лҹӯнӮӨ C: к°ҷмқҖ лҢҖмғҒ мөңлҢҖ н”јн•ҙ мғҒн•ң(лЎңм»¬кіј лҸҷмқј)
          tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
          if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
          if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,"3x3");   // P2: м Ғ лӘ…мӨ‘ 3Г—3
          spawnHitFx(b.x,b.y,b.wid,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){
        if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,(b.wid==="tool_06")?"3x3":"cross");   // P2: мӮ¬кұ°лҰ¬ лҒқ м°©нғ„ лҸ„мғү
        b.alive=false; break;
      }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}

function tApplyDamage(target, dmg, fromTeam, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0 || target.team===fromTeam) return;
  dmg=incomingDamage(target, dmg);                        // л°©нҢЁ/м§ҲмЈј к°җмҶҢ(мөңмҶҢ 1)
  target.hp-=dmg; target.hitFlash=0.15;
  const attacker=tFighters[fromSlot];
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    if(TEAM_COLOR[fromTeam]!==undefined) tTeamScores[fromTeam]=(tTeamScores[fromTeam]||0)+1;
    const killer=tFighters[fromSlot]; if(killer) killer.score+=1;
    if(RULE && RULE.id==="stargrab" && (target.stars||0)>0){   // P2: мЈҪмңјл©ҙ ліҙмң  лі„ л“ңлһҚ(6мҙҲ мҶҢл©ё)
      for(let i=0;i<target.stars;i++) RULE.stars.push({ x:target.x+rand(-26,26), y:target.y+rand(-26,26), ttl:RULE_CONFIG.stargrab.dropTtl });
      target.stars=0;
    }
  }
}

function tRespawn(f){

}

function tPackFighter(f){
  // л§Ө нӢұ м „мҶЎ мөңмҶҢнҷ”: ліҖн•ҳлҠ” к°’л§Ң ліҙлӮёлӢӨ.
  // м •м Ғмқё к°’(charId/team/slot/maxHp)мқҖ players лЎңмҠӨн„°лЎң кІҢмҠӨнҠёк°Җ м—ӯмӮ°н•ңлӢӨ(л ү мөңм Ғнҷ”).
  // am/rl/sgлҠ” лӮҙ HUD(нғ„м°Ҫ/мһҘм „/к¶Ғк·№кё°)мҡ© мһ‘мқҖ мҲ«мһҗл§Ң м¶”к°Җ.
  const o={ x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp),
    facing:Math.round(f.facing*100)/100, dead:!!f.dead, inv:f.invincibleTimer>0,
    am:(f.ammo===undefined?-1:f.ammo),   // мҳЁлқјмқёкёҙкёү P0: -1=л¬ҙн•ңнғ„(лҙҮВ·лҹӯнӮӨ) вҖ” undefinedлҠ” RTDB set() м „мІҙ кұ°л¶Җ("лҸҷкё°нҷ” лҢҖкё°" мӣҗмқё)
    rl:f.reloading?1:0, sg:Math.round(f.superGauge||0), fr:f.fireRevealTimer>0?1:0,
    xc:Math.round(Math.max(0,f.specialCd||0)*10)/10,     // X мҝЁнғҖмһ„(HUDмҡ©)
    lv:(f.lives===undefined?-1:f.lives) };               // PVE к°ңмқё лӘ©мҲЁ(-1=н•ҙлӢ№ м—ҶмқҢ/3v3)
  if(f.isBot){ o.c=f.char.id; o.tm=f.team; }             // лҙҮмқҖ players лЎңмҠӨн„°м—җ м—Ҷм–ҙ кІҢмҠӨнҠёк°Җ charId/team м—ӯмӮ° л¶Ҳк°Җ вҶ’ нҢЁнӮ·м—җ мӢӨм–ҙ нҷ”л©ҙ мқјм№ҳ(м•Ҳ н•ҳл©ҙ кІҢмҠӨнҠём—җм„ң лҙҮмқҙ м „л¶Җ кё°ліё мәҗлҰӯ/blueлЎң ліҙмһ„)
  if(RULE){                                              // P2: к·ңм№ҷлі„ к°ңмқё мғҒнғң(мҲ лһҳ м—¬л¶ҖВ·лі„ ліҙмң )
    if(RULE.id==="tag") o.tg=f.isTagger?1:0;
    else if(RULE.id==="stargrab") o.st=f.stars||0;
  }
  return o;
}

function tHostWriteState(){
  if(!OnlineManager.roomRef) return;   // v1.21 м„ұлҠҘ: нҳјмһҗ лҸ„м „(мҳӨн”„лқјмқё)м—җм„ңлҠ” нҢЁнӮ· м§Ғл ¬нҷ” мһҗмІҙлҘј мғқлһө
  const fighters={};
  for(const slot in tFighters) fighters[slot]=tPackFighter(tFighters[slot]);
  const bl=[];
  // кІҢмҠӨнҠё л ҢлҚ”м—җ н•„мҡ”н•ң кІғл§Ң(x,y,r,c,vx,vy,w=л¬ҙкё° мҠӨн”„лқјмқҙнҠё id). owner/teamмқҖ кІҢмҠӨнҠёк°Җ м•Ҳ мҚЁм„ң м ңмҷё(л ү мөңм Ғнҷ”).
  // P1: нҢЁнӮ·м—җлҠ” мөңмӢ  48л°ңк№Ңм§Җл§Ң(мӢңл®¬ мғҒн•ң 80 мң м§Җ) вҖ” лӮңм „ мӢң мҠӨлғ…мғ· 6.8KBвҶ’4.4KB. мһҳлҰ¬лҠ” кұҙ мҶҢл©ё м§Ғм „мқҳ мҳӨлһҳлҗң нғ„.
  const _blSrc=(tBullets.length>48)?tBullets.slice(tBullets.length-48):tBullets;
  for(const b of _blSrc) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy), w:b.wid||null });
  const st={ timeLeft:Math.max(0,Math.round(tTimeLeft)), teamScores:tTeamScores, fighters:fighters, bullets:bl,
    powerups:POWERUPS.map(p=>({x:Math.round(p.x),y:Math.round(p.y),t:powerupPacketT(p),id:p.id})), zones:packZones() };
  // BIG-BATCH-2 P2: к·ңм№ҷ мғҒнғң лҸҷкё°нҷ”(м җл №м „=кІҢмқҙм§Җ В· мҲҳм •=кө¬мЎ°л¬јHP В· лі„=мўҢн‘ң/м№ҙмҡҙнҠёлӢӨмҡҙ В· мҲ лһҳ=лӢЁкі„ В· м№ =RLE к·ёлҰ¬л“ң)
  if(RULE && getOnlineMode(OnlineManager.mode).modeType==="pvp"){
    const r={};
    if(RULE.id==="hotzone"){ r.x=Math.round(RULE.x); r.y=Math.round(RULE.y); r.gp=Math.round(RULE.gauge.player*10)/10; r.ge=Math.round(RULE.gauge.enemy*10)/10; r.h=RULE.holder||null; r.w=Math.round((RULE.warn||0)*10)/10; }
    else if(RULE.id==="siege"){ r.sh=RULE.structs.map(s=>Math.max(0,Math.round(s.hp))); }
    else if(RULE.id==="stargrab"){ r.st=RULE.stars.map(s=>({x:Math.round(s.x),y:Math.round(s.y)}));
      r.cp=RULE.countdown.player<0?-1:Math.round(RULE.countdown.player*10)/10; r.ce=RULE.countdown.enemy<0?-1:Math.round(RULE.countdown.enemy*10)/10; }
    else if(RULE.id==="tag"){ r.ph=RULE.phase; r.pt=Math.round(Math.max(0,RULE.phaseT)*10)/10; r.sv=RULE.survivors; r.rm=Math.round((RULE.runnerMul||1)*100)/100; r.lo=RULE.lastOne?1:0; }
    else if(RULE.id==="paint"){   // P1: к·ёлҰ¬л“ңк°Җ ліҖн–Ҳмқ„ л•Ңл§Ң м „мҶЎ(+1мҙҲл§ҲлӢӨ м•Ҳм „ лҰ¬н”„л ҲмӢң) вҖ” кі м • л№„мҡ© м ңкұ°
      const g=tPaintRLE();
      if(g!==tPaintLastRLE || tPaintRLESkips>=15){ r.g=g; tPaintLastRLE=g; tPaintRLESkips=0; }
      else tPaintRLESkips++;

    st.rule=r;

  // PVEл©ҙ м Ғ/мҠӨн…Ңмқҙм§Җ м •ліҙлҸ„ н•Ёк»ҳ ліҙлӮёлӢӨ. color/r/bossлҠ” typeмңјлЎң кІҢмҠӨнҠёк°Җ м—ӯмӮ°(м „мҶЎ м ңмҷё).
  if(getOnlineMode(OnlineManager.mode).modeType==="pve"){
    const en={}; for(const id in tEnemies){ const e=tEnemies[id]; en[id]={ x:Math.round(e.x), y:Math.round(e.y), hp:Math.round(e.hp), maxHp:Math.round(e.maxHp), facing:Math.round(e.facing*100)/100, type:e.type, dead:!!e.dead }; }
    st.enemies=en;
    st.structs=tPackStructs();                                       // v1.22 кө¬мЎ°л¬ј(мҲ«мһҗл§Ң, вүӨ6к°ң)
    st.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length, mapId:tMapId,
      dfT:Math.max(0,Math.ceil(tPve.defendT||0)), gates:tGatesAlive(),
      hg:Math.round(tPve.holdG||0), sgT:Math.max(0,Math.ceil(tPve.sgT||0)), sgL:tPve.sgLost||0,
      sgS:(tPve.sgStars||[]).map(s=>({x:Math.round(s.x),y:Math.round(s.y)})), it:Math.max(0,Math.round((tPve.introT||0)*10)/10) };
    if(tPve.upg){ const ug={}; for(const s in tPve.upg){ const o=tPve.upg[s]; ug[s]={c:o.c, r:o.r, p:o.picked?1:0, pi:o.pi}; } st.pve.upg=ug; }   // к°•нҷ” нӣ„ліҙ(л¬ёмһҗ id 3к°ңВ·мҲ«мһҗл§Ң)
  }
  OnlineManager.writeHostState(st);
}
function tHostEndMatch(){
  if(OnlineManager.role!=="host") return;
  let winner="draw";
  if(tTeamScores.blue>tTeamScores.red) winner="blue"; else if(tTeamScores.red>tTeamScores.blue) winner="red";
  tWinner=winner;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}

function tMyTeam(){
  const s=OnlineManager.mySlot;
  if(OnlineManager.role==="host" && tFighters[s]) return tFighters[s].team;
  const st=OnlineManager.onlineState;
  if(st && st.fighters && st.fighters[s]) return st.fighters[s].team;
  const p=OnlineManager.players; if(p && p[s]) return p[s].team;
  return "blue";
}
function tComputeResultText(){
  let w=tWinner; if(!w && OnlineManager.meta) w=OnlineManager.meta.winner;
  if(!w || w==="draw") return "л¬ҙмҠ№л¶Җ!";
  if(w==="taggers") return tMyTagRole ? "мҠ№лҰ¬!" : "нҢЁл°°!";      // P2 мҲ лһҳ: м—ӯн•  кё°мӨҖ кІ°кіј
  if(w==="runners") return tMyTagRole ? "нҢЁл°°!" : "мҠ№лҰ¬!";
  return (w===tMyTeam()) ? "мҠ№лҰ¬!" : "нҢЁл°°!";
}

/* ---- guest л ҢлҚ”(ліҙк°„ + лӮҙ мҠ¬лЎҜ мқҙлҸҷ мҳҲмёЎ) ---- */
function tUpdateGuest(dt){
  const s=OnlineManager.onlineState; if(!s || !s.fighters) return;
  // PVE: hostк°Җ ліҙлӮё нҳ„мһ¬ мҠӨн…Ңмқҙм§Җ л§өмңјлЎң мһҘм• л¬ј/н’ҖмҲІмқ„ л§һм¶ҳлӢӨ(ліҙмқҙлҠ” лІҪ=мӢӨм ң м¶©лҸҢ)
  if(s.pve && s.pve.mapId && s.pve.mapId!==tMapId){ tMapId=s.pve.mapId; const m=getMap(tMapId); OBSTACLES=m.obstacles.slice(); BUSHES=m.bushes; tGuestStructSig=""; }
  if(s.structs) tGuestApplyStructs(s.structs);                       // v1.22: кө¬мЎ°л¬ј мғҒнғң+м¶©лҸҢ лҸҷкё°нҷ”
  tInterpClock+=dt;
  if(s!==tLastStateRef){
    tLastStateRef=s;
    onlineSnapPush(tSnapBuf, tInterpClock, s);   // P1: нҺҳм–ҙ ліҙк°„ лІ„нҚј
    tBulletsView=(s.bullets||[]).map(b=>({ x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,r:b.r,c:b.c,w:b.w||null }));
    if(getOnlineMode(OnlineManager.mode).modeType==="pvp") tGuestApplyRule(s);   // P2+PERF-2: мғҲ нҢЁнӮ·мқј л•Ңл§Ң(нҺҳмқёнҠё RLE л””мҪ”л“ң 60вҶ’15Hz)
  }
  for(const b of tBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const myslot=OnlineManager.mySlot;
  for(const slot in s.fighters){
    const p=s.fighters[slot];
    if(slot===myslot){
      if(!tPredict || p.dead){ const ch=getCharacter(p.charId||tRosterCharId(slot)); tPredict={ x:p.x,y:p.y,facing:p.facing||0,r:22,moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove }; }
      else { const inp=readLocalInput();
        predictMoveAim(tPredict, inp, dt);   // UPDATE-1 P3: мҳҲмёЎлҸ„ мқҳлҸ„ кіөмҡ©
        onlineReconcile(tPredict, p, dt); }   // P1: м—°мҶҚ нҷ”н•ҙ(70px н•ҳл“ңмҠӨлғ… м ңкұ°)
    } else {
      if(!tRenderFighters[slot] || p.dead || tPrevDead[slot]) tRenderFighters[slot]={ x:p.x,y:p.y,facing:p.facing||0 };   // лҰ¬мҠӨнҸ° мІ« н”„л Ҳмһ„ мҠӨлғ…(мЈҪмқҖ мһҗлҰ¬м—җм„ң лҜёлҒ„лҹ¬м§җ л°©м§Җ)
      else tRenderFighters[slot]=onlineInterpTarget(tSnapBuf, tInterpClock, function(ss){ return (ss&&ss.fighters)?ss.fighters[slot]:null; }, tRenderFighters[slot], dt);   // P1: нҺҳм–ҙ ліҙк°„
      tPrevDead[slot]=p.dead;
    }
  }
  if(s.enemies){   // P1b: PVE м ҒлҸ„ нҺҳм–ҙ ліҙк°„ вҖ” м Ғ мөңлҢҖ 40л§ҲлҰ¬к°Җ 15Hzл§ҲлӢӨ лҡқлҡқ м җн”„н•ҳлҚҳ кІғ(нҢҢмқҙн„°мҷҖ лҸҷмқј н—¬нҚј)
    for(const id in s.enemies){
      const e=s.enemies[id];
      if(e.dead){ delete tEnemiesView[id]; continue; }
      if(!tEnemiesView[id]) tEnemiesView[id]={ x:e.x, y:e.y, facing:e.facing||0 };
      else tEnemiesView[id]=onlineInterpTarget(tSnapBuf, tInterpClock, function(ss){ const en=(ss&&ss.enemies)?ss.enemies[id]:null; return (en&&!en.dead)?en:null; }, tEnemiesView[id], dt);
    }
    for(const id in tEnemiesView){ if(!s.enemies[id]) delete tEnemiesView[id]; }
  }
}

function tGetDrawData(){
  const out={ fighters:[], bullets:[], teamScores:{blue:0,red:0}, timeLeft:0, waiting:false };
  if(OnlineManager.role==="host"){
    for(const slot in tFighters){ const f=tFighters[slot];
      out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:f.team,slot:slot,isMe:slot===OnlineManager.mySlot,fr:f.fireRevealTimer>0?1:0,
        tg:f.isTagger?1:0, st:f.stars||0, sh:f.tagShield||0 }); }   // P2: к·ңм№ҷ л°°м§Җ
    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color,w:b.wid||null,vx:b.vx,vy:b.vy }));
    out.teamScores=tTeamScores; out.timeLeft=Math.max(0,Math.ceil(tTimeLeft));
    out.zones=packZones();
  } else {
    const s=OnlineManager.onlineState;
    if(!s || !s.fighters){ out.waiting=true; out.timeLeft=GAME_CONFIG.gameTime; return out; }
    const myslot=OnlineManager.mySlot;
    for(const slot in s.fighters){ const p=s.fighters[slot]; let rx=p.x,ry=p.y,rf=p.facing;
      if(slot===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[slot] && !p.dead){ rx=tRenderFighters[slot].x; ry=tRenderFighters[slot].y; rf=tRenderFighters[slot].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||(p.c?GAME_CONFIG.playerMaxHp*getCharacter(p.c).hpMul:tRosterMaxHp(slot)),dead:p.dead,inv:p.inv,charId:p.c||p.charId||tRosterCharId(slot),team:p.tm||p.team||tRosterTeam(slot),slot:slot,isMe:slot===myslot,fr:p.fr,
        tg:p.tg||0, st:p.st||0 }); }   // P2: к·ңм№ҷ л°°м§Җ (лҙҮмқҖ p.c/p.tmмңјлЎң мәҗлҰӯ/нҢҖ лҸҷкё°нҷ”)
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    out.teamScores=s.teamScores||{blue:0,red:0}; out.timeLeft=s.timeLeft;
    out.zones=(s.zones||[]);
  }
  return out;
}

function tDrawFighter(d){
  if(d.dead) return;
  const ch=getCharacter(d.charId||"lumi");
  const isTagRule=!!(RULE && RULE.id==="tag");
  let vis;
  if(isTagRule){   // P2 В§1.4: м—ӯн•  кё°л°ҳ мӢңм•ј вҖ” лӮҙк°Җ мҲ лһҳл©ҙ мҲҳн’Җ мҶҚ лҸ„л§қмһҗ м•Ҳ ліҙмһ„
    const hideMe = tMyTagRole && !d.tg && !d.isMe &&
                   inBush({x:d.x,y:d.y}) && _viewer && dist(_viewer.x,_viewer.y,d.x,d.y)>RULE_CONFIG.tag.bushHide && !d.fr;
    vis = hideMe ? {hidden:true, alpha:0} : {hidden:false, alpha:inBush({x:d.x,y:d.y})?0.75:1};
  } else {
    vis=bushVisibility(d.x,d.y, d.team, d.isMe, _viewer, !!d.fr);
  }
  if(vis.hidden){ drawBushRustle(d.x,d.y); return; }
  let alpha=vis.alpha; if(d.inv && Math.floor(uiTime*12)%2===0) alpha*=0.4;
  // м¶•11: нҢҖ мғү мӣҗнҳ• л§Ғ(лӘём—җ кІ№м№Ё) вҶ’ л°ңл°‘ л§Ҳм»ӨлЎң көҗмІҙ(лӮҳ=кёҲмғүВ·м•„кө°=нҢҢлһ‘ мӢӨм„ В·м Ғ=л№Ёк°• м җм„ )
  const _myTeam=_viewer?_viewer.team:null;
  const mk = isTagRule ? (d.isMe?"me":((!!d.tg)===tMyTagRole?"ally":"enemy"))
                       : (d.isMe?"me":((_myTeam && d.team===_myTeam)?"ally":"enemy"));
  drawTeamMarker(d.x, d.y, 22, mk, alpha);
  if(isTagRule && d.tg){   // мҲ лһҳ н‘ңмӢқ рҹ‘№
    ctx.save(); ctx.globalAlpha=alpha; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="bold 20px 'Malgun Gothic',sans-serif";
    ctx.fillText("рҹ‘№", d.x, d.y-22-44+Math.sin(uiTime*5)*3);
    ctx.restore();
  }
  if(isTagRule && !d.tg){   // мң кё°м„ұ: мҳЁлқјмқём—җлҸ„ л°©м–ҙл§ү л§Ғ(лі„кіЁл ҳ)В·мөңнӣ„мқҳ мғқмЎҙмһҗ л§Ғ(мҳӨн”„лқјмқё 9083кіј лҸҷнҳ•)
    if(d.sh>0){
      ctx.save(); ctx.globalAlpha=alpha*0.85; ctx.strokeStyle="#ffe066"; ctx.lineWidth=2.5;
      ctx.setLineDash([7,5]); ctx.beginPath(); ctx.arc(d.x,d.y,22+9,uiTime*1.5,uiTime*1.5+Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    if(RULE && RULE.lastOne && RULE.survivors===1){
      const lp=0.5+0.5*Math.sin(uiTime*6);
      ctx.save(); ctx.globalAlpha=0.5+0.4*lp; ctx.strokeStyle="#ffd23f"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(d.x,d.y,22+14+lp*4,0,Math.PI*2); ctx.stroke();
      ctx.textAlign="center"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe066";
      ctx.fillText("вӯҗ мөңнӣ„мқҳ мғқмЎҙмһҗ", d.x, d.y-22-58); ctx.restore();
    }
  }
  if(RULE && RULE.id==="stargrab" && (d.st||0)>0){   // вӯҗ ліҙмң  л°°м§Җ + мәҗлҰ¬м–ҙ л§Ғ
    ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=alpha;
    ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe14d";
    ctx.fillText("вӯҗ"+d.st, d.x, d.y-22-44);
    if(d.st>=RULE_CONFIG.stargrab.carrierMark){
      const cp=0.5+0.5*Math.sin(uiTime*5);
      ctx.strokeStyle=TEAM_COLOR[d.team]||"#fff"; ctx.lineWidth=2.5; ctx.globalAlpha=alpha*(0.5+0.4*cp);
      ctx.beginPath(); ctx.arc(d.x,d.y,22+12+cp*3,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
  if(d.isMe) drawSelfMarker(d.x,d.y,22);
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y);
  if(!drawCharacterSprite(d.charId||"student_01", 22, d.facing||0, { moving:spriteMoving("T"+d.slot,d.x,d.y), attacking:!!d.fr }))
    drawPlayerCharacter({ r:22, color:ch.color, subColor:ch.subColor, facing:d.facing||0 });
  ctx.restore();
  const w=54,h=8,bx=d.x-w/2,by=d.y-22-24;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="bottom";
  ctx.fillStyle=d.isMe?"#bfffad":(TEAM_COLOR[d.team]||"#dff1ff"); ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  ctx.fillText(ch.name+(d.isMe?" (лӮҳ)":""), d.x, by-2);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,4); ctx.fill();
  const ratio=clamp(d.hp/(d.maxHp||1),0,1);
  ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.restore();
}

function campLerpAnchor(anchor, si){
  const st=si+1;
  for(let i=1;i<anchor.length;i++){
    const [s0,v0]=anchor[i-1], [s1,v1]=anchor[i];
    if(st<=s1) return v0+(v1-v0)*((st-s0)/(s1-s0));
  }
  return anchor[anchor.length-1][1];
}

function campStageCntMul(si){ return campLerpAnchor(CAMP_CONFIG.cntAnchor, si); }

}

function tActivePlayerCount(){
  // лҙҮВ·лҒҠкёҙ(inactive)В·м—°кІ° лҒҠкёҙ мӢӨм ң н”Ңл Ҳмқҙм–ҙлҠ” м ңмҷё. host мһҗмӢ (isMe)мқҖ н•ӯмғҒ active.
  const players=OnlineManager.players||{}; let n=0;
  for(const s in tFighters){ const f=tFighters[s];
    if(f.isBot) continue;
    if(f.inactive) continue;
    const isMe=s===OnlineManager.mySlot, p=players[s];
    if(!isMe && !(p && p.connected!==false)) continue;
    n++;
  }
  return Math.max(1,n);
}

function tSpawnEnemy(type, hpMul, map, dmgMul, sx, sy, gateId){

  // CAMPAIGN-2: ліҖнҳ• мҠӨн…Ңмқҙм§Җ мғҒнғң + кө¬м—ӯ мқёнҠёлЎң л°°л„Ҳ + кө¬м—ӯ н…Ңл§Ҳ н•Ём •
  tPve.holdG = 0;                                                             // В§2-1 кұ°м җ мӮ¬мҲҳ кІҢмқҙм§Җ
  tPve.sgT = stage.objective==="starguard" ? CAMP_CONFIG.sgTime : 0;          // В§2-2 лі„ мҲҳнҳё лӮЁмқҖ мӢңк°„

  if(tPve.stageIndex%5===0) tPve.introT=2.5;                                  // В§1 кө¬м—ӯ мІ« мҠӨн…Ңмқҙм§Җ мқёнҠёлЎң
  tCampTraps = (campZoneIdx(tPve.stageIndex)===1)                             // В§1 2кө¬м—ӯ: м–јмқҢ н•Ём • м№ё мҶҢлҹү(н…Ңл§Ҳ мІҙк°җ)
    ? [ {x:ARENA.x+5*56, y:ARENA.y+2*56, w:112, h:56, type:"ice"},
        {x:ARENA.x+14*56, y:ARENA.y+7*56, w:112, h:56, type:"ice"} ]
    : [];
  if(!stage.structures) return;

    let hp=def.hp; if(sd.kind==="core") hp+=120*(nP-1);          // PRD 19.1 мқёмӣҗ мҠӨмјҖмқј
    else if(sd.kind==="gate") hp+=50*(nP-1);                     // v1.23: л¬ёлҸ„ мқёмӣҗ л°°мңЁ(мҪ”лҚұмҠӨ нҡҢм°Ё8 вҖ” 6мқё л¬ё нҸ¬м»ӨмӢұ лҢҖл№„, cap 4 мң м§Җ)
    tStructures[id]={ id:id, kind:sd.kind, x:sd.x, y:sd.y, w:def.w, h:def.h, hp:hp, maxHp:hp, alive:true, spawnT:1.5+gi };
    OBSTACLES.push({ x:sd.x-def.w/2, y:sd.y-def.h/2, w:def.w, h:def.h, kind:"structure", sid:id });
  }
}
function tStructApplyDamage(st, dmg){
  if(!st || !st.alive) return;
  st.hp-=dmg;
  if(st.hp<=0){ st.hp=0; st.alive=false;
    OBSTACLES=OBSTACLES.filter(o=>o.sid!==st.id);       // м¶©лҸҢ м ңкұ°(мқҙлҸҷВ·мӢңм•јВ·нғ„мқҙ мһҗлҸҷ л°ҳмҳҒ)
    spawnSuperWave(st.x, st.y, 70);
  }
}
// нғ„ вҶ’ кө¬мЎ°л¬ј: н”Ңл Ҳмқҙм–ҙ нғ„мқҖ л¬ё/лІҪл§Ң, лӘ¬мҠӨн„° нғ„мқҖ мҲҳм •л§Ң(к·ё мҷёлҠ” к·ёлғҘ лІҪ м·Ёкёү)

function tGatesAlive(){ let c=0; for(const id in tStructures){ const s=tStructures[id]; if(s.kind==="gate"&&s.alive) c++; } return c; }
// лҙүмҮ„: мӮҙм•„мһҲлҠ” л¬ёмқҙ мЈјкё°м ҒмңјлЎң мҶҢнҷҳ(л¬ёлӢ№ лҸҷмӢң cap, м „мІҙ 40 мғҒн•ң)
function tPveTickStructures(dt){
  const stage=PVE_STAGES[tPve.stageIndex];
  if(stage.objective!=="blockade") return;
  const gs=stage.gateSpawn||{enemies:[{type:"soft_jelly",count:2}],interval:6,cap:4};
  const map=getMap(tMapId), nHpMul=1+0.12*(tActivePlayerCount()-1);
  for(const id in tStructures){ const g=tStructures[id];
    if(g.kind!=="gate"||!g.alive) continue;
    g.spawnT-=dt;
    if(g.spawnT<=0){ g.spawnT=gs.interval;
      let mine=0; for(const eid in tEnemies){ if(tEnemies[eid].gate===id) mine++; }
      for(const grp of gs.enemies){ for(let i=0;i<grp.count;i++){
        if(mine>=gs.cap || Object.keys(tEnemies).length>=40) break;
        tSpawnEnemy(grp.type, nHpMul, map, 1, g.x, g.y+g.h*0.8, id); mine++;
      } }
    }
  }
}

let tGuestStructSig="";
function tGuestApplyStructs(list){
  const kinds=["core","gate","wall"];
  tStructures={}; let alive=0;
  for(let i=0;i<list.length;i++){ const o=list[i], kind=kinds[o.k]||"wall", def=STRUCT_DEFS[kind];
    const id=kind+"_"+i;
    tStructures[id]={ id:id, kind:kind, x:o.x, y:o.y, w:def.w, h:def.h, hp:o.hp, maxHp:o.mh, alive:o.hp>0 };
    if(o.hp>0) alive++; }
  const sig=tMapId+"|"+list.length+"|"+alive;
  if(sig!==tGuestStructSig){ tGuestStructSig=sig;
    OBSTACLES=getMap(tMapId).obstacles.slice();
    for(const id in tStructures){ const st=tStructures[id];
      if(st.alive) OBSTACLES.push({ x:st.x-st.w/2, y:st.y-st.h/2, w:st.w, h:st.h, kind:"structure", sid:id }); }

}

function tPveStartWave(){
  const stage=PVE_STAGES[tPve.stageIndex], wave=stage.waves[tPve.waveIndex];
  // v1.22 лҙүмҮ„: л¬ёмқҙ мӮҙм•„мһҲлҠ” лҸҷм•ҲмқҖ мқјл°ҳ мӣЁмқҙлёҢлҘј к№”м§Җ м•ҠмқҢ(л¬ё м „нҢҢкҙҙ нӣ„ мөңмў… мӣЁмқҙлёҢл§Ң)
  if(stage.objective==="blockade" && tGatesAlive()>0 && !tPve.finalSpawned){
    tPve.phase="wave"; tPve.enemiesRemaining=Object.keys(tEnemies).length; return;
  }
  // PRD 19мһҘ мҠӨмјҖмқјл§Ғ: мқёмӣҗ(N) + мҠӨн…Ңмқҙм§Җ мғҒмҠ№ л°°мңЁ. ліҙмҠӨлҠ” stageHpMul лҜём Ғмҡ©В·мқёмӣҗ ліҙмҠӨ л°°мңЁл§Ң(15.6/24.1).
  const n=tActivePlayerCount(), st=tPve.stageIndex+1, map=getMap(tMapId);
  // CAMPAIGN-2 В§4: мҠӨн…Ңмқҙм§Җ м„ нҳ• кіЎм„ (0.75вҶ’1.5) вҖ” кө¬м—ӯ кІҪкі„м—җм„ңлҸ„ м—°мҶҚ. н”јн•ҙлҠ” кё°мЎҙ мҷ„л§Ң мғҒмҠ№ мң м§Җ.
  const stageHpMul=campStageHpMul(tPve.stageIndex), stageCntMul=campStageCntMul(tPve.stageIndex);
  const stageDmgMul=1+0.015*(st-1);
  const nHpMul=1+0.12*(n-1), nCntMul=1+0.35*(n-1), nBossMul=1+0.60*(n-1);
  for(const grp of wave.enemies){
    const def=PVE_ENEMY_TYPES[grp.type]||{};
    const isBossGrp=!!def.isBossType || grp.type==="boss";
    const cnt=isBossGrp ? grp.count : Math.max(1,Math.round(grp.count*nCntMul*stageCntMul));
    const hpMul=isBossGrp ? nBossMul : nHpMul*stageHpMul;
    const dmgMul=isBossGrp ? 1 : stageDmgMul;                 // ліҙмҠӨ н”јн•ҙлҠ” мқёмӣҗВ·мҠӨн…Ңмқҙм§ҖлЎң мҰқк°Җ м—ҶмқҢ
    for(let i=0;i<cnt;i++){ if(Object.keys(tEnemies).length>=40) break; tSpawnEnemy(grp.type, hpMul, map, dmgMul); }
  }
  tPve.phase="wave"; tPve.enemiesRemaining=Object.keys(tEnemies).length;
}
function tNearestPlayer(e){ let best=null,bd=Infinity; for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue; const d=dist(e.x,e.y,f.x,f.y); if(d<bd){bd=d;best=f;} } return best; }

/* CAMPAIGN-2 В§2-2: лі„ мҲҳнҳём „ нӢұ вҖ” лі„кҙ‘л§Ҙ мҠӨнҸ° вҶ’ лӘ¬мҠӨн„°к°Җ л¬јкі  к°ҖмһҘмһҗлҰ¬лЎң лҸ„мЈј вҶ’ мқҙнғҲ=лі„ мғҒмӢӨ */
function tCampTick(dt){
  if(tPve.introT>0) tPve.introT-=dt;
  tPve.runTime=(tPve.runTime||0)+dt;
  const stage=PVE_STAGES[tPve.stageIndex];
  if(!stage || stage.objective!=="starguard" || tPve.status!=="playing" || tPve.phase!=="wave") return;
  const C=CAMP_CONFIG, cx=LOGW/2, cy=ARENA.y+ARENA.h/2;
  // лі„ мҠӨнҸ°(лҸҷмӢң 3к°ң мғҒн•ң)
  tPve.sgSpawnAcc+=dt;
  if(tPve.sgSpawnAcc>=C.sgSpawnEvery && tPve.sgStars.length<3){
    tPve.sgSpawnAcc=0;
    tPve.sgStars.push({ x:cx+rand(-60,60), y:cy+rand(-40,40), carrier:null });
  }
  for(let i=tPve.sgStars.length-1;i>=0;i--){
    const s=tPve.sgStars[i];
    if(s.carrier){
      const e=tEnemies[s.carrier];
      if(!e){ s.carrier=null; continue; }                  // мҡҙл°ҳмһҗк°Җ мІҳм№ҳлҗЁ вҶ’ к·ё мһҗлҰ¬м—җ л“ңлһҚ(tDamageEnemy нӣ„ мң„м№ҳ мң м§Җ)
      s.x=e.x; s.y=e.y;
      // к°ҖмһҘмһҗлҰ¬ лҸ„лӢ¬ вҶ’ лі„ мғҒмӢӨ + лӘ¬мҠӨн„° мқҙнғҲ (moveEntityк°Җ л°ҳм§ҖлҰ„л§ҢнҒј м•ҲмӘҪмңјлЎң нҒҙлһЁн”„н•ҳлҜҖлЎң r кё°мӨҖ нҢҗм • вҖ” н•ҳлӢҲмҠӨк°Җ мһЎмқҖ лІ„к·ё)
      const eg=e.r+6;
      if(e.x<ARENA.x+eg || e.x>ARENA.x+ARENA.w-eg || e.y<ARENA.y+eg || e.y>ARENA.y+ARENA.h-eg){
        tPve.sgLost++; delete tEnemies[s.carrier]; tPve.sgStars.splice(i,1);
        showToast("вӯҗ лі„мқ„ ләҸкІјлӢӨ! ("+tPve.sgLost+"/"+C.sgFail+")");
        continue;
      }
    } else {
      // лҜёмҡҙл°ҳ лі„: к·јм ‘ лӘ¬мҠӨн„°к°Җ нғҲм·Ё(ліҙмҠӨ м ңмҷё)
      for(const id in tEnemies){ const e=tEnemies[id];
        if(e.dead || e.isBoss || e.flee) continue;
        if(dist(e.x,e.y,s.x,s.y) < e.r+16){
          s.carrier=id; e.flee=true; e.speed*=C.sgFleeMul;   // лҸ„мЈј лӘ¬мҠӨн„° мқҙмҶҚ +20%
          break;
        }
      }
    }
  }
}

    const isMe=slot===OnlineManager.mySlot, p=players[slot];

  tResolveCollisions();                                     // лӘёмӢёмӣҖ: лӘ№-н”Ңл Ҳмқҙм–ҙ/лӘ№-лӘ№ кІ№м№Ё л°©м§Җ(к·јм ‘ мӮ¬кІ© к°ҖлҠҘ)
  tPveUpdateBullets(dt);
  tickSkillZones(dt, envTeam());

  tWriteAcc+=dt; if(tWriteAcc>=1/(RTCNet.anyOpen()?RTC_STATE_FPS:T_STATE_FPS)){ tWriteAcc=0; tHostWriteState(); }

function tPveUpdatePlayer(f,input,dt){
  // к°•нҷ” м„ нғқ(1/2/3) вҖ” мЈҪмқҖ/кҙҖм „ н”Ңл Ҳмқҙм–ҙлҸ„ м„ нғқ к°ҖлҠҘ(host нҢҗм •, 1нҡҢл§Ң)
  if(tPve.phase==="stageclear" && tPve.upg && tPve.upg[f.slot] && !tPve.upg[f.slot].picked){
    const o=tPve.upg[f.slot], pk=(input.pick!==undefined && input.pick>=0)?input.pick:-1;
    if(pk>=0 && pk<3){ o.picked=true; o.pi=pk; tPveApplyUpgrade(f, o.c[pk], o.r===1); }
  }
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0 && (f.lives||0)>0) tRespawn(f); return; }   // лӘ©мҲЁ 0 вҶ’ кҙҖм „(мІҙнҒ¬нҸ¬мқёнҠё ліөк·Җ лҢҖкё°)
  if(f.hitFlash>0)f.hitFlash-=dt; if(f.invincibleTimer>0)f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envTeam);
  // X/C: лҲҢлҰј мҲңк°„(edge)л§Ң л°ңлҸҷ(host нҢҗм •)
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envTeam());
  if(ult && !f._pUlt) castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ
  applyIntentMoveAim(f, input, dt);                        // UPDATE-1 P3: м•„лӮ лЎңк·ё мқҙлҸҷ + л¶„лҰ¬ мЎ°мӨҖ(кіөмҡ©)
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ tFire(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}
function tHurtPlayer(f,dmg){

  dmg=incomingDamage(f,dmg);                               // л°©нҢЁ/м§ҲмЈј к°җмҶҢ(мөңмҶҢ 1)
  f.hp-=dmg; f.hitFlash=0.15;
  if(f.hp<=0){ f.hp=0; f.dead=true; f.respawnTimer=4;
    f.lives=Math.max(0,(f.lives||0)-1);                    // PRD 12.2: мһҗкё° лӘ©мҲЁл§Ң мҶҢл№„(лӢӨлҘё н•ҷмғқ лӘ©мҲЁкіј л¬ҙкҙҖ)
    tPve.teamLives=tPveLivesTotal(); }                     // н‘ңмӢңмҡ© н•©кі„ к°ұмӢ (н•ҳмң„нҳёнҷҳ н•„л“ң)
}
// нҷңм„ұ мӢӨм ң н”Ңл Ҳмқҙм–ҙл“Өмқҳ лӮЁмқҖ лӘ©мҲЁ н•©кі„(HUD/нҢЁнӮ· н‘ңмӢңмҡ©)

/* лӘёмӢёмӣҖ(м¶©лҸҢ л¶„лҰ¬): лӘ№мқҙ н”Ңл Ҳмқҙм–ҙ лӘё мҶҚмңјлЎң кІ№міҗ л“Өм–ҙмҳӨм§Җ м•ҠкІҢ н•ңлӢӨ.
   кІ№м№ҳл©ҙ мҙқкө¬(лӘё л°– 28px)ліҙлӢӨ м•ҲмӘҪмқҙлқј к·јм ‘ мӮ¬кІ©мқҙ л¶Ҳк°ҖлҠҘн•ҙм§ҖлҠ” л¬ём ң н•ҙкІ°.
   - м ҒвҶ”н”Ңл Ҳмқҙм–ҙ: м Ғмқ„ л°–мңјлЎң л°Җм–ҙлғ„(н”Ңл Ҳмқҙм–ҙ мқҙлҸҷмқҖ м•Ҳ л§үм•„ нҸ¬мң„ лӢөлӢөн•Ё л°©м§Җ)
   - м ҒвҶ”м Ғ: м Ҳл°ҳм”© л°Җм–ҙ л¬ҙлҰ¬ лӯүм№Ё мҷ„нҷ”(ліҙмҠӨлҠ” л°ҖлҰ¬м§Җ м•ҠмқҢ) */
function tResolveCollisions(){
  const ids=Object.keys(tEnemies);
  for(const id of ids){ const e=tEnemies[id]; if(!e||e.dead) continue;
    for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue;
      let dx=e.x-f.x, dy=e.y-f.y; let d=Math.hypot(dx,dy);
      const min=e.r+f.r-2;
      if(d<min){
        let push=min-d;
        if(d<1){ const a=Math.random()*Math.PI*2; dx=Math.cos(a); dy=Math.sin(a); d=1; push=min; }   // мҷ„м „ кІ№м№Ё: мһ„мқҳ л°©н–ҘмңјлЎң м „л¶Җ л°Җм–ҙлғ„
        moveEntity(e, dx/d*push, dy/d*push); }
    }
  }
  for(let i=0;i<ids.length;i++){ const a=tEnemies[ids[i]]; if(!a||a.dead) continue;
    for(let j=i+1;j<ids.length;j++){ const b=tEnemies[ids[j]]; if(!b||b.dead) continue;
      const dx=b.x-a.x, dy=b.y-a.y; let d=Math.hypot(dx,dy);
      const min=(a.r+b.r)*0.85;
      if(d<min){ if(d<1) d=1; const push=(min-d)/2;
        if(!a.isBoss) moveEntity(a, -dx/d*push, -dy/d*push);
        if(!b.isBoss) moveEntity(b, dx/d*push, dy/d*push); }
    }
  }
}
// лӘ№ мқҙлҸҷ кіөнҶө: лІҪм—җ л§үнҳҖ м ңмһҗлҰ¬кұёмқҢмқҙл©ҙ 0.55мҙҲ мҲҳм§Ғ мҡ°нҡҢ(м§Җнҳ• л°”ліҙ л°©м§Җ)
function tEnemyMove(e, nx, ny, spd, dt){
  if(e.detourT>0){ e.detourT-=dt;
    moveEntity(e, -ny*e.detourDir*spd*dt, nx*e.detourDir*spd*dt);
    return;
  }
  const ox=e.x, oy=e.y;
  moveEntity(e, nx*spd*dt, ny*spd*dt);
  if(spd>1 && Math.hypot(e.x-ox,e.y-oy) < spd*dt*0.35){
    if(e.detourDir===undefined) e.detourDir=(Math.random()<0.5?1:-1);
    else e.detourDir*=-1;                                   // л°ҳліө лҒјмһ„ вҶ’ л°ҳлҢҖмӘҪ мҡ°нҡҢ
    e.detourT=0.55;
  }
}
// м ‘мҙү(лӘёнҶө л°•м№ҳкё°) н”јн•ҙ м „мҡ© вҖ” PRD 15.4: м—¬лҹ¬ лӘ№мқҙ кІ№міҗ л¶ҷм–ҙлҸ„ лҢҖмғҒлі„ 0.2мҙҲ л©ҙм—ӯмңјлЎң
// м ‘мҙү н”јн•ҙк°Җ н•ңкәјлІҲм—җ мӨ‘мІ©лҗҳм§Җ м•ҠлҠ”лӢӨ(л¬ҙлҰ¬м—җкІҢ л‘ҳлҹ¬мӢём—¬лҸ„ мҙҲлӢ№ мөңлҢҖ 5нҡҢ).

function tEnemyUpdate(e,dt){

  if(e.atkSlowTimer>0) e.atkSlowTimer-=dt;                 // лҲҲкҪғ м„ңлҰ¬: кіөмҶҚ л‘”нҷ”(лӘ¬мҠӨн„°)

  if(dashDef && e.dashTimer<=0 && d>90 && d<420 && hasLineOfSight(e.x,e.y,t.x,t.y)){

  // кө¬лҰ„ мң л №: мЈјкё°м Ғ л°ҳнҲ¬лӘ…(мӢңк°Ғ) вҖ” кіөкІ© м§Ғм „м—” ліҙмһ„(л ҢлҚ”м—җм„ң мІҳлҰ¬)
  if(e.ghost){ e.ghost.cycle=(e.ghost.cycle+dt)%2.8; }

function tEnemyFire(e){
  const a0=e.facing, mz=e.r+6;
  const push=(a,extra)=>{ tBullets.push(Object.assign({
    x:e.x+Math.cos(a)*mz, y:e.y+Math.sin(a)*mz, vx:Math.cos(a)*e.bulletSpeed, vy:Math.sin(a)*e.bulletSpeed,
    r:e.isBoss?14:9, damage:e.dmg, team:"enemy", owner:e.id, color:"#ff8f6b", alive:true, traveled:0,
    maxRange:(e.range||400)+140, age:0 }, extra||{})); };
  // ліҙмҠӨ м „мҡ© нҢЁн„ҙ(PRD 15.5 к°„мқҙ)
  if(e.ringShot && (!e.ringShot.atHp || e.hp<=e.maxHp*e.ringShot.atHp)){
    const n=e.ringShot.count;
    for(let i=0;i<n;i++) push(a0+i*Math.PI*2/n);
    return;
  }
  if(e.fan){
    let n=e.fan.count;
    if(e.phase2 && e.hp<=e.maxHp*e.phase2.at) n=e.phase2.count||n;   // нӣҲл Ё лЎңлҙҮ 2нҺҳмқҙмҰҲ 7л°ң
    const spread=deg2rad(e.fan.deg);
    for(let i=0;i<n;i++) push(a0-spread/2+spread*(i/(n-1)));
    return;
  }
  if(e.bounceShot){                                                  // мў…мқҙл№„н–үкё° лҢҖмһҘ: л°ҳмӮ¬нғ„
    push(a0, { bounce:true, maxBounce:e.bounceShot.maxBounce, r:e.bounceShot.radius||16, life:6, color:"#eef2f6" });
    return;
  }
  const n=e.threeWay?3:1, spread=deg2rad(26);
  for(let i=0;i<n;i++){ let a=a0; if(n>1) a=a0-spread/2+spread*(i/(n-1));
    push(a, e.slowShot?{ sl:e.slowShot, color:"#9fdcff" }:null);     // м–јмқҢ л°©мҡё: л‘”нҷ”нғ„
  }
}
function tPveUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=tFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(wref.sid) tStructBulletHit(wref, b);               // v1.22 кө¬мЎ°л¬ј н”јн•ҙ(н”Ңл Ҳмқҙм–ҙнғ„вҶ’л¬ё/лІҪ, лӘ¬мҠӨн„°нғ„вҶ’мҲҳм •)
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      if(b.team==="pve"){
        for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue;
          if(dist(b.x,b.y,e.x,e.y)<b.r+e.r){
            const k=tFighters[b.owner];
            if(b.boomerang){
              const hm=(b.phase==="out")?b.hitO:b.hitB;
              if(hm[id]) continue;
              hm[id]=true;
              if(k && !b.isSuper) tryChargeGauge(b.aid, id, ()=>{ k.superGauge=Math.min(GAME_CONFIG.superCharge,(k.superGauge||0)+GAME_CONFIG.superChargePerHit); });
              if(b.wref) applyWeaponHitEffects(b.wref, e, b.x, b.y);
              tDamageEnemy(e,id,bulletHitDamage(b,e),k);
              spawnHitFx(b.x,b.y,b.wid,b.color);
              continue;                                    // л¶Җл©”лһ‘мқҖ кҙҖнҶө(ліөк·Җ нғҖкІ©)
            }
            if(b.ultCid && !canUltDamage(b.ultCid, id, b.ultMaxHits||4)){ b.alive=false; break; }  // лҹӯнӮӨ C: к°ҷмқҖ лҢҖмғҒ мөңлҢҖ н”јн•ҙ мғҒн•ң(лЎңм»¬кіј лҸҷмқј)
            if(k && !b.isSuper) tryChargeGauge(b.aid, id, ()=>{ k.superGauge=Math.min(GAME_CONFIG.superCharge,(k.superGauge||0)+GAME_CONFIG.superChargePerHit); });
            if(b.wref) applyWeaponHitEffects(b.wref, e, b.x, b.y);
            tDamageEnemy(e,id,bulletHitDamage(b,e),k);
            spawnHitFx(b.x,b.y,b.wid,b.color);
            b.alive=false; break; } }
      } else {
        for(const slot in tFighters){ const f=tFighters[slot]; if(f.dead||f.inactive||f.invincibleTimer>0) continue;
          if(dist(b.x,b.y,f.x,f.y)<b.r+f.r){
            tHurtPlayer(f, b.damage);
            if(b.sl) applySlowTo(f, b.sl.pct, b.sl.time);   // м–јмқҢ л°©мҡё: лӘ…мӨ‘ мӢң 25% л‘”нҷ” 1.2s(мӨ‘мІ© м—ҶмқҢ)
            b.alive=false; break; } }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}
function tPveProgress(dt){
  if(tPve.status!=="playing") return;
  // v1.24 PRD 12.6: мІҙнҒ¬нҸ¬мқёнҠё мһ¬лҸ„м „ м—°м¶ң мӨ‘(3мҙҲ) вҖ” мӢӨнҢЁ нҢҗм •ліҙлӢӨ лЁјм Җ мІҳлҰ¬
  if(tPve.phase==="retry"){
    tPve.phaseTimer-=dt;
    if(tPve.phaseTimer<=0) tPveDoCheckpointRetry();
    return;
  }
  // мӢӨнҢЁ(PRD 12.2): мӮҙм•„мһҲлҠ” нҷңм„ұ н”Ңл Ҳмқҙм–ҙк°Җ м—Ҷкі , л¶Җнҷң к°ҖлҠҘн•ң(лӘ©мҲЁ>0) н”Ңл Ҳмқҙм–ҙлҸ„ м—Ҷмқ„ л•Ң
  let anyAlive=false, anyRevivable=false;
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    if(!f.dead) anyAlive=true; else if((f.lives||0)>0) anyRevivable=true; }
  if(!anyAlive && !anyRevivable){ if(tPveBeginRetry()) return; tPve.status="failed"; tPveEnd(); return; }
  const alive=Object.keys(tEnemies).length;
  if(tPve.phase==="wave"){
    const stageNow=PVE_STAGES[tPve.stageIndex];
    // v1.22 л°©м–ҙ(defend): мҲҳм • нҢҢкҙҙ=мҰүмӢң мӢӨнҢЁ В· мӢңк°„мқ„ лІ„нӢ°л©ҙ нҒҙлҰ¬м–ҙ В· нғҖмқҙлЁё мӨ‘ м „л©ёмқҙл©ҙ мӣЁмқҙлёҢ мҲңнҷҳ
    if(stageNow.objective==="defend"){
      const core=tStructures.core;
      if(core && !core.alive){ if(tPveBeginRetry()) return; tPve.status="failed"; tPveEnd(); return; }   /* v1.24: мҲҳм • нҢҢкҙҙлҸ„ мһ¬лҸ„м „ лҢҖмғҒ */
      if(tPve.defendT>0){
        tPve.defendT-=dt;
        if(tPve.defendT>0){
          if(alive===0){ tPve.waveIndex=(tPve.waveIndex+1)%stageNow.waves.length; tPveStartWave(); }
          return;                                           // м•„м§Ғ л°©м–ҙ мӨ‘(нҒҙлҰ¬м–ҙ нҢҗм • ліҙлҘҳ)
        }
        tEnemies={}; tBullets=tBullets.filter(b=>b.team==="pve");   // лІ„н…Ёлғ„ вҶ’ лӮЁмқҖ м Ғ м •лҰ¬ нӣ„ нҒҙлҰ¬м–ҙ кІҪлЎң
        tPve.waveIndex=stageNow.waves.length-1;             // л§Ҳм§Җл§ү мӣЁмқҙлёҢ м·Ёкёү вҶ’ м•„лһҳм—җм„ң stageclear
      }
    }
    // CAMPAIGN-2 В§2-1 кұ°м җ мӮ¬мҲҳм „(hold): м•„кө°л§Ң кұ°м җ м•Ҳ вҶ’ кІҢмқҙм§Җ мғҒмҠ№ В· лӘ¬мҠӨн„° мһҲмңјл©ҙ м •м§Җ В· 100 = нҒҙлҰ¬м–ҙ. мӣЁмқҙлёҢлҠ” л¬ҙн•ң мҲңнҷҳ.
    if(stageNow.objective==="hold"){
      const cx=LOGW/2, cy=ARENA.y+ARENA.h/2, R=CAMP_CONFIG.holdRadius;
      let ally=0, foe=0;
      for(const s in tFighters){ const f=tFighters[s]; if(f.dead||f.inactive) continue; if(dist(f.x,f.y,cx,cy)<=R) ally++; }
      for(const id in tEnemies){ const e=tEnemies[id]; if(!e.dead && dist(e.x,e.y,cx,cy)<=R){ foe=1; break; } }
      if(ally>0 && !foe) tPve.holdG=Math.min(CAMP_CONFIG.holdGoal, tPve.holdG+CAMP_CONFIG.holdPerSec*dt);
      if(tPve.holdG>=CAMP_CONFIG.holdGoal){
        tEnemies={}; tBullets=tBullets.filter(b=>b.team==="pve");
        tPve.waveIndex=stageNow.waves.length-1;                        // нҒҙлҰ¬м–ҙ кІҪлЎңлЎң н•©лҘҳ
      } else {
        if(alive===0){ tPve.waveIndex=(tPve.waveIndex+1)%stageNow.waves.length; tPveStartWave(); }
        return;
      }
    }
    // CAMPAIGN-2 В§2-2 лі„ мҲҳнҳём „(starguard): лі„ 5к°ң ләҸкё°л©ҙ мӢӨнҢЁ В· 90мҙҲ лІ„нӢ°л©ҙ нҒҙлҰ¬м–ҙ. мӣЁмқҙлёҢ л¬ҙн•ң мҲңнҷҳ.
    if(stageNow.objective==="starguard"){
      if(tPve.sgLost>=CAMP_CONFIG.sgFail){ if(tPveBeginRetry()) return; tPve.status="failed"; tPveEnd(); return; }
      tPve.sgT-=dt;
      if(tPve.sgT<=0){
        tEnemies={}; tBullets=tBullets.filter(b=>b.team==="pve"); tPve.sgStars=[];
        tPve.waveIndex=stageNow.waves.length-1;
      } else {
        if(alive===0){ tPve.waveIndex=(tPve.waveIndex+1)%stageNow.waves.length; tPveStartWave(); }
        return;
      }
    }
    // v1.22 лҙүмҮ„(blockade): л¬ёмқҙ лӮЁм•„мһҲмңјл©ҙ кі„мҶҚ мҶҢнҷҳлҗҳлҜҖлЎң нҒҙлҰ¬м–ҙ нҢҗм • ліҙлҘҳ, м „нҢҢкҙҙ мӢң мөңмў… мӣЁмқҙлёҢ 1нҡҢ
    if(stageNow.objective==="blockade"){
      if(tGatesAlive()>0) return;
      if(!tPve.finalSpawned){ tPve.finalSpawned=true; tPve.waveIndex=stageNow.waves.length-1; tPveStartWave(); return; }
    }
    if(Object.keys(tEnemies).length===0){
      const stage=PVE_STAGES[tPve.stageIndex];
      tPveCheckpointRevive(false);                          // мӣЁмқҙлёҢ нҶөкіј: лӘ©мҲЁ 0 н”Ңл Ҳмқҙм–ҙ 1к°ң ліөк·Җ(PRD 12.2)
      if(tPve.waveIndex < stage.waves.length-1){ tPve.phase="gap"; tPve.phaseTimer=2; }
      else if(tPve.stageIndex < PVE_STAGES.length-1){
        tPve.phase="stageclear"; tPve.phaseTimer=9;         // к°•нҷ” м„ нғқ мӢңк°„(м „мӣҗ м„ нғқ мӢң лӢЁм¶•)
        tPveOfferUpgrades(!!stage.boss);                    // PRD 13.2/19.4: мқјл°ҳ 3нғқ1, ліҙмҠӨ(5В·10В·15) нӣ„м—” нқ¬к·Җ(2мҠӨнғқ)
      }
      else { tPve.status="complete"; tPveEnd(); }
    }
  } else if(tPve.phase==="gap"){
    tPve.phaseTimer-=dt; if(tPve.phaseTimer<=0){ tPve.waveIndex++; tPveStartWave(); }
  } else if(tPve.phase==="stageclear"){
    tPve.phaseTimer-=dt;
    // м „мӣҗ м„ нғқ мҷ„лЈҢ вҶ’ лҢҖкё° лӢЁм¶•
    if(tPve.upg){ let all=true; for(const s in tPve.upg){ if(!tPve.upg[s].picked){ all=false; break; } }
      if(all) tPve.phaseTimer=Math.min(tPve.phaseTimer,1.2); }
    if(tPve.phaseTimer<=0){
      // мӢңк°„ мҙҲкіј вҶ’ лҜём„ нғқмһҗлҠ” мһҗлҸҷ м„ нғқ(м§„н–үмқҙ л§үнһҲм§Җ м•ҠкІҢ)
      if(tPve.upg){ for(const s in tPve.upg){ const o=tPve.upg[s];
        if(!o.picked && tFighters[s]){ o.picked=true; o.pi=Math.floor(Math.random()*3); tPveApplyUpgrade(tFighters[s], o.c[o.pi], o.r===1); } }
        tPve.upg=null; }
      const wasBoss=!!PVE_STAGES[tPve.stageIndex].boss;
      const zoneBefore=campZoneIdx(tPve.stageIndex);
      // CAMPAIGN-2 В§5: кө¬м—ӯ ліҙмҠӨ кІ©нҢҢ ліҙл„ҲмҠӨ(мҶ”лЎң мӣҗм •л§Ң вҖ” мҳЁлқјмқё нҳ‘лҸҷмқҖ л¬ҙліҙмғҒ м •мұ… мң м§Җ)
      if(wasBoss && !OnlineManager.roomRef){ addGold(CAMP_CONFIG.zoneBonusGold); addExp(CAMP_CONFIG.zoneBonusExp);
        showToast("рҹҸҶ кө¬м—ӯ нҒҙлҰ¬м–ҙ! +"+CAMP_CONFIG.zoneBonusGold+"G В· кІҪн—ҳм№ҳ +"+CAMP_CONFIG.zoneBonusExp); try{ saveProfile(); }catch(e){} }
      tPve.stageIndex++; tPve.waveIndex=0;
      // CAMPAIGN-2 В§3: кө¬м—ӯмқҙ л°”лҖҢл©ҙ м„ұмһҘлІ„н”„ мҠӨнғқ лҰ¬м…Ӣ(кө¬м—ӯ = м„ұмһҘ м•„нҒ¬)
      if(campZoneIdx(tPve.stageIndex)!==zoneBefore){ for(const s in tFighters) resetGrowth(tFighters[s]); }
      if(wasBoss){ tPve.checkpoint=tPve.stageIndex; tPve.retryUsed=false; }   // v1.24 PRD 12.6: 5В·10В·15 нҒҙлҰ¬м–ҙ м§Ғнӣ„ м ҖмһҘ(мғҲ мІҙнҒ¬нҸ¬мқёнҠёл§ҲлӢӨ мһ¬лҸ„м „ 1нҡҢ лҰ¬н•„)
      const st=PVE_STAGES[tPve.stageIndex]; tMapId=st.mapId;
      tPveSetupStructures();                               // v1.22: л§ө+кө¬мЎ°л¬ј м¶©лҸҢ мһ¬кө¬м„ұ(OBSTACLES/BUSHES нҸ¬н•Ё)
      tBullets=[]; tEnemies={};
      tPveCheckpointRevive(wasBoss);                        // ліҙмҠӨ(5В·10В·15) нҶөкіј: м „мӣҗ лӘ©мҲЁ +1(мғҒн•ң)
      tPve.teamLives=tPveLivesTotal();
      tPveReposition(); tPveStartWave();
    }
  }
}
/* v1.24 PRD 12.6 нҳ‘лҸҷ мІҙнҒ¬нҸ¬мқёнҠёВ·мһ¬лҸ„м „: 5В·10В·15 нҒҙлҰ¬м–ҙ м§Ғнӣ„ м ҖмһҘ, мӢӨнҢЁ мӢң к·ё м§Җм җл¶Җн„° 1нҡҢ мһ¬лҸ„м „
   вҖ” м „мӣҗ лӘ©мҲЁ 1к°ңВ·мІҙл Ҙ 50%(reposition кІҪмң )В·лҸ„м „ мӨ‘ м–»мқҖ к°•нҷ”лҠ” к·ёлҢҖлЎң мң м§Җ. мә нҺҳмқё(1мқё)лҸ„ к°ҷмқҖ кІҪлЎң. */
function tPveBeginRetry(){
  if(tPve.checkpoint==null || tPve.retryUsed) return false;
  tPve.retryUsed=true;
  tPve.stageIndex=tPve.checkpoint; tPve.waveIndex=0;         // л°°л„ҲВ·HUDк°Җ кі§л°”лЎң мІҙнҒ¬нҸ¬мқёнҠё м§Җм җмқ„ к°ҖлҰ¬нӮӨкІҢ
  tPve.phase="retry"; tPve.phaseTimer=3;                     // 3мҙҲ л°°л„Ҳ нӣ„ tPveDoCheckpointRetry
  tEnemies={}; tBullets=[];
  return true;
}
function tPveDoCheckpointRetry(){
  tMapId=PVE_STAGES[tPve.stageIndex].mapId;
  tPveSetupStructures();
  tBullets=[]; tEnemies={};
  for(const s in tFighters){ const f=tFighters[s]; if(f.inactive) continue;
    f.lives=1; f.dead=true; f.respawnTimer=0; }              // dead мІҳлҰ¬ вҶ’ repositionм—җм„ң мІҙл Ҙ 50%лЎң ліөк·Җ
  tPve.teamLives=tPveLivesTotal();
  tPve.phase="wave";
  tPveReposition(); tPveStartWave();
}
// мІҙнҒ¬нҸ¬мқёнҠё лӘ©мҲЁ нҡҢліө(PRD 12.2/15.6): лӘ©мҲЁ 0 н”Ңл Ҳмқҙм–ҙ мөңмҶҢ 1к°ң ліөк·Җ В· ліҙмҠӨ нҶөкіј мӢң м „мӣҗ +1(мӢңмһ‘ мғҒн•ң)
function tPveCheckpointRevive(bossBonus){
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    if((f.lives||0)<=0){ f.lives=1; if(f.dead) f.respawnTimer=Math.min(f.respawnTimer,1); }
    if(bossBonus) f.lives=Math.min(PVE_LIVES_START, (f.lives||0)+1);
  }
  tPve.teamLives=tPveLivesTotal();
}
function tPveReposition(){
  // PRD 12.6/15.6 нҡҢліө м •мұ…: мҠӨн…Ңмқҙм§Җ м „нҷҳ мӢң мөңлҢҖмІҙл Ҙмқҳ 50% нҡҢліө(+нҡҢліө лі„ к°•нҷ” 15/мҠӨнғқ), мӮ¬л§қ ліөк·ҖмһҗлҠ” 50%лЎң.
  const map=getMap(tMapId); let i=0;
  for(const slot in tFighters){ const f=tFighters[slot]; const p=tSpawnPos(map.playerSpawn,i++); const sp=findClearSpawn(p.x,p.y,f.r);
    f.x=sp.x; f.y=sp.y;
    const regen=15*upgStacks(f,"regen");
    if(f.dead){ f.dead=false; f.hp=Math.min(f.maxHp, f.maxHp*0.5+regen); }
    else f.hp=Math.min(f.maxHp, f.hp+f.maxHp*0.5+regen);
    f.displayHp=f.hp; f.invincibleTimer=GAME_CONFIG.invincibleTime;
    f.spawnX=map.playerSpawn.x; f.spawnY=map.playerSpawn.y; }
}

function tPveGetDrawData(){
  const out={ fighters:[], enemies:[], bullets:[], pve:null, waiting:false };
  if(OnlineManager.role==="host"){
    for(const s in tFighters){ const f=tFighters[s]; out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:"pve",slot:s,isMe:s===OnlineManager.mySlot,fr:f.fireRevealTimer>0?1:0 }); }

    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color,w:b.wid||null,vx:b.vx,vy:b.vy }));
    out.zones=packZones();
    out.structs=tPackStructs();                                      // v1.22
    out.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length,
      dfT:Math.max(0,Math.ceil(tPve.defendT||0)), gates:tGatesAlive(),
      hg:Math.round(tPve.holdG||0), sgT:Math.max(0,Math.ceil(tPve.sgT||0)), sgL:tPve.sgLost||0,
      sgS:(tPve.sgStars||[]).map(s=>({x:Math.round(s.x),y:Math.round(s.y)})), it:Math.max(0,Math.round((tPve.introT||0)*10)/10),
      rt:Math.round(tPve.runTime||0) };
    if(tPve.upg){ const ug={}; for(const s in tPve.upg){ const o=tPve.upg[s]; ug[s]={c:o.c, r:o.r, p:o.picked?1:0, pi:o.pi}; } out.pve.upg=ug; }
  } else {
    const st=OnlineManager.onlineState;
    if(!st || !st.fighters){ out.waiting=true; return out; }
    const myslot=OnlineManager.mySlot;
    for(const s in st.fighters){ const p=st.fighters[s]; let rx=p.x,ry=p.y,rf=p.facing;
      if(s===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[s] && !p.dead){ rx=tRenderFighters[s].x; ry=tRenderFighters[s].y; rf=tRenderFighters[s].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||tRosterMaxHp(s),dead:p.dead,inv:p.inv,charId:p.charId||tRosterCharId(s),team:"pve",slot:s,isMe:s===myslot,fr:p.fr }); }
    const en=st.enemies||{}; for(const id in en){ const e=en[id]; if(e.dead) continue; const def=getEnemyDef(e.type);
      const v=tEnemiesView[id]||e;   // P1b: ліҙк°„ л·° мҡ°м„ (hp/type л“ұ мқҙмӮ°к°’мқҖ мөңмӢ  мҠӨлғ…мғ·)
      out.enemies.push({ x:v.x,y:v.y,r:e.r||def.r,hp:e.hp,maxHp:e.maxHp,facing:(v.facing!==undefined?v.facing:e.facing),color:e.color||def.color,boss:(e.boss!==undefined?e.boss:(e.type==="boss"||e.type==="miniBoss")),type:e.type }); }
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    out.zones=(st.zones||[]);
    out.structs=st.structs||[];                                      // v1.22
    out.pve=st.pve||null;
  }
  return out;
}
function tDrawEnemy(e){

    const cyc=(uiTime%2.8);
    if(cyc<0.8) ctx.globalAlpha*= (e.contactTimer<=0.3?0.9:0.35);
  }
  ctx.translate(e.x,e.y);
  // лӘ¬мҠӨн„° ліёмІҙ мқҙлҜём§Җ(1мһҘ) нӣ… вҖ” нҢҢмқјмқҙ мғқкё°л©ҙ мһҗлҸҷ м Ғмҡ©, м—Ҷмңјл©ҙ м•„лһҳ лҸ„нҳ• fallback
  const mimg=ASSETS_ENABLED?getMonsterImage(e.type):null;
  if(mimg){
    const s=e.r*2.4, iw=mimg.naturalWidth||1, ih=mimg.naturalHeight||1, dw=s*(iw/ih), dhh=s;
    ctx.drawImage(mimg, -dw/2, -dhh/2, dw, dhh);

      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(e.facing)*220, Math.sin(e.facing)*220); ctx.stroke(); ctx.setLineDash([]); }
    ctx.restore();
    if(!e.boss){ const w=Math.max(28,e.r*1.6),h=5,bx=e.x-w/2,by=e.y-e.r-12;
      ctx.save(); ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,3); ctx.fill();
      ctx.fillStyle="#ff5a5a"; roundRect(bx,by,w*clamp(e.hp/(e.maxHp||1),0,1),h,3); ctx.fill(); ctx.restore(); }
    return;
  }
  // лҸҢм§„ мҳҲкі м„ (лі„лІҢл ҲВ·ліҙмҠӨ): лҸ„нҳ• fallbackм—җлҸ„ н‘ңмӢң
  if(e.dashState==="warn"){ ctx.strokeStyle="#ffe14d"; ctx.lineWidth=3; ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(e.facing)*220, Math.sin(e.facing)*220); ctx.stroke(); ctx.setLineDash([]); }
  // л°©нҢЁ лё”лЎқ/кұ°л¶Ғ: м •л©ҙ к°Җл“ң л°©н–Ҙ н‘ңмӢң
  if(e.frontGuard && !(e.guardDownT>0)){ ctx.save(); ctx.rotate(e.facing);
    ctx.strokeStyle="#dfe6ef"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,e.r+6,-deg2rad(e.frontGuard.deg)/2,deg2rad(e.frontGuard.deg)/2); ctx.stroke(); ctx.restore(); }

    const w=Math.max(28,e.r*1.6),h=5,bx=e.x-w/2,by=e.y-e.r-12;

  }
}

function drawUpgradeCards(u){
  ctx.save();
