    else if(RULE && RULE.id==="siege" && s.sid && s.sid.indexOf("rwall_")===0)   // BIG-BATCH-2 P1: нҢҖ кұҙм„Ө лІҪ вҶ’ мһ¬кұҙ мҳҲм•Ҫ
      (RULE.rebuild=RULE.rebuild||[]).push({ t:RULE_CONFIG.siege.rebuildSec,
        s:{x:s.x, y:s.y, w:s.w, h:s.h, sid:s.sid, team:s.team, maxHp:s.maxHp} });
  }
}
function tickRule(dt){
  if(!RULE || RULE.winner) return;
  if(RULE.id==="tag"){ tickTagRule(dt); return; }       // GENRE-EXPAND-1 В§1
  if(RULE.id==="paint"){ tickPaintRule(dt); return; }   // GENRE-EXPAND-1 В§2
  if(RULE.id==="siege"){
    const C=RULE_CONFIG.siege;
    // BIG-BATCH-2 P1: л¶Җм„ңм§„ кұҙм„Ө лІҪ мһ¬кұҙ вҖ” rebuildSec нӣ„ м Ҳл°ҳ HPлЎң л¶Җнҷң(мһҗлҰ¬м—җ нҢҢмқҙн„°к°Җ мһҲмңјл©ҙ мһ мӢң лҢҖкё°)
    if(RULE.rebuild && RULE.rebuild.length){
      for(let i=RULE.rebuild.length-1;i>=0;i--){
        const rb=RULE.rebuild[i]; rb.t-=dt;
        if(rb.t>0) continue;
        const s=rb.s;
        if(allFighters().some(f=>f && !f.dead && circleRectOverlap(f.x,f.y,f.r,s))){ rb.t=0.5; continue; }
        OBSTACLES.push({ x:s.x, y:s.y, w:s.w, h:s.h, sid:s.sid, team:s.team, structure:true,
                         hp:Math.round(s.maxHp*C.rebuildHpMul), maxHp:s.maxHp });
        effects.push({kind:"respawn", x:s.x+s.w/2, y:s.y+s.h/2, t:0, life:0.5, color:"#c9d6ff"});
        RULE.rebuild.splice(i,1);
      }
    }
    for(const T of RULE.turrets){   // SIEGE-AUX: л©”мқё+ліҙмЎ°нғ‘ м „л¶Җ мһҗлҸҷ л°ңмӮ¬(к°ңлі„ мҝЁ)
      const tw=T.o; if(!tw || tw.hp<=0) continue;
      T.cd-=dt; if(T.cd>0) continue;
      const cx=tw.x+tw.w/2, cy=tw.y+tw.h/2, mzOff=Math.max(tw.w,tw.h)/2+12;
      const foes=(T.team==="player")?enemies:playerTeam();
      let best=null, bd=C.turretRange;
      for(const f of foes){ if(!canBeHit(f)) continue;
        const d=dist(cx,cy,f.x,f.y); if(d>=bd) continue;
        const a0=Math.atan2(f.y-cy,f.x-cx);   // LOSлҠ” мҙқкө¬(нғ‘ к°ҖмһҘмһҗлҰ¬ л°–)м—җм„ң вҖ” мһҗкё° лӘёмІҙм—җ л§үнһҲм§Җ м•ҠкІҢ
        if(hasLineOfSight(cx+Math.cos(a0)*mzOff, cy+Math.sin(a0)*mzOff, f.x, f.y)){ bd=d; best=f; } }
      if(best){
        const a=Math.atan2(best.y-cy,best.x-cx), mz=Math.max(tw.w,tw.h)/2+12;
        bullets.push({ x:cx+Math.cos(a)*mz, y:cy+Math.sin(a)*mz, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
          r:8, damage:C.turretDmg, team:T.team, ownerId:-1, color:"#ffd0a0", alive:true, traveled:0,
          maxRange:C.turretRange+90, age:0, isSuper:true });
        T.cd=C.turretCd;
      } else T.cd=0.15;   // лҢҖмғҒ м—ҶмқҢ вҶ’ м§§кІҢ мһ¬нғҗмғү
    }
  } else if(RULE.id==="hotzone"){
    const C=RULE_CONFIG.hotzone;
    if(!RULE.fixed && C.moveEvery>0){   // BIG-BATCH-2 P1: кұ°м җ мҲңнҷҳ мқҙлҸҷ(3мҙҲ м „ кІҪкі  к№ңл№Ўмһ„)
      RULE.moveT+=dt;
      RULE.warn=Math.max(0, RULE.moveT-(C.moveEvery-3));
      if(RULE.moveT>=C.moveEvery){
        RULE.moveT=0; RULE.warn=0;
        RULE.posIdx=(RULE.posIdx+1)%3;
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.5, radius:RULE.radius});
        RULE.y=ARENA.y+ARENA.h*[0.5,0.25,0.75][RULE.posIdx];
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.6, radius:RULE.radius});
        showToast("вңЁ кұ°м җмқҙ мқҙлҸҷн–Ҳм–ҙмҡ”!"); playSfx("buff");
      }
    }
    let pIn=0, eIn=0;
    for(const f of playerTeam()) if(f && !f.dead && dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius) pIn++;
    for(const f of enemies)      if(f && !f.dead && dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius) eIn++;
    RULE.holder = (pIn&&!eIn)?"player":((eIn&&!pIn)?"enemy":((pIn&&eIn)?"contest":null));   // м–‘нҢҖ=м •м§Җ, л¬ҙмЈјкіөмӮ°=мң м§Җ
    if(RULE.holder==="player"){ RULE.gauge.player=Math.min(C.goal, RULE.gauge.player+C.capPerSec*dt); if(RULE.gauge.player>=C.goal) ruleWin("player"); }
    else if(RULE.holder==="enemy"){ RULE.gauge.enemy=Math.min(C.goal, RULE.gauge.enemy+C.capPerSec*dt); if(RULE.gauge.enemy>=C.goal) ruleWin("enemy"); }
  } else if(RULE.id==="stargrab"){
    const C=RULE_CONFIG.stargrab;
    // мҠӨнҸ°(мӨ‘м•ҷ 4мҙҲл§ҲлӢӨ 1к°ң, мҠӨнҸ°мӮ° лі„ лҸҷмӢң мөңлҢҖ 3 вҖ” л“ңлһҚ лі„мқҖ лі„лҸ„)
    RULE.spawnAcc+=dt;
    if(RULE.spawnAcc>=C.spawnEvery){
      RULE.spawnAcc=0;
      if(RULE.stars.filter(s=>s.ttl===undefined).length<C.maxOnGround){
        const p=starSpawnPoint(); if(p) RULE.stars.push(p);   // STARGRAB-RANDOM: л§ө м „м—ӯ лһңлҚӨ(нҶөн–ү м№ё)
      }
    }
    // л“ңлһҚ лі„ мҶҢл©ё(6мҙҲ) + н”Ҫм—…
    for(let i=RULE.stars.length-1;i>=0;i--){
      const s=RULE.stars[i];
      if(s.ttl!==undefined){ s.ttl-=dt; if(s.ttl<=0){ RULE.stars.splice(i,1); continue; } }
      for(const f of allFighters()){ if(!f||f.dead) continue;
        if(dist(f.x,f.y,s.x,s.y) < f.r+16){ f.stars=(f.stars||0)+1;
          effects.push({kind:"respawn",x:s.x,y:s.y,t:0,life:0.35,color:"#ffe066"});
          RULE.stars.splice(i,1); break; } }
    }
    // нҢҖ н•©кі„ 10 вҶ’ 15мҙҲ м№ҙмҡҙнҠёлӢӨмҡҙ(л°‘лҸҢл©ҙ лҰ¬м…Ӣ), мҷ„мЈј мӢң мҠ№лҰ¬
    for(const team of ["player","enemy"]){
      if(teamStars(team)>=C.goal){
        if(RULE.countdown[team]<0) RULE.countdown[team]=C.countdown;
        RULE.countdown[team]-=dt;
        if(RULE.countdown[team]<=0){ ruleWin(team); return; }
      } else RULE.countdown[team]=-1;
    }
  }
}
// к·ңм№ҷ мҳӨлёҢм қнҠё л ҢлҚ”(нҢҢмқҙн„° м•„лһҳмёө): мЎҙ/нғ‘/лІҪ/лі„. OVERNIGHT-1: кө¬мЎ°л¬ј(нғ‘В·мҝ м…ҳлІҪ)мқҖ к·ңм№ҷкіј л¬ҙкҙҖн•ҳкІҢ н•ӯмғҒ к·ёлҰј(м—җл””н„° л§ө м§Җмӣҗ)
function drawRuleObjects(){
  {
    for(const o of OBSTACLES){
      if(!o.sid || !o.structure) continue;
      const isTower=o.sid.indexOf("rtower_")===0 || o.sid.indexOf("raux_")===0;   // SIEGE-AUX: ліҙмЎ°нғ‘лҸ„ нғ‘ к·ёлһҳн”Ҫ
      const tc=(o.team==="player")?"#5aa0ff":(o.team==="enemy"?"#ff6a6a":"#c9a3ff");   // null=мӨ‘лҰҪ(м—җл””н„° мҝ м…ҳлІҪ)
      ctx.save();
      if(isTower){
        // OVERNIGHT-1 3-4: нҢҖ мҲҳм •нғ‘ м—җм…Ӣ(tower_blue/red) вҖ” л°‘л©ҙ footprint м •л ¬, м—Ҷмңјл©ҙ лҸ„нҳ•
        const timg=worldImage(o.team==="player"?"tower_blue":"tower_red");
        if(timg){
          const iw=timg.naturalWidth||1, ih=timg.naturalHeight||1, dw=o.w*1.25, dh=dw*(ih/iw);
          ctx.fillStyle="rgba(0,0,0,0.20)";
          ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.92, o.w*0.6, o.h*0.18, 0, 0, Math.PI*2); ctx.fill();
          ctx.drawImage(timg, o.x+o.w/2-dw/2, o.y+o.h-dh, dw, dh);
        } else {
          ctx.fillStyle="rgba(16,22,52,0.9)"; roundRect(o.x,o.y,o.w,o.h,10); ctx.fill();
          ctx.strokeStyle=tc; ctx.lineWidth=3; roundRect(o.x,o.y,o.w,o.h,10); ctx.stroke();
          drawStar(o.x+o.w/2, o.y+o.h/2, 5, o.w*0.32, o.w*0.14, tc);
        }
      } else {
        // BIG-BATCH-1 A1: мҝ м…ҳ лІҪ вҖ” мқҙмӣғ мқёмӢқ мҳӨнҶ нғҖмқј(л¶ҷмқҖ м…ҖмқҖ н•ң лҚ©м–ҙлҰ¬, н…Ңл‘җлҰ¬лҠ” л°”к№Ҙ л©ҙм—җл§Ң) вҶ’ 'н‘ң' лӘЁм–‘ н•ҙмҶҢ
        if(!drawWallAuto(o, tc)){
          ctx.fillStyle=hexA(tc,0.35); roundRect(o.x,o.y,o.w,o.h,6); ctx.fill();
          ctx.strokeStyle=tc; ctx.lineWidth=2; roundRect(o.x,o.y,o.w,o.h,6); ctx.stroke();
        }
      }
      // HP л°”
      // A1 нҸҙлҰ¬мӢң: лІҪ HPл°”лҠ” лӢӨм№ң м…Җм—җл§Ң(л©Җм©Ўн•ң лІҪмӨ„л§ҲлӢӨ л°”к°Җ мӨ„м§Җм–ҙ 'н‘ң' мқёмғҒ мЈјлҚҳ кІғ м ңкұ°). мҲҳм •нғ‘мқҖ н•ӯмғҒ.
      if(isTower || o.hp<o.maxHp){
        const bw=isTower?o.w+16:o.w+8, bx=o.x+o.w/2-bw/2, by=o.y-10, ratio=clamp(o.hp/o.maxHp,0,1);
        ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,bw,6,3); ctx.fill();
        ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,bw*ratio,6,3); ctx.fill();
      }
      ctx.restore();
    }
  }
  if(RULE && RULE.id==="hotzone"){
    const hc=RULE.holder==="player"?"#5aa0ff":(RULE.holder==="enemy"?"#ff6a6a":(RULE.holder==="contest"?"#ffd23f":"#9aa6cc"));
    const p=0.5+0.5*Math.sin(uiTime*3);
    const wb=(RULE.warn>0)?(0.45+0.55*Math.abs(Math.sin(uiTime*8))):1;   // BIG-BATCH-2 P1: мқҙлҸҷ 3мҙҲ м „ к№ңл№Ўмһ„
    ctx.save();
    // OVERNIGHT-1 3-3: кұ°м җ лҚ°м№ј(capture_zone) вҖ” нҢҖмғү л§Ғкіј н•Ёк»ҳ
    const zimg=worldImage("capture_zone");
    if(zimg){ ctx.globalAlpha=0.85*wb; const zs=RULE.radius*1.7; ctx.drawImage(zimg, RULE.x-zs/2, RULE.y-zs/2, zs, zs); }
    ctx.globalAlpha=(0.12+0.06*p)*wb; ctx.fillStyle=hc; ctx.beginPath(); ctx.arc(RULE.x,RULE.y,RULE.radius,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.8*wb; ctx.strokeStyle=hc; ctx.lineWidth=3; ctx.setLineDash([12,8]);
    ctx.beginPath(); ctx.arc(RULE.x,RULE.y,RULE.radius,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
  } else if(RULE && RULE.id==="stargrab"){
    // OVERNIGHT-1 3-5: мӨ‘м•ҷ лі„кҙ‘л§Ҙ лҚ°м№ј(мҠӨнҸ° м§Җм җ н‘ңмӢң)
    const vimg=worldImage("star_vein");
    if(vimg){ ctx.save(); ctx.globalAlpha=0.9; const vs=150;
      ctx.drawImage(vimg, (RULE.cx||LOGW/2)-vs/2, (RULE.cy||ARENA.y+ARENA.h/2)-vs/2, vs, vs); ctx.restore(); }
    const simg=worldImage("star_pickup");
    for(const s of RULE.stars){
      const p=0.5+0.5*Math.sin(uiTime*5+s.x);
      ctx.save(); ctx.globalAlpha=(s.ttl!==undefined && s.ttl<2)?(0.35+0.4*p):0.95;
      if(simg){ const ss=30+p*3; ctx.drawImage(simg, s.x-ss/2, s.y-ss/2, ss, ss); }
      else drawStar(s.x, s.y, 5, 13+p*2, 6, "#ffe14d");
      ctx.restore();
    }
  }
}
// к·ңм№ҷ HUD(мғҒлӢЁ нғҖмқҙлЁё м•„лһҳ): нғ‘ HP / мЎҙ кІҢмқҙм§Җ / лі„ к°ңмҲҳВ·м№ҙмҡҙнҠёлӢӨмҡҙ

    if(paintFinaleOn()){   // BIG-BATCH-2 P1: н”јлӮ л Ҳ м•ҲлӮҙ
      const fp=0.5+0.5*Math.sin(uiTime*7);

      }
    }
  }
  ctx.restore();
}

function startGame(){ applyProfileSelections(); resetMatch(); gameState=STATE.PLAYING; }
function goToStartScreen(){ if(edTest) edEndTest();   // мң кё°м„ұ: лҜёлҰ¬н•ҳкё° мӨ‘ лӢӨлҘё кІҪлЎң(мқјмӢңм •м§ҖвҶ’мӢңмһ‘нҷ”л©ҙ)лЎң лӮҳк°ҖлҸ„ __edtestВ·edTest м •лҰ¬(нҢ¬н…Җ л§ө лҲ„мҲҳ л°©м§Җ)
  gameState=STATE.START; keysDown.clear(); settingsOpen=false; restoreLocalArena(); }
function restoreLocalArena(){ OBSTACLES=getMap(selectedMapId).obstacles; BUSHES=getMap(selectedMapId).bushes; setCameraForMap(getMap(selectedMapId)); }
function setPaused(p){
  if(p && gameState===STATE.PLAYING){ gameState=STATE.PAUSED; keysDown.clear(); }
  else if(!p && gameState===STATE.PAUSED){ gameState=STATE.PLAYING; keysDown.clear(); }
}
function endGame(){
  gameState=STATE.OVER; resultButtonIndex=0; keysDown.clear();
  grantMatchReward();   // ліҙмғҒмқҖ мў…лЈҢ мӢң л”ұ н•ң лІҲл§Ң
}

// мәҗлҰӯн„°-мһҘм• л¬ј м¶©лҸҢмқҖ hitboxлҘј м•ҲмӘҪмңјлЎң мӮҙм§қ мӨ„м—¬ лӘЁм„ңлҰ¬ лӢөлӢөн•Ёмқ„ мҷ„нҷ”(лІҪ кҙҖнҶөмқҖ л§үмқҢ).
// нғ„нҷҳ м¶©лҸҢмқҖ insetмқ„ м“°м§Җ м•Ҡм•„ кё°мЎҙмІҳлҹј лҳҗл ·н•ҳкІҢ л§үнһҢлӢӨ.
function entityHitsObstacle(cx, cy, r){
  const ins=GAME_CONFIG.obstacleHitboxInset||0;
  for(const o of OBSTACLES){
    const iw=o.w-ins*2, ih=o.h-ins*2;
    if(iw<=0||ih<=0){ if(circleRectOverlap(cx,cy,r,o)) return true; continue; }
    if(circleRectOverlap(cx,cy,r,{x:o.x+ins,y:o.y+ins,w:iw,h:ih})) return true;
  }
  return false;
}
function moveEntity(ent, dx, dy){
  const ox=ent.x, oy=ent.y;
  ent.x+=dx;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.x=ox;   // xм¶• л§үнһҲл©ҙ лҗҳлҸҢлҰј(лӘЁм„ңлҰ¬м—җм„ң лҜёлҒ„лҹ¬м§җ мң м§Җ)
  ent.y+=dy;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.y=oy;
  ent.x=clamp(ent.x, ARENA.x+ent.r, ARENA.x+ARENA.w-ent.r);
  ent.y=clamp(ent.y, ARENA.y+ent.r, ARENA.y+ARENA.h-ent.r);
}
function inBush(ent){ return isInBushXY(ent.x, ent.y); }
function isInBushXY(x,y){
  for(const b of BUSHES){ if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return true; }
  return false;
}
// н’ҖмҲІ к°ҖмӢңм„ұ: лӮҙ/м•„кө°мқҖ н•ӯмғҒ ліҙмһ„(н’ҖмҲІ м•Ҳмқҙл©ҙ л°ҳнҲ¬лӘ…), м ҒмқҖ н’ҖмҲІ+л©Җл©ҙ мҲЁк№Җ, к°Җк№Ңмҡ°л©ҙ/кіөкІ© м§Ғнӣ„м—” ліҙмһ„.
// viewer={x,y,team}. л°ҳнҷҳ {hidden, alpha}
function bushVisibility(fx, fy, fTeam, isMine, viewer, recentlyFired){
  const inB=isInBushXY(fx,fy);
  if(isMine) return { hidden:false, alpha: inB?0.6:1 };       // лӮҙ мәҗлҰӯн„°лҠ” н’ҖмҲІм—җм„ңлҸ„ н•ӯмғҒ лӘ…нҷ•(мӮҙм§қ л°ҳнҲ¬лӘ…)
  if(!inB) return { hidden:false, alpha:1 };
  if(viewer && fTeam===viewer.team) return { hidden:false, alpha:0.6 }; // м•„кө°: ліҙмһ„(нқҗлҰҝ)
  if(recentlyFired) return { hidden:false, alpha:0.7 };        // кіөкІ© м§Ғнӣ„м—” л“ңлҹ¬лӮЁ
  if(viewer && dist(fx,fy,viewer.x,viewer.y) <= GAME_CONFIG.bushRevealDistance) return { hidden:false, alpha:0.55 };
  return { hidden:true, alpha:0.55 };                          // л©ҖлҰ¬ мһҲлҠ” н’ҖмҲІ мҶҚ м Ғ вҶ’ мҲЁк№Җ
}

function grantGrowth(f, type){ _sfxBuffHook();
  if(!f || f.isBoss) return;
  f.growth=f.growth||{aspd:0,atk:0,hp:0};
  if(f.growth[type]>=GROWTH.max){                       // кҪү м°¬ мў…лҘҳл©ҙ лӮЁмқҖ мў…лҘҳлЎң лҢҖмІҙ(м „л¶Җ л§Ңл ҷмқҙл©ҙ мҶҢл©ё)
    type=GROWTH.types.find(t=>f.growth[t]<GROWTH.max);
    if(!type) return;
  }
  f.growth[type]++;
  if(type==="hp"){ f.maxHp+=GROWTH.hpAdd; f.hp=Math.min(f.maxHp, f.hp+GROWTH.hpAdd); }
  effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.45,color:GROWTH_STYLE[type].color});
}
function nextGrowthTypeFor(f){                          // мә нҺҳмқё м§Ғм ‘ л¶Җм—¬: нҢҢмқҙн„°лі„ мҲңнҷҳ
  f._growCycle=(f._growCycle||0);

}
function tickBuffOrbs(){
  if(!BUFFORBS.length) return;
  const FS=allFighters();   // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): мҳӨлёҢл§ҲлӢӨ л°°м—ҙмқ„ мғҲлЎң л§Ңл“Өм§Җ м•ҠмқҢ
  for(let i=BUFFORBS.length-1;i>=0;i--){ const o=BUFFORBS[i];
    for(const f of FS){ if(!f||f.dead) continue;
      if(dist(f.x,f.y,o.x,o.y) < f.r+16){ grantGrowth(f, o.type); BUFFORBS.splice(i,1); break; } }
  }
}

function effSpeed(f){
  let s=f.moveSpeed||0;
  if(f.freezeTimer>0) return 0;                                       // л№ҷкІ°: мқҙлҸҷ л¶Ҳк°Җ
  if(f.slowTimer>0) s*=GAME_CONFIG.trapSlowMul;
  if(f.iceTimer>0) s*=GAME_CONFIG.trapIceMul;                          // м–јмқҢ л°”лӢҘ: лҜёлҒҢ к°ҖмҶҚ(OVERNIGHT-1)
  if(f.speedBuffTimer>0) s*=GAME_CONFIG.speedBuffMul;
  if(f.wSlowTimer>0) s*=(1-(f.wSlowPct||0));                          // л¬ҙкё°/кё°мҲ  л‘”нҷ”(мӨ‘мІ© м—ҶмқҢ)
  if(f.cSpeedTimer>0) s*=(1+getAbility("student_03").c.speedUp);       // мӢңкі лӢҲ C м§ҲмЈј +45%
  if(f.upg && f.upg.mspd) s*=(1+0.05*f.upg.mspd);                       // PVE к°•нҷ”: л№ лҘё л°ң
  if(RULE && RULE.id==="tag"){                                        // GENRE-EXPAND-1 В§1: мҲ лһҳ +12%
    if(f.isTagger) s*=RULE_CONFIG.tag.tagSpeedMul;
    else if(RULE.runnerMul>1) s*=RULE.runnerMul;                      // BIG-BATCH-2 P1: мҲ лһҳ мҲҳ л№„лЎҖ лҸ„л§қмһҗ лІ„н”„
    if(f.tagDashT>0) s*=RULE_CONFIG.tag.dashMul;                      // BIG-BATCH-2 P1: лҹӯнӮӨ л°ҳм§қ лҢҖмӢң
  }
  if(RULE && RULE.id==="paint"){                                        // GENRE-EXPAND-1 В§2: мһҗкё°мғү мң„ +10% (P2: мҳЁлқјмқё blue/red нҢҖ л§Өн•‘ нҸ¬н•Ё)
    const pi=paintCellIdx(f.x,f.y);
    if(pi>=0 && RULE.grid[pi]===((f.team==="player"||f.team==="blue")?1:2)) s*=RULE_CONFIG.paint.ownSpeedMul;
  }
  return s*TEMPO.playerMove;
}

  if(f.wSlowTimer>0)f.wSlowTimer-=dt;

  if(f.shieldAbsorbTimer>0){ f.shieldAbsorbTimer-=dt; if(f.shieldAbsorbTimer<=0) f.shieldAbsorb=0; }  // лі„кіЁл ҳ X нқЎмҲҳл§ү л§ҢлЈҢ

  if(f.shieldItemTimer>0)f.shieldItemTimer-=dt;                        // л°©нҢЁ м ӨлҰ¬ м•„мқҙн…ң

  if(f.tagDashT>0)f.tagDashT-=dt; if(f.tagHideT>0)f.tagHideT-=dt; if(f.tagImmuneT>0)f.tagImmuneT-=dt;   // BIG-BATCH-2 P1: мҲ лһҳ лҸ„кө¬
}
function isFrozen(f){ return !!(f && f.freezeTimer>0); }               // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ

function applyTrapTo(f){
  if(!f || f.dead || f.inactive || f.invincibleTimer>0) return;
  for(const t of currentTraps()){
    if(circleRectOverlap(f.x,f.y,f.r,t)){
      if(t.type==="slow"){ f.slowTimer=GAME_CONFIG.trapSlowTime; }
      else if(t.type==="ice"){ f.iceTimer=0.3; }             // OVERNIGHT-1 3-2: м–јмқҢ л°”лӢҘ вҖ” л°ҹлҠ” лҸҷм•Ҳ лҜёлҒҢ/к°ҖмҶҚ(+30%)
      else { if(!(f.trapTimer>0)){
        let td=GAME_CONFIG.trapDamage;
        if(f.dmgReduceTimer>0) td*=getAbility("student_03").c.reduceMul;   // мӢңкі лӢҲ C нӣ„л°ҳ: н•Ём • н”јн•ҙ м Ҳл°ҳ
        f.hp=Math.max(1, f.hp-td); f.hitFlash=0.12; f.trapTimer=GAME_CONFIG.trapCooldown; spawnHit(f.x,f.y,"#ff9a9a");
        f.lastCombatTime=matchElapsed;   // UPDATE-1 P1: н•Ём • н”јн•ҙ = м „нҲ¬лЎң н‘ңмӢң вҖ” л°ҹлҠ” лҸҷм•Ҳ мһ¬мғқмқҙ н”јн•ҙлҘј лҗҳлҸҢлҰ¬лҚҳ лІ„к·ё мҲҳм •
      } }
    }
  }
}
// м•„мқҙн…ң 1к°ң мғқм„ұ(мһҘм• л¬ј/н•Ём •/мӢңмһ‘м§Җм җ нҡҢн”ј)
function spawnPowerupHost(map){
  if(POWERUPS.length>=GAME_CONFIG.powerupMaxCount) return;
  map=map||currentMap();
  for(let tryN=0; tryN<20; tryN++){
    const x=rand(ARENA.x+40, ARENA.x+ARENA.w-40), y=rand(ARENA.y+40, ARENA.y+ARENA.h-40);
    let bad=false;
    for(const o of (map.obstacles||[])){ if(circleRectOverlap(x,y,20,o)){ bad=true; break; } }
    if(!bad) for(const t of (map.traps||[])){ if(circleRectOverlap(x,y,20,t)){ bad=true; break; } }
    if(!bad){ const sp=map.playerSpawn, ep=map.enemySpawn;
      if(sp && dist(x,y,sp.x,sp.y)<120) bad=true; else if(ep && dist(x,y,ep.x,ep.y)<120) bad=true; }
    if(!bad){ const types=["heal","speed","shield","ammo","clock"];   // PRD 13.1 м „нҲ¬ м•„мқҙн…ң 5мў…
      POWERUPS.push({ id:++powerupId, x:Math.round(x), y:Math.round(y), type: types[Math.floor(Math.random()*types.length)] }); return; }
  }
}
function applyPowerup(f, type){
  if(type==="heal"){ f.hp=Math.min(f.maxHp, f.hp+GAME_CONFIG.healPowerupAmount); effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#4bd86b"}); }
  else if(type==="shield"){ f.shieldItemTimer=5; effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#9fd0ff"}); }        // л°©нҢЁ м ӨлҰ¬: 5мҙҲ л°ӣлҠ” н”јн•ҙ 25%вҶ“
  else if(type==="ammo"){ if(usesAmmo(f)){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#ffd9a0"}); }  // лі„л№ӣ нғ„м•Ҫ: нғ„м°Ҫ мҰүмӢң мҷ„м¶©
  else if(type==="clock"){ f.specialCd=Math.max(0,(f.specialCd||0)-3); effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#d9b3ff"}); }   // мӢңкі„ м ӨлҰ¬: X мҝЁ 3мҙҲ к°җмҶҢ
  else { f.speedBuffTimer=GAME_CONFIG.speedBuffTime; effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.4,color:"#ffe066"}); }
}
// host/лЎңм»¬: м•„мқҙн…ң мЈјкё° мғқм„ұ + н”Ҫм—… нҢҗм •. fighters=н”Ңл Ҳмқҙм–ҙк°Җ мЎ°мў…н•ҳлҠ” нҢҢмқҙн„° л°°м—ҙ.
function tickPowerupsHost(dt, fighters){
  powerupAcc+=dt; if(powerupAcc>=GAME_CONFIG.powerupSpawnInterval){ powerupAcc=0; spawnPowerupHost(); }
  for(let i=POWERUPS.length-1;i>=0;i--){ const p=POWERUPS[i];
    for(const f of fighters){ if(!f||f.dead||f.inactive) continue;
      if(dist(f.x,f.y,p.x,p.y) < f.r+16){ applyPowerup(f,p.type); POWERUPS.splice(i,1); break; } }
  }
}

function hasLineOfSight(ax,ay,bx,by){
  const d=dist(ax,ay,bx,by), steps=Math.max(1,Math.ceil(d/16));
  for(let i=1;i<steps;i++){
    const t=i/steps, px=lerp(ax,bx,t), py=lerp(ay,by,t);
    for(const o of OBSTACLES){ if(px>=o.x&&px<=o.x+o.w&&py>=o.y&&py<=o.y+o.h) return false; }
  }
  return true;
}
function nearestTarget(f, preferPlayer){
  const list=targetsOf(f.team);
  let best=null, bestD=Infinity;
  for(const t of list){
    if(t.dead) continue;
    let d=dist(f.x,f.y,t.x,t.y);
    if(preferPlayer && t.isPlayer) d-=80;
    if(d<bestD){ bestD=d; best=t; }
  }
  return best;
}

function spawnBullets(fighter, baseAngle, opt){
  const count=opt.count||1;
  const spread=deg2rad(opt.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=baseAngle;
    if(count>1) a=baseAngle - spread/2 + spread*(i/(count-1));
    const muzzle=fighter.r+6;
    const bx=fighter.x+Math.cos(a)*muzzle, by=fighter.y+Math.sin(a)*muzzle;
    const b={
      x:bx, y:by, vx:Math.cos(a)*opt.speed, vy:Math.sin(a)*opt.speed,
      r:opt.radius, damage:opt.damage, team:fighter.team, ownerId:fighter.id,
      isSuper:!!opt.isSuper, countsForPlayer:(fighter.id===player.id && !opt.isSuper),
      color:opt.color, alive:true, traveled:0, maxRange:opt.range,
      aid:opt.aid, wid:opt.wid, wref:opt.wref||null, age:0,
      snipe:opt.snipe||0, stab:opt.stab||0
    };
    if(opt.boomerang){ b.boomerang=true; b.phase="out"; b.spd=opt.speed; b.ownerRef=fighter; b.hitO={}; b.hitB={}; }
    bullets.push(b);
    spawnMuzzle(bx,by,Math.cos(a),Math.sin(a),opt.color);
  }
  fighter.facing=baseAngle;
  fighter.lastCombatTime=matchElapsed;
  fighter.lastFireTime=matchElapsed;   // л°ңмӮ¬н•ҳл©ҙ мң„м№ҳк°Җ л“ңлҹ¬лӮңлӢӨ(н’ҖмҲІ мқҖмӢ  н•ҙм ң нҢҗм •мҡ©)
  if(fighter.invincibleTimer>0) fighter.invincibleTimer=0;
}

// мәҗлҰӯн„° кі м • л¬ҙкё° л°ңмӮ¬ мҠӨнҺҷ(лӘЁл“  лӘЁл“ң кіөнҶө мҲҳм№ҳ). PVE к°ңмқё к°•нҷ”(f.upg)к°Җ мһҲмңјл©ҙ л°°мңЁ м Ғмҡ©.
function weaponFireSpec(f, w){
  const c=f.char, u=f.upg;
  const spec={
    count:w.spreadCount, spreadDeg:w.spreadAngleDeg,
    damage: GAME_CONFIG.playerDamage*c.damageMul*w.damageMul,
    speed: GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul*TEMPO.playerBullet,
    range: GAME_CONFIG.playerRange*w.rangeMul,
    radius: GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul,
    color:w.color, wid:w.id, wref:w, boomerang:!!w.boomerang
  };
  if(u){
    spec.damage*=(1+0.08*(u.atk||0)); spec.speed*=(1+0.08*(u.bspd||0));
    spec.range*=(1+0.08*(u.range||0)); spec.radius*=(1+0.08*(u.bsize||0));
  }
  const gK=growthOf(f,"atk"); if(gK) spec.damage*=(1+GROWTH.atkPct*gK);   // GAMEPLAY-1 м„ұмһҘ: кіөкІ©л Ҙ +10%/мҠӨнғқ
  // v1.21 нҢЁмӢңлёҢ н”Ңлһҳк·ё: лӢ¬мқҙ=мӣҗкұ°лҰ¬ м ҖкІ© ліҙл„ҲмҠӨ, мӢңкі лӢҲ=л“ұ л’Ө кё°мҠө ліҙл„ҲмҠӨ (нҢҗм •мқҖ bulletHitDamage)
  if(c.id==="student_02") spec.snipe=getAbility("student_02").passive.snipeDist;
  if(c.id==="student_03") spec.stab=1;
  return spec;
}

function applyDamage(target, dmg, fromTeam, fromId, hx, hy){
  if(!canBeHit(target)) return 0;
  if(target.team===fromTeam) return 0; // м•„кө° мҳӨмӮ¬ л°©м§Җ
  dmg=incomingDamage(target, dmg);     // л°©нҢЁ(лі„кіЁл ҳX нқЎмҲҳл§ү)/м§ҲмЈј нӣ„л°ҳ(мӢңкі лӢҲC) н”јн•ҙ к°җмҶҢ
  if(dmg<=0){ target.hitFlash=0.1; target.lastCombatTime=matchElapsed; spawnHit(hx,hy,"#9fd0ff"); return 0; }   // нқЎмҲҳл§үмқҙ м „л¶Җ л§үмқҢ
  target.hp-=dmg;
  target.lastCombatTime=matchElapsed;
  target.hitFlash=0.15;
  spawnDamageNumber(target.x, target.y-target.r-8, Math.round(dmg), target.team==="player"?"#ff7a7a":"#ffe066");
  if(fromId===player.id && target.team==="enemy") stats.damageDealt+=dmg;
  if(target.isPlayer) stats.damageTaken+=dmg;
  if(target.hp<=0){ target.hp=0; handleDeath(target, fromId); }
  return dmg;
}

function handleDeath(f, killerId){
  if(f.dead) return;
  f.dead=true; f.respawnTimer=(MATCH&&MATCH.respawnDelay)||GAME_CONFIG.respawnDelay; f.invincibleTimer=0;
  spawnDeathBurst(f);
  // GAMEPLAY-1 1D м„ұмһҘ мҳӨлёҢ: м„¬л©ём „м—җм„ң мІҳм№ҳлӢ№н•ң нҢҢмқҙн„°к°Җ мӮ¬л§қ м§Җм җм—җ 1к°ң л“ңлһҚ(3мў… мҲңнҷҳ)
  if(matchRuleId()==="tdm" && !f.isBoss)
    BUFFORBS.push({ x:f.x, y:f.y, type:GROWTH.types[buffOrbCycle++ % GROWTH.types.length] });
  // GAMEPLAY-1 stargrab: мЈҪмңјл©ҙ ліҙмң н•ң лі„ м „л¶Җ л“ңлһҚ(6мҙҲ нӣ„ мҶҢл©ё)
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){
    for(let i=0;i<f.stars;i++) RULE.stars.push({ x:f.x+rand(-26,26), y:f.y+rand(-26,26), ttl:RULE_CONFIG.stargrab.dropTtl });
    f.stars=0;
  }
  if(f.team==="enemy"){
    playerTeamScore++;
    if(killerId===player.id){
      stats.kills++;
      // BIG-BATCH-2 P1: нӮ¬ мҠӨнҠёлҰӯ н•ҳмқҙлқјмқҙнҠё(мЈҪм§Җ м•Ҡкі  м—°мҶҚ мІҳм№ҳ вҖ” 3/5/7м—җм„ң м—°м¶ң)
      matchStreak++;
      if(matchStreak===3||matchStreak===5||matchStreak===7){
        showToast("рҹ”Ҙ "+matchStreak+"м—°мҶҚ мІҳм№ҳ!");
        effects.push({kind:"superwave", x:player.x, y:player.y, t:0, life:0.5, radius:80});
      }
    }
    if(f.isBoss){
      bossActive=false; bossDefeated=true; stats.bossKilled=true;
      f.respawnTimer=Infinity;   // кІ©нҢҢлҗң ліҙмҠӨлҠ” лӢӨмӢң л¶Җнҷңн•ҳм§Җ м•ҠлҠ”лӢӨ(ліҙмҠӨм „мқҖ 1нҡҢм„ұ н”јлӮ л Ҳ)
      showToast("ліҙмҠӨ кІ©нҢҢ! ліҙмғҒ +"+REWARD_CONFIG.boss+"G");
    } else {
      enemiesDowned++;
      // ліҙмҠӨ лӮңмһ…мқҖ м„¬л©ём „ м „мҡ©(мҳӨлёҢм қнҠё лӘЁл“ңлҠ” лӘ©н‘ң мӨ‘мӢ¬ вҖ” ліҙмҠӨ м—ҶмқҢ)
      if(matchRuleId()==="tdm" && MATCH.mode.bossAllowed && !bossSpawned && enemiesDowned>=GAME_CONFIG.bossThreshold) bossPending=true;
    }
  } else {
    enemyTeamScore++;
    if(f.isPlayer){ stats.playerDeaths++; matchStreak=0; }   // BIG-BATCH-2 P1: мӮ¬л§қ = мҠӨнҠёлҰӯ мў…лЈҢ
  }
}

function respawn(f){
  let asBoss=false;
  if(f.team==="enemy" && f===enemy && bossPending && !bossSpawned){
    asBoss=true; bossPending=false; bossSpawned=true; bossActive=true;
  }
  f.dead=false;
  if(asBoss){
    f.isBoss=true; f.r=38; f.name="ліҙмҠӨ нҒ¬лЎ¬";
    f.maxHp=MATCH.bossMaxHp; f.color="#b3203a"; f.subColor="#ff6a86";
    spawnBossArrival();
  }
  f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;

  const base=f.team==="player"?MATCH.map.playerSpawn:MATCH.map.enemySpawn;
  let bx=(f.baseX!==undefined)?f.baseX:base.x;
  let by=(f.baseY!==undefined)?f.baseY:base.y;
  let pos=findClearSpawn(bx,by,f.r);
  for(const t of targetsOf(f.team)){
    if(!t.dead && dist(pos.x,pos.y,t.x,t.y) < f.r+t.r+50){
      pos=findClearSpawn(base.x, base.y+(base.y<LOGH/2?80:-80), f.r);
      break;
    }
  }
  f.x=pos.x; f.y=pos.y;
  f.invincibleTimer=GAME_CONFIG.invincibleTime;
  f.lastCombatTime=matchElapsed;
  f.ai.lastX=pos.x; f.ai.lastY=pos.y;
  spawnRespawnRing(f);
}

function pushFighter(f, angle, distance){
  const steps=8;
  for(let i=0;i<steps;i++) moveEntity(f, Math.cos(angle)*distance/steps, Math.sin(angle)*distance/steps);
}

let skillZones=[];                 // м§„н–ү мӨ‘ мһҘнҢҗ(лі„лҳҘлі„/к°ҖмӢң/м–јмқҢ/кө¬кёүмғҒмһҗ/лё”лһҷнҷҖ/л№ҷкІ°нҸӯл°ң)
function resetSkillZones(){ skillZones=[]; }

// в”Җв”Җ env м–ҙлҢ‘н„°: лЎңм»¬ в”Җв”Җ
function envLocal(){
  return {
    foes(f){ return targetsOf(f.team).filter(canBeHit).map(t=>({e:t,key:t.id,isBoss:!!t.isBoss,isFighter:true})); },
    allies(f){ const list=(f.team==="player")?playerTeam():enemies; return list.filter(t=>!t.dead); },
    damage(f,o,dmg){ return applyDamage(o.e,dmg,f.team,f.id,o.e.x,o.e.y); },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){
      const b=makeSkillBullet(f,spec);
      b.team=f.team; b.ownerId=f.id; b.countsForPlayer=false;
      bullets.push(b);
    }
  };
}
// мҠӨнӮ¬ нғ„нҷҳ кіөнҶө н•„л“ң(X л№„н–үкё°/C 7л°ң/C нҶөнҶөл№„н–үкё°). isSuper=true вҶ’ кІҢмқҙм§Җ лҜём¶©м „.
function makeSkillBullet(f,spec){
  const a=(spec.angle!==undefined)?spec.angle:f.facing, mz=f.r+6;
  return { x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*spec.speed, vy:Math.sin(a)*spec.speed,
    r:spec.radius, damage:spec.damage, color:spec.color, alive:true, traveled:0, maxRange:spec.range,
    isSuper:true, wid:spec.wid||null, age:0, life:spec.life,
    snipe:spec.snipe||0, stab:spec.stab||0,   // v1.21 нҢЁмӢңлёҢ(лӢ¬мқҙ м ҖкІ©/мӢңкі лӢҲ кё°мҠө)
    bounce:!!spec.bounce, maxBounce:spec.maxBounce||0, ultCid:spec.ultCid, ultMaxHits:spec.ultMaxHits };
}

// в”Җв”Җ X нҠ№мҲҳкё°мҲ (мҝЁнғҖмһ„) вҖ” мӢңм „ м„ұкіө мӢң true в”Җв”Җ
function castSpecialFor(f, env){
  if(!f || f.dead || f.inactive || isFrozen(f)) return false;
  if(f.specialCd>0) return false;
  const cid=f.char.id, A=getAbility(cid);
  if(cid==="student_01"){                      // лҹӯнӮӨ X(v1.21b мҠӨмҷ‘) вҖ” лі„л№ӣ мқјкіұ л°ң: л¶Җмұ„кјҙ 7л°ң(лҢҖмғҒлӢ№ мөңлҢҖ 27)
    const ucid=newUltCastId(), spread=deg2rad(A.x.spreadDeg), n=A.x.count;
    for(let i=0;i<n;i++){
      const ang=f.facing-spread/2+spread*(i/(n-1));
      env.spawnBullet(f,{ angle:ang, speed:A.x.speed, radius:A.x.radius, damage:A.x.dmg, range:A.x.range,
        color:"#ffe066", wid:"tool_01", ultCid:ucid, ultMaxHits:Math.round(A.x.maxPerTarget/A.x.dmg) });
    }
  } else if(cid==="student_02"){               // лӢ¬мқҙ X вҖ” мҙҲмһҘкұ°лҰ¬ лҢҖнҳ• л№„н–үкё°(r26, м ҖкІ© нҢЁмӢңлёҢ м Ғмҡ©)
    env.spawnBullet(f,{ speed:A.x.speed, radius:A.x.radius, damage:A.x.dmg, range:A.x.range, color:"#eef2f6", wid:"tool_02", snipe:A.passive.snipeDist });
  } else if(cid==="student_03"){               // мӢңкі лӢҲ X вҖ” л°ҳм§қ к°ҖмӢң кёё(3мҙҲк°„ мқҙлҸҷ кІҪлЎңм—җ к°ҖмӢң, v1.21 мөңлҢҖ 6к°ң)
    f.thornTrail={ timer:A.x.trailTime, lastX:f.x, lastY:f.y, acc:0, count:0 };
  } else if(cid==="student_04"){               // лҲҲкҪғ X вҖ” м„ңлҰ¬ л°”лӢҘ(м Ғ мқҙлҸҷВ·кіөмҶҚ л‘”нҷ” мЎҙ)
    // OVERNIGHT-1 2-2: мЎҙмқҙ м•„л ҲлӮҳ л°–мңјлЎң нҺјміҗм§ҖлҚҳ лІ„к·ё вҖ” мӨ‘мӢ¬мқ„ л°ҳкІҪл§ҢнҒј м•ҲмӘҪмңјлЎң clamp
    let tx=f.x+Math.cos(f.facing)*A.x.dist, ty=f.y+Math.sin(f.facing)*A.x.dist;
    tx=clamp(tx, ARENA.x+A.x.radius, ARENA.x+ARENA.w-A.x.radius); ty=clamp(ty, ARENA.y+A.x.radius, ARENA.y+ARENA.h-A.x.radius);
    skillZones.push({type:"ice", owner:f, x:tx, y:ty, timer:A.x.life, radius:A.x.radius, slowPct:A.x.slowPct, atkSlowMul:A.x.atkSlowMul, enterDmg:A.x.enterDmg, entered:{}});
  } else if(cid==="student_05"){               // лӘЁм•„ X вҖ” нҡҢліө мҳӨмҳӨлқј кё°л¬ј(5мҙҲВ·л°ҳкІҪ140В·нҢҖмӣҗ мҙҲлӢ№10, 1мқё 1к°ң)
    skillZones=skillZones.filter(z=>!(z.type==="healTotem" && z.owner===f));
    skillZones.push({type:"healTotem", owner:f, x:f.x, y:f.y, timer:A.x.life, radius:A.x.radius, hps:A.x.hps, acc:0});
  } else if(cid==="student_06"){               // лі„кіЁл ҳ X(GAMEPLAY-1) вҖ” м ӨлҰ¬ л°©нҢЁ мғқм„ұ: нқЎмҲҳл§ү 80(4мҙҲ), мһҗмӢ  + мЎ°мӨҖн•ң м•„кө° 1лӘ…
    const giveShield=(t)=>{ t.shieldAbsorb=A.x.absorb; t.shieldAbsorbTimer=A.x.dur; spawnSuperWave(t.x,t.y,28); };
    giveShield(f);
    let best=null, bd=A.x.allyRange;                     // л°”лқјліҙлҠ” л°©н–Ҙ Вұ(allyArcDeg/2) м•Ҳ к°ҖмһҘ к°Җк№Ңмҡҙ м•„кө°
    for(const a of env.allies(f)){
      if(a===f||a.dead||a.inactive) continue;
      const d=dist(f.x,f.y,a.x,a.y); if(d>bd) continue;
      let da=Math.atan2(a.y-f.y,a.x-f.x)-f.facing;
      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      if(Math.abs(da)<=deg2rad(A.x.allyArcDeg)/2){ bd=d; best=a; }
    }
    if(best) giveShield(best);
  }
  f.specialCd=A.x.cd*(f.upg&&f.upg.xcd?Math.max(0.7,1-0.06*f.upg.xcd):1);   // PVE к°•нҷ”: л°ҳм§қ мӢңкі„
  f.lastCombatTime=matchElapsed;
  if(f.invincibleTimer>0 && cid!=="student_06") f.invincibleTimer=0;   // кіөкІ© н–үлҸҷ вҶ’ лҰ¬мҠӨнҸ° л¬ҙм Ғ н•ҙм ң(л°©нҢЁлҠ” л°©м–ҙлқј мң м§Җ)
  spawnSuperWave(f.x,f.y,34);
  return true;
}

// в”Җв”Җ C к¶Ғк·№кё°(кІҢмқҙм§Җ 100) вҖ” мӢңм „ м„ұкіө мӢң true в”Җв”Җ
function castUltimateFor(f, env, getGauge, setGauge){
  if(!f || f.dead || f.inactive || isFrozen(f)) return false;
  if(getGauge()<GAME_CONFIG.superCharge) return false;
  setGauge(0);
  const cid=f.char.id, A=getAbility(cid);
  if(cid==="student_01"){                      // лҹӯнӮӨ C(v1.21b мҠӨмҷ‘) вҖ” лі„лҳҘлі„ мқјмһҗ нҸӯл°ң: лӮҙ м•һ мқјм§Ғм„  5м—°мҶҚ(мӢңм „лӢ№ к°ҷмқҖ лҢҖмғҒ 1нҡҢВ·45)
    const grp={};                              // 5к°ң нҸӯл°ңмқҙ кІ№міҗлҸ„ к°ҷмқҖ лҢҖмғҒмқҖ 1лІҲл§Ң(кіјмһү мӨ‘мІ© л°©м§Җ)
    for(let i=0;i<A.c.count;i++){
      const d=A.c.startDist+A.c.gap*i;
      let tx=f.x+Math.cos(f.facing)*d, ty=f.y+Math.sin(f.facing)*d;
      tx=clamp(tx, ARENA.x+24, ARENA.x+ARENA.w-24); ty=clamp(ty, ARENA.y+24, ARENA.y+ARENA.h-24);
      skillZones.push({type:"meteor", owner:f, x:tx, y:ty, timer:A.c.warn+i*0.07, radius:A.c.radius, dmg:A.c.dmg, groupHit:grp});
    }
  } else if(cid==="student_02"){               // лӢ¬мқҙ C вҖ” кҙҖнҶө мқјм§Ғм„  м ҖкІ©(OVERNIGHT-1 2-5: мҰүл°ң вҶ’ 0.35мҙҲ мӢңм „ нӣ„ л°ңмӮ¬, мҳҲкі м„  н‘ңмӢң)
    skillZones.push({type:"snipeCast", owner:f, x:f.x, y:f.y, ang:f.facing, timer:A.c.wind||0.35,
      len:A.c.len, width:A.c.width, dmg:A.c.dmg, radius:A.c.width/2});
    spawnSuperWave(f.x,f.y,26);
  } else if(cid==="student_03"){               // мӢңкі лӢҲ C вҖ” мҙҲкі мҶҚ л°ҳм§қ м§ҲмЈј(1мҙҲ л¬ҙм Ғ+3мҙҲ к°ҖмҶҚ+нӣ„л°ҳ 50% к°җмҶҢ)
    f.cSpeedTimer=A.c.dur;
    f.dmgReduceTimer=A.c.dur;                  // мІҳмқҢ 1мҙҲлҠ” л¬ҙм Ғмқҙ мҡ°м„  м Ғмҡ©лҗЁ
    f.invincibleTimer=Math.max(f.invincibleTimer||0, A.c.invuln);
    effects.push({kind:"dashTrail",x:f.x,y:f.y,t:0,life:0.5,color:f.color});
  } else if(cid==="student_04"){               // лҲҲкҪғ C вҖ” кҪҒкҪҒ м–јмқҢ к№Ёкё°(л°ҳкІҪ150В·LOSВ·1мҙҲ л№ҷкІ° нӣ„ 30, ліҙмҠӨлҠ” л‘”нҷ”+30)
    spawnSuperWave(f.x,f.y,A.c.radius);
    const bombTargets={};
    for(const o of env.foes(f)){
      if(dist(f.x,f.y,o.e.x,o.e.y)>A.c.radius+o.e.r) continue;
      if(!hasLineOfSight(f.x,f.y,o.e.x,o.e.y)) continue;         // лІҪ л„ҲлЁё кёҲм§Җ
      if(o.isBoss){ applySlowTo(o.e, A.c.bossSlowPct, A.c.bossSlowTime); env.damage(f,o,A.c.dmg); }
      else { o.e.freezeTimer=A.c.freeze*(o.e.eliteResist?0.5:1); bombTargets[o.key]=true; }   // м •мҳҲ: л№ҷкІ° 50%(PRD 15.4)
    }
    skillZones.push({type:"freezeBomb", owner:f, x:f.x, y:f.y, timer:A.c.freeze, dmg:A.c.dmg, targets:bombTargets});
  } else if(cid==="student_05"){               // лӘЁм•„ C вҖ” лӘЁл‘җ л¬ҙм Ғ!(v1.21): мӮҙм•„мһҲлҠ” нҢҖ м „мІҙ(ліёмқё нҸ¬н•Ё) 2мҙҲ л¬ҙм Ғ
    for(const a of env.allies(f)){ if(a.dead||a.inactive) continue; a.invincibleTimer=Math.max(a.invincibleTimer||0, A.c.invuln); }
    spawnSuperWave(f.x,f.y,120);
  } else if(cid==="student_06"){               // лі„кіЁл ҳ C вҖ” м ӨлҰ¬ лё”лһҷнҷҖ(м•һ 220, л°ҳкІҪ170, 3мҙҲ)
    let tx=f.x+Math.cos(f.facing)*A.c.dist, ty=f.y+Math.sin(f.facing)*A.c.dist;
    tx=clamp(tx, ARENA.x+24, ARENA.x+ARENA.w-24); ty=clamp(ty, ARENA.y+24, ARENA.y+ARENA.h-24);
    skillZones.push({type:"blackhole", owner:f, x:tx, y:ty, timer:A.c.life, radius:A.c.radius,
      pullEnemy:A.c.pullEnemy, pullPlayer:A.c.pullPlayer, dps:A.c.dps, tickAcc:0, dmgCount:{},
      maxTicks:Math.round(A.c.maxTotal/A.c.dps), bossPullMul:A.c.bossPullMul, bossSlowPct:A.c.bossSlowPct});
  }
  f.lastCombatTime=matchElapsed;
  return true;
}

// мӢңкі лӢҲ X: мқҙлҸҷ кІҪлЎңм—җ к°ҖмӢң мғқм„ұ(лӘЁл“  лӘЁл“ңмқҳ нҢҢмқҙн„° м—…лҚ°мқҙнҠём—җм„ң нҳём¶ң)
function tickThornTrail(f){
  const tr=f.thornTrail; if(!tr) return;
  const A=getAbility("student_03").x;
  const moved=Math.hypot(f.x-tr.lastX, f.y-tr.lastY);
  tr.acc+=moved; tr.lastX=f.x; tr.lastY=f.y;
  if(tr.acc>=A.gapDist && tr.count<A.maxThorns){
    tr.acc=0; tr.count++;
    skillZones.push({type:"thorn", owner:f, x:f.x, y:f.y, timer:A.thornLife, radius:A.thornR, dmg:A.dmg,
      slowPct:A.slowPct, slowTime:A.slowTime, hit:{}});
  }
}

// v1.21 лӘЁм•„ нҢЁмӢңлёҢ 'лӢӨм •н•ң кё°мҡҙ': л°ҳкІҪ 180 м•Ҳ нҢҖмӣҗ(ліёмқё м ңмҷё) мҙҲлӢ№ 5 нҡҢліө вҖ” лӘЁл“  лӘЁл“ңмқҳ нҢҢмқҙн„° нӢұм—җм„ң нҳём¶ң
function tickMoaPassive(f, dt, envFn){
  if(!f || f.dead || f.inactive || !f.char || f.char.id!=="student_05") return;
  f.moaAcc=(f.moaAcc||0)+dt;
  if(f.moaAcc<1) return;
  f.moaAcc-=1;
  const env=envFn(), P=getAbility("student_05").passive;
  for(const a of env.allies(f)){
    if(a===f||a.dead||a.inactive) continue;
    if(dist(f.x,f.y,a.x,a.y)<=P.radius && a.hp<a.maxHp) env.heal(a, P.hps);
  }
}

// мһҘнҢҗ м§„н–ү(нҳёмҠӨнҠё/лЎңм»¬ кіөмҡ©). envлҠ” нҳ„мһ¬ лӘЁл“ңмқҳ м–ҙлҢ‘н„°.
function tickSkillZones(dt, env){
  if(!skillZones.length) return;
  for(const z of skillZones.slice()){   // мҠӨлғ…мғ· мҲңнҡҢ: нӢұ мӨ‘ мғқм„ұлҗң мЎҙ(лӢ¬мқҙ мӢңм „вҶ’м ҖкІ©м„  л“ұ)мқҙ к°ҷмқҖ нӢұм—җ мӢңк°„мқ„ мһғм§Җ м•ҠкІҢ
    z.timer-=dt;
    if(z.type==="meteor"){
      if(z.enemyWarn){ if(z.timer<=0) z.done=true; }        // ліҙмҠӨ лӮҙл Өм°Қкё° 'мҳҲкі  н‘ңмӢң м „мҡ©'(н”јн•ҙлҠ” tEnemyUpdateк°Җ нҢҗм •)
      else if(z.timer<=0 && !z.done){ z.done=true;
        spawnSuperWave(z.x,z.y,z.radius);
        for(const o of env.foes(z.owner)){
          if(z.groupHit && z.groupHit[o.key]) continue;              // лҹӯнӮӨ X мқјмһҗ нҸӯл°ң: н•ң мӢңм „лӢ№ к°ҷмқҖ лҢҖмғҒ 1нҡҢ
          if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r && hasLineOfSight(z.x,z.y,o.e.x,o.e.y)){
            if(z.groupHit) z.groupHit[o.key]=1;
            env.damage(z.owner,o,z.dmg);
          }
        }
      }
    } else if(z.type==="thorn"){
      for(const o of env.foes(z.owner)){
        if(z.hit[o.key]) continue;                                  // к°ҷмқҖ к°ҖмӢңлҠ” к°ҷмқҖ м Ғм—җкІҢ 1нҡҢл§Ң
        if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r){ z.hit[o.key]=1; env.damage(z.owner,o,z.dmg); applySlowTo(o.e,z.slowPct,z.slowTime); }
      }
    } else if(z.type==="ice"){
      for(const o of env.foes(z.owner)){
        if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r){
          applySlowTo(o.e, z.slowPct, 0.2);                          // м•Ҳм—җ мһҲлҠ” лҸҷм•Ҳ м§ҖмҶҚ к°ұмӢ (мӨ‘мІ© м—ҶмқҢ)
          o.e.atkSlowTimer=Math.max(o.e.atkSlowTimer||0, 0.3);       // GAMEPLAY-1 м„ңлҰ¬: кіөкІ© к°„кІ© +40%(мЎҙ м•Ҳ м§ҖмҶҚ к°ұмӢ )
          o.e.atkSlowMul=z.atkSlowMul||1.4;
          if(!z.entered[o.key]){ z.entered[o.key]=1; env.damage(z.owner,o,z.enterDmg); }   // мІ« м§„мһ…л§Ң н”јн•ҙ
        }
      }
    } else if(z.type==="freezeBomb"){
      if(z.timer<=0 && !z.done){ z.done=true;
        for(const o of env.foes(z.owner)){ if(z.targets[o.key]) env.damage(z.owner,o,z.dmg); }   // л№ҷкІ° мў…лЈҢ мӢң нҢҢкҙҙ н”јн•ҙ
      }
    } else if(z.type==="snipeCast"){             // лӢ¬мқҙ C мӢңм „(OVERNIGHT-1 2-5): 0.35мҙҲ нӣ„ мӢңм „мһҗ нҳ„мһ¬ мң„м№ҳм—җм„ң л°ңмӮ¬(мӮ¬л§қ/л№ҷкІ° мӢң л¶Ҳл°ң)
      const cst=z.owner;
      if(cst && !cst.dead && !cst.inactive){ z.x=cst.x; z.y=cst.y; }   // мҳҲкі м„ мқҙ мӢңм „мһҗлҘј л”°лқјк°җ(к°ҒлҸ„лҠ” кі м •)
      if(z.timer<=0 && !z.done){ z.done=true;
        if(cst && !cst.dead && !cst.inactive && !isFrozen(cst)){
          const ex=z.x+Math.cos(z.ang)*z.len, ey=z.y+Math.sin(z.ang)*z.len;
          for(const o of env.foes(cst)){
            if(distPointSeg(o.e.x,o.e.y, z.x,z.y, ex,ey) > z.width/2 + o.e.r) continue;
            if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;
            env.damage(cst,o,z.dmg);
          }
          skillZones.push({type:"beam", owner:cst, x:z.x, y:z.y, ang:z.ang, len:z.len, timer:0.28, radius:z.width/2});
          spawnSuperWave(z.x,z.y,40);
        }
      }
    } else if(z.type==="healTotem"){           // лӘЁм•„ X(v1.21): мҳӨмҳӨлқј м•Ҳ нҢҖмӣҗ(ліёмқё нҸ¬н•Ё) мҙҲлӢ№ 10 нҡҢліө(0.5мҙҲ к°„кІ©)
      z.acc+=dt;
      while(z.acc>=0.5){ z.acc-=0.5;
        for(const a of env.allies(z.owner)){
          if(a.dead||a.inactive) continue;
          if(dist(z.x,z.y,a.x,a.y)<=z.radius+ (a.r||20) && a.hp<a.maxHp) env.heal(a, z.hps*0.5);
        }
      }
    } else if(z.type==="blackhole"){
      for(const o of env.foes(z.owner)){
        const d=dist(z.x,z.y,o.e.x,o.e.y);
        if(d>z.radius+o.e.r) continue;
        if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;           // лІҪ нҶөкіјлЎң лҒҢм§Җ м•ҠмқҢ
        let pull=o.isFighter?z.pullPlayer:z.pullEnemy;
        if(o.isBoss){ pull*=z.bossPullMul; applySlowTo(o.e, z.bossSlowPct, 0.2); }
        else if(o.e.eliteResist) pull*=0.7;                 // м •мҳҲ: лё”лһҷнҷҖ 70%(PRD 15.4)
        if(d>6){ const ang=Math.atan2(z.y-o.e.y, z.x-o.e.x); moveEntity(o.e, Math.cos(ang)*pull*dt, Math.sin(ang)*pull*dt); }
      }
      z.tickAcc+=dt;
      if(z.tickAcc>=1){ z.tickAcc-=1;
        for(const o of env.foes(z.owner)){
          if(dist(z.x,z.y,o.e.x,o.e.y)>z.radius+o.e.r) continue;
          if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;
          const n=z.dmgCount[o.key]||0;
          if(n<z.maxTicks){ z.dmgCount[o.key]=n+1; env.damage(z.owner,o,z.dps); }   // мҙқ н”јн•ҙ мғҒн•ң 18
        }
      }
    }
  }
  skillZones=skillZones.filter(z=>!z.done && z.timer>-0.01);
  if(skillZones.length>40) skillZones=skillZones.slice(skillZones.length-40);   // м„ұлҠҘ м•Ҳм „мһҘм№ҳ
}

// л„ӨнҠёмӣҢнҒ¬ м „мҶЎмҡ© мһҘнҢҗ мҡ”м•Ҫ(мҲ«мһҗВ·нғҖмһ…л§Ң вҖ” кІҢмҠӨнҠё л ҢлҚ”мҡ©)
const ZONE_CODES={meteor:0,thorn:1,ice:2,healTotem:3,blackhole:4,freezeBomb:5,beam:6,snipeCast:7};
function packZones(){
  const out=[];
  for(const z of skillZones){ if(z.type==="freezeBomb") continue;
    const o={t:ZONE_CODES[z.type], x:Math.round(z.x), y:Math.round(z.y), r:Math.round(z.radius||z.pickupR||0), tm:Math.round(z.timer*10)/10};
    if(z.type==="beam"||z.type==="snipeCast"){ o.a=Math.round(z.ang*100)/100; o.l=Math.round(z.len); }   // лӢ¬мқҙ C м ҖкІ©м„ /мӢңм „ мҳҲкі м„ (мҲ«мһҗл§Ң)
    out.push(o); }
  return out;
}
// м җвҶ’м„ л¶„ кұ°лҰ¬(лӢ¬мқҙ C кҙҖнҶө м ҖкІ© нҢҗм •)
function distPointSeg(px,py, x1,y1, x2,y2){
  const dx=x2-x1, dy=y2-y1, L2=dx*dx+dy*dy;
  if(L2===0) return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/L2; t=clamp(t,0,1);
  return Math.hypot(px-(x1+dx*t), py-(y1+dy*t));
}

// в”Җв”Җ лЎңм»¬ мӢңм „ лһҳнҚј(н”Ңл Ҳмқҙм–ҙ м „мҡ©) в”Җв”Җ
/* GENRE-EXPAND-1 В§1.3: мҲ лһҳмһЎкё° X н—Ҳмҡ©н‘ң вҖ” мқҙлҸҷ/л°©н•ҙлҘҳ(мӢңкі лӢҲ к°ҖмӢңкёёВ·лҲҲкҪғ м„ңлҰ¬)л§Ң. лӮҳлЁём§Җ рҹ”’ */
const TAG_X_ALLOW={ student_03:true, student_04:true };
function useCharacterSpecial(){
  if(gameState!==STATE.PLAYING || !player || player.dead) return;
  if(RULE && RULE.id==="tag" && !TAG_X_ALLOW[player.char.id]){
    if(castTagSpecial(player)) return;                                     // BIG-BATCH-2 P1: лӘЁл“ң м „мҡ© лҢҖмІҙ лҸ„кө¬
    showToast(player.char.id==="student_06" ? "рҹӣЎ лі„кіЁл ҳмқҖ '1нҡҢ мһЎкё° л°©м–ҙл§ү'мқҙ мһҗлҸҷмңјлЎң мһҲм–ҙмҡ”" : "рҹ”’ мқҙ лӘЁл“ңм—җм„  мқҙ кё°мҲ мқ„ м“ё мҲҳ м—Ҷм–ҙмҡ”");
    return;
  }
  if(player.specialCd>0){ spawnSuperFail(player.x,player.y); return; }
  castSpecialFor(player, envLocal());
}
function useCharacterSuper(){
  if(!player || player.dead) return;
  if(RULE && RULE.id==="tag"){ showToast("рҹ”’ мҲ лһҳмһЎкё°м—җм„  к¶Ғк·№кё°лҘј м“ё мҲҳ м—Ҷм–ҙмҡ”"); return; }
  if(superGauge<GAME_CONFIG.superCharge){ spawnSuperFail(player.x,player.y); return; }
  if(RULE && RULE.id==="paint"){                                       // BIG-BATCH-2 P1: м№ н•ҳкё° к¶Ғк·№кё° = лҢҖнҳ• лҸ„мғү(лӘЁл“  мәҗлҰӯ кіөнҶө мҠӨнҺҳм…ң)
    const CS=STUDENT_CELL, R=RULE_CONFIG.paint.ultRadius;
    superGauge=0;
    for(let dr=-R;dr<=R;dr++) for(let dc=-R;dc<=R;dc++) paintCellBy(player.x+dc*CS, player.y+dr*CS, "player", true);
    effects.push({kind:"superwave", x:player.x, y:player.y, t:0, life:0.6, radius:CS*(R+0.8)});
    playSfx("paint"); showToast("рҹҺЁ лҢҖнҳ• лҸ„мғү!");
    stats.superUsed++;
    return;
  }
  const ok=castUltimateFor(player, envLocal(), ()=>superGauge, v=>{ superGauge=v; });
  if(ok) stats.superUsed++;
}

/* в”Җв”Җ мһҘм „(нғ„м°Ҫ) кіөнҶө мң нӢё вҖ” н”Ңл Ҳмқҙм–ҙк°Җ мЎ°мў…н•ҳлҠ” нҢҢмқҙн„°м—җл§Ң ammoлҘј л‘”лӢӨ(AI/лҙҮ/м ҒмқҖ л¬ҙн•ң)
   v1.18: л¬ҙкё°лі„ нғ„м°Ҫ/мһҘм „(magazineSize/reloadTime). лӢӨмӨ‘нғ„лҸ„ кіөкІ© 1нҡҢлӢ№ нғ„м•Ҫ 1к°ңл§Ң мҶҢл№„. в”Җв”Җ */
function weaponOf(f){ return getWeapon((f && f.weaponId) || selectedWeaponId); }
function magSizeOf(f){ const w=weaponOf(f); return (w && w.magazineSize) || GAME_CONFIG.magazineSize; }
function reloadTimeOf(f){ const w=weaponOf(f); let t=(w && w.reloadTime) || GAME_CONFIG.reloadTime; const u=upgStacks(f,"reload"); if(u) t*=Math.max(0.6,1-0.10*u); return t; }
function initAmmo(f){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; }
function usesAmmo(f){
  if(f && f.char && f.char.id==="student_01") return false;   // v1.21 лҹӯнӮӨ нҢЁмӢңлёҢ: л¬ҙн•ң нғ„м°Ҫ(мһҘм „ л¶Ҳн•„мҡ”)
  return f && f.ammo!==undefined;
}
function tickReload(f, dt){ if(usesAmmo(f) && f.reloading){ f.reloadTimer-=dt; if(f.reloadTimer<=0){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } } }
function startReload(f){ if(usesAmmo(f) && !f.reloading && f.ammo<magSizeOf(f)){ f.reloading=true; f.reloadTimer=reloadTimeOf(f); } }
function canFireAmmo(f){ return !usesAmmo(f) || (!f.reloading && f.ammo>0); }   // ammo м—ҶлҠ” нҢҢмқҙн„°лҠ” н•ӯмғҒ л°ңмӮ¬ к°ҖлҠҘ
function consumeAmmo(f){ if(!usesAmmo(f)) return; f.ammo--; if(f.ammo<=0){ f.ammo=0; f.reloading=true; f.reloadTimer=reloadTimeOf(f); } }

/* в”Җв”Җ attackId кё°л°ҳ к¶Ғк·№кё°(C) кІҢмқҙм§Җ м¶©м „ м ңн•ң в”Җв”Җ
   Z кіөкІ© 1нҡҢ(лӢӨмӨ‘нғ„В·л¶Җл©”лһ‘ мҷ•ліө нҸ¬н•Ё)к°Җ к°ҷмқҖ лҢҖмғҒм—җкІҢ м—¬лҹ¬ лІҲ л§һм•„лҸ„ м¶©м „мқҖ мөңлҢҖ 20(=1нҡҢл¶„). */
let attackSeq=0;
let attackChargeLog=new Map();   // attackId -> Set("targetKey")
function newAttackId(){ return ++attackSeq; }
function resetAttackLog(){ attackChargeLog=new Map(); }
function tryChargeGauge(aid, targetKey, addFn){
  if(aid==null){ addFn(); return; }
  let set=attackChargeLog.get(aid);
  if(!set){ set=new Set(); attackChargeLog.set(aid,set);
    if(attackChargeLog.size>300){ const k=attackChargeLog.keys().next().value; attackChargeLog.delete(k); } }
  const key=String(targetKey);
  if(set.has(key)) return;   // к°ҷмқҖ кіөкІ© вҶ’ к°ҷмқҖ лҢҖмғҒ м¶”к°Җ м¶©м „ м—ҶмқҢ(мөңлҢҖ 20 мң м§Җ)
  set.add(key); addFn();
}
// C к¶Ғк·№кё°(лӢӨмӨ‘нғ„)мқҳ 'к°ҷмқҖ лҢҖмғҒ мөңлҢҖ н”јн•ҙ' мғҒн•ң вҖ” cast(cid)лі„ лҢҖмғҒлӢ№ лӘ…мӨ‘ нҡҹмҲҳ м ңн•ң
let ultSeq=0; let ultHitLog=new Map();   // cid -> Map(targetKey -> count)
function newUltCastId(){ return ++ultSeq; }
function canUltDamage(cid, targetKey, maxHits){
  let m=ultHitLog.get(cid);
  if(!m){ m=new Map(); ultHitLog.set(cid,m);
    if(ultHitLog.size>60){ const k=ultHitLog.keys().next().value; ultHitLog.delete(k); } }
  const key=String(targetKey), n=m.get(key)||0;
  if(n>=maxHits) return false;
  m.set(key,n+1); return true;
}

/* в”Җв”Җ л¬ҙкё° л¶Җк°ҖнҡЁкіј(л‘”нҷ”/л°Җм№ҳкё°) вҖ” м•„кө° мҳӨмӮ¬ м—ҶмқҢ(н”јн•ҙ м Ғмҡ©лҗң лҢҖмғҒм—җкІҢл§Ң нҳём¶ң) в”Җв”Җ */
function applySlowTo(t, pct, time){
  if(!t) return;
  if(!(t.wSlowTimer>0) || pct >= (t.wSlowPct||0)) t.wSlowPct=pct;   // мӨ‘мІ© м—ҶмқҢ: лҚ” к°•н•ң к°’л§Ң көҗмІҙ
  t.wSlowTimer=Math.max(t.wSlowTimer||0, time);                     // м§ҖмҶҚмӢңк°„мқҖ к°ұмӢ (м—°мһҘ)
}
function applyKnockbackTo(t, fromX, fromY, distPx, immuneTime){
  if(!t) return;
  if(t.knockImmuneTimer>0) return;                                  // м—°мҶҚ л°Җм№ҳкё° л©ҙм—ӯ
  let d=distPx;
  if(t.shieldAbsorb>0 && t.shieldAbsorbTimer>0) d*=0.5;              // лі„кіЁл ҳ нқЎмҲҳл§ү: л°Җм№ҳкё° м Ҳл°ҳ(GAMEPLAY-1)
  pushFighter(t, Math.atan2(t.y-fromY, t.x-fromX), d);               // лІҪ нҶөкіј м—ҶмқҢ(moveEntityк°Җ м¶©лҸҢ мІҳлҰ¬)
  t.knockImmuneTimer=immuneTime||0.4;
}
function applyWeaponHitEffects(w, target, bx, by){
  if(!w || !target) return;
  if(w.slowPct) applySlowTo(target, w.slowPct, w.slowTime||0.6);
  if(w.knockback) applyKnockbackTo(target, bx, by, w.knockback, w.knockImmuneTime||0.4);
}

/* в”Җв”Җ v1.21 нҢЁмӢңлёҢ: нғ„нҷҳ лӘ…мӨ‘ н”јн•ҙ ліҙм •(лӘЁл“  лӘЁл“ң кіөмҡ©) в”Җв”Җ
   лӢ¬мқҙ(snipe): 320px мқҙмғҒ лӮ м•„к°„ нғ„мқҙ лӘ…мӨ‘н•ҳл©ҙ +30%.
   мӢңкі лӢҲ(stab): нғ„ м§„н–ү л°©н–Ҙмқҙ лҢҖмғҒмқҙ ліҙлҠ” л°©н–Ҙкіј к°ҷмңјл©ҙ(=л“ұ л’Өм—җм„ң л§һмқҢ) +20%. */
function bulletHitDamage(b, target){
  let d=b.damage;
  if(b.snipe && (b.traveled||0)>=b.snipe) d*=(1+getAbility("student_02").passive.bonus);
  if(b.stab && target && typeof target.facing==="number"){
    let diff=Math.abs(Math.atan2(b.vy||0,b.vx||0)-target.facing)%(Math.PI*2);
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<Math.PI/2) d*=(1+getAbility("student_03").passive.backBonus);
  }
  return d;
}

/* в”Җв”Җ л°ӣлҠ” н”јн•ҙ ліҙм •(лі„кіЁл ҳ X л°©нҢЁ 60%вҶ“ В· мӢңкі лӢҲ C нӣ„л°ҳ 50%вҶ“) вҖ” мөңмҶҢ 1 ліҙмһҘ в”Җв”Җ */
// кІҢмқҙм§Җ м¶©м „(лӘЁл“ң кіөмҡ©): нҢҖ/мҳЁлқјмқё нҢҢмқҙн„°лҠ” f.superGauge, лЎңм»¬ н”Ңл Ҳмқҙм–ҙлҠ” м „м—ӯ superGauge
function addGaugeTo(f, amt){
  if(!f || !(amt>0)) return;
  if(typeof player!=="undefined" && f===player && typeof superGauge==="number"){ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+amt); return; }
  if(typeof f.superGauge==="number") f.superGauge=Math.min(GAME_CONFIG.superCharge, f.superGauge+amt);
}
function incomingDamage(f, dmg){
  let m=1;
  if(f && f.shieldAbsorb>0 && f.shieldAbsorbTimer>0){
    // GAMEPLAY-1 лі„кіЁл ҳ X нқЎмҲҳл§ү: н”јн•ҙлҘј л§үмқҙ лЁјм Җ нқЎмҲҳ. 'мҲҳнҳёмһҗ' нҢЁмӢңлёҢ: лі„кіЁл ҳ ліёмқёмқҙ л§үмқҖ м–‘ Г— 0.6 к¶Ғ м¶©м „
    const gx=getAbility("student_06").x;
    const blocked=Math.min(f.shieldAbsorb, dmg);
    f.shieldAbsorb-=blocked; dmg-=blocked;
    if(f.char && f.char.id==="student_06") addGaugeTo(f, blocked*(gx.gaugePerBlock||0.6));
    if(dmg<=0) return 0;
  }
  if(f && f.dmgReduceTimer>0) m*=getAbility("student_03").c.reduceMul;
  if(f && f.char && f.char.id==="student_06") m*=(1-(getAbility("student_06").passive.flatReduce||0));   // OVERNIGHT-1 2-3: лі„кіЁл ҳ мғҒмӢң н”јн•ҙ 10%вҶ“
  if(f && f.shieldItemTimer>0) m*=0.75;                    // л°©нҢЁ м ӨлҰ¬ м•„мқҙн…ң: л°ӣлҠ” н”јн•ҙ 25%вҶ“(5мҙҲ)
  if(f && f.upg && f.upg.def) m*=Math.max(0.7,1-0.06*f.upg.def);   // PVE к°•нҷ”: л°©м–ҙ л¬јм•Ҫ(мғҒн•ң 30%)
  if(m>=1) return dmg;
  return Math.max(1, dmg*m);
}

// лЎңм»¬ мҲҳлҸҷ мһҘм „(R). мҳЁлқјмқёмқҖ input.reloadлЎң hostк°Җ мІҳлҰ¬.
function doReloadManual(){ if(gameState===STATE.PLAYING && player && !player.dead) startReload(player); }

/* =======================================================================
   м—…лҚ°мқҙнҠё
   ======================================================================= */
function updatePlayer(dt){
  if(player.dead){ player.respawnTimer-=dt; if(player.respawnTimer<=0) respawn(player); return; }
  player.cooldown-=dt;
  tickReload(player, dt);
  if(player.hitFlash>0) player.hitFlash-=dt;
  if(player.invincibleTimer>0) player.invincibleTimer-=dt;
  tickThornTrail(player);                     // мӢңкі лӢҲ X: мқҙлҸҷ кІҪлЎң к°ҖмӢң мғқм„ұ
  tickMoaPassive(player, dt, envLocal);       // v1.21 лӘЁм•„ нҢЁмӢңлёҢ(к·јмІҳ нҢҖмӣҗ нҡҢліө)
  if(isFrozen(player)){ regen(player, dt); return; }   // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ(нғҖмқҙлЁёлҠ” tickStatusм—җм„ң м§„н–ү)
  if(RULE && RULE.id==="tag" && RULE.phase==="reveal") return;   // GENRE-EXPAND-1 В§1: мҲ лһҳ кіөк°ң 3мҙҲ вҖ” м „мӣҗ мқҙлҸҷ мһ кёҲ
  // UPDATE-1 P3: мқҳлҸ„ кё°л°ҳ мһ…л Ҙ вҖ” нӮӨліҙл“ңлҠ” кё°мЎҙ лҸҷмһ‘ лҸҷмқј, л§Ҳмҡ°мҠӨ/н„°м№ҳлҠ” мқҙлҸҷкіј мЎ°мӨҖ л¶„лҰ¬(л¬ҙл№ҷмғ·)
  const it=getLocalIntent();
  if(RULE && RULE.id==="tag") it.fire=false;           // мҲ лһҳмһЎкё°: Z л°ңмӮ¬ л№„нҷңм„ұ(мҲңмҲҳ м¶”кІ©)
  let mx=it.mx, my=it.my;
  const ml=Math.hypot(mx,my);
  const aimSeparate = !!(it.aimPoint || typeof it.aim==="number");
  if(ml>0.01){
    if(ml>1){ mx/=ml; my/=ml; }              // лҢҖк°Ғм„ /мҠӨнӢұ м •к·ңнҷ”(м•„лӮ лЎңк·ёлҠ” м„ёкё° мң м§Җ)
    moveEntity(player, mx*effSpeed(player)*dt, my*effSpeed(player)*dt);
    if(!aimSeparate) player.facing=Math.atan2(my,mx);   // нӮӨліҙл“ң: мқҙлҸҷ л°©н–Ҙмқ„ л°”лқјлҙ„(кё°мЎҙ лҸҷмһ‘)
  }
  if(it.aimPoint) player.facing=Math.atan2(it.aimPoint.y-player.y, it.aimPoint.x-player.x);   // л§Ҳмҡ°мҠӨ: м»Өм„ң мЎ°мӨҖ
  else if(typeof it.aim==="number") player.facing=it.aim;                                     // н„°м№ҳ: мҡ° мҠӨнӢұ мЎ°мӨҖ
  // л§Ҳмҡ°мҠӨ/н„°м№ҳмқҳ XВ·CВ·мһҘм „ вҖ” м—җм§Җ(1нҡҢ) мІҳлҰ¬. нӮӨліҙл“ңлҠ” keydown кІҪлЎң(handleKeyPress)к°Җ лӢҙлӢ№н•ҙ мӨ‘ліө м—ҶмқҢ.
  if(controlMode()!=="keyboard"){
    if(it.special && !player._pSp) useCharacterSpecial();
    if(it.ult && !player._pUlt) useCharacterSuper();
    if(it.reload && !player._pRl) reloadWeaponManual();
    player._pSp=!!it.special; player._pUlt=!!it.ult; player._pRl=!!it.reload;
  }
  if(it.fire && player.cooldown<=0 && canFireAmmo(player)){
    firePlayerWeapon();
    consumeAmmo(player);
    player.cooldown=zCooldownOf(player, getWeapon(player.weaponId||selectedWeaponId));
  }
  regen(player, dt);
}

/* GENRE-EXPAND-1 В§1.6 мҲ лһҳмһЎкё° лҙҮ: мҲ лһҳ=мөңк·јм ‘ лҸ„л§қмһҗ м¶”м Ғ(мҲҳн’Җ мқҖмӢ  мЎҙмӨ‘) В· лҸ„л§қмһҗ=мҲ лһҳ л°ҳлҢҖ+мҲҳн’Җ мһ ліө */
function tagBotUpdate(f, dt, list, env){
  if(RULE.phase==="reveal") return;
  list=list||allFighters(); env=env||envLocal();      // P2: мҳЁлқјмқё нҢҖ м—”м§„ мһ¬мӮ¬мҡ©(лӘ©лЎқВ·env мЈјмһ…)
  const C=RULE_CONFIG.tag, ai=(f.ai=f.ai||{});
  f.cooldown=1;                                       // л°ңмӮ¬ м•Ҳ н•Ё
  let mvx=0, mvy=0;
  if(f.isTagger){
    let best=null, bd=Infinity;
    for(const o of list){
      if(o.isTagger || o.dead) continue;
      if(o.tagHideT>0) continue;                      // BIG-BATCH-2 P1: лӘЁм•„ мқҖмӢ  л¶Җм—¬ мӨ‘ = мқём§Җ лӘ» н•Ё
      const d=dist(f.x,f.y,o.x,o.y);
      if(inBush(o) && d>C.bushHide) continue;         // мҲҳн’Җ мһ ліөмһҗлҠ” мқём§Җ лӘ» н•Ё(В§1.4)
      if(d<bd){ bd=d; best=o; }
    }
    if(best){ const d=bd||1; mvx=(best.x-f.x)/d; mvy=(best.y-f.y)/d; f.facing=Math.atan2(mvy,mvx); }
    else {                                            // мҲҳмғү л°°нҡҢ
      ai.wT=(ai.wT||0)-dt;
      if(ai.wT<=0){ ai.wA=Math.random()*Math.PI*2; ai.wT=rand(0.8,1.6); }
      mvx=Math.cos(ai.wA); mvy=Math.sin(ai.wA);
    }
  } else {
    let tg=null, bd=Infinity;
    for(const o of list){ if(!o.isTagger || o.dead) continue;
      const d=dist(f.x,f.y,o.x,o.y); if(d<bd){ bd=d; tg=o; } }
    if(tg && bd<300){                                 // лҸ„л§қ: мҲ лһҳ л°ҳлҢҖ л°©н–Ҙ
      const d=bd||1; mvx=(f.x-tg.x)/d; mvy=(f.y-tg.y)/d;
      // к·јмІҳ мҲҳн’Җ мң мқё(лҸ„мЈј лІЎн„°м—җ 35% лё”л Ңл“ң)
      let bb=null, bbd=Infinity;
      for(const b of BUSHES){ const bx=b.x+b.w/2, by=b.y+b.h/2, d2=dist(f.x,f.y,bx,by); if(d2<bbd){bbd=d2; bb={x:bx,y:by};} }
      if(bb && bbd<400){ const dl=bbd||1; mvx=mvx*0.65+((bb.x-f.x)/dl)*0.35; mvy=mvy*0.65+((bb.y-f.y)/dl)*0.35; }
      f.facing=Math.atan2(mvy,mvx);
    } else if(tg && inBush(f)){ mvx=0; mvy=0; }       // мҲ лһҳ л©Җкі  мҲҳн’Җ м•Ҳ вҶ’ мһ ліө(В§1.6)
    else {
      ai.wT=(ai.wT||0)-dt;
      if(ai.wT<=0){ ai.wA=Math.random()*Math.PI*2; ai.wT=rand(1.0,2.0); }
      mvx=Math.cos(ai.wA)*0.5; mvy=Math.sin(ai.wA)*0.5;
    }
  }
  const ml=Math.hypot(mvx,mvy);
  if(ml>0.01){
    if(ml>1){ mvx/=ml; mvy/=ml; }
    const step=effSpeed(f)*dt, ox=f.x, oy=f.y;
    moveEntity(f, mvx*step, mvy*step);
    if(Math.hypot(f.x-ox,f.y-oy) < step*0.3){         // лІҪ лҒјмһ„ вҶ’ мҲҳм§Ғ л°©н–Ҙ мҡ°нҡҢ
      ai.sT=(ai.sT||0)-dt;
      if(ai.sT<=0){ ai.sD=Math.random()<0.5?1:-1; ai.sT=0.5; }
      moveEntity(f, -mvy*ai.sD*step, mvx*ai.sD*step);
    }
  }
  // X н—Ҳмҡ© мәҗлҰӯ(мӢңкі лӢҲВ·лҲҲкҪғ)мқҖ мӣҗліё мҠӨнӮ¬, лӮҳлЁём§ҖлҠ” лӘЁл“ң м „мҡ© лҸ„кө¬(BIG-BATCH-2 P1)лҘј лҙҮлҸ„ лӮ®мқҖ нҷ•лҘ лЎң мӮ¬мҡ©
  if(f.char && f.specialCd<=0 && Math.random()<dt*0.25){
    if(TAG_X_ALLOW[f.char.id]) castSpecialFor(f, env);
    else castTagSpecial(f, list);
  }
}
function updateAI(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  // лӘЁм•„ нҢЁмӢңлёҢ(нҡҢліө мҳӨлқј)лҠ” мҠӨнӮ¬мқҙ м•„лӢҲлқј мғҒмӢң нҡЁкіј вҖ” м•„кө°В·м Ғ мәҗлҰӯн„° лҙҮ лӘЁл‘җ м Ғмҡ©(нҢҖ лӘЁл“ңмҷҖ лҸҷмқј).
  // (мҪ”л“ңк°җмӮ¬: кё°мЎҙм—” м Ғ лҙҮм—җл§Ң м Ғмҡ©лҗҳлҠ” л№„лҢҖм№ӯ + нғҖкІҹ м—Ҷмқ„ л•Ң лҜём Ғмҡ© л¬ём ң мҲҳм •)
  if(!f.isBoss && f.char) tickMoaPassive(f, dt, envLocal);
  if(isFrozen(f)){ return; }                 // л№ҷкІ°: мқҙлҸҷВ·кіөкІ© л¶Ҳк°Җ
  if(RULE && RULE.id==="tag"){ tagBotUpdate(f, dt); return; }   // GENRE-EXPAND-1 В§1.6: мҲ лһҳмһЎкё° м „мҡ© AI

  const ai=f.ai, isEnemy=(f.team==="enemy");
  const target=nearestTarget(f, isEnemy);
  if(!target){ regen(f,dt); return; }
  const d=dist(f.x,f.y,target.x,target.y);

  // н’ҖмҲІ мқҖмӢ : л©ҖлҰ¬(>270) л–Ём–ҙм§„ н’ҖмҲІ м•Ҳм—җ мһҲкі  мөңк·ј(1.2мҙҲ) кіөкІ©н•ҳм§Җ м•ҠмқҖ лҢҖмғҒмқҖ м¶”м Ғмһҗк°Җ мң„м№ҳлҘј мһғлҠ”лӢӨ(м•„кө°В·м Ғ кіөнҶө)
  const targetHidden = inBush(target) && d>270 && (matchElapsed-target.lastFireTime)>1.2;
  const wasKnown=ai.knowsTarget;
  if(!targetHidden){
    if(!wasKnown) ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.6,1.2);
    ai.knowsTarget=true; ai.lastKnownX=target.x; ai.lastKnownY=target.y;
  } else { ai.knowsTarget=false; }
  const tx=ai.knowsTarget?target.x:ai.lastKnownX;
  const ty=ai.knowsTarget?target.y:ai.lastKnownY;
  const tdx=tx-f.x, tdy=ty-f.y, td=Math.hypot(tdx,tdy)||1;

  // GAMEPLAY-1 Phase 3: лҙҮ лӘ©н‘ң м§Җн–Ҙ(к°ҖлІјмҡҙ v1) вҖ” мғҒлҢҖк°Җ л©Җл©ҙ кұ°м җ/лі„/мғҒлҢҖ нғ‘мңјлЎң н–Ҙн•ңлӢӨ
  let objTarget=null;
  if(RULE && !f.isPlayer && !f.isBoss){
    if(RULE.id==="hotzone"){
      if(dist(f.x,f.y,RULE.x,RULE.y)>RULE.radius*0.6 && d>240) objTarget={x:RULE.x, y:RULE.y, ideal:30};
    } else if(RULE.id==="stargrab" && RULE.stars.length && d>200){
      let bs=null, bd2=560;
      for(const s of RULE.stars){ const d2=dist(f.x,f.y,s.x,s.y); if(d2<bd2){ bd2=d2; bs=s; } }
      if(bs) objTarget={x:bs.x, y:bs.y, ideal:6};
    } else if(RULE.id==="siege"){   // мң кё°м„ұ: м•„кө° лҙҮлҸ„ мғҒлҢҖ нғ‘мқ„ м••л°•(мҳЁлқјмқё tBotUpdateмҷҖ лҸҷнҳ• вҖ” м Ғ лҙҮл§Ң л°ҖлҚҳ нҺён–Ҙ н•ҙмҶҢ)
      const tw = isEnemy ? RULE.towers.player : RULE.towers.enemy;
      if(tw && tw.hp>0 && d>MATCH.enemyRange*1.1) objTarget={x:tw.x+tw.w/2, y:tw.y+tw.h/2, ideal:170, siege:true};
    } else if(RULE.id==="paint" && d>260){
      // GENRE-EXPAND-1 В§2.7: мғҒлҢҖк°Җ л©Җл©ҙ 'лӮҙ мғүмқҙ м•„лӢҢ' к°ҖмһҘ к°Җк№Ңмҡҙ м№ёмңјлЎң мқҙлҸҷ+мӮ¬кІ©(нғ„мқҙ л°”лӢҘмқ„ м№ н•Ё)
      ai.paintT=(ai.paintT||0)-dt;
      if(ai.paintT<=0 || !ai.paintCell){
        ai.paintT=0.5;
        const my=(f.team==="player")?1:2; let best=null, bd3=Infinity;
        for(let r=0;r<RULE.rows;r++) for(let c=0;c<RULE.cols;c++){
          const i=r*RULE.cols+c;
          if(RULE.blocked[i] || RULE.grid[i]===my) continue;
          const cx=ARENA.x+c*STUDENT_CELL+STUDENT_CELL/2, cy=ARENA.y+r*STUDENT_CELL+STUDENT_CELL/2;
          const d3=dist2(f.x,f.y,cx,cy); if(d3<bd3){ bd3=d3; best={x:cx,y:cy}; }
        }
        ai.paintCell=best;
      }
      if(ai.paintCell) objTarget={x:ai.paintCell.x, y:ai.paintCell.y, ideal:140, siege:true};   // siege н”Ңлһҳк·ё = лӘ©н‘ң м§Җм җ мӮ¬кІ©
    }
  }

  let mvx=0,mvy=0;
  if(objTarget){
    const dox=objTarget.x-f.x, doy=objTarget.y-f.y, dol=Math.hypot(dox,doy)||1;
    if(dol>objTarget.ideal){ mvx=dox/dol; mvy=doy/dol; }
  }
  if(mvx===0 && mvy===0 && !isEnemy && player!==f){
    const dp=dist(f.x,f.y,player.x,player.y);
    if(dp>320){ mvx=(player.x-f.x)/dp; mvy=(player.y-f.y)/dp; }
  }
  if(mvx===0 && mvy===0 && !objTarget){   // лӘ©н‘ң м§Җн–Ҙ мӨ‘(лҸ„м°© нҸ¬н•Ё)м—җлҠ” кұ°лҰ¬ мң м§Җ лЎңм§Ғ мғқлһө вҖ” кұ°м җ м•Ҳм—җ лЁёл¬ҙлҰ„
    const ideal=GAME_CONFIG.idealDistance;
    const retreating = isEnemy && !f.isBoss && f.hp<=f.maxHp*0.3;
    if(retreating){ mvx=-tdx/td; mvy=-tdy/td; }
    else if(td>ideal+45){ mvx=tdx/td; mvy=tdy/td; }
    else if(td<ideal-45){ mvx=-tdx/td; mvy=-tdy/td; }
    else {
      ai.strafeTimer-=dt;
      if(ai.strafeTimer<=0){ ai.strafeDir=Math.random()<0.5?1:-1; ai.strafeTimer=rand(0.6,1.4); }
      mvx=-tdy/td*ai.strafeDir; mvy=tdx/td*ai.strafeDir;
    }
  }
  // лІҪ нҡҢн”ј(BOT-SLIDE-1): мҳЁлқјмқё tBotUpdateВ·PVEмҷҖ лҸҷмқјн•ң same-frame м ‘м„  мҠ¬лқјмқҙл“ң вҖ” лІҪм—җ лҲҢлҰ¬л©ҙ
  // к·ё н”„л Ҳмһ„м—җ мҰүмӢң Вұ90В° м ‘м„ мңјлЎң л№ м§җ(кё°мЎҙ 0.4мҙҲ нҸҙл§Ғ+69В° нҡҢм „мқҖ лІҪ м•һ м§„лҸҷВ·м •м§ҖлҘј мң л°ң).
  const mlen=Math.hypot(mvx,mvy);
  if(mlen>0){ mvx/=mlen; mvy/=mlen;
    if(ai.avoidTimer>0){ ai.avoidTimer-=dt; const t=mvx; mvx=-mvy*ai.avoidDir; mvy=t*ai.avoidDir; }   // м ‘м„  мҠ¬лқјмқҙл“ң
    const step=effSpeed(f)*dt, ox=f.x, oy=f.y;
    moveEntity(f, mvx*step, mvy*step);
    if(ai.avoidTimer<=0 && step>0.01 && Math.hypot(f.x-ox,f.y-oy) < step*0.3){ ai.avoidDir=Math.random()<0.5?1:-1; ai.avoidTimer=rand(0.4,0.8); }   // л§үнһҳ к°җм§ҖвҶ’м ‘м„  к°ңмӢң
  }

  ai.fireTimer-=dt; ai.reactionTimer-=dt;
  const range=isEnemy?MATCH.enemyRange:GAME_CONFIG.playerRange;
  let cooldown=isEnemy?MATCH.enemyAttackCooldown:GAME_CONFIG.playerAttackCooldown*1.5;
  cooldown*=atkSlowFactor(f);                                        // лҲҲкҪғ м„ңлҰ¬ мЎҙ: кіөкІ© к°„кІ© +40%
  const gA=growthOf(f,"aspd"); if(gA) cooldown*=Math.max(0.6,1-GROWTH.aspdPct*gA);   // м„ұмһҘ: кіөмҶҚ
  const aimErr=isEnemy?MATCH.enemyAimError:0.1;
  if(ai.knowsTarget && d<range && ai.fireTimer<=0 && ai.reactionTimer<=0 &&
     hasLineOfSight(f.x,f.y,target.x,target.y) && canBeHit(target)){
    const baseA=Math.atan2(target.y-f.y,target.x-f.x)+rand(-1,1)*aimErr;
    fireAiShot(f, baseA);
    ai.fireTimer=cooldown*rand(0.85,1.25);
    ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.7,1.3);
  }
  // GAMEPLAY-1 siege: мғҒлҢҖк°Җ м—Ҷмңјл©ҙ м Ғ лҙҮмқҙ н”Ңл Ҳмқҙм–ҙ нғ‘мқ„ мӮ¬кІ©(нғ„мқҙ кө¬мЎ°л¬ј м¶©лҸҢлЎң н”јн•ҙ)
  if(objTarget && objTarget.siege && ai.fireTimer<=0){
    const dtw=Math.hypot(objTarget.x-f.x, objTarget.y-f.y);
    if(dtw<range){ fireAiShot(f, Math.atan2(objTarget.y-f.y, objTarget.x-f.x)); ai.fireTimer=cooldown*rand(0.9,1.25); }
  }
  // v1.27 мәҗлҰӯн„° лҙҮ X/C(л№ лҘёлҢҖм „ м Ғ м „мҡ© вҖ” tBotUpdate лЎңм§Ғ мқҙмӢқ, лӮңмқҙлҸ„ нҢҢлқјлҜён„°лЎң л№ҲлҸ„ мЎ°м Ҳ).
  // м•„кө° лҙҮВ·ліҙмҠӨлҠ” кё°мЎҙ к·ёлҢҖлЎң(мҠӨнӮ¬ м—ҶмқҢ). мӢңм „ м „ нғҖкІҹмқ„ л°”лқјліҙкІҢ н•ҙ л°©н–Ҙм„ұ мҠӨнӮ¬мқҙ мң нҡЁн•ҳкІҢ.
  if(!f.isBoss && f.char){   // мң кё°м„ұ: м•„кө° лҙҮлҸ„ X/CВ·к¶Ғ мӮ¬мҡ©(м Ғ лҙҮл§Ң м“°лҚҳ кІғ вҶ’ мҳЁлқјмқё tBotUpdateмҷҖ лҸҷнҳ•). updateAIлҠ” лҙҮ м „мҡ©мқҙлқј мӮ¬лһҢмқҖ лҜёнҸ¬н•Ё
    tickThornTrail(f);                          // мӢңкі лӢҲ X: мқҙлҸҷ кІҪлЎң к°ҖмӢң(мӢңм „н•ң лҙҮл§Ң мң нҡЁ)
    f.superGauge=Math.min(GAME_CONFIG.superCharge, (f.superGauge||0)+MATCH.botUltChargeRate*dt);
    if(ai.knowsTarget && canBeHit(target) && hasLineOfSight(f.x,f.y,target.x,target.y)){
      const wRange=GAME_CONFIG.playerRange*getWeapon(f.weaponId).rangeMul;
      if(f.specialCd<=0 && d<Math.max(wRange,260) && Math.random()<dt*MATCH.botSpecialProb){
        f.facing=Math.atan2(target.y-f.y,target.x-f.x);
        castSpecialFor(f, envLocal());
      }
      if((f.superGauge||0)>=GAME_CONFIG.superCharge && d<wRange && Math.random()<dt*MATCH.botUltProb){
        f.facing=Math.atan2(target.y-f.y,target.x-f.x);
        castUltimateFor(f, envLocal(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
      }
    }
  }
  regen(f, dt);
}

function regen(f, dt){
  if(f.dead) return;
  if(matchElapsed-f.lastCombatTime>=GAME_CONFIG.regenStartTime && f.hp<f.maxHp){
    f.hp=Math.min(f.maxHp, f.hp+GAME_CONFIG.regenRate*dt);
  }
}

/* л¶Җл©”лһ‘ мЎ°н–Ҙ(кіөнҶө): лӮҳк°Ҳ л•Ң мӮ¬кұ°лҰ¬/лІҪм—җм„ң ліөк·Җ м „нҷҳ, ліөк·Җ мӨ‘м—” мЈјмқё нҳ„мһ¬ мң„м№ҳлЎң мң лҸ„.
   ліөк·Җ мӨ‘м—” лІҪмқ„ л„ҳм–ҙ лҸҢм•„мҳЁлӢӨ(лІҪм—җ л§үнҳҖ л¬ҙн•ң м§„лҸҷн•ҳм§Җ м•ҠкІҢ вҖ” мқјкҙҖ к·ңм№ҷ).
   л°ҳнҷҳк°’ false = мЈјмқём—җкІҢ лҸ„м°©(мҶҢл©ё). */
function steerBoomerang(b, ox, oy){
  if(b.phase==="out" && b.traveled>=b.maxRange) b.phase="back";
  if(b.phase==="back"){
    const dx=ox-b.x, dy=oy-b.y, d=Math.hypot(dx,dy)||1;
    if(d<26) return false;
    b.vx=dx/d*b.spd; b.vy=dy/d*b.spd;
  }
  return true;
}
// м ҒмӨ‘ нҡЁкіј(л¬ҙкё°лі„ effect_hit мҠӨн”„лқјмқҙнҠё, м—Ҷмңјл©ҙ кё°мЎҙ мӣҗнҳ• л°ҳм§қмһ„ fallback)
function _sfxHitHook(){ playSfx("hit"); }   /* E14 */
function spawnHitFx(x,y,wid,color){ _sfxHitHook();
  if(wid && ASSETS_ENABLED && getWeaponImage(getWeapon(wid).assetId||wid,"effect_hit")){
    effects.push({kind:"hitfx", x:x, y:y, wid:wid, t:0, life:0.25});
  } else spawnHit(x,y,color);
}

function updateBullets(dt){
  for(const b of bullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }          // м•Ҳм „мһҘм№ҳ(л¶Җл©”лһ‘ л“ұ мһ”лҘҳ л°©м§Җ) вҖ” b.lifeлҠ” лӢӨлҘё 3к°ң нғ„нҷҳ лЈЁн”„мҷҖ лҸҷмқј мІҳлҰ¬
    if(b.boomerang){
      const o=b.ownerRef;
      const ox=o&&!o.dead?o.x:b.x, oy=o&&!o.dead?o.y:b.y;
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, ox, oy)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1, Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, stepLen=Math.hypot(sx,sy);
    const list=targetsOf(b.team);   // м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): м„ңлёҢмҠӨн…қ лЈЁн”„ л°–мңјлЎң вҖ” нҢҖмқҖ л№„н–ү мӨ‘ м•Ҳ л°”лҖҢлҠ”лҚ° мҠӨн…қл§ҲлӢӨ л°°м—ҙмқ„ мғҲлЎң л§Ңл“Өм—ҲмқҢ
    const _pByMe = !!(player && b.ownerId===player.id);                     // GENRE-EXPAND-1 В§2
    const _pStamp = (b.wid==="tool_06") ? "3x3" : "cross";                  // лі„кіЁл ҳ = м°©нғ„ лҢҖнҳ• мҠӨнғ¬н”„
    for(let s=0;s<steps && b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=stepLen;
      if(RULE && RULE.id==="paint") paintCellBy(b.x, b.y, b.team, _pByMe);  // нғ„ л№„н–ү кІҪлЎң 1м№ём”© м№ 
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){                                   // нҶөнҶөл№„н–үкё°: кІҪкё°мһҘ к°ҖмһҘмһҗлҰ¬м—җм„ңлҸ„ л°ҳмӮ¬
          if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age||0;
          spawnHit(b.x,b.y,b.color); break;
        }
        b.alive=false; break;
      }
      // лІҪ: л¶Җл©”лһ‘мқҖ лӮҳк°Ҳ л•Ң ліөк·Җ м „нҷҳ, ліөк·Җ мӨ‘м—” нҶөкіј. нҶөнҶөл№„н–үкё°(bounce)лҠ” л°ҳмӮ¬. мқјл°ҳнғ„мқҖ мҶҢл©ё.
      let hitWall=false, wallRef=null;
      for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ hitWall=true; wallRef=o; break; } }
      if(hitWall){
        // GAMEPLAY-1 siege: к·ңм№ҷ кө¬мЎ°л¬ј(нғ‘В·лІҪ)мқҖ мғҒлҢҖ нҢҖ нғ„м—җ HP н”јн•ҙ(ліөк·Җ мӨ‘ л¶Җл©”лһ‘мқҖ лІҪ нҶөкіјлқј м ңмҷё)
        if(wallRef.structure && wallRef.hp>0 && wallRef.team!==b.team && !(b.boomerang&&b.phase==="back"))
          damageRuleStructure(wallRef, b.damage);
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; break; } }
        else if(b.bounce){ if(!bounceBullet(b, wallRef, sx, sy)){ b.alive=false; } break; }
        else {
          if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,_pStamp);   // м°©нғ„ мҠӨн”ҢлһҳмӢң(В§2.3)
          spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
        }
      }
      for(const t of list){
        if(canBeHit(t) && dist2(b.x,b.y,t.x,t.y)<(b.r+t.r)*(b.r+t.r)){   // м„ұлҠҘ: м ңкіұкұ°лҰ¬ л№„көҗ(Math.hypot м ңкұ°)
          if(b.boomerang){
            const hm=(b.phase==="out")?b.hitO:b.hitB;
            if(hm[t.id]) continue;                              // к°ҷмқҖ м Ғ: л°©н–Ҙлі„ 1нҡҢл§Ң
            hm[t.id]=true;
            const applied=applyDamage(t, bulletHitDamage(b,t), b.team, b.ownerId, b.x, b.y);
            if(applied>0){
              if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
              if(b.countsForPlayer){ stats.shotsHit++;
                tryChargeGauge(b.aid, t.id, ()=>{ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+GAME_CONFIG.superChargePerHit); }); }
              spawnHitFx(b.x,b.y,b.wid,b.color);
            }
            continue;                                           // л¶Җл©”лһ‘мқҖ м Ғмқ„ кҙҖнҶө(ліөк·Җ нғҖкІ©мқ„ мң„н•ҙ мң м§Җ)
          }
          if(b.ultCid && !canUltDamage(b.ultCid, t.id, b.ultMaxHits||4)){ b.alive=false; break; }  // лҹӯнӮӨ C: к°ҷмқҖ лҢҖмғҒ мөңлҢҖ н”јн•ҙ 40 мғҒн•ң
          const applied=applyDamage(t, bulletHitDamage(b,t), b.team, b.ownerId, b.x, b.y);
          if(applied>0 && b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
          if(applied>0 && b.countsForPlayer){
            stats.shotsHit++;
            tryChargeGauge(b.aid, t.id, ()=>{ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+GAME_CONFIG.superChargePerHit); });
          }
          if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,"3x3");   // м Ғ лӘ…мӨ‘ 3Г—3(В§2.3)
          spawnHitFx(b.x,b.y,b.wid,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){
        if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,_pStamp);   // мӮ¬кұ°лҰ¬ лҒқ мҶҢл©ёлҸ„ м°©нғ„ м·Ёкёү(В§2.3)
        b.alive=false; break;
      }
    }
  }
  bullets=bullets.filter(b=>b.alive);
}
// нҶөнҶө кұ°лҢҖ л№„н–үкё°(лӢ¬мқҙ C): лІҪ/мҷёкіҪ л°ҳмӮ¬. к°ҷмқҖ лІҪ 0.12мҙҲ лӮҙ мһ¬л°ҳмӮ¬ кёҲм§Җ. л°ҳмӮ¬ 6нҡҢ/6мҙҲ мҙҲкіј мӢң мҶҢл©ё.
function bounceBullet(b, wall, sx, sy){
  b.x-=sx; b.y-=sy;                                             // лІҪ м•Ҳм—җм„ң л№јлӮҙкё°
  const now=b.age||0;
  if(b.lastWall===wall && now-(b.lastBounceAt||-1)<0.12) return true;  // к°ҷмқҖ лІҪ мһ¬л°ҳмӮ¬ кёҲм§Җ(лӘЁм„ңлҰ¬ л–ЁлҰј л°©м§Җ)
  if((b.bounces||0)>=b.maxBounce) return false;
  // м–ҙлҠҗ м¶•мңјлЎң л°ҳмӮ¬н• м§Җ: лІҪ мӮ¬к°Ғнҳ• кё°мӨҖ м№ЁнҲ¬ л°©н–Ҙ нҢҗлӢЁ
  if(wall){
    const cx=clamp(b.x, wall.x, wall.x+wall.w), cy=clamp(b.y, wall.y, wall.y+wall.h);
    if(Math.abs(b.x-cx)>Math.abs(b.y-cy)) b.vx=-b.vx; else b.vy=-b.vy;
  } else { b.vx=-b.vx; }
  b.bounces=(b.bounces||0)+1; b.lastWall=wall; b.lastBounceAt=now;
  spawnHit(b.x,b.y,b.color);
  return true;
}

function updateEffects(dt){
  for(const e of effects){ e.t+=dt; if(e.vx!==undefined){ e.x+=e.vx*dt; e.y+=e.vy*dt; } }
  effects=effects.filter(e=>e.t<e.life);
  for(const n of damageNumbers){ n.t+=dt; n.y+=n.vy*dt; }
  damageNumbers=damageNumbers.filter(n=>n.t<n.life);
}

function update(dt){
  uiTime+=dt;
  if(toastTimer>0) toastTimer-=dt;
  if(gameState===STATE.SPLASH){ splashTimer+=dt; if(splashTimer>1.4) goToLogin(); return; }  // нғҖмқҙнӢҖ 1.4мҙҲ нӣ„ лЎңк·ёмқё
  if(confirmLeave) return;   // лӮҳк°Җкё° нҷ•мқё мӨ‘м—җлҠ” кІҢмһ„ м§„н–ү л©Ҳм¶Ө(мһ…л Ҙмқҙ л°‘м—җм„ң кі„мҶҚ лЁ№м§Җ м•ҠлҸ„лЎқ)
  if(gameState===STATE.ONLINE_PLAYING){ updateOnline(dt); return; }
  if(gameState===STATE.PLATFORMER){ pfUpdate(dt); return; }   // GENRE-EXPAND-1 В§3: лі„лҸ„ лЈЁн”„(мӨ‘л Ҙмқҙ нғ‘лӢӨмҡҙм—җ м•Ҳ мғҳ)
  if(gameState===STATE.RPG){ rpgUpdate(dt); return; }         // RPGлӘЁл“ң В§1.1: лі„лҸ„ лЈЁн”„(м•„л ҲлӮҳ м „м—ӯ л№„м ‘мҙү)
  if(gameState!==STATE.PLAYING) return;
  matchElapsed+=dt;
  for(const f of allFighters()){ f.displayHp=lerp(f.displayHp, f.hp, Math.min(1,dt*8)); tickStatus(f,dt); applyTrapTo(f); }   // н•Ём •/мғҒнғң(л‘”нҷ”В·лІ„н”„) вҖ” м„ұлҠҘ(мҪ”л“ңк°җмӮ¬): л‘җ лЈЁн”„ лі‘н•©(allFighters л°°м—ҙ мғқм„ұ 1нҡҢ)
  updatePlayer(dt);
  for(const a of allies) updateAI(a, dt);
  for(const e of enemies) updateAI(e, dt);
  updateBullets(dt);
  tickSkillZones(dt, envLocal());                                     // X/C мһҘнҢҗ(лі„лҳҘлі„В·к°ҖмӢңВ·м–јмқҢВ·кө¬кёүмғҒмһҗВ·лё”лһҷнҷҖ)
  if(!(RULE&&RULE.id==="tag")) tickPowerupsHost(dt, [player]);        // м•„мқҙн…ң: лЎңм»¬мқҖ н”Ңл Ҳмқҙм–ҙл§Ң В· мҲ лһҳлҠ” м „нҲ¬ м•„мқҙн…ң м—ҶмқҢ(мҳЁлқјмқёкіј мқјм№ҳ)
  if(RULE) tickRule(dt);                                              // GAMEPLAY-1 Phase 3: нҸ¬нғ‘/кұ°м җ/лі„ м§„н–ү + мҰүмӢң мҠ№лҰ¬
  if(matchRuleId()==="tdm") tickBuffOrbs();                           // GAMEPLAY-1 1D: м„ұмһҘ мҳӨлёҢ н”Ҫм—…(м„¬л©ём „)
  updateEffects(dt);
  const _tl=matchTimeLimit();
  if(gameState===STATE.PLAYING && matchElapsed>=_tl){ matchElapsed=_tl; ruleTimeUp(); }   // к·ңм№ҷлі„ мӢңк°„ мў…лЈҢ нҢҗм •(tdmмқҖ м җмҲҳ л№„көҗ)
}

function calculateMatchReward(){
  let gold=0, result;
  if(RULE && RULE.winner) result = (RULE.winner==="player")?"win":((RULE.winner==="enemy")?"lose":"draw");   // мҳӨлёҢм қнҠё лӘЁл“ң: к·ңм№ҷ мҠ№мһҗ кё°мӨҖ
  else if(playerTeamScore>enemyTeamScore) result="win";
  else if(playerTeamScore<enemyTeamScore) result="lose";
  else result="draw";
  if(result==="win") gold+=REWARD_CONFIG.win;
  else if(result==="draw") gold+=REWARD_CONFIG.draw;
  else gold+=REWARD_CONFIG.lose;
  gold+=stats.kills*REWARD_CONFIG.perKill;
  if(stats.bossKilled) gold+=REWARD_CONFIG.boss;
  if(result==="win" && selectedDifficultyId==="hard") gold+=REWARD_CONFIG.hardWinBonus;
  if(result==="win" && selectedModeId==="trio") gold+=REWARD_CONFIG.mode3v3WinBonus;
  return { gold:gold, result:result };
}
// BIG-BATCH-1 E16: л ҲлІЁ н•„мҡ” кІҪн—ҳм№ҳ(Lv1вҶ’2: 80, л ҲлІЁлӢ№ +40) вҖ” мӢңмһ‘к°’В·нҠңлӢқ лҢҖмғҒ
function expNeed(level){ return 80 + (Math.max(1,level)-1)*40; }
function addExp(n){
  profile.exp=(profile.exp||0)+n; profile.level=profile.level||1;
  let ups=0;
  while(profile.exp>=expNeed(profile.level)){ profile.exp-=expNeed(profile.level); profile.level++; ups++; }
  if(ups>0) showToast("рҹҺү л ҲлІЁ м—…! Lv."+profile.level);
}
function grantMatchReward(){
  if(matchRewardGiven) return;
  if(edTest){ matchRewardGiven=true; matchGoldEarned=0; matchExpEarned=0; matchDropName=""; return; }   // EDIT-TEST-1: лҜёлҰ¬н•ҳкё°лҠ” ліҙмғҒВ·кё°лЎқ м—ҶмқҢ
  matchRewardGiven=true;
  const r=calculateMatchReward();
  // BIG-BATCH-1 E17: л°©м№ҳ л°©м§Җ вҖ” мқҙлІҲ нҢҗ кё°м—¬(л”ңВ·нӮ¬В·ліҙмҠӨ)к°Җ 0мқҙл©ҙ ліҙмғҒ 30%(м•„кө° лҙҮ мәҗлҰ¬лЎң кіЁл“ң мҲҳкёүлҗҳлҚҳ кө¬л©Қ)
  matchIdle = (stats.damageDealt<=0 && stats.kills<=0 && !stats.bossKilled);
  // GENRE-EXPAND-1 В§4.1: лӘЁл“ңлі„ кё°м—¬ м§Җн‘ң вҖ” мҲ лһҳ=мғқмЎҙ 15мҙҲ+ лҳҗлҠ” к°җм—ј 1+ В· м№ н•ҳкё°=м№  1м№ё+
  if(RULE && RULE.id==="tag") matchIdle = !(RULE.myInfections>0 || RULE.mySurvival>=15);
  if(RULE && RULE.id==="paint") matchIdle = !(RULE.myPaint>0);
  playSfx(r.result==="win"?"win":"lose");   // E14 нӣ…
  matchGoldEarned = matchIdle ? Math.round(r.gold*REWARD_CONFIG.idleMul) : r.gold;
  addGold(matchGoldEarned);
  // BIG-BATCH-1 E16: кІҪн—ҳм№ҳ вҖ” кІ°кіј + мІҳм№ҳ + ліҙмҠӨ(л°©м№ҳ л°°мңЁ лҸҷмқј м Ғмҡ©)
  let exp=(r.result==="win"?EXP_CONFIG.win:(r.result==="draw"?EXP_CONFIG.draw:EXP_CONFIG.lose))
        + stats.kills*EXP_CONFIG.perKill + (stats.bossKilled?EXP_CONFIG.boss:0);
  matchExpEarned = matchIdle ? Math.round(exp*REWARD_CONFIG.idleMul) : exp;
  addExp(matchExpEarned);
  profile.totalPlays+=1;
  profile.totalKills+=stats.kills;
  if(stats.bossKilled) profile.bossKills+=1;
  if(r.result==="win") profile.wins+=1;
  else if(r.result==="lose") profile.losses+=1;
  else profile.draws+=1;

  matchDropName="";
  // л¬ҙкё° л“ңлһҚ: н•ҷмғқ 6мў… кі м • мІҙм ңм—җм„ңлҠ” н•ҙкёҲ к°ңл…җмқҙ м—Ҷм–ҙ мһ кёҲ(мғҒм җ мһ¬к°ңнҺё л•Ң н•Ёк»ҳ ліөкө¬)
  const locked = SHOP_ENABLED ? WEAPONS.filter(w=>profile.unlockedWeapons.indexOf(w.id)<0) : [];
  if((r.result==="win"||stats.bossKilled) && locked.length>0 && Math.random()<REWARD_CONFIG.weaponDropChance){
    const drop=locked[Math.floor(Math.random()*locked.length)];
    unlockWeapon(drop.id); matchDropName=drop.name;
  }
  saveProfile();
}

function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawStar(cx,cy,spikes,outerR,innerR,color){
  ctx.fillStyle=color; ctx.beginPath();
  let rot=-Math.PI/2; const step=Math.PI/spikes;
  ctx.moveTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
  for(let i=0;i<spikes;i++){ rot+=step; ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step; ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); }
  ctx.closePath(); ctx.fill();
}
function hexA(hex,a){
  if(!hex || hex[0]!=="#" || hex.length<7) return "rgba(255,255,255,"+a+")";
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}
