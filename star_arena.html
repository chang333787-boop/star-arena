}
function rpgUseObject(o){
  if(o.type==="bed") return rpgSleep();
  if(o.type==="board"){   // 게시판: 오늘의 부탁(POLISH-2 §3) / 별의 도감(§8.1)
    if(!rpgDailyEnsure()){ RPG.ui="codex"; RPG.codex={ tab:0 }; return; }
    rpgOpenDialog(null, ["게시판에 오늘의 부탁이 붙어 있다."],
      { choice:{ opts:["📋 오늘의 부탁","📖 별의 도감"], cb:function(i){
        if(i===0){ RPG.ui="daily"; RPG.dailyUi={ idx:0 }; } else { RPG.ui="codex"; RPG.codex={ tab:0 }; }
      } } });
    return;
  }
  if(o.type==="chest"&&o.loot) return rpgChestOpen(o);
  if((o.type==="well"||o.type==="camp")&&rpgWellUse()) return;
  const flavor={ chest:"상자 속은 아직 비어 있다. 뭘 넣어둘까?",
    board:"게시판: 마을의 부탁이 여기 붙는다.",
    cellar:"잠긴 지하실 문… 안에서 희미하게 반짝인다.",
    vein:"별광맥이 힘없이 깜빡인다. 별빛이 흐려지고 있다…",
    well:"우물 아래에서 누군가 노래하는 소리가 들린다…",
    stove:"화덕이다. 요리는 다음에 배워 보자.",
    anvil:"볼트의 모루다. 반짝 도구를 만들 수 있을 것 같다.",
    camp:"먹구름단의 야영지 흔적… 아직 온기가 남아 있다.",
    egg:"거대한 알이 희미하게 두근거린다…" };
  rpgOpenDialog(null, [flavor[o.type]||"반짝반짝…"]);
}

/* ── 대화(§5.6: 하단 박스·타자 효과·선택지 최대 2) ── */
function rpgOpenDialog(npcId, lines, opts){
  opts=opts||{};
  const flat=[]; for(const ln of (lines||[])){ if(ln) flat.push(""+ln); }
  if(!flat.length) flat.push("…");
  RPG.ui="dialog"; RPG.p.moving=false;
  RPG.dialog={ npcId:npcId, lines:flat, idx:0, chars:0, choice:null, pendChoice:opts.choice||null, onDone:opts.onDone||null };
}
function rpgDialogAdvance(){
  const d=RPG.dialog; if(!d||d.choice) return;
  const cur=d.lines[d.idx]||"";
  if(d.chars<cur.length){ d.chars=cur.length; return; }   // 1차 입력=전체 표시
  if(d.idx<d.lines.length-1){ d.idx++; d.chars=0; return; }
  if(d.pendChoice) return;   // 선택지 등장 대기(update가 전환)
  const done=d.onDone; RPG.dialog=null; RPG.ui="field";
  if(done) done();
}
function rpgChoicePick(){
  const d=RPG.dialog; if(!d||!d.choice) return;
  const c=d.choice, pick=c.idx;
  RPG.dialog=null; RPG.ui="field";
  if(c.cb) c.cb(pick);
}
function rpgTalkTo(npcId){
  const npc=rpgFind("npcs",npcId); if(!npc) return;
  const sv=RPG.save, dl=(rpgDb().dialogs.npcs||{})[npcId]||{}, qd=rpgDb().dialogs.quests||{};
  if(npcId==="npc_meonbyeol"&&sv.flags.dusk){   // POLISH-2 §2: 해질녘의 우물가 — 먼별 재료 교환
    rpgOpenDialog(npcId, ["후후… 해질녘의 우물가는 처음이지?","좋은 것을 가졌다면, 바꿔 주지."],
      { choice:{ opts:["✨ 가루 5개 → 🍬 사탕 3개","🪶 깃털 3개 → 💰 100G"], cb:function(i){
        if(i===0){
          if(rpgInvCount("it_stardust_powder")<5){ showToast("별조각 가루가 부족해요 (5개)"); return; }
          rpgInvRemove("it_stardust_powder",5); rpgInvAdd("it_jelly_candy",3);
          showToast("🍬 교환 완료! 사탕 +3"); playSfx("pick"); rpgPersist();
        } else {
          if(rpgInvCount("it_moon_feather")<3){ showToast("달빛 깃털이 부족해요 (3개)"); return; }
          rpgInvRemove("it_moon_feather",3); rpgAddGold(100);
          showToast("💰 교환 완료! +100G"); playSfx("pick"); rpgPersist();
        }
      } } });
    return;
  }
  // 1) talk 목표 즉시 달성(mq01 등)
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="talk"&&q.goal.target===npcId&&sv.quests.active[qid]<1) sv.quests.active[qid]=1;
  }
  // 2) 납품(deliver): 이 NPC가 받는 사람이고 물건이 충분하면 → 완료
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="deliver"&&q.goal.to===npcId&&rpgQuestFulfilled(q)){
      const lines=(qd[qid]&&qd[qid].end&&qd[qid].end.length)?qd[qid].end:["고마워! 딱 필요했어."];
      rpgOpenDialog(npcId, lines, { onDone:function(){ rpgQuestComplete(q); } });
      return;
    }
  }
  // 3) 완료 보고: giver에게 — giver 없는 자동 퀘스트(mq01)는 talk 대상에게 즉시 완료
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&(q.giver===npcId||(!q.giver&&q.goal.type==="talk"&&q.goal.target===npcId))&&q.goal.type!=="deliver"&&rpgQuestFulfilled(q)){
      const lines=(qd[qid]&&qd[qid].end&&qd[qid].end.length)?qd[qid].end:["해냈구나! 정말 고마워."];
      rpgOpenDialog(npcId, lines, { onDone:function(){ rpgQuestComplete(q); } });
      return;
    }
  }
  // 4) 온별 전직 마일스톤(§4.6): Lv5 견습생은 길을 고르는 것이 다음 진행 — 새 퀘스트보다 우선
  if(npcId==="npc_onbyeol"&&sv.flags.job_change&&sv.level>=5&&sv.jobId==="job_novice"&&!sv.flags.trialJob){
    rpgOpenDialog(npcId, ["별빛이 너를 부르는구나. 길을 고를 시간이야.","가까이서 세게? 멀리서 영리하게?"],
      { choice:{ opts:["⚔️ 별빛 검사의 길","🏹 바람 사냥꾼의 길"], cb:function(i){
        const j=rpgFind("jobs", i===0?"job_swordsman":"job_hunter"); if(!j) return;
        sv.flags.trialJob=j.id; sv.flags.trialN=0;
        showToast("📜 전직 시험: "+rpgNameOf2(j.trial.target)+" "+j.trial.count+"마리! (실패 없음·몇 번이든)");
        rpgPersist();
      } } });
    return;
  }
  // 5) 새 부탁 수락
  const avail=rpgQuestAvailFor(npcId);
  if(avail){   // POLISH-2 §5: 수락 카드 — 할 일·보상 사전 노출(수락 후 추가 대화 제거)
    const st=(qd[avail.id]&&qd[avail.id].start&&qd[avail.id].start.length)?qd[avail.id].start:["부탁이 하나 있는데… 들어줄래?"];
    const rw=[];
    if(avail.reward){
      if(avail.reward.exp) rw.push("+"+avail.reward.exp+" EXP");
      if(avail.reward.gold) rw.push("+"+avail.reward.gold+"G");
      if(avail.reward.itemId) rw.push(rpgNameOf(avail.reward.itemId)+((avail.reward.itemCount||1)>1?" ×"+avail.reward.itemCount:""));
    }
    rpgOpenDialog(npcId, st.concat(["📜 "+avail.name+" — "+rpgQuestTodo(avail)+(rw.length?("  🎁 보상: "+rw.join(" · ")):"")]),
      { choice:{ opts:["좋아, 할게! 📜","조금 이따가"], cb:function(i){ if(i===0) rpgQuestAccept(avail); } } });
    return;
  }
  // 6) 온별 선택 서비스: 밭 확장·전직 되돌리기(§5.5·§4.6 — 진행할 퀘스트가 없을 때)
  if(npcId==="npc_onbyeol"){
    if(sv.flags.farm_expand&&!sv.flags.farmBig){
      rpgOpenDialog(npcId, ["밭이 좁아 보이는구나.","마을 빈 땅을 내어 주마. 200G면 된단다."],
        { choice:{ opts:["🌾 밭 확장! (200G)","아직 괜찮아요"], cb:function(i){
          if(i!==0) return;
          if(sv.gold<200){ showToast("골드가 부족해요 (200G)"); return; }
          rpgAddGold(-200); sv.flags.farmBig=1; RPG._soilCache=null;
          showToast("🌾 밭이 8×5(40칸)로 넓어졌다!"); playSfx("clear"); rpgPersist();
        } } });
      return;
    }
    const _DON=[{cost:500,name:"꽃밭",icon:"🌸"},{cost:1000,name:"별 깃발",icon:"🚩"},{cost:2000,name:"별빛 등불",icon:"🏮"}];
    const _dn=sv.flags.donate||0;
    if(sv.flags.chapter1_clear&&_dn<3){   // POLISH-3: 마을 꾸미기 기부(클리어 후 골드 싱크)
      const d=_DON[_dn];
      rpgOpenDialog(npcId, ["마을을 더 아름답게 만들어 볼까?","다음 단계: "+d.icon+" "+d.name+" ("+d.cost+"G)"],
        { choice:{ opts:[d.icon+" 기부하기 ("+d.cost+"G)","다음에 할게요"], cb:function(i){
          if(i!==0) return;
          if(sv.gold<d.cost){ showToast("골드가 부족해요 ("+d.cost+"G)"); return; }
          rpgAddGold(-d.cost); sv.flags.donate=_dn+1;
          RPG.layer=null; RPG.layerMapId=null;   // 장식 재베이크
          rpgBanner("🏘️ 마을 꾸미기 "+(_dn+1)+"단계: "+d.icon+" "+d.name+" 완성!");
          playSfx("clear"); rpgPersist();
        } } });
      return;
    }
    if(sv.jobId!=="job_novice"){
      const lines0=(dl.default&&dl.default.length)?dl.default:["허허, 오늘도 반짝이는구나."];
      rpgOpenDialog(npcId, lines0, { choice:{ opts:["🔄 견습생으로 (20G)","그냥 이야기했어요"], cb:function(i){
        if(i!==0) return;
        if(sv.gold<20){ showToast("골드가 부족해요 (20G)"); return; }
        rpgAddGold(-20);
        const j=rpgFind("jobs",sv.jobId);
        if(j) for(const skid of (j.grantSkills||[])){ const k=sv.skills.indexOf(skid); if(k>=0) sv.skills.splice(k,1); if(sv.skillX===skid) sv.skillX="sk_spin_slash"; }
        sv.jobId="job_novice"; sv.hp=Math.min(sv.hp,rpgMaxHpFor(sv));
        showToast("🔄 견습생으로 돌아왔다 (언제든 다시 전직!)"); rpgPersist();
      } } });
      return;
    }
  }
  // 7) 진행 힌트(활성 퀘스트 대사) > 기본 대사 (+상점 — 대장간은 mq04 후 개방 §2)
  let lines=null;
  for(const qid in sv.quests.active){ if(dl.questActive&&dl.questActive[qid]&&dl.questActive[qid].length){ lines=dl.questActive[qid]; break; } }
  if(!lines) lines=(dl.default&&dl.default.length)?dl.default:((npc.dialog&&npc.dialog.length)?npc.dialog:["안녕, 시고니!"]);
  const shopOk=npc.shop&&npc.shop.length&&(npcId!=="npc_bolt"||sv.flags.smith_open);
  if(shopOk)
    rpgOpenDialog(npcId, lines, { choice:{ opts:["🛒 가게 보기","다음에 올게"], cb:function(i){ if(i===0) rpgOpenShop(npcId); } } });
  else rpgOpenDialog(npcId, lines);
}
function rpgNameOf2(id){ const m=rpgFind("monsters",id); return m?m.name:rpgNameOf(id); }

/* ── 인벤토리(스택) ── */
function rpgInvCap(id){ if(id!=="it_jelly_candy") return 99;   // POLISH-1: 사탕 상한(추가 획득만 캡·기보유 몰수 없음)
  return (RPG&&RPG.save.flags.candyPouch)?8:RPG_CONST.CANDY_MAX; }   // POLISH-2: 사탕 주머니 5→8
function rpgInvAdd(id,qty){ qty=qty||1; const inv=RPG.save.inventory, cap=rpgInvCap(id);
  for(const s of inv){ if(s.id===id){ s.qty=Math.min(Math.max(cap,s.qty), s.qty+qty); return; } }
  inv.push({id:id,qty:Math.min(cap,qty)}); }
function rpgInvCount(id){ for(const s of RPG.save.inventory) if(s.id===id) return s.qty; return 0; }
function rpgInvRemove(id,qty){ const inv=RPG.save.inventory; for(let i=0;i<inv.length;i++){ if(inv[i].id===id){ inv[i].qty-=qty; if(inv[i].qty<=0) inv.splice(i,1); return true; } } return false; }
function rpgUseCandy(){
  if((RPG.p.candyCd||0)>0){ showToast("🍬 사탕은 잠깐 쉬었다 먹자 ("+RPG.p.candyCd.toFixed(1)+"s)"); return; }   // POLISH-1: 사용 쿨 2s
  if(rpgInvCount("it_jelly_candy")<1){ showToast("젤리 사탕이 없어요 (잡화점 15G)"); return; }
  const mh=rpgMaxHpFor(RPG.save);
  if(RPG.save.hp>=mh){ showToast("체력이 가득해요"); return; }
  rpgInvRemove("it_jelly_candy",1); RPG.save.hp=Math.min(mh, RPG.save.hp+RPG_CONST.CANDY_HEAL);
  RPG.p.candyCd=RPG_CONST.CANDY_CD;
  playSfx("pick"); showToast("🍬 냠! 체력 +"+RPG_CONST.CANDY_HEAL);
}

/* ── 상점(§5.6: 사기/팔기 탭·씨앗 5개 묶음·작물 전부 팔기) ── */
function rpgOpenShop(npcId){ RPG.ui="shop"; RPG.shop={ npcId:npcId, tab:"buy", idx:0, scroll:0 }; }
function rpgShopStock(npc){
  const out=[], sv=RPG.save;
  for(const s of (npc&&npc.shop||[])){
    const ref=(typeof s==="string")?s:(s.itemRef||s.ref||s.item||s.id);
    if(s&&s.reqQuest&&sv.quests.done.indexOf(s.reqQuest)<0) continue;   // 퀘스트 해금 전 비노출(별방울 콩·묘목)
    const crop=rpgFind("crops",ref);
    if(crop){ out.push({ id:"seed_"+ref, name:crop.name+" 씨앗 ×5", price:crop.seedPrice*5, qty:5 }); continue; }   // §5.5 묶음=단가×5
    const it=rpgItemAny(ref); if(!it) continue;
    if(it.kind==="seed") out.push({ id:ref, name:it.name+" ×5", price:it.crop.seedPrice*5, qty:5 });
    else if(it.price>0){
      const w=rpgFind("weapons",ref);
      out.push({ id:ref, name:it.name+(w?(" (Lv."+w.levelReq+")"):""), price:it.price, qty:1 });
    }
  }
  // 대장간 특별 메뉴(§5.5): 강화·제작 — 강화 단계는 제작 시 승계(§3.1)
  if(npc&&npc.id==="npc_bolt"){
    const up=sv.flags.boomerUp||0;
    if(up===0) out.push({ sp:"up1", id:"_up1", name:"🔨 부메랑 강화 +1 (공격 +10%)", price:120, qty:1 });
    if(up===1) out.push({ sp:"up2", id:"_up2", name:"🔨 강화 +2 (공격 +20%·가시 껍질 ×5)", price:300, qty:1 });
    if(up===2&&rpgQuestDone("mq07")) out.push({ sp:"up3", id:"_up3", name:"🔨 강화 +3 (공격 +30%·달빛 깃털 ×5)", price:500, qty:1 });   // POLISH-2 §9
    if(rpgInvCount("wp_old_boomerang")>0&&rpgInvCount("wp_sparkle_boomerang")===0&&sv.equip.weapon!=="wp_sparkle_boomerang")
      out.push({ sp:"craft", id:"_craft", name:"🌟 반짝 부메랑 제작 (낡은 부메랑+별조각 ×3)", price:0, qty:1 });
  }
  if(npc&&npc.id==="npc_leaf"&&!sv.flags.canUp)
    out.push({ sp:"watercan", id:"_can", name:"🚿 물뿌리개 개량 (십자 5칸 급수)", price:120, qty:1 });
  if(npc&&npc.id==="npc_leaf"&&sv.flags.canUp===1)   // POLISH-2 §7: 2단계 — 40칸 시대 대비
    out.push({ sp:"watercan2", id:"_can2", name:"✨ 반짝 물뿌리개 (3×3 급수)", price:300, qty:1 });
  if(npc&&npc.id==="npc_momo"&&!sv.flags.candyPouch)   // POLISH-2 §9: 사탕 주머니(상한 5→8)
    out.push({ sp:"pouch", id:"_pouch", name:"🍬 사탕 주머니 (사탕 상한 5→8)", price:150, qty:1 });
  if(npc&&npc.id==="npc_bolt"&&sv.flags.smith_discount20)   // sq03 보상: 대장간 20% 할인권
    for(const r of out){ if(r.price>0){ r.price=Math.round(r.price*0.8); r.name+=" (할인!)"; } }
  return out;
}
function rpgSellables(){
  const out=[];
  for(const st of RPG.save.inventory){
    const c=rpgFind("crops",st.id), it=rpgFind("items",st.id);
    let price=0;
    if(c){ if(c.sellable===false) continue; price=c.sellPrice||0; }
    else if(it&&it.kind==="재료") price=it.price||0;
    if(price>0) out.push({ id:st.id, name:rpgNameOf(st.id), price:price, qty:st.qty });
  }
  return out;
}
function rpgShopRows(){ const sh=RPG.shop; return sh.tab==="buy"?rpgShopStock(rpgFind("npcs",sh.npcId)):rpgSellables(); }
function rpgShopBuy(row){
  const sv=RPG.save;
  if(!row) return;
  if(sv.gold<row.price){ showToast("골드가 부족해요 ("+row.price+"G)"); return; }
  if(row.sp==="up1"){ rpgAddGold(-120); sv.flags.boomerUp=1; showToast("🔨 부메랑 강화 +1! 반짝임이 늘었다"); playSfx("clear"); rpgPersist(); return; }
  if(row.sp==="up2"){
    if(rpgInvCount("it_thorn_shell")<5){ showToast("가시 껍질이 부족해요 (5개 — 가시딱지가 떨어뜨려요)"); return; }
    rpgAddGold(-300); rpgInvRemove("it_thorn_shell",5); sv.flags.boomerUp=2;
    showToast("🔨 부메랑 강화 +2! (공격 +20%)"); playSfx("clear"); rpgPersist(); return;
  }
  if(row.sp==="craft"){
    if(rpgInvCount("it_starpiece")<3){ showToast("별조각이 부족해요 (3개 필요)"); return; }
    rpgInvRemove("it_starpiece",3); rpgInvRemove("wp_old_boomerang",1); rpgInvAdd("wp_sparkle_boomerang",1);
    if(sv.equip.weapon==="wp_old_boomerang") sv.equip.weapon="wp_sparkle_boomerang";
    showToast("🌟 반짝 부메랑 완성! (강화 "+(sv.flags.boomerUp||0)+"단계 승계)"); playSfx("clear"); rpgPersist(); return;
  }
  if(row.sp==="watercan"){ rpgAddGold(-120); sv.flags.canUp=1; showToast("🚿 물뿌리개 개량! 십자 5칸을 한 번에 적셔요"); playSfx("clear"); rpgPersist(); return; }
  if(row.sp==="watercan2"){ rpgAddGold(-300); sv.flags.canUp=2; showToast("✨ 반짝 물뿌리개! 3×3을 한 번에 적셔요"); playSfx("clear"); rpgPersist(); return; }
  if(row.sp==="pouch"){ rpgAddGold(-150); sv.flags.candyPouch=1; showToast("🍬 사탕 주머니! 이제 8개까지 들 수 있어요"); playSfx("clear"); rpgPersist(); return; }
  if(row.sp==="up3"){
    if(rpgInvCount("it_moon_feather")<5){ showToast("달빛 깃털이 부족해요 (5개 — 달빛 부엉이·정예)"); return; }
    rpgAddGold(-row.price); rpgInvRemove("it_moon_feather",5); sv.flags.boomerUp=3;
    showToast("🔨 부메랑 강화 +3! (공격 +30%)"); playSfx("clear"); rpgPersist(); return;
  }
  const cap=rpgInvCap(row.id), have=rpgInvCount(row.id);   // B-6: 상한 도달 구매 골드 증발 방지
  if(have>=cap){ showToast(cap<99?("🍬 사탕은 "+cap+"개까지만 들 수 있어요"):"가방이 가득해요 (99개)"); return; }
  rpgAddGold(-row.price); rpgInvAdd(row.id,row.qty);
  playSfx("pick"); showToast("🛒 "+row.name+" 구입! (−"+row.price+"G)");
  rpgPersist();
}
function rpgShopSell(row){
  if(rpgInvCount(row.id)<1) return;
  rpgInvRemove(row.id,1); rpgAddGold(row.price);
  playSfx("pick"); showToast("💰 "+row.name+" 판매 +"+row.price+"G");
  rpgPersist();
}
function rpgSellAllCrops(){
  let total=0,cnt=0;
  for(const st of RPG.save.inventory.slice()){
    const c=rpgFind("crops",st.id); if(!c||c.sellable===false||!(c.sellPrice>0)) continue;
    total+=c.sellPrice*st.qty; cnt+=st.qty; rpgInvRemove(st.id,st.qty);
  }
  if(cnt<1){ showToast("팔 작물이 없어요"); return; }
  rpgAddGold(total); playSfx("clear"); showToast("🌾 작물 "+cnt+"개 전부 판매 +"+total+"G");
  rpgPersist();
}
function rpgSellAllMats(){   // POLISH-2 §7: 재료 전부 팔기
  let total=0,cnt=0;
  for(const st of RPG.save.inventory.slice()){
    const it=rpgFind("items",st.id); if(!it||it.kind!=="재료"||!(it.price>0)) continue;
    total+=it.price*st.qty; cnt+=st.qty; rpgInvRemove(st.id,st.qty);
  }
  if(cnt<1){ showToast("팔 재료가 없어요"); return; }
  rpgAddGold(total); playSfx("clear"); showToast("🧺 재료 "+cnt+"개 전부 판매 +"+total+"G");
  rpgPersist();
}

/* ── 취침 = 하루 진행(§5.1) ── */
function rpgGrowTonight(){ return RPG.save.farm.filter(c=>c&&c.c&&c.wt&&!rpgFarmDone(c)).length; }   // 오늘 밤 자랄 칸 수
function rpgSleep(){   // POLISH-2 §1: 취침 확인(오조작 차단) — "아직 안 잘래" = 해질녘
  const grow=rpgGrowTonight(), sv=RPG.save;
  rpgOpenDialog(null, ["푹 자고 내일을 맞이할까?"+(grow>0?(" (자는 동안 작물 "+grow+"칸이 자라요)"):"")],
    { choice:{ opts:["🌙 잘 자기","🌆 아직 안 잘래"], cb:function(i){
      if(i===0){
        const t=sv.today||{kills:0,gold:0,harvest:0};
        RPG.ui="sleep"; RPG.sleep={ t:0, done:false, sum:{ kills:t.kills, gold:t.gold, harvest:t.harvest, grow:grow } };
        RPG.p.moving=false;
      } else if(!sv.flags.dusk){
        sv.flags.dusk=1;
        showToast("🌆 해질녘이 되었다… 우물가에 누가 서 있다");
      }
    } } });
}
function rpgOnDayAdvance(){   // §5.1·§7.3: 젖은 날만 성장 +1(wateredDays) — 물 안 주면 정지, 사멸 없음
  for(const cell of RPG.save.farm){ if(cell&&cell.c&&cell.wt&&!rpgFarmDone(cell)){ cell.wd++; cell.wt=false; } else if(cell&&cell.c){ cell.wt=false; } }
  RPG.save.resp={};   // POLISH-1: 취침 시 몬스터 전량 부활 — "자야 내일 거리가 생긴다"
  RPG.save.today={ kills:0, gold:0, harvest:0 };   // POLISH-2: 하루 요약 리셋·해질녘 소멸
  delete RPG.save.flags.dusk;
}

/* ── RPG-3a 생활: 농사 상태기계·씨앗 선택·물뿌리개(§5.2 — 도구 인벤 없음, 문맥 버튼이 전부) ── */
const RPG_CROP_EMOJI={ crop_byeolmu:"🥬", crop_galaxy_wheat:"🌾", crop_sparkle_carrot:"🥕",
  crop_star_strawberry:"🍓", crop_starbell_bean:"🫛", crop_lightwood_sapling:"🌳" };
/* 작물 스프라이트(Kenney Roguelike 시트 [col,row] — 16px·1px 마진): [중간 단계, 다자람] · seed=공용 새싹 */
const RPG_CROP_SHEET={ _seed:[28,11],
  crop_byeolmu:[[0,9],[3,9]], crop_galaxy_wheat:[[0,15],[2,15]], crop_sparkle_carrot:[[0,18],[2,18]],
  crop_star_strawberry:[[0,6],[2,7]], crop_starbell_bean:[[0,12],[2,13]], crop_lightwood_sapling:[[28,9],[13,9]] };
function rpgSheetDraw(g,pos,dx,dy,dw,sheetKey){   // 시트 타일 1장 크리스프 확대(16px·1px 마진)
  const img=(typeof worldImage==="function")?worldImage(sheetKey||"rpg_sheet"):null;
  if(!img||!pos) return false;
  const prev=g.imageSmoothingEnabled;
  g.imageSmoothingEnabled=false;
  g.drawImage(img, pos[0]*17, pos[1]*17, 16, 16, dx, dy, dw, dw);
  g.imageSmoothingEnabled=prev;
  return true;
}
/* NPC 스프라이트(Kenney Roguelike Characters 시트 — 조합 완성 캐릭터 열) */
const RPG_NPC_SHEET={ npc_onbyeol:[1,11], npc_momo:[0,5], npc_bolt:[1,6],
  npc_leaf:[1,5], npc_meonbyeol:[0,10], npc_pico:[1,8] };
function rpgSoil(){   // 밭 좌표(맵이 단일 출처) + 확장 구매 시 8×5 영역(§5.5 — 통행 가능 칸만)
  if(!RPG.map) return [];
  if(RPG._soilCache) return RPG._soilCache;
  const base=(RPG.map.soil||[]).slice();
  if(RPG.map.id==="rpg_village"&&RPG.save.flags.farmBig){
    const seen={}; for(const s of base) seen[s[0]+","+s[1]]=1;
    for(let r=10;r<=14;r++) for(let c=3;c<=10;c++){
      if(seen[c+","+r]) continue;
      const ch=rpgTileAt(c,r);
      if(RPG_DB.legend.solid.indexOf(ch)<0&&ch!=="*") base.push([c,r]);
    }
  }
  RPG._soilCache=base;
  return base;
}
function rpgFarmCell(i){ const f=RPG.save.farm; while(f.length<=i) f.push(null); return f[i]; }
function rpgFarmNeed(cell){ const c=rpgFind("crops",cell.c); if(!c) return 1; return cell.rg?(c.regrowDays||c.growDays):c.growDays; }
function rpgFarmDone(cell){ return !!(cell&&cell.c&&cell.wd>=rpgFarmNeed(cell)); }
function rpgFarmActionFor(i){
  const cell=rpgFarmCell(i);
  if(!cell) return { act:"till", icon:"⛏", label:"괭이질" };
  if(cell.t&&!cell.c) return { act:"plant", icon:"🌱", label:"씨앗 심기" };
  if(cell.c){
    if(rpgFarmDone(cell)) return { act:"harvest", icon:"🌾", label:"수확" };
    if(!cell.wt) return { act:"water", icon:"💧", label:"물 주기" };
    if(!cell.fz&&rpgInvCount("it_fertilizer")>0) return { act:"fert", icon:"✨", label:"거름 주기" };   // POLISH-2 §9(칸당 1회)
    return { act:"info", icon:"🌿", label:"자라는 중" };
  }
  return { act:"till", icon:"⛏", label:"괭이질" };
}
function rpgSeedStacks(){ return RPG.save.inventory.filter(s=>s.id.indexOf("seed_")===0); }
function rpgFarmDo(i){
  const a=rpgFarmActionFor(i);
  if(a.act==="till"){
    RPG.save.farm[i]={t:1}; playSfx("pick"); rpgPersist();
    const _s=rpgSoil()[i];   // 흙 파티클(생활 주스)
    if(_s) for(let k=0;k<5;k++) RPG.fx.push({kind:"dot",x:(_s[0]+0.5)*56+rand(-12,12),y:(_s[1]+0.7)*56,t:rand(0.25,0.5),vx:rand(-60,60),vy:-rand(50,140),g:380,color:"#8a6238",size:3});
    if(RPG.save.tut.indexOf(3)<0){ RPG.save.tut.push(3);   // 첫 괭이질 온보딩
      const tl=rpgDb().dialogs.tutorial||[]; if(tl[8]) rpgOpenDialog(null,[tl[8],tl[9]].filter(Boolean)); }
  }
  else if(a.act==="plant"){
    const seeds=rpgSeedStacks();
    if(!seeds.length){ showToast("씨앗이 없어요 — 리프네 씨앗 가게로!"); return; }
    if(RPG.lastSeed&&rpgInvCount(RPG.lastSeed)>0) return rpgPlant(i,RPG.lastSeed);   // 직전 씨앗 기억=연속 심기
    if(seeds.length===1) return rpgPlant(i,seeds[0].id);
    RPG.ui="seed"; RPG.seed={ idx:0, target:i };
  }
  else if(a.act==="water") rpgWater(i);
  else if(a.act==="fert"){   // POLISH-2 §9: 별빛 거름 — 성장 +1일(칸당 1회)
    const cell=rpgFarmCell(i);
    rpgInvRemove("it_fertilizer",1); cell.fz=1; cell.wd++;
    playSfx("clear"); showToast("✨ 거름을 줬다! 성장이 하루 앞당겨졌어요");
    const _s=rpgSoil()[i];
    if(_s) for(let k=0;k<6;k++) RPG.fx.push({kind:"star",x:(_s[0]+0.5)*56,y:(_s[1]+0.4)*56,t:rand(0.4,0.7),vx:rand(-70,70),vy:-rand(60,140),g:260,color:"#ffe066",size:11});
    rpgPersist();
  }
  else if(a.act==="harvest"){
    rpgHarvest(i);
    if(RPG.save.flags.canUp){   // POLISH-2 §7: 개량 물뿌리개 보유 시 십자 일괄 수확
      const soil=rpgSoil(), c0=soil[i][0], r0=soil[i][1];
      for(let j=0;j<soil.length;j++){ if(j===i) continue;
        if(Math.abs(soil[j][0]-c0)+Math.abs(soil[j][1]-r0)===1&&rpgFarmDone(rpgFarmCell(j))) rpgHarvest(j); }
    }
  }
  else { const cell=rpgFarmCell(i); showToast("🌿 자라는 중! (물 준 날 "+cell.wd+"/"+rpgFarmNeed(cell)+")"); }
}
function rpgPlant(i,seedId){
  const cropId=seedId.slice(5), c=rpgFind("crops",cropId); if(!c) return;
  rpgInvRemove(seedId,1);
  RPG.save.farm[i]={ c:cropId, wd:0, wt:false, rg:false };
  RPG.lastSeed=(rpgInvCount(seedId)>0)?seedId:null;
  playSfx("pick"); showToast("🌱 "+c.name+" 심었다!");
  rpgPersist();   // §7.3: 심기 자동저장
}
function rpgWater(i){
  const soil=rpgSoil(), targets=[i], cu=RPG.save.flags.canUp||0;
  if(cu){   // 물뿌리개 개량: 1단계=십자 5칸 · 2단계=3×3(POLISH-2 §7)
    const c0=soil[i][0], r0=soil[i][1];
    for(let j=0;j<soil.length;j++){ if(j===i) continue;
      const dx=Math.abs(soil[j][0]-c0), dy=Math.abs(soil[j][1]-r0);
      if(cu>=2?(dx<=1&&dy<=1):(dx+dy===1)) targets.push(j); }
  }
  let n=0;
  for(const j of targets){ const cell=rpgFarmCell(j); if(cell&&cell.c&&!cell.wt&&!rpgFarmDone(cell)){ cell.wt=true; n++;
    for(let k=0;k<4;k++) RPG.fx.push({kind:"dot",x:(soil[j][0]+0.5)*56+rand(-14,14),y:soil[j][1]*56+8,t:rand(0.3,0.55),vx:rand(-20,20),vy:rand(30,80),g:200,color:"#6db4ff",size:2.5}); } }   // 물방울 파티클
  if(n>0){
    playSfx("pick"); showToast("💧 물을 줬다! ("+n+"칸) — 자고 나면 자라요");
    if(!RPG.save.flags.dusk&&rpgQuestDone("mq02")&&RPG.save.farm.every(c=>!c||!c.c||c.wt||rpgFarmDone(c))){   // POLISH-2: 밭일 완료 → 해질녘 신호
      RPG.save.flags.dusk=1;
      showToast("🌆 오늘 밭일 끝! 해질녘이 되었다… 우물가에 누가 있다");
    }
  }
  // 첫 물주기 온보딩(튜토리얼 대사 소비)
  if(n>0&&RPG.save.tut.indexOf(4)<0){ RPG.save.tut.push(4);
    const tl=rpgDb().dialogs.tutorial||[]; if(tl[10]) rpgOpenDialog(null,[tl[10],tl[11]].filter(Boolean)); }
}
function rpgHarvest(i){
  const cell=rpgFarmCell(i), c=rpgFind("crops",cell.c); if(!c) return;
  rpgInvAdd(cell.c,1); playSfx("clear");
  if(RPG.save.today) RPG.save.today.harvest++;   // POLISH-2: 하루 요약
  const _s=rpgSoil()[i];   // 수확 팝 파티클(생활 주스)
  if(_s) for(let k=0;k<6;k++){ const a=rand(0,Math.PI*2);
    RPG.fx.push({kind:"dot",x:(_s[0]+0.5)*56,y:(_s[1]+0.5)*56,t:rand(0.3,0.6),vx:Math.cos(a)*rand(40,120),vy:-rand(60,160),g:340,color:"#8fdba0",size:3}); }
  RPG.fx.push({x:RPG.p.x,y:RPG.p.y-40,t:0.9,text:"+"+c.name,color:"#8fdba0"});
  if(c.regrowDays>0){ RPG.save.farm[i]={ c:cell.c, wd:0, wt:false, rg:true }; showToast("🍓 수확! (그루터기에서 다시 자라요)"); }
  else { RPG.save.farm[i]={t:1}; showToast("🌾 "+c.name+" 수확!"); }
  rpgQuestOnHarvest(cell.c);   // RPG-3b 훅
  if(RPG.save.tut.indexOf(5)<0){   // POLISH-2 §6: 첫 수확 온보딩
    RPG.save.tut.push(5);
    const tl=rpgDb().dialogs.tutorial||[];
    if(tl[13]) rpgOpenDialog(null,[tl[13]]);
  }
  rpgPersist();   // §7.3: 수확 자동저장
}
function rpgFarmCount(cropId){ let n=0; for(const cell of RPG.save.farm){ if(cell&&cell.c===cropId) n++; } return n; }   // mq06 묘목 수(§3.1)

/* ── RPG-3b 퀘스트 엔진(§6): goal 5타입·체인·보상·해금 — 스토리는 데이터로만 ── */
function rpgQuestRec(qid){ return rpgFind("quests",qid); }
function rpgQuestDone(qid){ return RPG.save.quests.done.indexOf(qid)>=0; }
function rpgQuestActive(qid){ return RPG.save.quests.active[qid]!==undefined; }
function rpgQuestReqOk(q){ return (q.requires||[]).every(r=>rpgQuestDone(r)); }
function rpgQuestAvailFor(npcId){
  for(const q of rpgDb().quests){
    if(q.giver!==npcId||rpgQuestDone(q.id)||rpgQuestActive(q.id)) continue;
    if(rpgQuestReqOk(q)) return q;
  }
  return null;
}
function rpgQuestFulfilled(q){
  const cnt=RPG.save.quests.active[q.id]||0, g=q.goal;
  if(g.type==="kill"||g.type==="harvest") return cnt>=g.count;
  if(g.type==="collect") return rpgInvCount(g.target)>=g.count;
  if(g.type==="deliver") return rpgInvCount(g.item)>=g.count;
  if(g.type==="talk") return cnt>=1;
  return false;
}
function rpgQuestAccept(q){
  RPG.save.quests.active[q.id]=0;
  showToast("📜 새 부탁: "+q.name);
  playSfx("pick");
  if(q.id==="mq06") rpgStartRaid();   // 별광맥 방어전: 마을 야습(교차점 3)
  const where=rpgQuestWhere(q);   // POLISH-2 §5: 수락 후 추가 대화 3줄 제거 → 배너 1장
  rpgBanner("📜 "+rpgQuestTodo(q)+(where?"  ·  🧭 "+where:""));
  rpgPersist();
}
function rpgGrantItem(itemId,count){
  count=count||1;
  if(rpgFind("crops",itemId)){ rpgInvAdd("seed_"+itemId,count); showToast("🎁 "+rpgNameOf(itemId)+" 씨앗 ×"+count); return; }   // 작물 보상=씨앗(§3.1 mq01)
  rpgInvAdd(itemId,count); showToast("🎁 "+rpgNameOf(itemId)+(count>1?(" ×"+count):""));
}
function rpgQuestUnlock(uid){
  const sv=RPG.save;
  if(rpgFind("weapons",uid)||rpgFind("armors",uid)||rpgFind("items",uid)){ rpgGrantItem(uid,1); return; }
  const sk=rpgFind("skills",uid);
  if(sk){ if(sv.skills.indexOf(uid)<0){ sv.skills.push(uid); showToast("✨ 새 능력: "+sk.name+"!"); } return; }
  if(rpgFind("crops",uid)) return;   // 작물 해금 = 상점 reqQuest 게이트가 자동 처리
  sv.flags[uid]=1;   // smith_open·job_change·farm_expand·chapter1_clear·smith_discount20 등
}
function rpgQuestComplete(q){
  const sv=RPG.save, g=q.goal;
  if(g.type==="collect") rpgInvRemove(g.target,g.count);
  if(g.type==="deliver") rpgInvRemove(g.item,g.count);
  delete sv.quests.active[q.id];
  sv.quests.done.push(q.id);
  if(q.reward){   // POLISH-1: 보상 합산 배너(토스트 덮어쓰기로 "+100G" 유실되던 문제)
    const parts=[];
    if(q.reward.exp){ rpgAddExp(q.reward.exp); parts.push("+"+q.reward.exp+" EXP"); }
    if(q.reward.gold){ rpgAddGold(q.reward.gold); parts.push("+"+q.reward.gold+"G"); }
    if(q.reward.itemId){ rpgGrantItem(q.reward.itemId, q.reward.itemCount||1); parts.push(rpgNameOf(q.reward.itemId)+((q.reward.itemCount||1)>1?" ×"+q.reward.itemCount:"")); }
    if(q.reward.title){ sv.flags.title=q.reward.title; parts.push("🏅 칭호: "+q.reward.title); }
    rpgBanner("🎊 "+q.name+" 완료!"+(parts.length?"  "+parts.join(" · "):""));
  } else rpgBanner("🎊 "+q.name+" 완료!");
  for(const u of (q.unlocks||[])) rpgQuestUnlock(u);
  playSfx("clear");
  if(q.id==="mq06") sv.flags.raidOn=0;
  if(q.id==="mq07"){   // 챕터 1 엔딩(§3.1): 별빛 귀환·마을 축제
    const end=(rpgDb().dialogs.ending||[]).slice();
    if(end.length) rpgOpenDialog(null, end, { onDone:function(){ showToast("🎆 별빛이 돌아왔다! 챕터 1 완결!"); } });
  }
  rpgPersist();
}
function rpgQuestOnKill(mobId){
  const sv=RPG.save;
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="kill"&&q.goal.target===mobId&&sv.quests.active[qid]<q.goal.count){
      sv.quests.active[qid]++;
      showToast("🗡 "+q.name+" "+sv.quests.active[qid]+"/"+q.goal.count+(sv.quests.active[qid]>=q.goal.count?" — 완료! 보고하자":""));
    }
  }
  if(sv.flags.trialJob){   // 전직 시험(§4.6 — 실패 없음·무료 재도전과 동치)
    const j=rpgFind("jobs",sv.flags.trialJob);
    if(j&&j.trial&&j.trial.target===mobId){
      sv.flags.trialN=(sv.flags.trialN||0)+1;
      showToast("⚔️ 전직 시험 "+sv.flags.trialN+"/"+j.trial.count);
      if(sv.flags.trialN>=j.trial.count){
        sv.jobId=j.id;
        for(const skid of (j.grantSkills||[])) if(sv.skills.indexOf(skid)<0) sv.skills.push(skid);
        delete sv.flags.trialJob; delete sv.flags.trialN;
        sv.hp=rpgMaxHpFor(sv);
        showToast("🎊 전직 완료: "+j.name+"! (V로 기술 바꾸기)");
        playSfx("clear"); rpgPersist();
      }
    }
  }
}
function rpgQuestOnHarvest(cropId){
  const sv=RPG.save;
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid);
    if(q&&q.goal.type==="harvest"&&q.goal.target===cropId&&sv.quests.active[qid]<q.goal.count){
      sv.quests.active[qid]++;
      showToast("🌾 "+q.name+" "+sv.quests.active[qid]+"/"+q.goal.count+(sv.quests.active[qid]>=q.goal.count?" — 완료! 보고하자":""));
    }
  }
}
/* mq06 별광맥 방어전: 야습 스폰 + 빛나무 조명(낮의 밭이 밤의 전장 — 교차점 3) */
/* ── RPG-P1 안내 보강: 할 일·장소 문구·NPC 마커·추적 화살표(§6 — "어디로 가야 하지" 해소) ── */
function rpgNpcMapName(npcId){ for(const m of rpgDb().maps){ if((m.npcs||[]).some(n=>(n.npcId||n.id)===npcId)) return m.name; } return ""; }
function rpgMobMapName(mobId){ const d=rpgFind("monsters",mobId); if(!d) return ""; const m=rpgFind("maps",(d.habitat||[])[0]); return m?m.name:""; }
function rpgItemSource(itemId){ for(const mo of rpgDb().monsters){ if((mo.drops||[]).some(d=>d.itemId===itemId)) return mo.name+" ("+rpgMobMapName(mo.id)+")"; } return ""; }
function rpgQuestTodo(q){
  const g=q.goal;
  if(g.type==="kill") return rpgNameOf2(g.target)+" "+g.count+"마리 물리치기";
  if(g.type==="harvest") return rpgNameOf(g.target)+" "+g.count+"개 수확하기";
  if(g.type==="collect") return rpgNameOf(g.target)+" "+g.count+"개 모으기";
  if(g.type==="deliver"){ const n=rpgFind("npcs",g.to); return rpgNameOf(g.item)+" "+g.count+"개를 "+(n?n.name:"?")+"에게 배달하기"; }
  if(g.type==="talk"){ const n=rpgFind("npcs",g.target); return (n?n.name:"?")+"님과 이야기하기"; }
  return "";
}
function rpgQuestWhere(q){
  const g=q.goal;
  if(g.type==="kill") return rpgMobMapName(g.target);
  if(g.type==="harvest") return "마을 밭";
  if(g.type==="collect") return rpgItemSource(g.target);
  if(g.type==="deliver") return rpgNpcMapName(g.to);
  if(g.type==="talk") return rpgNpcMapName(g.target);
  return "";
}
function rpgNpcMarker(npcId){   // ❗ 새 부탁 · ❓ 보고/납품 가능 · … 진행 중(§5.6)
  const sv=RPG.save;
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid); if(!q) continue;
    if(q.goal.type==="talk"&&q.goal.target===npcId) return "❓";   // 대화 목표 대상(mq01 등)
    if(q.goal.type==="deliver"&&q.goal.to===npcId&&rpgQuestFulfilled(q)) return "❓";
    if((q.giver===npcId||(!q.giver&&q.goal.type==="talk"&&q.goal.target===npcId))&&q.goal.type!=="deliver"&&rpgQuestFulfilled(q)) return "❓";
  }
  if(rpgQuestAvailFor(npcId)) return "❗";
  if(npcId==="npc_onbyeol"&&sv.flags.job_change&&sv.level>=5&&sv.jobId==="job_novice"&&!sv.flags.trialJob) return "❗";
  for(const qid in sv.quests.active){
    const q=rpgQuestRec(qid); if(!q) continue;
    if(q.giver===npcId||(q.goal.type==="deliver"&&q.goal.to===npcId)) return "…";
  }
  return null;
}
function rpgTrackQuest(){
  const order=Object.keys(RPG.save.quests.active).sort();
  const qid=order.find(k=>k.indexOf("mq")===0)||order[0];
  return qid?rpgQuestRec(qid):null;
}
function rpgTrackTarget(){   // 추적 퀘스트 대상이 현재 맵에 있으면 좌표(가장자리 화살표용)
  const q=rpgTrackQuest(); if(!q) return null;
  const g=q.goal, full=rpgQuestFulfilled(q);
  const npcAt=function(id){ const n=RPG.npcsOnMap.find(x=>x.id===id); return n?{x:n.x,y:n.y}:null; };
  if(full) return npcAt(g.type==="deliver"?g.to:(q.giver||g.target));
  if(g.type==="talk") return npcAt(g.target);
  if(g.type==="deliver"&&rpgInvCount(g.item)>=g.count) return npcAt(g.to);
  if(g.type==="kill"){ let best=null,bd=1e9;
    for(const mob of RPG.mobs){ if(mob.dead||mob.id!==g.target) continue;
      const d=dist(RPG.p.x,RPG.p.y,mob.x,mob.y); if(d<bd){ bd=d; best=mob; } }
    if(best) return {x:best.x,y:best.y}; }
  // POLISH-2 §6: 대상 NPC가 다른 맵이면 → 그 맵으로 가는 포탈을 가리킴(mq01 화살표가 촌장집 문으로)
  let wantNpc=null;
  if(full) wantNpc=(g.type==="deliver")?g.to:(q.giver||g.target);
  else if(g.type==="talk") wantNpc=g.target;
  if(wantNpc){
    let tm=null;
    for(const m of rpgDb().maps){ if((m.npcs||[]).some(n=>(n.npcId||n.id)===wantNpc)){ tm=m.id; break; } }
    if(tm&&tm!==RPG.map.id){
      const w=(RPG.map.portals||[]).find(pp=>pp.to===tm);
      if(w) return { x:(w.at[0]+0.5)*56, y:(w.at[1]+0.5)*56 };
    }
  }
  return null;
}
function rpgActiveSkills(){ return RPG.save.skills.map(id=>rpgFind("skills",id)).filter(s=>s&&s.type==="active"&&s.slot==="X"); }

function rpgStartRaid(){
  RPG.save.flags.raidOn=1;
  showToast("🌩 먹구름단의 야습! 별광맥을 지켜라! (빛나무가 도와줄 거야)");
  if(RPG.map&&RPG.map.id==="rpg_village") rpgSpawnRaid();
}
function rpgSpawnRaid(){
  const q=rpgQuestRec("mq06"), got=RPG.save.quests.active.mq06||0;
  const owls=Math.max(0,(q?q.goal.count:4)-got);
  if(owls<=0) return;   // B-10: 목표 달성 후 재입장 부슬이 무한 스폰 방지
  const vein=(RPG.objects||[]).find(o=>o.type==="vein");
  const cx=vein?(vein.tx+0.5)*56:RPG.cols*28, cy=vein?(vein.ty+0.5)*56:RPG.rows*28;
  for(let i=0;i<owls;i++){ const d2=rpgFind("monsters","mob_moonowl");
    if(d2) RPG.mobs.push(rpgMakeMob(d2, clamp(cx+rand(-200,200),40,RPG.cols*56-40), clamp(cy+rand(-160,160),40,RPG.rows*56-40))); }
  for(let i=0;i<2;i++){ const d2=rpgFind("monsters","mob_busuri");
    if(d2) RPG.mobs.push(rpgMakeMob(d2, clamp(cx+rand(-240,240),40,RPG.cols*56-40), clamp(cy+rand(-180,180),40,RPG.rows*56-40))); }
}
function rpgRaidLights(dt){   // 심긴 빛나무 1그루 = 방어 조명 1개(1.6s마다 근처 적 6뎀)
  RPG.lightT=(RPG.lightT||0)+dt;
  if(RPG.lightT<1.6) return;
  RPG.lightT=0;
  const soil=rpgSoil();
  for(let i=0;i<soil.length;i++){
    const cell=RPG.save.farm[i]; if(!cell||cell.c!=="crop_lightwood_sapling") continue;
    const lx=(soil[i][0]+0.5)*56, ly=(soil[i][1]+0.5)*56;
    let best=null,bd=170;
    for(const mob of RPG.mobs){ if(mob.dead) continue; const d=dist(lx,ly,mob.x,mob.y); if(d<bd){ bd=d; best=mob; } }
    if(best){ rpgHitMob(best,6,{noAmbush:true,noJuice:true}); RPG.fx.push({x:lx,y:ly-30,t:0.5,text:"🌳⚡",color:"#8fdba0"}); }
  }
}

/* ── 입력(키보드) ── */
function handleRpgKey(code){
  if(!RPG) return;
  if(RPG.ui==="dialog"){
    const d=RPG.dialog;
    if(d&&d.choice){
      if(code==="ArrowUp"||code==="ArrowLeft"){ d.choice.idx=Math.max(0,d.choice.idx-1); return; }
      if(code==="ArrowDown"||code==="ArrowRight"){ d.choice.idx=Math.min(d.choice.opts.length-1,d.choice.idx+1); return; }
      if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ"){ rpgChoicePick(); return; }
      if(code==="Escape"){ d.choice.idx=d.choice.opts.length-1; rpgChoicePick(); return; }
      return;
    }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ"||code==="Escape") rpgDialogAdvance();
    return;
  }
  if(RPG.ui==="shop"){
    const sh=RPG.shop, rows=rpgShopRows();
    if(code==="Escape"){ RPG.ui="field"; RPG.shop=null; return; }
    if(code==="ArrowUp"){ sh.idx=Math.max(0,sh.idx-1); sh.scroll=Math.min(sh.scroll||0,sh.idx); return; }
    if(code==="ArrowDown"){ sh.idx=Math.min(Math.max(0,rows.length-1),sh.idx+1); sh.scroll=Math.max(sh.scroll||0,sh.idx-6); return; }
    if(code==="ArrowLeft"||code==="ArrowRight"||code==="Tab"||code==="KeyT"){ sh.tab=(sh.tab==="buy")?"sell":"buy"; sh.idx=0; return; }
    if(code==="KeyA"&&sh.tab==="sell"){ rpgSellAllCrops(); sh.idx=0; return; }
    if(code==="KeyR"&&sh.tab==="sell"){ rpgSellAllMats(); sh.idx=0; return; }
    if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&rows[sh.idx]){
      if(sh.tab==="buy") rpgShopBuy(rows[sh.idx]); else { rpgShopSell(rows[sh.idx]); sh.idx=Math.min(sh.idx,Math.max(0,rpgShopRows().length-1)); }
      return;
    }
    return;
  }
  if(RPG.ui==="inven"){
    const tab=RPG.inven.tab||0;
    if(code==="Escape"||code==="KeyI"){ RPG.ui="field"; RPG.inven=null; return; }
    if(code==="ArrowLeft"){ RPG.inven.tab=(tab+2)%3; RPG.inven.idx=0; return; }
    if(code==="ArrowRight"||code==="Tab"){ RPG.inven.tab=(tab+1)%3; RPG.inven.idx=0; return; }
    if(tab===0){
      const view=rpgInvenView(), maxVis=8;   // POLISH-1: 정렬 뷰 기준 커서+스크롤 추종
      if(code==="ArrowUp"){ RPG.inven.idx=Math.max(0,RPG.inven.idx-1); RPG.inven.scroll=Math.min(RPG.inven.scroll||0,RPG.inven.idx); return; }
      if(code==="ArrowDown"){ RPG.inven.idx=Math.min(Math.max(0,view.length-1),RPG.inven.idx+1); RPG.inven.scroll=Math.max(RPG.inven.scroll||0,RPG.inven.idx-maxVis+1); return; }
      if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&view[RPG.inven.idx]){ rpgInvenUse(view[RPG.inven.idx].i); return; }
    } else if(tab===1){
      const acts=rpgActiveSkills();
      if(code==="ArrowUp"){ RPG.inven.idx=Math.max(0,RPG.inven.idx-1); return; }
      if(code==="ArrowDown"){ RPG.inven.idx=Math.min(Math.max(0,acts.length-1),RPG.inven.idx+1); return; }
      if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ")&&acts[RPG.inven.idx]){
        RPG.save.skillX=acts[RPG.inven.idx].id;
        showToast("✨ X 기술: "+acts[RPG.inven.idx].name); rpgPersist(); return;
      }
    }
    return;
  }
  if(RPG.ui==="codex"){   // 📖 별의 도감(§8.1 — 3탭: 몬스터/도구/작물)
    if(code==="Escape"||code==="KeyB"){ RPG.ui="field"; RPG.codex=null; return; }
    if(code==="ArrowLeft"){ RPG.codex.tab=(RPG.codex.tab+2)%3; return; }
    if(code==="ArrowRight"||code==="Tab"){ RPG.codex.tab=(RPG.codex.tab+1)%3; return; }
    return;
  }
  if(RPG.ui==="seed"){   // 씨앗 선택 팝업(§5.2)
    const seeds=rpgSeedStacks();
    if(code==="Escape"){ RPG.ui="field"; RPG.seed=null; return; }
    if(code==="ArrowUp"||code==="ArrowLeft"){ RPG.seed.idx=Math.max(0,RPG.seed.idx-1); return; }
    if(code==="ArrowDown"||code==="ArrowRight"){ RPG.seed.idx=Math.min(Math.max(0,seeds.length-1),RPG.seed.idx+1); return; }
    if((code==="Enter"||code==="NumpadEnter"||code==="KeyZ"||code==="Space")&&seeds[RPG.seed.idx]){
      const tgt=RPG.seed.target, id=seeds[RPG.seed.idx].id;
      RPG.ui="field"; RPG.seed=null; rpgPlant(tgt,id); return;
    }
    return;
  }
  if(RPG.ui==="confirm"){
    if(code==="KeyY"){ showToast("🌙 저장하고 나왔어요"); rpgExit(); return; }
    if(code==="KeyM"){ RPG.ui="map"; return; }   // POLISH-3: Esc 메뉴에서 지도
    if(code==="KeyN"||code==="Escape"){ RPG.ui="field"; return; }
    return;
  }
  if(RPG.ui==="sleep"){ if(RPG.sleep&&RPG.sleep.t>1.2&&(code==="Space"||code==="Enter"||code==="NumpadEnter"||code==="KeyZ")) RPG.sleep.t=Math.max(RPG.sleep.t,3.0); return; }
  if(RPG.ui==="map"){ if(code==="KeyM"||code==="Escape"||code==="Space"||code==="KeyZ"){ RPG.ui="field"; } return; }   // EXPLORE-1 전체지도
  if(RPG.ui==="daily"){   // 📋 오늘의 부탁(POLISH-2)
    const ls=(RPG.save.daily&&RPG.save.daily.list)||[];
    if(code==="Escape"||code==="KeyG"){ RPG.ui="field"; RPG.dailyUi=null; return; }
    if(code==="ArrowUp"){ RPG.dailyUi.idx=Math.max(0,RPG.dailyUi.idx-1); return; }
    if(code==="ArrowDown"){ RPG.dailyUi.idx=Math.min(Math.max(0,ls.length-1),RPG.dailyUi.idx+1); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ") rpgDailyClaim(RPG.dailyUi.idx);
    return;
  }
  if(RPG.ui==="warp"){   // 🌊 별샘 워프(POLISH-1)
    const ls=(RPG.warp&&RPG.warp.list)||[];
    if(code==="Escape"){ RPG.ui="field"; RPG.warp=null; return; }
    if(code==="ArrowUp"||code==="ArrowLeft"){ RPG.warp.idx=Math.max(0,RPG.warp.idx-1); return; }
    if(code==="ArrowDown"||code==="ArrowRight"){ RPG.warp.idx=Math.min(Math.max(0,ls.length-1),RPG.warp.idx+1); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="KeyZ") rpgWellGo(ls[RPG.warp.idx]);
    return;
  }
  // field
  if(code==="Space"||code==="KeyE"){ rpgInteract(); return; }
  if(code==="KeyX"){ rpgCastX(); return; }
  if(code==="KeyC"){ rpgCastC(); return; }
  if(code==="KeyV"){   // 액티브 2개+ 보유 시 X 기술 교체(§4.5 — 빌드 선택의 첫 경험)
    const acts=RPG.save.skills.filter(id=>{ const s=rpgFind("skills",id); return s&&s.type==="active"&&s.slot==="X"; });
    if(acts.length<2){ showToast("바꿀 기술이 아직 없어요"); return; }
    const i=(acts.indexOf(RPG.save.skillX)+1)%acts.length;
    RPG.save.skillX=acts[i];
    showToast("✨ X 기술: "+rpgFind("skills",acts[i]).name); rpgPersist(); return;
  }
  if(code==="KeyI"||code==="Tab"){ RPG.ui="inven"; RPG.inven={idx:0}; return; }
  if(code==="KeyB"){ RPG.ui="codex"; RPG.codex={ tab:0 }; return; }   // 📖 별의 도감(§8.1)
  if(code==="KeyM"){ RPG.ui="map"; return; }   // 🗺️ 전체지도(EXPLORE-1)
  if(code==="KeyQ"){ rpgUseCandy(); return; }
  if(code==="Escape"){ RPG.ui="confirm"; return; }
}

/* ── 입력(터치 §4.7: 좌 스틱·문맥 버튼·탭=대화 진행·상점 더블탭 실행) ── */
function rpgTouchStart(id,p){
  if(!RPG) return;
  if(RPG.ui==="dialog"){
    const d=RPG.dialog;
    if(d&&d.choice){
      for(let i=0;i<d.choice.opts.length;i++){ const y=556+i*54;
        if(p.x>LOGW/2+120&&p.x<LOGW/2+460&&p.y>y&&p.y<y+48){ d.choice.idx=i; rpgChoicePick(); return; } }
      return;
    }
    rpgDialogAdvance(); return;
  }
  if(RPG.ui==="shop"){ RPG.touch.sc={ id:id, y0:p.y, base:(RPG.shop.scroll||0) }; rpgShopTap(p); return; }   // 스와이프 스크롤 시작점
  if(RPG.ui==="inven"){
    if(p.x<240||p.x>1040||p.y<110||p.y>610){ RPG.ui="field"; RPG.inven=null; return; }
    if((RPG.inven.tab||0)===0) RPG.touch.sc={ id:id, y0:p.y, base:(RPG.inven.scroll||0) };
    if(p.y<110+64){ for(let i=0;i<3;i++) if(p.x>=260+i*175&&p.x<=420+i*175){ RPG.inven.tab=i; RPG.inven.idx=0; return; } return; }
    const tab=RPG.inven.tab||0;
    if(tab===0){
      const view=rpgInvenView(), v=Math.floor((p.y-198)/46), i=v+(RPG.inven.scroll||0);
      if(v>=0&&v<8&&i<view.length){ if(RPG.inven.idx===i) rpgInvenUse(view[i].i); else RPG.inven.idx=i; }   // 더블탭=사용/장착(뷰→원본 매핑)
    } else if(tab===1&&p.x>660){
      const acts=rpgActiveSkills(), i=Math.floor((p.y-214)/44);
      if(i>=0&&i<acts.length){ if(RPG.inven.idx===i){ RPG.save.skillX=acts[i].id; showToast("✨ X 기술: "+acts[i].name); rpgPersist(); } else RPG.inven.idx=i; }
    }
    return;
  }
  if(RPG.ui==="confirm"){   // POLISH-3: 3버튼 + 터치 타깃 상향(54px)
    if(p.y>382&&p.y<448){
      if(p.x>LOGW/2-278&&p.x<LOGW/2-98){ RPG.ui="field"; return; }
      if(p.x>LOGW/2-90&&p.x<LOGW/2+90){ RPG.ui="map"; return; }
      if(p.x>LOGW/2+98&&p.x<LOGW/2+278){ showToast("🌙 저장하고 나왔어요"); rpgExit(); return; }
    } else if(p.y<290||p.y>480){ RPG.ui="field"; }
    return;
  }
  if(RPG.ui==="seed"){
    const seeds=rpgSeedStacks();
    if(p.x<340||p.x>940||p.y<180||p.y>560){ RPG.ui="field"; RPG.seed=null; return; }
    const i=Math.floor((p.y-250)/50);
    if(i>=0&&i<seeds.length){
      if(RPG.seed.idx===i){ const tgt=RPG.seed.target, id=seeds[i].id; RPG.ui="field"; RPG.seed=null; rpgPlant(tgt,id); }
      else RPG.seed.idx=i;
    }
    return;
  }
  if(RPG.ui==="codex"){
    if(p.y<130){ for(let i=0;i<3;i++) if(p.x>=60+i*180&&p.x<=228+i*180){ RPG.codex.tab=i; return; } }
    else if(p.y>LOGH-50||p.x<60){ RPG.ui="field"; RPG.codex=null; }
    return;
  }
  if(RPG.ui==="sleep"){ if(RPG.sleep&&RPG.sleep.t>1.2) RPG.sleep.t=Math.max(RPG.sleep.t,3.0); return; }   // 탭=요약 스킵
  if(RPG.ui==="map"){ RPG.ui="field"; return; }                                   // 🗺️ 지도: 탭=닫기
  if(RPG.ui==="warp"){                                                             // 🌊 별샘: 재탭=이동
    const ls=(RPG.warp&&RPG.warp.list)||[];
    if(p.x<340||p.x>940||p.y<180||p.y>560){ RPG.ui="field"; RPG.warp=null; return; }
    const i=Math.floor((p.y-250)/50);
    if(i>=0&&i<ls.length){ if(RPG.warp.idx===i) rpgWellGo(ls[i]); else RPG.warp.idx=i; }
    return;
  }
  if(RPG.ui==="daily"){                                                            // 📋 의뢰: 재탭=수령
    const ls=(RPG.save.daily&&RPG.save.daily.list)||[];
    if(p.x<300||p.x>980||p.y<150||p.y>570){ RPG.ui="field"; RPG.dailyUi=null; return; }
    const i=Math.floor((p.y-220)/84);
    if(i>=0&&i<ls.length){ if(RPG.dailyUi.idx===i) rpgDailyClaim(i); else RPG.dailyUi.idx=i; }
    return;
  }
  if(p.y<64&&p.x>LOGW-140){ RPG.ui="inven"; RPG.inven={idx:0}; return; }          // 🎒 칩
  if(p.x>636&&p.x<740&&p.y>LOGH-66&&p.y<LOGH-24){ RPG.ui="map"; return; }         // 🗺️ 지도 칩(터치 타깃 상향 — POLISH-3)
  if(p.x>744&&p.x<862&&p.y>LOGH-66&&p.y<LOGH-24){ rpgUseCandy(); return; }        // 🍬 사탕 칩(POLISH-1)
  if(p.y>LOGH-28&&p.x>LOGW-130){ RPG.ui="confirm"; return; }                      // 🚪 나가기(POLISH-1)
  if(dist(p.x,p.y,LOGW-92,LOGH-96)<50){ RPG.touch.atkId=id; RPG.touch.atkHold=true; rpgAttack(); return; }   // ⚔(홀드=연속공격 §4.7)
  if(dist(p.x,p.y,LOGW-198,LOGH-76)<36){ rpgCastX(); return; }                    // ✨ X 스킬
  if(dist(p.x,p.y,LOGW-198,LOGH-160)<36){ rpgCastC(); return; }                   // 💨 C 질주
  if(RPG.ctxTarget&&dist(p.x,p.y,LOGW-92,LOGH-208)<44){ rpgInteract(); return; }  // 문맥 버튼(적은 절대 미포함)
  if(p.x<LOGW/2&&RPG.touch.moveId===null){ RPG.touch.moveId=id; RPG.touch.anchor=p; RPG.touch.vec={x:0,y:0}; }
}
function rpgTouchMove(id,p){
  if(!RPG) return;
  if(RPG.touch.sc&&id===RPG.touch.sc.id){   // POLISH-1: 상점/가방 스와이프 스크롤
    const dr=Math.round((RPG.touch.sc.y0-p.y)/46);
    if(RPG.ui==="shop"&&RPG.shop) RPG.shop.scroll=clamp(RPG.touch.sc.base+dr,0,Math.max(0,rpgShopRows().length-7));
    else if(RPG.ui==="inven"&&RPG.inven&&(RPG.inven.tab||0)===0) RPG.inven.scroll=clamp(RPG.touch.sc.base+dr,0,Math.max(0,rpgInvenView().length-8));
  }
  if(id===RPG.touch.moveId) RPG.touch.vec=stickVec(RPG.touch.anchor,p,60);
}
function rpgTouchEnd(id){
  if(!RPG) return;
  if(id===RPG.touch.moveId){ RPG.touch.moveId=null; RPG.touch.vec={x:0,y:0}; }
  if(id===RPG.touch.atkId){ RPG.touch.atkId=null; RPG.touch.atkHold=false; }
  if(RPG.touch.sc&&id===RPG.touch.sc.id) RPG.touch.sc=null;
}
function rpgShopTap(p){
  const PX=240,PY=110,PW=800,PH=500, sh=RPG.shop;
  if(p.x<PX||p.x>PX+PW||p.y<PY||p.y>PY+PH){ RPG.ui="field"; RPG.shop=null; return; }
  if(p.y<PY+64){
    if(p.x<PX+170){ sh.tab="buy"; sh.idx=0; }
    else if(p.x<PX+340){ sh.tab="sell"; sh.idx=0; }
    else if(p.x>PX+PW-70){ RPG.ui="field"; RPG.shop=null; }
    return;
  }
  if(sh.tab==="sell"&&p.y>PY+PH-58&&p.x<PX+264){ rpgSellAllCrops(); sh.idx=0; return; }
  if(sh.tab==="sell"&&p.y>PY+PH-58&&p.x>=PX+264&&p.x<PX+520){ rpgSellAllMats(); sh.idx=0; return; }
  const rows=rpgShopRows(), i=Math.floor((p.y-(PY+76))/46)+(sh.scroll||0);
  if(i>=0&&i<rows.length){
    if(sh.idx===i){ if(sh.tab==="buy") rpgShopBuy(rows[i]); else rpgShopSell(rows[i]); }   // 더블탭=실행(오조작 방지)
    else sh.idx=i;
  }
}

/* ── 업데이트 ── */
function rpgUpdate(dt){
  if(!RPG) return;
  const sv=RPG.save;
  if(RPG.banner&&(RPG.banner.t-=dt)<=0) RPG.banner=null;   // 보상 배너 수명(POLISH-1)
  if(RPG.ui==="dialog"&&RPG.dialog){
    const d=RPG.dialog, cur=d.lines[d.idx]||"";
    if(d.chars<cur.length) d.chars=Math.min(cur.length, d.chars+RPG_CONST.TYPE_CPS*dt);
    else if(d.pendChoice&&d.idx===d.lines.length-1&&!d.choice){ d.choice={ opts:d.pendChoice.opts, idx:0, cb:d.pendChoice.cb }; d.pendChoice=null; }
    return;
  }
  if(RPG.ui==="sleep"&&RPG.sleep){
    RPG.sleep.t+=dt;
    if(RPG.sleep.t>0.8&&!RPG.sleep.done){ RPG.sleep.done=true; sv.day++; sv.hp=rpgMaxHpFor(sv); rpgOnDayAdvance(); rpgPersist(); }
    if(RPG.sleep.t>3.0){ RPG.ui="field"; RPG.sleep=null; showToast("🌙 푹 잤다! "+sv.day+"일차 아침"); }   // POLISH-2: 요약 카드 시간 포함
    return;
  }
  if(RPG.ui!=="field"){ RPG.p.moving=false; return; }
  sv.playSec=(sv.playSec||0)+dt;   // POLISH-1: 리스폰 시계 — 필드에서만 누적(교실 공정성)
  RPG.p.candyCd=Math.max(0,(RPG.p.candyCd||0)-dt);
  RPG.p.squashT=Math.max(0,(RPG.p.squashT||0)-dt);
  RPG.vignT=Math.max(0,(RPG.vignT||0)-dt); RPG.shakeT=Math.max(0,(RPG.shakeT||0)-dt);   // 비네트·흔들림 감쇠(POLISH-2)
  if(RPG.swing&&(RPG.swing.t-=dt)<=0) RPG.swing=null;
  if((RPG.hitstop||0)>0){ RPG.hitstop=Math.max(0,RPG.hitstop-dt); return; }   // 히트스톱: 월드 정지(주스 ②)
  let mx=0,my=0;
  if(keysDown.has("ArrowUp")||keysDown.has("KeyW")) my-=1;
  if(keysDown.has("ArrowDown")||keysDown.has("KeyS")) my+=1;
  if(keysDown.has("ArrowLeft")||keysDown.has("KeyA")) mx-=1;
  if(keysDown.has("ArrowRight")||keysDown.has("KeyD")) mx+=1;
  mx+=RPG.touch.vec.x; my+=RPG.touch.vec.y;
  rpgMove(dt,mx,my);
  rpgCheckWarp();
  if(!RPG) return;   // 워프 중 rpgExit 가능성 방어
  rpgCamUpdate(dt);   // EXPLORE-1: 추적 카메라(워프 직후엔 rpgLoadMap이 이미 스냅)
  rpgScanContext();
  // ── 전투 타이머·공격(Z 홀드 자동공격 §4.7) ──
  const p=RPG.p;
  p.attackCd=Math.max(0,p.attackCd-dt); p.invulT=Math.max(0,p.invulT-dt);
  p.dashT=Math.max(0,(p.dashT||0)-dt); p.dashInvulT=Math.max(0,(p.dashInvulT||0)-dt);
  p.skillCd=Math.max(0,(p.skillCd||0)-dt); p.attackT=Math.max(0,(p.attackT||0)-dt);
  if(keysDown.has("KeyZ")||RPG.touch.atkHold) rpgAttack();
  for(const mob of RPG.mobs){ if(!mob.dead) rpgMobUpdate(mob,dt); }
  if(!RPG) return;   // 피격 사망 → rpgDie가 맵을 갈아치울 수 있음
  rpgBulletsUpdate(dt);
  for(const d of RPG.drops){
    if(d.got) continue;
    const dd=dist(p.x,p.y,d.x,d.y);
    if(dd<RPG_CONST.DROP_MAGNET&&dd>1){ const pull=(1-dd/RPG_CONST.DROP_MAGNET)*520+140;   // 드랍 자석(주스 ⑤)
      d.x+=(p.x-d.x)/dd*pull*dt; d.y+=(p.y-d.y)/dd*pull*dt; }
    if(dd<32){ d.got=true; rpgInvAdd(d.itemId,1); playSfx("pick");
      RPG.fx.push({x:d.x,y:d.y-20,t:0.9,text:"+"+rpgNameOf(d.itemId),color:"#8fd0ff"}); }
  }
  RPG.drops=RPG.drops.filter(d=>!d.got);
  for(const f of RPG.fx){   // fx 파티클 겸용(kind:text/dot/star·중력 — 주스 인프라)
    f.t-=dt;
    if(f.kind==="dot"||f.kind==="star"){ f.x+=(f.vx||0)*dt; f.y+=(f.vy||0)*dt; f.vy=(f.vy||0)+(f.g||0)*dt; }
    else f.y-=22*dt;
  }
  RPG.fx=RPG.fx.filter(f=>f.t>0);
  if(RPG.fx.length>120) RPG.fx.splice(0,RPG.fx.length-120);   // 상한 120
  if(RPG.map.id==="rpg_village"&&sv.flags.raidOn&&rpgQuestActive("mq06")) rpgRaidLights(dt);   // 교차점 3: 빛나무 조명
  RPG.p.hurtT=Math.max(0,(RPG.p.hurtT||0)-dt);
  if(RPG.p.hurtT<=0){ const mh=rpgMaxHpFor(sv); if(sv.hp<mh) sv.hp=Math.min(mh, sv.hp+rpgRegenPS()*dt); }   // §4.1 비전투 회복(장비·패시브 반영)
  RPG.autosaveT+=dt;
  if(RPG.autosaveT>=RPG_CONST.AUTOSAVE_IV){ RPG.autosaveT=0; rpgPersist(); }   // §7.3 폴백(대화·상점 중엔 도달 안 함)
}

/* ── RPG-2 전투: 몬스터 AI 8패턴·호 판정·근접 기습·탄/부메랑(패턴 이식 — 아레나 비호출)·드랍·스킬 ── */
const RPG_MOB_FACE={ mob_jelly:["🫥","#4a4468"], mob_hornhop:["🐰","#8a6dbb"], mob_seedgunner:["🌰","#7a8a4a"],
  mob_thorn:["🦔","#5f7a52"], mob_busuri:["🪣","#6d7f9b"], mob_moonowl:["🦉","#8a7dbb"],
  mob_shade:["👤","#3a3454"], mob_boss_munge:["☁️","#454060"] };
let _rpgMobSeq=0;
function rpgMakeMob(def,x,y){
  return { uid:(++_rpgMobSeq), def:def, id:def.id, x:x, y:y, hx:x, hy:y, hp:def.hp, maxHp:def.hp,
    r:def.isBoss?44:16, facing:rand(0,Math.PI*2), state:"idle", t:rand(0.2,1),
    fireCd:rand(0.8,1.8), touchCd:0, dashCd:0, blinkCd:0, warnT:0, dashVx:0, dashVy:0,
    hitT:0, dead:false, summonCd:6, phase:0 };
}
function rpgMobHas(mob,pat){ return ((mob._patterns)||mob.def.pattern||[]).indexOf(pat)>=0; }   // 보스는 페이즈별 패턴 오버라이드
function rpgMobMove(mob,dx,dy,dt,spd,ghost){
  const l=Math.hypot(dx,dy); if(l<1||spd<=0) return;
  mob.facing=Math.atan2(dy,dx);
  const nx=mob.x+dx/l*spd*dt, ny=mob.y+dy/l*spd*dt;
  if(ghost){ mob.x=clamp(nx,20,RPG.cols*56-20); mob.y=clamp(ny,20,RPG.rows*56-20); return; }
  if(!rpgCollides(nx,mob.y,mob.r)) mob.x=nx;
  if(!rpgCollides(mob.x,ny,mob.r)) mob.y=ny;
}
function rpgMobUpdate(mob,dt){
  const p=RPG.p, def=mob.def, args=def.patternArgs||{};
  mob.touchCd=Math.max(0,mob.touchCd-dt); mob.hitT=Math.max(0,mob.hitT-dt); mob.blinkCd=Math.max(0,mob.blinkCd-dt);
  if(def.isBoss&&def.phases){   // 보스 3페이즈(§3.2): 패턴 확장·소환·먹구름 장막
    const ratio=mob.hp/mob.maxHp;
    let ph=def.phases.length-1;
    for(let i=0;i<def.phases.length;i++){ if(ratio>def.phases[i].hpAbove){ ph=i; break; } }
    if(ph!==mob.phase){
      mob.phase=ph;
      const bl=(rpgDb().dialogs.boss||{})["phase"+(ph+1)];
      if(bl&&bl.length) showToast("☁️ "+bl[0]);
      playSfx("hit");
    }
    mob._patterns=def.phases[ph].patterns||def.pattern;
    RPG.veil=(mob._patterns.indexOf("cloudVeil")>=0);
    const sm=def.phases[ph].summon;
    if(sm){
      mob.summonCd-=dt;
      if(mob.summonCd<=0){
        mob.summonCd=sm.cd||12;
        const live=RPG.mobs.filter(m2=>!m2.dead&&!m2.def.isBoss).length;
        for(let k=0;k<sm.count&&(live+k)<5;k++){ const d3=rpgFind("monsters",sm.monsterId);
          if(d3) RPG.mobs.push(rpgMakeMob(d3, clamp(mob.x+rand(-90,90),40,RPG.cols*56-40), clamp(mob.y+rand(40,100),40,RPG.rows*56-40))); }
        RPG.fx.push({x:mob.x,y:mob.y-60,t:0.8,text:"☁️ 소환!",color:"#b39ddb"});
      }
    }
  }
  if(mob.kbx||mob.kby){   // POLISH-1 넉백: 감쇠·벽 침투 불가
    const kx=mob.x+mob.kbx*dt, ky=mob.y+mob.kby*dt;
    if(!rpgCollides(kx,mob.y,mob.r)) mob.x=kx;
    if(!rpgCollides(mob.x,ky,mob.r)) mob.y=ky;
    const dk=Math.max(0,1-9*dt); mob.kbx*=dk; mob.kby*=dk;
    if(Math.hypot(mob.kbx,mob.kby)<10){ mob.kbx=0; mob.kby=0; }
  }
  const dP=dist(mob.x,mob.y,p.x,p.y), ghost=rpgMobHas(mob,"ghost");
  const AGGRO=def.isBoss?9999:(RPG.p.warpLock?RPG_CONST.WARP_AGGRO:RPG_CONST.AGGRO);   // POLISH-1: 워프 직후 기습 방지(340→120)
  if(dP<AGGRO&&!RPG.save.flags["met_"+def.id]){   // 첫 조우 — 도감 인지 계층(이름표 §1)
    RPG.save.flags["met_"+def.id]=1;
    showToast("📖 새 몬스터 발견: "+def.name);
  }
  if(rpgMobHas(mob,"dash")){
    mob.dashCd=Math.max(0,mob.dashCd-dt);
    if(mob.state==="warn"){
      mob.warnT-=dt;
      if(mob.warnT<=0){ mob.state="dash"; mob.t=0.45;
        const a=Math.atan2(p.y-mob.y,p.x-mob.x);
        mob.dashVx=Math.cos(a)*(args.dashSpeed||420); mob.dashVy=Math.sin(a)*(args.dashSpeed||420); mob.facing=a; }
    } else if(mob.state==="dash"){
      mob.t-=dt;
      const nx=mob.x+mob.dashVx*dt, ny=mob.y+mob.dashVy*dt;
      if(!rpgCollides(nx,mob.y,mob.r)) mob.x=nx; else mob.t=0;
      if(!rpgCollides(mob.x,ny,mob.r)) mob.y=ny; else mob.t=0;
      if(mob.t<=0){ mob.state="idle"; mob.dashCd=args.dashCd||3; }
    } else {
      if(dP<AGGRO&&mob.dashCd<=0&&dP>90){ mob.state="warn"; mob.warnT=args.warn||0.7; }
      else if(dP<AGGRO&&dP>mob.r+20) rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,def.speed*0.6,ghost);
    }
  } else if(rpgMobHas(mob,"hop")){
    mob.t-=dt;
    if(mob.state==="hop"){ rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,args.hopSpeed||240,ghost);
      if(mob.t<=0){ mob.state="idle"; mob.t=args.restTime||0.85; } }
    else if(mob.t<=0&&dP<AGGRO){ mob.state="hop"; mob.t=args.hopTime||0.35; }
  } else if(rpgMobHas(mob,"turret")){ /* 붙박이 */ }
  else if(rpgMobHas(mob,"chase")||ghost){
    if(dP<AGGRO&&dP>mob.r+12) rpgMobMove(mob,p.x-mob.x,p.y-mob.y,dt,def.speed,ghost);
    else if(dP>=AGGRO&&dist(mob.x,mob.y,mob.hx,mob.hy)>40) rpgMobMove(mob,mob.hx-mob.x,mob.hy-mob.y,dt,def.speed*0.5,ghost);
  }
  if(rpgMobHas(mob,"turret")||rpgMobHas(mob,"fan")){   // 원거리 발사(터릿·부채탄)
    mob.fireCd-=dt;
    const rng=args.range||380;
    if(mob.fireCd<=0&&dP<rng+90){
      mob.fireCd=args.fireCd||2;
      const base=Math.atan2(p.y-mob.y,p.x-mob.x); mob.facing=base;
      const n=rpgMobHas(mob,"fan")?(args.fanCount||3):1, spread=deg2rad(args.fanDeg||0);
      for(let i=0;i<n;i++){
        const a=base+(n>1?(-spread/2+spread*i/(n-1)):0);
        RPG.bullets.push({ from:"m", x:mob.x, y:mob.y, vx:Math.cos(a)*(args.bulletSpeed||250), vy:Math.sin(a)*(args.bulletSpeed||250),
          dmg:(def.isBoss?(args.bulletDmg||def.atk):def.atk), traveled:0, range:rng+140, r:7 });
      }
      playSfx("shoot");
    }
  }
  if(dP<mob.r+RPG_CONST.PLAYER_R&&mob.touchCd<=0){   // 접촉 피해(탄/타격 1회 기준 — 헌장 §0.4)
    rpgHurtPlayer((mob.state==="dash"&&def.isBoss)?(args.dashDmg||def.atk):def.atk);
    mob.touchCd=0.8;
  }
}
function rpgWeapon(){ return rpgFind("weapons",RPG.save.equip.weapon)||rpgFind("weapons","wp_fist"); }
function rpgAtkPower(){ return RPG_CONST.BASE_ATK+RPG_CONST.ATK_PER_LV*(RPG.save.level-1); }
function rpgJobMod(k,dflt){ const j=rpgFind("jobs",RPG.save.jobId); return (j&&j.statMods&&j.statMods[k])||dflt; }
function rpgDef(){ let d=0; for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.defAdd) d+=a.defAdd; } return d; }
function rpgSpdMul(){
  let m2=1;
  if(RPG){ for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.spdMul) m2*=a.spdMul; }
    m2*=rpgJobMod("spdMul",1);
    if((RPG.p.dashT||0)>0) m2*=1.45; }   // 반짝 질주(§4.5)
  return m2;
}
function rpgRegenPS(){ let ps=RPG_CONST.REGEN_PS; for(const s of ["body","charm"]){ const a=rpgFind("armors",RPG.save.equip[s]); if(a&&a.regenAdd) ps+=a.regenAdd; }
  const rsk=rpgFind("skills","sk_starlight_regen");   // B-14: regenTo 데이터 사용(하드코딩 12 제거)
  if(rsk&&RPG.save.skills.indexOf(rsk.id)>=0) ps=Math.max(ps, rsk.regenTo||12);
  return ps; }
function rpgRegenDelay(){ return RPG.save.skills.indexOf("sk_starlight_regen")>=0?2:RPG_CONST.REGEN_DELAY; }
function rpgAutoAim(rangePx){   // 소프트 오토타겟: 바라보는 방향 ±40° 최근접(§4.7), 없으면 초근접 80px
  const p=RPG.p; let best=null, bd=1e9;
  for(const mob of RPG.mobs){ if(mob.dead) continue;
    const d=dist(p.x,p.y,mob.x,mob.y); if(d>rangePx) continue;
    let da=Math.atan2(mob.y-p.y,mob.x-p.x)-p.facing; da=Math.atan2(Math.sin(da),Math.cos(da));
    if(Math.abs(da)>deg2rad(40)) continue;
    if(d<bd){ bd=d; best=mob; } }
  if(!best){ for(const mob of RPG.mobs){ if(mob.dead) continue; const d=dist(p.x,p.y,mob.x,mob.y); if(d<80&&d<bd){ bd=d; best=mob; } } }
  return best;
}
function rpgAttack(){
  const p=RPG.p, w=rpgWeapon();
  if(p.attackCd>0||RPG.ui!=="field") return;
  p.attackCd=w.cd; p.attackT=0.18;
  p.hurtT=Math.max(p.hurtT||0, rpgRegenDelay());   // POLISH-1: 공격도 회복 리셋(전투 중 회복=사탕뿐)
  const rngMul=rpgJobMod("rangeMul",1);
  if(w.kind==="melee"){
    const tgt=rpgAutoAim((w.range+34)*rngMul); if(tgt) p.facing=Math.atan2(tgt.y-p.y,tgt.x-p.x);
    playSfx("shoot");
    const arc=deg2rad(w.arcDeg||90)/2, rng=(w.range+16)*rngMul;
    RPG.swing={ t:0.16, dir:p.facing, arc:arc, rng:rng };   // 근접 스윙 궤적(주스 ①)
    for(const mob of RPG.mobs){
      if(mob.dead) continue;
      const d=dist(p.x,p.y,mob.x,mob.y); if(d>rng+mob.r) continue;
      let da=Math.atan2(mob.y-p.y,mob.x-p.x)-p.facing; da=Math.atan2(Math.sin(da),Math.cos(da));
      if(Math.abs(da)>arc) continue;
      rpgHitMob(mob,(w.dmg+rpgAtkPower())*rpgJobMod("meleeDmgMul",1));
    }
  } else {
    const tgt=rpgAutoAim(w.range*rngMul*1.15); const a=tgt?Math.atan2(tgt.y-p.y,tgt.x-p.x):p.facing;
    p.facing=a; playSfx("shoot");
    const upMul=(w.kind==="boomerang")?(1+0.1*(RPG.save.flags.boomerUp||0)):1;   // 대장간 강화(제작 시 승계 §3.1)
    RPG.bullets.push({ from:"p", boomer:(w.kind==="boomerang"), phase:"out", hitOnce:{},
      x:p.x, y:p.y, vx:Math.cos(a)*(w.bulletSpeed||400), vy:Math.sin(a)*(w.bulletSpeed||400),
      dmg:(w.dmg+rpgAtkPower())*rpgJobMod("rangedDmgMul",1)*upMul, traveled:0, range:w.range*rngMul,
      r:8*(((RPG.save.flags.boomerUp||0)>=2&&w.kind==="boomerang")?1.1:1) });
  }
}
function rpgHitMob(mob,dmg,opt){
  const def=mob.def, args=def.patternArgs||{};
  let mul=1;
  // 근접 기습(§4.4 — 위치각 기반 신규 판정: 몬스터가 보는 방향의 등 뒤에서 때리면 +20%). 빛나무 조명 등 환경 피해는 제외.
  let rel=Math.atan2(RPG.p.y-mob.y,RPG.p.x-mob.x)-mob.facing; rel=Math.atan2(Math.sin(rel),Math.cos(rel));
  const behind=Math.abs(rel)>deg2rad(120);
  if(behind&&!(opt&&opt.noAmbush)&&RPG.save.skills.indexOf("sk_ambush")>=0) mul*=1.2;
  if(rpgMobHas(mob,"frontGuard")&&Math.abs(rel)<deg2rad((args.guardDeg||120)/2)) mul*=(1-(args.guardReduce||0.6));   // 정면 가드(기습 교보재)
  const final=Math.max(1,Math.round(dmg*mul));
  mob.hp-=final; mob.hitT=0.15;
  const ambushed=behind&&!(opt&&opt.noAmbush)&&RPG.save.skills.indexOf("sk_ambush")>=0;
  if(!(opt&&opt.noJuice)){   // POLISH-1 주스: 히트스톱(명중 0.03/기습 0.05) + 넉백(140/기습 200, 보스 제외)
    RPG.hitstop=Math.max(RPG.hitstop||0, ambushed?0.05:0.03);
    if(def.isBoss) RPG.shakeT=0.18;   // POLISH-2: 화면 흔들림(보스 한정·B콘솔 토글)
    if(!def.isBoss){
      const kb=ambushed?200:140, ka=Math.atan2(mob.y-RPG.p.y,mob.x-RPG.p.x);
      mob.kbx=(mob.kbx||0)+Math.cos(ka)*kb; mob.kby=(mob.kby||0)+Math.sin(ka)*kb;
    }
  }
  RPG.fx.push({x:mob.x+rand(-10,10),y:mob.y-26,t:0.7,text:""+final,color:behind?"#ffd93d":"#ffffff",size:ambushed?20:16});   // 기습 숫자 강조+산포(POLISH-2)
  if(RPG.save.skills.indexOf("sk_sparkle_dash")>=0){ const g=rpgFind("skills","sk_sparkle_dash"); RPG.gauge=Math.min((g.gauge&&g.gauge.max)||100,(RPG.gauge||0)+((g.gauge&&g.gauge.perHit)||12)); }
  if(rpgMobHas(mob,"blink")&&mob.hp>0&&mob.blinkCd<=0){   // 피격 순간이동(신규 프리미티브)
    mob.blinkCd=args.blinkCd||3;
    const a=rand(0,Math.PI*2), d2=args.blinkDist||160;
    const nx=clamp(mob.x+Math.cos(a)*d2,30,RPG.cols*56-30), ny=clamp(mob.y+Math.sin(a)*d2,30,RPG.rows*56-30);
    if(!rpgCollides(nx,ny,mob.r)){ mob.x=nx; mob.y=ny; RPG.fx.push({x:mob.x,y:mob.y,t:0.5,text:"휙!",color:"#b39ddb"}); }
  }
  if(mob.hp<=0) rpgKillMob(mob);
}
function rpgPityTargets(){   // POLISH-1: 활성 collect 퀘스트 대상 아이템(pity 드랍 대상)
  const t={}, sv=RPG.save;
  for(const qid in sv.quests.active){ const q=rpgQuestRec(qid); if(q&&q.goal.type==="collect") t[q.goal.target]=1; }
  return t;
}
function rpgKillMob(mob){
  mob.dead=true; playSfx("clear");
  const def=mob.def, sv=RPG.save;

  const n=def.isBoss?18:6;   // 별가루 귀환 — 별 파티클(주스 ⑥)
  for(let i=0;i<n;i++){ const a=rand(0,Math.PI*2), sp=rand(60,190);
    RPG.fx.push({kind:"star",x:mob.x,y:mob.y-8,t:rand(0.45,0.9),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-70,g:280,color:"#ffe066",size:def.isBoss?18:13}); }
  RPG.hitstop=Math.max(RPG.hitstop||0, def.isBoss?0.22:0.08);   // 히트스톱(처치/보스)
  if(def.isBoss) RPG.veil=false;   // B-1: 격파 후 먹구름 장막 해제
  if(def.isBoss&&rpgQuestDone("mq07")){   // POLISH-3: 재도전 보상(퀘스트 없이 골드+기록)
    sv.flags.bossRematchDay=sv.day;
    rpgAddGold(150); rpgBanner("👑 뭉게대왕 재격파! +150G");
  }
  const g=Math.round(rand(def.gold[0]||0,def.gold[1]||0));
  if(g>0){ rpgAddGold(g); RPG.fx.push({x:mob.x,y:mob.y-42,t:0.9,text:"+"+g+"G",color:"#ffd93d"}); }
  const pt=rpgPityTargets();
  for(const d of (def.drops||[])){   // pity: 퀘스트 대상 확률 2배 + 3킬 연속 미드랍 시 확정
    const isP=pt[d.itemId];
    let hit=Math.random()<(isP?Math.min(1,d.chance*2):d.chance);
    if(isP){
      if(!hit&&(sv.pity[d.itemId]||0)>=3) hit=true;
      sv.pity[d.itemId]=hit?0:((sv.pity[d.itemId]||0)+1);
    }
    if(hit) RPG.drops.push({itemId:d.itemId,x:mob.x+rand(-16,16),y:mob.y+rand(-8,18)});
  }
  sv.kills[def.id]=(sv.kills[def.id]||0)+1;   // 도감 데이터 원천(§7.3)
  if(sv.today) sv.today.kills++;   // POLISH-2: 하루 요약
  if(mob.eliteDay) sv.flags.eliteDown=sv.day;   // 정예 별그늘: 오늘 처치 기록
  const kc=sv.kills[def.id];   // 도감 별점(10킬 ⭐/30킬 ⭐⭐) + 칭호
  if(kc===10||kc===30){
    rpgBanner("📖 도감 "+def.name+" "+(kc===30?"⭐⭐":"⭐")+" 달성!");
    if(kc===30&&!sv.flags.title){
      const base=RPG_DB.monsters.filter(m=>!m.isBoss);
      if(base.every(m=>(sv.kills[m.id]||0)>=30)){ sv.flags.title="들판의 파수꾼"; rpgBanner("🏅 칭호 획득: 들판의 파수꾼!"); }
    }
  }
  rpgAddExp(def.exp);
  rpgQuestOnKill(def.id);   // 퀘스트·전직 시험 훅(3b 엔진)
  rpgDailyOnKill(def.id);   // POLISH-2: 일일 의뢰 진행
}
function rpgBulletsUpdate(dt){
  const p=RPG.p;
  for(const b of RPG.bullets){
    if(b.dead) continue;
    if(b.from==="p"){
      if(b.boomer&&b.phase==="back"){
        const a=Math.atan2(p.y-b.y,p.x-b.x), sp=Math.hypot(b.vx,b.vy);
        b.x+=Math.cos(a)*sp*dt; b.y+=Math.sin(a)*sp*dt;
        if(dist(b.x,b.y,p.x,p.y)<26){ b.dead=true; continue; }
      } else {
        b.x+=b.vx*dt; b.y+=b.vy*dt; b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
        const blocked=rpgCollides(b.x,b.y,4);
        if(b.traveled>=b.range||blocked){
          if(b.boomer){ b.phase="back"; b.hitOnce={}; }   // 복귀 시 히트 초기화 = 왕복 2타(§4.4)
          else b.dead=true;
        }
      }
      if(!b.dead){
        for(const mob of RPG.mobs){
          if(mob.dead||b.hitOnce[mob.uid]) continue;
          if(dist(b.x,b.y,mob.x,mob.y)<mob.r+b.r){
            b.hitOnce[mob.uid]=1; rpgHitMob(mob,b.dmg);
            if(!b.boomer){ b.dead=true; break; }
          }
        }
      }
    } else {
      b.x+=b.vx*dt; b.y+=b.vy*dt; b.traveled+=Math.hypot(b.vx*dt,b.vy*dt);
      if(b.traveled>=b.range||rpgCollides(b.x,b.y,4)) b.dead=true;
      else if(dist(b.x,b.y,p.x,p.y)<b.r+RPG_CONST.PLAYER_R){ rpgHurtPlayer(b.dmg); b.dead=true; }
    }
  }
  RPG.bullets=RPG.bullets.filter(b=>!b.dead);
}
function rpgHurtPlayer(dmg){
  const p=RPG.p;
  if(p.invulT>0||(p.dashInvulT||0)>0) return;
  const final=Math.max(1,Math.round(dmg-rpgDef()));
  RPG.save.hp-=final; p.hurtT=rpgRegenDelay(); p.invulT=0.6; p.squashT=0.18; RPG.vignT=0.35; playSfx("hit");   // 스쿼시+비네트(주스 ④·POLISH-2)
  RPG.fx.push({x:p.x,y:p.y-32,t:0.7,text:"−"+final,color:"#ff7b7b"});
  if(RPG.save.hp<=0) rpgDie();
}
function rpgDie(){   // §4.1: 별우물 부활 · 페널티 0 · 몬스터는 재입장 리스폰
  showToast("💫 별가루가 되어 별우물로 돌아왔다… (잃은 것 없음!)");

  RPG.save.hp=rpgMaxHpFor(RPG.save);
  rpgPersist();
}
function rpgSkillX(){ return rpgFind("skills",RPG.save.skillX); }
function rpgCastX(){
  const sk=rpgSkillX();
  if(!sk){ showToast("아직 배운 기술이 없어요 (Lv.3에 첫 기술!)"); return; }
  if((RPG.p.skillCd||0)>0) return;
  const w=rpgWeapon(), p=RPG.p;
  RPG.p.skillCd=sk.cd||5; playSfx("shoot");
  const dmg=(w.dmg+rpgAtkPower())*(sk.dmgMul||1);
  if(sk.form==="around"){
    RPG.fx.push({x:p.x,y:p.y,t:0.5,text:"🌀",color:"#8fd0ff"});
    for(const mob of RPG.mobs){ if(!mob.dead&&dist(p.x,p.y,mob.x,mob.y)<=(sk.radius||110)+mob.r) rpgHitMob(mob,dmg); }
  } else if(sk.form==="front"){
    RPG.fx.push({x:p.x+Math.cos(p.facing)*40,y:p.y+Math.sin(p.facing)*40,t:0.5,text:"💥",color:"#ffd93d"});
    for(const mob of RPG.mobs){
      if(mob.dead) continue;
      const d=dist(p.x,p.y,mob.x,mob.y); if(d>(sk.radius||120)+mob.r) continue;
      let da=Math.atan2(mob.y-p.y,mob.x-p.x)-p.facing; da=Math.atan2(Math.sin(da),Math.cos(da));
      if(Math.abs(da)>deg2rad(50)) continue;
      rpgHitMob(mob,dmg);
    }
  } else if(sk.form==="throw"){
    for(let i=-1;i<=1;i++){
      const a=p.facing+i*deg2rad(15);
      RPG.bullets.push({ from:"p", x:p.x, y:p.y, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
        dmg:Math.max(1,Math.round(dmg)), traveled:0, range:(w.range>100?w.range:300), r:8, hitOnce:{} });
    }
  }
}

function rpgInvOrder(id){   // POLISH-1: 가방 표시 정렬 — 소모품<씨앗<작물<재료<퀘스트품<무기<방어구
  const it=rpgItemAny(id)||{};
  if(it.kind==="소모품") return 0;
  if(it.kind==="seed") return 1;
  if(rpgFind("crops",id)) return 2;
  if(it.kind==="재료") return 3;
  if(it.kind==="퀘스트품") return 4;
  if(rpgFind("weapons",id)) return 5;
  if(rpgFind("armors",id)) return 6;
  return 7;
}
function rpgInvenView(){   // 뷰→원본 인덱스 매핑(사용·장착은 원본 인덱스 필수)
  return RPG.save.inventory.map(function(s,i){ return { i:i, s:s }; })
    .sort(function(a,b){ const d=rpgInvOrder(a.s.id)-rpgInvOrder(b.s.id); return d!==0?d:(a.i-b.i); });
}
function rpgInvenUse(i){
  const st=RPG.save.inventory[i]; if(!st) return;
  const id=st.id;
  if(id==="it_jelly_candy"){ rpgUseCandy(); return; }
  if(id.indexOf("seed_")===0){ showToast("씨앗은 마을 밭에서 심어요! (경작지에 서서 Space)"); return; }
  const w=rpgFind("weapons",id);
  if(w){
    if(RPG.save.level<w.levelReq){ showToast("Lv."+w.levelReq+"부터 쓸 수 있어요"); return; }
    RPG.save.equip.weapon=id; showToast("🛠️ "+w.name+" 장착!"); rpgPersist(); return;
  }
  const a=rpgFind("armors",id);

  showToast(rpgNameOf(id)+" — 지금은 사용할 수 없어요");
}

/* EXPLORE-1 추적 카메라: 목표=clamp(플레이어−뷰포트/2) · lerp(dt*CAM_LERP) · 워프/로드 즉시 스냅(멀미 4계명) */
function rpgCamTarget(){
  const c=RPG.cam;
  return { x:Math.max(0,Math.min(c.maxX,RPG.p.x-616)), y:Math.max(0,Math.min(c.maxY,RPG.p.y-288)) };
}
function rpgCamSnap(){ const t=rpgCamTarget(); RPG.cam.x=t.x; RPG.cam.y=t.y; }
function rpgCamUpdate(dt){
  const L=RPG_CONST.CAM_LERP, c=RPG.cam, t=rpgCamTarget();
  if(L<=0){ c.x=t.x; c.y=t.y; return; }
  const k=Math.min(1, dt*L);
  c.x+=(t.x-c.x)*k; c.y+=(t.y-c.y)*k;
  if(Math.abs(t.x-c.x)<0.5) c.x=t.x;
  if(Math.abs(t.y-c.y)<0.5) c.y=t.y;
}
function rpgOnScreen(x,y,m){ m=m||112; const c=RPG.cam; return x>=c.x-m-c.offX && x<=c.x+1232+m && y>=c.y-m-c.offY && y<=c.y+576+m; }
function rpgWorldBegin(){
  ctx.save();
  ctx.beginPath(); ctx.rect(24,70,1232,576); ctx.clip();   // 뷰포트 클립 — 작은 맵 여백 밖 누출 방지
  let shx=0, shy=0;
  if((RPG.shakeT||0)>0&&RPG_CONST.SHAKE_PX>0){   // POLISH-2: 보스 피격 흔들림(카메라 값 비접촉 — 렌더 오프셋만)
    const k=(RPG.shakeT/0.18)*RPG_CONST.SHAKE_PX;
    shx=Math.round(Math.sin(uiTime*91)*k); shy=Math.round(Math.cos(uiTime*77)*k);
  }
  ctx.translate(24+RPG.cam.offX-Math.round(RPG.cam.x)+shx, 70+RPG.cam.offY-Math.round(RPG.cam.y)+shy);
}
function rpgWorldEnd(){ ctx.restore(); }
function rpgBuildLayer(){   // 정적 타일 오프스크린 1회 합성(§11-4) — 별빛 로컬 에셋 우선, 없으면 절차적 폴백

  const floorColors={ village_meadow:"#2c4a2e", field_dew:"#2c4a2e", forest_rain:"#26403a",

  g.fillStyle=floorColors[theme]||"#2c4a2e"; g.fillRect(0,0,cvs.width,cvs.height);
  for(let r=0;r<RPG.rows;r++) for(let c=0;c<RPG.cols;c++){

      if(ch==="B"){ g.fillStyle="rgba(164,86,52,0.45)"; g.fillRect(x,y,56,56); }   // 건물 = 지붕 톤(울타리와 구분)

    g.font="34px sans-serif"; g.textAlign="center"; g.fillText(icon, x+28, y+40); g.textAlign="left"; }

function rpgDrawNpc(n){
  const npc=rpgFind("npcs",n.id);
  ctx.save(); ctx.translate(n.x,n.y);
  ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(0,14,16,6,0,0,Math.PI*2); ctx.fill();
  const drew=rpgSheetDraw(ctx, RPG_NPC_SHEET[n.id], -22, -30, 44, "rpg_char");   // 공개 에셋 NPC(CC0)
  if(!drew){
    ctx.fillStyle=(npc&&npc.color)||"#8fd0ff"; ctx.beginPath(); ctx.arc(0,-4,16,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.stroke();
    ctx.font="17px sans-serif"; ctx.textAlign="center"; ctx.fillText((npc&&npc.emoji)||"🙂", 0, 3);
  }
  ctx.textAlign="center";
  ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffffff"; ctx.fillText(npc?npc.name:n.id, 0, -28);
  const mk=rpgNpcMarker(n.id);   // 퀘스트 마커(❗새 부탁 · ❓보고 · …진행)
  if(mk){ ctx.font="bold 22px sans-serif";
    ctx.fillStyle=(mk==="❗")?"#ffd93d":(mk==="❓"?"#8fdba0":"#bfb6dd");
    ctx.fillText(mk, 0, -46-Math.sin(uiTime*4)*3); }
  ctx.textAlign="left"; ctx.restore();
}
function rpgDrawMob(mob){
  const face=RPG_MOB_FACE[mob.id]||["👾","#6a5f8a"], def=mob.def;
  ctx.save(); ctx.translate(mob.x,mob.y);
  ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(0,mob.r*0.8,mob.r,mob.r*0.35,0,0,Math.PI*2); ctx.fill();
  ctx.save();
  ctx.scale(mob.hitT>0?1.07:1,(mob.hitT>0?0.9:1)*(1+0.03*Math.sin(uiTime*2.2+(mob.uid||0))));   // 피격 스쿼시+유휴 호흡(주스 ④⑥)
  const img=(typeof getMonsterImage==="function")?getMonsterImage(mob.def.asset||""):null;   // 별빛 몬스터 에셋(팔레트 스왑 대상) 우선
  if(img){
    const iw=img.naturalWidth||img.width||1, ih=img.naturalHeight||img.height||1;
    const dh=mob.r*2.8, dw=dh*(iw/ih);
    if(mob.hitT>0){ try{ ctx.filter="brightness(2.4) saturate(0.5)"; }catch(e){} ctx.globalAlpha=0.9; }   // 화이트 플래시(흐려짐 역효과 교정)
    if(Math.cos(mob.facing)<0){ ctx.scale(-1,1); }
    ctx.drawImage(img, -dw/2, -dh+mob.r*0.85, dw, dh);
    if(Math.cos(mob.facing)<0){ ctx.scale(-1,1); }
    try{ ctx.filter="none"; }catch(e){}
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=(mob.hitT>0)?"#ffffff":face[1];
    ctx.beginPath(); ctx.arc(0,-4,mob.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.35)"; ctx.stroke();
    ctx.font=(mob.def.isBoss?"40px":"18px")+" sans-serif"; ctx.textAlign="center";
    ctx.fillText(face[0], 0, mob.def.isBoss?10:4);
  }
  ctx.restore();
  ctx.textAlign="center";
  if(mob.state==="warn"){ ctx.fillStyle="#ff5d5d"; ctx.font="bold 22px sans-serif"; ctx.fillText("❗", 0, -mob.r-14); }
  if(mob.hp<mob.maxHp){   // 피해 입은 몬스터만 HP바
    const w=Math.max(34,mob.r*2);
    ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(-w/2,-mob.r-10,w,5);
    ctx.fillStyle="#ff8f8f"; ctx.fillRect(-w/2,-mob.r-10,w*clamp(mob.hp/mob.maxHp,0,1),5);
  }
  // 이름표(POLISH-1 §1): 발밑 pill·상시·암색 외곽선·티어 색 — 비어그로는 알파 0.55
  const nm=(def.isBoss?"👑 ":(def.elite?"★ ":""))+def.name;
  const nmc=def.isBoss?"#ffd700":(def.elite?"#ffd93d":(def.tier>=2?"#cbb8ff":"#ffffff"));
  ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  const ntw=ctx.measureText(nm).width, ny=mob.r+6;
  ctx.globalAlpha=(dist(mob.x,mob.y,RPG.p.x,RPG.p.y)>RPG_CONST.AGGRO)?0.55:0.95;
  ctx.fillStyle="rgba(0,0,0,0.45)"; roundRect(-ntw/2-7,ny,ntw+14,17,8); ctx.fill();
  ctx.strokeStyle="#0a081a"; ctx.lineWidth=3; ctx.strokeText(nm,0,ny+13);
  ctx.fillStyle=nmc; ctx.fillText(nm,0,ny+13);
  ctx.globalAlpha=1; ctx.lineWidth=1;
  ctx.textAlign="left"; ctx.restore();
}
function rpgDrawPlayer(){
  const p=RPG.p;
  ctx.save(); ctx.translate(p.x,p.y);
  if(p.invulT>0&&(uiTime*10|0)%2===0) ctx.globalAlpha=0.45;   // 피격 무적 깜빡임
  if((p.dashT||0)>0){ ctx.strokeStyle="rgba(143,208,255,0.8)"; ctx.beginPath(); ctx.arc(0,-4,22,0,Math.PI*2); ctx.stroke(); }
  ctx.fillStyle="rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(0,13,15,6,0,0,Math.PI*2); ctx.fill();
  const _sq=(p.squashT||0)/0.18;   // 피격 스쿼시+유휴 호흡(주스 ④⑥)
  ctx.scale(1+0.12*_sq,(1-0.16*_sq)*(p.moving?1:1+0.02*Math.sin(uiTime*2.4)));
  const drew=drawCharacterSprite("student_03", 16, p.facing, { moving:p.moving, attacking:(p.attackT||0)>0 });
  if(!drew){ ctx.fillStyle="#ffd93d"; ctx.beginPath(); ctx.arc(0,-4,15,0,Math.PI*2); ctx.fill();
    ctx.font="15px sans-serif"; ctx.textAlign="center"; ctx.fillText("🐱",0,2); ctx.textAlign="left"; }
  ctx.restore();
}
function rpgTrackText(){   // §6: 활성 퀘스트 1개만 추적 — '무엇을·어디서'까지(안내 보강)
  const sv=RPG.save, q=rpgTrackQuest();
  if(!q){
    if(sv.flags.chapter1_clear) return "🎆 챕터 1 완결! 자유롭게 놀자";
    if(rpgQuestDone("mq06")&&!rpgQuestDone("sq02")&&!rpgQuestActive("sq02")&&!rpgQuestDone("mq07"))
      return "🧭 다음 부탁: 잡화점 모모에게 가 보자!";   // POLISH-1 §10: mq06→sq02 정체 폴백
    return "🌙 별빛이 흐려지고 있다…";
  }
  const g=q.goal;
  let pr="";
  if(g.type==="kill"||g.type==="harvest") pr=" "+(sv.quests.active[q.id]||0)+"/"+g.count;
  else if(g.type==="collect") pr=" "+Math.min(rpgInvCount(g.target),g.count)+"/"+g.count;
  else if(g.type==="deliver") pr=" "+Math.min(rpgInvCount(g.item),g.count)+"/"+g.count;
  if(rpgQuestFulfilled(q)){
    const rn=rpgFind("npcs",(g.type==="deliver")?g.to:(q.giver||g.target));
    return "📜 "+q.name+pr+" ✅ "+(rn?rn.name+"에게 가자!":"보고하자!");
  }
  const where=rpgQuestWhere(q);
  return "📜 "+rpgQuestTodo(q)+pr+(where?"  🧭 "+where:"");
}
