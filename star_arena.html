const ONLINE_INTERP_DELAY = 0.12;
function onlineSnapPush(buf, clock, s){ buf.push({ at:clock, s:s }); if(buf.length>4) buf.shift(); }
function onlineInterpTarget(buf, clock, pick, prev, dt){
  if(!buf.length) return prev;
  const rt=clock-ONLINE_INTERP_DELAY;
  const newest=pick(buf[buf.length-1].s);
  if(!newest) return prev;
  if(buf.length<2 || rt<=buf[0].at){   // 워밍업/스냅샷 부족 — 지수 lerp 폴백(기존 동작)
    if(!prev) return { x:newest.x, y:newest.y, facing:newest.facing||0 };
    const k=Math.min(1, dt*18);
    return { x:prev.x+(newest.x-prev.x)*k, y:prev.y+(newest.y-prev.y)*k, facing:lerpAngle(prev.facing, newest.facing||0, k) };
  }
  let a=buf[0], b=buf[buf.length-1];
  for(let i=buf.length-1;i>0;i--){ if(buf[i-1].at<=rt){ a=buf[i-1]; b=buf[i]; break; } }
  const pa=pick(a.s), pb=pick(b.s);
  if(!pa||!pb) return { x:newest.x, y:newest.y, facing:newest.facing||0 };
  const span=Math.max(0.001, b.at-a.at);
  let t=(rt-a.at)/span; if(t<0) t=0; if(t>1.4) t=1.4;
  return { x:pa.x+(pb.x-pa.x)*t, y:pa.y+(pb.y-pa.y)*t, facing:lerpAngle(pa.facing||0, pb.facing||0, Math.max(0,Math.min(1,t))) };
}
/* P1: 자기 캐릭터 연속 화해 — 70px 하드스냅(=순간이동 체감의 직접 지점) 제거.
   작은 오차(≤6px)는 무시(예측 자율), 중간 오차는 초당 4배율, 큰 오차(90px+)는 9배율로 부드럽게 흡수,
   리스폰/워프급(220px+)만 즉시 스냅. 예측-권위 물리 차이(둔화 등)도 러버밴딩 없이 녹아든다. */
function onlineReconcile(pred, auth, dt){
  const ex=auth.x-pred.x, ey=auth.y-pred.y, er=Math.hypot(ex,ey);
  if(er>220){ pred.x=auth.x; pred.y=auth.y; return; }
  if(er>6){ const k=Math.min(1, dt*(er>90?9:4)); pred.x+=ex*k; pred.y+=ey*k; }
}

// v1.26 스코프: 온라인 대전(PvP 1대1·3대3) 그룹 밑에 맵 행 · 온라인 협동(PVE)은 스테이지 고정이라 맵 없음
function onlineMenuOptions(){
  const opts=[];
  for(const m of ONLINE_MODES){ if(m.ready && m.modeType==="pvp") opts.push({ kind:"create", modeId:m.id, label:m.name+" 만들기", head:opts.length===0?"온라인 대전 — 친구와 PVP":undefined }); }
  if(opts.length) opts.push({ kind:"rule", label:"규칙" });  // BIG-BATCH-2 P2: 3대3 방 규칙(방장이 미리 고름 · 1대1은 섬멸전 고정)
  if(opts.length) opts.push({ kind:"map", label:"맵" });   // PvP 방에만 적용(방장이 미리 고름)
  let firstPve=true;
  for(const m of ONLINE_MODES){ if(m.ready && m.modeType==="pve"){ opts.push({ kind:"create", modeId:m.id, label:m.name+" 만들기", head:firstPve?"온라인 협동 — 함께 몬스터전":undefined }); firstPve=false; } }
  opts.push({ kind:"join", label:"방 코드로 입장", head:"참가" });
  opts.push({ kind:"back", label:"뒤로가기" });
  return opts;
}
function handleOnlineMenuKey(code){
  if(code==="Escape"){ goToStartScreen(); return; }
  if(!OnlineManager.available) return; // 설정 없으면 안내만(동작 없음)
  const opts=onlineMenuOptions(), n=opts.length;
  if(onlineMenuIndex>=n) onlineMenuIndex=0;
  if(code==="ArrowUp"){ onlineMenuIndex=(onlineMenuIndex+n-1)%n; return; }
  if(code==="ArrowDown"){ onlineMenuIndex=(onlineMenuIndex+1)%n; return; }
  const cur=opts[onlineMenuIndex];
  // 맵 변경은 맵 행에서만(전역 셀렉터 제거) — PVE엔 적용되지 않으므로 다른 행에선 무동작
  if(code==="ArrowLeft"){ if(cur.kind==="map") cycleMap(-1); else if(cur.kind==="rule") cycleOnlineRule(-1); return; }
  if(code==="ArrowRight"){ if(cur.kind==="map") cycleMap(1); else if(cur.kind==="rule") cycleOnlineRule(1); return; }
  if(code==="Enter"||code==="NumpadEnter"){
    if(cur.kind==="create"){ if(cur.modeId==="online1v1") doCreateRoom(); else doCreateTeamRoom(cur.modeId); }
    else if(cur.kind==="map") cycleMap(1);
    else if(cur.kind==="rule") cycleOnlineRule(1);
    else if(cur.kind==="join") doJoinAny();
    else goToStartScreen();
  }
}
/* BIG-BATCH-2 P2: 온라인 3대3 규칙 선택 — 전 규칙 온라인화(별빛 점프 제외: 그쪽 멀티=클라우드 레벨 공유) */

}

// 방 상태가 바뀔 때(주로 guest 쪽에서 호출됨)
function onRoomMetaChanged(){
  const meta=OnlineManager.meta;
  if(!meta){
    // 방이 종료/삭제됨 → 소프트락 방지: 안내 후 시작 화면으로.
    // 방은 이미 서버에서 사라졌으므로 DB에 다시 쓰지 않는다(localOnly=true → 유령 방 재생성 방지).
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_PLAYING){ showToast("방이 종료되었습니다"); OnlineManager.leaveRoom(true); goToStartScreen(); }
    return;
  }
  if(meta.status==="playing"){
    // 로비에서 시작하거나, 결과화면(ONLINE_OVER)에서 방장이 같은 방 재시작한 경우 모두 처리
    if(gameState===STATE.ONLINE_LOBBY || gameState===STATE.ONLINE_OVER){
      if(isTeamOnline()) resetTeamMatchFromRoom(); else resetOnlineMatchFromRoom();
      confirmLeave=false;
      gameState=STATE.ONLINE_PLAYING;
    }
  } else if(meta.status==="ended"){
    if(gameState===STATE.ONLINE_PLAYING || gameState===STATE.ONLINE_LOBBY){
      if(isTeamOnline()) tWinner = meta.winner || tWinner; else onlineWinner = meta.winner || onlineWinner;
      gameState=STATE.ONLINE_OVER;
    }
  }
}

/* ---- 입력 송신(throttle + 변화 시 즉시) ---- */
function readLocalInput(){
  if(confirmLeave) return emptyInput();   // 나가기 확인 중에는 이동/공격/기술 입력 무시
  // UPDATE-1 P3: 세 조작 모드를 같은 패킷 형식으로 — 소스가 달라도 host 판정 로직은 동일(동기화 안전)
  const it=getLocalIntent();
  const a=myAimAngle(it);
  const kbPick=(keysDown.has("Digit1")||keysDown.has("Numpad1"))?0
             : (keysDown.has("Digit2")||keysDown.has("Numpad2"))?1
             : (keysDown.has("Digit3")||keysDown.has("Numpad3"))?2 : -1;
  return { up:it.my<-0.35, down:it.my>0.35, left:it.mx<-0.35, right:it.mx>0.35,   // 구형 필드(하위호환·판독용)
           attack:!!it.fire,
           special:!!it.special||keysDown.has("KeyX"),      // X 특수기술(host가 edge 판정)
           ultimate:!!it.ult||keysDown.has("KeyC"),         // C 궁극기(host가 edge 판정)
           super:false,                                     // 구버전 필드(하위호환: host가 ultimate||super로 해석)
           reload:!!it.reload||keysDown.has("KeyR"),
           pick: (it.pick>=0)?it.pick:kbPick,               // PVE 강화 3택1(host 판정 · 터치는 카드 탭)
           mvx:Math.round(clamp(it.mx,-1,1)*10)/10, mvy:Math.round(clamp(it.my,-1,1)*10)/10,   // 아날로그 이동(0.1 양자화)
           aim:(a===null)?null:Math.round(a*20)/20 };       // 분리 조준각(0.05rad 양자화 — 전송량 절제)
}
function sendMyInput(dt){
  const inp=readLocalInput(), str=JSON.stringify(inp);
  onlineInputAcc+=dt;
  const btn=onlineInputBtnSig(inp), btnChanged=(btn!==onlineLastInputBtn);
  // P1: 버튼 변화=즉시 · 아날로그 변화=20Hz 캡 · 무변화=keepalive
  if(btnChanged || (str!==onlineLastInputStr && onlineInputAcc>=ONLINE_INPUT_MIN_IV) || onlineInputAcc>=ONLINE_INPUT_KEEPALIVE){
    onlineLastInputStr=str; onlineLastInputBtn=btn; onlineInputAcc=0;
    OnlineManager.writeInput(inp);
  }
}

/* ---- 업데이트 ---- */
function updateOnline(dt){
  if(isTeamOnline()){ tUpdate(dt); return; }
  // host는 자기 입력을 로컬에서 바로 쓰므로 DB에 안 보냄(낭비 방지). guest만 입력을 전송.
  if(OnlineManager.role==="guest") sendMyInput(dt);
  if(OnlineManager.role==="host") updateOnlineHost(dt);
  else updateOnlineGuest(dt);
  updateEffects(dt);
}
function updateOnlineHost(dt){
  const H=onlineFighters.host, G=onlineFighters.guest;
  if(!H||!G) return;
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.guest && OnlineManager.players.guest.connected);
  const hi=readLocalInput();
  // 상대가 끊겼으면 마지막 입력이 남아 유령처럼 계속 움직이지 않도록 입력을 비운다
  const gi = OnlineManager.opponentConnected ? (OnlineManager.onlineInput.guest || emptyInput()) : emptyInput();
  updateOnlineFighter(H, hi, dt);
  updateOnlineFighter(G, gi, dt);
  updateOnlineBullets(dt);
  tickSkillZones(dt, envOnline1v1());
  tickPowerupsHost(dt, [H, G]);
  onlineTimeLeft-=dt;
  H.displayHp=lerp(H.displayHp,H.hp,Math.min(1,dt*8)); G.displayHp=lerp(G.displayHp,G.hp,Math.min(1,dt*8));
  onlineWriteAcc+=dt;
  if(onlineWriteAcc>=1/ONLINE_STATE_FPS){ onlineWriteAcc=0; hostWriteOnlineState(); }
  if(onlineTimeLeft<=0){ onlineTimeLeft=0; hostEndOnlineMatch(); }
}
function updateOnlineGuest(dt){
  OnlineManager.opponentConnected = !!(OnlineManager.players && OnlineManager.players.host && OnlineManager.players.host.connected);
  const s=OnlineManager.onlineState;
  if(!s) return;
  // 새 스냅샷이 도착하면 탄환 뷰를 받은 값으로 갱신(권한값 기준 보정) + 페어 보간 버퍼 적재(P1)
  onlineInterpClock+=dt;
  if(s !== onlineLastStateRef){
    onlineLastStateRef=s;
    onlineSnapPush(onlineSnapBuf, onlineInterpClock, s);
    onlineBulletsView=(s.bullets||[]).map(b=>({ x:b.x, y:b.y, vx:b.vx||0, vy:b.vy||0, r:b.r, c:b.c, o:b.o, w:b.w||null }));
  }
  // 스냅샷 사이에는 탄환을 속도로 외삽해 부드럽게 진행
  for(const b of onlineBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const ownSlot = (OnlineManager.role==="host") ? "host" : "guest";
  const oppSlot = (ownSlot==="host") ? "guest" : "host";

  // 상대 캐릭터: 스냅샷 페어 보간(P1 — 패킷 지연·지터에도 등속으로 매끈)
  const op=s[oppSlot];
  if(op){
    if(!onlineRender[oppSlot] || op.dead) onlineRender[oppSlot]={ x:op.x, y:op.y, facing:op.facing||0 };
    else onlineRender[oppSlot]=onlineInterpTarget(onlineSnapBuf, onlineInterpClock, function(ss){ return ss?ss[oppSlot]:null; }, onlineRender[oppSlot], dt);
  }

  // 내 캐릭터: 로컬 입력으로 즉시 이동(예측) + 연속 화해(P1 — 70px 하드스냅=순간이동 제거)
  const mine=s[ownSlot];
  if(mine){
    if(!onlinePredict || mine.dead){
      const ch=getCharacter(mine.charId);
      onlinePredict={ x:mine.x, y:mine.y, facing:mine.facing||0, r:22, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove };
    } else {
      const inp=readLocalInput();
      predictMoveAim(onlinePredict, inp, dt);   // UPDATE-1 P3: 예측도 의도 공용(아날로그+분리 조준)
      onlineReconcile(onlinePredict, mine, dt);
    }
  }

  // 발사 예측: 내 총알을 로컬에서 즉시 보여준다(시각용; 실제 피해 판정은 호스트가 함)
  onlinePredictCd -= dt;
  const myAmmoOk = !mine || mine.am===undefined || mine.am<0 || (!mine.rl && mine.am>0);  // 탄창 0/장전중이면 예측 발사 안 함 (P0: am<0=무한탄)
  if(onlinePredict && mine && !mine.dead && getLocalIntent().fire && onlinePredictCd<=0 && myAmmoOk){   // UPDATE-1 P3: 모드 공용 발사 의도
    const w=getWeapon(selectedWeaponId), c=getCharacter(selectedCharacterId);
    const count=w.spreadCount, spread=deg2rad(w.spreadAngleDeg||0);
    const speed=GAME_CONFIG.playerBulletSpeed*c.bulletSpeedMul*w.bulletSpeedMul;
    const range=GAME_CONFIG.playerRange*w.rangeMul, radius=GAME_CONFIG.playerBulletRadius*w.bulletRadiusMul;
    for(let i=0;i<count;i++){
      let a=onlinePredict.facing; if(count>1) a=onlinePredict.facing-spread/2+spread*(i/(count-1));
      const mz=onlinePredict.r+6;
      onlinePredictBullets.push({ x:onlinePredict.x+Math.cos(a)*mz, y:onlinePredict.y+Math.sin(a)*mz,
        vx:Math.cos(a)*speed, vy:Math.sin(a)*speed, r:radius, c:w.color, w:w.id, traveled:0, maxRange:range, alive:true });
    }
    onlinePredictCd=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  }
  // 예측 총알 진행/소멸(벽·사거리·상대에 닿으면 시각적으로 사라짐)
  const oppPos=onlineRender[oppSlot];
  for(const b of onlinePredictBullets){
    if(!b.alive) continue;
    const sx=b.vx*dt, sy=b.vy*dt; b.x+=sx; b.y+=sy; b.traveled+=Math.hypot(sx,sy);
    if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){ b.alive=false; continue; }
    let wall=false; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; break; } }
    if(wall){ b.alive=false; continue; }
    if(oppPos && dist(b.x,b.y,oppPos.x,oppPos.y) < b.r+22){ b.alive=false; continue; }
    if(b.traveled>b.maxRange) b.alive=false;

}
function updateOnlineFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawnOnline(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envOnline1v1);
  // X/C: 눌림 순간(edge)만 발동 — 키를 누르고 있어도 반복 발동하지 않음(host 판정)
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp) castSpecialFor(f, envOnline1v1());
  if(ult && !f._pUlt) castUltimateFor(f, envOnline1v1(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // 빙결: 이동·공격 불가
  applyIntentMoveAim(f, input, dt);                        // UPDATE-1 P3: 아날로그 이동 + 분리 조준(구형 불리언 하위호환)
  if(input.attack && f.cooldown<=0 && canFireAmmo(f)){ fireOnlineWeapon(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}
// UPDATE-1 P3: 게스트 자기 예측용(충돌 이동만 — moveEntity 사용, moveSpeed 프로퍼티 기반)
function predictMoveAim(pr, inp, dt){
  let mx=0,my=0;
  const hasAnalog=(typeof inp.mvx==="number"||typeof inp.mvy==="number") && (Math.abs(inp.mvx||0)>0.01 || Math.abs(inp.mvy||0)>0.01);
  if(hasAnalog){ mx=clamp(inp.mvx||0,-1,1); my=clamp(inp.mvy||0,-1,1); }
  else { if(inp.up)my-=1; if(inp.down)my+=1; if(inp.left)mx-=1; if(inp.right)mx+=1; }
  const ml=Math.hypot(mx,my), hasAim=(typeof inp.aim==="number");
  if(ml>0.01){ if(ml>1){mx/=ml;my/=ml;} moveEntity(pr, mx*pr.moveSpeed*dt, my*pr.moveSpeed*dt); if(!hasAim) pr.facing=Math.atan2(my,mx); }
  if(hasAim) pr.facing=inp.aim;
}
// UPDATE-1 P3 공용: 입력 패킷 → 이동·조준. mvx/mvy(아날로그)가 있으면 우선, 없으면 구형 불리언.
// aim(라디안)이 오면 조준을 이동과 분리(마우스/터치 무빙샷) — 키보드 패킷(aim=null)은 기존처럼 이동 방향.
function applyIntentMoveAim(f, input, dt){
  let mx=0,my=0;
  // 아날로그(mvx/mvy)가 실제 값일 때만 사용 — 0,0인데 불리언이 참인 패킷(시뮬·구형 혼합)은 불리언으로(UPDATE-1 호환 수정)
  const hasAnalog=(typeof input.mvx==="number"||typeof input.mvy==="number") && (Math.abs(input.mvx||0)>0.01 || Math.abs(input.mvy||0)>0.01);
  if(hasAnalog){ mx=clamp(input.mvx||0,-1,1); my=clamp(input.mvy||0,-1,1); }
  else { if(input.up)my-=1; if(input.down)my+=1; if(input.left)mx-=1; if(input.right)mx+=1; }
  const ml=Math.hypot(mx,my), hasAim=(typeof input.aim==="number");
  if(ml>0.01){
    if(ml>1){ mx/=ml; my/=ml; }
    moveEntity(f, mx*effSpeed(f)*dt, my*effSpeed(f)*dt);
    if(!hasAim) f.facing=Math.atan2(my,mx);
  }
  if(hasAim) f.facing=input.aim;
}
// ── env 어댑터: 온라인 1v1(host 판정) ──
function envOnline1v1(){
  return {
    foes(f){ const opp=f.slot==="host"?onlineFighters.guest:onlineFighters.host;
      return (opp && !opp.dead && opp.invincibleTimer<=0) ? [{e:opp,key:opp.slot,isBoss:false,isFighter:true}] : []; },
    allies(f){ return (f && !f.dead) ? [f] : []; },        // 1v1은 자기 자신만(모아 C → 자신 회복)
    damage(f,o,dmg){ applyOnlineDamage(o.e,dmg,f.slot,true); return dmg; },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.owner=f.slot; onlineBullets.push(b); }
  };
}
function fireOnlineWeapon(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // 풀숲: 공격하면 잠시 드러남
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6, bx=f.x+Math.cos(a)*mz, by=f.y+Math.sin(a)*mz;
    const b={ x:bx,y:by,vx:Math.cos(a)*spec.speed,vy:Math.sin(a)*spec.speed,r:spec.radius,damage:spec.damage,
      owner:f.slot,color:spec.color,alive:true,traveled:0,maxRange:spec.range,aid:aid,wid:spec.wid,wref:spec.wref,age:0,
      snipe:spec.snipe||0,stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    onlineBullets.push(b);
  }
}
function updateOnlineBullets(dt){
  for(const b of onlineBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=onlineFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      const target = b.owner==="host" ? onlineFighters.guest : onlineFighters.host;
      if(target && !target.dead && target.invincibleTimer<=0 && dist(b.x,b.y,target.x,target.y)<b.r+target.r){
        if(b.boomerang){
          const hm=(b.phase==="out")?b.hitO:b.hitB;
          if(!hm[target.slot]){ hm[target.slot]=true;
            applyOnlineDamage(target,bulletHitDamage(b,target),b.owner,b.isSuper,b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color); }
          continue;                                        // 부메랑은 관통(복귀 타격)
        }
        if(b.ultCid && !canUltDamage(b.ultCid, target.slot, b.ultMaxHits||4)){ b.alive=false; break; }  // 럭키 C: 같은 대상 최대 피해 상한(로컬과 동일)
        applyOnlineDamage(target, bulletHitDamage(b,target), b.owner, b.isSuper, b.aid);
        if(b.wref) applyWeaponHitEffects(b.wref,target,b.x,b.y);
        spawnHitFx(b.x,b.y,b.wid,b.color);
        b.alive=false; break;
      }
      if(!b.boomerang && b.traveled>b.maxRange){ b.alive=false; break; }
    }
  }
  onlineBullets=onlineBullets.filter(b=>b.alive);
  if(onlineBullets.length>40) onlineBullets=onlineBullets.slice(onlineBullets.length-40); // DB payload 제한
}
function applyOnlineDamage(target, dmg, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0) return;
  dmg=incomingDamage(target, dmg);                        // 방패/질주 감소(최소 1)
  target.hp-=dmg; target.hitFlash=0.15;
  // 기본 공격(Z)만 궁극기 게이지 충전 — attackId당 같은 대상 최대 1회(=20)
  const attacker = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    const killer = fromSlot==="host" ? onlineFighters.host : onlineFighters.guest;
    if(killer) killer.score+=1;
  }
}

function myCombatStatus(){
  const sm=GAME_CONFIG.superCharge;
  const pack=(ch,ammo,reloading,sg,xc,lives)=>({ ammo:ammo, mag:(getWeapon(getWeaponForCharacter(ch.id)).magazineSize||GAME_CONFIG.magazineSize),
    reloading:reloading, sg:sg||0, superMax:sm, xc:Math.max(0,xc||0), lives:(lives===undefined||lives===null||lives<0)?null:lives,
    infAmmo:(ch.id==="student_01"),   // v1.21 럭키 패시브: HUD에 ∞ 표시
    superName:ch.ultName||ch.superName, specialName:ch.specialName||"", charName:ch.name, toolName:getWeapon(getWeaponForCharacter(ch.id)).name,
    charId:ch.id, wid:getWeaponForCharacter(ch.id), xcdMax:(getAbility(ch.id).x||{}).cd||8 });   // QUALITY-SWEEP-1: 스킬 독용
  if(isTeamOnline()){
    const slot=OnlineManager.mySlot;
    if(OnlineManager.role==="host"){ const f=tFighters[slot]; if(!f)return null;
      return pack(f.char, f.ammo, !!f.reloading, f.superGauge, f.specialCd, f.lives); }
    const st=OnlineManager.onlineState, p=st&&st.fighters&&st.fighters[slot]; if(!p)return null;
    const ch=getCharacter(tRosterCharId(slot));
    return pack(ch, (p.am==null||p.am<0)?undefined:p.am, !!p.rl, p.sg, p.xc, p.lv);   // P0: am<0=무한탄 → HUD ∞ 처리
  } else {
    const role=OnlineManager.role, meta=OnlineManager.meta||{};
    if(role==="host"){ const f=onlineFighters.host; if(!f)return null;
      return pack(f.char, f.ammo, !!f.reloading, f.superGauge, f.specialCd); }
    const st=OnlineManager.onlineState, p=st&&st[role]; if(!p)return null;
    const cid=sanitizeCharacterId(p.charId||meta.characterGuest||"student_01"); const ch=getCharacter(cid);
    return pack(ch, (p.am==null||p.am<0)?undefined:p.am, !!p.rl, p.sg, p.xc);   // P0: am<0=무한탄 → HUD ∞ 처리
  }
}

function tMakeFighter(slot, team, characterId, weaponId, isBot, idx, map){
  const lo=sanitizeLoadout(characterId, weaponId);   // 네트워크/저장 값이 잘못돼도 학생 캐릭터 + 고정 무기로 교정

  const f={ slot:slot, team:team, isBot:!!isBot, char:ch, weaponId:lo.weaponId,

    x:sp.x, y:sp.y, spawnX:base.x, spawnY:base.y, r:22, facing: team==="red"?Math.PI:0,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp, moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul,
    cooldown:0, score:0, dead:false, respawnTimer:0, invincibleTimer:0, hitFlash:0,
    reloading:false, reloadTimer:0, superGauge:0, specialCd:0,
    ai:{ fireTimer:rand(0,0.5), strafeDir:1, strafeTimer:0, reTimer:0, stuckTimer:0, stuckDir:1 } };

  f.ammo = isBot?undefined:magSizeOf(f);

  if(team==="pve") f.lives=PVE_LIVES_START;
  return f;
}
const PVE_LIVES_START=5;   // PRD 12.2: 쉬움7/보통5/어려움3 — 현재 보통 고정

/* ── PVE 개인 강화(PRD 13.2): 스테이지 종료 후 무작위 3개 중 1개 선택 ──
   현재 런에서만 유지(계정 저장 없음). 상한은 max 스택으로 강제(감소류는 PRD 상한과 일치).
   보스(5·10·15) 통과 후에는 '희귀 강화' = 같은 강화 2스택(상한 내) 1회 선택(PRD 15.6). */
const PVE_UPGRADES=[
  { id:"atk",    name:"공격 물약", desc:"Z 피해 +8%",              max:5 },
  { id:"aspd",   name:"빠른 손",   desc:"공격 간격 6% 감소",        max:5 },
  { id:"bspd",   name:"탄환 가속", desc:"탄속 +8%",                max:5 },
  { id:"range",  name:"멀리멀리",  desc:"사거리 +8%",              max:4 },
  { id:"hp",     name:"튼튼 물약", desc:"최대 체력 +10",           max:5 },
  { id:"def",    name:"방어 물약", desc:"받는 피해 6% 감소",        max:5 },
  { id:"mspd",   name:"빠른 발",   desc:"이동속도 +5%",            max:4 },
  { id:"reload", name:"빠른 장전", desc:"장전시간 10% 감소",        max:4 },
  { id:"xcd",    name:"반짝 시계", desc:"X 쿨타임 6% 감소",         max:5 },
  { id:"bsize",  name:"큰 탄환",   desc:"탄환 크기 +8%",           max:4 },
  { id:"regen",  name:"회복 별",   desc:"스테이지 시작 시 체력 15 회복", max:3 },
  // 대체 후보(PRD 19.4: 세 후보가 모두 상한일 때) — 무작위 풀에서는 제외(max 0)
  { id:"healnow", name:"체력 회복", desc:"즉시 최대 체력의 30% 회복", max:0 },
  { id:"ammonow", name:"탄창 완충", desc:"즉시 탄창을 가득 채움",     max:0 }
];
function pveUpgradeDef(id){ for(const u of PVE_UPGRADES){ if(u.id===id) return u; } return PVE_UPGRADES[0]; }
function upgStacks(f,id){ return (f && f.upg && f.upg[id])||0; }
// 강화 적용(호스트 판정). rare=2스택(상한 내). 적용된 강화 이름 반환.
function tPveApplyUpgrade(f, uid, rare){
  const def=pveUpgradeDef(uid);
  if(uid==="healnow"){ f.hp=Math.min(f.maxHp, f.hp+f.maxHp*0.3); return def.name; }
  if(uid==="ammonow"){ if(usesAmmo(f)){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } return def.name; }
  if(!f.upg) f.upg={};
  const n=rare?2:1;
  for(let i=0;i<n;i++){
    if((f.upg[uid]||0)>=def.max) break;
    f.upg[uid]=(f.upg[uid]||0)+1;
    if(uid==="hp"){ f.maxHp+=10; f.hp=Math.min(f.maxHp, f.hp+10); }
  }
  return def.name;
}
// 스테이지 클리어 → 활성 플레이어별 후보 3개 생성(상한 도달 강화 제외, 부족하면 대체 후보)
function tPveOfferUpgrades(rare){
  tPve.upg={};
  for(const s in tFighters){ const f=tFighters[s]; if(f.isBot||f.inactive) continue;
    const pool=PVE_UPGRADES.filter(u=>u.max>0 && upgStacks(f,u.id)<u.max).map(u=>u.id);
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=pool[i]; pool[i]=pool[j]; pool[j]=t; }
    const c=pool.slice(0,3);
    while(c.length<3) c.push(c.length%2===0?"healnow":"ammonow");
    tPve.upg[s]={ c:c, r:rare?1:0, picked:false, pi:-1 };
  }
}
// 전투 계산 훅(강화 없으면 1.0 — PVE 외 모드는 upg가 없어 영향 0)
function zCooldownOf(f,w){
  let c=GAME_CONFIG.playerAttackCooldown*w.cooldownMul;
  const u=upgStacks(f,"aspd"); if(u) c*=Math.max(0.7,1-0.06*u);
  c*=atkSlowFactor(f);                                              // 눈꽃 서리 존: 공격 간격 +40%
  const g=growthOf(f,"aspd"); if(g) c*=Math.max(0.6,1-GROWTH.aspdPct*g);   // GAMEPLAY-1 성장: 공속 +8%/스택
  return c;
}
// 눈꽃 서리 존 공속 둔화 계수(모든 모드 공용)
function atkSlowFactor(f){ return (f && f.atkSlowTimer>0)?(f.atkSlowMul||1.4):1; }
// GAMEPLAY-1 성장 스택(버프 오브): f.growth={aspd,atk,hp}
function growthOf(f,k){ return (f && f.growth && f.growth[k])||0; }

function tBuildFighters(){
  const meta=OnlineManager.meta||{}, mode=getOnlineMode(meta.mode), map=getMap(tMapId);
  OBSTACLES=map.obstacles; BUSHES=map.bushes;
  tFighters={};
  const players=OnlineManager.players||{};
  let blueIdx=0, redIdx=0;
  // 1) 접속한 실제 플레이어
  for(let i=1;i<=mode.maxPlayers;i++){
    const slot="p"+i, p=players[slot];
    if(p && p.connected!==false){
      let team=p.team || (i%2===1?"blue":"red");
      const idx = team==="red"?redIdx++:blueIdx++;
      tFighters[slot]=tMakeFighter(slot, team, p.characterId, p.weaponId, false, idx, map);
    }
  }
  // 2) host만 빈자리를 AI 봇으로 채운다(3대3 PVP)
  if(OnlineManager.role==="host" && mode.modeType==="pvp"){
    for(let i=1;i<=mode.maxPlayers;i++){
      const slot="p"+i; if(tFighters[slot]) continue;
      const blueCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="blue").length;
      const redCount=Object.keys(tFighters).filter(s=>tFighters[s].team==="red").length;
      let team=null;
      if(blueCount<3 && (blueCount<=redCount || redCount>=3)) team="blue";
      else if(redCount<3) team="red";
      if(!team) continue;
      const idx = team==="red"?redIdx++:blueIdx++;
      const botChar = STUDENT_CHARACTERS[i%STUDENT_CHARACTERS.length];   // 봇도 학생 6종만 + 고정 무기
      tFighters[slot]=tMakeFighter(slot, team, botChar.id, null, true, idx, map);
    }
  }
}

function tNearestEnemyFighter(f){
  let best=null, bd=Infinity;
  for(const slot in tFighters){ const o=tFighters[slot]; if(o.dead||o.team===f.team) continue;
    const d=dist(f.x,f.y,o.x,o.y); if(d<bd){bd=d; best=o;} }
  return best;
}

function tUpdateHost(dt){
  const players=OnlineManager.players||{};
  for(const slot in tFighters){
    const f=tFighters[slot];
    // 끊긴 실제 플레이어는 AI 봇이 인계(가만히 멈춰 점수 공급원이 되지 않게)
    if(!f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(!p || p.connected===false) f.isBot=true; }
    // P1b: 복귀 역전이 — 재연결로 connected가 true로 돌아오면 봇 인계 해제(원래 봇 슬롯은 players 레코드가 없어 무해)
    else if(f.isBot && slot!==OnlineManager.mySlot){ const p=players[slot]; if(p && p.connected===true && p.isBot===false) f.isBot=false; }
    if(f.isBot){ tBotUpdate(f, dt); continue; }
    let input;
    if(slot===OnlineManager.mySlot) input=readLocalInput();
    else { const p=players[slot]; const conn=p && p.connected!==false; const inp=(OnlineManager.inputs||{})[slot]; input = (conn && inp) ? inp : emptyInput(); }   // P1: inputs 노드에서
    tUpdateFighter(f, input, dt);
  }
  tUpdateBullets(dt);
  tTickRule(dt);                                           // BIG-BATCH-2 P2: 규칙 판정(host 권위)
  tickSkillZones(dt, envTeam());
  if(!(RULE&&RULE.id==="tag")) tickPowerupsHost(dt, Object.keys(tFighters).map(s=>tFighters[s]).filter(f=>!f.isBot));   // 술래: 전투 아이템 없음
  for(const slot in tFighters){ const f=tFighters[slot]; f.displayHp=lerp(f.displayHp,f.hp,Math.min(1,dt*8)); }
  if(OnlineManager.role==="host" && tFighters[OnlineManager.mySlot]) tMyTagRole=!!tFighters[OnlineManager.mySlot].isTagger;
  tTimeLeft-=dt;
  tWriteAcc+=dt; if(tWriteAcc>=1/T_STATE_FPS){ tWriteAcc=0; tHostWriteState(); }
  if(tTimeLeft<=0){ tTimeLeft=0; if(RULE) tRuleTimeUpTeam(); else tHostEndMatch(); }
}

function tUpdateFighter(f, input, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f); tickThornTrail(f);
  tickMoaPassive(f, dt, envTeam);
  // X/C: 눌림 순간(edge)만 발동(host 판정) — P2: 술래=X 오버라이드·C 잠금 / 칠하기=C 대형 도색
  const isTag=!!(RULE&&RULE.id==="tag"), isPaint=!!(RULE&&RULE.id==="paint");
  const sp=!!input.special, ult=!!(input.ultimate||input.super);
  if(sp && !f._pSp){
    if(isTag){ if(TAG_X_ALLOW[f.char.id]) castSpecialFor(f, envTeam()); else castTagSpecial(f, tFightersList()); }
    else castSpecialFor(f, envTeam());
  }
  if(ult && !f._pUlt && !isTag){
    if(isPaint){
      if((f.superGauge||0)>=GAME_CONFIG.superCharge){
        f.superGauge=0;
        const CS=STUDENT_CELL, R=RULE_CONFIG.paint.ultRadius;
        for(let dr=-R;dr<=R;dr++) for(let dc=-R;dc<=R;dc++) tPaintCellBy(f.x+dc*CS, f.y+dr*CS, f.team, f.slot);
        effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.6, radius:CS*(R+0.8)});
      }
    }
    else castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  }
  f._pSp=sp; f._pUlt=ult;
  f.cooldown-=dt;
  tickReload(f, dt);
  if(input.reload) startReload(f);
  if(isFrozen(f)) return;                                  // 빙결: 이동·공격 불가
  if(isTag && RULE.phase==="reveal") return;               // P2: 술래 공개 중 이동 잠금
  applyIntentMoveAim(f, input, dt);                        // UPDATE-1 P3: 아날로그 이동 + 분리 조준(공용)
  if(!isTag && input.attack && f.cooldown<=0 && canFireAmmo(f)){ tFire(f); consumeAmmo(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId)); }
}

// 팀(3v3)/PVE 피해·env(host 판정). 아군/끊긴 대상엔 피해·둔화·블랙홀 없음.
// 방패 블록·수정 거북: 정면 각도 안에서 받는 피해 감소(내려찍기 후 노출 시간엔 해제) — PRD 15.3/15.5
function tDamageEnemy(e, id, dmg, killer){
  if(e.frontGuard && killer && !(e.guardDownT>0)){
    const toAtk=Math.atan2(killer.y-e.y, killer.x-e.x);
    let diff=Math.abs(toAtk-e.facing); while(diff>Math.PI) diff=Math.abs(diff-Math.PI*2);
    if(diff<=deg2rad(e.frontGuard.deg)/2) dmg*=(1-e.frontGuard.reduce);
  }
  e.hp-=dmg;
  if(e.hp<=0){
    if(killer){ killer.score+=e.score;
      grantGrowth(killer, nextGrowthTypeFor(killer)); }   // GAMEPLAY-1 1D: 캠페인 성장 — 처치자에게 즉시 부여(동기화 불가침)
    if(tPve && tPve.sgStars) for(const s of tPve.sgStars) if(s.carrier===id){ s.carrier=null; s.x=e.x; s.y=e.y; }   // CAMPAIGN-2: 운반자 처치 → 별 드랍
    delete tEnemies[id];
  }
}
// ── env 어댑터: 3v3(PVP)·협동 PVE 공용 ──
function envTeam(){
  const isPve=getOnlineMode(OnlineManager.mode).modeType==="pve";
  return {
    foes(f){
      const out=[];
      if(isPve){ for(const id in tEnemies){ const e=tEnemies[id]; if(e.dead) continue; out.push({e:e,key:id,isBoss:!!e.isBoss,isFighter:false,eid:id}); } }
      else { for(const slot in tFighters){ const o=tFighters[slot]; if(o.team===f.team||o.dead||o.invincibleTimer>0||o.inactive) continue; out.push({e:o,key:slot,isBoss:false,isFighter:true}); } }
      return out;
    },
    allies(f){
      const out=[];
      for(const slot in tFighters){ const o=tFighters[slot];
        if(o.dead||o.inactive) continue;
        if(isPve || o.team===f.team) out.push(o); }        // PVE=협동 전원, 3v3=자기 팀만
      return out;
    },
    damage(f,o,dmg){
      if(o.isFighter) tApplyDamage(o.e, dmg, f.team, f.slot, true);
      else tDamageEnemy(o.e, o.eid, dmg, f);
      return dmg;
    },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){ const b=makeSkillBullet(f,spec); b.team=f.team; b.owner=f.slot; tBullets.push(b); }
  };
}

/* =======================================================================
   BIG-BATCH-2 P2 · 전 규칙 온라인화(3대3 팀 엔진 위 host 권위 규칙 레이어)
   - 로컬 RULE 전역을 재사용(팀 키: blue→player · red→enemy)해 effSpeed/렌더 헬퍼 공유
   - 동기화: 점령전=게이지 · 수정부수기=구조물 HP 목록 · 별모으기=별 좌표/보유 · 술래=역할 플래그 · 칠하기=그리드 RLE
   ======================================================================= */
function tTeamKey(team){ return (team==="blue"||team==="player")?"player":"enemy"; }
function tRuleId(){ const m=OnlineManager.meta; return (m && m.rule)||"tdm"; }
function tRuleMatchTime(rid){
  const C=RULE_CONFIG[rid];
  if(rid==="tdm") return GAME_CONFIG.gameTime;
  return (C && C.matchTime) || RULE_CONFIG.matchTime;
}
function tSetupRule(){
  RULE=null;
  const rid=tRuleId(); if(rid==="tdm") return;
  const map=getMap(tMapId);
  OBSTACLES=map.obstacles.map(o=>o.sid?Object.assign({},o):o);   // 구조물 훼손이 원본 맵에 남지 않게 복제
  const rp=map.rulePoints||{};
  if(rid==="siege"){
    const C=RULE_CONFIG.siege;
    RULE={ id:"siege", winner:null, towers:{}, turretAcc:{player:0.8, enemy:0.8}, structs:[], rebuild:[] };
    for(const tk of ["player","enemy"]){
      const sp=(tk==="player")?map.playerSpawn:map.enemySpawn;
      const dirX=(sp.x<LOGW/2)?-1:1;
      const tp=rp.towers&&rp.towers[tk];
      const tx=clamp((tp?tp.x:sp.x+dirX*110)-C.towerW/2, ARENA.x+8, ARENA.x+ARENA.w-C.towerW-8);
      const ty=clamp((tp?tp.y:sp.y)-C.towerH/2, ARENA.y+8, ARENA.y+ARENA.h-C.towerH-8);
      const tower={ x:tx, y:ty, w:C.towerW, h:C.towerH, sid:"rtower_"+tk, team:tk, hp:C.towerHp, maxHp:C.towerHp, structure:true };
      RULE.towers[tk]=tower; RULE.structs.push(tower); OBSTACLES.push(tower);
      for(let i=0;i<C.wallCount;i++){
        const wx=clamp(sp.x-dirX*130-C.wallW/2, ARENA.x+8, ARENA.x+ARENA.w-C.wallW-8);
        const wy=clamp(sp.y+(i-1)*120-C.wallH/2, ARENA.y+8, ARENA.y+ARENA.h-C.wallH-8);
        const wall={ x:wx, y:wy, w:C.wallW, h:C.wallH, sid:"rwall_"+tk+"_"+i, team:tk, hp:C.wallHp, maxHp:C.wallHp, structure:true };
        RULE.structs.push(wall); OBSTACLES.push(wall);
      }
    }
  } else if(rid==="hotzone"){
    RULE={ id:"hotzone", winner:null, x:(rp.zone&&rp.zone.x)||(ARENA.x+ARENA.w/2), y:(rp.zone&&rp.zone.y)||ARENA.y+ARENA.h/2,
           radius:RULE_CONFIG.hotzone.radius, gauge:{player:0, enemy:0}, holder:null,
           fixed:!!rp.zone, moveT:0, posIdx:0, warn:0 };
  } else if(rid==="stargrab"){
    RULE={ id:"stargrab", winner:null, stars:[], spawnAcc:RULE_CONFIG.stargrab.spawnEvery-1, countdown:{player:-1, enemy:-1},
           cx:(rp.vein&&rp.vein.x)||(ARENA.x+ARENA.w/2), cy:(rp.vein&&rp.vein.y)||ARENA.y+ARENA.h/2 };
  } else if(rid==="tag"){
    RULE={ id:"tag", winner:null, needInit:true, phase:"reveal", phaseT:RULE_CONFIG.tag.reveal, survivors:0, runnerMul:1 };
  } else if(rid==="paint"){
    const cols=(map.gridCols||STUDENT_COLS), rows=(map.gridRows||STUDENT_ROWS);   // P4: 대형 맵 그리드 확장
    const grid=new Uint8Array(cols*rows), blocked=new Uint8Array(cols*rows);
    const markRects=(rects)=>{ for(const o of (rects||[])){
      const c0=Math.max(0,Math.floor((o.x-ARENA.x)/STUDENT_CELL)), c1=Math.min(cols-1,Math.floor((o.x+o.w-1-ARENA.x)/STUDENT_CELL));
      const r0=Math.max(0,Math.floor((o.y-ARENA.y)/STUDENT_CELL)), r1=Math.min(rows-1,Math.floor((o.y+o.h-1-ARENA.y)/STUDENT_CELL));
      for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) blocked[r*cols+c]=1; } };
    markRects(OBSTACLES); markRects(map.bushes); markRects(map.traps);
    let paintable=0; for(let i=0;i<blocked.length;i++) if(!blocked[i]) paintable++;
    RULE={ id:"paint", winner:null, cols:cols, rows:rows, grid:grid, blocked:blocked, paintable:paintable,
           count:{1:0,2:0}, barT:0, bar:{p:0,e:0} };
  }
}
function tFightersList(){ const out=[]; for(const s in tFighters) out.push(tFighters[s]); return out; }
/* ── 칠하기(팀): 셀 도색 + 개인 궁 게이지 보상 ── */
function tPaintCellBy(x,y,team,ownerSlot){
  if(!RULE || RULE.id!=="paint" || RULE.winner) return false;
  const i=paintCellIdx(x,y); if(i<0 || RULE.blocked[i]) return false;
  const col=(tTeamKey(team)==="player")?1:2, prev=RULE.grid[i];
  if(prev===col) return false;
  if(prev) RULE.count[prev]--;
  RULE.grid[i]=col; RULE.count[col]++;
  const f=ownerSlot!==undefined ? tFighters[ownerSlot] : null;
  if(f && !f.isBot){
    f.myPaint=(f.myPaint||0)+1; f._pAcc=(f._pAcc||0)+1;
    if(f._pAcc>=RULE_CONFIG.paint.gaugePerCells){ f._pAcc=0;
      f.superGauge=Math.min(GAME_CONFIG.superCharge,(f.superGauge||0)+RULE_CONFIG.paint.gaugeAmt); }
  }
  return true;
}
function tPaintSplash(x,y,team,ownerSlot,shape){
  const CS=STUDENT_CELL;
  if(shape==="cross" && tTimeLeft<=RULE_CONFIG.paint.finaleSec) shape="3x3";   // 피날레(P1과 동일 규칙)
  if(shape==="cross"){ tPaintCellBy(x,y,team,ownerSlot);
    tPaintCellBy(x-CS,y,team,ownerSlot); tPaintCellBy(x+CS,y,team,ownerSlot);
    tPaintCellBy(x,y-CS,team,ownerSlot); tPaintCellBy(x,y+CS,team,ownerSlot); }
  else { for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) tPaintCellBy(x+dc*CS,y+dr*CS,team,ownerSlot); }
}
function tPaintRLE(){
  let s="", i=0;
  while(i<RULE.grid.length){ const v=RULE.grid[i]; let j=i; while(j<RULE.grid.length && RULE.grid[j]===v) j++; s+=v+"*"+(j-i)+","; i=j; }
  return s;
}
function tPaintApplyRLE(str){
  if(!str || !RULE || RULE.id!=="paint") return;
  let i=0;
  for(const seg of str.split(",")){
    if(!seg) continue;
    const p=seg.split("*"), v=+p[0], n=+p[1];
    for(let k=0;k<n && i<RULE.grid.length;k++) RULE.grid[i++]=v;
  }
  let c1=0,c2=0; for(let k=0;k<RULE.grid.length;k++){ if(RULE.grid[k]===1)c1++; else if(RULE.grid[k]===2)c2++; }
  RULE.count[1]=c1; RULE.count[2]=c2;
  RULE.bar.p=c1/Math.max(1,RULE.paintable); RULE.bar.e=c2/Math.max(1,RULE.paintable);
}
/* ── 수정부수기(팀): 구조물 피해(host) + 재건 + 승부 ── */
function tDamageRuleStruct(s, dmg){
  if(!(s.hp>0)) return;
  s.hp-=dmg;
  spawnDamageNumber(s.x+s.w/2, s.y-6, Math.round(dmg), "#ffd0a0");
  if(s.hp<=0){ s.hp=0;
    const idx=OBSTACLES.indexOf(s); if(idx>=0) OBSTACLES.splice(idx,1);
    effects.push({kind:"death",x:s.x+s.w/2,y:s.y+s.h/2,t:0,life:0.7,color:(s.team==="player"?"#7fd6ff":"#ff8fa5"),big:true});
    if(s.sid.indexOf("rtower_")===0) tRuleWinTeam(s.team==="player"?"red":"blue");
    else if(s.sid.indexOf("rwall_")===0) RULE.rebuild.push({ s:s, t:RULE_CONFIG.siege.rebuildSec });
  }
}
function tRuleWinTeam(winner){   // winner: "blue"|"red"|"draw"|"taggers"|"runners"
  if(!RULE || RULE.winner) return;
  RULE.winner=winner;
  tWinner=winner;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}
function tRuleTimeUpTeam(){
  const rid=tRuleId();
  if(rid==="siege"){
    const pct=t=>{ const tw=RULE.towers[t]; return tw?Math.max(0,tw.hp)/tw.maxHp:0; };
    tRuleWinTeam(pct("player")>pct("enemy")?"blue":(pct("enemy")>pct("player")?"red":"draw"));
  } else if(rid==="hotzone"){
    tRuleWinTeam(RULE.gauge.player>RULE.gauge.enemy?"blue":(RULE.gauge.enemy>RULE.gauge.player?"red":"draw"));
  } else if(rid==="stargrab"){
    const p=tTeamStars("blue"), e=tTeamStars("red");
    tRuleWinTeam(p>e?"blue":(e>p?"red":"draw"));
  } else if(rid==="tag"){
    tRuleWinTeam("runners");   // 시간 종료 = 생존자 승
  } else if(rid==="paint"){
    tRuleWinTeam(RULE.count[1]>RULE.count[2]?"blue":(RULE.count[2]>RULE.count[1]?"red":"draw"));
  }
}
function tTeamStars(team){ let n=0; for(const s in tFighters){ const f=tFighters[s]; if(f.team===team) n+=(f.stars||0); } return n; }
function tTickRule(dt){
  if(!RULE || RULE.winner) return;
  const rid=RULE.id, list=tFightersList();
  if(rid==="tag"){
    const C=RULE_CONFIG.tag;
    if(RULE.needInit){
      if(!list.length) return;
      RULE.needInit=false;
      tagInfect(list[Math.floor(Math.random()*list.length)], true);
      for(const f of list) if(!f.isTagger && f.char && f.char.id==="student_06") f.tagShield=1;
      return;
    }
    if(RULE.phase==="reveal"){ RULE.phaseT-=dt; if(RULE.phaseT<=0) RULE.phase="chase"; return; }
    for(const f of list){ if(f.tagCd>0) f.tagCd-=dt; }
    for(const t of list){
      if(!t.isTagger || t.dead || t.tagCd>0) continue;
      for(const r of list){
        if(r.isTagger || r.dead) continue;
        if(dist2(t.x,t.y,r.x,r.y) < (t.r+r.r)*(t.r+r.r)) tagInfect(r, false);
      }
    }
    let survivors=0; for(const f of list){ if(!f.isTagger && !f.dead) survivors++; }
    RULE.survivors=survivors;
    const taggers=list.length-survivors;
    RULE.runnerMul=1+Math.min(C.runnerBuffMax, C.runnerBuffPer*Math.max(0,taggers-1));
    if(survivors===1 && !RULE.lastOne) RULE.lastOne=true;
    if(survivors===0) tRuleWinTeam("taggers");
    return;
  }
  if(rid==="paint"){
    RULE.barT-=dt;
    if(RULE.barT<=0){ RULE.barT=0.5;
      RULE.bar.p=RULE.count[1]/Math.max(1,RULE.paintable);
      RULE.bar.e=RULE.count[2]/Math.max(1,RULE.paintable); }
    return;
  }
  if(rid==="siege"){
    const C=RULE_CONFIG.siege;
    for(let i=RULE.rebuild.length-1;i>=0;i--){
      const rb=RULE.rebuild[i]; rb.t-=dt;
      if(rb.t>0) continue;
      const s=rb.s;
      if(list.some(f=>!f.dead && circleRectOverlap(f.x,f.y,f.r,s))){ rb.t=0.5; continue; }
      s.hp=Math.round(s.maxHp*C.rebuildHpMul);
      OBSTACLES.push(s);
      effects.push({kind:"respawn", x:s.x+s.w/2, y:s.y+s.h/2, t:0, life:0.5, color:"#c9d6ff"});
      RULE.rebuild.splice(i,1);
    }
    for(const tk of ["player","enemy"]){
      const tw=RULE.towers[tk]; if(!tw || tw.hp<=0) continue;
      RULE.turretAcc[tk]-=dt;
      if(RULE.turretAcc[tk]>0) continue;
      const cx=tw.x+tw.w/2, cy=tw.y+tw.h/2, mzOff=Math.max(tw.w,tw.h)/2+12;
      let best=null, bd=C.turretRange;
      for(const f of list){ if(f.dead || f.invincibleTimer>0 || tTeamKey(f.team)===tk) continue;
        const d=dist(cx,cy,f.x,f.y); if(d>=bd) continue;
        const a0=Math.atan2(f.y-cy,f.x-cx);
        if(hasLineOfSight(cx+Math.cos(a0)*mzOff, cy+Math.sin(a0)*mzOff, f.x, f.y)){ bd=d; best=f; } }
      if(best){
        const a=Math.atan2(best.y-cy,best.x-cx), mz=Math.max(tw.w,tw.h)/2+12;
        tBullets.push({ x:cx+Math.cos(a)*mz, y:cy+Math.sin(a)*mz, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
          r:8, damage:C.turretDmg, team:(tk==="player"?"blue":"red"), owner:"turret", color:"#ffd0a0", alive:true, traveled:0,
          maxRange:C.turretRange+90, age:0, isSuper:true });
        RULE.turretAcc[tk]=C.turretCd;
      } else RULE.turretAcc[tk]=0.15;
    }
    return;
  }
  if(rid==="hotzone"){
    const C=RULE_CONFIG.hotzone;
    if(!RULE.fixed && C.moveEvery>0){
      RULE.moveT+=dt;
      RULE.warn=Math.max(0, RULE.moveT-(C.moveEvery-3));
      if(RULE.moveT>=C.moveEvery){
        RULE.moveT=0; RULE.warn=0; RULE.posIdx=(RULE.posIdx+1)%3;
        RULE.y=ARENA.y+ARENA.h*[0.5,0.25,0.75][RULE.posIdx];
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.6, radius:RULE.radius});
      }
    }
    let pIn=0, eIn=0;
    for(const f of list){ if(f.dead) continue;
      if(dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius){ if(f.team==="blue") pIn++; else eIn++; } }
    RULE.holder=(pIn&&!eIn)?"player":((eIn&&!pIn)?"enemy":((pIn&&eIn)?"contest":null));
    if(RULE.holder==="player"){ RULE.gauge.player=Math.min(C.goal, RULE.gauge.player+C.capPerSec*dt); if(RULE.gauge.player>=C.goal) tRuleWinTeam("blue"); }
    else if(RULE.holder==="enemy"){ RULE.gauge.enemy=Math.min(C.goal, RULE.gauge.enemy+C.capPerSec*dt); if(RULE.gauge.enemy>=C.goal) tRuleWinTeam("red"); }
    return;
  }
  if(rid==="stargrab"){
    const C=RULE_CONFIG.stargrab;
    RULE.spawnAcc+=dt;
    if(RULE.spawnAcc>=C.spawnEvery){
      RULE.spawnAcc=0;
      if(RULE.stars.filter(s=>s.ttl===undefined).length<C.maxOnGround){
        for(let t=0;t<12;t++){
          const x=clamp(RULE.cx+rand(-130,130), ARENA.x+30, ARENA.x+ARENA.w-30);
          const y=clamp(RULE.cy+rand(-100,100), ARENA.y+30, ARENA.y+ARENA.h-30);
          if(!OBSTACLES.some(o=>circleRectOverlap(x,y,14,o))){ RULE.stars.push({x:x,y:y}); break; }
        }
      }
    }
    for(let i=RULE.stars.length-1;i>=0;i--){
      const s=RULE.stars[i];
      if(s.ttl!==undefined){ s.ttl-=dt; if(s.ttl<=0){ RULE.stars.splice(i,1); continue; } }
      for(const f of list){ if(f.dead) continue;
        if(dist(f.x,f.y,s.x,s.y) < f.r+16){ f.stars=(f.stars||0)+1;
          effects.push({kind:"respawn",x:s.x,y:s.y,t:0,life:0.35,color:"#ffe066"});
          RULE.stars.splice(i,1); break; } }
    }
    for(const team of ["blue","red"]){
      const tk=tTeamKey(team);
      if(tTeamStars(team)>=C.goal){
        if(RULE.countdown[tk]<0) RULE.countdown[tk]=C.countdown;
        RULE.countdown[tk]-=dt;
        if(RULE.countdown[tk]<=0){ tRuleWinTeam(team); return; }
      } else RULE.countdown[tk]=-1;
    }
  }
}
/* 봇 목표 지점(규칙별): 근처에 적이 없으면 목표로 이동 */
function tRuleBotObjective(f){
  if(!RULE) return null;
  if(RULE.id==="hotzone") return { x:RULE.x, y:RULE.y, r:RULE.radius*0.55 };
  if(RULE.id==="stargrab"){
    let best=null, bd=Infinity;
    for(const s of RULE.stars){ const d=dist2(f.x,f.y,s.x,s.y); if(d<bd){ bd=d; best=s; } }
    return best ? { x:best.x, y:best.y, r:16 } : { x:RULE.cx, y:RULE.cy, r:120 };
  }
  if(RULE.id==="siege"){
    const tw=RULE.towers[tTeamKey(f.team)==="player"?"enemy":"player"];
    return (tw && tw.hp>0) ? { x:tw.x+tw.w/2, y:tw.y+tw.h/2, r:200, tower:tw } : null;
  }
  if(RULE.id==="paint"){
    const ai=(f.ai=f.ai||{});
    ai.pT=(ai.pT||0)-1/60;
    if(!ai.pGoal || ai.pT<=0){
      ai.pT=2.5;
      const myCol=(tTeamKey(f.team)==="player")?1:2;
      for(let t=0;t<24;t++){
        const c=Math.floor(Math.random()*RULE.cols), r=Math.floor(Math.random()*RULE.rows), i=r*RULE.cols+c;
        if(!RULE.blocked[i] && RULE.grid[i]!==myCol){ ai.pGoal={x:ARENA.x+c*STUDENT_CELL+28, y:ARENA.y+r*STUDENT_CELL+28}; break; }
      }
    }
    return ai.pGoal ? { x:ai.pGoal.x, y:ai.pGoal.y, r:60 } : null;
  }
  return null;
}

  else if(rid==="stargrab"){ RULE.stars=(r.st||[]).map(o=>({x:o.x,y:o.y})); RULE.countdown={player:(r.cp===undefined?-1:r.cp), enemy:(r.ce===undefined?-1:r.ce)}; }
  else if(rid==="paint"){ if(r.g!==undefined&&r.g!==null) tPaintApplyRLE(r.g); }   // P1: g 생략 패킷=변화 없음(이전 그리드 유지)

  }
}

function tBotUpdate(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) tRespawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt; if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  tickStatus(f, dt); applyTrapTo(f);   // 봇도 함정 둔화 적용(일관성)
  if(RULE && RULE.id==="tag"){ tagBotUpdate(f, dt, tFightersList(), envTeam()); return; }   // P2: 술래 전용 봇 AI 재사용
  // P2: 규칙 목표 지향 — 적이 멀면 목표 지점(거점/별/적 탑/미도색 칸)으로 이동
  const obj=tRuleBotObjective(f);
  const tN=tNearestEnemyFighter(f);
  const tNd=tN?dist(f.x,f.y,tN.x,tN.y):Infinity;
  if(obj && dist(f.x,f.y,obj.x,obj.y)>obj.r && tNd>360){
    const dx=obj.x-f.x, dy=obj.y-f.y, d=Math.hypot(dx,dy)||1;
    const step=effSpeed(f)*0.9*dt, ox=f.x, oy=f.y;
    moveEntity(f, dx/d*step, dy/d*step);
    if(Math.hypot(f.x-ox,f.y-oy)<step*0.3){ const sd=(f.ai.stuckDir||1); moveEntity(f, -dy/d*sd*step, dx/d*sd*step); }
    f.facing=Math.atan2(dy,dx);
    // 수정부수기: 목표가 적 탑이고 사거리·시야 안이면 탑 사격
    if(obj.tower){ f.cooldown-=dt;
      const td=dist(f.x,f.y,obj.x,obj.y);
      if(td<GAME_CONFIG.playerRange*0.9 && f.cooldown<=0 && hasLineOfSight(f.x,f.y,obj.x,obj.y)){ tFire(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId))*1.15; } }
    // 칠하기: 이동하며 바닥 쪽 발사(탄 경로 도색)
    else if(RULE && RULE.id==="paint"){ f.cooldown-=dt;
      if(f.cooldown<=0){ tFire(f); f.cooldown=zCooldownOf(f, getWeapon(f.weaponId))*1.3; } }
    return;
  }
  const t=tNearestEnemyFighter(f);
  if(t){
    const dx=t.x-f.x, dy=t.y-f.y, d=Math.hypot(dx,dy)||1;
    let mvx=0,mvy=0;
    if(d>320){ mvx=dx/d; mvy=dy/d; }
    else if(d<200){ mvx=-dx/d; mvy=-dy/d; }
    else { f.ai.strafeTimer-=dt; if(f.ai.strafeTimer<=0){ f.ai.strafeDir=Math.random()<0.5?1:-1; f.ai.strafeTimer=rand(0.5,1.2); } mvx=-dy/d*f.ai.strafeDir; mvy=dx/d*f.ai.strafeDir; }
    if(f.ai.stuckTimer>0){ f.ai.stuckTimer-=dt; mvx=-dy/d*f.ai.stuckDir; mvy=dx/d*f.ai.stuckDir; } // 벽끼임 탈출: 옆으로 우회
    const ml=Math.hypot(mvx,mvy);
    if(ml>0){ mvx/=ml; mvy/=ml; const step=effSpeed(f)*0.9*dt, ox=f.x, oy=f.y;
      moveEntity(f, mvx*step, mvy*step);
      if(f.ai.stuckTimer<=0 && Math.hypot(f.x-ox,f.y-oy) < step*0.3){ f.ai.stuckDir=Math.random()<0.5?1:-1; f.ai.stuckTimer=rand(0.4,0.8); } }
    f.facing=Math.atan2(dy,dx);
    f.cooldown-=dt; f.ai.reTimer-=dt;
    if(d<GAME_CONFIG.playerRange && f.cooldown<=0 && f.ai.reTimer<=0 && hasLineOfSight(f.x,f.y,t.x,t.y)){
      tFire(f); f.cooldown=GAME_CONFIG.playerAttackCooldown*1.3*atkSlowFactor(f); f.ai.reTimer=rand(0.1,0.4);
    }
    // 봇도 X/C 사용(3v3 빈자리 AI): 사람보다 낮은 빈도로 — 적이 사거리 안일 때만
    const wRange=GAME_CONFIG.playerRange*getWeapon(f.weaponId).rangeMul;
    if(f.specialCd<=0 && d<Math.max(wRange,260) && Math.random()<dt*0.5) castSpecialFor(f, envTeam());
    if((f.superGauge||0)>=GAME_CONFIG.superCharge && d<wRange && Math.random()<dt*0.7)
      castUltimateFor(f, envTeam(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
  }
}

function tFire(f){
  f.fireRevealTimer=GAME_CONFIG.bushAttackRevealTime;   // 풀숲: 공격하면 잠시 드러남
  const w=getWeapon(f.weaponId);
  const spec=weaponFireSpec(f, w), aid=newAttackId();
  const count=spec.count, spread=deg2rad(spec.spreadDeg||0);
  for(let i=0;i<count;i++){
    let a=f.facing; if(count>1) a=f.facing-spread/2+spread*(i/(count-1));
    const mz=f.r+6;
    const b={ x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*spec.speed, vy:Math.sin(a)*spec.speed,
      r:spec.radius, damage:spec.damage, team:f.team, owner:f.slot, color:spec.color, alive:true, traveled:0,
      maxRange:spec.range, aid:aid, wid:spec.wid, wref:spec.wref, age:0,
      snipe:spec.snipe||0, stab:spec.stab||0 };
    if(spec.boomerang){ b.boomerang=true; b.phase="out"; b.spd=spec.speed; b.hitO={}; b.hitB={}; }
    tBullets.push(b);
  }
}

// 3v3 탄환(PVP): 부메랑 왕복·무기 효과·attackId 게이지·통통비행기 반사 지원
function tUpdateBullets(dt){
  for(const b of tBullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }
    if(b.boomerang){
      const o=tFighters[b.owner];
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, o.x, o.y)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy), steps=Math.max(1,Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, sl=Math.hypot(sx,sy);
    for(let s=0;s<steps&&b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=sl;
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){ if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age; break; }
        b.alive=false; break;
      }
      if(RULE && RULE.id==="paint") tPaintCellBy(b.x, b.y, b.team, b.owner);   // P2: 탄 비행 경로 도색
      let wall=false, wref=null; for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ wall=true; wref=o; break; } }
      if(wall){
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; } break; }
        if(b.bounce){ if(!bounceBullet(b,wref,sx,sy)) b.alive=false; break; }
        if(RULE && RULE.id==="siege" && wref.structure && wref.sid && wref.team!==tTeamKey(b.team)) tDamageRuleStruct(wref, b.damage);   // P2: 구조물 피해
        if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,(b.wid==="tool_06")?"3x3":"cross");   // P2: 벽 착탄 도색
        spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
      }
      for(const slot in tFighters){ const t=tFighters[slot];
        if(t.team===b.team || t.dead || t.invincibleTimer>0 || t.inactive) continue;
        if(dist(b.x,b.y,t.x,t.y) < b.r+t.r){
          if(b.boomerang){
            const hm=(b.phase==="out")?b.hitO:b.hitB;
            if(hm[slot]) continue;
            hm[slot]=true;
            tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
            if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
            spawnHitFx(b.x,b.y,b.wid,b.color);
            continue;                                     // 부메랑은 관통(복귀 타격)
          }
          if(b.ultCid && !canUltDamage(b.ultCid, slot, b.ultMaxHits||4)){ b.alive=false; break; }  // 럭키 C: 같은 대상 최대 피해 상한(로컬과 동일)
          tApplyDamage(t, bulletHitDamage(b,t), b.team, b.owner, b.isSuper, b.aid);
          if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
          if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,"3x3");   // P2: 적 명중 3×3
          spawnHitFx(b.x,b.y,b.wid,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){
        if(RULE && RULE.id==="paint") tPaintSplash(b.x,b.y,b.team,b.owner,(b.wid==="tool_06")?"3x3":"cross");   // P2: 사거리 끝 착탄 도색
        b.alive=false; break;
      }
    }
  }
  tBullets=tBullets.filter(b=>b.alive);
  if(tBullets.length>T_MAX_BULLETS) tBullets=tBullets.slice(tBullets.length-T_MAX_BULLETS);
}

function tApplyDamage(target, dmg, fromTeam, fromSlot, isSuper, aid){
  if(target.dead || target.invincibleTimer>0 || target.team===fromTeam) return;
  dmg=incomingDamage(target, dmg);                        // 방패/질주 감소(최소 1)
  target.hp-=dmg; target.hitFlash=0.15;
  const attacker=tFighters[fromSlot];
  if(attacker && !isSuper){
    tryChargeGauge(aid, target.slot, ()=>{ attacker.superGauge=Math.min(GAME_CONFIG.superCharge,(attacker.superGauge||0)+GAME_CONFIG.superChargePerHit); });
  }
  if(target.hp<=0){
    target.hp=0; target.dead=true; target.respawnTimer=GAME_CONFIG.respawnDelay;
    if(TEAM_COLOR[fromTeam]!==undefined) tTeamScores[fromTeam]=(tTeamScores[fromTeam]||0)+1;
    const killer=tFighters[fromSlot]; if(killer) killer.score+=1;
    if(RULE && RULE.id==="stargrab" && (target.stars||0)>0){   // P2: 죽으면 보유 별 드랍(6초 소멸)
      for(let i=0;i<target.stars;i++) RULE.stars.push({ x:target.x+rand(-26,26), y:target.y+rand(-26,26), ttl:RULE_CONFIG.stargrab.dropTtl });
      target.stars=0;
    }
  }
}

function tRespawn(f){
  f.dead=false; f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;
  const pos=findClearSpawn(f.spawnX,f.spawnY,f.r);
  f.x=pos.x; f.y=pos.y; f.invincibleTimer=GAME_CONFIG.invincibleTime;
}

function tPackFighter(f){
  // 매 틱 전송 최소화: 변하는 값만 보낸다.
  // 정적인 값(charId/team/slot/maxHp)은 players 로스터로 게스트가 역산한다(렉 최적화).
  // am/rl/sg는 내 HUD(탄창/장전/궁극기)용 작은 숫자만 추가.
  const o={ x:Math.round(f.x), y:Math.round(f.y), hp:Math.round(f.hp),
    facing:Math.round(f.facing*100)/100, dead:!!f.dead, inv:f.invincibleTimer>0,
    am:(f.ammo===undefined?-1:f.ammo),   // 온라인긴급 P0: -1=무한탄(봇·럭키) — undefined는 RTDB set() 전체 거부("동기화 대기" 원인)
    rl:f.reloading?1:0, sg:Math.round(f.superGauge||0), fr:f.fireRevealTimer>0?1:0,
    xc:Math.round(Math.max(0,f.specialCd||0)*10)/10,     // X 쿨타임(HUD용)
    lv:(f.lives===undefined?-1:f.lives) };               // PVE 개인 목숨(-1=해당 없음/3v3)
  if(RULE){                                              // P2: 규칙별 개인 상태(술래 여부·별 보유)
    if(RULE.id==="tag") o.tg=f.isTagger?1:0;
    else if(RULE.id==="stargrab") o.st=f.stars||0;
  }
  return o;
}
// 게스트가 정적 정보를 로스터(OnlineManager.players)에서 역산하는 도우미
function tRosterCharId(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return sanitizeCharacterId((p&&p.characterId)||"student_01"); }
function tRosterTeam(slot){ const p=OnlineManager.players&&OnlineManager.players[slot]; return (p&&p.team)||"blue"; }
function tRosterMaxHp(slot){ return GAME_CONFIG.playerMaxHp*getCharacter(tRosterCharId(slot)).hpMul; }
function getEnemyDef(type){ return PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt; }
function tHostWriteState(){
  if(!OnlineManager.roomRef) return;   // v1.21 성능: 혼자 도전(오프라인)에서는 패킷 직렬화 자체를 생략
  const fighters={};
  for(const slot in tFighters) fighters[slot]=tPackFighter(tFighters[slot]);
  const bl=[];
  // 게스트 렌더에 필요한 것만(x,y,r,c,vx,vy,w=무기 스프라이트 id). owner/team은 게스트가 안 써서 제외(렉 최적화).
  // P1: 패킷에는 최신 48발까지만(시뮬 상한 80 유지) — 난전 시 스냅샷 6.8KB→4.4KB. 잘리는 건 소멸 직전의 오래된 탄.
  const _blSrc=(tBullets.length>48)?tBullets.slice(tBullets.length-48):tBullets;
  for(const b of _blSrc) bl.push({ x:Math.round(b.x), y:Math.round(b.y), r:Math.round(b.r), c:b.color, vx:Math.round(b.vx), vy:Math.round(b.vy), w:b.wid||null });
  const st={ timeLeft:Math.max(0,Math.round(tTimeLeft)), teamScores:tTeamScores, fighters:fighters, bullets:bl,
    powerups:POWERUPS.map(p=>({x:Math.round(p.x),y:Math.round(p.y),t:powerupPacketT(p),id:p.id})), zones:packZones() };
  // BIG-BATCH-2 P2: 규칙 상태 동기화(점령전=게이지 · 수정=구조물HP · 별=좌표/카운트다운 · 술래=단계 · 칠=RLE 그리드)
  if(RULE && getOnlineMode(OnlineManager.mode).modeType==="pvp"){
    const r={};
    if(RULE.id==="hotzone"){ r.x=Math.round(RULE.x); r.y=Math.round(RULE.y); r.gp=Math.round(RULE.gauge.player*10)/10; r.ge=Math.round(RULE.gauge.enemy*10)/10; r.h=RULE.holder||null; r.w=Math.round((RULE.warn||0)*10)/10; }
    else if(RULE.id==="siege"){ r.sh=RULE.structs.map(s=>Math.max(0,Math.round(s.hp))); }
    else if(RULE.id==="stargrab"){ r.st=RULE.stars.map(s=>({x:Math.round(s.x),y:Math.round(s.y)}));
      r.cp=RULE.countdown.player<0?-1:Math.round(RULE.countdown.player*10)/10; r.ce=RULE.countdown.enemy<0?-1:Math.round(RULE.countdown.enemy*10)/10; }
    else if(RULE.id==="tag"){ r.ph=RULE.phase; r.pt=Math.round(Math.max(0,RULE.phaseT)*10)/10; r.sv=RULE.survivors; r.rm=Math.round((RULE.runnerMul||1)*100)/100; r.lo=RULE.lastOne?1:0; }
    else if(RULE.id==="paint"){   // P1: 그리드가 변했을 때만 전송(+1초마다 안전 리프레시) — 고정 비용 제거
      const g=tPaintRLE();
      if(g!==tPaintLastRLE || tPaintRLESkips>=15){ r.g=g; tPaintLastRLE=g; tPaintRLESkips=0; }
      else tPaintRLESkips++;
    }
    st.rule=r;
  }
  // PVE면 적/스테이지 정보도 함께 보낸다. color/r/boss는 type으로 게스트가 역산(전송 제외).
  if(getOnlineMode(OnlineManager.mode).modeType==="pve"){
    const en={}; for(const id in tEnemies){ const e=tEnemies[id]; en[id]={ x:Math.round(e.x), y:Math.round(e.y), hp:Math.round(e.hp), maxHp:Math.round(e.maxHp), facing:Math.round(e.facing*100)/100, type:e.type, dead:!!e.dead }; }
    st.enemies=en;
    st.structs=tPackStructs();                                       // v1.22 구조물(숫자만, ≤6개)
    st.pve={ stageIndex:tPve.stageIndex, waveIndex:tPve.waveIndex, teamLives:tPve.teamLives, status:tPve.status, phase:tPve.phase, enemiesRemaining:Object.keys(tEnemies).length, mapId:tMapId,
      dfT:Math.max(0,Math.ceil(tPve.defendT||0)), gates:tGatesAlive(),
      hg:Math.round(tPve.holdG||0), sgT:Math.max(0,Math.ceil(tPve.sgT||0)), sgL:tPve.sgLost||0,
      sgS:(tPve.sgStars||[]).map(s=>({x:Math.round(s.x),y:Math.round(s.y)})), it:Math.max(0,Math.round((tPve.introT||0)*10)/10) };
    if(tPve.upg){ const ug={}; for(const s in tPve.upg){ const o=tPve.upg[s]; ug[s]={c:o.c, r:o.r, p:o.picked?1:0, pi:o.pi}; } st.pve.upg=ug; }   // 강화 후보(문자 id 3개·숫자만)
  }
  OnlineManager.writeHostState(st);
}
function tHostEndMatch(){
  if(OnlineManager.role!=="host") return;
  let winner="draw";
  if(tTeamScores.blue>tTeamScores.red) winner="blue"; else if(tTeamScores.red>tTeamScores.blue) winner="red";
  tWinner=winner;
  tHostWriteState();
  OnlineManager.writeMetaStatus("ended", { winner:winner });
  gameState=STATE.ONLINE_OVER;
}

function tMyTeam(){
  const s=OnlineManager.mySlot;
  if(OnlineManager.role==="host" && tFighters[s]) return tFighters[s].team;
  const st=OnlineManager.onlineState;
  if(st && st.fighters && st.fighters[s]) return st.fighters[s].team;
  const p=OnlineManager.players; if(p && p[s]) return p[s].team;
  return "blue";
}
function tComputeResultText(){
  let w=tWinner; if(!w && OnlineManager.meta) w=OnlineManager.meta.winner;
  if(!w || w==="draw") return "무승부!";
  if(w==="taggers") return tMyTagRole ? "승리!" : "패배!";      // P2 술래: 역할 기준 결과
  if(w==="runners") return tMyTagRole ? "패배!" : "승리!";
  return (w===tMyTeam()) ? "승리!" : "패배!";
}

/* ---- guest 렌더(보간 + 내 슬롯 이동 예측) ---- */
function tUpdateGuest(dt){
  const s=OnlineManager.onlineState; if(!s || !s.fighters) return;
  // PVE: host가 보낸 현재 스테이지 맵으로 장애물/풀숲을 맞춘다(보이는 벽=실제 충돌)
  if(s.pve && s.pve.mapId && s.pve.mapId!==tMapId){ tMapId=s.pve.mapId; const m=getMap(tMapId); OBSTACLES=m.obstacles.slice(); BUSHES=m.bushes; tGuestStructSig=""; }
  if(s.structs) tGuestApplyStructs(s.structs);                       // v1.22: 구조물 상태+충돌 동기화
  tInterpClock+=dt;
  if(s!==tLastStateRef){
    tLastStateRef=s;
    onlineSnapPush(tSnapBuf, tInterpClock, s);   // P1: 페어 보간 버퍼
    tBulletsView=(s.bullets||[]).map(b=>({ x:b.x,y:b.y,vx:b.vx||0,vy:b.vy||0,r:b.r,c:b.c,w:b.w||null }));
    if(getOnlineMode(OnlineManager.mode).modeType==="pvp") tGuestApplyRule(s);   // P2+PERF-2: 새 패킷일 때만(페인트 RLE 디코드 60→15Hz)
  }
  for(const b of tBulletsView){ b.x+=b.vx*dt; b.y+=b.vy*dt; }
  const myslot=OnlineManager.mySlot;
  for(const slot in s.fighters){
    const p=s.fighters[slot];
    if(slot===myslot){
      if(!tPredict || p.dead){ const ch=getCharacter(p.charId||tRosterCharId(slot)); tPredict={ x:p.x,y:p.y,facing:p.facing||0,r:22,moveSpeed:GAME_CONFIG.playerMoveSpeed*ch.speedMul*TEMPO.playerMove }; }
      else { const inp=readLocalInput();
        predictMoveAim(tPredict, inp, dt);   // UPDATE-1 P3: 예측도 의도 공용
        onlineReconcile(tPredict, p, dt); }   // P1: 연속 화해(70px 하드스냅 제거)
    } else {
      if(!tRenderFighters[slot] || p.dead) tRenderFighters[slot]={ x:p.x,y:p.y,facing:p.facing||0 };
      else tRenderFighters[slot]=onlineInterpTarget(tSnapBuf, tInterpClock, function(ss){ return (ss&&ss.fighters)?ss.fighters[slot]:null; }, tRenderFighters[slot], dt);   // P1: 페어 보간
    }
  }
  if(s.enemies){   // P1b: PVE 적도 페어 보간 — 적 최대 40마리가 15Hz마다 뚝뚝 점프하던 것(파이터와 동일 헬퍼)
    for(const id in s.enemies){
      const e=s.enemies[id];
      if(e.dead){ delete tEnemiesView[id]; continue; }
      if(!tEnemiesView[id]) tEnemiesView[id]={ x:e.x, y:e.y, facing:e.facing||0 };
      else tEnemiesView[id]=onlineInterpTarget(tSnapBuf, tInterpClock, function(ss){ const en=(ss&&ss.enemies)?ss.enemies[id]:null; return (en&&!en.dead)?en:null; }, tEnemiesView[id], dt);
    }
    for(const id in tEnemiesView){ if(!s.enemies[id]) delete tEnemiesView[id]; }
  }
}

function tGetDrawData(){
  const out={ fighters:[], bullets:[], teamScores:{blue:0,red:0}, timeLeft:0, waiting:false };
  if(OnlineManager.role==="host"){
    for(const slot in tFighters){ const f=tFighters[slot];
      out.fighters.push({ x:f.x,y:f.y,facing:f.facing,hp:f.hp,maxHp:f.maxHp,dead:f.dead,inv:f.invincibleTimer>0,charId:f.char.id,team:f.team,slot:slot,isMe:slot===OnlineManager.mySlot,fr:f.fireRevealTimer>0?1:0,
        tg:f.isTagger?1:0, st:f.stars||0, sh:f.tagShield||0 }); }   // P2: 규칙 배지
    out.bullets=tBullets.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.color,w:b.wid||null,vx:b.vx,vy:b.vy }));
    out.teamScores=tTeamScores; out.timeLeft=Math.max(0,Math.ceil(tTimeLeft));
    out.zones=packZones();
  } else {
    const s=OnlineManager.onlineState;
    if(!s || !s.fighters){ out.waiting=true; out.timeLeft=GAME_CONFIG.gameTime; return out; }
    const myslot=OnlineManager.mySlot;
    for(const slot in s.fighters){ const p=s.fighters[slot]; let rx=p.x,ry=p.y,rf=p.facing;
      if(slot===myslot && tPredict && !p.dead){ rx=tPredict.x; ry=tPredict.y; rf=tPredict.facing; }
      else if(tRenderFighters[slot] && !p.dead){ rx=tRenderFighters[slot].x; ry=tRenderFighters[slot].y; rf=tRenderFighters[slot].facing; }
      out.fighters.push({ x:rx,y:ry,facing:rf,hp:p.hp,maxHp:p.maxHp||tRosterMaxHp(slot),dead:p.dead,inv:p.inv,charId:p.charId||tRosterCharId(slot),team:p.team||tRosterTeam(slot),slot:slot,isMe:slot===myslot,fr:p.fr,
        tg:p.tg||0, st:p.st||0 }); }   // P2: 규칙 배지
    out.bullets=tBulletsView.map(b=>({ x:b.x,y:b.y,r:b.r,c:b.c,w:b.w||null,vx:b.vx,vy:b.vy }));
    out.teamScores=s.teamScores||{blue:0,red:0}; out.timeLeft=s.timeLeft;
    out.zones=(s.zones||[]);
  }
  return out;
}

function tDrawFighter(d){
  if(d.dead) return;
  const ch=getCharacter(d.charId||"lumi");
  const isTagRule=!!(RULE && RULE.id==="tag");
  let vis;
  if(isTagRule){   // P2 §1.4: 역할 기반 시야 — 내가 술래면 수풀 속 도망자 안 보임
    const hideMe = tMyTagRole && !d.tg && !d.isMe &&
                   inBush({x:d.x,y:d.y}) && _viewer && dist(_viewer.x,_viewer.y,d.x,d.y)>RULE_CONFIG.tag.bushHide && !d.fr;
    vis = hideMe ? {hidden:true, alpha:0} : {hidden:false, alpha:inBush({x:d.x,y:d.y})?0.75:1};
  } else {
    vis=bushVisibility(d.x,d.y, d.team, d.isMe, _viewer, !!d.fr);
  }
  if(vis.hidden){ drawBushRustle(d.x,d.y); return; }
  let alpha=vis.alpha; if(d.inv && Math.floor(uiTime*12)%2===0) alpha*=0.4;
  // 축11: 팀 색 원형 링(몸에 겹침) → 발밑 마커로 교체(나=금색·아군=파랑 실선·적=빨강 점선)
  const _myTeam=_viewer?_viewer.team:null;
  const mk = isTagRule ? (d.isMe?"me":((!!d.tg)===tMyTagRole?"ally":"enemy"))
                       : (d.isMe?"me":((_myTeam && d.team===_myTeam)?"ally":"enemy"));
  drawTeamMarker(d.x, d.y, 22, mk, alpha);
  if(isTagRule && d.tg){   // 술래 표식 👹
    ctx.save(); ctx.globalAlpha=alpha; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="bold 20px 'Malgun Gothic',sans-serif";
    ctx.fillText("👹", d.x, d.y-22-44+Math.sin(uiTime*5)*3);
    ctx.restore();
  }
  if(RULE && RULE.id==="stargrab" && (d.st||0)>0){   // ⭐ 보유 배지 + 캐리어 링
    ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=alpha;
    ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe14d";
    ctx.fillText("⭐"+d.st, d.x, d.y-22-44);
    if(d.st>=RULE_CONFIG.stargrab.carrierMark){
      const cp=0.5+0.5*Math.sin(uiTime*5);
      ctx.strokeStyle=TEAM_COLOR[d.team]||"#fff"; ctx.lineWidth=2.5; ctx.globalAlpha=alpha*(0.5+0.4*cp);
      ctx.beginPath(); ctx.arc(d.x,d.y,22+12+cp*3,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
  if(d.isMe) drawSelfMarker(d.x,d.y,22);
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(d.x,d.y);
  if(!drawCharacterSprite(d.charId||"student_01", 22, d.facing||0, { moving:spriteMoving("T"+d.slot,d.x,d.y), attacking:!!d.fr }))
    drawPlayerCharacter({ r:22, color:ch.color, subColor:ch.subColor, facing:d.facing||0 });
  ctx.restore();
  const w=54,h=8,bx=d.x-w/2,by=d.y-22-24;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="bottom";
  ctx.fillStyle=d.isMe?"#bfffad":(TEAM_COLOR[d.team]||"#dff1ff"); ctx.font="bold 12px 'Malgun Gothic',sans-serif";
  ctx.fillText(ch.name+(d.isMe?" (나)":""), d.x, by-2);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,4); ctx.fill();
  const ratio=clamp(d.hp/(d.maxHp||1),0,1);
  ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.restore();
}

/* PRD 12.5 — 협동 PVE 20스테이지 고정 구성(4구역 × 5). 적 수는 1인 기준, 인원·스테이지 배율은 tPveStartWave에서 적용.

   구조물(방어 수정·몬스터 문·웨이브 문)은 다음 단계 대상. 보스 5·10·15·20 = 체크포인트. */
/* =======================================================================
   CAMPAIGN-2 "별빛 원정" — 구역 테마 · 난이도 곡선 · 변형 스테이지 · 성장 아크
   ======================================================================= */
const CAMP_CONFIG={
  hpAnchor:[[1,0.75],[5,0.95],[10,1.1],[15,1.3],[20,1.5]],      // §4 스테이지 HP 배율(선형 보간·연속)

  zoneBonusGold:60, zoneBonusExp:30,                            // §5 구역 보스 격파 보너스(솔로)
  enrageAt:0.5, enrageMul:1.15,                                 // §5 보스 분노(HP 50%)
  holdPerSec:8, holdGoal:100, holdRadius:110,                   // §2-1 거점 사수전
  sgSpawnEvery:8, sgFail:5, sgTime:90, sgFleeMul:1.2            // §2-2 별 수호전
};
const CAMP_ZONES=[
  { name:"별빛 초원",   floor:"grass", intro:"🌿 별빛 초원 — 원정의 시작! 처치하면 버프가 자라요" },

  { name:"나무 요새",   floor:"wood",  intro:"🌳 나무 요새 — 좁은 통로, 기습 조심!" },
  { name:"어둠의 심연", floor:"void_", intro:"🌑 어둠의 심연 — 최종장, 모든 것이 몰려온다!" }
];
function campZoneIdx(si){ return Math.min(CAMP_ZONES.length-1, Math.floor(si/5)); }
function campLerpAnchor(anchor, si){
  const st=si+1;
  for(let i=1;i<anchor.length;i++){
    const [s0,v0]=anchor[i-1], [s1,v1]=anchor[i];
    if(st<=s1) return v0+(v1-v0)*((st-s0)/(s1-s0));
  }
  return anchor[anchor.length-1][1];
}

}

function tActivePlayerCount(){
  // 봇·끊긴(inactive)·연결 끊긴 실제 플레이어는 제외. host 자신(isMe)은 항상 active.
  const players=OnlineManager.players||{}; let n=0;
  for(const s in tFighters){ const f=tFighters[s];
    if(f.isBot) continue;
    if(f.inactive) continue;
    const isMe=s===OnlineManager.mySlot, p=players[s];
    if(!isMe && !(p && p.connected!==false)) continue;
    n++;
  }
  return Math.max(1,n);
}

function tSpawnEnemy(type, hpMul, map, dmgMul, sx, sy, gateId){
  const def=PVE_ENEMY_TYPES[type]||PVE_ENEMY_TYPES.grunt;
  const ex=clamp((sx!==undefined? sx+rand(-30,30) : map.enemySpawn.x+rand(-170,170)), ARENA.x+def.r, ARENA.x+ARENA.w-def.r);
  const ey=clamp((sy!==undefined? sy+rand(-10,40) : map.enemySpawn.y+rand(-90,180)), ARENA.y+def.r, ARENA.y+ARENA.h-def.r);
  const pos=findClearSpawn(ex,ey,def.r);
  const id="e"+(++tEnemyId), hp=def.hp*hpMul;
  const e={ id:id, type:type, x:pos.x, y:pos.y, r:def.r, hp:hp, maxHp:hp, speed:def.speed*TEMPO.enemyMove, dmg:def.dmg*(dmgMul||1),
    color:def.color, ranged:!!def.ranged, range:def.range||0, fireCd:def.fireCd||1.2, fireTimer:rand(0.2,1.2),
    bulletSpeed:(def.bulletSpeed||360)*TEMPO.enemyBullet, contactCd:def.contactCd||0.8, contactTimer:0, threeWay:!!def.threeWay,
    facing:Math.PI, dead:false, score:def.score||1,
    isBoss:(type==="boss"||type==="miniBoss"||!!def.isBossType) };
  // PRD 15.3/15.5 특수 능력 복사(코드 이펙트 우선 — 에셋 없이 도형/파티클로 검증)
  if(def.dash) e.dash={...def.dash, timer:rand(1,def.dash.cd), state:"idle", warnT:0, dirX:0, dirY:0, stunT:0};
  if(def.ghost) e.ghost={cycle:0};
  if(def.healer) e.healer={...def.healer, timer:def.healer.cd};
  if(def.frontGuard) e.frontGuard=def.frontGuard;
  if(def.slowShot) e.slowShot=def.slowShot;
  if(def.knockResist) e.knockImmuneTimer=1e9;                 // 쿠션 블록: 밀치기 거의 무시
  if(def.dash||def.frontGuard||def.slowShot) e.eliteResist=true;   // 정예: 빙결 50%·블랙홀 70%(PRD 15.4)
  if(def.isBossType){ e.fan=def.fan; e.ringShot=def.ringShot; e.bounceShot=def.bounceShot;
    e.slam=def.slam?{...def.slam, timer:def.slam.cd*0.6, warnT:0}:null;
    e.summon=def.summon?{...def.summon, timer:def.summon.cd||6, fired:[]}:null;
    e.phase2=def.phase2; e.enrage=def.enrage; e.baseFireCd=e.fireCd; e.baseSpeed=e.speed; }
  if(gateId) e.gate=gateId;                                    // v1.22 봉쇄: 소환한 문 태그(문당 동시 상한)
  // v1.23 방어전: 잡몹 1/3만 수정 직행 + 초반 10초는 직행 없음(코덱스 회차8: 50%+75초 조합은 입문 스테이지에 과함 — 파티 시뮬 s4 실패 2/3 재현 후 보강), 보스는 제외
  const _stg=PVE_STAGES[tPve.stageIndex];
  if(_stg && _stg.objective==="defend" && !e.isBoss && tEnemyId%3===0
     && tPve.defendT <= (_stg.defendTime||75)-10) e.focusStructure=true;
  tEnemies[id]=e;
}

   core=방어 수정(몬스터가 공격, HP 500+120×(N-1)) · gate=봉쇄 문(플레이어가 파괴, 180) · wall=쿠션 벽(120) */
let tStructures={};
const STRUCT_DEFS={
