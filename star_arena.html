      let drew=false;
      if(pr<0.5) drew=rpgSheetDraw(ctx, RPG_CROP_SHEET._seed, x+12, y+12, 32);        // 새싹(공용)
      else if(pr<1) drew=sh&&rpgSheetDraw(ctx, sh[0], x+7, y+7, 42);                   // 중간
      else drew=sh&&rpgSheetDraw(ctx, sh[1], x+5, y+5, 46);                            // 다자람
      if(!drew){   // 시트 미로딩 폴백=이모지
        const em=(pr>=1)?(RPG_CROP_EMOJI[cell.c]||"🌟"):(pr>=0.5?"🌿":"🌱");
        ctx.font=(pr>=1?"30px":"22px")+" sans-serif"; ctx.textAlign="center";
        ctx.fillText(em, x+28, y+40); ctx.textAlign="left";
      }
      if(pr>=1&&(uiTime%1)<0.6){ ctx.font="14px sans-serif"; ctx.textAlign="left"; ctx.fillText("✨", x+40, y+16); }
    }
  }
  for(const o of RPG.objects){   // EXPLORE-1 보물상자 상태(열림=어둡게 · 미개봉=반짝)
    if(o.type!=="chest"||!o.loot) continue;
    const x=o.tx*56, y=o.ty*56;
    if(!rpgOnScreen(x+28,y+28)) continue;
    if(RPG.save.flags["chest_"+RPG.map.id+"_"+o.tx+"_"+o.ty]){ ctx.fillStyle="rgba(10,8,24,0.45)"; ctx.fillRect(x+6,y+4,44,48); }
    else if((uiTime%1.2)<0.7){ ctx.font="16px sans-serif"; ctx.textAlign="center"; ctx.fillText("✨", x+42, y+12); ctx.textAlign="left"; }
  }
  const _starImg=(typeof worldImage==="function")?worldImage("star_pickup"):null;
  for(const d of RPG.drops){   // 드랍(엔티티 아래층) — 별 픽업 에셋
    if(!rpgOnScreen(d.x,d.y)) continue;
    if(_starImg) ctx.drawImage(_starImg, d.x-13, d.y-13-Math.sin(uiTime*4+d.x)*3, 26, 26);
    else { ctx.fillStyle="rgba(255,224,102,0.9)"; ctx.beginPath(); ctx.arc(d.x,d.y,8,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,0.6)"; ctx.stroke(); }
  }
  const ents=[];
  for(const n of RPG.npcsOnMap){ if(rpgOnScreen(n.x,n.y)) ents.push({ y:n.y, k:"n", a:n }); }
  for(const mob of RPG.mobs){ if(!mob.dead&&rpgOnScreen(mob.x,mob.y)) ents.push({ y:mob.y, k:"m", a:mob }); }
  ents.push({ y:RPG.p.y, k:"p", a:null });
  ents.sort(function(a,b){ return a.y-b.y; });
  for(const e of ents){ if(e.k==="n") rpgDrawNpc(e.a); else if(e.k==="m") rpgDrawMob(e.a); else rpgDrawPlayer(); }
  if(RPG.swing){   // 근접 스윙 궤적(주스 ① — 근접 공격 가시화)
    const s=RPG.swing, pr=1-s.t/0.16;
    ctx.save(); ctx.translate(RPG.p.x,RPG.p.y-4); ctx.rotate(s.dir);
    ctx.strokeStyle="rgba(255,255,255,"+(0.7*(1-pr)+0.1).toFixed(2)+")"; ctx.lineWidth=7; ctx.lineCap="round";
    ctx.beginPath(); ctx.arc(0,0,s.rng*(0.55+0.35*pr),-s.arc,s.arc); ctx.stroke();
    ctx.lineCap="butt"; ctx.restore();
  }
  for(const b of RPG.bullets){   // 탄(엔티티 위층)
    if(!rpgOnScreen(b.x,b.y)) continue;
    ctx.fillStyle=(b.from==="p")?"#ffe066":"#ff8f8f";
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r||7,0,Math.PI*2); ctx.fill();
    if(b.boomer){ ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.beginPath(); ctx.arc(b.x,b.y,(b.r||7)+4,uiTime*8,uiTime*8+4); ctx.stroke(); }
  }
  for(const f of RPG.fx){   // 피해 숫자·파티클(kind:text/dot/star)
    if(!rpgOnScreen(f.x,f.y)) continue;
    ctx.globalAlpha=Math.min(1,f.t*2);
    if(f.kind==="dot"){ ctx.fillStyle=f.color||"#ffffff"; ctx.beginPath(); ctx.arc(f.x,f.y,f.size||3,0,Math.PI*2); ctx.fill(); }
    else if(f.kind==="star"){ ctx.fillStyle=f.color||"#ffe066"; ctx.font=(f.size||13)+"px sans-serif"; ctx.textAlign="center"; ctx.fillText("✦",f.x,f.y); ctx.textAlign="left"; }
    else if(f.kind==="ring"){ const pr=1-f.t/0.6; ctx.strokeStyle="rgba(255,224,102,"+(1-pr).toFixed(2)+")"; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(f.x,f.y,20+pr*90,0,Math.PI*2); ctx.stroke(); ctx.lineWidth=1; }
    else { ctx.fillStyle=f.color||"#ffffff"; ctx.font="bold "+(f.size||16)+"px 'Malgun Gothic',sans-serif"; ctx.textAlign="center";
      ctx.fillText(f.text,f.x,f.y); ctx.textAlign="left"; }
    ctx.globalAlpha=1;
  }
  if(RPG.ui==="field"){   // 추적 퀘스트 방향 화살표(§6 — 대상이 이 맵에 있을 때, 멀면 표시)
    const tt=rpgTrackTarget();
    if(tt&&dist(RPG.p.x,RPG.p.y,tt.x,tt.y)>150){
      const a=Math.atan2(tt.y-RPG.p.y,tt.x-RPG.p.x);
      ctx.save(); ctx.translate(RPG.p.x+Math.cos(a)*56,RPG.p.y+Math.sin(a)*56); ctx.rotate(a);
      ctx.fillStyle="rgba(255,224,102,"+(0.6+0.3*Math.sin(uiTime*5)).toFixed(2)+")";
      ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-6,-8); ctx.lineTo(-6,8); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
  if(RPG.ui==="field"&&RPG.ctxTarget){   // 대상 부착형 말풍선(§2.1)
    const t=RPG.ctxTarget;
    const x=(t.kind==="npc")?t.npc.x:(t.kind==="farm"?t.x:((t.obj.tx+0.5)*56));
    const y=(t.kind==="npc")?t.npc.y:(t.kind==="farm"?t.y:((t.obj.ty+0.5)*56));
    const lb=(t.kind==="npc")?"💬 Space":(t.kind==="farm"?(t.farm.icon+" "+t.farm.label):"👀 Space");
    ctx.fillStyle="rgba(255,224,102,0.95)"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.textAlign="center";
    ctx.fillText(lb, x, y-44); ctx.textAlign="left";
  }
  rpgWorldEnd();
  if(RPG.ui==="field"&&(RPG.cam.maxX>0||RPG.cam.maxY>0)){   // EXPLORE-1: 화면 밖 포탈 → 가장자리 "▶ 맵이름" 라벨
    const _lbSeen={};
    for(const w of (RPG.map.portals||[])){
      if(_lbSeen[w.to]) continue; _lbSeen[w.to]=1;
      const wx=(w.at[0]+0.5)*56, wy=(w.at[1]+0.5)*56;
      const sx=24+RPG.cam.offX-Math.round(RPG.cam.x)+wx, sy=70+RPG.cam.offY-Math.round(RPG.cam.y)+wy;
      if(sx>=24&&sx<=1256&&sy>=70&&sy<=646) continue;   // 화면 안이면 생략
      const to=rpgFind("maps",w.to); if(!to) continue;
      const arrow=(sx<24)?"◀":(sx>1256)?"▶":(sy<70)?"▲":"▼";
      const lb=arrow+" "+to.name;
      ctx.font="bold 14px 'Malgun Gothic',sans-serif";
      const tw=ctx.measureText(lb).width;
      const cx=clamp(sx,24+tw/2+14,1256-tw/2-14), cy=clamp(sy,96,620);
      ctx.fillStyle="rgba(10,12,32,0.75)"; roundRect(cx-tw/2-10,cy-15,tw+20,26,13); ctx.fill();
      ctx.fillStyle="rgba(255,224,102,"+(0.7+0.25*Math.sin(uiTime*4)).toFixed(2)+")";
      ctx.textAlign="center"; ctx.fillText(lb,cx,cy+4); ctx.textAlign="left";
    }
  }
  if(RPG.save.flags.dusk&&RPG.map.id==="rpg_village"){   // POLISH-2 §2: 해질녘 톤(마을 한정·그날 소멸)
    ctx.fillStyle="rgba(255,132,40,0.10)"; ctx.fillRect(24,70,1232,576);
    ctx.fillStyle="rgba(60,20,90,0.14)"; ctx.fillRect(24,70,1232,576);
  }
  if((RPG.vignT||0)>0){   // POLISH-2: 피격 비네트(테두리만·점멸 금지)
    ctx.strokeStyle="rgba(255,60,60,"+((RPG.vignT/0.35)*0.5).toFixed(2)+")"; ctx.lineWidth=10;
    ctx.strokeRect(29,75,1222,566); ctx.lineWidth=1;
  }
  if(RPG.veil){ ctx.fillStyle="rgba(6,4,18,0.5)"; ctx.fillRect(0,64,LOGW,LOGH-92); }   // 보스 3페이즈: 먹구름 장막
  rpgDrawHUD();
  if(RPG.ui==="dialog") rpgDrawDialog();
  else if(RPG.ui==="shop") rpgDrawShop();
  else if(RPG.ui==="inven") rpgDrawInven();
  else if(RPG.ui==="seed") rpgDrawSeed();
  else if(RPG.ui==="codex") rpgDrawCodex();
  else if(RPG.ui==="map") rpgDrawMapView();
  else if(RPG.ui==="warp") rpgDrawWarp();
  else if(RPG.ui==="daily") rpgDrawDaily();
  else if(RPG.ui==="confirm") rpgDrawConfirm();
  if(RPG.ui==="sleep"&&RPG.sleep){
    const t=RPG.sleep.t, a=(t<0.8)?(t/0.8):((t<2.4)?1:Math.max(0,(3.0-t)/0.6));
    ctx.fillStyle="rgba(4,2,12,"+(0.92*a).toFixed(3)+")"; ctx.fillRect(0,0,LOGW,LOGH);
    if(t>0.3&&t<0.9){ ctx.fillStyle="#ffe066"; ctx.font="bold 30px 'Malgun Gothic',sans-serif"; ctx.textAlign="center";
      ctx.fillText("🌙 쿨쿨…", LOGW/2, LOGH/2); ctx.textAlign="left"; }
    if(t>=0.9&&t<2.8&&RPG.sleep.sum){   // POLISH-2 §1: 하루 요약 카드(스타듀식 정산)
      const s=RPG.sleep.sum;
      ctx.fillStyle="rgba(22,16,54,0.95)"; roundRect(LOGW/2-250,200,500,280,16); ctx.fill();
      ctx.strokeStyle="rgba(255,224,102,0.55)"; roundRect(LOGW/2-249.5,200.5,499,279,16); ctx.stroke();
      ctx.textAlign="center";
      ctx.fillStyle="#ffe066"; ctx.font="bold 24px 'Malgun Gothic',sans-serif";
      ctx.fillText("🌙 "+(RPG.save.day-1)+"일차 별빛 정산", LOGW/2, 246);
      ctx.font="18px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffffff";
      ctx.fillText("🗡 처치 "+s.kills+"마리      💰 번 돈 +"+s.gold+"G", LOGW/2, 300);
      ctx.fillText("🌾 수확 "+s.harvest+"개", LOGW/2, 336);
      ctx.fillStyle="#8fdba0";
      ctx.fillText(s.grow>0?("💤 자는 동안 작물 "+s.grow+"칸이 자랐다!"):"💤 오늘은 물 준 작물이 없었다", LOGW/2, 384);
      ctx.fillStyle="#9a90b8"; ctx.font="13px 'Malgun Gothic',sans-serif";
      ctx.fillText("Space/탭: 아침으로", LOGW/2, 452);
      ctx.textAlign="left";
    }
  }
}

const BALANCE_STORE_KEY="starArena.balance.v1";
let _balReg=null;
let BAL={ cat:0, idx:0, scroll:0, edit:null, confirmReset:-99 };
function loadBalanceStore(){ try{ const s=JSON.parse(localStorage.getItem(BALANCE_STORE_KEY)); if(s && typeof s==="object") return s; }catch(e){} return {}; }
function saveBalanceStore(st){ try{ localStorage.setItem(BALANCE_STORE_KEY, JSON.stringify(st)); }catch(e){} }
function balanceFields(){
  if(_balReg) return _balReg;
  const cats=[];
  // mk: 값 접근자 기반 필드(파생값 — 예: 캐릭터 '실제 체력'을 편집하면 내부 배율로 환산 저장)
  const mk=(id,label,get,set,min,max,step,opt)=>Object.assign({id,label,get,set,min,max,step,dec:0,def:get()},opt||{});
  const num=(id,label,obj,prop,min,max,step,opt)=>mk(id,label,()=>obj[prop],v=>{obj[prop]=v;},min,max,step,opt);
  const pct=(id,label,obj,prop,min,max,opt)=>num(id,label,obj,prop,min,max,0.01,Object.assign({fmt:"pct",dec:2},opt||{}));

  // ── 1) 전투 공통 ──
  const G=GAME_CONFIG;
  cats.push({ name:"전투 공통", fields:[
    num("g.playerMaxHp","플레이어 기본 체력",G,"playerMaxHp",40,400,5),
    num("g.playerDamage","플레이어 기본 공격력",G,"playerDamage",4,60,1),
    num("g.playerAttackCooldown","기본 공격 간격(초)",G,"playerAttackCooldown",0.2,1.5,0.02,{dec:2}),
    num("g.playerMoveSpeed","플레이어 이동 속도",G,"playerMoveSpeed",120,400,5),
    num("g.playerRange","기본 사거리",G,"playerRange",200,900,10),
    num("g.regenRate","초당 회복량(전투 후)",G,"regenRate",0,40,1),
    num("g.regenStartTime","회복 시작 시간(초)",G,"regenStartTime",1,8,0.5,{dec:1}),
    num("g.respawnDelay","리스폰 시간(초)",G,"respawnDelay",1,10,0.5,{dec:1}),
    num("g.invincibleTime","리스폰 무적(초)",G,"invincibleTime",0,5,0.5,{dec:1}),
    num("g.gameTime","섬멸전 시간(초)",G,"gameTime",30,300,10),
    num("g.superCharge","궁극기 게이지 최대",G,"superCharge",50,300,10),
    num("g.superChargePerHit","명중당 게이지 충전",G,"superChargePerHit",5,50,1),
    num("g.trapDamage","가시 함정 피해",G,"trapDamage",0,40,1),
    pct("g.trapSlowMul","끈끈이 이동 배율",G,"trapSlowMul",0.2,1),
    pct("g.trapIceMul","얼음 가속 배율",G,"trapIceMul",1,2),
    num("g.enemyMaxHp","몬스터 기본 체력(구형)",G,"enemyMaxHp",40,300,5),
    num("g.enemyDamage","몬스터 기본 공격력(구형)",G,"enemyDamage",4,40,1)
  ]});

  // ── 2) 캐릭터(실효값으로 편집 — 내부 배율 자동 환산) ──
  const chf=[];
  for(const ch of STUDENT_CHARACTERS){
    const icon={kind:"char",id:ch.id,color:ch.color};
    chf.push(mk("char."+ch.id+".hp","체력",
      ()=>Math.round(GAME_CONFIG.playerMaxHp*ch.hpMul),
      v=>{ ch.hpMul=v/GAME_CONFIG.playerMaxHp; },30,500,5,{group:ch.name,icon:icon}));
    chf.push(mk("char."+ch.id+".speed","이동 속도",
      ()=>Math.round(GAME_CONFIG.playerMoveSpeed*ch.speedMul),
      v=>{ ch.speedMul=v/GAME_CONFIG.playerMoveSpeed; },100,400,5,{group:ch.name}));
    chf.push(num("char."+ch.id+".dmgMul","피해 배율",ch,"damageMul",0.5,2.5,0.05,{group:ch.name,dec:2}));
  }
  cats.push({ name:"캐릭터", fields:chf });

  // ── 3) 도구(Z 기본공격 — 실효값 편집) ──
  const wf=[];
  for(const ch of STUDENT_CHARACTERS){
    const w=getWeapon(getWeaponForCharacter(ch.id)), gname=ch.name+" · "+w.name;
    const icon={kind:"char",id:ch.id,color:ch.color};
    wf.push(mk("tool."+w.id+".dmg","한 발 피해",
      ()=>Math.round(GAME_CONFIG.playerDamage*w.damageMul*10)/10,
      v=>{ w.damageMul=v/GAME_CONFIG.playerDamage; },1,80,1,{group:gname,icon:icon,dec:1}));
    wf.push(mk("tool."+w.id+".cd","공격 간격(초)",
      ()=>Math.round(GAME_CONFIG.playerAttackCooldown*w.cooldownMul*100)/100,
      v=>{ w.cooldownMul=v/GAME_CONFIG.playerAttackCooldown; },0.2,2,0.05,{group:gname,dec:2}));
    wf.push(mk("tool."+w.id+".range","사거리",
      ()=>Math.round(GAME_CONFIG.playerRange*w.rangeMul),
      v=>{ w.rangeMul=v/GAME_CONFIG.playerRange; },100,1000,10,{group:gname}));
  }
  cats.push({ name:"도구(Z)", fields:wf });

  // ── 4) 스킬(X/C — 캐릭터별 핵심 수치) ──
  const A=ABILITY, sf=[];
  const skl=(cid,gname,label,obj,prop,min,max,step,opt)=>sf.push(num("skill."+cid+"."+prop+"."+label,label,obj,prop,min,max,step,Object.assign({group:gname,icon:{kind:"char",id:cid}},opt||{})));
  skl("student_01","럭키","X 쿨타임(초)",A.student_01.x,"cd",2,20,0.5,{dec:1});
  skl("student_01","럭키","X 발당 피해",A.student_01.x,"dmg",2,30,1);
  skl("student_01","럭키","X 대상당 최대 피해",A.student_01.x,"maxPerTarget",9,90,3);
  skl("student_01","럭키","C 폭발 피해",A.student_01.c,"dmg",10,120,5);
  skl("student_02","달이","X 쿨타임(초)",A.student_02.x,"cd",2,20,0.5,{dec:1});
  skl("student_02","달이","X 강화탄 피해",A.student_02.x,"dmg",10,90,2);
  skl("student_02","달이","C 저격 피해",A.student_02.c,"dmg",15,130,5);
  skl("student_02","달이","C 시전 시간(초)",A.student_02.c,"wind",0.1,1,0.05,{dec:2});
  skl("student_03","시고니","X 쿨타임(초)",A.student_03.x,"cd",2,25,0.5,{dec:1});
  skl("student_03","시고니","가시 하나 피해",A.student_03.x,"dmg",2,30,1);
  skl("student_03","시고니","C 질주 지속(초)",A.student_03.c,"dur",1,8,0.5,{dec:1});
  skl("student_03","시고니","C 시작 무적(초)",A.student_03.c,"invuln",0,3,0.25,{dec:2});
  skl("student_04","눈꽃","X 쿨타임(초)",A.student_04.x,"cd",2,20,0.5,{dec:1});
  sf.push(num("skill.student_04.slowPct.서리 둔화","서리 둔화(%)",A.student_04.x,"slowPct",0,0.6,0.05,{group:"눈꽃",icon:{kind:"char",id:"student_04"},fmt:"pct",dec:2}));
  skl("student_04","눈꽃","C 폭발 피해",A.student_04.c,"dmg",5,90,5);
  skl("student_04","눈꽃","C 빙결 시간(초)",A.student_04.c,"freeze",0,2.5,0.25,{dec:2});
  skl("student_05","모아","X 쿨타임(초)",A.student_05.x,"cd",2,25,0.5,{dec:1});
  skl("student_05","모아","오라 초당 회복",A.student_05.x,"hps",2,30,1);
  skl("student_05","모아","C 무적 시간(초)",A.student_05.c,"invuln",0.4,3,0.1,{dec:1});
  skl("student_05","모아","패시브 초당 회복",A.student_05.passive,"hps",0,20,1);
  skl("student_06","별골렘","X 쿨타임(초)",A.student_06.x,"cd",2,20,0.5,{dec:1});
  skl("student_06","별골렘","젤리 방패 흡수량",A.student_06.x,"absorb",30,300,10);
  sf.push(num("skill.student_06.flatReduce.상시 감소","상시 피해 감소(%)",A.student_06.passive,"flatReduce",0,0.3,0.02,{group:"별골렘",icon:{kind:"char",id:"student_06"},fmt:"pct",dec:2}));
  skl("student_06","별골렘","C 초당 피해",A.student_06.c,"dps",0,30,1);
  cats.push({ name:"스킬(X/C)", fields:sf });

  // ── 5) 몬스터(새 캠페인 9종 + 보스 4종) ──
  const mf=[];
  const MONS=["soft_jelly","bounce_bubble","paper_drone","cushion_block","star_bug","cloud_ghost","heal_fairy","shield_block","ice_bubble","boss_robot","boss_turtle","boss_plane","boss_king"];
  for(const t of MONS){
    const e=PVE_ENEMY_TYPES[t]; if(!e) continue;
    const gname=e.name||t, icon={kind:"monster",id:t,color:e.color};
    const big=e.hp>=400;
    mf.push(num("mon."+t+".hp","체력",e,"hp",10,3000,big?50:5,{group:gname,icon:icon}));

// 저장된 오버라이드를 게임 데이터에 적용(부팅 시 1회 — 이후 편집은 balSetValue가 즉시 반영)
function applyBalanceOverrides(){
  const reg=balanceFields(), st=loadBalanceStore();
  for(const id in st){
    const f=reg.byId[id]; if(!f) continue;
    const v=Number(st[id]); if(!isFinite(v)) continue;
    f.set(clamp(v, f.min, f.max));
  }
}
function balSetValue(f, v){
  if(!isFinite(v)) return;
  v=clamp(Math.round(v*1000)/1000, f.min, f.max);
  f.set(v);
  const st=loadBalanceStore();
  if(Math.abs(f.get()-f.def)<1e-9) delete st[f.id]; else st[f.id]=f.get();
  saveBalanceStore(st);
}
function balResetAll(){
  const reg=balanceFields();
  for(const c of reg.cats) for(const f of c.fields) f.set(f.def);
  saveBalanceStore({});
}
function balModifiedCount(){
  const reg=balanceFields(); let n=0;
  for(const c of reg.cats) for(const f of c.fields) if(Math.abs(f.get()-f.def)>1e-9) n++;
  return n;
}
function balFmt(f, v){
  if(v===undefined) v=f.get();
  if(f.fmt==="pct") return Math.round(v*100)+"%";
  const d=(f.dec!==undefined)?f.dec:0;
  return d>0 ? (Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d).replace(/\.?0+$/,"") : String(Math.round(v));
}
function handleBalanceKey(code){
  const reg=balanceFields(), fields=reg.cats[BAL.cat].fields;
  if(BAL.idx>=fields.length) BAL.idx=0;
  const f=fields[BAL.idx];
  if(BAL.edit!==null){                                  // 숫자 직접 입력 모드
    if(code==="Escape"){ BAL.edit=null; return; }
    if(code==="Enter"||code==="NumpadEnter"){
      let v=parseFloat(BAL.edit);
      if(isFinite(v)){ if(f.fmt==="pct") v=v/100; balSetValue(f, v); showToast(f.label+" = "+balFmt(f)); }
      BAL.edit=null; return;
    }
    if(code==="Backspace"){ BAL.edit=BAL.edit.slice(0,-1); return; }
    const dm=code.match(/^(?:Digit|Numpad)(\d)$/);
    if(dm){ if(BAL.edit.length<8) BAL.edit+=dm[1]; return; }
    if((code==="Period"||code==="NumpadDecimal") && BAL.edit.indexOf(".")<0){ BAL.edit+="."; return; }
    return;
  }
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  if(code==="KeyQ"){ BAL.cat=(BAL.cat+reg.cats.length-1)%reg.cats.length; BAL.idx=0; BAL.scroll=0; return; }
  if(code==="KeyE"){ BAL.cat=(BAL.cat+1)%reg.cats.length; BAL.idx=0; BAL.scroll=0; return; }
  if(code==="ArrowUp"){ BAL.idx=(BAL.idx+fields.length-1)%fields.length; return; }
  if(code==="ArrowDown"){ BAL.idx=(BAL.idx+1)%fields.length; return; }
  if(code==="ArrowLeft"||code==="ArrowRight"){ balSetValue(f, f.get()+(code==="ArrowRight"?1:-1)*f.step); return; }
  if(code==="Enter"||code==="NumpadEnter"){ BAL.edit=""; return; }
  if(code==="KeyR"){ balSetValue(f, f.def); showToast(f.label+" 기본값 복원 ("+balFmt(f,f.def)+")"); return; }
  if(code==="KeyF"){
    if(uiTime-BAL.confirmReset<2){ balResetAll(); BAL.confirmReset=-99; showToast("모든 수치를 기본값으로 초기화했어요"); }
    else { BAL.confirmReset=uiTime; showToast("한 번 더 F를 누르면 전체 초기화"); }
    return;
  }
}
// 행 아이콘(캐릭터 스프라이트/몬스터 이미지 · 없으면 색 원)
function balDrawIcon(icon, x, y, r){
  if(!icon) return;
  ctx.save(); ctx.translate(x,y);
  let drew=false;
  if(icon.kind==="char") drew=drawCharacterSprite(icon.id, r, 0, {});
  else if(icon.kind==="monster"){
    const img=getMonsterImage(icon.id);
    if(img){ const iw=img.naturalWidth||1, ih=img.naturalHeight||1, dh=r*2.6, dw=dh*(iw/ih);
      ctx.drawImage(img, -dw/2, r*0.9-dh, dw, dh); drew=true; }
  }
  if(!drew){ ctx.fillStyle=icon.color||"#8893bb"; ctx.beginPath(); ctx.arc(0,0,r*0.9,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="#ffffff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,r*0.9,0,Math.PI*2); ctx.stroke(); }
  ctx.restore();
}
function drawBalanceScreen(){

  const modN=balModifiedCount();
  ctx.fillStyle=modN?"#ffd23f":"#8893bb"; ctx.font="bold 15px 'Malgun Gothic',sans-serif";

  // 분류 탭
  let tx=40;
  for(let i=0;i<reg.cats.length;i++){ tx = drawTopChip(reg.cats[i].name, tx, 70, 34, i===BAL.cat) + 8; }   // drawTopChip은 오른쪽 끝 x를 반환
  // 목록
  const rowH=44, top=126, visible=Math.floor((LOGH-top-70)/rowH);
  if(BAL.idx<BAL.scroll) BAL.scroll=BAL.idx;
  if(BAL.idx>=BAL.scroll+visible) BAL.scroll=BAL.idx-visible+1;
  BAL.scroll=clamp(BAL.scroll, 0, Math.max(0, fields.length-visible));
  const xIcon=76, xGroup=104, xLabel=290, xVal=640, xDef=810, xBar=980;
  ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#8893bb";
  ctx.fillText("이름", xGroup, top-12); ctx.fillText("항목", xLabel, top-12); ctx.fillText("현재값 (기본값)", xVal, top-12);
  for(let vi=0; vi<visible; vi++){
    const i=BAL.scroll+vi; if(i>=fields.length) break;
    const fd=fields[i], y=top+vi*rowH+rowH/2, sel=(i===BAL.idx);
    const groupStart = fd.group && (i===0 || fields[i-1].group!==fd.group);
    if(sel){ ctx.fillStyle="rgba(95,160,255,0.18)"; roundRect(40, y-rowH/2+2, LOGW-80, rowH-4, 8); ctx.fill();
      ctx.strokeStyle="#5fa0ff"; ctx.lineWidth=2; roundRect(40, y-rowH/2+2, LOGW-80, rowH-4, 8); ctx.stroke(); }
    if(groupStart){
      if(fd.icon) balDrawIcon(fd.icon, xIcon, y+6, 13);
      ctx.fillStyle="#dfe6ff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="left";
      ctx.fillText(fd.group, xGroup, y);
    } else if(fd.group){ ctx.fillStyle="#3a4470"; ctx.font="13px 'Malgun Gothic',sans-serif"; ctx.fillText("┆", xGroup+6, y); }
    ctx.fillStyle=sel?"#ffffff":"#aab4e0"; ctx.font=(sel?"bold ":"")+"15px 'Malgun Gothic',sans-serif";
    ctx.fillText(fd.label, fd.group?xLabel:xGroup, y);
    // 값
    const modified=Math.abs(fd.get()-fd.def)>1e-9;
    if(sel && BAL.edit!==null){
      ctx.fillStyle="rgba(255,225,80,0.15)"; roundRect(xVal-8, y-15, 150, 30, 6); ctx.fill();
      ctx.strokeStyle="#ffe066"; ctx.lineWidth=2; roundRect(xVal-8, y-15, 150, 30, 6); ctx.stroke();
      ctx.fillStyle="#ffe066"; ctx.font="bold 17px 'Malgun Gothic',sans-serif";
      ctx.fillText(BAL.edit+((Math.floor(uiTime*2)%2)?"▏":" ")+(fd.fmt==="pct"?" %":""), xVal, y);
    } else {
      ctx.fillStyle=modified?"#ffd23f":"#ffffff"; ctx.font="bold 17px 'Malgun Gothic',sans-serif";
      ctx.fillText(balFmt(fd)+(modified?" ●":""), xVal, y);
    }
    ctx.fillStyle="#6b7398"; ctx.font="13px 'Malgun Gothic',sans-serif";
    ctx.fillText("(기본 "+balFmt(fd, fd.def)+")", xDef, y);

function edCellArt(g, ch, x, y, s, pf){

  if(code==="ArrowUp"){ S.idx=(S.idx+4)%5; S.confirm=-1; S.msg=""; return; }
  if(code==="ArrowDown"){ S.idx=(S.idx+1)%5; S.confirm=-1; S.msg=""; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    if(sl[S.idx] && S.confirm!==S.idx){ S.confirm=S.idx; S.msg="⚠ 덮어쓰려면 한 번 더 Enter"; return; }
    edSlotSave(S.idx); return;
  }
  if(code==="KeyL"){ edSlotLoad(S.idx); return; }
  if(code==="KeyX"||code==="Delete"||code==="Backspace"){
    if(!sl[S.idx]) return;
    if(S.confirm!==100+S.idx){ S.confirm=100+S.idx; S.msg="⚠ 삭제하려면 한 번 더 X"; return; }

    // 플랫포머: 세로 맞춤 스케일 + 가로 스크롤 창(§3.8)
    const sc=Math.min(0.9, availH/(ED.rows*CS));
    const cs=CS*sc, viewCols=Math.max(4, Math.floor(availW/cs));
    ED.viewC=clamp(ED.viewC||0, 0, Math.max(0, ED.cols-viewCols));
    return { sc:sc, cs:cs, gx:gx0, gy:132, gw:Math.min(ED.cols,viewCols)*cs, gh:ED.rows*cs, viewC:ED.viewC, viewCols:viewCols, pf:true };
  }
  const sc=Math.min(1, availW/(ED.cols*CS), availH/(ED.rows*CS));
  const gw=ED.cols*CS*sc, gh=ED.rows*CS*sc;
  return { sc:sc, cs:CS*sc, gx:gx0+(availW-gw)/2, gy:ED.pf?132:96+(availH-gh)/2, gw:gw, gh:gh, viewC:0, viewCols:ED.cols, pf:!!ED.pf };
}
function edAutoScroll(){
  if(!ED.pf || ED.fitAll) return;
  const G=edGridGeom(), vc=G.viewCols;
  if(ED.cur.c < G.viewC+2) ED.viewC=Math.max(0, ED.cur.c-2);
  else if(ED.cur.c > G.viewC+vc-3) ED.viewC=Math.min(Math.max(0,ED.cols-vc), ED.cur.c-vc+3);
}
function edTestBtnHit(p){   // EDIT-TEST-1: 미리하기 버튼 클릭 판정(마우스·터치 공용)
  const b=ED&&ED._testBtn; if(!b) return false;
  if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
    if(ED.pf){ const v=validateEditorMap(); if(!v.ok){ ED.msg="⚠ "+v.msg; return true; } pfStartLevel({ id:"__edtest", name:"테스트", rows:ED.cells.map(r=>r.join("")) }, {test:true}); }
    else edStartTest();
    return true;
  }
  return false;
}
function edMouseDown(e){
  const p=canvasToLogical(e.clientX,e.clientY);
  const pal=edPalette();
  if(edTestBtnHit(p)) return;                                // EDIT-TEST-1: 미리하기 버튼
  if(p.x>=24 && p.x<=250){   // 팔레트 클릭으로 선택
    for(let i=0;i<pal.length;i++){ const py=134+i*34; if(p.y>=py-14 && p.y<=py+16){ ED.palIdx=i; return; } }
  }
  if(ED.slot) return;                                      // P1-A: 슬롯 열림 중엔 배치 금지
  ED.mbtn=(e.button===2)?2:1;
  edPaintAt(p);
}
function edPaintAt(p){
  const g=edGridGeom();
  let c=(g.viewC||0)+Math.floor((p.x-g.gx)/g.cs), r=Math.floor((p.y-g.gy)/g.cs);
  if(r<0 || r>=ED.rows || c<0 || c>=ED.cols) return;
  if(!ED.pf && c>=ED.half) c=ED.cols-1-c;                  // 오른쪽(미러)을 눌러도 원본 칸 편집(플랫포머는 미러 없음)
  ED.cur={c:c, r:r};
  const ch=(ED.mbtn===2)?"." : edPalette()[ED.palIdx].ch;
  if(ED.cells[r][c]===ch) return;
  edSnapshot();
  if(ch===".") ED.cells[r][c]="."; else edPlace(ch);
  edSaveDraft();
}
function edPlace(ch){
  const {c,r}=ED.cur;
  if(ch==="*"){ for(let rr=0;rr<ED.rows;rr++) for(let cc=0;cc<ED.half;cc++) if(ED.cells[rr][cc]==="*") ED.cells[rr][cc]=".";
  } else if(ch==="O"||ch==="X"||ch==="G"){ for(let rr=0;rr<ED.rows;rr++) for(let cc=0;cc<ED.half;cc++) if(ED.cells[rr][cc]===ch) ED.cells[rr][cc]="."; }
  ED.cells[r][c]=ch; ED.msg="";
}
function handleEditorKey(code){
  if(!ED) { gameState=STATE.START; return; }
  if(ED.step==="mode"){
    if(code==="Escape"){ goToStartScreen(); return; }
    if(code==="ArrowUp"){ ED.modeIdx=(ED.modeIdx+EDITOR_MODES.length-1)%EDITOR_MODES.length; return; }
    if(code==="ArrowDown"){ ED.modeIdx=(ED.modeIdx+1)%EDITOR_MODES.length; return; }
    if(code==="Enter"||code==="NumpadEnter"){ ED.mode=EDITOR_MODES[ED.modeIdx].id; ED.sizeIdx=0; ED.step="size"; return; }
    return;
  }
  if(ED.step==="size"){
    const szs=edSizes();
    if(code==="Escape"){ ED.step="mode"; return; }
    if(code==="ArrowUp"){ ED.sizeIdx=(ED.sizeIdx+szs.length-1)%szs.length; return; }
    if(code==="ArrowDown"){ ED.sizeIdx=(ED.sizeIdx+1)%szs.length; return; }
    if(code==="Enter"||code==="NumpadEnter"){ edStartGrid(); return; }
    return;
  }
  // step === "edit"
  if(ED.slot){ handleSlotKey(code); return; }               // BIG-BATCH-2 P1-A: 저장 슬롯 열림 → 슬롯 키만
  const pal=edPalette();
  if(code==="KeyS"){ ED.slot={idx:0, confirm:-1, msg:"", flashIdx:-1, flashUntil:0, list:edLoadSlots()}; return; }   // P1-A: 저장 슬롯(PERF-2: 목록은 열 때 1회 로드)
  if(code==="Escape"){ goToStartScreen(); return; }         // C8: 초안 자동저장이 있어 나가도 소실 없음(다시 열면 복원)
  if(code==="ArrowUp"){ ED.cur.r=(ED.cur.r+ED.rows-1)%ED.rows; return; }
  if(code==="ArrowDown"){ ED.cur.r=(ED.cur.r+1)%ED.rows; return; }
  if(code==="ArrowLeft"){ ED.cur.c=(ED.cur.c+ED.half-1)%ED.half; edAutoScroll(); return; }
  if(code==="ArrowRight"){ ED.cur.c=(ED.cur.c+1)%ED.half; edAutoScroll(); return; }
  if(ED.pf && code==="Tab"){ ED.fitAll=!ED.fitAll; return; }                     // §3.8 전체보기 토글
  if(ED.pf && (code==="ArrowLeft"||code==="ArrowRight") && (keysDown.has("ShiftLeft")||keysDown.has("ShiftRight"))){
    const G=edGridGeom(), vc=Math.max(4, Math.floor(G.viewCols||10));
    ED.viewC=clamp((ED.viewC||0)+(code==="ArrowRight"?vc:-vc), 0, Math.max(0,ED.cols-vc));
    ED.cur.c=clamp(ED.cur.c, ED.viewC, ED.viewC+vc-1);
    return;
  }
  if(ED.pf && code==="KeyT"){                                                    // §3.8 테스트플레이 → 클리어해야 제출
    const v=validateEditorMap();
    if(!v.ok){ ED.msg="⚠ "+v.msg; return; }
    pfStartLevel({ id:"__edtest", name:"테스트", rows:ED.cells.map(r=>r.join("")) }, {test:true});
    return;
  }
  if(!ED.pf && code==="KeyT"){ edStartTest(); return; }                          // EDIT-TEST-1: 아레나 미리하기(나+봇1)
  if(code==="KeyQ"){ ED.palIdx=(ED.palIdx+pal.length-1)%pal.length; return; }
  if(code==="KeyE"||(!ED.pf&&code==="Tab")){ ED.palIdx=(ED.palIdx+1)%pal.length; return; }
  if(code==="KeyF"){ ED.floorIdx=(ED.floorIdx+1)%FLOOR_THEME_LIST.length; edSaveDraft(); return; }   // 바닥 테마 순환
  if(code==="KeyZ"||code==="Space"){ edSnapshot(); edPlace(pal[ED.palIdx].ch); edSaveDraft(); return; }
  if(code==="KeyX"||code==="Backspace"||code==="Delete"){ edSnapshot(); ED.cells[ED.cur.r][ED.cur.c]="."; edSaveDraft(); return; }
  if(code==="KeyU"){ edUndo(); return; }                    // C8: 되돌리기
  if(code==="KeyN"){ edClearDraft(); ED.step="mode"; ED.msg=""; showToast("새 맵 만들기"); return; }   // 새로 시작
  if(code==="Enter"||code==="NumpadEnter"){ edSubmit(); return; }
}
/* 검증(4-6): 시작점 1개 · 모드 요소 · 연결성(플러드필) · 벽≤25% · 풀숲≤15% */
function validateEditorMap(){
  if(ED.pf){   // GENRE-EXPAND-1 §3.8: 시작·골 각 1 필수(도달성은 테스트플레이 게이트가 보장)
    let st=0, gl=0, fl=0;
    for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
      const ch=ED.cells[r][c];
      if(ch==="*") st++; else if(ch==="G") gl++; else if(ch==="F") fl++;
    }
    if(st!==1) return {ok:false, msg:"시작점(*)이 정확히 1개 필요해요"};
    if(gl!==1) return {ok:false, msg:"골(G)이 정확히 1개 필요해요"};
    if(ED.cols>=66 && fl===0) return {ok:true, warn:"긴 맵엔 깃발(F) 체크포인트를 추천해요"};
    return {ok:true};
  }
  let stars=0, walls=0, bushes=0, modeCh=0;
  const need={siege:"X", hotzone:"O", stargrab:"G"}[ED.mode]||null;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
    const ch=ED.cells[r][c];
    if(ch==="*") stars++;
    if(ch==="W"||ch==="C") walls++;
    if(ch==="B") bushes++;
    if(need && ch===need) modeCh++;
  }
  if(stars!==1) return {ok:false, msg:"팀 시작점(★)이 정확히 1개 필요해요"};
  if(need && modeCh!==1) return {ok:false, msg:"이 모드의 목표 요소("+need+")를 1개 배치하세요"};
  // QUALITY-SWEEP-1 축20: 악성 배치 방지 — 시작점 주변 8칸에는 함정(가시/끈끈이/얼음) 금지(태어나자마자 피해 방지)
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){
    if(ED.cells[r][c]!=="*") continue;
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      const nr=r+dr, nc=c+dc;
      if(nr<0||nc<0||nr>=ED.rows||nc>=ED.half) continue;
      const nch=ED.cells[nr][nc];
      if(nch==="S"||nch==="L"||nch==="I") return {ok:false, msg:"시작점(★) 바로 옆에는 함정을 둘 수 없어요"};
    }
  }
  const total=ED.rows*ED.cols, wallPct=walls*2/total, bushPct=bushes*2/total;
  if(wallPct>0.25) return {ok:false, msg:"벽이 너무 많아요("+Math.round(wallPct*100)+"% > 25%)"};
  if(bushPct>0.15) return {ok:false, msg:"풀숲이 너무 많아요("+Math.round(bushPct*100)+"% > 15%)"};
  // BIG-BATCH-2 P1-B: 모드 특성 검증 — 칠하기=칠 가능 면적, 술래=수풀 최소치
  if(ED.mode==="paint"){
    let occ=0;
    for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.half;c++){ const ch=ED.cells[r][c]; if(ch!=="."&&ch!=="*"&&ch!=="O"&&ch!=="G"&&ch!=="X") occ++; }
    const paintPct=1-(occ*2/total);
    if(paintPct<0.5) return {ok:false, msg:"칠할 수 있는 바닥이 너무 적어요("+Math.round(paintPct*100)+"% < 50%)"};
    if(paintPct<0.65) return {ok:true, warn:"칠 면적이 좁은 편이에요("+Math.round(paintPct*100)+"%) — 빠른 승부가 나요"};
  }
  if(ED.mode==="tag" && bushes*2<3) return {ok:true, warn:"술래 맵엔 숨을 수풀을 3칸 이상 추천해요"};
  // 연결성: 전체 미러 그리드에서 시작점 기준 플러드필 — 모든 빈 칸 도달 가능해야
  const grid=edFullGrid();
  let sc=-1, sr=-1;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.cols;c++) if(grid[r][c]==="*"&&c<ED.half){ sc=c; sr=r; }
  const open=(ch)=>ch!=="W"&&ch!=="C";
  const seen=grid.map(row=>row.map(()=>false));
  const q=[[sc,sr]]; seen[sr][sc]=true; let reach=0, openN=0;
  for(let r=0;r<ED.rows;r++) for(let c=0;c<ED.cols;c++) if(open(grid[r][c])) openN++;
  while(q.length){ const [c,r]=q.pop(); reach++;
    for(const [dc,dr] of [[1,0],[-1,0],[0,1],[0,-1]]){
      const nc=c+dc, nr=r+dr;
      if(nc<0||nr<0||nc>=ED.cols||nr>=ED.rows||seen[nr][nc]||!open(grid[nr][nc])) continue;
      seen[nr][nc]=true; q.push([nc,nr]);
    } }
  if(reach<openN) return {ok:false, msg:"벽으로 막혀 못 가는 곳이 있어요(연결성)"};
  return {ok:true};
}
function edFullGrid(){
  if(ED.pf) return ED.cells;   // 플랫포머: 미러 없음
  const grid=[];
  for(let r=0;r<ED.rows;r++){ const row=[];
    for(let c=0;c<ED.cols;c++) row.push(c<ED.half ? ED.cells[r][c] : ED.cells[r][ED.cols-1-c]);
    grid.push(row);
  }
  return grid;
}
function edSubmit(){
  const v=validateEditorMap();
  if(!v.ok){ ED.msg="⚠ "+v.msg; return; }
  if(ED.pf && !ED.testCleared){ ED.msg="⚠ 테스트플레이(T)로 직접 클리어해야 제출할 수 있어요"; return; }
  if(v.warn) showToast("💡 "+v.warn);
  let name=null; try{ name=window.prompt("맵 이름 (2~10자)"); }catch(e){ name=null; }
  if(!name) return; name=(""+name).trim().slice(0,10);
  if(name.length<2){ ED.msg="⚠ 이름은 2자 이상"; return; }
  const st=loadEditorStore();
  const rec={ id:"ed_"+Date.now().toString(36)+Math.floor(Math.random()*100),
    name:name, author:profile.nickname||"", mode:ED.mode, size:[ED.cols,ED.rows],
    floor:FLOOR_THEME_LIST[ED.floorIdx], cellsLeft:ED.cells.map(row=>row.join("")), createdAt:Date.now() };
  st.pending.push(rec);
  saveEditorStore(st);
  // BIG-BATCH-2 P3: 학급 클라우드에도 제출(오프라인이면 다음 부팅 동기화 때 업로드)
  try{ MapStore.pushRec("pending", rec, function(ok){
    if(ok){ const cur=loadEditorStore(); const hit=cur.pending.find(x=>x.id===rec.id); if(hit){ hit._synced=true; saveEditorStore(cur); } } }); }catch(e){}
  edClearDraft();                                          // C8: 제출 성공 → 초안 정리
  _reviewSt=null; _adminPendingN=-1; _pfSel=null;          // PERF-2: 화면 캐시 무효화
  showToast("제출 완료! 선생님 승인을 기다려요 🛠");
  goToStartScreen();
}
/* ── EDIT-TEST-1: 아레나 모드 에디터 미리하기(나 + 봇 1) — 별빛점프 테스트플레이의 탑다운판 ──
   현재 편집 중인 맵을 즉석 컴파일해 solo(1대1) 섬멸전으로 플레이. 점수·보상·제출 게이트 없음.
   Esc(또는 결과화면 버튼·터치 🔙)로 편집하던 맵 그대로 에디터 복귀. */
let edTest=null;   // {mapId,modeId,ruleId} 복원용 — 활성 시 테스트 중
function edStartTest(){
  if(!ED || ED.pf) return;                                 // 플랫포머는 기존 pfStartLevel 테스트 사용
  const v=validateEditorMap(); if(!v.ok){ ED.msg="⚠ "+v.msg; return; }
  const rec={ id:"__edtest", name:(getRule(ED.mode)?getRule(ED.mode).name:"")+" 테스트", author:profile.nickname||"",
    mode:ED.mode, size:[ED.cols,ED.rows], floor:FLOOR_THEME_LIST[ED.floorIdx],
    cellsLeft:ED.cells.map(r=>r.join("")), createdAt:0 };
  const map=compileEditorMap(rec);
  const i=MAPS.findIndex(m=>m.id==="__edtest"); if(i>=0) MAPS[i]=map; else MAPS.push(map);
  edTest={ mapId:selectedMapId, modeId:selectedModeId, ruleId:selectedRuleId };
  selectedMapId="__edtest"; selectedModeId="solo"; selectedRuleId="tdm";   // 나 + 봇 1(섬멸전)
  selectedCharacterId=sanitizeCharacterId(profile.selectedCharacterId);
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  resetMatch(); gameState=STATE.PLAYING;                   // startGame 우회(applyProfileSelections가 맵을 덮어씀)
}
function edEndTest(){   // 테스트 종료 → 에디터 복귀 + 임시 맵/선택 정리
  if(!edTest) return false;
  selectedMapId=edTest.mapId; selectedModeId=edTest.modeId; selectedRuleId=edTest.ruleId; edTest=null;
  const i=MAPS.findIndex(m=>m.id==="__edtest"); if(i>=0) MAPS.splice(i,1);
  keysDown.clear(); confirmLeave=false;
  gameState=STATE.EDITOR;
  return true;
}
/* 승인된 에디터 맵 → 플레이 가능한 MAPS로 컴파일(기본 크기만 — 대형은 카메라 후속) */
function compileEditorMap(rec){
  const cols=rec.size[0], rows=rec.size[1], half=cols/2, CS=STUDENT_CELL, OX=24, OY=70;
  const grid=[];
  for(let r=0;r<rows;r++){ const left=rec.cellsLeft[r]; let row="";
    for(let c=0;c<cols;c++) row += (c<half ? left[c] : left[cols-1-c]);
    grid.push(row);
  }
  const obstacles=[], bushes=[], traps=[]; let spawn=null; const rulePoints={}; let wallN=0;
  for(let r=0;r<rows;r++){
    let c=0;
    while(c<cols){
      const ch=grid[r][c];
      const cellCx=OX+c*CS+CS/2, cellCy=OY+r*CS+CS/2;
      if(ch==="*"){ if(c<half) spawn={x:cellCx, y:cellCy}; c++; continue; }
      if(ch==="O"){ if(c<half) rulePoints.zone={x:OX+cols*CS/2, y:cellCy}; c++; continue; }        // 거점: 대칭 중심선 위
      if(ch==="G"){ if(c<half) rulePoints.vein={x:OX+cols*CS/2, y:cellCy}; c++; continue; }        // 별광맥: 중심선 위
      if(ch==="X"){ if(c<half){ rulePoints.towers={ player:{x:cellCx,y:cellCy}, enemy:{x:OX+cols*CS-(cellCx-OX),y:cellCy} }; } c++; continue; }
      if(ch==="."){ c++; continue; }
      let c2=c; while(c2+1<cols && grid[r][c2+1]===ch) c2++;   // 가로 연속 병합
      const rect={ x:OX+c*CS, y:OY+r*CS, w:(c2-c+1)*CS, h:CS };
      if(ch==="W") obstacles.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, kind:"rock" });
      else if(ch==="C"){ // 쿠션벽: 부서지는 구조물(팀 없음 — 양 팀 탄에 부서짐). 칸 단위로 분할
        for(let cc=c;cc<=c2;cc++) obstacles.push({ x:OX+cc*CS, y:rect.y, w:CS, h:CS, kind:"wall",
          sid:"ewall_"+r+"_"+cc, structure:true, team:null, hp:RULE_CONFIG.siege.wallHp, maxHp:RULE_CONFIG.siege.wallHp });
      }
      else if(ch==="B") bushes.push(rect);
      else if(ch==="S") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"damage" });
      else if(ch==="L") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"slow" });
      else if(ch==="I") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"ice" });
      c=c2+1;
    }
  }
  if(!spawn) spawn={x:OX+CS*1.5, y:OY+rows*CS/2};
  return { id:rec.id, name:"🛠"+rec.name, desc:"맵공방 · "+(rec.author||"학생")+" · "+(getRule(rec.mode).name),
    floorColor:"#222a52", strokeColor:"#5b74b8", floor:rec.floor||"basic",
    playerSpawn:spawn, enemySpawn:{ x:OX+cols*CS-(spawn.x-OX), y:spawn.y },
    gridCols:cols, gridRows:rows,   // P4: 줌아웃 카메라가 맵 크기를 읽는 필드
    obstacles:obstacles, bushes:bushes, traps:traps, rulePoints:rulePoints, editorMode:rec.mode };
}
function applyApprovedMaps(){
  const st=loadEditorStore();
  // BIG-BATCH-1 D11: 승인 목록과 MAPS를 완전 동기화 — 삭제·비활성된 에디터 맵은 목록에서 내려간다
  const want={};
  for(const rec of st.approved){
    if(rec.mode==="platformer") continue;                // 플랫포머 레벨은 별빛 점프 레벨 선택이 직접 읽음(§3.8)
    if(rec.disabled) continue;                           // 비활성(교사가 잠시 내림)  — P4: 대형 맵도 탑재(줌아웃 카메라)
    want[rec.id]=rec;
  }
  for(let i=MAPS.length-1;i>=0;i--){                     // editorMode 필드 = 에디터 산(産) 맵 표식(내장 맵은 없음)
    const m=MAPS[i];
    if(m.editorMode!==undefined && !want[m.id]) MAPS.splice(i,1);
  }
  for(const id in want){
    const map=compileEditorMap(want[id]);
    const i=MAPS.findIndex(m=>m.id===id);
    if(i>=0) MAPS[i]=map; else MAPS.push(map);
  }
  // 선택 맵이 사라졌으면 기본 맵으로(전역 + 프로필)
  if(!MAPS.find(m=>m.id===selectedMapId)){ selectedMapId="training"; if(profile){ profile.selectedMapId="training"; try{ saveProfile(); }catch(e){} } }
}
/* ── 교사 맵 승인 화면 ── */
/* BIG-BATCH-1 D11: 승인 화면이 대기+승인 두 목록을 관리 — 승인맵 삭제·비활성·(사실상) 승인취소 지원 */
function reviewList(st){   // 통합 목록: [{kind:"pending"|"approved", rec}]
  const out=[];
  for(const r of st.pending) out.push({kind:"pending", rec:r});
  for(const r of st.approved) out.push({kind:"approved", rec:r});
  return out;
}
function handleMapReviewKey(code){
  const st=loadEditorStore();
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  const list=reviewList(st);
  if(!list.length) return;
  if(reviewIdx>=list.length) reviewIdx=0;
  if(code==="ArrowUp"){ reviewIdx=(reviewIdx+list.length-1)%list.length; return; }
  if(code==="ArrowDown"){ reviewIdx=(reviewIdx+1)%list.length; return; }
  const it=list[reviewIdx];
  if(it.kind==="pending"){
    if(code==="Enter"||code==="NumpadEnter"){                 // 승인 → 게임 맵 목록에 반영
      const i=st.pending.indexOf(it.rec); st.pending.splice(i,1);
      it.rec._synced=true;
      st.approved.push(it.rec); saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorApprove(it.rec); }catch(e){}        // P3: 클라우드 반영(전 클라이언트 공유)
      showToast("승인: "+it.rec.name+" — 맵 목록에 추가됨"+(it.rec.size[0]>22?" (줌아웃 카메라)":""));
    } else if(code==="KeyX"||code==="Delete"){                // 거절(삭제)
      const i=st.pending.indexOf(it.rec); st.pending.splice(i,1);
      saveEditorStore(st); showToast("거절: "+it.rec.name);
      try{ MapStore.mirrorReject(it.rec.id); }catch(e){}
    } else return;
  } else {
    if(code==="KeyX"||code==="Delete"){                       // 승인 취소(완전 삭제 — 맵 목록에서 즉시 내려감)
      const i=st.approved.indexOf(it.rec); st.approved.splice(i,1);
      saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorDelete(it.rec.id); }catch(e){}
      showToast("삭제: "+it.rec.name+" — 맵 목록에서 내려감");
    } else if(code==="KeyD"){                                 // 비활성/활성 토글(기록은 보존, 목록에서만 내림)
      it.rec.disabled=!it.rec.disabled;
      saveEditorStore(st); applyApprovedMaps();
      try{ MapStore.mirrorDisable(it.rec); }catch(e){}
      showToast((it.rec.disabled?"⏸ 비활성: ":"▶ 활성: ")+it.rec.name);
    } else return;
  }
  _reviewSt=null; _adminPendingN=-1;   // PERF-2: 조작 후 캐시 무효화(다음 프레임 재로드)
  const n=reviewList(loadEditorStore()).length;
  if(reviewIdx>=n) reviewIdx=Math.max(0,n-1);
}
function handleSettingsKey(code){
  const N=5;   // 0 조작 방식 · 1 소리 · 2 별명 변경 · 3 로그아웃 · 4 교사용 모드
  if(code==="Escape"){ settingsOpen=false; return; }
  if(code==="ArrowUp"){ settingsIndex=(settingsIndex+N-1)%N; return; }
  if(code==="ArrowDown"){ settingsIndex=(settingsIndex+1)%N; return; }
  if(settingsIndex===0 && (code==="ArrowLeft"||code==="ArrowRight"||code==="Enter"||code==="NumpadEnter")){
    // UPDATE-1 P3: 조작 방식 순환(키보드/마우스/터치) — 프로필 저장
    const dir=(code==="ArrowLeft")?-1:1;
    const ids=CONTROL_MODES.map(c=>c.id);
    let i=ids.indexOf(controlMode()); if(i<0)i=0;
    profile.controlMode=ids[(i+dir+ids.length)%ids.length];
    saveProfile(); showToast("조작 방식: "+controlModeName());
    return;
  }
  if(settingsIndex===1 && (code==="ArrowLeft"||code==="ArrowRight")){
    // E14: 효과음 볼륨 0~100%(10% 단위) — 에셋이 들어오면 즉시 반영되는 값
    const d=(code==="ArrowLeft")?-0.1:0.1;
    profile.sfxVolume=Math.round(clamp((profile.sfxVolume||0.7)+d,0,1)*10)/10;
    saveProfile(); showToast("효과음 볼륨: "+Math.round(profile.sfxVolume*100)+"%");
    return;
  }
  if(code==="Enter"||code==="NumpadEnter"){
    if(settingsIndex===2) changeNickname();
    else if(settingsIndex===3){ settingsOpen=false; doLogout(); }
    else if(settingsIndex===4){ settingsOpen=false; gameState=STATE.ADMIN_LOGIN; }
  }
}

function handleLoginKey(code){

function handleAdminKey(code){
  if(!accounts) loadAccounts();
  const list=studentList();
  if(code==="Escape"){ session=null; saveSession(); gameState=STATE.LOGIN; return; }   // 로그아웃→로그인
  if(code==="ArrowUp"||code==="ArrowDown"){
    if(!list.length) return;
    let i=list.findIndex(s=>s.id===adminSelId); if(i<0)i=0;
    i=(i+(code==="ArrowDown"?1:list.length-1))%list.length; adminSelId=list[i].id; return;
  }
  if(code==="KeyA"){ adminCreateStudent(); return; }            // 계정 만들기
  if(code==="KeyP"){ adminResetPin(); return; }                 // PIN 재설정
  if(code==="KeyR"){ adminResetStudent(); return; }             // 계정 초기화
  if(code==="KeyX"||code==="Delete"){ adminDeleteStudent(); return; } // 계정 삭제
  if(code==="KeyS"){ adminRefreshFromCloud(); return; }         // 클라우드 새로고침
  if(code==="KeyM"){ adminMigrateLocal(); return; }             // 로컬 계정 클라우드 이전
  if(code==="KeyG"){ reviewIdx=0; _reviewSt=null; gameState=STATE.MAP_REVIEW; try{ MapStore.sync(); }catch(e){} return; }   // OVERNIGHT-1: 학생 맵 승인 + P3: 열 때 클라우드 동기화
  if(code==="KeyB"){ BAL.cat=0; BAL.idx=0; BAL.scroll=0; BAL.edit=null; BAL.confirmReset=0; gameState=STATE.BALANCE; return; }   // BALANCE-1: 밸런스 조정
  if(code==="KeyJ"){ rpgEnter(); return; }   // RPG모드 §1.2 P1: 🌙 별빛 마을(교사 전용 진입)
  if(code==="KeyK"){ rpgReviewIdx=0; gameState=STATE.RPG_REVIEW; return; }   // RPG모드 §7.4: 학생 콘텐츠 승인
}

function changeMenuValue(row, dir){
  if(row===1||row===6) cycleDifficulty(dir);   // 1: 캠페인 난이도 · 6: 빠른 대전 난이도(같은 값 공유)
  else if(row===3) cycleRule(dir);              // 빠른 대전 규칙(지금은 섬멸전 1종)
  else if(row===4) cycleMode(dir);              // 빠른 대전 팀(1대1·3대3)
  else if(row===5) cycleMap(dir);               // 빠른 대전 맵
  else if(row>=9&&row<=12){                     // ②섹션 스트립·⚙설정: ←→로 가로 이동
    menuIndex=row+dir; if(menuIndex<9)menuIndex=12; if(menuIndex>12)menuIndex=9;
  }

  else if(row===12) openSettings();         // ⚙ 설정(로그아웃·교사용·별명)

/* =======================================================================
   메뉴 동작
   ======================================================================= */
function cycleInList(list, currentId, dir){
  let idx=0;
  for(let i=0;i<list.length;i++){ if(list[i]===currentId){ idx=i; break; } }
  idx=(idx+dir+list.length)%list.length;
  return list[idx];
}
function cycleCharacter(dir){
  selectedCharacterId=cycleInList(profile.unlockedCharacters,selectedCharacterId,dir);
  profile.selectedCharacterId=selectedCharacterId;
  // 무기 완전 고정: 캐릭터 변경 즉시 그 캐릭터의 고정 무기로 자동 변경
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
  saveProfile();
}
// 무기 선택 제거: 무기는 캐릭터에서 계산. (하위호환용으로 함수는 남기되 항상 고정 무기로 재교정)
function cycleWeapon(dir){
  selectedWeaponId=getWeaponForCharacter(selectedCharacterId);
  profile.selectedWeaponId=selectedWeaponId;
}
function cycleDifficulty(dir){ selectedDifficultyId=cycleInList(DIFFICULTIES.map(d=>d.id),selectedDifficultyId,dir); profile.selectedDifficultyId=selectedDifficultyId; saveProfile(); }
function cycleMap(dir){ selectedMapId=cycleInList(MAPS.map(m=>m.id),selectedMapId,dir); profile.selectedMapId=selectedMapId; saveProfile(); }
function cycleMode(dir){ selectedModeId=cycleInList(MODES.map(m=>m.id),selectedModeId,dir); profile.selectedModeId=selectedModeId; saveProfile(); }
function cycleRule(dir){ selectedRuleId=cycleInList(RULES.map(r=>r.id),selectedRuleId,dir); }   // 규칙 1종이라 지금은 제자리(자리만 심음)

function openShop(){
  if(!SHOP_ENABLED){ showToast("상점은 준비 중이에요 (곧 다시 열려요!)"); return; }   // 임시 비활성(코드/골드 보존)
  rebuildShopItems(); shopIndex=0; gameState=STATE.SHOP;
}
function rebuildShopItems(){
  shopItems=[];
  // 학생 6종 체제: 상점 목록도 학생 세트로 제한(레거시 잠정 비활성 — 복구하려면 STUDENT_* 를 CHARACTERS/WEAPONS 로 되돌리면 됨)
  for(const c of STUDENT_CHARACTERS){ if(profile.unlockedCharacters.indexOf(c.id)<0) shopItems.push({kind:"character",id:c.id,name:c.name,cost:c.unlockCost,desc:c.desc}); }
  for(const w of STUDENT_WEAPONS){ if(profile.unlockedWeapons.indexOf(w.id)<0) shopItems.push({kind:"weapon",id:w.id,name:w.name,cost:w.unlockCost,desc:w.desc}); }
}
function handleShopKey(code){
  if(code==="Escape"){ gameState=STATE.START; return; }
  if(shopItems.length===0){ if(code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(code==="ArrowUp"){ shopIndex=(shopIndex+shopItems.length-1)%shopItems.length; return; }
  if(code==="ArrowDown"){ shopIndex=(shopIndex+1)%shopItems.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ buyShopItem(); return; }
}
function buyShopItem(){
  const item=shopItems[shopIndex];
  if(!item) return;
  if(profile.gold<item.cost){ showToast("골드가 부족합니다!"); return; }
  addGold(-item.cost);
  if(item.kind==="character"){ unlockCharacter(item.id); showToast(item.name+" 캐릭터 해금!"); }
  else { unlockWeapon(item.id); showToast(item.name+" 무기 해금!"); }
  saveProfile();
  rebuildShopItems();
  if(shopIndex>=shopItems.length) shopIndex=Math.max(0,shopItems.length-1);
}

   한 판 설정 / 파이터 생성 / 초기화
   ======================================================================= */
function getMatchConfig(){
  const diff=getDifficulty(selectedDifficultyId);
  const rule=getRule(selectedRuleId);
  // 오브젝트 모드(GAMEPLAY-1 Phase 3)는 3v3 고정·180초·규칙별 리스폰. 섬멸전은 기존 그대로.
  const mode=(rule.id==="tdm")?getMode(selectedModeId):getMode("trio");
  return {
    diff:diff, mode:mode, map:getMap(selectedMapId),
    rule:rule, ruleId:rule.id,
    timeLimit: (rule.id==="tdm")?GAME_CONFIG.gameTime:((RULE_CONFIG[rule.id]&&RULE_CONFIG[rule.id].matchTime)||RULE_CONFIG.matchTime),
    respawnDelay: (rule.id==="tdm")?GAME_CONFIG.respawnDelay
                 :((RULE_CONFIG[rule.id]&&RULE_CONFIG[rule.id].respawn)||GAME_CONFIG.respawnDelay),   // GENRE-EXPAND-1: 규칙별 일반화
    enemyMaxHp: GAME_CONFIG.enemyMaxHp * diff.enemyHpMul * mode.enemyStatMul,
    enemyMoveSpeed: GAME_CONFIG.enemyMoveSpeed * diff.enemySpeedMul * TEMPO.enemyMove,
    enemyDamage: GAME_CONFIG.enemyDamage * diff.enemyDamageMul * mode.enemyDamageMul,
    enemyAttackCooldown: GAME_CONFIG.enemyAttackCooldown * diff.enemyCooldownMul,
    enemyAimError: diff.enemyAimError,
    enemyBulletSpeed: GAME_CONFIG.enemyBulletSpeed * TEMPO.enemyBullet,
    enemyRange: GAME_CONFIG.enemyRange,
    bossMaxHp: GAME_CONFIG.bossMaxHp * diff.bossHpMul,
    bossDamageMul: GAME_CONFIG.bossDamageMul * diff.bossDamageMul,
    // v1.27 캐릭터 봇 스킬 파라미터(쉬움=거의 안 씀 / 어려움=적극 사용)
    botSpecialProb: diff.botSpecialProb||0,
    botUltChargeRate: diff.botUltChargeRate||0,
    botUltProb: diff.botUltProb||0
  };
}

// 모든 파이터(캐릭터)를 만드는 공통 함수
function makeFighter(opts){
  const team=opts.team;
  const isPlayer=!!opts.isPlayer;
  let charData=null, maxHp, moveSpeed, color, subColor;

  if(team==="player"){
    charData=getCharacter(opts.characterId || "lumi");
    maxHp=GAME_CONFIG.playerMaxHp*charData.hpMul;
    moveSpeed=GAME_CONFIG.playerMoveSpeed*charData.speedMul;
    color=charData.color; subColor=charData.subColor;
  } else {
    if(opts.isBoss){ maxHp=MATCH.bossMaxHp; moveSpeed=MATCH.enemyMoveSpeed*0.9; color="#b3203a"; subColor="#ff6a86"; }
    else {
      // 전투 밸런스(HP·이동·피해·쿨다운)는 난이도(MATCH) 기반 유지 — 캐릭터는 외형·스킬 정체성만
      maxHp=MATCH.enemyMaxHp; moveSpeed=MATCH.enemyMoveSpeed;
      if(opts.characterId){                       // v1.27 캐릭터 봇(빠른대전): 진짜 캐릭터로 렌더 + X/C 사용
        charData=getCharacter(opts.characterId);
        color=charData.color; subColor=charData.subColor;
      } else { color="#8a3fd0"; subColor="#e0b3ff"; }
    }
  }

  const r=opts.isBoss?38:22;
  const spawn=findClearSpawn(opts.x,opts.y,r);

  return {
    id:++fighterIdCounter,
    team:team, isPlayer:isPlayer, isBoss:!!opts.isBoss,
    characterId: charData?charData.id:null,
    weaponId: charData?getWeaponForCharacter(charData.id):null,   // 무기 완전 고정(캐릭터에서 계산)
    specialCd:0, superGauge:0,   // 봇 X 쿨타임·C 게이지(플레이어 본인 게이지는 전역 superGauge)
    stars:0,                     // GAMEPLAY-1 stargrab: 보유한 별
    name: opts.name || (charData?charData.name:"크롬"),
    char: charData,
    baseX:opts.x, baseY:opts.y,
    x:spawn.x, y:spawn.y, r:r,
    maxHp:maxHp, hp:maxHp, displayHp:maxHp,
    moveSpeed:moveSpeed, color:color, subColor:subColor,
    facing: team==="player"?0:Math.PI,
    cooldown:0, lastCombatTime:-999, lastFireTime:-999,
    hitFlash:0, dead:false, respawnTimer:0, invincibleTimer:0,
    ai:{ strafeDir:1, strafeTimer:0, reactionTimer:0.3, fireTimer:rand(0,0.4),
         lastX:spawn.x, lastY:spawn.y, stuckCheck:0.4, avoidDir:1, avoidTimer:0,
         knowsTarget:true, lastKnownX:spawn.x, lastKnownY:spawn.y } };
}

function teamSlotPos(base, slot){
  const offsets=[ {dx:0,dy:0}, {dx:60,dy:-50}, {dx:-60,dy:50}, {dx:60,dy:50}, {dx:-60,dy:-50} ];
  const o=offsets[slot%offsets.length];
  return { x:base.x+o.dx, y:base.y+o.dy };
}

function createFighters(){
  const mode=MATCH.mode, map=MATCH.map;
  fighterIdCounter=0;

  const pPos=teamSlotPos(map.playerSpawn,0);
  player=makeFighter({ team:"player", isPlayer:true, characterId:selectedCharacterId, x:pPos.x, y:pPos.y });
  initAmmo(player);   // 장전: 사람이 조종하는 플레이어만 탄창 사용

  allies=[];
  const allyPool=profile.unlockedCharacters.filter(id=>id!==selectedCharacterId);
  for(let i=0;i<mode.allyCount;i++){
    const charId = allyPool.length>0 ? allyPool[i%allyPool.length] : selectedCharacterId;
    const pos=teamSlotPos(map.playerSpawn,i+1);
    allies.push(makeFighter({ team:"player", isPlayer:false, characterId:charId, x:pos.x, y:pos.y }));
  }

  enemies=[];
  // v1.27 캐릭터 봇: 적도 실제 학생 캐릭터로(플레이어와 안 겹치게 · 여러 명이면 서로 다른 캐릭터)
  const botPool=STUDENT_CHARACTERS.map(c=>c.id).filter(id=>id!==selectedCharacterId);
  const botOff=Math.floor(Math.random()*Math.max(1,botPool.length));
  for(let i=0;i<mode.enemyCount;i++){
    const pos=teamSlotPos(map.enemySpawn,i);
    const charId=botPool.length?botPool[(botOff+i)%botPool.length]:selectedCharacterId;
    enemies.push(makeFighter({ team:"enemy", isPlayer:false, characterId:charId, x:pos.x, y:pos.y,
      name:"봇 "+getCharacter(charId).name }));
  }
  enemy=enemies[0];
}

function playerTeam(){ return [player].concat(allies); }
function allFighters(){ return [player].concat(allies, enemies); }
function targetsOf(team){ return team==="player" ? enemies : playerTeam(); }

/* =======================================================================
   GAMEPLAY-1 Phase 3 · 오브젝트 모드 3종 (로컬 빠른대전 전용 규칙 엔진)
   - siege 수정부수기: 팀 수정탑(자동 포탑) + 쿠션 벽 — 상대 탑 파괴 시 즉시 승리
   - hotzone 핫존: 중앙 거점 단독 점유 시 팀 게이지 +8/초 — 100 도달 즉시 승리
   - stargrab 별모으기: 중앙 별 픽업 — 팀 합계 10개로 15초 카운트다운 완주 시 승리
   시간 종료 시엔 규칙별 우열 비교(ruleTimeUp). 온라인/캠페인 경로는 건드리지 않는다.
   ======================================================================= */
let RULE=null;   // 진행 중 규칙 상태(섬멸전이면 null)
function setupRuleState(){
  RULE=null;
  const id=matchRuleId(); if(id==="tdm") return;
  const rp=(MATCH.map&&MATCH.map.rulePoints)||{};   // OVERNIGHT-1: 에디터 맵의 모드 요소 배치점(있으면 우선)
  if(id==="siege"){
    const C=RULE_CONFIG.siege, map=MATCH.map;
    RULE={ id:id, winner:null, towers:{}, turretAcc:{player:0.8, enemy:0.8} };
    for(const team of ["player","enemy"]){
      const sp=(team==="player")?map.playerSpawn:map.enemySpawn;
      const dirX=(sp.x<LOGW/2)?-1:1;   // 자기 진영 가장자리 방향
      // 수정탑: 에디터 배치점 우선, 없으면 스폰 뒤쪽(가장자리 쪽)에 자동 배치
      const tp=rp.towers&&rp.towers[team];
      const tx=clamp((tp?tp.x:sp.x+dirX*110)-C.towerW/2, ARENA.x+8, ARENA.x+ARENA.w-C.towerW-8);
      const ty=clamp((tp?tp.y:sp.y)-C.towerH/2, ARENA.y+8, ARENA.y+ARENA.h-C.towerH-8);
      const tower={ x:tx, y:ty, w:C.towerW, h:C.towerH, sid:"rtower_"+team, team:team, hp:C.towerHp, maxHp:C.towerHp, structure:true };
      OBSTACLES.push(tower); RULE.towers[team]=tower;
      // 건설 벽(쿠션): 스폰 앞(중앙 방향) 세로 3장
      for(let i=0;i<C.wallCount;i++){
        const wx=clamp(sp.x-dirX*130-C.wallW/2, ARENA.x+8, ARENA.x+ARENA.w-C.wallW-8);
        const wy=clamp(sp.y+(i-1)*120-C.wallH/2, ARENA.y+8, ARENA.y+ARENA.h-C.wallH-8);
        OBSTACLES.push({ x:wx, y:wy, w:C.wallW, h:C.wallH, sid:"rwall_"+team+"_"+i, team:team, hp:C.wallHp, maxHp:C.wallHp, structure:true });
      }
    }
  } else if(id==="hotzone"){
    // BIG-BATCH-2 P1: 거점 이동 — 내장맵은 moveEvery초마다 중심선 위 3지점 순환(단조로움 해소). 에디터 배치 거점은 제작자 의도 존중 = 고정.
    RULE={ id:id, winner:null, x:(rp.zone&&rp.zone.x)||(ARENA.x+ARENA.w/2), y:(rp.zone&&rp.zone.y)||ARENA.y+ARENA.h/2,
           radius:RULE_CONFIG.hotzone.radius, gauge:{player:0, enemy:0}, holder:null,
           fixed:!!rp.zone, moveT:0, posIdx:0, warn:0 };
  } else if(id==="stargrab"){
    RULE={ id:id, winner:null, stars:[], spawnAcc:RULE_CONFIG.stargrab.spawnEvery-1, countdown:{player:-1, enemy:-1},
           cx:(rp.vein&&rp.vein.x)||(ARENA.x+ARENA.w/2), cy:(rp.vein&&rp.vein.y)||ARENA.y+ARENA.h/2 };
  } else if(id==="tag"){
    // GENRE-EXPAND-1 §1: 파이터 생성 후 첫 틱에서 술래를 뽑는다(needInit)
    RULE={ id:id, winner:null, needInit:true, phase:"reveal", phaseT:RULE_CONFIG.tag.reveal,
           survivors:0, myInfections:0, mySurvival:0 };
  } else if(id==="paint"){
    // GENRE-EXPAND-1 §2: 56px 셀 페인트 그리드 + 칠 불가 마스크(벽·수풀·함정·구조물 — 1회 계산)
    const map=MATCH.map, cols=(map.gridCols||STUDENT_COLS), rows=(map.gridRows||STUDENT_ROWS);   // P4: 대형 맵 그리드 확장
    const grid=new Uint8Array(cols*rows), blocked=new Uint8Array(cols*rows);
    const markRects=(rects)=>{ for(const o of (rects||[])){
      const c0=Math.max(0,Math.floor((o.x-ARENA.x)/STUDENT_CELL)), c1=Math.min(cols-1,Math.floor((o.x+o.w-1-ARENA.x)/STUDENT_CELL));
      const r0=Math.max(0,Math.floor((o.y-ARENA.y)/STUDENT_CELL)), r1=Math.min(rows-1,Math.floor((o.y+o.h-1-ARENA.y)/STUDENT_CELL));
      for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++) blocked[r*cols+c]=1; } };
    markRects(OBSTACLES); markRects(map.bushes); markRects(map.traps);
    let paintable=0; for(let i=0;i<blocked.length;i++) if(!blocked[i]) paintable++;
    RULE={ id:id, winner:null, cols:cols, rows:rows, grid:grid, blocked:blocked, paintable:paintable,
           count:{1:0,2:0}, barT:0, bar:{p:0,e:0}, myPaint:0, gaugeAcc:0 };
  }
}
/* ── GENRE-EXPAND-1 §1 별빛 술래 ── */
function tagInfect(f, initial){
  if(!f || f.isTagger) return;
  if(!initial && f.tagImmuneT>0) return;                       // BIG-BATCH-2 P1: 방어막 직후 짧은 면역
  if(!initial && f.tagShield>0){                               // 별골렘 패시브: 1회 잡기 방어막
    f.tagShield=0; f.tagImmuneT=1.0;
    effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.4, radius:60});
    if(f.isPlayer) showToast("🛡 방어막이 잡기를 한 번 막았다!");
    return;
  }
  f.isTagger=true; f.tagCd=RULE_CONFIG.tag.tagCd;
  f.hitFlash=0.3;
  effects.push({kind:"superwave", x:f.x, y:f.y, t:0, life:0.5, radius:70});
  effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.5, color:"#ff5a6e"});
  playSfx("infect");
  const isMe=f.isPlayer || (f.slot && OnlineManager.mySlot===f.slot);   // P2: 온라인 호스트 자신도 토스트
  if(!initial && isMe) showToast("잡혔다! 이제 너가 술래 👹");
}
function tickTagRule(dt){
  const C=RULE_CONFIG.tag;
  if(RULE.needInit){
    const all=allFighters(); if(!all.length) return;
    RULE.needInit=false;
    tagInfect(all[Math.floor(Math.random()*all.length)], true);
    for(const f of all) if(!f.isTagger && f.char && f.char.id==="student_06") f.tagShield=1;   // BIG-BATCH-2 P1: 별골렘 도망자 = 1회 방어막
    return;
  }
  if(RULE.phase==="reveal"){ RULE.phaseT-=dt; if(RULE.phaseT<=0) RULE.phase="chase"; return; }
  const all=allFighters();
  for(const f of all){ if(f.tagCd>0) f.tagCd-=dt; }
  if(player && !player.isTagger) RULE.mySurvival+=dt;
  // 잡기: 술래(쿨 아님)와 도망자 충돌원 겹침 → 감염(연쇄 즉감염은 tagCd 2s가 방지)
  for(const t of all){
    if(!t.isTagger || t.dead || t.tagCd>0) continue;
    for(const r of all){
      if(r.isTagger || r.dead) continue;
      if(dist2(t.x,t.y,r.x,r.y) < (t.r+r.r)*(t.r+r.r)){
        tagInfect(r, false);
        if(t.isPlayer){ stats.kills++; RULE.myInfections++; }   // E16 연동: 감염 1회 = 킬 1 취급
      }
    }
  }
  let survivors=0; for(const f of all){ if(!f.isTagger && !f.dead) survivors++; }
  RULE.survivors=survivors;
  // BIG-BATCH-2 P1: 술래가 늘수록 도망자 미세 이속 버프(+4%/명, 최대 +12%)
  const taggers=all.length-survivors;
  RULE.runnerMul=1+Math.min(C.runnerBuffMax, C.runnerBuffPer*Math.max(0,taggers-1));
  // BIG-BATCH-2 P1: 최후의 1인 하이라이트
  if(survivors===1 && !RULE.lastOne){
    RULE.lastOne=true;
    const last=all.find(f=>!f.isTagger && !f.dead);
    if(last){ effects.push({kind:"superwave", x:last.x, y:last.y, t:0, life:0.8, radius:120});
      showToast(last.isPlayer ? "⭐ 최후의 생존자는 너다! 버텨라!" : "⭐ 최후의 생존자: "+(last.char?last.char.name:"?")); }
  }
  if(survivors===0) ruleWin(player && player.isTagger ? "player" : "enemy");   // 전원 감염 → 술래팀 승
}
/* BIG-BATCH-2 P1: 술래 모드 전용 대체 도구(원본 스킬 훼손 없음 — X키 오버라이드)
   럭키=반짝 대시 · 달이=별빛 도약(전방 순간이동) · 모아=주변 도망자 은신 부여 · 별골렘=패시브 방어막(X 없음) */
function castTagSpecial(f, list){
  if(!RULE || RULE.id!=="tag" || RULE.phase!=="chase" || !f || f.dead) return false;
  list=list||allFighters();   // P2: 온라인 팀 엔진은 tFighters 목록을 넘긴다
  const C=RULE_CONFIG.tag, id=f.char&&f.char.id;
  if(id==="student_01"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    f.tagDashT=C.dashDur; f.specialCd=C.dashCd;
    effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.4, color:"#ffe066"});
    playSfx("buff");
    return true;
  }
  if(id==="student_02"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    const a=f.facing||0;
    for(let d=C.blinkDist; d>=50; d-=14){
      const nx=clamp(f.x+Math.cos(a)*d, ARENA.x+f.r, ARENA.x+ARENA.w-f.r);
      const ny=clamp(f.y+Math.sin(a)*d, ARENA.y+f.r, ARENA.y+ARENA.h-f.r);
      if(OBSTACLES.some(o=>circleRectOverlap(nx,ny,f.r,o))) continue;
      effects.push({kind:"respawn", x:f.x, y:f.y, t:0, life:0.4, color:"#c9a3ff"});
      f.x=nx; f.y=ny; f.specialCd=C.blinkCd;
      effects.push({kind:"respawn", x:nx, y:ny, t:0, life:0.4, color:"#c9a3ff"});
      playSfx("buff");
      return true;
    }
    if(f.isPlayer) spawnSuperFail(f.x,f.y);
    return true;
  }
  if(id==="student_05"){
    if(f.specialCd>0){ if(f.isPlayer) spawnSuperFail(f.x,f.y); return true; }
    let n=0;
    for(const o of list){
      if(o.isTagger || o.dead) continue;
      if(o!==f && dist(f.x,f.y,o.x,o.y)>C.hideRadius) continue;
      o.tagHideT=C.hideDur; n++;
      effects.push({kind:"respawn", x:o.x, y:o.y, t:0, life:0.4, color:"#8fffd0"});
    }
    f.specialCd=C.hideCd; playSfx("buff");
    if(f.isPlayer) showToast("🍃 은신! ("+n+"명, "+C.hideDur+"초)");
    return true;
  }
  return false;   // student_06(별골렘): 패시브 방어막 — X 없음
}
/* ── GENRE-EXPAND-1 §2 별빛 칠하기 ── */
function paintCellIdx(x,y){
  if(!RULE || RULE.id!=="paint") return -1;
  const c=Math.floor((x-ARENA.x)/STUDENT_CELL), r=Math.floor((y-ARENA.y)/STUDENT_CELL);
  if(c<0||c>=RULE.cols||r<0||r>=RULE.rows) return -1;
  return r*RULE.cols+c;
}
function paintCellBy(x,y,team,byPlayer){
  if(!RULE || RULE.id!=="paint" || RULE.winner) return false;
  const i=paintCellIdx(x,y); if(i<0 || RULE.blocked[i]) return false;
  const col=(team==="player")?1:2, prev=RULE.grid[i];
  if(prev===col) return false;
  if(prev) RULE.count[prev]--;
  RULE.grid[i]=col; RULE.count[col]++;
  if(byPlayer){
    RULE.myPaint++; RULE.gaugeAcc++;
    if(RULE.gaugeAcc>=RULE_CONFIG.paint.gaugePerCells){ RULE.gaugeAcc=0;
      superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+RULE_CONFIG.paint.gaugeAmt); }   // 칠 행위도 궁 보상
  }
  return true;
}
/* BIG-BATCH-2 P1: 피날레 — 마지막 finaleSec초엔 칠 면적 업그레이드(cross→3×3), 역전 창구 */
function paintFinaleOn(){ return !!(RULE && RULE.id==="paint" && (matchTimeLimit()-matchElapsed)<=RULE_CONFIG.paint.finaleSec); }
function paintSplash(x,y,team,byPlayer,shape){
  const CS=STUDENT_CELL;
  if(shape==="cross" && paintFinaleOn()) shape="3x3";
  if(shape==="cross"){ paintCellBy(x,y,team,byPlayer);
    paintCellBy(x-CS,y,team,byPlayer); paintCellBy(x+CS,y,team,byPlayer);
    paintCellBy(x,y-CS,team,byPlayer); paintCellBy(x,y+CS,team,byPlayer); }
  else { for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) paintCellBy(x+dc*CS,y+dr*CS,team,byPlayer); }   // 3×3
}
function tickPaintRule(dt){
  RULE.barT-=dt;
  if(RULE.barT<=0){ RULE.barT=0.5;   // 면적 바 0.5s 갱신(증분 카운터 — 전수 카운트 없음)
    RULE.bar.p=RULE.count[1]/Math.max(1,RULE.paintable);
    RULE.bar.e=RULE.count[2]/Math.max(1,RULE.paintable); }
}
function drawPaintGrid(){
  if(!RULE || RULE.id!=="paint") return;
  const CS=STUDENT_CELL;
  ctx.save();
  for(let r=0;r<RULE.rows;r++) for(let c=0;c<RULE.cols;c++){
    const v=RULE.grid[r*RULE.cols+c]; if(!v) continue;
    ctx.fillStyle = v===1 ? "rgba(90,160,255,0.35)" : "rgba(255,106,106,0.35)";
    ctx.fillRect(ARENA.x+c*CS, ARENA.y+r*CS, CS, CS);
  }
  ctx.restore();
}
function teamStars(team){
  const list=(team==="player")?playerTeam():enemies;
  let n=0; for(const f of list){ if(f) n+=(f.stars||0); } return n;
}
function ruleWin(team){ if(!RULE || RULE.winner) return; RULE.winner=team; endGame(); }
function ruleTimeUp(){
  if(RULE && !RULE.winner){
    if(RULE.id==="siege"){
      const pct=t=>{ const tw=RULE.towers[t]; return tw?Math.max(0,tw.hp)/tw.maxHp:0; };
      RULE.winner = pct("player")>pct("enemy") ? "player" : (pct("enemy")>pct("player") ? "enemy" : "draw");
    } else if(RULE.id==="hotzone"){
      RULE.winner = RULE.gauge.player>RULE.gauge.enemy ? "player" : (RULE.gauge.enemy>RULE.gauge.player ? "enemy" : "draw");
    } else if(RULE.id==="stargrab"){
      const p=teamStars("player"), e=teamStars("enemy");
      RULE.winner = p>e ? "player" : (e>p ? "enemy" : "draw");
    } else if(RULE.id==="tag"){
      // 타이머 종료 = 생존자(도망팀) 승 — 내가 살아남았으면 승, 술래였으면 패
      RULE.winner = (player && !player.isTagger) ? "player" : "enemy";
    } else if(RULE.id==="paint"){
      RULE.winner = RULE.count[1]>RULE.count[2] ? "player" : (RULE.count[2]>RULE.count[1] ? "enemy" : "draw");
    }
  }
  endGame();
}
// 구조물 피격(탄환): 상대 팀 탄만 피해(team:null 쿠션벽은 양 팀 모두). 파괴 시 장애물에서 제거, 탑 파괴 = 즉시 승부.
// OVERNIGHT-1: RULE 없이도 동작 — 에디터 맵의 쿠션벽은 섬멸전에서도 부서진다.
function damageRuleStructure(s, dmg){
  if(!(s.hp>0)) return;
  s.hp-=dmg;
  spawnDamageNumber(s.x+s.w/2, s.y-6, Math.round(dmg), "#ffd0a0");
  if(s.hp<=0){ s.hp=0;
    const idx=OBSTACLES.indexOf(s); if(idx>=0) OBSTACLES.splice(idx,1);
    effects.push({kind:"death",x:s.x+s.w/2,y:s.y+s.h/2,t:0,life:0.7,color:(s.team==="player"?"#7fd6ff":"#ff8fa5"),big:true});
    if(s.sid && s.sid.indexOf("rtower_")===0) ruleWin(s.team==="player"?"enemy":"player");
    else if(RULE && RULE.id==="siege" && s.sid && s.sid.indexOf("rwall_")===0)   // BIG-BATCH-2 P1: 팀 건설 벽 → 재건 예약
      (RULE.rebuild=RULE.rebuild||[]).push({ t:RULE_CONFIG.siege.rebuildSec,
        s:{x:s.x, y:s.y, w:s.w, h:s.h, sid:s.sid, team:s.team, maxHp:s.maxHp} });
  }
}
function tickRule(dt){
  if(!RULE || RULE.winner) return;
  if(RULE.id==="tag"){ tickTagRule(dt); return; }       // GENRE-EXPAND-1 §1
  if(RULE.id==="paint"){ tickPaintRule(dt); return; }   // GENRE-EXPAND-1 §2
  if(RULE.id==="siege"){
    const C=RULE_CONFIG.siege;
    // BIG-BATCH-2 P1: 부서진 건설 벽 재건 — rebuildSec 후 절반 HP로 부활(자리에 파이터가 있으면 잠시 대기)
    if(RULE.rebuild && RULE.rebuild.length){
      for(let i=RULE.rebuild.length-1;i>=0;i--){
        const rb=RULE.rebuild[i]; rb.t-=dt;
        if(rb.t>0) continue;
        const s=rb.s;
        if(allFighters().some(f=>f && !f.dead && circleRectOverlap(f.x,f.y,f.r,s))){ rb.t=0.5; continue; }
        OBSTACLES.push({ x:s.x, y:s.y, w:s.w, h:s.h, sid:s.sid, team:s.team, structure:true,
                         hp:Math.round(s.maxHp*C.rebuildHpMul), maxHp:s.maxHp });
        effects.push({kind:"respawn", x:s.x+s.w/2, y:s.y+s.h/2, t:0, life:0.5, color:"#c9d6ff"});
        RULE.rebuild.splice(i,1);
      }
    }
    for(const team of ["player","enemy"]){
      const tw=RULE.towers[team]; if(!tw || tw.hp<=0) continue;
      RULE.turretAcc[team]-=dt;
      if(RULE.turretAcc[team]>0) continue;
      const cx=tw.x+tw.w/2, cy=tw.y+tw.h/2, mzOff=Math.max(tw.w,tw.h)/2+12;
      const foes=(team==="player")?enemies:playerTeam();
      let best=null, bd=C.turretRange;
      for(const f of foes){ if(!canBeHit(f)) continue;
        const d=dist(cx,cy,f.x,f.y); if(d>=bd) continue;
        const a0=Math.atan2(f.y-cy,f.x-cx);   // LOS는 총구(탑 가장자리 밖)에서 — 자기 몸체에 막히지 않게
        if(hasLineOfSight(cx+Math.cos(a0)*mzOff, cy+Math.sin(a0)*mzOff, f.x, f.y)){ bd=d; best=f; } }
      if(best){
        const a=Math.atan2(best.y-cy,best.x-cx), mz=Math.max(tw.w,tw.h)/2+12;
        bullets.push({ x:cx+Math.cos(a)*mz, y:cy+Math.sin(a)*mz, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
          r:8, damage:C.turretDmg, team:team, ownerId:-1, color:"#ffd0a0", alive:true, traveled:0,
          maxRange:C.turretRange+90, age:0, isSuper:true });
        RULE.turretAcc[team]=C.turretCd;
      } else RULE.turretAcc[team]=0.15;   // 대상 없음 → 짧게 재탐색
    }
  } else if(RULE.id==="hotzone"){
    const C=RULE_CONFIG.hotzone;
    if(!RULE.fixed && C.moveEvery>0){   // BIG-BATCH-2 P1: 거점 순환 이동(3초 전 경고 깜빡임)
      RULE.moveT+=dt;
      RULE.warn=Math.max(0, RULE.moveT-(C.moveEvery-3));
      if(RULE.moveT>=C.moveEvery){
        RULE.moveT=0; RULE.warn=0;
        RULE.posIdx=(RULE.posIdx+1)%3;
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.5, radius:RULE.radius});
        RULE.y=ARENA.y+ARENA.h*[0.5,0.25,0.75][RULE.posIdx];
        effects.push({kind:"superwave", x:RULE.x, y:RULE.y, t:0, life:0.6, radius:RULE.radius});
        showToast("✨ 거점이 이동했어요!"); playSfx("buff");
      }
    }
    let pIn=0, eIn=0;
    for(const f of playerTeam()) if(f && !f.dead && dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius) pIn++;
    for(const f of enemies)      if(f && !f.dead && dist(f.x,f.y,RULE.x,RULE.y)<=RULE.radius) eIn++;
    RULE.holder = (pIn&&!eIn)?"player":((eIn&&!pIn)?"enemy":((pIn&&eIn)?"contest":null));   // 양팀=정지, 무주공산=유지
    if(RULE.holder==="player"){ RULE.gauge.player=Math.min(C.goal, RULE.gauge.player+C.capPerSec*dt); if(RULE.gauge.player>=C.goal) ruleWin("player"); }
    else if(RULE.holder==="enemy"){ RULE.gauge.enemy=Math.min(C.goal, RULE.gauge.enemy+C.capPerSec*dt); if(RULE.gauge.enemy>=C.goal) ruleWin("enemy"); }
  } else if(RULE.id==="stargrab"){
    const C=RULE_CONFIG.stargrab;
    // 스폰(중앙 4초마다 1개, 스폰산 별 동시 최대 3 — 드랍 별은 별도)
    RULE.spawnAcc+=dt;
    if(RULE.spawnAcc>=C.spawnEvery){
      RULE.spawnAcc=0;
      if(RULE.stars.filter(s=>s.ttl===undefined).length<C.maxOnGround){
        for(let t=0;t<12;t++){
          const x=clamp(RULE.cx+rand(-130,130), ARENA.x+30, ARENA.x+ARENA.w-30);
          const y=clamp(RULE.cy+rand(-100,100), ARENA.y+30, ARENA.y+ARENA.h-30);
          if(!OBSTACLES.some(o=>circleRectOverlap(x,y,14,o))){ RULE.stars.push({x:x,y:y}); break; }
        }
      }
    }
    // 드랍 별 소멸(6초) + 픽업
    for(let i=RULE.stars.length-1;i>=0;i--){
      const s=RULE.stars[i];
      if(s.ttl!==undefined){ s.ttl-=dt; if(s.ttl<=0){ RULE.stars.splice(i,1); continue; } }
      for(const f of allFighters()){ if(!f||f.dead) continue;
        if(dist(f.x,f.y,s.x,s.y) < f.r+16){ f.stars=(f.stars||0)+1;
          effects.push({kind:"respawn",x:s.x,y:s.y,t:0,life:0.35,color:"#ffe066"});
          RULE.stars.splice(i,1); break; } }
    }
    // 팀 합계 10 → 15초 카운트다운(밑돌면 리셋), 완주 시 승리
    for(const team of ["player","enemy"]){
      if(teamStars(team)>=C.goal){
        if(RULE.countdown[team]<0) RULE.countdown[team]=C.countdown;
        RULE.countdown[team]-=dt;
        if(RULE.countdown[team]<=0){ ruleWin(team); return; }
      } else RULE.countdown[team]=-1;
    }
  }
}
// 규칙 오브젝트 렌더(파이터 아래층): 존/탑/벽/별. OVERNIGHT-1: 구조물(탑·쿠션벽)은 규칙과 무관하게 항상 그림(에디터 맵 지원)
function drawRuleObjects(){
  {
    for(const o of OBSTACLES){
      if(!o.sid || !o.structure) continue;
      const isTower=o.sid.indexOf("rtower_")===0;
      const tc=(o.team==="player")?"#5aa0ff":(o.team==="enemy"?"#ff6a6a":"#c9a3ff");   // null=중립(에디터 쿠션벽)
      ctx.save();
      if(isTower){
        // OVERNIGHT-1 3-4: 팀 수정탑 에셋(tower_blue/red) — 밑면 footprint 정렬, 없으면 도형
        const timg=worldImage(o.team==="player"?"tower_blue":"tower_red");
        if(timg){
          const iw=timg.naturalWidth||1, ih=timg.naturalHeight||1, dw=o.w*1.25, dh=dw*(ih/iw);
          ctx.fillStyle="rgba(0,0,0,0.20)";
          ctx.beginPath(); ctx.ellipse(o.x+o.w/2, o.y+o.h*0.92, o.w*0.6, o.h*0.18, 0, 0, Math.PI*2); ctx.fill();
          ctx.drawImage(timg, o.x+o.w/2-dw/2, o.y+o.h-dh, dw, dh);
        } else {
          ctx.fillStyle="rgba(16,22,52,0.9)"; roundRect(o.x,o.y,o.w,o.h,10); ctx.fill();
          ctx.strokeStyle=tc; ctx.lineWidth=3; roundRect(o.x,o.y,o.w,o.h,10); ctx.stroke();
          drawStar(o.x+o.w/2, o.y+o.h/2, 5, o.w*0.32, o.w*0.14, tc);
        }
      } else {
        // BIG-BATCH-1 A1: 쿠션 벽 — 이웃 인식 오토타일(붙은 셀은 한 덩어리, 테두리는 바깥 면에만) → '표' 모양 해소
        if(!drawWallAuto(o, tc)){
          ctx.fillStyle=hexA(tc,0.35); roundRect(o.x,o.y,o.w,o.h,6); ctx.fill();
          ctx.strokeStyle=tc; ctx.lineWidth=2; roundRect(o.x,o.y,o.w,o.h,6); ctx.stroke();
        }
      }
      // HP 바
      // A1 폴리시: 벽 HP바는 다친 셀에만(멀쩡한 벽줄마다 바가 줄지어 '표' 인상 주던 것 제거). 수정탑은 항상.
      if(isTower || o.hp<o.maxHp){
        const bw=isTower?o.w+16:o.w+8, bx=o.x+o.w/2-bw/2, by=o.y-10, ratio=clamp(o.hp/o.maxHp,0,1);
        ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,bw,6,3); ctx.fill();
        ctx.fillStyle=ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"); roundRect(bx,by,bw*ratio,6,3); ctx.fill();
      }
      ctx.restore();
    }
  }
  if(RULE && RULE.id==="hotzone"){
    const hc=RULE.holder==="player"?"#5aa0ff":(RULE.holder==="enemy"?"#ff6a6a":(RULE.holder==="contest"?"#ffd23f":"#9aa6cc"));
    const p=0.5+0.5*Math.sin(uiTime*3);
    const wb=(RULE.warn>0)?(0.45+0.55*Math.abs(Math.sin(uiTime*8))):1;   // BIG-BATCH-2 P1: 이동 3초 전 깜빡임
    ctx.save();
    // OVERNIGHT-1 3-3: 거점 데칼(capture_zone) — 팀색 링과 함께
    const zimg=worldImage("capture_zone");
    if(zimg){ ctx.globalAlpha=0.85*wb; const zs=RULE.radius*1.7; ctx.drawImage(zimg, RULE.x-zs/2, RULE.y-zs/2, zs, zs); }
    ctx.globalAlpha=(0.12+0.06*p)*wb; ctx.fillStyle=hc; ctx.beginPath(); ctx.arc(RULE.x,RULE.y,RULE.radius,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=0.8*wb; ctx.strokeStyle=hc; ctx.lineWidth=3; ctx.setLineDash([12,8]);
    ctx.beginPath(); ctx.arc(RULE.x,RULE.y,RULE.radius,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
  } else if(RULE && RULE.id==="stargrab"){
    // OVERNIGHT-1 3-5: 중앙 별광맥 데칼(스폰 지점 표시)
    const vimg=worldImage("star_vein");
    if(vimg){ ctx.save(); ctx.globalAlpha=0.9; const vs=150;
      ctx.drawImage(vimg, (RULE.cx||LOGW/2)-vs/2, (RULE.cy||ARENA.y+ARENA.h/2)-vs/2, vs, vs); ctx.restore(); }
    const simg=worldImage("star_pickup");
    for(const s of RULE.stars){
      const p=0.5+0.5*Math.sin(uiTime*5+s.x);
      ctx.save(); ctx.globalAlpha=(s.ttl!==undefined && s.ttl<2)?(0.35+0.4*p):0.95;
      if(simg){ const ss=30+p*3; ctx.drawImage(simg, s.x-ss/2, s.y-ss/2, ss, ss); }
      else drawStar(s.x, s.y, 5, 13+p*2, 6, "#ffe14d");
      ctx.restore();
    }
  }
}
// 규칙 HUD(상단 타이머 아래): 탑 HP / 존 게이지 / 별 개수·카운트다운

    if(paintFinaleOn()){   // BIG-BATCH-2 P1: 피날레 안내
      const fp=0.5+0.5*Math.sin(uiTime*7);
      ctx.fillStyle="rgba(255,210,63,"+(0.65+0.35*fp)+")"; ctx.font="bold 16px 'Malgun Gothic',sans-serif";
      ctx.fillText("🔥 피날레! 칠 2배", LOGW/2, cy+24);
    }
    ctx.restore(); return;
  }
  if(RULE.id==="siege"){
    const bw=190;
    const bar=(x,tw,color)=>{ const ratio=tw?clamp(tw.hp/tw.maxHp,0,1):0;

      ctx.fillStyle="#fff"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.fillText("🏰 "+Math.ceil(Math.max(0,tw?tw.hp:0)),x,cy+1); };

  } else if(RULE.id==="hotzone"){

    const bar=(x,v,color)=>{ ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(x-bw/2,cy-7,bw,14,7); ctx.fill();
      ctx.fillStyle=color; roundRect(x-bw/2,cy-7,bw*(v/RULE_CONFIG.hotzone.goal),14,7); ctx.fill();
      ctx.fillStyle="#fff"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.fillText("✨ "+Math.floor(v)+"%",x,cy+1); };
    bar(LOGW/2-150, RULE.gauge.player, "#5aa0ff");

/* =======================================================================
   이동 / 충돌
   ======================================================================= */
// 캐릭터-장애물 충돌은 hitbox를 안쪽으로 살짝 줄여 모서리 답답함을 완화(벽 관통은 막음).
// 탄환 충돌은 inset을 쓰지 않아 기존처럼 또렷하게 막힌다.
function entityHitsObstacle(cx, cy, r){
  const ins=GAME_CONFIG.obstacleHitboxInset||0;
  for(const o of OBSTACLES){
    const iw=o.w-ins*2, ih=o.h-ins*2;
    if(iw<=0||ih<=0){ if(circleRectOverlap(cx,cy,r,o)) return true; continue; }
    if(circleRectOverlap(cx,cy,r,{x:o.x+ins,y:o.y+ins,w:iw,h:ih})) return true;
  }
  return false;
}
function moveEntity(ent, dx, dy){
  const ox=ent.x, oy=ent.y;
  ent.x+=dx;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.x=ox;   // x축 막히면 되돌림(모서리에서 미끄러짐 유지)
  ent.y+=dy;
  if(entityHitsObstacle(ent.x,ent.y,ent.r)) ent.y=oy;
  ent.x=clamp(ent.x, ARENA.x+ent.r, ARENA.x+ARENA.w-ent.r);
  ent.y=clamp(ent.y, ARENA.y+ent.r, ARENA.y+ARENA.h-ent.r);
}
function inBush(ent){ return isInBushXY(ent.x, ent.y); }
function isInBushXY(x,y){
  for(const b of BUSHES){ if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return true; }
  return false;
}
// 풀숲 가시성: 내/아군은 항상 보임(풀숲 안이면 반투명), 적은 풀숲+멀면 숨김, 가까우면/공격 직후엔 보임.
// viewer={x,y,team}. 반환 {hidden, alpha}
function bushVisibility(fx, fy, fTeam, isMine, viewer, recentlyFired){
  const inB=isInBushXY(fx,fy);
  if(isMine) return { hidden:false, alpha: inB?0.6:1 };       // 내 캐릭터는 풀숲에서도 항상 명확(살짝 반투명)
  if(!inB) return { hidden:false, alpha:1 };
  if(viewer && fTeam===viewer.team) return { hidden:false, alpha:0.6 }; // 아군: 보임(흐릿)
  if(recentlyFired) return { hidden:false, alpha:0.7 };        // 공격 직후엔 드러남
  if(viewer && dist(fx,fy,viewer.x,viewer.y) <= GAME_CONFIG.bushRevealDistance) return { hidden:false, alpha:0.55 };
  return { hidden:true, alpha:0.55 };                          // 멀리 있는 풀숲 속 적 → 숨김
}
function canBeHit(ent){ return ent && !ent.dead && ent.invincibleTimer<=0; }

/* ── 함정 / 버프 아이템(하트·번개 젤리) — 맵 데이터 기반, host(또는 로컬)가 판정 ── */
let POWERUPS=[];           // {id,x,y,type:"heal"|"speed"} — host/로컬 권한
let powerupAcc=0, powerupId=0;

/* ── GAMEPLAY-1 1D 성장 루프: 처치 → 버프 오브 → 스택(죽어도 유지) ──
   섬멸전(로컬): 사망 지점에 오브 드랍 → 누구든 획득. 캠페인(PVE): 처치자에게 즉시 부여(온라인 동기화 불가침).
   3종 순환(공속→공격→체력), 종류별 최대 GROWTH.max 스택. */
const GROWTH = { types:["aspd","atk","hp"], aspdPct:0.08, atkPct:0.10, hpAdd:15, max:5 };
const GROWTH_STYLE = { aspd:{color:"#ffd23f",icon:"⚡"}, atk:{color:"#ff7a6b",icon:"▲"}, hp:{color:"#6bff9a",icon:"♥"} };
let BUFFORBS=[];           // {x,y,type} — 로컬 섬멸전 전용(픽업까지 유지)
let buffOrbCycle=0;        // 드랍 타입 순환 카운터
function _sfxBuffHook(){ playSfx("buff"); }   /* E14 */
function grantGrowth(f, type){ _sfxBuffHook();
  if(!f || f.isBoss) return;
  f.growth=f.growth||{aspd:0,atk:0,hp:0};
  if(f.growth[type]>=GROWTH.max){                       // 꽉 찬 종류면 남은 종류로 대체(전부 만렙이면 소멸)
    type=GROWTH.types.find(t=>f.growth[t]<GROWTH.max);
    if(!type) return;
  }
  f.growth[type]++;
  if(type==="hp"){ f.maxHp+=GROWTH.hpAdd; f.hp=Math.min(f.maxHp, f.hp+GROWTH.hpAdd); }
  effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.45,color:GROWTH_STYLE[type].color});
}
function nextGrowthTypeFor(f){                          // 캠페인 직접 부여: 파이터별 순환
  f._growCycle=(f._growCycle||0);
  return GROWTH.types[f._growCycle++ % GROWTH.types.length];
}
function tickBuffOrbs(){
  if(!BUFFORBS.length) return;
  const FS=allFighters();   // 성능(코드감사): 오브마다 배열을 새로 만들지 않음
  for(let i=BUFFORBS.length-1;i>=0;i--){ const o=BUFFORBS[i];
    for(const f of FS){ if(!f||f.dead) continue;
      if(dist(f.x,f.y,o.x,o.y) < f.r+16){ grantGrowth(f, o.type); BUFFORBS.splice(i,1); break; } }
  }
}
function drawBuffOrbs(){
  for(const o of BUFFORBS){
    const st=GROWTH_STYLE[o.type], p=0.5+0.5*Math.sin(uiTime*4+o.x);
    ctx.save(); ctx.globalAlpha=0.85;
    ctx.fillStyle="rgba(10,14,36,0.7)"; ctx.beginPath(); ctx.arc(o.x,o.y,12+p*2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=st.color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(o.x,o.y,12+p*2,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=st.color; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(st.icon,o.x,o.y+1);
    ctx.restore();
  }
}

// 둔화/버프 반영 이동속도
function effSpeed(f){
  let s=f.moveSpeed||0;
  if(f.freezeTimer>0) return 0;                                       // 빙결: 이동 불가
  if(f.slowTimer>0) s*=GAME_CONFIG.trapSlowMul;
  if(f.iceTimer>0) s*=GAME_CONFIG.trapIceMul;                          // 얼음 바닥: 미끌 가속(OVERNIGHT-1)
  if(f.speedBuffTimer>0) s*=GAME_CONFIG.speedBuffMul;
  if(f.wSlowTimer>0) s*=(1-(f.wSlowPct||0));                          // 무기/기술 둔화(중첩 없음)
  if(f.cSpeedTimer>0) s*=(1+getAbility("student_03").c.speedUp);       // 시고니 C 질주 +45%
  if(f.upg && f.upg.mspd) s*=(1+0.05*f.upg.mspd);                       // PVE 강화: 빠른 발
  if(RULE && RULE.id==="tag"){                                        // GENRE-EXPAND-1 §1: 술래 +12%
    if(f.isTagger) s*=RULE_CONFIG.tag.tagSpeedMul;
    else if(RULE.runnerMul>1) s*=RULE.runnerMul;                      // BIG-BATCH-2 P1: 술래 수 비례 도망자 버프
    if(f.tagDashT>0) s*=RULE_CONFIG.tag.dashMul;                      // BIG-BATCH-2 P1: 럭키 반짝 대시
  }
  if(RULE && RULE.id==="paint"){                                        // GENRE-EXPAND-1 §2: 자기색 위 +10% (P2: 온라인 blue/red 팀 매핑 포함)
    const pi=paintCellIdx(f.x,f.y);
    if(pi>=0 && RULE.grid[pi]===((f.team==="player"||f.team==="blue")?1:2)) s*=RULE_CONFIG.paint.ownSpeedMul;
  }
  return s*TEMPO.playerMove;
}
function tickStatus(f,dt){

  if(f.wSlowTimer>0)f.wSlowTimer-=dt;

  if(f.shieldAbsorbTimer>0){ f.shieldAbsorbTimer-=dt; if(f.shieldAbsorbTimer<=0) f.shieldAbsorb=0; }  // 별골렘 X 흡수막 만료
  if(f.specialCd>0)f.specialCd-=dt;                                    // X 쿨타임
