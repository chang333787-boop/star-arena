   무기는 독립 선택값이 아니라 캐릭터의 defaultWeaponId에서 계산한다. */

function isStudentCharacter(id){ return STUDENT_CHARACTERS.some(c=>c.id===id); }
function getWeaponForCharacter(charId){
  const ch=getCharacter(charId);
  return (ch && ch.defaultWeaponId) ? ch.defaultWeaponId : "tool_01";
}
// 외부(저장값/네트워크)에서 온 캐릭터/무기 id 교정: 학생 6종 + 고정 무기만 허용
function sanitizeCharacterId(id){ return isStudentCharacter(id) ? id : "student_01"; }
function sanitizeLoadout(charId, weaponId){
  const cid=sanitizeCharacterId(charId);
  return { characterId:cid, weaponId:getWeaponForCharacter(cid) };   // weaponId 인자는 무시하고 고정 무기로 교정
}

/* OVERNIGHT-1: footprint 데이터 모델(설계_footprint_모델.md) — 에디터 저작용. 런타임 충돌은 기존 픽셀 사각형 그대로(엔진 0 변경). */
const FOOTPRINTS = {
  crystal:{cols:1,rows:1}, box:{cols:1,rows:1}, rock:{cols:1,rows:1}, wall:{cols:1,rows:1},
  bush:{cols:1,rows:1}, trap:{cols:1,rows:1}, heal:{cols:1,rows:1}, monster:{cols:1,rows:1},

}
function pxToCell(x,y){ return { col:Math.round((x-24)/STUDENT_CELL), row:Math.round((y-70)/STUDENT_CELL) }; }
function canPlaceCell(col,row,kind,occupied,cols,rows){
  const fp=FOOTPRINTS[kind]||{cols:1,rows:1};
  if(col<0||row<0||col+fp.cols>cols||row+fp.rows>rows) return false;
  for(let r=row;r<row+fp.rows;r++) for(let c=col;c<col+fp.cols;c++) if(occupied[r][c]) return false;

const STUDENT_MAPS = [
  { id:"stu01_hajung", name:"⭐하중", desc:"학생 맵 · 4-1", floorColor:"#23304f", strokeColor:"#5b74b8",

(function buildStudentMaps(){
  const CS=STUDENT_CELL, OX=24, OY=70;                       // ARENA(24,70,1232,576)와 동일 원점
  for(const sm of STUDENT_MAPS){
    // 좌우 거울 미러로 22×10 전체 그리드 구성
    const grid=[];
    for(let r=0;r<STUDENT_ROWS;r++){ const left=sm.cells[r]; let row="";
      for(let c=0;c<STUDENT_COLS;c++) row += (c<11 ? left[c] : left[21-c]);
      grid.push(row);
    }
    const obstacles=[], bushes=[], traps=[]; let spawn=null;
    for(let r=0;r<STUDENT_ROWS;r++){
      let c=0;
      while(c<STUDENT_COLS){
        const ch=grid[r][c];
        if(ch==="."||ch==="*"){ if(ch==="*"&&c<11) spawn={x:OX+c*CS+CS/2, y:OY+r*CS+CS/2}; c++; continue; }
        let c2=c; while(c2+1<STUDENT_COLS && grid[r][c2+1]===ch) c2++;   // 가로 연속 병합(충돌/렌더 rect 절약)
        const rect={ x:OX+c*CS, y:OY+r*CS, w:(c2-c+1)*CS, h:CS };
        if(ch==="W") obstacles.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, kind:"rock" });
        else if(ch==="B") bushes.push(rect);
        else if(ch==="S") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"damage" });
        else if(ch==="L") traps.push({ x:rect.x, y:rect.y, w:rect.w, h:rect.h, type:"slow" });
        c=c2+1;
      }
    }
    MAPS.push({ id:sm.id, name:sm.name, desc:sm.desc, floorColor:sm.floorColor, strokeColor:sm.strokeColor,
      playerSpawn:spawn, enemySpawn:{ x:OX+1232-(spawn.x-OX), y:spawn.y },   // 반대 팀 = 좌우 미러 지점
      obstacles:obstacles, bushes:bushes, traps:traps });
  }
})();

/* =======================================================================
   ★ 에셋 교체 준비 구조 (오늘은 placeholder만, 내일 PNG를 넣으면 자동 사용) ★
   -----------------------------------------------------------------------
   동작 원리:
   - ASSETS_ENABLED 가 false 면 이미지를 아예 불러오지 않습니다(404·콘솔오류 없음).
     → 오늘은 기존 도형(Canvas) 렌더링이 그대로 쓰입니다.
   - 내일 PNG 파일을 assets/ 아래에 넣고 ASSETS_ENABLED=true 로 바꾸면,
     파일이 있는 캐릭터/도구만 이미지로 그려지고, 없으면 도형으로 fallback 됩니다.
   - 온라인 동기화에는 이미지가 들어가지 않습니다(캐릭터/도구 id만 전송 → assetId는 id로 역산).
   ======================================================================= */
// 내일 교사가 PNG를 넣은 뒤 true 로만 바꾸면 됩니다. (오늘은 false 유지)
let ASSETS_ENABLED = true;
const ASSET_BASE = "assets/";

// 캐릭터 에셋 파일 이름 규칙(1차 적용: 상태별 5프레임). 없는 파일은 자동으로 fallback.
// idle 대기 / move 이동 / attack 공격(도구 든 모습) / hit 피격 / return 리턴·탈락
const CHAR_ASSET_KEYS = ["idle","move","attack","hit","return"];
// 도구(무기) 에셋 파일 이름 규칙.
const WEAPON_ASSET_KEYS = ["icon","projectile","effect_hit"];

// 경로만 만들어 두는 함수. (파일 존재 여부와 무관 — 로더가 실패 시 fallback 처리)
function charAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"characters/"+assetId+"/"+key+".png") : null; }
function weaponAssetPath(assetId, key){ return assetId ? (ASSET_BASE+"weapons/"+assetId+"/"+key+".png") : null; }

// (코드감사) 미사용 레거시 ASSET_MANIFEST 삭제 — 실제 월드 에셋 등록/로드는 아래 WORLD_ASSETS가 담당(경로 중복으로 어긋날 위험만 있었음).

// 이미지 캐시. 상태: undefined=미시도, Image(complete&&naturalWidth>0)=성공, null=실패(파일 없음)
const _imageCache = {};
function _loadImage(path){
  if(path==null) return;
  if(path in _imageCache) return;
  // 브라우저가 아니거나(헤드리스 테스트) Image가 없으면 시도하지 않음 → fallback
  if(typeof Image === "undefined"){ _imageCache[path]=null; return; }
  try{
    const img=new Image();
    img.onload=function(){ _imageCache[path]=(img.naturalWidth>0)?img:null; };
    img.onerror=function(){ _imageCache[path]=null; }; // 파일 없음 → 조용히 fallback
    img.src=path;
    _imageCache[path]=undefined; // 로딩 중
  }catch(e){ _imageCache[path]=null; }
}
// 사용 가능한(로드 성공) 이미지면 반환, 아니면 null(→ fallback 도형 사용)
function _readyImage(path){
  if(!ASSETS_ENABLED || path==null) return null;
  const v=_imageCache[path];
  if(v===undefined){ return null; }     // 아직 로딩 중 → 이번 프레임은 fallback
  return v || null;
}
function getCharImage(assetId, key){ return _readyImage(charAssetPath(assetId, key)); }
function getWeaponImage(assetId, key){ return _readyImage(weaponAssetPath(assetId, key)); }

// 모든 학생 에셋을 미리 불러오기 시도. ASSETS_ENABLED=false 면 아무것도 하지 않음(오늘).
function loadGameAssets(){
  if(!ASSETS_ENABLED) return;
  for(const c of STUDENT_CHARACTERS){ if(!c.assetId) continue; for(const k of CHAR_ASSET_KEYS) _loadImage(charAssetPath(c.assetId,k)); }
  for(const w of STUDENT_WEAPONS){ if(!w.assetId) continue; for(const k of WEAPON_ASSET_KEYS) _loadImage(weaponAssetPath(w.assetId,k)); }
  // PVE 몬스터/보스 본체 1장(assets/monsters/<type>.png) — 없으면 도형 fallback(PRD 17.4~17.6)
  try{ for(const t in PVE_ENEMY_TYPES) _loadImage(ASSET_BASE+"monsters/"+t+".png"); }catch(e){}
  // 월드(지형/구조물/함정/아이템/타일) — 코덱스 제작본. 없으면 도형 fallback. (버전 쿼리로 캐시 무효화)
  try{ for(const k in WORLD_ASSETS) _loadImage(ASSET_BASE+WORLD_ASSETS[k]+WORLD_ASSET_VER); }catch(e){}
}
function getMonsterImage(type){ return _readyImage(ASSET_BASE+"monsters/"+type+".png"); }
/* OVERNIGHT-1: 월드 에셋 버전(캐시 무효화) — 함정 재작본(빨강/초록/하늘) 등 새 파일 확실히 로드 */
const WORLD_ASSET_VER="?v=128";
const WORLD_ASSETS={
  ob_crystal:"obstacles/crystal_01.png", ob_box:"obstacles/block_01.png", ob_rock:"obstacles/rock_01.png",

// 상태 → 프레임 키. 우선순위: 리턴 > 피격 > 공격 > 이동 > 대기
function frameKeyFor(opts){
  if(opts.ko) return "return";
  if(opts.hit) return "hit";
  if(opts.attacking) return "attack";
  if(opts.moving) return "move";
  return "idle";
}
// 캐릭터 스프라이트 그리기(성공 시 true). 실패하면 false → 호출부가 fallback 도형을 그림.
// ctx는 이미 translate(x,y) 된 상태로 호출한다(기존 fallback과 동일 좌표계).
function drawCharacterSprite(charId, r, facing, opts){
  opts=opts||{};
  if(!ASSETS_ENABLED) return false;
  const ch=getCharacter(charId); if(!ch || !ch.assetId) return false;
  let img=getCharImage(ch.assetId, frameKeyFor(opts));
  if(!img) img=getCharImage(ch.assetId, "idle");   // 요청 프레임 없으면 idle로
  if(!img) return false;
  // 슬라이서가 캐릭터별 5프레임을 같은 캔버스·가로중앙·발(하단) 기준으로 정렬해 저장한다.
  // 그래서 높이 고정 + 가로중앙 + 발 기준으로 그리면 프레임이 바뀌어도 크기/위치가 안 튄다.
  const iw=img.naturalWidth||img.width||1, ih=img.naturalHeight||img.height||1;
  const dh=r*3.2, dw=dh*(iw/ih);   // 높이 고정, 가로는 원본 비율(공격 효과는 좌우로 뻗음, 캔버스가 대칭이라 안 잘림)
  const footY=r*0.95;              // 발이 닿는 기준선(충돌원 하단 부근) → 모든 프레임 동일
  // 왼쪽을 바라보면 좌우 반전(공격 방향이 자연스럽게). 원본 디자인은 그대로.
  const flip = (facing!=null) && (Math.cos(facing) < 0);
  ctx.save(); if(flip) ctx.scale(-1,1); ctx.drawImage(img, -dw/2, footY-dh, dw, dh); ctx.restore();
  return true;
}
// 렌더 위치 변화로 "이동 중" 추정(walk/idle 모션 선택용). ASSETS_ENABLED=false 면 호출되지 않음.
const _spriteLastPos={};
function spriteMoving(key,x,y){ const p=_spriteLastPos[key]; let moving=false; if(p){ const dx=x-p.x,dy=y-p.y; moving=(dx*dx+dy*dy)>0.25; } _spriteLastPos[key]={x:x,y:y}; return moving; }

// 탄환(발사체) 스프라이트. 성공 시 true.
function drawProjectileSprite(weaponId, x, y, r, facing){
  if(!ASSETS_ENABLED || !weaponId) return false;
  const w=getWeapon(weaponId); if(!w || !w.assetId) return false;
  const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
  const sz=r*3;
  ctx.save(); ctx.translate(x,y); if(facing!=null) ctx.rotate(facing); ctx.drawImage(img,-sz/2,-sz/2,sz,sz); ctx.restore();
  return true;
}

const LOGW = 1280, LOGH = 720;                 // 고정 논리 좌표
const ARENA = { x:24, y:70, w:1232, h:576 };   // 전투 영역(위/아래는 정보줄)
/* =======================================================================
   BIG-BATCH-2 P4 · 줌아웃 카메라 (C6/C7)
   - 월드 좌표(게임 로직·ARENA) ↔ 화면 좌표(HUD·마우스) 분리.
   - 기본 22×10 = CAM.on=false, scale 1 (기존과 픽셀 동일 — 회귀 0 원칙).
   - 대형 맵(36×16·48×22) = ARENA를 월드 크기로 확장 + 전체가 화면에 들어오는
     고정 줌아웃(스크롤 없음 — 멀미 회피 방침). 추적 카메라는 백로그.
   ======================================================================= */
const ARENA_BASE = { x:24, y:70, w:1232, h:576 };
let CAM = { on:false, scale:1, ox:0, oy:0 };
function setCameraForMap(map){
  const c=(map && map.gridCols)||STUDENT_COLS, r=(map && map.gridRows)||STUDENT_ROWS;
  if(c<=STUDENT_COLS && r<=STUDENT_ROWS){
    ARENA.x=ARENA_BASE.x; ARENA.y=ARENA_BASE.y; ARENA.w=ARENA_BASE.w; ARENA.h=ARENA_BASE.h;
    CAM.on=false; CAM.scale=1; CAM.ox=0; CAM.oy=0;
    return;
  }
  ARENA.x=ARENA_BASE.x; ARENA.y=ARENA_BASE.y;
  ARENA.w=c*STUDENT_CELL; ARENA.h=r*STUDENT_CELL+16;   // 기본 맵과 동일한 하단 여유 16px 유지
  const s=Math.min(ARENA_BASE.w/ARENA.w, ARENA_BASE.h/ARENA.h);
  CAM.on=true; CAM.scale=s;
  CAM.ox=ARENA_BASE.x + (ARENA_BASE.w-ARENA.w*s)/2 - ARENA.x*s;   // 월드 ARENA가 기본 화면 틀 안에 중앙 정렬
  CAM.oy=ARENA_BASE.y + (ARENA_BASE.h-ARENA.h*s)/2 - ARENA.y*s;
}
let _camPushed=false;
function worldBegin(){ if(CAM.on && !_camPushed){ ctx.save(); ctx.translate(CAM.ox,CAM.oy); ctx.scale(CAM.scale,CAM.scale); _camPushed=true; } }
function worldEnd(){ if(_camPushed){ ctx.restore(); _camPushed=false; } }
function logicalToWorld(p){ if(!CAM.on||!p) return p; return { x:(p.x-CAM.ox)/CAM.scale, y:(p.y-CAM.oy)/CAM.scale }; }

function resizeCanvas(){

  const dpr = Math.min(window.devicePixelRatio || 1, 1.5);

/* =======================================================================
   수학 / 충돌 도우미
   ======================================================================= */
function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
function dist(ax,ay,bx,by){ return Math.hypot(ax-bx, ay-by); }
function dist2(ax,ay,bx,by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }
function rand(a,b){ return a + Math.random()*(b-a); }
function lerp(a,b,t){ return a+(b-a)*t; }
function deg2rad(d){ return d*Math.PI/180; }

function circleRectOverlap(cx,cy,r,R){
  const nx = clamp(cx, R.x, R.x+R.w);
  const ny = clamp(cy, R.y, R.y+R.h);
  const dx = cx-nx, dy = cy-ny;
  return (dx*dx+dy*dy) < (r*r);
}

/* =======================================================================
   현재 맵 데이터 (시작 시 선택 맵으로 채워진다)
   ======================================================================= */
let OBSTACLES = MAPS[0].obstacles;
let BUSHES = MAPS[0].bushes;

// 장애물과 겹치지 않는 안전한 위치를 (x,y) 근처에서 찾는다.
function findClearSpawn(x, y, r){
  x = clamp(x, ARENA.x+r, ARENA.x+ARENA.w-r);
  y = clamp(y, ARENA.y+r, ARENA.y+ARENA.h-r);
  const isClear = (px,py)=>{
    for(const o of OBSTACLES){ if(circleRectOverlap(px,py,r,o)) return false; }
    return true;
  };
  if(isClear(x,y)) return { x, y };
  // 점점 넓은 원으로 주변을 탐색
  for(let radius=24; radius<=280; radius+=22){
    for(let a=0; a<Math.PI*2; a+=Math.PI/8){
      const px = clamp(x+Math.cos(a)*radius, ARENA.x+r, ARENA.x+ARENA.w-r);
      const py = clamp(y+Math.sin(a)*radius, ARENA.y+r, ARENA.y+ARENA.h-r);
      if(isClear(px,py)) return { x:px, y:py };
    }
  }
  return { x, y }; // 최후의 수단
}

const DEFAULT_UNLOCKED_WEAPONS = STUDENT_WEAPONS.filter(w=>w.unlockedByDefault).map(w=>w.id);

let profile = null;

// 기본값과 합쳐서 빠진 항목이 있어도 안전하게 만든다.
function mergeProfile(saved){
  const p = {};
  for(const key in PLAYER_PROFILE_DEFAULT){ p[key] = PLAYER_PROFILE_DEFAULT[key]; }
  if(saved && typeof saved === "object"){
    for(const key in PLAYER_PROFILE_DEFAULT){
      if(saved[key] !== undefined && saved[key] !== null) p[key] = saved[key];
    }
  }
  // 배열/선택값 무결성 보정
  if(["keyboard","mouse","touch"].indexOf(p.controlMode)<0) p.controlMode="keyboard";   // UPDATE-1 P3
  if(typeof p.sfxVolume!=="number" || !(p.sfxVolume>=0 && p.sfxVolume<=1)) p.sfxVolume=0.7;   // E14
  if(!Array.isArray(p.unlockedCharacters) || p.unlockedCharacters.length===0) p.unlockedCharacters = DEFAULT_UNLOCKED_CHARACTERS.slice();
  if(!Array.isArray(p.unlockedWeapons) || p.unlockedWeapons.length===0) p.unlockedWeapons = DEFAULT_UNLOCKED_WEAPONS.slice();
  // 학생 6종 전용 마이그레이션: 레거시 캐릭터/무기가 선택·해금돼 있으면 학생 세트로 교정
  //  (골드·전적·레벨 등 진행도는 건드리지 않음. 레거시 해금 기록은 목록에서 제외만 — 파괴적 삭제 아님)
  p.unlockedCharacters = p.unlockedCharacters.filter(isStudentCharacter);
  for(const id of DEFAULT_UNLOCKED_CHARACTERS) if(p.unlockedCharacters.indexOf(id)<0) p.unlockedCharacters.push(id);
  p.unlockedWeapons = p.unlockedWeapons.filter(id=>STUDENT_WEAPONS.some(w=>w.id===id));
  for(const id of DEFAULT_UNLOCKED_WEAPONS) if(p.unlockedWeapons.indexOf(id)<0) p.unlockedWeapons.push(id);
  p.selectedCharacterId = sanitizeCharacterId(p.selectedCharacterId);
  p.selectedWeaponId = getWeaponForCharacter(p.selectedCharacterId);   // 무기는 항상 캐릭터 고정 무기
  if(p.unlockedCharacters.indexOf(p.selectedCharacterId) < 0) p.selectedCharacterId = p.unlockedCharacters[0];
  if(getDifficulty(p.selectedDifficultyId).id !== p.selectedDifficultyId) p.selectedDifficultyId = "normal";
  if(getMap(p.selectedMapId).id !== p.selectedMapId) p.selectedMapId = "training";
  if(getMode(p.selectedModeId).id !== p.selectedModeId) p.selectedModeId = "solo";
  return p;
}

// 간이 해시(cyrb53류) — 동기/결정적. 암호학적 보안 아님(수업용).
function hashPin(id, pin){
  const s = (id||"")+":"+(pin||"")+":"+ADMIN_CONFIG.classCode+":starArena";
  let h1=0xdeadbeef, h2=0x41c6ce57;
  for(let i=0;i<s.length;i++){ const c=s.charCodeAt(i); h1=Math.imul(h1^c,2654435761); h2=Math.imul(h2^c,1597334677); }
  h1=Math.imul(h1^(h1>>>16),2246822507); h1^=Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507); h2^=Math.imul(h1^(h1>>>13),3266489909);
  return (h2>>>0).toString(16).padStart(8,"0")+(h1>>>0).toString(16).padStart(8,"0");
}

/* ============================================================
   학생 계정 클라우드 동기화 (Firebase Realtime Database)
   경로: classes/{classCode}/students/{studentId}
   - 로컬(localStorage)은 오프라인 캐시. 온라인이면 클라우드가 기준 데이터.
   - 원문 PIN은 절대 저장하지 않음(pinHash만). 기존 hashPin 호환.
   - ⚠ 정적 페이지 + 클라이언트 hashPin은 "수업용 간이 보호"이지 진짜 보안이 아님.
   ============================================================ */
const ACCOUNTS_BACKUP_KEY = "starArena.accounts.backup.v1";
let cloudAccountStatus = "로컬 전용";   // 로그인/패널 표시용 상태
const AccountStore = {
  cloudReady(){ return !!(OnlineManager && OnlineManager.available && OnlineManager.db); },
  _sref(){ return OnlineManager.db.ref("classes/"+ADMIN_CONFIG.classCode+"/students"); },
  _ref(id){ return this._sref().child(id); },
  // 계정 → 클라우드 레코드(스키마 필드만, undefined 없음)
  toRecord(a){
    return {
      id:a.id, name:a.name||"", pinHash:a.pinHash||"",
      level:a.level||1, exp:a.exp||0, gold:a.gold||0,
      wins:a.wins||0, losses:a.losses||0, draws:a.draws||0,
      totalPlays:a.totalPlays||0, totalKills:a.totalKills||0, bossKills:a.bossKills||0,
      selectedCharacterId:a.selectedCharacterId||null, selectedWeaponId:a.selectedWeaponId||null,
      selectedDifficultyId:a.selectedDifficultyId||null, selectedMapId:a.selectedMapId||null, selectedModeId:a.selectedModeId||null,
      unlockedCharacters:(a.unlockedCharacters||[]).slice(), unlockedWeapons:(a.unlockedWeapons||[]).slice(),
      createdAt:a.createdAt||nowTs(), lastLoginAt:a.lastLoginAt||0, lastUpdated:a.lastUpdated||nowTs(),
      rpg:a.rpg||null,   /* RPG모드 §7.3 ③: 클라우드 화이트리스트 포함(미포함 시 새로고침이 로컬 세이브 역파괴) */
      isActive:(a.isActive!==false)
    };
  },
  // ── 로컬 캐시 계층 ──
  loadLocalAccounts(){ loadAccounts(); return accounts; },
  saveLocalAccounts(){ saveAccounts(); },
  cacheLocal(rec){ if(!accounts) loadAccounts(); const cur=accounts.students[rec.id]||{}; delete cur._pendingSync; accounts.students[rec.id]=Object.assign(cur, rec); saveAccounts(); },
  // ── 클라우드 CRUD (Promise) ──  null=없음, undefined=조회오류(네트워크)
  loadCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._ref(id).once("value").then(function(s){ res(s.val()||null); }).catch(function(){ res(undefined); });
  }); },
  loadCloudAccounts(){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(null);
    self._sref().once("value").then(function(s){ res(s.val()||{}); }).catch(function(){ res(undefined); });
  }); },
  // 저장: transaction으로 '오래된 로컬이 최신 클라우드를 덮어쓰지 않게'(최신 lastUpdated 우선)
  saveCloudStudent(a){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    const rec=self.toRecord(a);
    try{
      self._ref(a.id).transaction(function(cur){
        if(cur && typeof cur.lastUpdated==="number" && rec.lastUpdated < cur.lastUpdated) return;  // 클라우드가 최신 → 덮어쓰지 않음(abort)
        return rec;
      }, function(err){ res(!err); }, false);
    }catch(e){ res(false); }
  }); },
  deleteCloudStudent(id){ const self=this; return new Promise(function(res){
    if(!self.cloudReady()) return res(false);
    self._ref(id).remove().then(function(){ res(true); }).catch(function(){ res(false); });
  }); },
  // 클라우드 → 로컬 병합(클라우드가 최신/누락이면 반영). 로컬 전용 계정은 유지.
  syncAccounts(){ const self=this; return new Promise(function(res){
    self.loadCloudAccounts().then(function(cloud){
      if(cloud===undefined||cloud===null){ res(false); return; }
      if(!accounts) loadAccounts();
      let n=0;
      for(const id in cloud){ const c=cloud[id], loc=accounts.students[id];
        if(!loc || (typeof c.lastUpdated==="number" && c.lastUpdated >= (loc.lastUpdated||0))){ accounts.students[id]=c; n++; } }
      saveAccounts(); cloudAccountStatus="학급 계정 연결됨"; res(n);
    });
  }); },
  // 오프라인 저장 → pending. 재연결 시 flush(최신 우선).
  markPending(id){ if(accounts&&accounts.students[id]){ accounts.students[id]._pendingSync=true; saveAccounts(); } },
  flushPending(){ const self=this; if(!self.cloudReady()||!accounts) return;
    Object.keys(accounts.students).forEach(function(id){ const a=accounts.students[id];
      if(a && a._pendingSync){ self.saveCloudStudent(a).then(function(ok){ if(ok){ delete a._pendingSync; saveAccounts(); } }); } });
  }
};
/* ============================================================
   BIG-BATCH-2 P3 · 맵공방 클라우드 스토어 (D10)
   경로: starArenaOnline/editorMaps/{classCode}/{pending|approved}/{id}
   - 학급 전체 공유: A컴퓨터 제출 → B컴퓨터 교사 승인 → 전 클라이언트 부팅 시 반영
   - 오프라인 폴백 = 기존 localStorage(editorMaps.v1). 병합은 클라우드 우선:
     · 클라우드에 있는 레코드 = 그대로 채택(_synced 표시)
     · 로컬에만 있고 _synced 아님 = 오프라인 신규 → 업로드
     · 로컬에 있는데 _synced인데 클라우드에 없음 = 다른 기기에서 삭제됨 → 버림
   - 개인정보 최소: 맵 데이터 + 작성자 닉네임 + 학급 코드만.
   ============================================================ */
let cloudMapStatus="로컬 전용";
const MapStore = {
  cloudReady(){ return !!(OnlineManager && OnlineManager.available && OnlineManager.db); },
  _ref(){ return OnlineManager.db.ref("starArenaOnline/editorMaps/"+ADMIN_CONFIG.classCode); },
  toRecord(r){
    return { id:r.id, name:r.name||"", author:r.author||"", mode:r.mode||"tdm",
      size:(r.size||[22,10]).slice(), floor:r.floor||"basic",
      cellsLeft:(r.cellsLeft||[]).slice(), createdAt:r.createdAt||nowTs(),
      disabled:!!r.disabled, updatedAt:nowTs() };
  },
  pushRec(kind, rec, cb){
    if(!this.cloudReady()){ if(cb) cb(false); return; }
    try{ this._ref().child(kind+"/"+rec.id).set(this.toRecord(rec)).then(function(){ if(cb) cb(true); }).catch(function(){ if(cb) cb(false); }); }
    catch(e){ if(cb) cb(false); }
  },
  removeRec(kind, id, cb){
    if(!this.cloudReady()){ if(cb) cb(false); return; }
    try{ this._ref().child(kind+"/"+id).remove().then(function(){ if(cb) cb(true); }).catch(function(){ if(cb) cb(false); }); }
    catch(e){ if(cb) cb(false); }
  },
  // 교사 액션 미러: 승인(pending→approved) / 거절·삭제 / 비활성 토글
  mirrorApprove(rec){ const self=this; this.removeRec("pending", rec.id, null); this.pushRec("approved", rec, null); },
  mirrorReject(id){ this.removeRec("pending", id, null); },
  mirrorDelete(id){ this.removeRec("approved", id, null); },
  mirrorDisable(rec){ this.pushRec("approved", rec, null); },
  loadCloud(cb){
    if(!this.cloudReady()){ cb(undefined); return; }
    try{ this._ref().once("value").then(function(s){ cb(s.val()||{pending:{},approved:{}}); }).catch(function(e){ cb(undefined, e&&e.code); }); }
    catch(e){ cb(undefined); }
  },
  sync(cb){
    const self=this;
    this.loadCloud(function(cloud, errCode){
      if(cloud===undefined){
        // PERF-2에서 발견: 라이브 DB 규칙에 editorMaps 경로가 없어 PERMISSION_DENIED — 명확히 안내(database.rules.json 참조)
        cloudMapStatus=(errCode==="PERMISSION_DENIED")
          ? "⚠ DB 규칙에 editorMaps 추가 필요 — database.rules.json을 Firebase 콘솔에 게시"
          : "오프라인 — 이 기기 목록";
        if(cb) cb(false); return;
      }
      const st=loadEditorStore();
      const out={pending:[],approved:[]}, pushes=[];
      for(const kind of ["pending","approved"]){
        const cmap=cloud[kind]||{}, seen={};
        for(const id in cmap){
          const rec=cmap[id];
          if(!rec || !rec.cellsLeft) continue;
          rec._synced=true; out[kind].push(rec); seen[id]=true;
        }
        for(const rec of (st[kind]||[])){
          if(seen[rec.id]) continue;
          if(rec._synced) continue;                       // 다른 기기에서 삭제됨 → 버림(클라우드 우선)
          out[kind].push(rec); pushes.push([kind, rec]);  // 오프라인 신규 → 업로드
        }
      }
      saveEditorStore(out);
      _reviewSt=null; _adminPendingN=-1; _pfSel=null;   // PERF-2: 화면 캐시 무효화
      try{ applyApprovedMaps(); }catch(e){}
      for(const [kind, rec] of pushes){
        (function(k, r){ self.pushRec(k, r, function(ok){
          if(ok){ const cur=loadEditorStore(); const hit=(cur[k]||[]).find(x=>x.id===r.id); if(hit){ hit._synced=true; saveEditorStore(cur); } } }); })(kind, rec);
      }
      cloudMapStatus="학급 맵공방 연결됨 (승인 "+out.approved.length+" · 대기 "+out.pending.length+")";
      if(cb) cb(true, out);
    });
  }
};
// 진행도/계정 변경을 클라우드에 밀어넣기(불가하면 pending)
function pushCloudOrPending(id){
  if(!accounts||!accounts.students[id]) return;
  if(AccountStore.cloudReady()){
    AccountStore.saveCloudStudent(accounts.students[id]).then(function(ok){ if(!ok) AccountStore.markPending(id); });
  } else { AccountStore.markPending(id); }
}
// 클라우드 준비되면(익명 인증 완료) 계정 동기화 + pending flush
function onCloudAccountsReady(){
  cloudAccountStatus="학급 계정 연결 중…";
  AccountStore.syncAccounts().then(function(r){
    if(r===false){ cloudAccountStatus="이 기기에 저장된 계정만 사용 가능"; return; }
    AccountStore.flushPending();
    const l=studentList(); if((!adminSelId||!accounts.students[adminSelId]) && l[0]) adminSelId=l[0].id;
  });
  // BIG-BATCH-2 P3: 부팅 시 학급 맵공방 동기화(D10) — 일시 실패면 8초 후 1회 재시도(권한 거부는 재시도 무의미)
  try{ MapStore.sync(function(ok){
    if(!ok && cloudMapStatus.indexOf("규칙")<0){ setTimeout(function(){ try{ MapStore.sync(); }catch(e){} }, 8000); }
  }); }catch(e){}
}
// 클라우드 우선 학생 로그인(비동기). 실패 유형별 메시지 분리.
function studentLoginCloud(id, pin, cb){
  id=(""+id).trim();
  const localTry=function(offline){ const r=studentLogin(id,pin); if(r.ok&&offline) r.offline=true; cb(r); };
  if(!AccountStore.cloudReady()){ localTry(true); return; }
  cloudAccountStatus="학급 계정 확인 중…";
  AccountStore.loadCloudStudent(id).then(function(rec){
    if(rec===undefined){ // 조회 오류(네트워크) → 로컬 캐시로
      const r=studentLogin(id,pin);
      if(r.ok){ r.offline=true; cb(r); } else cb({ok:false,msg:"연결이 불안정해요 — 이 기기에 저장된 계정만 로그인 가능"});
      return;
    }
    if(rec===null){ if(accounts&&accounts.students[id]){ localTry(false); return; } cb({ok:false,msg:"계정이 없어요"}); return; }
    if(rec.isActive===false){ cb({ok:false,msg:"사용 중지된 계정이에요"}); return; }
    if(rec.pinHash!==hashPin(id,pin)){ cb({ok:false,msg:"비밀번호(PIN)가 틀려요"}); return; }
    rec.lastLoginAt=nowTs(); AccountStore.cacheLocal(rec);
    bindStudent(id);
    session={ role:"student", studentId:id, name:rec.name, loginAt:nowTs() }; saveSession();
    pushCloudOrPending(id);          // lastLoginAt 반영
    cloudAccountStatus="학급 계정 연결됨";
    cb({ok:true});
  });
}
// 교사: 로컬 계정을 클라우드로 이전(스캔→확인→업로드, 원본은 백업 보관)
function adminMigrateLocal(){
  if(!AccountStore.cloudReady()){ showToast("온라인 연결 후 이용하세요"); return; }
  const list=studentList(); if(!list.length){ showToast("이전할 로컬 계정이 없어요"); return; }
  AccountStore.loadCloudAccounts().then(function(cloud){
    if(cloud===undefined){ showToast("클라우드 조회 실패 — 잠시 후 다시"); return; }
    cloud=cloud||{}; const toNew=[],toOver=[],toSkip=[];
    list.forEach(function(a){ const c=cloud[a.id];
      if(!c) toNew.push(a); else if((a.lastUpdated||0)>=(c.lastUpdated||0)) toOver.push(a); else toSkip.push(a); });
    const msg="클라우드로 이전:\n· 신규 업로드 "+toNew.length+"개\n· 덮어쓰기(로컬이 최신) "+toOver.length+"개"+(toOver.length?" ["+toOver.map(function(a){return a.id;}).join(", ")+"]":"")+"\n· 건너뜀(클라우드가 최신) "+toSkip.length+"개\n진행할까요?";
    let ok=false; try{ ok=window.confirm(msg); }catch(e){ ok=true; }
    if(!ok) return;
    try{ window.localStorage.setItem(ACCOUNTS_BACKUP_KEY, JSON.stringify(accounts)); }catch(e){}   // 원본 백업(즉시 삭제 안 함)
    const targets=toNew.concat(toOver);
    if(!targets.length){ showToast("이전할 항목 없음(모두 클라우드가 최신)"); return; }
    let up=0,fail=0,done=0;
    targets.forEach(function(a){ AccountStore.saveCloudStudent(a).then(function(s){ if(s)up++; else fail++;
      if(++done===targets.length){ showToast("이전 완료 — 업로드 "+up+" · 건너뜀 "+toSkip.length+" · 실패 "+fail+" (원본 백업 보관)"); } }); });
  });
}

function loadScriptsSequential(urls, done){
  let i=0;
  function next(){
    if(i>=urls.length){ done(true); return; }
    try{
      const s=document.createElement("script");
      s.src=urls[i]; s.async=true;
      s.onload=function(){ i++; next(); };
      s.onerror=function(){ done(false); };
      (document.head||document.body).appendChild(s);
    }catch(e){ done(false); }
  }
  next();
}

  app:null, auth:null, db:null, uid:null,

  mode:null, mySlot:null, maxPlayers:2,   // 다인(슬롯) 모드용
  unsubs:[], lastSyncAt:0, connected:false, opponentConnected:true,
  onlineState:null, onlineStateAt:0, meta:null, players:{ host:null, guest:null }, inputs:{}, onlineInput:{ host:null, guest:null },

  updateStatus:function(msg){ this.status=msg; },

  initFirebaseIfAvailable:function(){
    try{
      if(!FIREBASE_CONFIG){ this.available=false; this.status="Firebase 설정 없음 (로컬 전용)"; return; }
      this.status="Firebase 불러오는 중…";
      const self=this;
      loadScriptsSequential(FB_SDK_URLS, function(ok){
        if(!ok || typeof firebase==="undefined"){ self.available=false; self.status="Firebase 로드 실패 (로컬 전용)"; return; }
        try{
          self.app=firebase.initializeApp(FIREBASE_CONFIG);
          self.auth=firebase.auth();
          self.db=firebase.database();
          self.status="로그인 중…";
          self.signInGuest();
        }catch(e){ self.available=false; self.status="Firebase 초기화 실패 (로컬 전용)"; }
      });
    }catch(e){ this.available=false; this.status="온라인 사용 불가 (로컬 모드)"; }
  },

  signInGuest:function(){
    const self=this;
    try{
      this.auth.signInAnonymously().then(function(cred){
        self.uid = (cred && cred.user) ? cred.user.uid : (self.auth.currentUser ? self.auth.currentUser.uid : null);
        self.available=true; self.status="온라인 준비 완료";
        self.watchConnection();
        try{ onCloudAccountsReady(); }catch(e){}   // 학급 계정 클라우드 동기화 + pending flush
      }).catch(function(e){ self.available=false; self.status="로그인 실패 (로컬 모드)"; });
    }catch(e){ this.available=false; this.status="로그인 실패 (로컬 모드)"; }
  },

  watchConnection:function(){
    try{
      const self=this, cref=this.db.ref(".info/connected");
      const cb=function(snap){ const was=self.connected; self.connected = snap.val()===true;
        if(!was && self.connected){
          try{ AccountStore.flushPending(); }catch(e){}   // 재연결 시 오프라인 변경 동기화
          // 온라인긴급 P1b: 재연결 시 presence 재-set — onDisconnect가 connected=false를 이미 쐈다면
          // 이걸 다시 true로 되돌리고 onDisconnect도 재무장(없으면 복귀 불가·봇 상태 영구 잔류)
          try{ if(self.roomRef){ const k=self.mySlot||self.role; if(k) self.setPresence(k); } }catch(e){}
        } };
      cref.on("value", cb);
      this.unsubs.push(function(){ try{ cref.off("value", cb); }catch(e){} });
    }catch(e){}
  },

  generateRoomCode:function(){
    const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s="";
    for(let i=0;i<4;i++) s+=chars.charAt(Math.floor(Math.random()*chars.length));
    return s;
  },
  roomPath:function(code){ return "starArenaOnline/rooms/"+code; },
  // 코드감사: 끝난 방/깨진 방(meta 없음)은 새 방 생성 시 그 코드를 재사용해 덮어쓴다(DB에 유령 방이 무한히 쌓이는 것 방지)
  _roomIsFree:function(v){ return !v || !v.meta || v.meta.status==="ended"; },

  createRoom:function(onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this;
      // 방 코드가 이미 있으면(아주 드묾) 다른 코드로 다시 시도해 기존 방을 덮어쓰지 않게 한다
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(!self._roomIsFree(snap.val())){
            if(triesLeft>0){ tryCreate(triesLeft-1); return; }
            if(onDone) onDone(false,"방 생성 실패(코드 충돌)"); return;
          }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const room={
            meta:{ status:"waiting", hostUid:self.uid, guestUid:null, createdAt:ts, updatedAt:ts,
              mapId:selectedMapId||"training", characterHost:selectedCharacterId, characterGuest:null,
              weaponHost:selectedWeaponId, weaponGuest:null, winner:null },
            players:{ host:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() } }
          };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
            self.setPresence("host"); self.listenRoom();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"방 생성 실패"); });
        }).catch(function(e){ if(onDone) onDone(false,"방 생성 오류"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"방 생성 오류"); }
  },

  joinRoom:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this;
      code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"방 코드 형식 오류"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"방을 찾을 수 없음"); return; }
        if(data.meta.status==="ended"){ if(onDone) onDone(false,"이미 종료된 방이에요"); return; }   // 코드감사: 유령 방에 들어가 무한 대기하는 문제 방지
        if(data.meta.guestUid && data.meta.guestUid!==self.uid){ if(onDone) onDone(false,"방이 가득 찼습니다"); return; }
        const ts=firebase.database.ServerValue.TIMESTAMP;
        const updates={};
        updates["meta/guestUid"]=self.uid;
        updates["meta/characterGuest"]=selectedCharacterId;
        updates["meta/weaponGuest"]=selectedWeaponId;
        updates["meta/status"]="ready";
        updates["meta/updatedAt"]=ts;
        updates["players/guest"]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, lastSeen:ts, input:emptyInput() };
        ref.update(updates).then(function(){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode="online1v1"; self.mySlot=null; self.maxPlayers=2;
          self.setPresence("guest"); self.listenRoom();
          if(onDone) onDone(true, code);
        }).catch(function(e){ if(onDone) onDone(false,"입장 실패"); });
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },

  setPresence:function(role){
    try{
      if(!this.roomRef) return;
      const pref=this.roomRef.child("players/"+role);
      pref.child("connected").set(true);
      pref.child("connected").onDisconnect().set(false);
      pref.child("lastSeen").onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
      this.roomRef.child("inputs/"+role).onDisconnect().set(emptyInput()); // 끊기면 입력도 비워 유령 동작 방지(온라인긴급 P1: inputs 분리 노드)
      if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().set("ended"); // 방장 끊기면 방 종료
    }catch(e){}
  },

  listenRoom:function(){
    try{
      const self=this; if(!this.roomRef) return;
      const metaRef=this.roomRef.child("meta");
      const playersRef=this.roomRef.child("players");
      const stateRef=this.roomRef.child("state");
      const mcb=function(snap){ self.meta=snap.val(); onRoomMetaChanged(); };
      const pcb=function(snap){
        self.players=snap.val()||{ host:null, guest:null };   // 온라인긴급 P1: players=로스터만(입력은 inputs 노드) — 변화 드묾
      };
      metaRef.on("value", mcb);
      playersRef.on("value", pcb);
      this.unsubs.push(function(){ try{ metaRef.off("value",mcb); }catch(e){} });
      this.unsubs.push(function(){ try{ playersRef.off("value",pcb); }catch(e){} });
      if(this.role==="host"){
        // 온라인긴급 P1(#1 최대 렉 요인 해소): 입력은 host만 구독 — 게스트 입력 쓰기가
        // 방 전원에게 players 전체(~2.5KB)로 팬아웃되던 트래픽 증폭 제거.
        const inputsRef=this.roomRef.child("inputs");
        const icb=function(snap){
          self.inputs=snap.val()||{};
          self.onlineInput.host = self.inputs.host||null;   // 1v1 하위호환 뷰
          self.onlineInput.guest = self.inputs.guest||null;
        };
        inputsRef.on("value", icb);
        this.unsubs.push(function(){ try{ inputsRef.off("value",icb); }catch(e){} });
      }
      if(this.role==="guest"){
        const scb=function(snap){ self.onlineState=snap.val(); self.onlineStateAt=Date.now(); };   // 수신 시각(신선도 진단용)
        stateRef.on("value", scb);
        this.unsubs.push(function(){ try{ stateRef.off("value",scb); }catch(e){} });
      }
    }catch(e){}
  },

  /* 온라인긴급 P0: 패킷 딥 새니타이즈 — undefined 필드 1개만 있어도 RTDB가 set() 전체를 거부해
     "동기화 대기 중…" 무한 대기가 됐다(봇 ammo=undefined). 경계에서 undefined 제거·비유한수 0 치환. */
  _sanWarned:{},
  _sanWarn:function(path){ const key=path.replace(/[0-9]+/g,"N"); if(this._sanWarned[key]) return; this._sanWarned[key]=1;
    try{ console.warn("[online] state 필드 정화:", key); }catch(e){} },
  _sanitizePacket:function(v, path){
    if(v===null) return null;
    const t=typeof v;
    if(t==="number"){ if(!isFinite(v)){ this._sanWarn(path); return 0; } return v; }
    if(t==="function"){ this._sanWarn(path); return null; }
    if(t==="object"){
      if(v[".sv"]!==undefined) return v;                       // ServerValue.TIMESTAMP 통과
      if(Array.isArray(v)){ const out=new Array(v.length);
        for(let i=0;i<v.length;i++){ const x=v[i]; out[i]=(x===undefined)?(this._sanWarn(path+"["+i+"]"),null):this._sanitizePacket(x, path+"["+i+"]"); }
        return out; }
      const out={};
      for(const k in v){ const x=v[k];
        if(x===undefined){ this._sanWarn(path+"."+k); continue; }  // 키 제거(= RTDB에서 null 쓰기와 동일 효과)
        out[k]=this._sanitizePacket(x, path+"."+k); }
      return out;
    }
    return v;
  },
  writeInput:function(inputObj){ try{ const key=this.mySlot||this.role; if(this.roomRef && key) this.roomRef.child("inputs/"+key).set(this._sanitizePacket(inputObj,"input")); }catch(e){ try{ console.warn("[online] input 전송 실패", e); }catch(e2){} } },   // 온라인긴급 P1: inputs/$slot 분리
  writeMetaStatus:function(status, extra){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; const u={ status:status, updatedAt:firebase.database.ServerValue.TIMESTAMP };
      if(extra){ for(const k in extra) u[k]=extra[k]; } this.roomRef.child("meta").update(this._sanitizePacket(u,"meta")); }catch(e){ try{ console.warn("[online] meta 전송 실패", e); }catch(e2){} }
  },
  writeHostState:function(stateObj){
    try{ if(this.role!=="host") return; if(!this.roomRef) return; stateObj.updatedAt=firebase.database.ServerValue.TIMESTAMP;
      const p=this.roomRef.child("state").set(this._sanitizePacket(stateObj,"state"));
      if(p && p.catch) p.catch(function(e){ try{ console.warn("[online] state 전송 실패", e); }catch(e2){} });
    }catch(e){ try{ console.warn("[online] state 전송 실패", e); }catch(e2){} }   // 무음 금지 — 이번 사고의 은폐 지점
  },

  leaveRoom:function(localOnly){
    try{
      for(const u of this.unsubs){ try{ u(); }catch(e){} }
      this.unsubs=[];
      // localOnly: 방이 이미 서버에서 삭제/종료된 경우. DB에 아무것도 쓰지 않고 로컬 정리만 한다(유령 방 재생성 방지).
      const slotKey=this.mySlot||this.role;
      if(!localOnly && this.roomRef && slotKey){
        try{
          const pref=this.roomRef.child("players/"+slotKey);
          pref.child("connected").onDisconnect().cancel();
          pref.child("lastSeen").onDisconnect().cancel();
          this.roomRef.child("inputs/"+slotKey).onDisconnect().cancel();   // 온라인긴급 P1: setPresence가 inputs/$slot에 걸므로 여기서 취소(유령 조각 방지)
          if(this.role==="host") this.roomRef.child("meta/status").onDisconnect().cancel();
        }catch(e){}
      }
      if(!localOnly && this.roomRef){
        try{
          const isTeam = (this.mode==="online3v3" || this.mode==="onlinePve6");
          if(this.role==="host"){ const rr=this.roomRef; rr.child("meta/status").set("ended");
            // 코드감사: 탭을 닫으며 나가면 아래 setTimeout이 실행되지 못해 방이 DB에 영구 잔류했다.
            // onDisconnect().remove()를 걸어 연결이 끊기는 순간 서버가 방을 청소한다(정상 퇴장 시엔 이미 지워져 무해한 no-op).
            try{ rr.onDisconnect().remove(); }catch(e){}
            setTimeout(function(){ try{ rr.remove(); }catch(e){} }, 800); }
          else if(slotKey && isTeam){
            // 팀 모드: 매치는 계속, 내 슬롯만 비활성 처리(host가 빈자리로 다룸)
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
            this.roomRef.child("inputs/"+slotKey).set(emptyInput());   // 온라인긴급 P1: 입력은 inputs 노드에서 비움
          }
          else if(slotKey){ // 1대1: 참가자가 1명뿐이라 매치 종료가 맞음
            this.roomRef.child("meta/status").set("ended");
            this.roomRef.child("players/"+slotKey+"/connected").set(false);
          }
        }catch(e){}
      }
    }catch(e){}
    this.roomRef=null; this.roomCode=null; this.role=null; this.mode=null; this.mySlot=null;
    this.onlineState=null; this.meta=null; this.players={ host:null, guest:null };
    this.onlineInput={ host:null, guest:null }; this.inputs={}; this.onlineStateAt=0; this.opponentConnected=true;
    if(this.available && this.db) this.watchConnection(); // 연결 감시 재구독
  },

  // ---- 다인(슬롯) 모드 방 생성/입장 ----
  createTeamRoom:function(modeId, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this, mode=getOnlineMode(modeId);
      const tryCreate=function(triesLeft){
        const code=self.generateRoomCode(), ref=self.db.ref(self.roomPath(code));
        ref.get().then(function(snap){
          if(!self._roomIsFree(snap.val())){ if(triesLeft>0){ tryCreate(triesLeft-1); return; } if(onDone) onDone(false,"방 생성 실패(코드 충돌)"); return; }
          const ts=firebase.database.ServerValue.TIMESTAMP;
          const team = mode.modeType==="pve" ? "pve" : "blue";
          // PVE는 스테이지 맵을 따르므로 mapId는 1스테이지 맵, PVP(3v3)는 host가 고른 맵
          const mapId = mode.modeType==="pve" ? (PVE_STAGES[0].mapId) : (selectedMapId||"training");
          const rule=(mode.modeType==="pvp" && modeId!=="online1v1") ? (onlineSelectedRule||"tdm") : "tdm";   // BIG-BATCH-2 P2
          const room={ meta:{ mode:modeId, status:"waiting", hostUid:self.uid, createdAt:ts, updatedAt:ts,
              mapId:mapId, maxPlayers:mode.maxPlayers, rule:rule, winner:null, resultText:"", stageIndex:0, waveIndex:0 },
            players:{ p1:{ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:"p1", team:team, characterId:selectedCharacterId,
              weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:ts, input:emptyInput() } } };
          ref.set(room).then(function(){
            self.roomCode=code; self.role="host"; self.roomRef=ref; self.mode=modeId; self.mySlot="p1"; self.maxPlayers=mode.maxPlayers;
            self.setPresence("p1"); self.listenRoom();
            if(onDone) onDone(true, code);
          }).catch(function(e){ if(onDone) onDone(false,"방 생성 실패"); });
        }).catch(function(e){ if(onDone) onDone(false,"방 생성 오류"); });
      };
      tryCreate(5);
    }catch(e){ if(onDone) onDone(false,"방 생성 오류"); }
  },
  joinRoomAny:function(code, onDone){
    try{
      if(!this.available || !this.db){ if(onDone) onDone(false,"온라인 사용 불가"); return; }
      const self=this; code=String(code||"").toUpperCase().trim();
      if(code.length<4){ if(onDone) onDone(false,"방 코드 형식 오류"); return; }
      const ref=this.db.ref(this.roomPath(code));
      ref.get().then(function(snap){
        const data=snap.val();
        if(!data || !data.meta){ if(onDone) onDone(false,"방을 찾을 수 없음"); return; }
        const m=data.meta.mode;
        if(m==="online3v3" || m==="onlinePve6"){ self._joinTeamRoom(code, data, ref, onDone); }
        else { self.joinRoom(code, onDone); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },
  _joinTeamRoom:function(code, data, ref, onDone){
    try{
      const self=this; let claimedSlot=null, claimedMode=null, failReason="입장 실패";
      // 슬롯 claim을 transaction으로 원자 처리(동시 입장 시 같은 pN 덮어쓰기 방지)
      ref.transaction(function(room){
        claimedSlot=null; failReason="입장 실패";
        // RTDB transaction은 첫 호출이 캐시 미동기화로 null로 올 수 있다.
        // 여기서 null로 중단(return)하면 서버 데이터를 받기도 전에 트랜잭션이 영구 abort된다.
        // 이미 get()으로 존재를 확인한 data로 보정해 null-abort 함정을 피한다.
        if(room===null || room===undefined) room=data;
        if(!room || !room.meta){ failReason="방을 찾을 수 없음"; return; }            // abort
        if(room.meta.status!=="waiting" && room.meta.status!=="ready"){ failReason="이미 시작된 방"; return; }
        claimedMode=room.meta.mode; const mode=getOnlineMode(claimedMode);
        const players=room.players||{};
        let slot=null;
        for(let i=1;i<=mode.maxPlayers;i++){ const k="p"+i; if(!players[k] || players[k].connected===false){ slot=k; break; } }
        if(!slot){ failReason="방이 가득 찼습니다"; return; }                          // abort
        let team="pve";
        if(mode.modeType==="pvp"){
          let blue=0,red=0; for(const k in players){ const pp=players[k]; if(pp && pp.connected!==false){ if(pp.team==="red") red++; else blue++; } }
          team = (blue<=red && blue<3) ? "blue" : (red<3 ? "red" : "blue");
        }
        claimedSlot=slot;
        if(!room.players) room.players={};
        room.players[slot]={ uid:self.uid, studentId:currentStudentId||null, nickname:profile.nickname, slot:slot, team:team, characterId:selectedCharacterId,
          weaponId:selectedWeaponId, connected:true, ready:false, isBot:false, lastSeen:firebase.database.ServerValue.TIMESTAMP, input:emptyInput() };
        room.meta.status="ready"; room.meta.updatedAt=firebase.database.ServerValue.TIMESTAMP;
        return room; // commit
      }).then(function(res){
        if(res && res.committed && claimedSlot){
          self.roomCode=code; self.role="guest"; self.roomRef=ref; self.mode=claimedMode; self.mySlot=claimedSlot; self.maxPlayers=getOnlineMode(claimedMode).maxPlayers;
          self.setPresence(claimedSlot); self.listenRoom();
          if(onDone) onDone(true, code);
        } else { if(onDone) onDone(false, failReason); }
      }).catch(function(e){ if(onDone) onDone(false,"입장 오류"); });
    }catch(e){ if(onDone) onDone(false,"입장 오류"); }
  },

  // 프로필 클라우드 저장은 이번 베타에서 사용하지 않음(로컬 localStorage만)
  saveCloudProfile:function(p){ try{ /* 베타: 미사용 */ }catch(e){} },
  loadCloudProfile:function(){ try{ return null; }catch(e){ return null; } }
};

   게임 상태

/* =======================================================================
   BIG-BATCH-1 E14 · 사운드 시스템(구조만 — 오디오 에셋 대기)
   assets/sfx/<이름>.mp3 파일을 넣으면 자동으로 로드·재생된다(없으면 완전 무음 no-op).
   브라우저 자동재생 정책: 첫 사용자 입력(keydown/mousedown)에서 AudioContext 초기화.
   ======================================================================= */
const SFX_NAMES=["fire","hit","kill","special","ult","win","lose","buff","reload","infect","paint","jump","stomp","spring","checkpoint","clear","powerup","shoot","break"];   /* GENRE-EXPAND-1 §4.1 + BIG-BATCH-2 P1.5(파워업·발사·블록 파괴) */
const SFX={ _ctx:null, _buf:{}, _tried:false };
function sfxVolume(){ const v=(profile && typeof profile.sfxVolume==="number")?profile.sfxVolume:0.7; return clamp(v,0,1); }
function sfxInit(){
  if(SFX._tried) return; SFX._tried=true;
  try{
    const AC=window.AudioContext||window.webkitAudioContext; if(!AC) return;
    SFX._ctx=new AC();
    for(const n of SFX_NAMES){
      fetch(ASSET_BASE+"sfx/"+n+".mp3").then(r=>r.ok?r.arrayBuffer():null)
        .then(ab=>ab?SFX._ctx.decodeAudioData(ab):null)
        .then(buf=>{ if(buf) SFX._buf[n]=buf; }).catch(()=>{});
    }
  }catch(e){ SFX._ctx=null; }
}
function playSfx(name){
  try{
    const v=sfxVolume(); if(!v || !SFX._ctx) return;
    const b=SFX._buf[name]; if(!b) return;                 // 에셋 없음 → 무음(구조만)
    const src=SFX._ctx.createBufferSource(), g=SFX._ctx.createGain();
    src.buffer=b; g.gain.value=v; src.connect(g); g.connect(SFX._ctx.destination); src.start();
  }catch(e){}
}

/* =======================================================================
   UPDATE-1 P3 · 조작 3모드(키보드/마우스/터치) — 입력 추상화
   세 입력 소스를 같은 '의도'로 변환: { mx,my(이동 -1..1), aim(라디안|null), aimPoint(커서 논리좌표|null),
   fire, special, ult, reload }. 게임 로직·온라인 패킷은 의도만 소비한다.
   키보드 모드는 기존 동작 그대로(기본값 — aim=null이면 이동 방향 조준·X/C는 keydown 경로 유지).
   ======================================================================= */
const CONTROL_MODES=[ {id:"keyboard",name:"키보드 (방향키 + Z/X/C)"},
                      {id:"mouse",   name:"마우스 (WASD 이동 + 커서 조준)"},
                      {id:"touch",   name:"터치 (태블릿 조이스틱)"} ];
function controlMode(){ return (profile && profile.controlMode) || "keyboard"; }
function controlModeName(){ const m=CONTROL_MODES.find(c=>c.id===controlMode()); return m?m.name:"키보드"; }
const MOUSE={ x:LOGW/2, y:LOGH/2, down:false, rdown:false, seen:false };
const TOUCH={ moveId:null, moveAnchor:null, moveVec:{x:0,y:0}, aimId:null, aimAnchor:null, aimVec:{x:0,y:0},
              aiming:false, xTap:false, cTap:false, reloadTap:false, pickTap:-1 };
function inPlayState(){ return gameState===STATE.PLAYING || gameState===STATE.ONLINE_PLAYING; }
let _canvasRect=null;   // PERF-2: mousemove마다 getBoundingClientRect(레이아웃 강제) 방지 — 리사이즈/스크롤 시 무효화
function canvasToLogical(clientX, clientY){
  try{
    const r=_canvasRect || (_canvasRect=canvas.getBoundingClientRect());
    if(!r || !r.width || !r.height) return {x:LOGW/2, y:LOGH/2};
    return { x:(clientX-r.left)*(LOGW/r.width), y:(clientY-r.top)*(LOGH/r.height) };
  }catch(e){ return {x:LOGW/2, y:LOGH/2}; }
}
/* =======================================================================
   UI 히트영역 — 모든 메뉴 화면 마우스·터치 클릭 대응(TOUCH-UI-1)
   각 메뉴 draw가 프레임마다 버튼 rect+동작을 등록하고, 클릭/탭이 그 동작을 실행한다.
   controlMode(키보드/마우스/터치)와 무관하게 동작 — 태블릿만 있는 학생도 메뉴 진입 가능.
   키보드 네비게이션(화살표+Enter)은 그대로 병행 유지. ======================================================================= */
let UI_HITS = [];
function uiClearHits(){ UI_HITS.length = 0; }
function uiHit(x, y, w, h, fn){ if(fn) UI_HITS.push({ x:x, y:y, w:w, h:h, fn:fn }); }
function uiMenuActive(){   // 자체 포인터 처리를 가진 화면(플레이/에디터/RPG/별빛점프)은 제외
  return !inPlayState() && gameState!==STATE.EDITOR && gameState!==STATE.RPG && gameState!==STATE.PLATFORMER;
}
function uiPointerDown(p){   // 나중에 그려진 것(위层) 우선 — 역순 탐색
  if(!uiMenuActive()) return false;
  for(let i=UI_HITS.length-1;i>=0;i--){ const b=UI_HITS[i];
    if(p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h){ try{ b.fn(); }catch(e){} return true; } }
  return false;
}
// 가상 스틱: 앵커→현재점 벡터를 반경으로 정규화(-1..1, 밖은 클램프)
function stickVec(anchor, p, rad){
  let dx=(p.x-anchor.x)/rad, dy=(p.y-anchor.y)/rad;
  const l=Math.hypot(dx,dy); if(l>1){ dx/=l; dy/=l; }
  return {x:dx, y:dy};
}
function _touchDockTap(p){   // 하단 스킬독 탭(X/C=스킬, Z=장전) + PVE 강화 카드 탭
  if(p.y>648){
    if(dist(p.x,p.y,LOGW/2,685)<34){ TOUCH.xTap=true; return true; }
    if(dist(p.x,p.y,LOGW/2+96,685)<34){ TOUCH.cTap=true; return true; }
    if(dist(p.x,p.y,LOGW/2-96,685)<34){ TOUCH.reloadTap=true; return true; }
  }
  if(p.y>=436 && p.y<=562){   // 강화 3택1 카드 영역(drawUpgradeCards와 동일 좌표)
    const cw=250, gap=24, total=cw*3+gap*2, x0=LOGW/2-total/2;
    for(let i=0;i<3;i++){ const x=x0+i*(cw+gap); if(p.x>=x&&p.x<=x+cw){ TOUCH.pickTap=i; return true; } }
  }
  return false;
}
function handleTouchStart(e){
  if(uiMenuActive()){   // TOUCH-UI-1: 메뉴 탭은 controlMode 무관(태블릿 메뉴 진입)
    if(e.changedTouches&&e.changedTouches.length){ const t=e.changedTouches[0]; if(uiPointerDown(canvasToLogical(t.clientX,t.clientY))) e.preventDefault(); }
    return;
  }
  if(gameState===STATE.EDITOR && ED && ED.step==="edit" && e.changedTouches&&e.changedTouches.length){   // TOUCH-UI-1: 에디터 터치 배치
    const t=e.changedTouches[0], p=canvasToLogical(t.clientX,t.clientY);
    if(edTestBtnHit(p)){ e.preventDefault(); return; }
    const pal=edPalette();
    if(p.x>=24&&p.x<=250){ for(let i=0;i<pal.length;i++){ const py=134+i*34; if(p.y>=py-14&&p.y<=py+16){ ED.palIdx=i; e.preventDefault(); return; } } }
    if(!ED.slot){ ED.mbtn=1; edPaintAt(p); }
    e.preventDefault(); return;
  }
  if(edTest && gameState===STATE.PLAYING && e.changedTouches&&e.changedTouches.length){   // EDIT-TEST-1: 🔙 에디터 버튼(우하단)
    const p=canvasToLogical(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(p.x>LOGW-96&&p.y>LOGH-44){ edEndTest(); e.preventDefault(); return; }
  }
  if(controlMode()!=="touch") return;
  if(gameState===STATE.PLATFORMER){ e.preventDefault();
    for(const t of e.changedTouches){ const p=canvasToLogical(t.clientX,t.clientY); pfTouchAt(p,true); } return; }
  if(gameState===STATE.RPG){ e.preventDefault();
    for(const t of e.changedTouches){ rpgTouchStart(t.identifier, canvasToLogical(t.clientX,t.clientY)); } return; }   // RPG모드 §4.7
  if(!inPlayState()) return;
  e.preventDefault();
  for(const t of e.changedTouches){
    const p=canvasToLogical(t.clientX,t.clientY);
    if(_touchDockTap(p)) continue;
    if(p.x<LOGW/2 && TOUCH.moveId===null){ TOUCH.moveId=t.identifier; TOUCH.moveAnchor=p; TOUCH.moveVec={x:0,y:0}; }
    else if(p.x>=LOGW/2 && TOUCH.aimId===null){ TOUCH.aimId=t.identifier; TOUCH.aimAnchor=p; TOUCH.aimVec={x:0,y:0}; TOUCH.aiming=true; }
  }
}
function handleTouchMove(e){
  if(gameState===STATE.EDITOR && ED && ED.step==="edit" && ED.mbtn){   // TOUCH-UI-1: 에디터 드래그 배치
    if(e.changedTouches&&e.changedTouches.length){ edPaintAt(canvasToLogical(e.changedTouches[0].clientX,e.changedTouches[0].clientY)); e.preventDefault(); }
    return;
  }
  if(controlMode()!=="touch") return;
  e.preventDefault();
  if(gameState===STATE.RPG){ for(const t of e.changedTouches){ rpgTouchMove(t.identifier, canvasToLogical(t.clientX,t.clientY)); } return; }   // RPG모드 §4.7
  for(const t of e.changedTouches){
    const p=canvasToLogical(t.clientX,t.clientY);
    if(t.identifier===TOUCH.moveId) TOUCH.moveVec=stickVec(TOUCH.moveAnchor,p,60);
    else if(t.identifier===TOUCH.aimId) TOUCH.aimVec=stickVec(TOUCH.aimAnchor,p,70);
  }
}
function handleTouchEnd(e){
  if(gameState===STATE.EDITOR && ED){ ED.mbtn=0; return; }   // TOUCH-UI-1: 에디터 드래그 종료
  if(controlMode()!=="touch") return;
  if(gameState===STATE.PLATFORMER){ e.preventDefault();
    if(PF){ PF.touch.l=false; PF.touch.r=false; PF.touch.j=false; PF.touch.dn=false; } return; }
  if(gameState===STATE.RPG){ e.preventDefault();
    for(const t of e.changedTouches) rpgTouchEnd(t.identifier); return; }   // RPG모드 §4.7
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===TOUCH.moveId){ TOUCH.moveId=null; TOUCH.moveVec={x:0,y:0}; }
    else if(t.identifier===TOUCH.aimId){ TOUCH.aimId=null; TOUCH.aiming=false; TOUCH.aimVec={x:0,y:0}; }
  }
}
// 리스너 등록 — Node 하니스의 canvas 스텁에는 addEventListener가 없어 try로 감싼다(로직은 위 함수라 테스트 가능)
try{
  canvas.addEventListener("mousemove", (e)=>{ const p=canvasToLogical(e.clientX,e.clientY); MOUSE.x=p.x; MOUSE.y=p.y; MOUSE.seen=true;
    if(gameState===STATE.EDITOR && ED && ED.step==="edit" && ED.mbtn) edPaintAt(p); });   // C9: 드래그 페인팅
  canvas.addEventListener("mousedown", (e)=>{
    if(gameState===STATE.EDITOR && ED && ED.step==="edit"){ edMouseDown(e); e.preventDefault(); return; }   // C9: 에디터 마우스 배치
    if(e.button===0 && uiMenuActive()){ const p=canvasToLogical(e.clientX,e.clientY); if(uiPointerDown(p)){ e.preventDefault(); return; } }   // TOUCH-UI-1: 메뉴 클릭
    if(controlMode()!=="mouse" || !inPlayState()) return;
    if(e.button===0) MOUSE.down=true; else if(e.button===2) MOUSE.rdown=true;
    e.preventDefault();
  });
  window.addEventListener("mouseup", (e)=>{ if(e.button===0) MOUSE.down=false; else if(e.button===2) MOUSE.rdown=false; if(ED) ED.mbtn=0; });
  canvas.addEventListener("contextmenu", (e)=>{ if(controlMode()==="mouse" || gameState===STATE.EDITOR) e.preventDefault(); });
  canvas.addEventListener("touchstart", handleTouchStart, {passive:false});
  canvas.addEventListener("touchmove", handleTouchMove, {passive:false});
  canvas.addEventListener("touchend", handleTouchEnd, {passive:false});
  canvas.addEventListener("touchcancel", handleTouchEnd, {passive:false});
}catch(e){}
// 현재 조작 모드의 '의도' — 프레임마다 소비. 탭 래치(xTap 등)는 읽는 순간 소모(1프레임 에지).
function getLocalIntent(){
  const m=controlMode();
  if(m==="mouse"){
    let mx=0,my=0;
    if(keysDown.has("KeyW")||keysDown.has("ArrowUp")) my-=1;
    if(keysDown.has("KeyS")||keysDown.has("ArrowDown")) my+=1;
    if(keysDown.has("KeyA")||keysDown.has("ArrowLeft")) mx-=1;
    if(keysDown.has("KeyD")||keysDown.has("ArrowRight")) mx+=1;
    return { mx:mx, my:my, aim:null, aimPoint:logicalToWorld({x:MOUSE.x,y:MOUSE.y}),   // P4: 줌아웃 맵에서도 커서=월드 좌표
      fire:MOUSE.down||keysDown.has("KeyZ"), special:MOUSE.rdown, ult:keysDown.has("Space"), reload:false, pick:-1 };
  }
  if(m==="touch"){
    const av=TOUCH.aimVec, al=Math.hypot(av.x,av.y);
    const aiming=TOUCH.aiming && al>0.25;   // 데드존 — 살짝 닿기만 하면 발사 안 됨
    const sp=TOUCH.xTap, ul=TOUCH.cTap, rl=TOUCH.reloadTap, pk=TOUCH.pickTap;
    TOUCH.xTap=false; TOUCH.cTap=false; TOUCH.reloadTap=false; TOUCH.pickTap=-1;
    return { mx:TOUCH.moveVec.x, my:TOUCH.moveVec.y,
      aim: aiming?Math.atan2(av.y,av.x):null, aimPoint:null,
      fire:aiming, special:sp, ult:ul, reload:rl, pick:pk };   // 우 스틱 = 조준+연사(브롤식 변형 — 홀드 중 발사)
  }
  // 키보드(기본): 기존 동작 그대로 — X/C/R은 keydown 경로가 담당하므로 여기선 false
  let mx=0,my=0;
  if(keysDown.has("ArrowUp")) my-=1;
  if(keysDown.has("ArrowDown")) my+=1;
  if(keysDown.has("ArrowLeft")) mx-=1;
  if(keysDown.has("ArrowRight")) mx+=1;
  return { mx:mx, my:my, aim:null, aimPoint:null, fire:keysDown.has("KeyZ"), special:false, ult:false, reload:false, pick:-1 };
}
// 내 위치 기준 커서 조준각(로컬/온라인 예측 위치 사용 — 온라인 패킷 전송용)
function myAimAngle(it){
  if(typeof it.aim==="number") return it.aim;
  if(!it.aimPoint) return null;
  let px=null, py=null;
  if(gameState===STATE.PLAYING && player){ px=player.x; py=player.y; }
  else if(isTeamOnline()){ const f=(OnlineManager.role==="host")?tFighters[OnlineManager.mySlot]:tPredict; if(f){ px=f.x; py=f.y; } }
  else { const f=(OnlineManager.role==="host")?onlineFighters.host:onlinePredict; if(f){ px=f.x; py=f.y; } }
  if(px===null) return null;
  return Math.atan2(it.aimPoint.y-py, it.aimPoint.x-px);
}

function showToast(text){ toastText = text; toastTimer = 1.8; }

function handleKeyPress(code){
  // EDIT-TEST-1: 에디터 미리하기 중엔 Esc/Enter로 에디터 복귀(맵 그대로)
  if(edTest && (gameState===STATE.PLAYING||gameState===STATE.PAUSED||gameState===STATE.OVER)){
    if(code==="Escape"){ edEndTest(); return; }
    if(gameState===STATE.OVER){
      if(code==="KeyR"){ edStartTest(); return; }                               // 다시 테스트
      if(code==="Enter"||code==="NumpadEnter"||code==="Space"){ edEndTest(); return; }
    }
    // 그 외 키(이동·공격·P 일시정지 등)는 아래 일반 처리로
  }
  // 나가기 확인 오버레이가 떠 있으면 Y/N만 처리(다른 입력 무시)
  if(confirmLeave){
    if(code==="KeyY"){ confirmLeave=false; doLeaveToStart(); return; }
    if(code==="KeyN"||code==="Escape"){ confirmLeave=false; return; }
    return;
  }
  if(gameState === STATE.ASSET_CHECK){ if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START; return; }
  if(gameState === STATE.PROFILE){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="KeyN") changeNickname();
    else if(code==="KeyI"){ collectionIndex=0; gameState=STATE.COLLECTION; }
    return;
  }
  if(gameState === STATE.COLLECTION){
    if(code==="Escape"||code==="Enter"||code==="NumpadEnter") gameState=STATE.START;
    else if(code==="ArrowLeft"){ collectionIndex=Math.max(0,collectionIndex-1); }
    else if(code==="ArrowRight"){ collectionIndex=collectionIndex+1; }
    else if(code==="KeyT"){ collectionTab=(collectionTab==="char")?"tool":"char"; collectionIndex=0; }
    return;
  }
  if(gameState === STATE.SPLASH){ if(code==="Enter"||code==="NumpadEnter"||code==="Space"||code==="Escape"){ goToLogin(); } return; }
  if(gameState === STATE.LOGIN){ handleLoginKey(code); return; }
  if(gameState === STATE.ADMIN_LOGIN){ handleAdminLoginKey(code); return; }
  if(gameState === STATE.ADMIN){ handleAdminKey(code); return; }
  if(gameState === STATE.BALANCE){ handleBalanceKey(code); return; }   // BALANCE-1: 교사용 밸런스 콘솔
  if(gameState === STATE.START){ handleStartKey(code); return; }
  if(gameState === STATE.PF_SELECT){ handlePfSelectKey(code); return; }   // GENRE-EXPAND-1 §3
  if(gameState === STATE.PLATFORMER){ handlePlatformerKey(code); return; }
  if(gameState === STATE.RPG){ handleRpgKey(code); return; }              // RPG모드 §1.1
  if(gameState === STATE.RPG_REVIEW){ handleRpgReviewKey(code); return; }  // RPG모드 §7.4: 교사 콘텐츠 승인
  if(gameState === STATE.EDITOR){ handleEditorKey(code); return; }        // OVERNIGHT-1: 맵공방
  if(gameState === STATE.MAP_REVIEW){ handleMapReviewKey(code); return; } // OVERNIGHT-1: 교사 맵 승인
  if(gameState === STATE.SHOP){ handleShopKey(code); return; }
  if(gameState === STATE.ONLINE_MENU){ handleOnlineMenuKey(code); return; }
  if(gameState === STATE.ONLINE_LOBBY){ handleOnlineLobbyKey(code); return; }
  if(gameState === STATE.ONLINE_PLAYING){ handleOnlinePlayKey(code); return; }
  if(gameState === STATE.ONLINE_OVER){
    // 방장은 R/Enter로 같은 방 재시작, 참가자는 방장 대기. Esc는 나가기 확인.
    if(code==="KeyR"||code==="Enter"||code==="NumpadEnter"){
      if(OnlineManager.role==="host") onlineRematch();
      else showToast("방장이 다시 시작하면 함께 시작돼요");
      return;
    }
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PLAYING){
    // Z=기본공격(연사: updatePlayer) · X=특수기술 · C=궁극기 — X/C는 눌림 순간 1회(keydown !repeat = edge)
    // (기존 X/Space 궁극기 → C로 이동. Space 별칭은 제거 — 조작 통일: 방향키·Z·X·C·R)
    if(code==="KeyX"){ useCharacterSpecial(); return; }
    if(code==="KeyC"){ useCharacterSuper(); return; }
    if(code==="KeyP"){ setPaused(true); return; }
    if(code==="KeyR"){ reloadWeaponManual(); return; }   // 장전(결과화면 R 재시작과 분리: PLAYING에서만 장전)
    if(code==="Escape"){ confirmLeave=true; return; }
    return;
  }
  if(gameState === STATE.PAUSED){
    if(code==="KeyP"){ setPaused(false); return; }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
  if(gameState === STATE.OVER){
    if(code==="ArrowLeft"){ resultButtonIndex=0; return; }
    if(code==="ArrowRight"){ resultButtonIndex=1; return; }
    if(code==="KeyR"){ startGame(); return; }
    if(code==="Enter"||code==="NumpadEnter"||code==="Space"){
      if(resultButtonIndex===0) startGame(); else goToStartScreen();
      return;
    }
    if(code==="Escape"){ goToStartScreen(); return; }
    return;
  }
}

function handleStartKey(code){
  if(settingsOpen){ handleSettingsKey(code); return; }
  if(code==="ArrowUp"){ menuIndex=(menuIndex+MENU_ROWS-1)%MENU_ROWS; return; }
  if(code==="ArrowDown"){ menuIndex=(menuIndex+1)%MENU_ROWS; return; }
  if(code==="ArrowLeft"){ changeMenuValue(menuIndex,-1); return; }
  if(code==="ArrowRight"){ changeMenuValue(menuIndex,+1); return; }
  if(code==="Enter"||code==="NumpadEnter"){ activateMenuRow(menuIndex); return; }
  if(code==="Escape"){ openSettings(); return; }              // ⚙ 설정(별명·로그아웃·교사용)
  if(code==="KeyC"){ cycleCharacter(+1); return; }
  // W(무기 변경) 제거: 무기는 캐릭터 고정. S(상점) 제거: 상점 준비 중(SHOP_ENABLED=false).
  if(code==="KeyD"){ cycleDifficulty(+1); return; }
  if(code==="KeyM"){ cycleMap(+1); return; }
  if(code==="KeyT"){ cycleMode(+1); return; }
  if(code==="KeyN"){ changeNickname(); return; }
  if(code==="KeyO"){ openOnlineMenu(); return; }
  if(code==="KeyU"){ gameState=STATE.PROFILE; return; }       // 개인창(내 정보)
  if(code==="KeyI"){ collectionIndex=0; gameState=STATE.COLLECTION; return; } // 수집창
  if(code==="KeyQ"){ doLogout(); return; }                    // 로그아웃(단축키 유지 · 메뉴는 설정 안)
}

    else if(ch==="M"){ monsters.push({x:(c+0.5)*56, y:(r+1)*56, dir:-1, dead:false, w:40, h:40}); rows[r][c]="."; }
    else if(ch==="o") starsTotal++;
  }
  PF={ level:level, test:!!opts.test, grid:rows, cols:cols, rows:rows.length,
       p:{ x:sx*56, y:sy*56+56-0.01, vx:0, vy:0, onGround:false, coyote:0, buffer:0, facing:1,

function pfDie(){

  p.gun=false; p.starT=0; p.featherT=0; p.magnetT=0; p.inv=0; PF.shots.length=0;   // P1.5: 죽으면 파워업 소실

/* P1.5: 피해 단계(마리오식) — 무적/별 중엔 무시, 파워업이 있으면 죽는 대신 전부 상실+짧은 무적 */
function pfHurt(){
  const p=PF.p;
  if(p.inv>0 || p.starT>0) return;
  if(p.gun || p.featherT>0 || p.magnetT>0){
    p.gun=false; p.featherT=0; p.magnetT=0; p.inv=PF_CONST.HURT_INV;
    playSfx("hit"); showToast("💢 파워업을 잃었다!");
    return;
  }
  pfDie();
}
function pfShoot(){   // P1.5 ⭐총: X키 — 자기 무기 색의 수평탄(몬스터 원거리 처치·부서지는 블록 파괴)
  const p=PF.p;
  if(!PF || PF.cleared || !p.gun || p.gunCd>0) return;
  p.gunCd=PF_CONST.GUN_CD;
  PF.shots.push({ x:p.x+p.facing*20, y:p.y-PF_CONST.PH*0.55, dir:p.facing, traveled:0, alive:true });
  playSfx("shoot");
}
function pfClear(){
  if(PF.cleared) return;
  PF.cleared=true; PF.clearT=0;
  playSfx("clear");
  if(PF.test) return;                              // 에디터 테스트플레이: 보상·기록 없음
  const best=pfLoadBest(), id=PF.level.id, prev=best[id];
  const rec={ time:Math.round(PF.time*100)/100, stars:PF.stars, total:PF.starsTotal, clears:((prev&&prev.clears)||0)+1 };
  // §4.1 보상: 첫 클리어 +40G·경험치30 / 기록 갱신 +10G
  // BIG-BATCH-2 P1: 별조각 연계 — 처음 모은 별조각 1개당 +2G(반복 파밍 방지: '최고 기록 초과분'만)
  if(!prev){
    const zoneBonus=(PF.level.camp!==undefined && PF.level.camp%5===4)?30:0;   // P1.5: 구역 끝(5·10·15·20) 첫 클리어 +30G
    const sg=PF.stars*2;
    addGold(40+sg+zoneBonus); addExp(30);
    showToast("🦘 첫 클리어! +"+(40+sg+zoneBonus)+"G · 경험치 +30"+(zoneBonus?" · 구역 완주 🎉":""));
    best[id]=rec;
  } else {
    rec.time=Math.min(rec.time, prev.time);
    rec.stars=Math.max(rec.stars, prev.stars||0);
    if(Math.round(PF.time*100)/100 < prev.time){ addGold(10); showToast("⏱ 기록 갱신! +10G ("+prev.time.toFixed(2)+"→"+PF.time.toFixed(2)+"초)"); rec.time=Math.round(PF.time*100)/100; }
    if(PF.stars > (prev.stars||0)){ const sg=(PF.stars-(prev.stars||0))*2; addGold(sg); showToast("⭐ 새 별조각 +"+sg+"G"); }
    best[id]=rec;
  }
  pfSaveBest(best);
  PF.bestView=best[id];   // PERF-2: 클리어 오버레이가 프레임마다 localStorage 파싱하지 않게 스냅샷
  _pfSel=null;            // PERF-2: 선택 화면 캐시 무효화(기록·해금 갱신)
  try{ saveProfile(); }catch(e){}
}
function pfJumpPressed(){   // keydown 에지(Z/Space) 또는 터치 점프 버튼
  if(!PF || PF.cleared) return;
  PF.p.buffer=PF_CONST.BUFFER;
  // ↓+점프 = 원웨이 통과 하강
  if((keysDown.has("ArrowDown")||PF.touch.dn) && PF.p.onGround){
    const p=PF.p, r=Math.floor((p.y+1)/56);
    const c0=Math.floor((p.x-PF_CONST.PW/2)/56), c1=Math.floor((p.x+PF_CONST.PW/2)/56);
    let oneway=true;
    for(let c=c0;c<=c1;c++){ const ch=pfTileAt(c,r); if(ch==="#"){ oneway=false; break; } }
    if(oneway){ p.dropT=0.25; p.onGround=false; p.buffer=0; return; }
  }
}
function pfUpdate(dt){
  if(!PF) return;
  const C=PF_CONST, p=PF.p;
  if(PF.cleared){ PF.clearT+=dt; return; }
  PF.time+=dt;
  // ── 입력 ──
  let dir=0;
  if(keysDown.has("ArrowLeft")||keysDown.has("KeyA")||PF.touch.l) dir-=1;
  if(keysDown.has("ArrowRight")||keysDown.has("KeyD")||PF.touch.r) dir+=1;
  const jumpHeld=keysDown.has("KeyZ")||keysDown.has("Space")||PF.touch.j;
  // ── 수평 ── (P1.5: 얼음 위에선 가속·마찰 급감 = 미끄럼)
  let onIce=false;
  if(p.onGround){ const rI=Math.floor((p.y+2)/56), cI=Math.floor(p.x/56); onIce=(pfTileAt(cI,rI)==="i"); }
  const acc=p.onGround?(onIce?C.ICE_ACC:C.ACC_G):C.ACC_A, fric=p.onGround?(onIce?C.ICE_FRIC:C.FRIC_G):C.FRIC_A;
  if(dir!==0){ p.vx+=dir*acc*dt; p.vx=clamp(p.vx,-C.MOVE_SPD,C.MOVE_SPD); p.facing=dir; }
  else { const s=Math.sign(p.vx); p.vx-=s*fric*dt; if(Math.sign(p.vx)!==s) p.vx=0; }
  // x 이동 + 충돌(솔리드만)
  p.x+=p.vx*dt;
  {
    const hw=C.PW/2;
    const r0=Math.floor((p.y-C.PH+2)/56), r1=Math.floor((p.y-2)/56);
    if(p.vx>0){ const c=Math.floor((p.x+hw)/56);
      for(let r=r0;r<=r1;r++) if(pfSolid(pfTileAt(c,r))){ p.x=c*56-hw-0.01; p.vx=0; break; } }
    else if(p.vx<0){ const c=Math.floor((p.x-hw)/56);
      for(let r=r0;r<=r1;r++) if(pfSolid(pfTileAt(c,r))){ p.x=(c+1)*56+hw+0.01; p.vx=0; break; } }
    p.x=clamp(p.x, hw+0.01, PF.cols*56-hw-0.01);
  }
  // ── 수직 ──
  const rising=p.vy<0;
  const g=(rising&&jumpHeld)?C.GRAVITY*C.HOLD_MUL:C.GRAVITY;
  p.vy=Math.min(C.TERM_VY, p.vy+g*dt);
  if(!jumpHeld && p.vy<0 && !p.cutDone){ p.vy*=C.JUMP_CUT; p.cutDone=true; }   // 가변 점프(릴리즈 컷 1회)
  const prevFeet=p.y;
  p.y+=p.vy*dt;
  if(p.dropT>0) p.dropT-=dt;
  p.onGround=false;
  {
    const hw=C.PW/2-2;
    const c0=Math.floor((p.x-hw)/56), c1=Math.floor((p.x+hw)/56);
    if(p.vy>=0){   // 하강: 솔리드 + 원웨이(위→아래 교차 시만·드랍 중 제외)
      const r=Math.floor(p.y/56);
      for(let c=c0;c<=c1;c++){
        const ch=pfTileAt(c,r);
        const top=r*56;
        if(pfSolid(ch) || (ch==="-" && p.dropT<=0 && prevFeet<=top+1)){
          if(p.y>=top){ p.y=top-0.01; p.vy=0; p.onGround=true; p.coyote=C.COYOTE; p.cutDone=false; PF.camGY=p.y;
            if(ch==="b"){ const bk=r+","+c; if(PF.crumble[bk]===undefined) PF.crumble[bk]=0.45; }   // P1.5: 밟으면 0.45s 후 붕괴
            break; }
        }
      }
    } else {       // 상승: 머리 박기(솔리드만) — P1.5: 부서지는 블록(b)은 아래에서 박으면 파괴
      const r=Math.floor((p.y-C.PH)/56);
      for(let c=c0;c<=c1;c++){ const hch=pfTileAt(c,r);
        if(pfSolid(hch)){
          if(hch==="b"){ PF.grid[r][c]="."; playSfx("break"); }
          p.y=(r+1)*56+C.PH+0.01; p.vy=0; break; }
      }
    }
  }
  if(!p.onGround) p.coyote=Math.max(0,p.coyote-dt);
  // 점프(버퍼+코요테) — P1.5: 깃털 파워업 = 점프력 증가
  if(p.buffer>0){ p.buffer-=dt;
    if(p.onGround||p.coyote>0){ p.vy=C.JUMP_V*(p.featherT>0?C.FEATHER_MUL:1); p.onGround=false; p.coyote=0; p.buffer=0; p.cutDone=false; playSfx("jump"); }
  }
  // ── 타일 상호작용(몸 중심·발 기준) ──
  {
    const cc=Math.floor(p.x/56), rF=Math.floor((p.y-4)/56), rM=Math.floor((p.y-C.PH/2)/56);
    const cells=[[cc,rF],[cc,rM]];
    for(const [c,r] of cells){
      const ch=pfTileAt(c,r);
      if(ch==="S"){ if(p.starT>0||p.inv>0){} else { pfHurt(); if(PF.p.inv<=0){ return; } } }   // P1.5: 가시 = 피해 단계 적용
      else if(ch==="J" && p.vy>=0){ p.vy=C.SPRING_V; p.cutDone=true; playSfx("spring"); }
      else if(ch==="o"){ PF.grid[r][c]="."; PF.stars++; playSfx("buff"); }
      else if(ch==="F"){ if(PF.checkpoint.x!==(c+0.5)*56){ PF.checkpoint={x:(c+0.5)*56, y:r*56+56-0.01}; playSfx("checkpoint"); showToast("🚩 체크포인트!"); } }
      else if(ch==="G"){ pfClear(); return; }
      else if(ch==="P"){ PF.grid[r][c]="."; p.gun=true; playSfx("powerup"); showToast("⭐ 총 파워업! X로 발사"); }
      else if(ch==="!"){ PF.grid[r][c]="."; p.starT=C.STAR_T; playSfx("powerup"); showToast("🌟 무적! ("+C.STAR_T+"초)"); }
      else if(ch==="w"){ PF.grid[r][c]="."; p.featherT=8; playSfx("powerup"); showToast("🪶 깃털! 점프력 UP (8초)"); }
      else if(ch==="m"){ PF.grid[r][c]="."; p.magnetT=8; playSfx("powerup"); showToast("🧲 자석! 별조각이 모여요 (8초)"); }
    }
    // P1.5 자석: 주변 별조각 자동 수집
    if(p.magnetT>0){
      const rad=Math.ceil(C.MAGNET_R/56);
      for(let r=Math.max(0,rF-rad); r<=Math.min(PF.rows-1,rF+rad); r++)
        for(let c=Math.max(0,cc-rad); c<=Math.min(PF.cols-1,cc+rad); c++){
          if(PF.grid[r][c]!=="o") continue;
          if(dist(p.x, p.y-C.PH/2, (c+0.5)*56, (r+0.5)*56)>C.MAGNET_R) continue;
          PF.grid[r][c]="."; PF.stars++; playSfx("buff");
        }
    }
  }
  // ── P1.5 부서지는 블록 붕괴 타이머 ──
  for(const bk in PF.crumble){
    PF.crumble[bk]-=dt;
    if(PF.crumble[bk]<=0){
      const [br,bc]=bk.split(",").map(Number);
      if(PF.grid[br] && PF.grid[br][bc]==="b"){ PF.grid[br][bc]="."; playSfx("break"); }
      delete PF.crumble[bk];
    }
  }
  // ── P1.5 파워업 타이머 + 발사체 ──
  if(p.gunCd>0) p.gunCd-=dt;
  if(p.starT>0) p.starT-=dt;
  if(p.featherT>0) p.featherT-=dt;
  if(p.magnetT>0) p.magnetT-=dt;
  if(p.inv>0) p.inv-=dt;
  for(const s of PF.shots){
    if(!s.alive) continue;
    const step=C.GUN_SPD*dt;
    s.x+=s.dir*step; s.traveled+=step;
    if(s.traveled>C.GUN_RANGE){ s.alive=false; continue; }
    const sc=Math.floor(s.x/56), sr=Math.floor(s.y/56), sch=pfTileAt(sc,sr);
    if(pfSolid(sch)){
      if(sch==="b"){ PF.grid[sr][sc]="."; playSfx("break"); }   // 총알로도 블록 파괴
      s.alive=false; continue;
    }
    for(const m of PF.monsters){
      if(m.dead) continue;
      if(s.x>m.x-m.w/2 && s.x<m.x+m.w/2 && s.y>m.y-m.h && s.y<m.y){ m.dead=true; s.alive=false; playSfx("kill"); break; }
    }
  }
  if(PF.shots.length>24) PF.shots=PF.shots.filter(s=>s.alive);
  // ── 몬스터 ──
  for(const m of PF.monsters){
    if(m.dead) continue;
    const nx=m.x+m.dir*C.MON_SPD*dt;
    const fc=Math.floor((nx+m.dir*m.w/2)/56), fr=Math.floor((m.y-2)/56), br=Math.floor((m.y+2)/56);
    const wallAhead=pfSolid(pfTileAt(fc, fr));
    const groundAhead=pfSolid(pfTileAt(fc, br)) || pfTileAt(fc,br)==="-";
    if(wallAhead || !groundAhead) m.dir*=-1; else m.x=nx;
    // 플레이어 접촉
    const px0=p.x-C.PW/2, px1=p.x+C.PW/2, py0=p.y-C.PH, py1=p.y;
    const mx0=m.x-m.w/2, mx1=m.x+m.w/2, my0=m.y-m.h, my1=m.y;
    if(px1>mx0 && px0<mx1 && py1>my0 && py0<my1){
      if(p.starT>0){ m.dead=true; playSfx("kill"); }                                                          // P1.5 🌟무적: 접촉 처치
      else if(p.vy>0 && (py1-my0) < m.h*0.25+8){ m.dead=true; p.vy=C.STOMP_V; p.cutDone=true; playSfx("stomp"); }   // 밟기
      else if(p.inv>0){}                                                                                      // 피격 무적 중
      else { pfHurt(); if(PF.p.inv<=0) return; }                                                              // P1.5: 파워업 있으면 상실로 대체
    }
  }
  // ── 낙사 ──
  if(p.y > (PF.rows+2)*56){ pfDie(); return; }
  pfCamUpdate(dt);
}
function pfCamSnap(){
  const mw=PF.cols*56, mh=PF.rows*56;
  PF.camX=clamp(PF.p.x+(PF.lookX||0)-LOGW/2, 0, Math.max(0,mw-LOGW));
  PF.camY=clamp(PF.camGY-LOGH*0.62, Math.min(0,mh-LOGH), Math.max(0,mh-LOGH));
}
function pfCamUpdate(dt){
  const C=PF_CONST, p=PF.p, mw=PF.cols*56, mh=PF.rows*56;
  // x: lookahead — 방향을 LOOK_HOLD초 유지해야 목표 반전 + 오프셋은 LOOK_SPD 상한으로만 이동(뒤돌기 급점프 멀미 제거)
  if(p.facing===PF.lookDir) PF.faceT+=dt;
  else { PF.lookDir=p.facing; PF.faceT=0; }
  if(PF.faceT>=C.LOOK_HOLD) PF.lookTarget=PF.lookDir*C.LOOK;
  const dl=PF.lookTarget-PF.lookX, lstep=C.LOOK_SPD*dt;
  PF.lookX+=clamp(dl,-lstep,lstep);
  const want=clamp(p.x+PF.lookX-LOGW/2, 0, Math.max(0,mw-LOGW));
  const dx=want-PF.camX;
  if(Math.abs(dx)>60) PF.camX+=(dx-Math.sign(dx)*60);
  else PF.camX+=dx*Math.min(1,dt*4);
  // y: 착지 y 기준 + lerp(점프 출렁임 방지 — 착지 층 바뀔 때만 이동)
  const wy=clamp(PF.camGY-LOGH*0.62, Math.min(0,mh-LOGH), Math.max(0,mh-LOGH));
  PF.camY+=(wy-PF.camY)*Math.min(1,dt*8);
}
const PF_ZONE_BG=["#1a2352","#101430","#241a30","#0a0d20"];   // P1.5 구역 테마: 초원·동굴·요새·심연

    } else if(ch==="S"){

      for(let k=0;k<4;k++){ ctx.beginPath(); ctx.moveTo(x+k*14,y+56); ctx.lineTo(x+k*14+7,y+30); ctx.lineTo(x+k*14+14,y+56); ctx.closePath(); ctx.fill(); }

      ctx.fillStyle="#ffd23f"; roundRect(x+8,y+40,40,12,5); ctx.fill();

    } else if(ch==="o"){
      const p2=0.5+0.5*Math.sin(uiTime*4+c);

    } else if(ch==="F"){

    } else if(ch==="G"){
      ctx.fillStyle="rgba(255,225,80,0.25)"; roundRect(x+4,y+4,48,48,10); ctx.fill();

    else { ctx.fillStyle="#c58bff"; ctx.beginPath(); ctx.arc(0,-m.h/2,m.w/2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle="#3a2a55"; ctx.fillRect(-8,-m.h/2-4,4,6); ctx.fillRect(4,-m.h/2-4,4,6); }
    ctx.restore();
  }
  // P1.5 ⭐총 발사체
  for(const s of PF.shots){

      ctx.fillStyle="rgba(255,230,102,"+(0.18+0.18*sp)+")";

    const drew=drawCharacterSprite(selectedCharacterId, 20, p.facing>0?0:Math.PI,

  {

/* P1.5: 캠페인 잠금 — 스테이지 n은 이전 스테이지 클리어 시 해금(베스트 기록에서 파생 — 별도 저장 불필요) */
function pfUnlockedCount(){
  const best=pfLoadBest();
  let n=1;
  for(let i=0;i<PF_LEVELS.length;i++){ if(best[PF_LEVELS[i].id]) n=i+2; }
  return Math.min(n, PF_LEVELS.length);
}
function pfLevelLocked(lv){
  if(lv.camp===undefined) return false;                    // 학생 맵은 항상 열림
  return lv.camp >= pfUnlockedCount();
}
function drawPfSelect(){
  dimScreen(0.7);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#7dffb0"; ctx.font="bold 36px 'Malgun Gothic',sans-serif"; ctx.fillText("🦘 별빛 점프 원정", LOGW/2, 78);
  ctx.fillStyle="#8893bb"; ctx.font="14px 'Malgun Gothic',sans-serif";

  if(!_pfSel) pfSelRefresh();   // PERF-2: 캐시 사용(진입·클리어 시 갱신)
  const list=_pfSel.list, best=_pfSel.best, unlocked=_pfSel.unlocked;
  if(pfSelIdx>=list.length) pfSelIdx=0;
  const SHOW=9, start=clamp(pfSelIdx-4, 0, Math.max(0,list.length-SHOW));
  let y=142;
  if(start>0){ ctx.fillStyle="#8893bb"; ctx.fillText("▲ 위로 "+start+"개", LOGW/2, y); }
  y+=18;
  for(let i=start;i<list.length && i<start+SHOW;i++){
    const lv=list[i], sel=(i===pfSelIdx), b=best[lv.id], locked=(lv.camp!==undefined && lv.camp>=unlocked);
    const camp=(lv.camp!==undefined);
    const label = locked
      ? "🔒 "+(lv.camp+1)+". ??? — 이전 스테이지를 클리어하면 열려요"
      : (camp?((lv.camp+1)+". "):"🛠 ")+lv.name+"  ·  ✍"+(lv.author||"별빛")
        +(b?("   ⏱ "+b.time.toFixed(2)+"초 · ⭐"+(b.stars||0)+"/"+(b.total||"?")+" · ✅"+(b.clears||1)+"회"):"   (미클리어)");
    drawButton(label, LOGW/2, y+21, 700, 42, sel, (function(idx){ return function(){   // TOUCH-UI-1: 스테이지 선택
      pfSelIdx=idx; const L=_pfSel.list[idx]; if(pfLevelLocked(L)){ showToast("🔒 이전 스테이지를 먼저 클리어해요!"); return; } pfStartLevel(L);
    }; })(i));
    y+=50;
  }
  if(start+SHOW<list.length){ ctx.fillStyle="#8893bb"; ctx.fillText("▼ 아래로 "+(list.length-start-SHOW)+"개", LOGW/2, y+8); }
  ctx.fillStyle="#aab4e0"; ctx.font="15px 'Malgun Gothic',sans-serif";
  ctx.fillText("↑↓ 선택 · Enter 시작 · Esc 로비   (진행도 "+Math.min(unlocked-1,PF_LEVELS.length)+"/"+PF_LEVELS.length+" 클리어)", LOGW/2, LOGH-28);
  ctx.restore();
}
function handlePfSelectKey(code){
  if(!_pfSel) pfSelRefresh();
  const list=_pfSel.list;   // PERF-2: 키 반복 입력마다 스토어 파싱 방지
  if(code==="Escape"){ goToStartScreen(); return; }
  if(code==="ArrowUp"){ pfSelIdx=(pfSelIdx+list.length-1)%list.length; return; }
  if(code==="ArrowDown"){ pfSelIdx=(pfSelIdx+1)%list.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){
    const lv=list[pfSelIdx];
    if(pfLevelLocked(lv)){ showToast("🔒 이전 스테이지를 먼저 클리어해요!"); return; }
    pfStartLevel(lv); return;
  }
}
function handlePlatformerKey(code){
  if(!PF){ gameState=STATE.START; return; }
  if(PF.cleared){
    if(PF.test){ if(code==="Enter"||code==="NumpadEnter"||code==="Escape"){ if(ED) ED.testCleared=true; gameState=STATE.EDITOR; PF=null; } return; }
    if(code==="Enter"||code==="NumpadEnter"){
      // P1.5 캠페인 연속 진행: 클리어 → Enter = 바로 다음 스테이지(선택 화면 복귀 없음)
      if(PF.level.camp!==undefined && PF.level.camp+1<PF_LEVELS.length){ pfStartLevel(PF_LEVELS[PF.level.camp+1]); return; }
      pfStartLevel(PF.level); return;
    }
    if(code==="KeyR"){ pfStartLevel(PF.level); return; }   // 다시 도전
    if(code==="Escape"){ PF=null; pfOpenSelect(); return; }
    return;
  }
  if(code==="KeyZ"||code==="Space"){ pfJumpPressed(); return; }
  if(code==="KeyX"){ pfShoot(); return; }                     // P1.5 ⭐총 발사
  if(code==="KeyR"){ pfDie(); return; }                       // 깃발부터 재시작(사망 카운트 포함)
  if(code==="Escape"){
    if(PF.test){ gameState=STATE.EDITOR; PF=null; return; }   // 테스트 중단(클리어 아님)
    PF=null; pfOpenSelect(); return;
  }
}
// 터치(§3.6): 좌하단 ◀▶ · 우하단 점프 — 플랫포머 상태에서 터치 핸들러가 위임
function pfTouchAt(p, on){
  if(!PF) return false;
  if(dist(p.x,p.y,90,LOGH-90)<60){ PF.touch.l=on; return true; }
  if(dist(p.x,p.y,200,LOGH-90)<60){ PF.touch.r=on; return true; }
  if(dist(p.x,p.y,LOGW-100,LOGH-90)<70){ if(on&&!PF.touch.j) pfJumpPressed(); PF.touch.j=on; return true; }
  if(PF.p.gun && dist(p.x,p.y,LOGW-210,LOGH-70)<50){ if(on) pfShoot(); return true; }   // P1.5 ⭐발사(총 보유 시)
  if(p.y>LOGH*0.55 && p.x<LOGW/2){ PF.touch.dn=on; return true; }   // 하단 좌측 넓게 = ↓(원웨이 하강 보조)
  return false;
}
