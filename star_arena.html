function applyDamage(target, dmg, fromTeam, fromId, hx, hy){
  if(!canBeHit(target)) return 0;
  if(target.team===fromTeam) return 0; // 아군 오사 방지
  dmg=incomingDamage(target, dmg);     // 방패(별골렘X 흡수막)/질주 후반(시고니C) 피해 감소
  if(dmg<=0){ target.hitFlash=0.1; target.lastCombatTime=matchElapsed; spawnHit(hx,hy,"#9fd0ff"); return 0; }   // 흡수막이 전부 막음
  target.hp-=dmg;
  target.lastCombatTime=matchElapsed;
  target.hitFlash=0.15;
  spawnDamageNumber(target.x, target.y-target.r-8, Math.round(dmg), target.team==="player"?"#ff7a7a":"#ffe066");
  if(fromId===player.id && target.team==="enemy") stats.damageDealt+=dmg;
  if(target.isPlayer) stats.damageTaken+=dmg;
  if(target.hp<=0){ target.hp=0; handleDeath(target, fromId); }
  return dmg;
}

function handleDeath(f, killerId){
  if(f.dead) return;
  f.dead=true; f.respawnTimer=(MATCH&&MATCH.respawnDelay)||GAME_CONFIG.respawnDelay; f.invincibleTimer=0;
  spawnDeathBurst(f);
  // GAMEPLAY-1 1D 성장 오브: 섬멸전에서 처치당한 파이터가 사망 지점에 1개 드랍(3종 순환)
  if(matchRuleId()==="tdm" && !f.isBoss)
    BUFFORBS.push({ x:f.x, y:f.y, type:GROWTH.types[buffOrbCycle++ % GROWTH.types.length] });
  // GAMEPLAY-1 stargrab: 죽으면 보유한 별 전부 드랍(6초 후 소멸)
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){
    for(let i=0;i<f.stars;i++) RULE.stars.push({ x:f.x+rand(-26,26), y:f.y+rand(-26,26), ttl:RULE_CONFIG.stargrab.dropTtl });
    f.stars=0;
  }
  if(f.team==="enemy"){
    playerTeamScore++;
    if(killerId===player.id){
      stats.kills++;
      // BIG-BATCH-2 P1: 킬 스트릭 하이라이트(죽지 않고 연속 처치 — 3/5/7에서 연출)
      matchStreak++;
      if(matchStreak===3||matchStreak===5||matchStreak===7){
        showToast("🔥 "+matchStreak+"연속 처치!");
        effects.push({kind:"superwave", x:player.x, y:player.y, t:0, life:0.5, radius:80});
      }
    }
    if(f.isBoss){
      bossActive=false; bossDefeated=true; stats.bossKilled=true;
      f.respawnTimer=Infinity;   // 격파된 보스는 다시 부활하지 않는다(보스전은 1회성 피날레)
      showToast("보스 격파! 보상 +"+REWARD_CONFIG.boss+"G");
    } else {
      enemiesDowned++;
      // 보스 난입은 섬멸전 전용(오브젝트 모드는 목표 중심 — 보스 없음)
      if(matchRuleId()==="tdm" && MATCH.mode.bossAllowed && !bossSpawned && enemiesDowned>=GAME_CONFIG.bossThreshold) bossPending=true;
    }
  } else {
    enemyTeamScore++;
    if(f.isPlayer){ stats.playerDeaths++; matchStreak=0; }   // BIG-BATCH-2 P1: 사망 = 스트릭 종료
  }
}

function respawn(f){
  let asBoss=false;
  if(f.team==="enemy" && f===enemy && bossPending && !bossSpawned){
    asBoss=true; bossPending=false; bossSpawned=true; bossActive=true;
  }
  f.dead=false;
  if(asBoss){
    f.isBoss=true; f.r=38; f.name="보스 크롬";
    f.maxHp=MATCH.bossMaxHp; f.color="#b3203a"; f.subColor="#ff6a86";
    spawnBossArrival();
  }
  f.hp=f.maxHp; f.displayHp=f.maxHp; f.cooldown=0;

  const base=f.team==="player"?MATCH.map.playerSpawn:MATCH.map.enemySpawn;
  let bx=(f.baseX!==undefined)?f.baseX:base.x;
  let by=(f.baseY!==undefined)?f.baseY:base.y;
  let pos=findClearSpawn(bx,by,f.r);
  for(const t of targetsOf(f.team)){
    if(!t.dead && dist(pos.x,pos.y,t.x,t.y) < f.r+t.r+50){
      pos=findClearSpawn(base.x, base.y+(base.y<LOGH/2?80:-80), f.r);
      break;
    }
  }
  f.x=pos.x; f.y=pos.y;
  f.invincibleTimer=GAME_CONFIG.invincibleTime;
  f.lastCombatTime=matchElapsed;
  f.ai.lastX=pos.x; f.ai.lastY=pos.y;
  spawnRespawnRing(f);
}

/* =======================================================================
   X 특수기술 / C 궁극기 — 학생 설계 6종 (코드 이펙트, 전용 에셋은 다음 회차)
   -----------------------------------------------------------------------
   모든 모드(로컬/1v1/3v3/PVE)가 같은 시전 함수(castSpecialFor/castUltimateFor)와
   장판(skillZones)을 쓰고, 모드 차이는 env 어댑터(대상 나열/피해/회복/탄환 생성)로 흡수한다.
   호스트만 판정(온라인). X/C 피해로는 C 게이지가 충전되지 않는다(noCharge).
   ======================================================================= */
function pushFighter(f, angle, distance){
  const steps=8;
  for(let i=0;i<steps;i++) moveEntity(f, Math.cos(angle)*distance/steps, Math.sin(angle)*distance/steps);
}

let skillZones=[];                 // 진행 중 장판(별똥별/가시/얼음/구급상자/블랙홀/빙결폭발)
function resetSkillZones(){ skillZones=[]; }

// ── env 어댑터: 로컬 ──
function envLocal(){
  return {
    foes(f){ return targetsOf(f.team).filter(canBeHit).map(t=>({e:t,key:t.id,isBoss:!!t.isBoss,isFighter:true})); },
    allies(f){ const list=(f.team==="player")?playerTeam():enemies; return list.filter(t=>!t.dead); },
    damage(f,o,dmg){ return applyDamage(o.e,dmg,f.team,f.id,o.e.x,o.e.y); },
    heal(t,amt){ t.hp=Math.min(t.maxHp,t.hp+amt); effects.push({kind:"respawn",x:t.x,y:t.y,t:0,life:0.4,color:"#4bd86b"}); },
    spawnBullet(f,spec){
      const b=makeSkillBullet(f,spec);
      b.team=f.team; b.ownerId=f.id; b.countsForPlayer=false;
      bullets.push(b);
    }
  };
}
// 스킬 탄환 공통 필드(X 비행기/C 7발/C 통통비행기). isSuper=true → 게이지 미충전.
function makeSkillBullet(f,spec){
  const a=(spec.angle!==undefined)?spec.angle:f.facing, mz=f.r+6;
  return { x:f.x+Math.cos(a)*mz, y:f.y+Math.sin(a)*mz, vx:Math.cos(a)*spec.speed, vy:Math.sin(a)*spec.speed,
    r:spec.radius, damage:spec.damage, color:spec.color, alive:true, traveled:0, maxRange:spec.range,
    isSuper:true, wid:spec.wid||null, age:0, life:spec.life,
    snipe:spec.snipe||0, stab:spec.stab||0,   // v1.21 패시브(달이 저격/시고니 기습)
    bounce:!!spec.bounce, maxBounce:spec.maxBounce||0, ultCid:spec.ultCid, ultMaxHits:spec.ultMaxHits };
}

// ── X 특수기술(쿨타임) — 시전 성공 시 true ──
function castSpecialFor(f, env){
  if(!f || f.dead || f.inactive || isFrozen(f)) return false;
  if(f.specialCd>0) return false;
  const cid=f.char.id, A=getAbility(cid);
  if(cid==="student_01"){                      // 럭키 X(v1.21b 스왑) — 별빛 일곱 발: 부채꼴 7발(대상당 최대 27)
    const ucid=newUltCastId(), spread=deg2rad(A.x.spreadDeg), n=A.x.count;
    for(let i=0;i<n;i++){
      const ang=f.facing-spread/2+spread*(i/(n-1));
      env.spawnBullet(f,{ angle:ang, speed:A.x.speed, radius:A.x.radius, damage:A.x.dmg, range:A.x.range,
        color:"#ffe066", wid:"tool_01", ultCid:ucid, ultMaxHits:Math.round(A.x.maxPerTarget/A.x.dmg) });
    }
  } else if(cid==="student_02"){               // 달이 X — 초장거리 대형 비행기(r26, 저격 패시브 적용)
    env.spawnBullet(f,{ speed:A.x.speed, radius:A.x.radius, damage:A.x.dmg, range:A.x.range, color:"#eef2f6", wid:"tool_02", snipe:A.passive.snipeDist });
  } else if(cid==="student_03"){               // 시고니 X — 반짝 가시 길(3초간 이동 경로에 가시, v1.21 최대 6개)
    f.thornTrail={ timer:A.x.trailTime, lastX:f.x, lastY:f.y, acc:0, count:0 };
  } else if(cid==="student_04"){               // 눈꽃 X — 서리 바닥(적 이동·공속 둔화 존)
    // OVERNIGHT-1 2-2: 존이 아레나 밖으로 펼쳐지던 버그 — 중심을 반경만큼 안쪽으로 clamp
    let tx=f.x+Math.cos(f.facing)*A.x.dist, ty=f.y+Math.sin(f.facing)*A.x.dist;
    tx=clamp(tx, ARENA.x+A.x.radius, ARENA.x+ARENA.w-A.x.radius); ty=clamp(ty, ARENA.y+A.x.radius, ARENA.y+ARENA.h-A.x.radius);
    skillZones.push({type:"ice", owner:f, x:tx, y:ty, timer:A.x.life, radius:A.x.radius, slowPct:A.x.slowPct, atkSlowMul:A.x.atkSlowMul, enterDmg:A.x.enterDmg, entered:{}});
  } else if(cid==="student_05"){               // 모아 X — 회복 오오라 기물(5초·반경140·팀원 초당10, 1인 1개)
    skillZones=skillZones.filter(z=>!(z.type==="healTotem" && z.owner===f));
    skillZones.push({type:"healTotem", owner:f, x:f.x, y:f.y, timer:A.x.life, radius:A.x.radius, hps:A.x.hps, acc:0});
  } else if(cid==="student_06"){               // 별골렘 X(GAMEPLAY-1) — 젤리 방패 생성: 흡수막 80(4초), 자신 + 조준한 아군 1명
    const giveShield=(t)=>{ t.shieldAbsorb=A.x.absorb; t.shieldAbsorbTimer=A.x.dur; spawnSuperWave(t.x,t.y,28); };
    giveShield(f);
    let best=null, bd=A.x.allyRange;                     // 바라보는 방향 ±(allyArcDeg/2) 안 가장 가까운 아군
    for(const a of env.allies(f)){
      if(a===f||a.dead||a.inactive) continue;
      const d=dist(f.x,f.y,a.x,a.y); if(d>bd) continue;
      let da=Math.atan2(a.y-f.y,a.x-f.x)-f.facing;
      while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
      if(Math.abs(da)<=deg2rad(A.x.allyArcDeg)/2){ bd=d; best=a; }
    }
    if(best) giveShield(best);
  }
  f.specialCd=A.x.cd*(f.upg&&f.upg.xcd?Math.max(0.7,1-0.06*f.upg.xcd):1);   // PVE 강화: 반짝 시계
  f.lastCombatTime=matchElapsed;
  if(f.invincibleTimer>0 && cid!=="student_06") f.invincibleTimer=0;   // 공격 행동 → 리스폰 무적 해제(방패는 방어라 유지)
  spawnSuperWave(f.x,f.y,34);
  return true;
}

// ── C 궁극기(게이지 100) — 시전 성공 시 true ──
function castUltimateFor(f, env, getGauge, setGauge){
  if(!f || f.dead || f.inactive || isFrozen(f)) return false;
  if(getGauge()<GAME_CONFIG.superCharge) return false;
  setGauge(0);
  const cid=f.char.id, A=getAbility(cid);
  if(cid==="student_01"){                      // 럭키 C(v1.21b 스왑) — 별똥별 일자 폭발: 내 앞 일직선 5연속(시전당 같은 대상 1회·45)
    const grp={};                              // 5개 폭발이 겹쳐도 같은 대상은 1번만(과잉 중첩 방지)
    for(let i=0;i<A.c.count;i++){
      const d=A.c.startDist+A.c.gap*i;
      let tx=f.x+Math.cos(f.facing)*d, ty=f.y+Math.sin(f.facing)*d;
      tx=clamp(tx, ARENA.x+24, ARENA.x+ARENA.w-24); ty=clamp(ty, ARENA.y+24, ARENA.y+ARENA.h-24);
      skillZones.push({type:"meteor", owner:f, x:tx, y:ty, timer:A.c.warn+i*0.07, radius:A.c.radius, dmg:A.c.dmg, groupHit:grp});
    }
  } else if(cid==="student_02"){               // 달이 C — 관통 일직선 저격(OVERNIGHT-1 2-5: 즉발 → 0.35초 시전 후 발사, 예고선 표시)
    skillZones.push({type:"snipeCast", owner:f, x:f.x, y:f.y, ang:f.facing, timer:A.c.wind||0.35,
      len:A.c.len, width:A.c.width, dmg:A.c.dmg, radius:A.c.width/2});
    spawnSuperWave(f.x,f.y,26);
  } else if(cid==="student_03"){               // 시고니 C — 초고속 반짝 질주(1초 무적+3초 가속+후반 50% 감소)
    f.cSpeedTimer=A.c.dur;
    f.dmgReduceTimer=A.c.dur;                  // 처음 1초는 무적이 우선 적용됨
    f.invincibleTimer=Math.max(f.invincibleTimer||0, A.c.invuln);
    effects.push({kind:"dashTrail",x:f.x,y:f.y,t:0,life:0.5,color:f.color});
  } else if(cid==="student_04"){               // 눈꽃 C — 꽁꽁 얼음 깨기(반경150·LOS·1초 빙결 후 30, 보스는 둔화+30)
    spawnSuperWave(f.x,f.y,A.c.radius);
    const bombTargets={};
    for(const o of env.foes(f)){
      if(dist(f.x,f.y,o.e.x,o.e.y)>A.c.radius+o.e.r) continue;
      if(!hasLineOfSight(f.x,f.y,o.e.x,o.e.y)) continue;         // 벽 너머 금지
      if(o.isBoss){ applySlowTo(o.e, A.c.bossSlowPct, A.c.bossSlowTime); env.damage(f,o,A.c.dmg); }
      else { o.e.freezeTimer=A.c.freeze*(o.e.eliteResist?0.5:1); bombTargets[o.key]=true; }   // 정예: 빙결 50%(PRD 15.4)
    }
    skillZones.push({type:"freezeBomb", owner:f, x:f.x, y:f.y, timer:A.c.freeze, dmg:A.c.dmg, targets:bombTargets});
  } else if(cid==="student_05"){               // 모아 C — 모두 무적!(v1.21): 살아있는 팀 전체(본인 포함) 2초 무적
    for(const a of env.allies(f)){ if(a.dead||a.inactive) continue; a.invincibleTimer=Math.max(a.invincibleTimer||0, A.c.invuln); }
    spawnSuperWave(f.x,f.y,120);
  } else if(cid==="student_06"){               // 별골렘 C — 젤리 블랙홀(앞 220, 반경170, 3초)
    let tx=f.x+Math.cos(f.facing)*A.c.dist, ty=f.y+Math.sin(f.facing)*A.c.dist;
    tx=clamp(tx, ARENA.x+24, ARENA.x+ARENA.w-24); ty=clamp(ty, ARENA.y+24, ARENA.y+ARENA.h-24);
    skillZones.push({type:"blackhole", owner:f, x:tx, y:ty, timer:A.c.life, radius:A.c.radius,
      pullEnemy:A.c.pullEnemy, pullPlayer:A.c.pullPlayer, dps:A.c.dps, tickAcc:0, dmgCount:{},
      maxTicks:Math.round(A.c.maxTotal/A.c.dps), bossPullMul:A.c.bossPullMul, bossSlowPct:A.c.bossSlowPct});
  }
  f.lastCombatTime=matchElapsed;
  return true;
}

// 시고니 X: 이동 경로에 가시 생성(모든 모드의 파이터 업데이트에서 호출)
function tickThornTrail(f){
  const tr=f.thornTrail; if(!tr) return;
  const A=getAbility("student_03").x;
  const moved=Math.hypot(f.x-tr.lastX, f.y-tr.lastY);
  tr.acc+=moved; tr.lastX=f.x; tr.lastY=f.y;
  if(tr.acc>=A.gapDist && tr.count<A.maxThorns){
    tr.acc=0; tr.count++;
    skillZones.push({type:"thorn", owner:f, x:f.x, y:f.y, timer:A.thornLife, radius:A.thornR, dmg:A.dmg,
      slowPct:A.slowPct, slowTime:A.slowTime, hit:{}});
  }
}

// v1.21 모아 패시브 '다정한 기운': 반경 180 안 팀원(본인 제외) 초당 5 회복 — 모든 모드의 파이터 틱에서 호출
function tickMoaPassive(f, dt, envFn){
  if(!f || f.dead || f.inactive || !f.char || f.char.id!=="student_05") return;
  f.moaAcc=(f.moaAcc||0)+dt;
  if(f.moaAcc<1) return;
  f.moaAcc-=1;
  const env=envFn(), P=getAbility("student_05").passive;
  for(const a of env.allies(f)){
    if(a===f||a.dead||a.inactive) continue;
    if(dist(f.x,f.y,a.x,a.y)<=P.radius && a.hp<a.maxHp) env.heal(a, P.hps);
  }
}

// 장판 진행(호스트/로컬 공용). env는 현재 모드의 어댑터.
function tickSkillZones(dt, env){
  if(!skillZones.length) return;
  for(const z of skillZones.slice()){   // 스냅샷 순회: 틱 중 생성된 존(달이 시전→저격선 등)이 같은 틱에 시간을 잃지 않게
    z.timer-=dt;
    if(z.type==="meteor"){
      if(z.enemyWarn){ if(z.timer<=0) z.done=true; }        // 보스 내려찍기 '예고 표시 전용'(피해는 tEnemyUpdate가 판정)
      else if(z.timer<=0 && !z.done){ z.done=true;
        spawnSuperWave(z.x,z.y,z.radius);
        for(const o of env.foes(z.owner)){
          if(z.groupHit && z.groupHit[o.key]) continue;              // 럭키 X 일자 폭발: 한 시전당 같은 대상 1회
          if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r && hasLineOfSight(z.x,z.y,o.e.x,o.e.y)){
            if(z.groupHit) z.groupHit[o.key]=1;
            env.damage(z.owner,o,z.dmg);
          }
        }
      }
    } else if(z.type==="thorn"){
      for(const o of env.foes(z.owner)){
        if(z.hit[o.key]) continue;                                  // 같은 가시는 같은 적에게 1회만
        if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r){ z.hit[o.key]=1; env.damage(z.owner,o,z.dmg); applySlowTo(o.e,z.slowPct,z.slowTime); }
      }
    } else if(z.type==="ice"){
      for(const o of env.foes(z.owner)){
        if(dist(z.x,z.y,o.e.x,o.e.y)<=z.radius+o.e.r){
          applySlowTo(o.e, z.slowPct, 0.2);                          // 안에 있는 동안 지속 갱신(중첩 없음)
          o.e.atkSlowTimer=Math.max(o.e.atkSlowTimer||0, 0.3);       // GAMEPLAY-1 서리: 공격 간격 +40%(존 안 지속 갱신)
          o.e.atkSlowMul=z.atkSlowMul||1.4;
          if(!z.entered[o.key]){ z.entered[o.key]=1; env.damage(z.owner,o,z.enterDmg); }   // 첫 진입만 피해
        }
      }
    } else if(z.type==="freezeBomb"){
      if(z.timer<=0 && !z.done){ z.done=true;
        for(const o of env.foes(z.owner)){ if(z.targets[o.key]) env.damage(z.owner,o,z.dmg); }   // 빙결 종료 시 파괴 피해
      }
    } else if(z.type==="snipeCast"){             // 달이 C 시전(OVERNIGHT-1 2-5): 0.35초 후 시전자 현재 위치에서 발사(사망/빙결 시 불발)
      const cst=z.owner;
      if(cst && !cst.dead && !cst.inactive){ z.x=cst.x; z.y=cst.y; }   // 예고선이 시전자를 따라감(각도는 고정)
      if(z.timer<=0 && !z.done){ z.done=true;
        if(cst && !cst.dead && !cst.inactive && !isFrozen(cst)){
          const ex=z.x+Math.cos(z.ang)*z.len, ey=z.y+Math.sin(z.ang)*z.len;
          for(const o of env.foes(cst)){
            if(distPointSeg(o.e.x,o.e.y, z.x,z.y, ex,ey) > z.width/2 + o.e.r) continue;
            if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;
            env.damage(cst,o,z.dmg);
          }
          skillZones.push({type:"beam", owner:cst, x:z.x, y:z.y, ang:z.ang, len:z.len, timer:0.28, radius:z.width/2});
          spawnSuperWave(z.x,z.y,40);
        }
      }
    } else if(z.type==="healTotem"){           // 모아 X(v1.21): 오오라 안 팀원(본인 포함) 초당 10 회복(0.5초 간격)
      z.acc+=dt;
      while(z.acc>=0.5){ z.acc-=0.5;
        for(const a of env.allies(z.owner)){
          if(a.dead||a.inactive) continue;
          if(dist(z.x,z.y,a.x,a.y)<=z.radius+ (a.r||20) && a.hp<a.maxHp) env.heal(a, z.hps*0.5);
        }
      }
    } else if(z.type==="blackhole"){
      for(const o of env.foes(z.owner)){
        const d=dist(z.x,z.y,o.e.x,o.e.y);
        if(d>z.radius+o.e.r) continue;
        if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;           // 벽 통과로 끌지 않음
        let pull=o.isFighter?z.pullPlayer:z.pullEnemy;
        if(o.isBoss){ pull*=z.bossPullMul; applySlowTo(o.e, z.bossSlowPct, 0.2); }
        else if(o.e.eliteResist) pull*=0.7;                 // 정예: 블랙홀 70%(PRD 15.4)
        if(d>6){ const ang=Math.atan2(z.y-o.e.y, z.x-o.e.x); moveEntity(o.e, Math.cos(ang)*pull*dt, Math.sin(ang)*pull*dt); }
      }
      z.tickAcc+=dt;
      if(z.tickAcc>=1){ z.tickAcc-=1;
        for(const o of env.foes(z.owner)){
          if(dist(z.x,z.y,o.e.x,o.e.y)>z.radius+o.e.r) continue;
          if(!hasLineOfSight(z.x,z.y,o.e.x,o.e.y)) continue;
          const n=z.dmgCount[o.key]||0;
          if(n<z.maxTicks){ z.dmgCount[o.key]=n+1; env.damage(z.owner,o,z.dps); }   // 총 피해 상한 18
        }
      }
    }
  }
  skillZones=skillZones.filter(z=>!z.done && z.timer>-0.01);
  if(skillZones.length>40) skillZones=skillZones.slice(skillZones.length-40);   // 성능 안전장치
}

// 네트워크 전송용 장판 요약(숫자·타입만 — 게스트 렌더용)
const ZONE_CODES={meteor:0,thorn:1,ice:2,healTotem:3,blackhole:4,freezeBomb:5,beam:6,snipeCast:7};
function packZones(){
  const out=[];
  for(const z of skillZones){ if(z.type==="freezeBomb") continue;
    const o={t:ZONE_CODES[z.type], x:Math.round(z.x), y:Math.round(z.y), r:Math.round(z.radius||z.pickupR||0), tm:Math.round(z.timer*10)/10};
    if(z.type==="beam"||z.type==="snipeCast"){ o.a=Math.round(z.ang*100)/100; o.l=Math.round(z.len); }   // 달이 C 저격선/시전 예고선(숫자만)
    out.push(o); }
  return out;
}
// 점→선분 거리(달이 C 관통 저격 판정)
function distPointSeg(px,py, x1,y1, x2,y2){
  const dx=x2-x1, dy=y2-y1, L2=dx*dx+dy*dy;
  if(L2===0) return Math.hypot(px-x1,py-y1);
  let t=((px-x1)*dx+(py-y1)*dy)/L2; t=clamp(t,0,1);
  return Math.hypot(px-(x1+dx*t), py-(y1+dy*t));
}

// ── 로컬 시전 래퍼(플레이어 전용) ──
/* GENRE-EXPAND-1 §1.3: 술래잡기 X 허용표 — 이동/방해류(시고니 가시길·눈꽃 서리)만. 나머지 🔒 */
const TAG_X_ALLOW={ student_03:true, student_04:true };
function useCharacterSpecial(){
  if(gameState!==STATE.PLAYING || !player || player.dead) return;
  if(RULE && RULE.id==="tag" && !TAG_X_ALLOW[player.char.id]){
    if(castTagSpecial(player)) return;                                     // BIG-BATCH-2 P1: 모드 전용 대체 도구
    showToast(player.char.id==="student_06" ? "🛡 별골렘은 '1회 잡기 방어막'이 자동으로 있어요" : "🔒 이 모드에선 이 기술을 쓸 수 없어요");
    return;
  }
  if(player.specialCd>0){ spawnSuperFail(player.x,player.y); return; }
  castSpecialFor(player, envLocal());
}
function useCharacterSuper(){
  if(!player || player.dead) return;
  if(RULE && RULE.id==="tag"){ showToast("🔒 술래잡기에선 궁극기를 쓸 수 없어요"); return; }
  if(superGauge<GAME_CONFIG.superCharge){ spawnSuperFail(player.x,player.y); return; }
  if(RULE && RULE.id==="paint"){                                       // BIG-BATCH-2 P1: 칠하기 궁극기 = 대형 도색(모든 캐릭 공통 스페셜)
    const CS=STUDENT_CELL, R=RULE_CONFIG.paint.ultRadius;
    superGauge=0;
    for(let dr=-R;dr<=R;dr++) for(let dc=-R;dc<=R;dc++) paintCellBy(player.x+dc*CS, player.y+dr*CS, "player", true);
    effects.push({kind:"superwave", x:player.x, y:player.y, t:0, life:0.6, radius:CS*(R+0.8)});
    playSfx("paint"); showToast("🎨 대형 도색!");
    stats.superUsed++;
    return;
  }
  const ok=castUltimateFor(player, envLocal(), ()=>superGauge, v=>{ superGauge=v; });
  if(ok) stats.superUsed++;
}

/* ── 장전(탄창) 공통 유틸 — 플레이어가 조종하는 파이터에만 ammo를 둔다(AI/봇/적은 무한)
   v1.18: 무기별 탄창/장전(magazineSize/reloadTime). 다중탄도 공격 1회당 탄약 1개만 소비. ── */
function weaponOf(f){ return getWeapon((f && f.weaponId) || selectedWeaponId); }
function magSizeOf(f){ const w=weaponOf(f); return (w && w.magazineSize) || GAME_CONFIG.magazineSize; }
function reloadTimeOf(f){ const w=weaponOf(f); let t=(w && w.reloadTime) || GAME_CONFIG.reloadTime; const u=upgStacks(f,"reload"); if(u) t*=Math.max(0.6,1-0.10*u); return t; }
function initAmmo(f){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; }
function usesAmmo(f){
  if(f && f.char && f.char.id==="student_01") return false;   // v1.21 럭키 패시브: 무한 탄창(장전 불필요)
  return f && f.ammo!==undefined;
}
function tickReload(f, dt){ if(usesAmmo(f) && f.reloading){ f.reloadTimer-=dt; if(f.reloadTimer<=0){ f.ammo=magSizeOf(f); f.reloading=false; f.reloadTimer=0; } } }
function startReload(f){ if(usesAmmo(f) && !f.reloading && f.ammo<magSizeOf(f)){ f.reloading=true; f.reloadTimer=reloadTimeOf(f); } }
function canFireAmmo(f){ return !usesAmmo(f) || (!f.reloading && f.ammo>0); }   // ammo 없는 파이터는 항상 발사 가능
function consumeAmmo(f){ if(!usesAmmo(f)) return; f.ammo--; if(f.ammo<=0){ f.ammo=0; f.reloading=true; f.reloadTimer=reloadTimeOf(f); } }

/* ── attackId 기반 궁극기(C) 게이지 충전 제한 ──
   Z 공격 1회(다중탄·부메랑 왕복 포함)가 같은 대상에게 여러 번 맞아도 충전은 최대 20(=1회분). */
let attackSeq=0;
let attackChargeLog=new Map();   // attackId -> Set("targetKey")
function newAttackId(){ return ++attackSeq; }
function resetAttackLog(){ attackChargeLog=new Map(); }
function tryChargeGauge(aid, targetKey, addFn){
  if(aid==null){ addFn(); return; }
  let set=attackChargeLog.get(aid);
  if(!set){ set=new Set(); attackChargeLog.set(aid,set);
    if(attackChargeLog.size>300){ const k=attackChargeLog.keys().next().value; attackChargeLog.delete(k); } }
  const key=String(targetKey);
  if(set.has(key)) return;   // 같은 공격 → 같은 대상 추가 충전 없음(최대 20 유지)
  set.add(key); addFn();
}
// C 궁극기(다중탄)의 '같은 대상 최대 피해' 상한 — cast(cid)별 대상당 명중 횟수 제한
let ultSeq=0; let ultHitLog=new Map();   // cid -> Map(targetKey -> count)
function newUltCastId(){ return ++ultSeq; }
function canUltDamage(cid, targetKey, maxHits){
  let m=ultHitLog.get(cid);
  if(!m){ m=new Map(); ultHitLog.set(cid,m);
    if(ultHitLog.size>60){ const k=ultHitLog.keys().next().value; ultHitLog.delete(k); } }
  const key=String(targetKey), n=m.get(key)||0;
  if(n>=maxHits) return false;
  m.set(key,n+1); return true;
}

/* ── 무기 부가효과(둔화/밀치기) — 아군 오사 없음(피해 적용된 대상에게만 호출) ── */
function applySlowTo(t, pct, time){
  if(!t) return;
  if(!(t.wSlowTimer>0) || pct >= (t.wSlowPct||0)) t.wSlowPct=pct;   // 중첩 없음: 더 강한 값만 교체
  t.wSlowTimer=Math.max(t.wSlowTimer||0, time);                     // 지속시간은 갱신(연장)
}
function applyKnockbackTo(t, fromX, fromY, distPx, immuneTime){
  if(!t) return;
  if(t.knockImmuneTimer>0) return;                                  // 연속 밀치기 면역
  let d=distPx;
  if(t.shieldAbsorb>0 && t.shieldAbsorbTimer>0) d*=0.5;              // 별골렘 흡수막: 밀치기 절반(GAMEPLAY-1)
  pushFighter(t, Math.atan2(t.y-fromY, t.x-fromX), d);               // 벽 통과 없음(moveEntity가 충돌 처리)
  t.knockImmuneTimer=immuneTime||0.4;
}
function applyWeaponHitEffects(w, target, bx, by){
  if(!w || !target) return;
  if(w.slowPct) applySlowTo(target, w.slowPct, w.slowTime||0.6);
  if(w.knockback) applyKnockbackTo(target, bx, by, w.knockback, w.knockImmuneTime||0.4);
}

/* ── v1.21 패시브: 탄환 명중 피해 보정(모든 모드 공용) ──
   달이(snipe): 320px 이상 날아간 탄이 명중하면 +30%.
   시고니(stab): 탄 진행 방향이 대상이 보는 방향과 같으면(=등 뒤에서 맞음) +20%. */
function bulletHitDamage(b, target){
  let d=b.damage;
  if(b.snipe && (b.traveled||0)>=b.snipe) d*=(1+getAbility("student_02").passive.bonus);
  if(b.stab && target && typeof target.facing==="number"){
    let diff=Math.abs(Math.atan2(b.vy||0,b.vx||0)-target.facing)%(Math.PI*2);
    if(diff>Math.PI) diff=Math.PI*2-diff;
    if(diff<Math.PI/2) d*=(1+getAbility("student_03").passive.backBonus);
  }
  return d;
}

/* ── 받는 피해 보정(별골렘 X 방패 60%↓ · 시고니 C 후반 50%↓) — 최소 1 보장 ── */
// 게이지 충전(모드 공용): 팀/온라인 파이터는 f.superGauge, 로컬 플레이어는 전역 superGauge
function addGaugeTo(f, amt){
  if(!f || !(amt>0)) return;
  if(typeof player!=="undefined" && f===player && typeof superGauge==="number"){ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+amt); return; }
  if(typeof f.superGauge==="number") f.superGauge=Math.min(GAME_CONFIG.superCharge, f.superGauge+amt);
}
function incomingDamage(f, dmg){
  let m=1;
  if(f && f.shieldAbsorb>0 && f.shieldAbsorbTimer>0){
    // GAMEPLAY-1 별골렘 X 흡수막: 피해를 막이 먼저 흡수. '수호자' 패시브: 별골렘 본인이 막은 양 × 0.6 궁 충전
    const gx=getAbility("student_06").x;
    const blocked=Math.min(f.shieldAbsorb, dmg);
    f.shieldAbsorb-=blocked; dmg-=blocked;
    if(f.char && f.char.id==="student_06") addGaugeTo(f, blocked*(gx.gaugePerBlock||0.6));
    if(dmg<=0) return 0;
  }
  if(f && f.dmgReduceTimer>0) m*=getAbility("student_03").c.reduceMul;
  if(f && f.char && f.char.id==="student_06") m*=(1-(getAbility("student_06").passive.flatReduce||0));   // OVERNIGHT-1 2-3: 별골렘 상시 피해 10%↓
  if(f && f.shieldItemTimer>0) m*=0.75;                    // 방패 젤리 아이템: 받는 피해 25%↓(5초)
  if(f && f.upg && f.upg.def) m*=Math.max(0.7,1-0.06*f.upg.def);   // PVE 강화: 방어 물약(상한 30%)
  if(m>=1) return dmg;
  return Math.max(1, dmg*m);
}

// 로컬 수동 장전(R). 온라인은 input.reload로 host가 처리.
function doReloadManual(){ if(gameState===STATE.PLAYING && player && !player.dead) startReload(player); }

/* =======================================================================
   업데이트
   ======================================================================= */
function updatePlayer(dt){
  if(player.dead){ player.respawnTimer-=dt; if(player.respawnTimer<=0) respawn(player); return; }
  player.cooldown-=dt;
  tickReload(player, dt);
  if(player.hitFlash>0) player.hitFlash-=dt;
  if(player.invincibleTimer>0) player.invincibleTimer-=dt;
  tickThornTrail(player);                     // 시고니 X: 이동 경로 가시 생성
  tickMoaPassive(player, dt, envLocal);       // v1.21 모아 패시브(근처 팀원 회복)
  if(isFrozen(player)){ regen(player, dt); return; }   // 빙결: 이동·공격 불가(타이머는 tickStatus에서 진행)
  if(RULE && RULE.id==="tag" && RULE.phase==="reveal") return;   // GENRE-EXPAND-1 §1: 술래 공개 3초 — 전원 이동 잠금
  // UPDATE-1 P3: 의도 기반 입력 — 키보드는 기존 동작 동일, 마우스/터치는 이동과 조준 분리(무빙샷)
  const it=getLocalIntent();
  if(RULE && RULE.id==="tag") it.fire=false;           // 술래잡기: Z 발사 비활성(순수 추격)
  let mx=it.mx, my=it.my;
  const ml=Math.hypot(mx,my);
  const aimSeparate = !!(it.aimPoint || typeof it.aim==="number");
  if(ml>0.01){
    if(ml>1){ mx/=ml; my/=ml; }              // 대각선/스틱 정규화(아날로그는 세기 유지)
    moveEntity(player, mx*effSpeed(player)*dt, my*effSpeed(player)*dt);
    if(!aimSeparate) player.facing=Math.atan2(my,mx);   // 키보드: 이동 방향을 바라봄(기존 동작)
  }
  if(it.aimPoint) player.facing=Math.atan2(it.aimPoint.y-player.y, it.aimPoint.x-player.x);   // 마우스: 커서 조준
  else if(typeof it.aim==="number") player.facing=it.aim;                                     // 터치: 우 스틱 조준
  // 마우스/터치의 X·C·장전 — 에지(1회) 처리. 키보드는 keydown 경로(handleKeyPress)가 담당해 중복 없음.
  if(controlMode()!=="keyboard"){
    if(it.special && !player._pSp) useCharacterSpecial();
    if(it.ult && !player._pUlt) useCharacterSuper();
    if(it.reload && !player._pRl) reloadWeaponManual();
    player._pSp=!!it.special; player._pUlt=!!it.ult; player._pRl=!!it.reload;
  }
  if(it.fire && player.cooldown<=0 && canFireAmmo(player)){
    firePlayerWeapon();
    consumeAmmo(player);
    player.cooldown=zCooldownOf(player, getWeapon(player.weaponId||selectedWeaponId));
  }
  regen(player, dt);
}

/* GENRE-EXPAND-1 §1.6 술래잡기 봇: 술래=최근접 도망자 추적(수풀 은신 존중) · 도망자=술래 반대+수풀 잠복 */
function tagBotUpdate(f, dt, list, env){
  if(RULE.phase==="reveal") return;
  list=list||allFighters(); env=env||envLocal();      // P2: 온라인 팀 엔진 재사용(목록·env 주입)
  const C=RULE_CONFIG.tag, ai=(f.ai=f.ai||{});
  f.cooldown=1;                                       // 발사 안 함
  let mvx=0, mvy=0;
  if(f.isTagger){
    let best=null, bd=Infinity;
    for(const o of list){
      if(o.isTagger || o.dead) continue;
      if(o.tagHideT>0) continue;                      // BIG-BATCH-2 P1: 모아 은신 부여 중 = 인지 못 함
      const d=dist(f.x,f.y,o.x,o.y);
      if(inBush(o) && d>C.bushHide) continue;         // 수풀 잠복자는 인지 못 함(§1.4)
      if(d<bd){ bd=d; best=o; }
    }
    if(best){ const d=bd||1; mvx=(best.x-f.x)/d; mvy=(best.y-f.y)/d; f.facing=Math.atan2(mvy,mvx); }
    else {                                            // 수색 배회
      ai.wT=(ai.wT||0)-dt;
      if(ai.wT<=0){ ai.wA=Math.random()*Math.PI*2; ai.wT=rand(0.8,1.6); }
      mvx=Math.cos(ai.wA); mvy=Math.sin(ai.wA);
    }
  } else {
    let tg=null, bd=Infinity;
    for(const o of list){ if(!o.isTagger || o.dead) continue;
      const d=dist(f.x,f.y,o.x,o.y); if(d<bd){ bd=d; tg=o; } }
    if(tg && bd<300){                                 // 도망: 술래 반대 방향
      const d=bd||1; mvx=(f.x-tg.x)/d; mvy=(f.y-tg.y)/d;
      // 근처 수풀 유인(도주 벡터에 35% 블렌드)
      let bb=null, bbd=Infinity;
      for(const b of BUSHES){ const bx=b.x+b.w/2, by=b.y+b.h/2, d2=dist(f.x,f.y,bx,by); if(d2<bbd){bbd=d2; bb={x:bx,y:by};} }
      if(bb && bbd<400){ const dl=bbd||1; mvx=mvx*0.65+((bb.x-f.x)/dl)*0.35; mvy=mvy*0.65+((bb.y-f.y)/dl)*0.35; }
      f.facing=Math.atan2(mvy,mvx);
    } else if(tg && inBush(f)){ mvx=0; mvy=0; }       // 술래 멀고 수풀 안 → 잠복(§1.6)
    else {
      ai.wT=(ai.wT||0)-dt;
      if(ai.wT<=0){ ai.wA=Math.random()*Math.PI*2; ai.wT=rand(1.0,2.0); }
      mvx=Math.cos(ai.wA)*0.5; mvy=Math.sin(ai.wA)*0.5;
    }
  }
  const ml=Math.hypot(mvx,mvy);
  if(ml>0.01){
    if(ml>1){ mvx/=ml; mvy/=ml; }
    const step=effSpeed(f)*dt, ox=f.x, oy=f.y;
    moveEntity(f, mvx*step, mvy*step);
    if(Math.hypot(f.x-ox,f.y-oy) < step*0.3){         // 벽 끼임 → 수직 방향 우회
      ai.sT=(ai.sT||0)-dt;
      if(ai.sT<=0){ ai.sD=Math.random()<0.5?1:-1; ai.sT=0.5; }
      moveEntity(f, -mvy*ai.sD*step, mvx*ai.sD*step);
    }
  }
  // X 허용 캐릭(시고니·눈꽃)은 원본 스킬, 나머지는 모드 전용 도구(BIG-BATCH-2 P1)를 봇도 낮은 확률로 사용
  if(f.char && f.specialCd<=0 && Math.random()<dt*0.25){
    if(TAG_X_ALLOW[f.char.id]) castSpecialFor(f, env);
    else castTagSpecial(f, list);
  }
}
function updateAI(f, dt){
  if(f.dead){ f.respawnTimer-=dt; if(f.respawnTimer<=0) respawn(f); return; }
  if(f.hitFlash>0) f.hitFlash-=dt;
  if(f.invincibleTimer>0) f.invincibleTimer-=dt;
  // 모아 패시브(회복 오라)는 스킬이 아니라 상시 효과 — 아군·적 캐릭터 봇 모두 적용(팀 모드와 동일).
  // (코드감사: 기존엔 적 봇에만 적용되는 비대칭 + 타겟 없을 때 미적용 문제 수정)
  if(!f.isBoss && f.char) tickMoaPassive(f, dt, envLocal);
  if(isFrozen(f)){ return; }                 // 빙결: 이동·공격 불가
  if(RULE && RULE.id==="tag"){ tagBotUpdate(f, dt); return; }   // GENRE-EXPAND-1 §1.6: 술래잡기 전용 AI

  const ai=f.ai, isEnemy=(f.team==="enemy");
  const target=nearestTarget(f, isEnemy);
  if(!target){ regen(f,dt); return; }
  const d=dist(f.x,f.y,target.x,target.y);

  // 풀숲 은신: 멀리(>270) 떨어진 풀숲 안에 있고 최근(1.2초) 공격하지 않은 대상은 추적자가 위치를 잃는다(아군·적 공통)
  const targetHidden = inBush(target) && d>270 && (matchElapsed-target.lastFireTime)>1.2;
  const wasKnown=ai.knowsTarget;
  if(!targetHidden){
    if(!wasKnown) ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.6,1.2);
    ai.knowsTarget=true; ai.lastKnownX=target.x; ai.lastKnownY=target.y;
  } else { ai.knowsTarget=false; }
  const tx=ai.knowsTarget?target.x:ai.lastKnownX;
  const ty=ai.knowsTarget?target.y:ai.lastKnownY;
  const tdx=tx-f.x, tdy=ty-f.y, td=Math.hypot(tdx,tdy)||1;

  // GAMEPLAY-1 Phase 3: 봇 목표 지향(가벼운 v1) — 상대가 멀면 거점/별/상대 탑으로 향한다
  let objTarget=null;
  if(RULE && !f.isPlayer && !f.isBoss){
    if(RULE.id==="hotzone"){
      if(dist(f.x,f.y,RULE.x,RULE.y)>RULE.radius*0.6 && d>240) objTarget={x:RULE.x, y:RULE.y, ideal:30};
    } else if(RULE.id==="stargrab" && RULE.stars.length && d>200){
      let bs=null, bd2=560;
      for(const s of RULE.stars){ const d2=dist(f.x,f.y,s.x,s.y); if(d2<bd2){ bd2=d2; bs=s; } }
      if(bs) objTarget={x:bs.x, y:bs.y, ideal:6};
    } else if(RULE.id==="siege" && isEnemy){
      const tw=RULE.towers.player;
      if(tw && tw.hp>0 && d>MATCH.enemyRange*1.1) objTarget={x:tw.x+tw.w/2, y:tw.y+tw.h/2, ideal:170, siege:true};
    } else if(RULE.id==="paint" && d>260){
      // GENRE-EXPAND-1 §2.7: 상대가 멀면 '내 색이 아닌' 가장 가까운 칸으로 이동+사격(탄이 바닥을 칠함)
      ai.paintT=(ai.paintT||0)-dt;
      if(ai.paintT<=0 || !ai.paintCell){
        ai.paintT=0.5;
        const my=(f.team==="player")?1:2; let best=null, bd3=Infinity;
        for(let r=0;r<RULE.rows;r++) for(let c=0;c<RULE.cols;c++){
          const i=r*RULE.cols+c;
          if(RULE.blocked[i] || RULE.grid[i]===my) continue;
          const cx=ARENA.x+c*STUDENT_CELL+STUDENT_CELL/2, cy=ARENA.y+r*STUDENT_CELL+STUDENT_CELL/2;
          const d3=dist2(f.x,f.y,cx,cy); if(d3<bd3){ bd3=d3; best={x:cx,y:cy}; }
        }
        ai.paintCell=best;
      }
      if(ai.paintCell) objTarget={x:ai.paintCell.x, y:ai.paintCell.y, ideal:140, siege:true};   // siege 플래그 = 목표 지점 사격
    }
  }

  let mvx=0,mvy=0;
  if(objTarget){
    const dox=objTarget.x-f.x, doy=objTarget.y-f.y, dol=Math.hypot(dox,doy)||1;
    if(dol>objTarget.ideal){ mvx=dox/dol; mvy=doy/dol; }
  }
  if(mvx===0 && mvy===0 && !isEnemy && player!==f){
    const dp=dist(f.x,f.y,player.x,player.y);
    if(dp>320){ mvx=(player.x-f.x)/dp; mvy=(player.y-f.y)/dp; }
  }
  if(mvx===0 && mvy===0 && !objTarget){   // 목표 지향 중(도착 포함)에는 거리 유지 로직 생략 — 거점 안에 머무름
    const ideal=GAME_CONFIG.idealDistance;
    const retreating = isEnemy && !f.isBoss && f.hp<=f.maxHp*0.3;
    if(retreating){ mvx=-tdx/td; mvy=-tdy/td; }
    else if(td>ideal+45){ mvx=tdx/td; mvy=tdy/td; }
    else if(td<ideal-45){ mvx=-tdx/td; mvy=-tdy/td; }
    else {
      ai.strafeTimer-=dt;
      if(ai.strafeTimer<=0){ ai.strafeDir=Math.random()<0.5?1:-1; ai.strafeTimer=rand(0.6,1.4); }
      mvx=-tdy/td*ai.strafeDir; mvy=tdx/td*ai.strafeDir;
    }
  }
  ai.stuckCheck-=dt;
  if(ai.stuckCheck<=0){
    if(dist(f.x,f.y,ai.lastX,ai.lastY)<6){ ai.avoidDir=Math.random()<0.5?1:-1; ai.avoidTimer=0.6; }
    ai.lastX=f.x; ai.lastY=f.y; ai.stuckCheck=0.4;
  }
  if(ai.avoidTimer>0){ ai.avoidTimer-=dt; const a=Math.atan2(mvy,mvx)+ai.avoidDir*1.2; mvx=Math.cos(a); mvy=Math.sin(a); }
  const mlen=Math.hypot(mvx,mvy);
  if(mlen>0){ mvx/=mlen; mvy/=mlen; moveEntity(f, mvx*effSpeed(f)*dt, mvy*effSpeed(f)*dt); }

  ai.fireTimer-=dt; ai.reactionTimer-=dt;
  const range=isEnemy?MATCH.enemyRange:GAME_CONFIG.playerRange;
  let cooldown=isEnemy?MATCH.enemyAttackCooldown:GAME_CONFIG.playerAttackCooldown*1.5;
  cooldown*=atkSlowFactor(f);                                        // 눈꽃 서리 존: 공격 간격 +40%
  const gA=growthOf(f,"aspd"); if(gA) cooldown*=Math.max(0.6,1-GROWTH.aspdPct*gA);   // 성장: 공속
  const aimErr=isEnemy?MATCH.enemyAimError:0.1;
  if(ai.knowsTarget && d<range && ai.fireTimer<=0 && ai.reactionTimer<=0 &&
     hasLineOfSight(f.x,f.y,target.x,target.y) && canBeHit(target)){
    const baseA=Math.atan2(target.y-f.y,target.x-f.x)+rand(-1,1)*aimErr;
    fireAiShot(f, baseA);
    ai.fireTimer=cooldown*rand(0.85,1.25);
    ai.reactionTimer=(isEnemy?0.35:0.25)*rand(0.7,1.3);
  }
  // GAMEPLAY-1 siege: 상대가 없으면 적 봇이 플레이어 탑을 사격(탄이 구조물 충돌로 피해)
  if(objTarget && objTarget.siege && ai.fireTimer<=0){
    const dtw=Math.hypot(objTarget.x-f.x, objTarget.y-f.y);
    if(dtw<range){ fireAiShot(f, Math.atan2(objTarget.y-f.y, objTarget.x-f.x)); ai.fireTimer=cooldown*rand(0.9,1.25); }
  }
  // v1.27 캐릭터 봇 X/C(빠른대전 적 전용 — tBotUpdate 로직 이식, 난이도 파라미터로 빈도 조절).
  // 아군 봇·보스는 기존 그대로(스킬 없음). 시전 전 타겟을 바라보게 해 방향성 스킬이 유효하게.
  if(isEnemy && !f.isBoss && f.char){
    tickThornTrail(f);                          // 시고니 X: 이동 경로 가시(시전한 봇만 유효)
    f.superGauge=Math.min(GAME_CONFIG.superCharge, (f.superGauge||0)+MATCH.botUltChargeRate*dt);
    if(ai.knowsTarget && canBeHit(target) && hasLineOfSight(f.x,f.y,target.x,target.y)){
      const wRange=GAME_CONFIG.playerRange*getWeapon(f.weaponId).rangeMul;
      if(f.specialCd<=0 && d<Math.max(wRange,260) && Math.random()<dt*MATCH.botSpecialProb){
        f.facing=Math.atan2(target.y-f.y,target.x-f.x);
        castSpecialFor(f, envLocal());
      }
      if((f.superGauge||0)>=GAME_CONFIG.superCharge && d<wRange && Math.random()<dt*MATCH.botUltProb){
        f.facing=Math.atan2(target.y-f.y,target.x-f.x);
        castUltimateFor(f, envLocal(), ()=>f.superGauge||0, v=>{ f.superGauge=v; });
      }
    }
  }
  regen(f, dt);
}

function regen(f, dt){
  if(f.dead) return;
  if(matchElapsed-f.lastCombatTime>=GAME_CONFIG.regenStartTime && f.hp<f.maxHp){
    f.hp=Math.min(f.maxHp, f.hp+GAME_CONFIG.regenRate*dt);
  }
}

/* 부메랑 조향(공통): 나갈 때 사거리/벽에서 복귀 전환, 복귀 중엔 주인 현재 위치로 유도.
   복귀 중엔 벽을 넘어 돌아온다(벽에 막혀 무한 진동하지 않게 — 일관 규칙).
   반환값 false = 주인에게 도착(소멸). */
function steerBoomerang(b, ox, oy){
  if(b.phase==="out" && b.traveled>=b.maxRange) b.phase="back";
  if(b.phase==="back"){
    const dx=ox-b.x, dy=oy-b.y, d=Math.hypot(dx,dy)||1;
    if(d<26) return false;
    b.vx=dx/d*b.spd; b.vy=dy/d*b.spd;
  }
  return true;
}
// 적중 효과(무기별 effect_hit 스프라이트, 없으면 기존 원형 반짝임 fallback)
function _sfxHitHook(){ playSfx("hit"); }   /* E14 */
function spawnHitFx(x,y,wid,color){ _sfxHitHook();
  if(wid && ASSETS_ENABLED && getWeaponImage(getWeapon(wid).assetId||wid,"effect_hit")){
    effects.push({kind:"hitfx", x:x, y:y, wid:wid, t:0, life:0.25});
  } else spawnHit(x,y,color);
}

function updateBullets(dt){
  for(const b of bullets){
    if(!b.alive) continue;
    b.age=(b.age||0)+dt;
    if(b.age>(b.life||5)){ b.alive=false; continue; }          // 안전장치(부메랑 등 잔류 방지) — b.life는 다른 3개 탄환 루프와 동일 처리
    if(b.boomerang){
      const o=b.ownerRef;
      const ox=o&&!o.dead?o.x:b.x, oy=o&&!o.dead?o.y:b.y;
      if(!o || o.dead){ if(b.phase==="back"){ b.alive=false; continue; } }
      else if(!steerBoomerang(b, ox, oy)){ b.alive=false; continue; }
    }
    const speed=Math.hypot(b.vx,b.vy);
    const steps=Math.max(1, Math.ceil(speed*dt/(b.r*0.9)));
    const sx=b.vx*dt/steps, sy=b.vy*dt/steps, stepLen=Math.hypot(sx,sy);
    const list=targetsOf(b.team);   // 성능(코드감사): 서브스텝 루프 밖으로 — 팀은 비행 중 안 바뀌는데 스텝마다 배열을 새로 만들었음
    const _pByMe = !!(player && b.ownerId===player.id);                     // GENRE-EXPAND-1 §2
    const _pStamp = (b.wid==="tool_06") ? "3x3" : "cross";                  // 별골렘 = 착탄 대형 스탬프
    for(let s=0;s<steps && b.alive;s++){
      b.x+=sx; b.y+=sy; b.traveled+=stepLen;
      if(RULE && RULE.id==="paint") paintCellBy(b.x, b.y, b.team, _pByMe);  // 탄 비행 경로 1칸씩 칠
      if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w||b.y<ARENA.y||b.y>ARENA.y+ARENA.h){
        if(b.boomerang && b.phase==="out"){ b.phase="back"; b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h); break; }
        if(b.bounce){                                   // 통통비행기: 경기장 가장자리에서도 반사
          if((b.bounces||0)>=b.maxBounce){ b.alive=false; break; }
          if(b.x<ARENA.x||b.x>ARENA.x+ARENA.w) b.vx=-b.vx; else b.vy=-b.vy;
          b.x=clamp(b.x,ARENA.x,ARENA.x+ARENA.w); b.y=clamp(b.y,ARENA.y,ARENA.y+ARENA.h);
          b.bounces=(b.bounces||0)+1; b.lastWall=null; b.lastBounceAt=b.age||0;
          spawnHit(b.x,b.y,b.color); break;
        }
        b.alive=false; break;
      }
      // 벽: 부메랑은 나갈 때 복귀 전환, 복귀 중엔 통과. 통통비행기(bounce)는 반사. 일반탄은 소멸.
      let hitWall=false, wallRef=null;
      for(const o of OBSTACLES){ if(circleRectOverlap(b.x,b.y,b.r,o)){ hitWall=true; wallRef=o; break; } }
      if(hitWall){
        // GAMEPLAY-1 siege: 규칙 구조물(탑·벽)은 상대 팀 탄에 HP 피해(복귀 중 부메랑은 벽 통과라 제외)
        if(wallRef.structure && wallRef.hp>0 && wallRef.team!==b.team && !(b.boomerang&&b.phase==="back"))
          damageRuleStructure(wallRef, b.damage);
        if(b.boomerang){ if(b.phase==="out"){ b.phase="back"; b.x-=sx; b.y-=sy; break; } }
        else if(b.bounce){ if(!bounceBullet(b, wallRef, sx, sy)){ b.alive=false; } break; }
        else {
          if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,_pStamp);   // 착탄 스플래시(§2.3)
          spawnHitFx(b.x,b.y,b.wid,"#aab0d0"); b.alive=false; break;
        }
      }
      for(const t of list){
        if(canBeHit(t) && dist2(b.x,b.y,t.x,t.y)<(b.r+t.r)*(b.r+t.r)){   // 성능: 제곱거리 비교(Math.hypot 제거)
          if(b.boomerang){
            const hm=(b.phase==="out")?b.hitO:b.hitB;
            if(hm[t.id]) continue;                              // 같은 적: 방향별 1회만
            hm[t.id]=true;
            const applied=applyDamage(t, bulletHitDamage(b,t), b.team, b.ownerId, b.x, b.y);
            if(applied>0){
              if(b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
              if(b.countsForPlayer){ stats.shotsHit++;
                tryChargeGauge(b.aid, t.id, ()=>{ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+GAME_CONFIG.superChargePerHit); }); }
              spawnHitFx(b.x,b.y,b.wid,b.color);
            }
            continue;                                           // 부메랑은 적을 관통(복귀 타격을 위해 유지)
          }
          if(b.ultCid && !canUltDamage(b.ultCid, t.id, b.ultMaxHits||4)){ b.alive=false; break; }  // 럭키 C: 같은 대상 최대 피해 40 상한
          const applied=applyDamage(t, bulletHitDamage(b,t), b.team, b.ownerId, b.x, b.y);
          if(applied>0 && b.wref) applyWeaponHitEffects(b.wref, t, b.x, b.y);
          if(applied>0 && b.countsForPlayer){
            stats.shotsHit++;
            tryChargeGauge(b.aid, t.id, ()=>{ superGauge=Math.min(GAME_CONFIG.superCharge, superGauge+GAME_CONFIG.superChargePerHit); });
          }
          if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,"3x3");   // 적 명중 3×3(§2.3)
          spawnHitFx(b.x,b.y,b.wid,b.color);
          b.alive=false; break;
        }
      }
      if(!b.alive) break;
      if(!b.boomerang && b.traveled>b.maxRange){
        if(RULE && RULE.id==="paint") paintSplash(b.x,b.y,b.team,_pByMe,_pStamp);   // 사거리 끝 소멸도 착탄 취급(§2.3)
        b.alive=false; break;
      }
    }
  }
  bullets=bullets.filter(b=>b.alive);
}
// 통통 거대 비행기(달이 C): 벽/외곽 반사. 같은 벽 0.12초 내 재반사 금지. 반사 6회/6초 초과 시 소멸.
function bounceBullet(b, wall, sx, sy){
  b.x-=sx; b.y-=sy;                                             // 벽 안에서 빼내기
  const now=b.age||0;
  if(b.lastWall===wall && now-(b.lastBounceAt||-1)<0.12) return true;  // 같은 벽 재반사 금지(모서리 떨림 방지)
  if((b.bounces||0)>=b.maxBounce) return false;
  // 어느 축으로 반사할지: 벽 사각형 기준 침투 방향 판단
  if(wall){
    const cx=clamp(b.x, wall.x, wall.x+wall.w), cy=clamp(b.y, wall.y, wall.y+wall.h);
    if(Math.abs(b.x-cx)>Math.abs(b.y-cy)) b.vx=-b.vx; else b.vy=-b.vy;
  } else { b.vx=-b.vx; }
  b.bounces=(b.bounces||0)+1; b.lastWall=wall; b.lastBounceAt=now;
  spawnHit(b.x,b.y,b.color);
  return true;
}

function updateEffects(dt){
  for(const e of effects){ e.t+=dt; if(e.vx!==undefined){ e.x+=e.vx*dt; e.y+=e.vy*dt; } }
  effects=effects.filter(e=>e.t<e.life);
  for(const n of damageNumbers){ n.t+=dt; n.y+=n.vy*dt; }
  damageNumbers=damageNumbers.filter(n=>n.t<n.life);
}

function update(dt){
  uiTime+=dt;
  if(toastTimer>0) toastTimer-=dt;
  if(gameState===STATE.SPLASH){ splashTimer+=dt; if(splashTimer>1.4) goToLogin(); return; }  // 타이틀 1.4초 후 로그인
  if(confirmLeave) return;   // 나가기 확인 중에는 게임 진행 멈춤(입력이 밑에서 계속 먹지 않도록)
  if(gameState===STATE.ONLINE_PLAYING){ updateOnline(dt); return; }
  if(gameState===STATE.PLATFORMER){ pfUpdate(dt); return; }   // GENRE-EXPAND-1 §3: 별도 루프(중력이 탑다운에 안 샘)
  if(gameState!==STATE.PLAYING) return;
  matchElapsed+=dt;
  for(const f of allFighters()){ f.displayHp=lerp(f.displayHp, f.hp, Math.min(1,dt*8)); tickStatus(f,dt); applyTrapTo(f); }   // 함정/상태(둔화·버프) — 성능(코드감사): 두 루프 병합(allFighters 배열 생성 1회)
  updatePlayer(dt);
  for(const a of allies) updateAI(a, dt);
  for(const e of enemies) updateAI(e, dt);
  updateBullets(dt);
  tickSkillZones(dt, envLocal());                                     // X/C 장판(별똥별·가시·얼음·구급상자·블랙홀)
  tickPowerupsHost(dt, [player]);                                     // 아이템: 로컬은 플레이어만 획득
  if(RULE) tickRule(dt);                                              // GAMEPLAY-1 Phase 3: 포탑/거점/별 진행 + 즉시 승리
  if(matchRuleId()==="tdm") tickBuffOrbs();                           // GAMEPLAY-1 1D: 성장 오브 픽업(섬멸전)
  updateEffects(dt);
  const _tl=matchTimeLimit();
  if(gameState===STATE.PLAYING && matchElapsed>=_tl){ matchElapsed=_tl; ruleTimeUp(); }   // 규칙별 시간 종료 판정(tdm은 점수 비교)
}

/* =======================================================================
   보상 (종료 시 한 번만)
   ======================================================================= */
function calculateMatchReward(){
  let gold=0, result;
  if(RULE && RULE.winner) result = (RULE.winner==="player")?"win":((RULE.winner==="enemy")?"lose":"draw");   // 오브젝트 모드: 규칙 승자 기준
  else if(playerTeamScore>enemyTeamScore) result="win";
  else if(playerTeamScore<enemyTeamScore) result="lose";
  else result="draw";
  if(result==="win") gold+=REWARD_CONFIG.win;
  else if(result==="draw") gold+=REWARD_CONFIG.draw;
  else gold+=REWARD_CONFIG.lose;
  gold+=stats.kills*REWARD_CONFIG.perKill;
  if(stats.bossKilled) gold+=REWARD_CONFIG.boss;
  if(result==="win" && selectedDifficultyId==="hard") gold+=REWARD_CONFIG.hardWinBonus;
  if(result==="win" && selectedModeId==="trio") gold+=REWARD_CONFIG.mode3v3WinBonus;
  return { gold:gold, result:result };
}
// BIG-BATCH-1 E16: 레벨 필요 경험치(Lv1→2: 80, 레벨당 +40) — 시작값·튜닝 대상
function expNeed(level){ return 80 + (Math.max(1,level)-1)*40; }
function addExp(n){
  profile.exp=(profile.exp||0)+n; profile.level=profile.level||1;
  let ups=0;
  while(profile.exp>=expNeed(profile.level)){ profile.exp-=expNeed(profile.level); profile.level++; ups++; }
  if(ups>0) showToast("🎉 레벨 업! Lv."+profile.level);
}
function grantMatchReward(){
  if(matchRewardGiven) return;
  matchRewardGiven=true;
  const r=calculateMatchReward();
  // BIG-BATCH-1 E17: 방치 방지 — 이번 판 기여(딜·킬·보스)가 0이면 보상 30%(아군 봇 캐리로 골드 수급되던 구멍)
  matchIdle = (stats.damageDealt<=0 && stats.kills<=0 && !stats.bossKilled);
  // GENRE-EXPAND-1 §4.1: 모드별 기여 지표 — 술래=생존 15초+ 또는 감염 1+ · 칠하기=칠 1칸+
  if(RULE && RULE.id==="tag") matchIdle = !(RULE.myInfections>0 || RULE.mySurvival>=15);
  if(RULE && RULE.id==="paint") matchIdle = !(RULE.myPaint>0);
  playSfx(r.result==="win"?"win":"lose");   // E14 훅
  matchGoldEarned = matchIdle ? Math.round(r.gold*REWARD_CONFIG.idleMul) : r.gold;
  addGold(matchGoldEarned);
  // BIG-BATCH-1 E16: 경험치 — 결과 + 처치 + 보스(방치 배율 동일 적용)
  let exp=(r.result==="win"?EXP_CONFIG.win:(r.result==="draw"?EXP_CONFIG.draw:EXP_CONFIG.lose))
        + stats.kills*EXP_CONFIG.perKill + (stats.bossKilled?EXP_CONFIG.boss:0);
  matchExpEarned = matchIdle ? Math.round(exp*REWARD_CONFIG.idleMul) : exp;
  addExp(matchExpEarned);
  profile.totalPlays+=1;
  profile.totalKills+=stats.kills;
  if(stats.bossKilled) profile.bossKills+=1;
  if(r.result==="win") profile.wins+=1;
  else if(r.result==="lose") profile.losses+=1;
  else profile.draws+=1;

  matchDropName="";
  // 무기 드랍: 학생 6종 고정 체제에서는 해금 개념이 없어 잠금(상점 재개편 때 함께 복구)
  const locked = SHOP_ENABLED ? WEAPONS.filter(w=>profile.unlockedWeapons.indexOf(w.id)<0) : [];
  if((r.result==="win"||stats.bossKilled) && locked.length>0 && Math.random()<REWARD_CONFIG.weaponDropChance){
    const drop=locked[Math.floor(Math.random()*locked.length)];
    unlockWeapon(drop.id); matchDropName=drop.name;
  }
  saveProfile();
}

function spawnMuzzle(x,y,dx,dy,color){ effects.push({kind:"muzzle",x,y,dx,dy,t:0,life:0.12,color:color||"#fff6c0"}); }
function spawnHit(x,y,color){
  effects.push({kind:"hit",x,y,t:0,life:0.25,color:color});
  for(let i=0;i<5;i++){ const a=rand(0,Math.PI*2),sp=rand(60,160); effects.push({kind:"spark",x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,t:0,life:0.3,color:color}); }
}
function spawnDamageNumber(x,y,value,color){ damageNumbers.push({x:x+rand(-6,6),y:y,vy:-55,t:0,life:0.85,value:value,color:color}); }
function spawnDeathBurst(f){
  const col=f.team==="player"?f.color:(f.isBoss?"#ff6a86":"#c98bff");
  effects.push({kind:"death",x:f.x,y:f.y,t:0,life:0.6,color:col,big:f.isBoss});

}
function spawnRespawnRing(f){ effects.push({kind:"respawn",x:f.x,y:f.y,t:0,life:0.5,color:f.team==="player"?f.color:"#c98bff"}); }
function spawnSuperWave(x,y,radius){ effects.push({kind:"superwave",x,y,t:0,life:0.55,radius:radius}); }

/* =======================================================================
   그리기
   ======================================================================= */
function roundRect(x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawStar(cx,cy,spikes,outerR,innerR,color){
  ctx.fillStyle=color; ctx.beginPath();
  let rot=-Math.PI/2; const step=Math.PI/spikes;
  ctx.moveTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR);
  for(let i=0;i<spikes;i++){ rot+=step; ctx.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step; ctx.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); }
  ctx.closePath(); ctx.fill();
}
function hexA(hex,a){
  if(!hex || hex[0]!=="#" || hex.length<7) return "rgba(255,255,255,"+a+")";
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return "rgba("+r+","+g+","+b+","+a+")";
}

function render(){
  const sx=canvas.width/LOGW, sy=canvas.height/LOGH;
  ctx.setTransform(sx,0,0,sy,0,0);
  ctx.clearRect(0,0,LOGW,LOGH);

  drawBackground();
  // v1.26 배경 정돈: 실제 게임 맵(바닥·가시·바위·수풀·격자)은 플레이/온라인 화면에서만 렌더.
  // 로비·로그인·상점 등 메뉴 화면은 잔잔한 별밤(starfield)만. (플레이 화면 맵 렌더는 기존 그대로)
  const _worldVisible = gameState===STATE.PLAYING||gameState===STATE.PAUSED||gameState===STATE.OVER||isOnlineState();
  if(_worldVisible){ worldBegin(); drawStaticWorld(); }   // P4: 대형 맵 = 줌아웃 변환(기본 맵 no-op)
  else drawMenuStarfield();
  if(_worldVisible && gameState!==STATE.ONLINE_PLAYING) drawPaintGrid();   // GENRE-EXPAND-1 §2.5: 페인트(바닥 위·유닛 아래)
  if(gameState===STATE.PLAYING||gameState===STATE.PAUSED||gameState===STATE.OVER||gameState===STATE.ONLINE_PLAYING) drawPowerups(powerupsView());

  if(gameState===STATE.PLAYING || gameState===STATE.PAUSED || gameState===STATE.OVER){
    drawRuleObjects();                     // GAMEPLAY-1 Phase 3: 존/수정탑/벽/별(파이터 아래층)
    drawBuffOrbs();                        // GAMEPLAY-1 1D: 성장 오브
    drawSkillZonesPacked(packZones());     // X/C 장판(별똥별 예고·가시·얼음·구급상자·블랙홀)
    drawBullets();
    for(const e of enemies) drawFighter(e);

    drawEffects();
    drawDamageNumbers();

  }

  if(gameState===STATE.ONLINE_PLAYING) renderOnlineMatch();
  worldEnd();                              // P4: 안전망(온라인 로비/결과 등 — 미사용 시 무해)

  if(gameState===STATE.SPLASH) drawSplashScreen();
  else if(gameState===STATE.START) drawStartScreen();
  else if(gameState===STATE.ASSET_CHECK) drawAssetCheckScreen();
  else if(gameState===STATE.PROFILE) drawProfileScreen();
  else if(gameState===STATE.COLLECTION) drawCollectionScreen();
  else if(gameState===STATE.LOGIN) drawLoginScreen();
  else if(gameState===STATE.ADMIN_LOGIN) drawAdminLoginScreen();
  else if(gameState===STATE.ADMIN) drawAdminScreen();
  else if(gameState===STATE.BALANCE) drawBalanceScreen();
  else if(gameState===STATE.PF_SELECT) drawPfSelect();
  else if(gameState===STATE.SHOP) drawShopScreen();
  else if(gameState===STATE.EDITOR) drawEditorScreen();
  else if(gameState===STATE.MAP_REVIEW) drawMapReviewScreen();
  else if(gameState===STATE.ONLINE_MENU) drawOnlineMenu();
  else if(gameState===STATE.ONLINE_LOBBY) drawOnlineLobby();
  else if(gameState===STATE.ONLINE_OVER) drawOnlineOver();
  else if(gameState===STATE.PAUSED) drawPauseScreen();
  else if(gameState===STATE.OVER) drawResultScreen();

  drawControlOverlays();   // UPDATE-1 P3: 마우스 크로스헤어 / 터치 조이스틱(플레이 중에만)
  if(confirmLeave) drawLeaveConfirm();
  drawToast();
}

// Esc 나가기 확인 오버레이(Canvas 안). window.confirm 대신 사용.
function drawLeaveConfirm(){
  dimScreen(0.66);
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  const bw=560, bh=190, bx=LOGW/2-bw/2, by=LOGH/2-bh/2;

/* OVERNIGHT-1 1-4: 쿠션벽 9-slice(336×336 = 112px 3×3) — 코너/엣지/센터를 잘라 임의 사각형에 맞춤 */
/* BIG-BATCH-1 A1: 쿠션벽 오토타일 — 56px 셀 벽이 각각 사방 테두리(9-slice)로 그려져 '표'처럼 보이던 문제.
   이웃 벽(같은 구조물 벽 — 팀 무관)을 보고 타일셋의 코너/엣지/센터 조각을 고른다. 충돌은 셀 그대로, 렌더만 병합.
   비정형 크기(siege 28×56 등)·고립 셀·이미지 없음은 기존 경로 유지. */
function drawWallAuto(o, tc){
  const img=worldImage("wall_tiles"); if(!img) return false;
  const CS=STUDENT_CELL, S=112;
  const cx=o.x+o.w/2, cy=o.y+o.h/2;
  const isWallAt=(px,py)=>{ for(const b of OBSTACLES){ if(!b.sid||!b.structure||b.sid.indexOf("rtower_")===0||!(b.hp>0)) continue;
    if(px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h) return true; } return false; };
  const gridCell = Math.abs(o.w-CS)<=2 && Math.abs(o.h-CS)<=2;
  const L=gridCell&&isWallAt(cx-CS,cy), R=gridCell&&isWallAt(cx+CS,cy), U=gridCell&&isWallAt(cx,cy-CS), D=gridCell&&isWallAt(cx,cy+CS);
  if(!gridCell || (!L&&!R&&!U&&!D)){
    if(!drawWallTile(o.x,o.y,o.w,o.h)) return false;
    ctx.strokeStyle=hexA(tc,0.8); ctx.lineWidth=2; roundRect(o.x-1,o.y-1,o.w+2,o.h+2,6); ctx.stroke();
    return true;
  }
  const scol=!L?0:(!R?2:1), srow=!U?0:(!D?2:1);
  ctx.drawImage(img, scol*S, srow*S, S, S, o.x, o.y, o.w, o.h);
  // 팀색 표시는 바깥 면에만 얇게(내부 이음새 선 제거)
  ctx.strokeStyle=hexA(tc,0.7); ctx.lineWidth=2; ctx.beginPath();
  if(!L){ ctx.moveTo(o.x+1,o.y); ctx.lineTo(o.x+1,o.y+o.h); }
  if(!R){ ctx.moveTo(o.x+o.w-1,o.y); ctx.lineTo(o.x+o.w-1,o.y+o.h); }
  if(!U){ ctx.moveTo(o.x,o.y+1); ctx.lineTo(o.x+o.w,o.y+1); }
  if(!D){ ctx.moveTo(o.x,o.y+o.h-1); ctx.lineTo(o.x+o.w,o.y+o.h-1); }
  ctx.stroke();
  return true;
}
function drawWallTile(x,y,w,h){
  const img=worldImage("wall_tiles"); if(!img) return false;
  const S=112, c=Math.max(8, Math.min(22, w/2, h/2));   // 코너 렌더 크기
  const sx=[0,S,2*S], dx=[x, x+c, x+w-c], dw=[c, Math.max(0,w-2*c), c];
  const dy=[y, y+c, y+h-c], dh=[c, Math.max(0,h-2*c), c];
  for(let r=0;r<3;r++) for(let q=0;q<3;q++){
    if(dw[q]<=0.5||dh[r]<=0.5) continue;
    ctx.drawImage(img, sx[q], r*S, S, S, dx[q], dy[r], dw[q], dh[r]);
  }
  return true;
}
/* OVERNIGHT-1 1-4: 수풀 오토타일 — 이웃(다른 rect 포함)을 보고 코너/엣지/센터 조각 선택 */
function drawBushesAutotile(img){
  const CS=STUDENT_CELL, S=112;
  const inBush=(px,py)=>{ for(const b of BUSHES){ if(px>=b.x+1&&px<=b.x+b.w-1&&py>=b.y+1&&py<=b.y+b.h-1) return true; } return false; };
  for(const b of BUSHES){
    // BIG-BATCH-1 A2: 연녹 밑판(rgba 0.30) 제거 — 타일 실루엣과 이중으로 겹쳐 '스티커 두 장' 인상. 수풀 그림만으로 식별 충분.
    const cols=Math.max(1,Math.round(b.w/CS)), rows=Math.max(1,Math.round(b.h/CS));
    const cw=b.w/cols, chh=b.h/rows;
    for(let i=0;i<cols;i++) for(let j=0;j<rows;j++){
      const px=b.x+i*cw+cw/2, py=b.y+j*chh+chh/2;
      const L=inBush(px-CS,py), R=inBush(px+CS,py), U=inBush(px,py-CS), D=inBush(px,py+CS);
      if(!L&&!R&&!U&&!D){ ctx.drawImage(img, 0,0,S*3,S*3, b.x+i*cw-4, b.y+j*chh-4, cw+8, chh+8); continue; }   // 외딴 1칸 = 전체 축소(둥근 덤불)
      const scol = !L ? 0 : (!R ? 2 : 1);
      const srow = !U ? 0 : (!D ? 2 : 1);
      ctx.drawImage(img, scol*S, srow*S, S, S, b.x+i*cw, b.y+j*chh, cw, chh);
    }
  }
}
function drawBushes(){
  const timg=worldImage("bush_tiles");

function drawObstacles(){
  for(const o of OBSTACLES){

    ctx.save();

        const n=Math.max(2, Math.round(len/(s*0.62)));

    if(f.tagShield>0){

      ctx.setLineDash([7,5]); ctx.beginPath(); ctx.arc(f.x,f.y,f.r+9,uiTime*1.5,uiTime*1.5+Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.restore();
    }
    if(RULE.lastOne && RULE.survivors===1){
      const lp=0.5+0.5*Math.sin(uiTime*6);
      ctx.save(); ctx.globalAlpha=0.5+0.4*lp; ctx.strokeStyle="#ffd23f"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r+14+lp*4,0,Math.PI*2); ctx.stroke();
      ctx.textAlign="center"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe066";
      ctx.fillText("⭐ 최후의 생존자", f.x, f.y-f.r-58);
      ctx.restore();
    }
  }
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){   // BIG-BATCH-2 P1: 별 보유 배지 + 캐리어 표적 링
    ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.globalAlpha=alpha;
    ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.fillStyle="#ffe14d";
    ctx.fillText("⭐"+f.stars, f.x, f.y-f.r-44);
    if(f.stars>=RULE_CONFIG.stargrab.carrierMark){
      const cp=0.5+0.5*Math.sin(uiTime*5);
      ctx.strokeStyle=f.team==="player"?"#7fd6ff":"#ff8fa5"; ctx.lineWidth=2.5; ctx.globalAlpha=alpha*(0.5+0.4*cp);
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r+12+cp*3,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(f.x,f.y);
  // 캐릭터가 배정된 파이터(아군/플레이어/v1.27 적 캐릭터 봇)는 이미지 우선, 실패 시 도형.
  // 보스는 크롬 정체성 유지(항상 도형 크롬).
  let drew=false;
  const asChar = f.characterId && !f.isBoss;
  if(asChar){
    const attacking = f.lastFireTime!==undefined && (matchElapsed-f.lastFireTime) < 0.22;
    drew=drawCharacterSprite(f.characterId, f.r, f.facing,
      { moving:spriteMoving("L"+f.id,f.x,f.y), hit:f.hitFlash>0, attacking:attacking });
  }
  if(!drew){ if(asChar || f.team==="player") drawPlayerCharacter(f); else drawChrome(f); }
  // 별골렘 X 흡수막: 남은 흡수량에 비례하는 젤리 버블
  if(f.shieldAbsorb>0 && f.shieldAbsorbTimer>0){
    const ax=getAbility("student_06").x, k=clamp(f.shieldAbsorb/(ax.absorb||80),0.2,1);
    ctx.save(); ctx.globalAlpha=0.25+0.3*k; ctx.strokeStyle="#9fd0ff"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,f.r+7,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=0.10+0.12*k; ctx.fillStyle="#9fd0ff"; ctx.beginPath(); ctx.arc(0,0,f.r+7,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  if(f.hitFlash>0){ ctx.save(); ctx.globalAlpha=0.5*(f.hitFlash/0.15)*alpha; ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(f.x,f.y,f.r+2,0,Math.PI*2); ctx.fill(); ctx.restore(); }
  drawFighterInfo(f, alpha);
}
// 성능(코드감사): 파이터 글로우 그라디언트를 매 프레임 새로 만들지 않고 색·반경별로 캐시한다.
// 원점(0,0) 기준으로 그리므로 재사용해도 결과가 정확히 같다. (색 6종 × 반경 몇 종 → 캐시 크기 유한)
const _glowGradCache={};
function glowGradientFor(color, outerR, a0){
  const key=color+"|"+outerR+"|"+a0;
  let g=_glowGradCache[key];
  if(!g){ g=ctx.createRadialGradient(0,0,4,0,0,outerR); g.addColorStop(0,hexA(color,a0)); g.addColorStop(1,hexA(color,0)); _glowGradCache[key]=g; }
  return g;
}
function drawPlayerCharacter(f){
  const r=f.r;
  const glow=glowGradientFor(f.color, r+12, 0.55);
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+12,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#ffffff"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
  drawStar(0,0,5,r*0.62,r*0.28,f.subColor);
  ctx.save(); ctx.rotate(f.facing); ctx.fillStyle=f.subColor; roundRect(r-4,-6,16,12,4); ctx.fill(); ctx.restore();
}
function drawChrome(f){
  const r=f.r;
  const glow=glowGradientFor(f.subColor, r+14, 0.5);
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,r+14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=f.color; ctx.beginPath();
  for(let i=0;i<6;i++){ const a=Math.PI/6+i*Math.PI/3; const px=Math.cos(a)*r,py=Math.sin(a)*r; if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py); }
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle=f.subColor; ctx.lineWidth=3; ctx.stroke();
  ctx.save(); ctx.rotate(f.facing);
  ctx.fillStyle=f.isBoss?"#ffd400":"#ff4d6d"; roundRect(2,-7,r-4,14,4); ctx.fill();
  ctx.fillStyle="#6a2aa0"; roundRect(r-6,-6,14,12,3); ctx.fill();
  ctx.restore();
  if(f.isBoss){
    ctx.fillStyle="#ffd400";
    ctx.beginPath(); ctx.moveTo(-r*0.5,-r); ctx.lineTo(-r*0.2,-r-12); ctx.lineTo(-r*0.05,-r); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(r*0.5,-r); ctx.lineTo(r*0.2,-r-12); ctx.lineTo(r*0.05,-r); ctx.closePath(); ctx.fill();
  }
}
function drawBushRustle(x,y){
  ctx.save(); ctx.globalAlpha=0.5+0.3*Math.sin(uiTime*8); ctx.fillStyle="rgba(120,220,150,0.6)";
  ctx.beginPath(); ctx.arc(x-6,y,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x+7,y-4,3,0,Math.PI*2); ctx.fill(); ctx.restore();
}
function drawFighterInfo(f, alpha){
  const w=f.isBoss?80:54, h=f.isBoss?10:8;
  const bx=f.x-w/2, by=f.y-f.r-24;
  ctx.save(); ctx.globalAlpha=Math.max(0.5,alpha); ctx.textAlign="center";
  ctx.textBaseline="bottom";
  ctx.fillStyle=f.team==="player"?"#dff1ff":(f.isBoss?"#ffd0d8":"#e6c0ff");
  ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText(f.name,f.x,by-2);
  ctx.fillStyle="rgba(0,0,0,0.5)"; roundRect(bx,by,w,h,4); ctx.fill();
  const dispR=clamp(f.displayHp/f.maxHp,0,1);
  ctx.fillStyle="rgba(255,255,255,0.45)"; roundRect(bx,by,w*dispR,h,4); ctx.fill();
  const ratio=clamp(f.hp/f.maxHp,0,1);
  ctx.fillStyle=f.isBoss?"#ff5a5a":(ratio>0.5?"#4bd86b":(ratio>0.25?"#ffd24d":"#ff5a5a"));
  roundRect(bx,by,w*ratio,h,4); ctx.fill();
  ctx.fillStyle="#ffffff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textBaseline="alphabetic";
  ctx.fillText(Math.ceil(f.hp),f.x,by+h+12);
  if(f.invincibleTimer>0){ ctx.fillStyle="#9fe8ff"; ctx.font="bold 10px 'Malgun Gothic',sans-serif"; ctx.fillText("무적",f.x,by-15); }
  // GAMEPLAY-1 stargrab: 들고 있는 별 표시
  if(RULE && RULE.id==="stargrab" && (f.stars||0)>0){
    ctx.fillStyle="#ffe14d"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.fillText("⭐"+f.stars, f.x+w/2+16, by+4);
  }
  ctx.restore();
}
function drawBullets(){
  ctx.save();   // 성능(코드감사): save/restore를 탄환마다 → 함수당 1회(루프는 globalAlpha를 스스로 복원)
  for(const b of bullets){
    // 도구 발사체 이미지: 탄환에 기록된 무기 id(wid)로 그린다(아군 봇 포함). 없으면 기존 원형 탄환.
    if(b.wid && drawProjectileSprite(b.wid, b.x, b.y, b.r, Math.atan2(b.vy||0,b.vx||0))) continue;
    const color=b.color||"#ffe066";
    // v1.21 성능: 탄환 글로우를 그라데이션 → 반투명 원(탄막 다수일 때 프레임당 그라데이션 생성 비용 제거)
    ctx.globalAlpha=0.30; ctx.fillStyle=color; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*1.9,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle="#ffffff"; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.7,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}
function drawEffects(){
  ctx.save();   // 성능(코드감사): save/restore를 효과마다 → 함수당 1회. 텍스트 정렬을 바꾸는 분기만 개별 save/restore 유지
  for(const e of effects){
    const k=e.t/e.life;
    if(e.kind==="muzzle"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x+e.dx*8,e.y+e.dy*8,10*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="hit"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,6+18*k,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="spark"){ ctx.globalAlpha=1-k; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,3*(1-k)+1,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="dashTrail"){ ctx.globalAlpha=(1-k)*0.6; ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x,e.y,12*(1-k)+4,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="death"){ ctx.globalAlpha=(1-k)*0.8; const r=(e.big?20:12)+(e.big?100:60)*k; const g=ctx.createRadialGradient(e.x,e.y,2,e.x,e.y,r); g.addColorStop(0,e.color); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.fill(); }
    else if(e.kind==="respawn"){ ctx.globalAlpha=1-k; ctx.strokeStyle=e.color; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(e.x,e.y,50*(1-k)+6,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superwave"){ ctx.globalAlpha=(1-k)*0.85; const r=e.radius*k; ctx.strokeStyle="#ffe066"; ctx.lineWidth=8*(1-k)+2; ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke(); ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,r*0.7,0,Math.PI*2); ctx.stroke(); }
    else if(e.kind==="superfail"){ ctx.save(); ctx.globalAlpha=1-k; ctx.fillStyle="#ffffff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("게이지 부족!",e.x,e.y-50-20*k); ctx.restore(); }
    else if(e.kind==="bossArrival"){ ctx.save(); // 성능(코드감사): 게임 중 1.6초간 매 프레임 70px 텍스트 shadowBlur → 스프라이트 1회 굽기로 대체
      ctx.globalAlpha=Math.sin(Math.min(1,k*2)*Math.PI)*0.9;
      const bsp=glowTextSprite("보스 등장!","bold 70px 'Malgun Gothic',sans-serif","#ff4d6d","rgba(255,80,110,0.9)",30);
      if(bsp){ ctx.drawImage(bsp, e.x-bsp.width/2, e.y-bsp.height/2); }
      else { ctx.fillStyle="#ff4d6d"; ctx.font="bold 70px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.shadowColor="rgba(255,80,110,0.9)"; ctx.shadowBlur=30; ctx.fillText("보스 등장!",e.x,e.y); ctx.shadowBlur=0; }
      ctx.restore(); }
    else if(e.kind==="hitfx"){   // 무기별 적중 효과(effect_hit.png). 파일 없으면 생성 시점에 fallback 처리됨.
      const w=getWeapon(e.wid), img=w?getWeaponImage(w.assetId||e.wid,"effect_hit"):null;
      if(img){ const s=(0.7+0.6*k)*34; ctx.globalAlpha=1-k; ctx.drawImage(img, e.x-s/2, e.y-s/2, s, s); }
      else { ctx.globalAlpha=1-k; ctx.strokeStyle="#fff0a0"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(e.x,e.y,6+18*k,0,Math.PI*2); ctx.stroke(); }
    }
  }
  ctx.restore();
}
// X/C 장판 그리기(로컬=packZones(), 게스트=state.zones 공용 — 숫자만으로 렌더)
/* v1.22 구조물 렌더: k 0=방어 수정(별수정 이미지) 1=몬스터 문 2=쿠션 벽 — HP바 포함 */
function drawStructsPacked(list){
  if(!list || !list.length) return;
  const imgs=["ob_crystal","st_gate","st_wall"], defs=[STRUCT_DEFS.core,STRUCT_DEFS.gate,STRUCT_DEFS.wall];   /* v1.23: 수정=crystal_01(별수정) — box와 구분(코덱스 회차8) */
  for(const st of list){
    if(st.hp<=0) continue;
    const def=defs[st.k]||defs[2], img=worldImage(imgs[st.k]);
    ctx.save();
    ctx.fillStyle="rgba(0,0,0,0.20)";
    ctx.beginPath(); ctx.ellipse(st.x, st.y+def.h*0.42, def.w*0.62, def.h*0.2, 0, 0, Math.PI*2); ctx.fill();
    if(st.k===2 && drawWallTile(st.x-def.w/2, st.y-def.h/2, def.w, def.h)){
      /* OVERNIGHT-1: 쿠션벽은 타일셋(9-slice) 우선 */
    } else if(img){
      // OVERNIGHT-1 footprint 정렬: 재작 프롭(수정 112×128 · 문 224×140)은 밑면 폭 = footprint 폭
      const iw=img.naturalWidth||1, ih=img.naturalHeight||1, dw=def.w, dh=dw*(ih/iw);
      ctx.drawImage(img, st.x-dw/2, st.y+def.h/2-dh, dw, dh);
    } else {
      ctx.fillStyle=st.k===0?"#7fd6ff":(st.k===1?"#b06be0":"#ff9ec2");
      roundRect(st.x-def.w/2, st.y-def.h/2, def.w, def.h, 10); ctx.fill();
      ctx.strokeStyle="#ffffff"; ctx.lineWidth=3; roundRect(st.x-def.w/2, st.y-def.h/2, def.w, def.h, 10); ctx.stroke();
    }
    // HP바(수정은 크게·항상, 문/벽은 작게)
    const big=st.k===0, bw=big?110:56, bh=big?10:6, bx=st.x-bw/2, by=st.y-def.h/2-(big?22:14);
    ctx.fillStyle="rgba(0,0,0,0.55)"; roundRect(bx,by,bw,bh,4); ctx.fill();
    const ratio=clamp(st.hp/st.mh,0,1);
    ctx.fillStyle= big ? (ratio>0.5?"#5fd0ff":(ratio>0.25?"#ffd23f":"#ff6a6a")) : "#c99bff";
    roundRect(bx,by,bw*ratio,bh,4); ctx.fill();
    if(big){ ctx.strokeStyle="#bfeaff"; ctx.lineWidth=2; roundRect(bx,by,bw,bh,4); ctx.stroke();
      ctx.fillStyle="#dff4ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="bottom";
      ctx.fillText("방어 수정 "+Math.ceil(st.hp), st.x, by-2); }
    ctx.restore();
  }
}

const _bhGradCache={};   // 블랙홀 그라디언트 캐시(반경별 — packZones가 반경을 정수로 보내 키가 유한)
function drawSkillZonesPacked(list){
  if(!list || !list.length) return;
  for(const z of list){
    ctx.save();
    if(z.t===0){        // 별똥별 예고(경고 원 + 줄어드는 링)

    } else if(z.t===2){ // 얼음 바닥 — 코덱스 ice_field 이미지(없으면 도형)

      } else {

        ctx.globalAlpha=0.8; ctx.strokeStyle="#dff4ff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle="#eef9ff"; ctx.font="bold 14px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("❄",z.x,z.y+5);
      }
    } else if(z.t===3){ // 회복 오오라 기물(모아 X): 초록 오오라 원 + 기물 + 하트
      const p=0.5+0.5*Math.sin(uiTime*4);
      ctx.globalAlpha=0.16+0.08*p; ctx.fillStyle="#5ad36b"; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.75; ctx.strokeStyle="#8fffb3"; ctx.lineWidth=2;
      ctx.setLineDash([10,7]); ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
      ctx.globalAlpha=0.95; ctx.fillStyle="#eafff0"; roundRect(z.x-12,z.y-16,24,26,6); ctx.fill();
      ctx.strokeStyle="#5ad36b"; ctx.lineWidth=2; roundRect(z.x-12,z.y-16,24,26,6); ctx.stroke();
      ctx.fillStyle="#e05a7a"; ctx.font="bold 15px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.fillText("♥",z.x,z.y+1-2*p);
    } else if(z.t===6){ // 달이 C 저격선: 발사 방향 일직선 섬광(잠깐 표시 후 사라짐)
      const k=clamp((z.tm||0)/0.28,0,1), ex=z.x+Math.cos(z.a||0)*(z.l||900), ey=z.y+Math.sin(z.a||0)*(z.l||900);
      ctx.globalAlpha=0.55*k; ctx.strokeStyle="#fff3b0"; ctx.lineWidth=(z.r||28)*2*k;
      ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke();
      ctx.globalAlpha=0.9*k; ctx.strokeStyle="#ffffff"; ctx.lineWidth=Math.max(2,(z.r||28)*0.5*k);
      ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke();
    } else if(z.t===7){ // 달이 C 시전 예고선(OVERNIGHT-1 2-5): 점점 진해지는 점선 — 피할 시간을 준다
      const k=clamp(1-(z.tm||0)/0.35,0.2,1), ex=z.x+Math.cos(z.a||0)*(z.l||900), ey=z.y+Math.sin(z.a||0)*(z.l||900);
      ctx.globalAlpha=0.35+0.4*k; ctx.strokeStyle="#eef2f6"; ctx.lineWidth=2+3*k;
      ctx.setLineDash([14,10]); ctx.beginPath(); ctx.moveTo(z.x,z.y); ctx.lineTo(ex,ey); ctx.stroke(); ctx.setLineDash([]);
    } else if(z.t===4){ // 블랙홀 — 성능(코드감사): 원점 기준 translate로 바꿔 그라디언트를 반경별 1회만 생성
      ctx.translate(z.x,z.y);
      let g=_bhGradCache[z.r];
      if(!g){ g=ctx.createRadialGradient(0,0,4,0,0,z.r);
        g.addColorStop(0,"rgba(60,20,120,0.85)"); g.addColorStop(0.6,"rgba(122,92,255,0.35)"); g.addColorStop(1,"rgba(122,92,255,0)");
        _bhGradCache[z.r]=g; }
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,z.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.9; ctx.strokeStyle="#c3b6ff"; ctx.lineWidth=2;
      for(let i=0;i<3;i++){ const a=uiTime*2.2+i*Math.PI*2/3; ctx.beginPath(); ctx.arc(0,0,z.r*(0.35+0.2*i),a,a+1.6); ctx.stroke(); }
    }

}
function drawDamageNumbers(){

const SKILL_GLYPH_X={ student_01:"✶", student_02:"◎", student_03:"▲", student_04:"❄", student_05:"♥", student_06:"◆" };
function fitText(t, maxW){ t=String(t||""); while(t.length>1 && ctx.measureText(t).width>maxW) t=t.slice(0,-1); return t; }
function dockBase(cx,cy,R){
  ctx.fillStyle="rgba(6,10,26,0.88)"; ctx.beginPath(); ctx.arc(cx,cy,R+5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#3a4470"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,R+5,0,Math.PI*2); ctx.stroke();
}
function dockKeycap(cx,y,letter,glow){

  ctx.strokeStyle=glow?"#fff3b0":"#5a6a9a"; ctx.lineWidth=1.5; roundRect(cx-10,y-8,20,16,5); ctx.stroke();
  ctx.fillStyle=glow?"#3a2f00":"#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";

function dockWeaponIcon(wid,cx,cy,size){
  try{
    const w=getWeapon(wid); if(!w||!w.assetId) return false;
    const img=getWeaponImage(w.assetId,"projectile"); if(!img) return false;
    const iw=img.naturalWidth||1, ih=img.naturalHeight||1, k=Math.min(size/iw,size/ih);
    ctx.drawImage(img, cx-iw*k/2, cy-ih*k/2, iw*k, ih*k); return true;
  }catch(e){ return false; }
}
function dockLock(cx,cy,R){   // GENRE-EXPAND-1 §1.3: 모드 잠금 표시
  ctx.fillStyle="rgba(8,10,26,0.62)"; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

function drawSkillDock(s){
  if(!s) return;
  const cy=685, R=21, cxZ=LOGW/2-96, cxX=LOGW/2, cxC=LOGW/2+96;
  ctx.save(); ctx.textAlign="center"; ctx.textBaseline="middle";
  // BIG-BATCH-1 A4: 스킬명 텍스트 라벨 제거 — 아이콘 독(링·글리프·키캡)만으로 충분, 글자 소음 제거.

  // ── Z: 탄창 링 ──
  dockBase(cxZ,cy,R);
  if(s.infAmmo){
    ctx.strokeStyle="#ffd23f"; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cxZ,cy,R,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#ffe066"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText("∞", cxZ, cy+1);
  } else if(s.reloading){
    ctx.strokeStyle="rgba(255,210,77,0.95)"; ctx.lineWidth=4;
    if(s.reloadProg!=null){ ctx.beginPath(); ctx.arc(cxZ,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*clamp(s.reloadProg,0,1)); ctx.stroke(); }
    else { const a0=uiTime*5; ctx.beginPath(); ctx.arc(cxZ,cy,R,a0,a0+1.7); ctx.stroke(); }   // 게스트: 진행도 미수신 → 스피너
    ctx.fillStyle="#ffd24d"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText("장전", cxZ, cy+1);
  } else if(s.ammo!==undefined && s.mag){
    const n=s.mag, seg=Math.PI*2/n, gap=Math.min(0.14, seg*0.3);
    for(let i=0;i<n;i++){
      const a0=-Math.PI/2+i*seg+gap/2, a1=-Math.PI/2+(i+1)*seg-gap/2;
      ctx.strokeStyle = i<s.ammo ? (s.ammo<=2?"#ff8a8a":"#8fd0ff") : "rgba(255,255,255,0.13)";
      ctx.lineWidth=4; ctx.beginPath(); ctx.arc(cxZ,cy,R,a0,a1); ctx.stroke();
    }
    if(!dockWeaponIcon(s.wid,cxZ,cy,26)){ ctx.fillStyle=s.ammo<=2?"#ff9a9a":"#eaf4ff"; ctx.font="bold 16px 'Malgun Gothic',sans-serif"; ctx.fillText(String(s.ammo), cxZ, cy+1); }
  }
  if(s.zLocked) dockLock(cxZ,cy,R);
  dockKeycap(cxZ, cy+R+4, "Z", false);

  // ── X: 쿨타임 스윕 ──
  dockBase(cxX,cy,R);
  const xMax=Math.max(0.1, s.xcdMax||8), xLeft=clamp((s.xc||0)/xMax,0,1), xReady=(s.xc||0)<=0;
  const glyph=SKILL_GLYPH_X[s.charId]||"X";
  if(xReady){
    const p=0.5+0.5*Math.sin(uiTime*6);
    ctx.fillStyle="rgba(120,220,130,0.22)"; ctx.beginPath(); ctx.arc(cxX,cy,R,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(160,255,170,"+(0.55+0.45*p)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxX,cy,R+1,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#bfffc8"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText(glyph, cxX, cy+1);
  } else {
    // 준비된 만큼 시계방향으로 차오르는 부채꼴
    ctx.fillStyle="rgba(120,220,130,0.20)";
    ctx.beginPath(); ctx.moveTo(cxX,cy); ctx.arc(cxX,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-xLeft)); ctx.closePath(); ctx.fill();
    ctx.strokeStyle="#6fae77"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxX,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-xLeft)); ctx.stroke();
    ctx.globalAlpha=0.35; ctx.fillStyle="#bfffc8"; ctx.font="bold 19px 'Malgun Gothic',sans-serif"; ctx.fillText(glyph, cxX, cy-4); ctx.globalAlpha=1;
    ctx.fillStyle="#dfe6ff"; ctx.font="bold 11px 'Malgun Gothic',sans-serif"; ctx.fillText((s.xc).toFixed(1), cxX, cy+11);
  }
  if(s.xLocked) dockLock(cxX,cy,R);
  dockKeycap(cxX, cy+R+4, "X", xReady && !s.xLocked);

  // ── C: 골드 게이지 링 ──
  dockBase(cxC,cy,R);
  const cRatio=clamp((s.sg||0)/(s.superMax||100),0,1), cReady=cRatio>=1;
  ctx.strokeStyle="#2c3560"; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(cxC,cy,R,0,Math.PI*2); ctx.stroke();
  if(cRatio>0){
    ctx.strokeStyle=cReady?"#ffd23f":"#e8b93a"; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(cxC,cy,R,-Math.PI/2,-Math.PI/2+Math.PI*2*cRatio); ctx.stroke();
  }
  if(cReady){
    const p=0.5+0.5*Math.sin(uiTime*8);
    ctx.strokeStyle="rgba(255,225,80,"+(0.4+0.6*p)+")"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cxC,cy,R+6,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle="#ffe066"; ctx.font="bold "+(18+Math.round(p*3))+"px 'Malgun Gothic',sans-serif"; ctx.fillText("★", cxC, cy+1);
  } else {
    ctx.fillStyle="#ffe066"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText(Math.floor(cRatio*100)+"%", cxC, cy+1);
  }
  if(s.cLocked) dockLock(cxC,cy,R);
  dockKeycap(cxC, cy+R+4, "C", cReady && !s.cLocked);
  ctx.restore();
}

let _cursorHidden=false;
function drawControlOverlays(){
  const m=controlMode(), playing=inPlayState();
  const wantHide=(m==="mouse" && playing);
  if(wantHide!==_cursorHidden){ _cursorHidden=wantHide; try{ canvas.style.cursor=wantHide?"none":"default"; }catch(e){} }
  if(!playing) return;
  if(m==="mouse" && MOUSE.seen){
    ctx.save(); ctx.strokeStyle="rgba(255,240,170,0.9)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(MOUSE.x,MOUSE.y,9,0,Math.PI*2); ctx.stroke();

    ctx.moveTo(MOUSE.x,MOUSE.y-14); ctx.lineTo(MOUSE.x,MOUSE.y-5); ctx.moveTo(MOUSE.x,MOUSE.y+5); ctx.lineTo(MOUSE.x,MOUSE.y+14); ctx.stroke();
    ctx.restore();
  } else if(m==="touch"){
    const stick=(anchor,vec,rad,color)=>{
      if(!anchor) return;
      ctx.globalAlpha=0.35; ctx.fillStyle="rgba(20,26,60,0.8)"; ctx.beginPath(); ctx.arc(anchor.x,anchor.y,rad,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=0.6; ctx.strokeStyle=color; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(anchor.x,anchor.y,rad,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=0.85; ctx.fillStyle=color;
      ctx.beginPath(); ctx.arc(anchor.x+vec.x*rad*0.7, anchor.y+vec.y*rad*0.7, 18, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    };
    ctx.save();
    if(TOUCH.moveId!==null) stick(TOUCH.moveAnchor, TOUCH.moveVec, 60, "#7fd6ff");
    if(TOUCH.aimId!==null) stick(TOUCH.aimAnchor, TOUCH.aimVec, 70, "#ff9a9a");

/* 성능(코드감사): shadowBlur는 캔버스 2D에서 가장 비싼 연산(매 프레임 블러 패스) — 크롬북에서 체감 렉의 주범.
   글로우 텍스트를 오프스크린 캔버스에 1회만 구워 두고 drawImage로 재사용한다.
   blur=0으로 부르면 또렷한 본문만 구워져, '글로우(펄스 알파) + 본문(불투명)' 2장 합성이 기존 연출과 동일하다.
   하니스(Node)에는 document.createElement가 없어 null 반환 → 호출부가 기존 shadowBlur 경로로 fallback. */
const _glowTextCache={};
function glowTextSprite(text, font, fill, glowColor, blur){
  const key=text+"|"+font+"|"+fill+"|"+glowColor+"|"+blur;
  if(key in _glowTextCache) return _glowTextCache[key];
  let cv=null;
  try{
    const m=document.createElement("canvas"), g=m.getContext("2d");
    g.font=font;
    const size=parseInt((font.match(/(\d+)px/)||[0,"20"])[1],10);
    const pad=blur*2+8, tw=Math.ceil(g.measureText(text).width);
    m.width=tw+pad*2; m.height=Math.ceil(size*1.6)+pad*2;
    g.font=font; g.textAlign="center"; g.textBaseline="middle";
    if(blur>0){ g.shadowColor=glowColor; g.shadowBlur=blur; }
    g.fillStyle=fill; g.fillText(text, m.width/2, m.height/2);
    cv=m;
  }catch(e){ cv=null; }
  _glowTextCache[key]=cv;
  return cv;
}

function superDescOf(char){

function norm01(v,lo,hi){ return clamp((v-lo)/(hi-lo),0,1); }
function drawStatBar(label, val, x, y, w){
  ctx.textAlign="left"; ctx.textBaseline="middle";
  ctx.fillStyle="#aab4e0"; ctx.font="bold 12px 'Malgun Gothic',sans-serif"; ctx.fillText(label, x, y);

  ctx.fillStyle="rgba(0,0,0,0.4)"; roundRect(bx,y-bh/2,bw,bh,5); ctx.fill();

// 상용게임 느낌의 캐릭터/도구 카드(이름·역할·설명·도구·궁극기·능력치 막대)
function drawCharacterCard(x,y,w,h,ch,wpn){
  ctx.save();
  ctx.fillStyle="rgba(16,22,52,0.9)"; roundRect(x,y,w,h,14); ctx.fill();
  ctx.strokeStyle=ch.color; ctx.lineWidth=3; roundRect(x,y,w,h,14); ctx.stroke();
  // 미리보기 + 이름/역할 — 초상은 살짝 작게·아래로, 이름은 오른쪽으로(넓은 idle 프레임이 이름을 가리지 않게)
  ctx.save(); ctx.translate(x+40,y+58);
  if(!drawCharacterSprite(ch.id,20,Math.PI/2,{moving:false})) drawPlayerCharacter({r:20,color:ch.color,subColor:ch.subColor,facing:Math.PI/2});
  ctx.restore();
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle="#fff"; ctx.font="bold 22px 'Malgun Gothic',sans-serif"; ctx.fillText(ch.name, x+92, y+38);
  ctx.fillStyle="#ffe066"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText(ch.role||"캐릭터", x+92, y+58);
  // 설명
  ctx.fillStyle="#cfd6f0"; ctx.font="13px 'Malgun Gothic',sans-serif"; ctx.fillText(ch.desc||"", x+18, y+92);
  // 능력치 막대
  const cardW=w-36, sx=x+18; let sy=y+118;
  const dmg=ch.damageMul*(wpn?wpn.damageMul:1), rng=(wpn?wpn.rangeMul:1)*ch.bulletSpeedMul;
  const ease=clamp((norm01(ch.hpMul,0.8,1.3)+ (1-norm01(ch.speedMul,0.85,1.35)))/2,0.05,1);
  drawStatBar("체력", norm01(ch.hpMul,0.8,1.25), sx, sy, cardW); sy+=22;
  drawStatBar("속도", norm01(ch.speedMul,0.85,1.35), sx, sy, cardW); sy+=22;
  drawStatBar("공격", norm01(dmg,0.4,2.6), sx, sy, cardW); sy+=22;
  drawStatBar("사거리", norm01(rng,0.5,1.7), sx, sy, cardW); sy+=22;
  drawStatBar("다루기쉬움", ease, sx, sy, cardW); sy+=30;
  // Z 고정 도구 / X 특수기술 / C 궁극기 (역할·기술 이름 표시)
  ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  ctx.fillStyle="#9fe0ff"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText("Z 도구: "+(wpn?wpn.name:"-")+" (고정)", sx, sy); sy+=20;
  ctx.fillStyle="#8fe08f"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText("X 특수기술: "+(ch.specialName||"-"), sx, sy); sy+=20;
  ctx.fillStyle="#ffd23f"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText("C 궁극기: "+(ch.ultName||ch.superName||"-"), sx, sy); sy+=20;
  if(ch.passiveName){ ctx.fillStyle="#c9a7ff"; ctx.font="bold 13px 'Malgun Gothic',sans-serif"; ctx.fillText("◈ 패시브: "+ch.passiveName, sx, sy); sy+=20; }   // v1.21
  ctx.fillStyle="#aab4e0"; ctx.font="12px 'Malgun Gothic',sans-serif"; ctx.fillText((wpn?(wpn.desc||""):"").slice(0,26), sx, sy);
  ctx.restore();
}

function drawEditorGrid(){
  const CS=STUDENT_CELL, panelW=250;
  const G=edGridGeom(), sc=G.sc, gx=G.gx, gy=G.gy, gw=G.gw, gh=G.gh;   // C9: 마우스와 지오메트리 공용
