let RPG_DB_LIVE=null;
function rpgDb(){ return RPG_DB_LIVE||RPG_DB; }   // merge(RPG_DB, 승인 학생분)
function rpgFind(tbl,id){ const t=rpgDb()[tbl]; if(!t||!id) return null; for(const r of t){ if(r.id===id) return r; } return null; }
function rpgItemAny(id){   // 인벤 표시/가격용 범용 조회 — seed_<cropId>는 씨앗 의사 아이템
  if(!id) return null;
  if(id.indexOf("seed_")===0){ const c=rpgFind("crops", id.slice(5)); return c?{ id:id, name:c.name+" 씨앗", kind:"seed", crop:c, price:c.seedPrice }:null; }
  return rpgFind("items",id)||rpgFind("weapons",id)||rpgFind("armors",id)||rpgFind("crops",id);
}
function rpgNameOf(id){ const it=rpgItemAny(id); return it?it.name:(""+id); }

/* ── RPG-4 위키 파이프라인(§7.2·§7.4): 학생 콘텐츠 스토어·검증기 7단계·부팅 병합 ── */
const RPG_CONTENT_KEY="starArena.rpgContent.v1";
// ★ STUDENT_RPG_EDIT(교사): 금칙어 — 초등 부적합·개인정보(§7.4 ④). 정규화 후 부분일치.
const RPG_BANNED=["바보","멍청","죽어","죽여","시발","존나","새끼","꺼져","병신"];
function loadRpgContent(){ try{ const s=JSON.parse(localStorage.getItem(RPG_CONTENT_KEY)); if(s&&typeof s==="object"){ if(!s.pending)s.pending=[]; if(!s.approved)s.approved=[]; return s; } }catch(e){} return { pending:[], approved:[] }; }
function saveRpgContent(st){ try{ localStorage.setItem(RPG_CONTENT_KEY, JSON.stringify(st)); }catch(e){} }
// 타입별 상한표(§7.1 — 검증기와 단일 출처). [min,max,required]
const RPG_SCHEMA={
  monsters:{ hp:[5,500,1], atk:[1,25,1], speed:[0,260,1], exp:[1,30,1], tier:[0,3,0] },
  weapons:{ dmg:[1,30,1], cd:[0.35,2.0,1], range:[40,420,1], levelReq:[1,10,0] },
  armors:{ hpAdd:[0,40,0], defAdd:[0,15,0], regenAdd:[0,8,0], price:[0,400,0] },
  crops:{ seedPrice:[1,60,1], growDays:[1,9,1], sellPrice:[1,300,1] },
  skills:{ dmgMul:[0,2.5,0], radius:[0,160,0], cd:[1,30,0] } };
function _rpgNorm(s){ return (""+(s||"")).replace(/[\s_.,!?~·]+/g,"").toLowerCase(); }   // 공백·문장부호만 제거(한글 유지 — \W는 한글까지 지워 금칙어 오탐)
function rpgBannedHit(o){
  const blob=_rpgNorm([o.name,o.desc,o.flavor,(o.dialog||[]).join("")].join(""));
  for(const w of RPG_BANNED) if(blob.indexOf(_rpgNorm(w))>=0) return w;
  return null;
}
function rpgBudgetCheck(type,o){   // §7.5 파워버짓 — 합법 ⭐배분은 자동 통과
  if(type==="monsters"){ if(o.isBoss) return {ok:true,note:"보스=교사 검수"};
    const s=o.hp/10+o.atk*2+(o.speed||0)/30, cap=20+(o.tier||0)*15;
    return { ok:s<=cap+0.01, score:Math.round(s*10)/10, cap:cap, hint:"체력·공격·빠르기 별을 조금 낮춰봐" }; }
  if(type==="weapons"){ const dps=o.dmg/o.cd, cap=15+(o.levelReq||1)*3;
    return { ok:dps<=cap+0.01, score:Math.round(dps*10)/10, cap:cap, hint:"공격을 줄이거나 휘두르는 시간을 늘려봐" }; }
  if(type==="crops"){ return { ok:o.sellPrice<=o.seedPrice*3+0.01, score:o.sellPrice, cap:o.seedPrice*3, hint:"파는 값을 씨앗값의 3배 안으로" }; }
  if(type==="skills"){ if(!o.cd) return {ok:true,note:"게이지/패시브=교사 검수"};
    const s=(o.dmgMul||0)*100/o.cd; return { ok:s<=60.01, score:Math.round(s*10)/10, cap:60, hint:"세기를 낮추거나 기다리는 시간을 늘려봐" }; }
  return {ok:true};
}
function validateRpgContent(type, raw){   // 7단계(§7.4) → {ok, data(조정 반영), errors[], warnings[], budget}
  const errors=[], warnings=[], o=JSON.parse(JSON.stringify(raw||{})), sc=RPG_SCHEMA[type];
  if(!o.name) errors.push("이름이 필요해요");   // ① 필수·타입 (id는 시스템이 부여)
  if(sc) for(const f in sc){ const req=sc[f][2];
    if(req&&(o[f]===undefined||o[f]===null)) errors.push(f+" 값이 필요해요");
    else if(o[f]!==undefined&&typeof o[f]!=="number") errors.push(f+"는 숫자여야 해요"); }
  const bad=rpgBannedHit(o); if(bad) errors.push("쓸 수 없는 말이 있어요(\""+bad+"\") — 다른 말로 바꿔줘");   // ④ 금칙어
  if(errors.length) return { ok:false, data:o, errors:errors, warnings:warnings };
  if(sc) for(const f in sc){ if(o[f]===undefined) continue; const lo=sc[f][0], hi=sc[f][1];   // ② 범위 클램프
    if(o[f]<lo){ warnings.push(f+" "+o[f]+"→"+lo+" 조정"); o[f]=lo; }
    else if(o[f]>hi){ warnings.push(f+" "+o[f]+"→"+hi+" 조정"); o[f]=hi; } }
  let bg=rpgBudgetCheck(type,o), guard=0;   // ③ 파워버짓 — 초과 시 스케일다운(클램프와 통합)
  while(bg.ok===false&&guard++<300){
    if(type==="monsters"){ if(o.atk>1)o.atk--; else if(o.hp>5)o.hp-=5; else if(o.speed>20)o.speed-=10; else break; }
    else if(type==="weapons") o.dmg=Math.max(1,o.dmg-1);
    else if(type==="crops") o.sellPrice=Math.max(1,o.sellPrice-1);
    else if(type==="skills") o.dmgMul=Math.max(0.1,Math.round((o.dmgMul-0.1)*10)/10);
    else break;
    bg=rpgBudgetCheck(type,o);
  }
  if(guard>0) warnings.push("힘의 균형을 위해 살짝 낮췄어요 ("+bg.hint+")");
  const refs=[];   // ⑤ 참조 무결성(제출 시 1차)
  if(type==="monsters"&&Array.isArray(o.drops)) for(const d of o.drops) refs.push(d.itemId);
  if(type==="quests"&&o.goal){ refs.push(o.goal.target); refs.push(o.goal.item); }
  for(const r of refs){ if(r&&!rpgItemAny(r)&&!rpgFind("monsters",r)&&!rpgFind("npcs",r)) warnings.push("아직 없는 것을 가리켜요("+r+") — 나중에 만들면 이어져요"); }
  return { ok:true, data:o, errors:errors, warnings:warnings, budget:bg };
}
function rpgContentMerge(){   // 부팅/승인 후: RPG_DB_LIVE = merge(RPG_DB, approved) + ⑦ 로드 재검증
  const st=loadRpgContent(), live={};
  for(const k in RPG_DB){ live[k]=Array.isArray(RPG_DB[k])?RPG_DB[k].slice():RPG_DB[k]; }
  for(const rec of st.approved){
    if(rec.disabled||!live[rec.type]) continue;
    const v=validateRpgContent(rec.type, rec.data); if(!v.ok) continue;
    const d=v.data; if(!d.id||d.id.indexOf("stu_")!==0) d.id="stu_"+rec.type+"_"+(rec.seq||0);
    d._author=rec.author||"학생";
    live[rec.type]=live[rec.type].filter(x=>x.id!==d.id).concat([d]);
  }
  RPG_DB_LIVE=live;
}
let _rpgSeq=0;
function rpgSubmitContent(type, data, author){   // 학생 제출 → pending
  const v=validateRpgContent(type, data);
  if(!v.ok) return { ok:false, msg:v.errors.join(" · ") };
  const st=loadRpgContent(), id="stu_"+type+"_"+(++_rpgSeq)+"_"+(st.approved.length+st.pending.length);
  v.data.id=id;
  st.pending.push({ id:id, type:type, data:v.data, author:author||"학생", seq:_rpgSeq, warnings:v.warnings, disabled:false });
  saveRpgContent(st);
  return { ok:true, id:id, warnings:v.warnings };
}
function rpgApproveContent(id){ const st=loadRpgContent(), i=st.pending.findIndex(r=>r.id===id); if(i<0) return false;
  st.approved.push(st.pending.splice(i,1)[0]); saveRpgContent(st); rpgContentMerge(); return true; }
function rpgRejectContent(id){ const st=loadRpgContent(), i=st.pending.findIndex(r=>r.id===id); if(i<0) return false;
  st.pending.splice(i,1); saveRpgContent(st); return true; }
function rpgExportApproved(){   // T3 승격용 JSON(교사가 wiki/rpg_db.json에 병합 → inject_db.py)
  const st=loadRpgContent(), out={};
  for(const rec of st.approved){ if(rec.disabled) continue; (out[rec.type]=out[rec.type]||[]).push(rec.data); }
  return JSON.stringify(out, null, 2);
}
try{ rpgContentMerge(); }catch(e){}   // 부팅 시 승인 학생 콘텐츠 병합

/* 교사 콘텐츠 승인 화면(§7.4 — MAP_REVIEW 패턴): pending 미리보기 → 승인/반려, E=T3 내보내기 */
let rpgReviewIdx=0;
function handleRpgReviewKey(code){
  const st=loadRpgContent(), pend=st.pending;
  if(code==="Escape"){ gameState=STATE.ADMIN; return; }
  if(code==="KeyE"){ const json=rpgExportApproved();
    try{ window.prompt("승인된 학생 콘텐츠 JSON — 복사해서 wiki/rpg_db.json에 병합 후 inject_db.py (T3 승격):", json); }catch(e){}
    return; }
  if(!pend.length) return;
  if(code==="ArrowUp"){ rpgReviewIdx=(rpgReviewIdx+pend.length-1)%pend.length; return; }
  if(code==="ArrowDown"){ rpgReviewIdx=(rpgReviewIdx+1)%pend.length; return; }
  if(code==="Enter"||code==="NumpadEnter"){ const r=pend[rpgReviewIdx]; if(r){ rpgApproveContent(r.id); showToast("✅ 승인·반영: "+r.data.name); rpgReviewIdx=Math.max(0,rpgReviewIdx-1); } return; }
  if(code==="KeyX"||code==="Delete"){ const r=pend[rpgReviewIdx]; if(r){ rpgRejectContent(r.id); showToast("↩ 아이디어 온실로 보류: "+r.data.name); rpgReviewIdx=Math.max(0,rpgReviewIdx-1); } return; }
}
function drawRpgReviewScreen(){
  const st=loadRpgContent(), pend=st.pending;
  ctx.fillStyle="rgba(10,8,26,0.98)"; ctx.fillRect(0,0,LOGW,LOGH);
  ctx.fillStyle="#c79bff"; ctx.font="bold 28px 'Malgun Gothic',sans-serif"; ctx.fillText("📖 별의 도감 — 학생 콘텐츠 승인", 50, 56);
  ctx.fillStyle="#b0a0d0"; ctx.font="15px 'Malgun Gothic',sans-serif";
  ctx.fillText("대기 "+pend.length+"개 · 승인됨 "+st.approved.length+"개   |   ↑↓ 선택 · Enter 승인 · X 보류 · E 내보내기(T3) · Esc", 50, 84);
  if(!pend.length){ ctx.fillStyle="#9a90b8"; ctx.font="17px 'Malgun Gothic',sans-serif";
    ctx.fillText("승인 대기 중인 학생 콘텐츠가 없어요. (시트 → JSON 제출 시 여기 표시)", 60, 150); return; }
  for(let i=0;i<Math.min(9,pend.length);i++){
    const r=pend[i], y=120+i*50, on=(i===rpgReviewIdx);
    ctx.fillStyle=on?"rgba(199,155,255,0.2)":"rgba(255,255,255,0.05)"; roundRect(50,y,LOGW-100,44,8); ctx.fill();
    ctx.fillStyle="#ffffff"; ctx.font=(on?"bold ":"")+"16px 'Malgun Gothic',sans-serif";
    ctx.fillText("["+r.type+"] "+r.data.name+"  · 설계 "+r.author, 68, y+27);
    const bg=rpgBudgetCheck(r.type, r.data);
    ctx.textAlign="right"; ctx.fillStyle=bg.ok!==false?"#8fdba0":"#ff9f9f";
    ctx.fillText(bg.score!==undefined?("힘 "+bg.score+"/"+bg.cap):"검수 필요", LOGW-70, y+27); ctx.textAlign="left";
  }
  const cur=pend[rpgReviewIdx];
  if(cur&&cur.warnings&&cur.warnings.length){ ctx.fillStyle="#ffd93d"; ctx.font="13px 'Malgun Gothic',sans-serif";
    ctx.fillText("⚠ "+cur.warnings.join(" · "), 60, 120+Math.min(9,pend.length)*50+24); }
}

/* ── 저장(§7.3): profile.rpg 단일 서브트리 ── */
function rpgExpNeed(L){ return Math.round(RPG_CONST.EXP_BASE*Math.pow(RPG_CONST.EXP_GROW, Math.max(1,L)-1)); }
function rpgDefaultSave(){
  return { v:2, chapter:1, day:1, level:1, exp:0, hp:RPG_CONST.BASE_HP, gold:0, jobId:"job_novice",
    pos:{ mapId:"rpg_village", tx:-1, ty:-1 },   // -1 = 맵의 스폰 앵커(*) 사용
    inventory:[], equip:{ weapon:"wp_fist", body:"", charm:"" },
    skills:[], skillX:"", farmSize:[3,4], farm:[],
    quests:{ done:[], active:{} }, flags:{}, kills:{}, tut:[], lastUpdated:0,
    playSec:0, resp:{}, pity:{},   // v2(POLISH-1): 플레이 시간·리스폰 기록·pity 드랍 카운터
    today:{ kills:0, gold:0, harvest:0 }, daily:{ day:0, list:[] } };   // POLISH-2: 하루 요약·일일 의뢰
}
function rpgMaxHpFor(sv){
  let hp=RPG_CONST.BASE_HP+RPG_CONST.HP_PER_LV*((sv.level||1)-1);
  if(sv.equip){ for(const slot of ["body","charm"]){ const a=rpgFind("armors",sv.equip[slot]); if(a&&a.hpAdd) hp+=a.hpAdd; } }
  const j=rpgFind("jobs",sv.jobId); if(j&&j.statMods&&j.statMods.hpAdd) hp+=j.statMods.hpAdd;
  return hp;
}
function rpgMergeSave(saved){
  const d=rpgDefaultSave();
  if(saved&&typeof saved==="object"){ for(const k in d){ if(saved[k]!==undefined&&saved[k]!==null) d[k]=saved[k]; } }
  // 무결성 보정 — 존재하지 않는 콘텐츠 id는 조용히 드랍/맨손 폴백(§7.3 콘텐츠 가변 환경 규칙)
  if(typeof d.level!=="number"||d.level<1) d.level=1;
  if(typeof d.day!=="number"||d.day<1) d.day=1;
  if(typeof d.gold!=="number"||d.gold<0) d.gold=0;
  if(!d.pos||!d.pos.mapId||!rpgFind("maps",d.pos.mapId)) d.pos={mapId:"rpg_village",tx:-1,ty:-1};
  if(!d.equip||typeof d.equip!=="object") d.equip={weapon:"wp_fist",body:"",charm:""};
  if(d.equip.weapon&&d.equip.weapon!=="wp_fist"&&!rpgFind("weapons",d.equip.weapon)) d.equip.weapon="wp_fist";
  if(d.equip.body&&!rpgFind("armors",d.equip.body)) d.equip.body="";
  if(d.equip.charm&&!rpgFind("armors",d.equip.charm)) d.equip.charm="";
  if(!Array.isArray(d.inventory)) d.inventory=[];
  d.inventory=d.inventory.filter(s=>s&&s.id&&s.qty>0&&rpgItemAny(s.id));
  if(!Array.isArray(d.farm)) d.farm=[];
  d.farm=d.farm.map(cell=>(cell&&cell.c&&!rpgFind("crops",cell.c))?null:cell);   // B-7: 사라진 작물 id 밭 영구 잠금 해제
  if(!Array.isArray(d.skills)) d.skills=[];
  if(!Array.isArray(d.tut)) d.tut=[];
  if(!d.quests||typeof d.quests!=="object") d.quests={done:[],active:{}};
  if(!Array.isArray(d.quests.done)) d.quests.done=[];
  if(!d.quests.active||typeof d.quests.active!=="object") d.quests.active={};
  if(!d.flags||typeof d.flags!=="object") d.flags={};
  if(!d.kills||typeof d.kills!=="object") d.kills={};
  if(typeof d.playSec!=="number"||d.playSec<0) d.playSec=0;   // 세이브 v1→2 백필(POLISH-1)
  if(!d.resp||typeof d.resp!=="object") d.resp={};
  if(!d.pity||typeof d.pity!=="object") d.pity={};
  if(!d.today||typeof d.today!=="object") d.today={kills:0,gold:0,harvest:0};   // POLISH-2 백필
  if(!d.daily||typeof d.daily!=="object"||!Array.isArray(d.daily.list)) d.daily={day:0,list:[]};
  if(d.level>1||d.quests.done.length>0){ for(const t of [2,3,4,5,6]) if(d.tut.indexOf(t)<0) d.tut.push(t); }   // 기존 세이브: 온보딩 트리거 일괄 스킵
  d.v=2;
  const mh=rpgMaxHpFor(d); if(typeof d.hp!=="number"||d.hp<1||d.hp>mh) d.hp=mh;
  return d;
}
function rpgAddGold(n){ if(!RPG) return; RPG.save.gold=Math.max(0, RPG.save.gold+n);
  if(n>0&&RPG.save.today) RPG.save.today.gold+=n; }   // §5.4 아레나 분리 · POLISH-2: 하루 요약 집계(양수만)
function rpgBanner(text){   // POLISH-1: 보상 배너 — 토스트 연속 덮어쓰기 유실 해결(합산 1장·최대 3줄)
  if(!RPG){ showToast(text); return; }
  if(RPG.banner&&RPG.banner.t>0){
    RPG.banner.lines.push(text);
    if(RPG.banner.lines.length>3) RPG.banner.lines=RPG.banner.lines.slice(-3);
    RPG.banner.t=Math.max(RPG.banner.t,3.4);
  } else RPG.banner={ t:3.4, lines:[text] };
}
function rpgAddExp(n){
  if(!RPG) return;
  const sv=RPG.save; sv.exp+=n; let ups=0;
  while(sv.exp>=rpgExpNeed(sv.level)&&sv.level<99){ sv.exp-=rpgExpNeed(sv.level); sv.level++; ups++; }
  if(ups>0){
    sv.hp=rpgMaxHpFor(sv); rpgBanner("🎉 레벨 업! Lv."+sv.level+" (완전 회복)"); playSfx("clear");
    if(RPG.p&&RPG.fx){   // POLISH-2: 레벨업 라디얼 연출
      RPG.fx.push({kind:"ring",x:RPG.p.x,y:RPG.p.y-6,t:0.6});
      for(let i=0;i<10;i++){ const a=rand(0,Math.PI*2);
        RPG.fx.push({kind:"star",x:RPG.p.x,y:RPG.p.y-10,t:rand(0.5,0.8),vx:Math.cos(a)*rand(80,200),vy:Math.sin(a)*rand(80,200)-80,g:300,color:"#8fd0ff",size:14}); }
    }
    rpgLearnSkills(sv);   // 레벨 기반 스킬 자동 습득(§4.5)
    rpgPersist();
  }
}
function rpgLearnSkills(sv){
  for(const sk of rpgDb().skills){
    if(sk.acquire&&sk.acquire.by==="level"&&sk.acquire.value<=sv.level&&sv.skills.indexOf(sk.id)<0){
      sv.skills.push(sk.id);
      if(sk.type==="active"&&sk.slot==="X"&&!sv.skillX) sv.skillX=sk.id;
      if(sk.acquire.value>1) showToast("✨ 새 능력을 배웠다: "+sk.name+"!");
    }
  }
}
function rpgPersist(){   // §7.3: 자동저장 — 맵전환·거래·취침·레벨업·60s 폴백에서 호출
  if(!RPG) return;
  if(RPG.map){ RPG.save.pos={ mapId:RPG.map.id, tx:Math.floor(RPG.p.x/RPG_CONST.TILE), ty:Math.floor(RPG.p.y/RPG_CONST.TILE) }; }
  RPG.save.lastUpdated=Date.now();
  try{ profile.rpg=JSON.parse(JSON.stringify(RPG.save)); }catch(e){ profile.rpg=RPG.save; }
  try{ saveProfile(); }catch(e){}
}

/* ── 맵 로드/타일 ── */
function rpgLoadMap(mapId, tx, ty, opts){
  opts=opts||{};
  const rec=rpgFind("maps",mapId); if(!rec){ showToast("맵이 없어요: "+mapId); return; }
  const grid=rec.rows.map(s=>s.split(""));
  RPG.map=rec; RPG.grid=grid; RPG.rows=grid.length; RPG.cols=grid[0].length;
  let sx=(typeof tx==="number")?tx:-1, sy=(typeof ty==="number")?ty:-1;
  if(!(sx>=0&&sy>=0&&sx<RPG.cols&&sy<RPG.rows)){
    sx=1; sy=1;
    for(let r=0;r<RPG.rows;r++) for(let c=0;c<RPG.cols;c++) if(grid[r][c]===RPG_DB.legend.spawn){ sx=c; sy=r; }
  }
  RPG.p.x=(sx+0.5)*RPG_CONST.TILE; RPG.p.y=(sy+0.5)*RPG_CONST.TILE;
  if(rpgCollides(RPG.p.x,RPG.p.y)){ const f=rpgFindFree(sx,sy); RPG.p.x=(f.c+0.5)*RPG_CONST.TILE; RPG.p.y=(f.r+0.5)*RPG_CONST.TILE; }
  RPG.p.warpLock=true; RPG.p.moving=false;
  RPG.npcsOnMap=(rec.npcs||[]).map(n=>({ id:n.npcId||n.id, tx:n.tx, ty:n.ty, x:(n.tx+0.5)*56, y:(n.ty+0.5)*56 })).filter(n=>rpgFind("npcs",n.id));
  RPG.objects=(rec.objects||[]).slice();
  RPG.mobs=[]; RPG.drops=[]; RPG.bullets=[]; RPG.fx=[]; RPG.ctxTarget=null; RPG.veil=false; RPG._soilCache=null;
  const _spawns=(rec.monsters||[]);
  for(let si=0;si<_spawns.length;si++){   // POLISH-1: playSec 리스폰 — 맵 로드 시점만 판정(팝인 없음)
    const s=_spawns[si];
    const def=rpgFind("monsters",s.monsterId); if(!def) continue;
    if(def.isBoss&&rpgQuestDone("mq07")){   // POLISH-3: 보스 재도전 — 7일마다(7·14·21일차…) 1회
      if(!(RPG.save.day%7===0&&RPG.save.flags.bossRematchDay!==RPG.save.day)) continue;
      showToast("👑 뭉게대왕이 다시 나타났다! (7일마다 재도전)");
    }
    const rkey=mapId+"#"+si, killedAt=RPG.save.resp?RPG.save.resp[rkey]:undefined;
    if(killedAt!==undefined){
      if((RPG.save.playSec||0)-killedAt < rpgRespawnCd(def)) continue;   // 쿨다운 중 — 미스폰
      delete RPG.save.resp[rkey];   // 자가 청소
    }
    const f=rpgFindFree(s.tx,s.ty);   // B-11: 벽 속 생성 방지 스냅
    const mob=rpgMakeMob(def,(f.c+0.5)*56,(f.r+0.5)*56);
    mob.spawnKey=rkey;
    RPG.mobs.push(mob);
  }
  if(mapId==="rpg_village"&&RPG.save.flags.dusk){   // POLISH-2 §2: 해질녘 — 먼별이 우물가로
    const mb=RPG.npcsOnMap.find(n=>n.id==="npc_meonbyeol");
    if(mb){ mb.tx=19; mb.ty=9; mb.x=19.5*56; mb.y=9.5*56; }
  }
  if(rpgQuestDone("mq07")&&RPG.save.flags.eliteDown!==RPG.save.day){   // POLISH-2 §8: 정예 별그늘 조각(들판/숲길 교대)
    const tgt=(RPG.save.day%2===0)?"rpg_field1":"rpg_field2";
    if(mapId===tgt){
      const sd=rpgFind("monsters","mob_shade");
      if(sd){
        const ed=Object.assign({},sd,{ name:"별그늘 조각", hp:176, atk:10, exp:40, gold:[30,45], elite:true,
          drops:[{itemId:"it_moon_feather",chance:0.8},{itemId:"it_stardust_powder",chance:0.5}] });
        const f=rpgFindFree((tgt==="rpg_field1")?18:26,(tgt==="rpg_field1")?7:10);
        const em=rpgMakeMob(ed,(f.c+0.5)*56,(f.r+0.5)*56); em.eliteDay=1;
        RPG.mobs.push(em);
      }
    }
  }
  const stuSlots={ rpg_field1:[[15,10],[26,6],[8,4]], rpg_field2:[[12,5],[28,13],[38,18]] }[mapId];
  if(stuSlots){   // POLISH-2 §10: 학생 승인 몬스터 스폰 슬롯(habitat·tier 일치 day 로테이션)
    const baseIds={}; for(const bm of RPG_DB.monsters) baseIds[bm.id]=1;
    const mtier=(mapId==="rpg_field1")?1:2;
    const stu=rpgDb().monsters.filter(mm=>!baseIds[mm.id]&&!mm.isBoss&&((mm.habitat&&mm.habitat.indexOf(mapId)>=0)||((mm.tier||1)===mtier)));
    for(let i=0;i<Math.min(stuSlots.length,stu.length);i++){
      const pick=stu[(RPG.save.day+i)%stu.length];
      const f2=rpgFindFree(stuSlots[i][0],stuSlots[i][1]);
      const sm=rpgMakeMob(pick,(f2.c+0.5)*56,(f2.r+0.5)*56); sm.student=1;
      RPG.mobs.push(sm);
    }
  }
  if(mapId==="rpg_field1"&&RPG.save.tut.indexOf(2)<0){   // POLISH-2 §6: 첫 필드 온보딩(전투 안내)
    RPG.save.tut.push(2);
    const tl=rpgDb().dialogs.tutorial||[];
    if(tl[6]) rpgOpenDialog(null,[tl[6],tl[7]].filter(Boolean));
  }
  if(mapId==="rpg_village"&&RPG.save.flags.raidOn&&rpgQuestActive("mq06")) rpgSpawnRaid();   // 방어전 재개
  if(mapId==="rpg_den3"&&!RPG.save.flags.bossIntro&&rpgQuestActive("mq07")){   // 보스 등장 연출
    RPG.save.flags.bossIntro=1;
    const bi=(rpgDb().dialogs.boss||{}).intro;
    if(bi&&bi.length) rpgOpenDialog(null, bi);
  }
  const w=RPG.cols*56, h=RPG.rows*56;   // EXPLORE-1: 고정 1.0 스케일 + 추적 카메라(전역 CAM/ARENA 비접촉)
  RPG.cam={ x:0, y:0, offX:Math.max(0,Math.round((1232-w)/2)), offY:Math.max(0,Math.round((576-h)/2)),
    maxX:Math.max(0,w-1232), maxY:Math.max(0,h-576) };
  rpgCamSnap();   // 멀미 4계명 ③: 워프/로드 시 즉시 스냅
  RPG.layer=null; RPG.layerMapId=null;
  if(!opts.noSave) rpgPersist();   // §7.3: 맵 전환 자동저장
}
function rpgRespawnCd(def){   // POLISH-1: 티어1 90s / 티어2 150s / 그늘 조각 240s(오버라이드)
  if(def.id==="mob_shade") return RPG_CONST.RESPAWN_SHADE;
  return (def.tier>=2)?RPG_CONST.RESPAWN_T2:RPG_CONST.RESPAWN_T1;
}
function rpgTileAt(c,r){ if(!RPG||!RPG.grid||c<0||r<0||c>=RPG.cols||r>=RPG.rows) return "T"; return RPG.grid[r][c]; }
function rpgSolidAt(c,r){ return RPG_DB.legend.solid.indexOf(rpgTileAt(c,r))>=0; }
function rpgFindFree(sc,sr){
  for(let rad=0;rad<8;rad++) for(let r=sr-rad;r<=sr+rad;r++) for(let c=sc-rad;c<=sc+rad;c++){
    if(c<0||r<0||c>=RPG.cols||r>=RPG.rows) continue;
    if(!rpgSolidAt(c,r)&&!rpgCollides((c+0.5)*56,(r+0.5)*56)) return {c:c,r:r};
  }
  return {c:sc,r:sr};
}

/* ── 이동/충돌(축 분리) ── */
function rpgCollides(x,y,rr){
  const r=rr||RPG_CONST.PLAYER_R, T=RPG_CONST.TILE;
  const c0=Math.floor((x-r)/T), c1=Math.floor((x+r)/T), r0=Math.floor((y-r)/T), r1=Math.floor((y+r)/T);
  for(let rr=r0;rr<=r1;rr++) for(let cc=c0;cc<=c1;cc++){
    if(!rpgSolidAt(cc,rr)) continue;
    if(circleRectOverlap(x,y,r,{x:cc*T,y:rr*T,w:T,h:T})) return true;
  }
  return false;
}
function rpgMove(dt,mx,my){
  const p=RPG.p, l=Math.hypot(mx,my);
  if(l>1){ mx/=l; my/=l; }
  p.moving=l>0.05;
  if(p.moving) p.facing=Math.atan2(my,mx);
  const step=RPG_CONST.SPD*rpgSpdMul()*dt;
  const nx=p.x+mx*step; if(!rpgCollides(nx,p.y)) p.x=nx;
  const ny=p.y+my*step; if(!rpgCollides(p.x,ny)) p.y=ny;
  p.x=clamp(p.x, RPG_CONST.PLAYER_R, RPG.cols*56-RPG_CONST.PLAYER_R);
  p.y=clamp(p.y, RPG_CONST.PLAYER_R, RPG.rows*56-RPG_CONST.PLAYER_R);
}
function rpgCheckWarp(){
  const p=RPG.p, tc=Math.floor(p.x/56), tr=Math.floor(p.y/56);
  let onWarp=null;
  for(const w of (RPG.map.portals||[])){ if(w.at&&w.at[0]===tc&&w.at[1]===tr){ onWarp=w; break; } }
  if(!onWarp){ p.warpLock=false; return; }
  if(p.warpLock) return;
  if(onWarp.to==="rpg_den1"&&!rpgQuestActive("mq07")&&!rpgQuestDone("mq07")){   // §3.1 교차점 2: 도시락(sq02)+mq06 후 mq07 수락해야 개방
    p.warpLock=true;
    const msg=!rpgQuestDone("mq06")?"🚪 요새 문이 굳게 닫혀 있다… (온별 할아버지와 이야기하자)"
      :(!rpgQuestDone("sq02")?"🚪 원정엔 도시락이 필요해! (모모의 '콩 배달 대작전'을 끝내자)"
      :"🚪 준비 완료! 온별 할아버지에게 원정 이야기를 듣자");
    showToast(msg);
    return;
  }
  playSfx("pick");
  rpgLoadMap(onWarp.to, onWarp.tx, onWarp.ty);
}

/* ── 상호작용(문맥 버튼 §4.7: NPC > 오브젝트 — 드랍/수확/밭일은 RPG-2/3a에서 우선순위 삽입) ── */
function rpgScanContext(){   // §4.7 우선순위: NPC > (줍기=자동) > 수확 > 밭일 > 문/오브젝트 — 적은 절대 미포함
  const p=RPG.p, R2=RPG_CONST.INTERACT_R+18, cands=[];
  for(const n of RPG.npcsOnMap){ const d=dist(p.x,p.y,n.x,n.y); if(d<R2) cands.push({pri:0,d:d,t:{kind:"npc",npc:n}}); }
  const soil=rpgSoil();
  for(let i=0;i<soil.length;i++){
    const sx=(soil[i][0]+0.5)*56, sy=(soil[i][1]+0.5)*56, d=dist(p.x,p.y,sx,sy);
    if(d>=R2) continue;
    const a=rpgFarmActionFor(i);
    cands.push({pri:(a.act==="harvest")?1:2, d:d, t:{kind:"farm",idx:i,farm:a,x:sx,y:sy}});
  }
  for(const o of RPG.objects){ const d=dist(p.x,p.y,(o.tx+0.5)*56,(o.ty+0.5)*56); if(d<R2) cands.push({pri:3,d:d,t:{kind:"obj",obj:o}}); }
  cands.sort(function(a,b){ return (a.pri-b.pri)||(a.d-b.d); });
  RPG.ctxTarget=cands.length?cands[0].t:null;
}
function rpgInteract(){
  const t=RPG.ctxTarget; if(!t) return;
  if(t.kind==="npc") return rpgTalkTo(t.npc.id);
  if(t.kind==="farm") return rpgFarmDo(t.idx);
  if(t.kind==="obj") return rpgUseObject(t.obj);
}
function rpgChestOpen(o){   // EXPLORE-1: 보물상자 1회성 루팅 — flags["chest_맵_i"]
  const key="chest_"+RPG.map.id+"_"+o.tx+"_"+o.ty, sv=RPG.save;
  if(sv.flags[key]) return rpgOpenDialog(null,["상자는 텅 비어 있다. 누가 벌써 다녀갔나 보다."]);
  sv.flags[key]=1;
  const L=o.loot||{}, got=[];
  if(L.gold){ sv.gold+=L.gold; got.push("💰 "+L.gold+"G"); }
  if(L.item){ const q=L.qty||1; rpgInvAdd(L.item,q); got.push(rpgNameOf(L.item)+" ×"+q); }
  playSfx("pick");
  RPG.fx.push({x:(o.tx+0.5)*56, y:o.ty*56-8, t:1.2, text:"✨ "+(got.join(" · ")||"반짝!"), color:"#ffe066"});
  rpgOpenDialog(null,["보물상자를 열었다!", "✨ "+(got.join(" · ")||"…비어 있잖아?")]);
  rpgPersist();
}
/* ── 일일 의뢰판(POLISH-2 §3 — day 시드 결정적·mq04 후 1건/일·mq07 후 3건/일) ── */
function rpgDailyRec(id){ return (rpgDb().dailies||[]).find(d=>d.id===id); }
function rpgDailyGen(day){
  const ds=rpgDb().dailies||[]; if(!ds.length) return [];
  const n=rpgQuestDone("mq07")?3:1, out=[], used={};
  let s=((day*2654435761)+97)>>>0;   // day 결정적 시드 — 재로드 리롤 방지
  for(let t=0;t<ds.length&&out.length<Math.min(n,ds.length);t++){
    s=((s*1103515245)+12345)>>>0;
    let k=s%ds.length, tries=0;
    while(used[k]&&tries<ds.length){ k=(k+1)%ds.length; tries++; }
    used[k]=1; out.push({ id:ds[k].id, prog:0, done:false });
  }
  return out;
}
function rpgDailyEnsure(){
  const sv=RPG.save;
  if(!rpgQuestDone("mq04")) return false;   // 의뢰판 개방 시점
  if(!sv.daily||sv.daily.day!==sv.day) sv.daily={ day:sv.day, list:rpgDailyGen(sv.day) };
  return true;
}
function rpgDailyOnKill(mobId){
  const sv=RPG.save;
  if(!sv.daily||sv.daily.day!==sv.day) return;
  for(const q of sv.daily.list){
    const d=rpgDailyRec(q.id);
    if(d&&!q.done&&d.type==="kill"&&d.target===mobId&&q.prog<d.count){
      q.prog++;
      if(q.prog>=d.count) showToast("📋 오늘의 부탁 달성: "+d.name+" — 게시판에서 보상!");
    }
  }
}
function rpgDailyClaim(qi){
  const sv=RPG.save, q=sv.daily.list[qi], d=q&&rpgDailyRec(q.id);
  if(!d||q.done) return;
  if(d.type==="kill"){ if(q.prog<d.count){ showToast("아직 덜 됐어요 ("+q.prog+"/"+d.count+")"); return; } }
  else { if(rpgInvCount(d.target)<d.count){ showToast(rpgNameOf(d.target)+" "+d.count+"개를 가져와야 해요"); return; } rpgInvRemove(d.target,d.count); }
  q.done=true; rpgAddGold(d.gold); playSfx("clear");
  rpgBanner("📋 "+d.name+" 완료! +"+d.gold+"G");
  rpgPersist();
}

/* ── 별샘 워프망(POLISH-1 §6 — 우물·야영지·요새 입구, 최초 접촉 해금) ── */
const RPG_WELLS=[
  { mapId:"rpg_village", name:"마을 우물",   objType:"well", tx:18, ty:9 },
  { mapId:"rpg_field1",  name:"들판 야영지", objType:"camp", tx:27, ty:4 },
  { mapId:"rpg_den1",    name:"요새 입구",   objType:"camp", tx:12, ty:8 } ];
function rpgWellUse(){

  }

  if(!opts.length){ rpgOpenDialog(null,["별샘이 은은하게 반짝인다.","다른 별샘을 찾아 깨우면, 별샘끼리 오갈 수 있을 것 같다!"]); return true; }
  RPG.ui="warp"; RPG.warp={ idx:0, list:opts };

}
function rpgWellGo(w){
  if(!w) return;

  if(w.mapId==="rpg_den1"&&!rpgQuestActive("mq07")&&!rpgQuestDone("mq07")){   // den 게이트 동일 적용(우회 방지)
    showToast("🌩 요새의 별샘은 아직 닫혀 있다… (원정 준비를 마치자)"); return;
  }

  playSfx("pick"); rpgLoadMap(w.mapId, w.tx, w.ty);
